<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대학 정보 나침반 | 경기진학지도협의회</title>
<style>
:root {
  --bg: #f0f4fb;
  --surface: #ffffff;
  --border: #dae2f0;
  --border2: #c8d4e8;
  --text: #1a2640;
  --text-muted: #6a7a98;
  --accent: #1a4db8;
  --accent-light: #e3ecff;
        --green: #0f7a3c;
  --green-light: #e8f8ee;
  --font: 'Malgun Gothic', '맑은 고딕', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-weight: 700;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0d2a5e 0%, #1a4db8 60%, #1e5fc6 100%);
  padding: 20px 32px 0 32px;
  box-shadow: 0 3px 16px rgba(13,42,94,.38);
  position: relative;
  overflow: hidden;
}
.header::before { content:''; position:absolute; top:-40px; right:-40px; width:220px; height:220px; background:rgba(255,255,255,.05); border-radius:50%; }
.header::after  { content:''; position:absolute; bottom:-60px; right:120px; width:140px; height:140px; background:rgba(255,255,255,.04); border-radius:50%; }

.header-main { display:flex; align-items:center; gap:20px; padding-bottom:16px; }


.logo-area {
  width:72px; height:72px; flex-shrink:0;
  background:transparent;
  border:none;
  border-radius:0;
  display:flex; align-items:center; justify-content:center;
  box-shadow:none;
  position:relative; z-index:1; overflow:hidden;
}
.logo-area img {
  width:68px; height:68px; object-fit:contain;
}


.hd-text { flex:1; position:relative; z-index:1; }
.hd-org {
  font-size:12px; font-weight:700;
  color:rgba(255,255,255,.75); letter-spacing:.08em;
  margin-bottom:5px; display:flex; align-items:center; gap:6px;
}
.hd-org::before { content:''; display:inline-block; width:16px; height:1.5px; background:rgba(255,255,255,.5); }
.hd-title { font-size:22px; font-weight:900; color:#fff; letter-spacing:-.02em; line-height:1.28; }
.hd-title em { font-style:normal; background:linear-gradient(90deg,#7ec8ff,#a8d8ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hd-sub { font-size:12px; color:rgba(255,255,255,.6); margin-top:6px; font-weight:700; }

.hd-stat {
  position:relative; z-index:1;
  background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.22);
  border-radius:14px; padding:12px 20px; text-align:center; flex-shrink:0;
  backdrop-filter:blur(4px);
}
.stat-num { font-size:36px; font-weight:900; color:#fff; line-height:1; }
.stat-lbl { font-size:11px; color:rgba(255,255,255,.68); margin-top:3px; font-weight:700; letter-spacing:.04em; }

.notice-bar {
  position:relative; z-index:1;
  background:rgba(0,0,0,.22); border-top:1px solid rgba(255,255,255,.12);
  padding:8px 32px; display:flex; align-items:center; gap:8px;
}
.notice-text { font-size:11.5px; font-weight:700; color:rgba(255,220,100,.9); letter-spacing:.01em; line-height:1.5; }

/* ── CONTROLS ── */
.controls {
  background:#fff; border-bottom:1px solid var(--border);
  padding:12px 28px; display:flex; align-items:center; gap:12px;
  flex-wrap:wrap; position:sticky; top:0; z-index:100;
  box-shadow: 0 2px 10px rgba(26,77,184,.08);
}

.search-wrap { position:relative; flex:1; min-width:170px; max-width:300px; }
.s-ic { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#8a9ab8; font-size:13px; pointer-events:none; }
.search-input {
  width:100%; padding:8px 30px 8px 32px;
  border:1.5px solid var(--border2); border-radius:8px;
  font-family:inherit; font-size:13.5px; font-weight:700;
  color:var(--text); background:#f6f9ff; outline:none;
  transition:border-color .18s, background .18s;
}
.search-input:focus { border-color:var(--accent); background:#fff; }
.clr { position:absolute; right:9px; top:50%; transform:translateY(-50%); background:none; border:none; color:#aab; cursor:pointer; font-size:15px; display:none; line-height:1; padding:0; }
.clr.on { display:block; }


.rbtns { display:flex; gap:5px; flex-wrap:wrap; }
.rbtn {
  padding:6px 13px; border-radius:20px; border:1.5px solid var(--border2);
  background:#fff; color:var(--text-muted);
  font-family:inherit; font-size:12.5px; font-weight:700;
  cursor:pointer; transition:all .16s; white-space:nowrap;
}
.rbtn:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
.rbtn.on { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(26,77,184,.28); }

/* ── MAIN ── */
.main { max-width:1380px; margin:0 auto; padding:20px 28px 60px; }

.info-bar { font-size:13px; color:var(--text-muted); font-weight:700; margin-bottom:16px; }
.info-bar span { color:var(--accent); font-weight:900; }

.rsec { margin-bottom:32px; }
.rsec-hd {
  display:flex; align-items:center; gap:8px;
  margin-bottom:12px; padding-bottom:9px;
  border-bottom:2.5px solid var(--accent);
}
.rsec-name { font-size:17px; font-weight:900; color:#0d2a5e; }
.rsec-cnt {
  background:var(--accent); color:#fff;
  font-size:11px; font-weight:700;
  border-radius:12px; padding:2px 9px; line-height:1.8;
}

/* ── CARDS ── */
.cards {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap:10px;
}

.card {
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:all .18s;
  box-shadow:0 1px 4px rgba(26,42,94,.06);
}
.card:hover {
  border-color:var(--accent);
  box-shadow:0 4px 16px rgba(26,77,184,.12);
  transform:translateY(-1px);
}

.card-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.card-name {
  font-size:15px;
  font-weight:900;
  color:var(--text);
  flex:1;
}


.card-btns {
  display:flex;
  gap:7px;
}

.link-btn {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:7px 10px;
  border-radius:7px;
  font-family:inherit;
  font-size:12.5px;
  font-weight:700;
  text-decoration:none;
  transition:all .15s;
  border:1.5px solid transparent;
}

.btn-home {
  background:var(--accent-light);
  color:var(--accent);
  border-color:#c0d3f5;
}
.btn-home:hover {
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.btn-pdf {
  background:var(--green-light);
  color:var(--green);
  border-color:#b5dfc8;
}
.btn-pdf:hover {
  background:var(--green);
  color:#fff;
  border-color:var(--green);
}

.btn-only {
  /* single button takes full width */
  flex:1;
}

.btn-disabled {
  background:#f4f4f4;
  color:#bbb;
  border-color:#e0e0e0;
  cursor:not-allowed;
  pointer-events:none;
}

/* ── EMPTY ── */
.empty {
  text-align:center;
  padding:80px 20px;
  color:var(--text-muted);
  font-size:15px;
}
.empty-ic { font-size:40px; margin-bottom:14px; }

/* ── SCROLL TOP ── */
.scroll-top {
  position:fixed; bottom:28px; right:28px;
  width:42px; height:42px;
  border-radius:6px; background:var(--accent);
  border:none; color:#fff; font-size:18px;
  font-weight:700; cursor:pointer; display:none;
  align-items:center; justify-content:center;
  z-index:200; font-family:var(--font);
  box-shadow:0 4px 12px rgba(26,77,184,.35);
  transition:opacity .2s;
}
.scroll-top.visible { display:flex; }

/* ── FOOTER ── */
footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:var(--text-muted);
  background:#fff;
  border-top:1px solid var(--border);
}

@media (max-width:640px) {
  .cards { grid-template-columns:1fr; }
  .header { padding:16px 16px 0; }
  .controls { padding:10px 16px; }
  .main { padding:16px 14px 60px; }
  .hd-title { font-size:17px; }
  .hd-stat { display:none; }
}
</style>
</head>

{"name":"DGIST","region":"대구","url":"https://drive.google.com/open?id=10BmBSAynQ7hcqHaIY3Oihx8VXPvBoT3a"},
{"name":"GIST","region":"광주","url":"https://drive.google.com/open?id=1oiI5uetLWYxFPu7W_96lG2fdVTWEZXJb"},
{"name":"광주대학교","region":"광주","url":"https://drive.google.com/open?id=13171DwngqNn0TliLswWxwwzKuvJi_B-o"},
{"name":"국립경국대","region":"경북","url":"https://drive.google.com/open?id=158uDikWkWrKaVKesHEmGmdshETK9WzJk"},
{"name":"경북대학교","region":"경북","url":"https://drive.google.com/open?id=1PiqNyXT4MY-c682UqwD8TMCfWwkS0MYn"},
{"name":"협성대학교","region":"경기","url":"https://drive.google.com/open?id=1d5VqsGEIWDIh0u8QTGfDKH9e93SKgu_g"},
{"name":"한동대학교","region":"경남","url":"https://drive.google.com/file/d/1VDEs9bECwHOLPpPQTjvfzqCvMUx-3R8u/view?usp=drive_link"},
{"name":"한국해양대학교","region":"경남","url":"https://drive.google.com/file/d/1y8N4HdRvdUlKiBrzSBJQb4vKgjwmYpGg/view?usp=drive_link"},
{"name":"조선대학교","region":"광주","url":"https://drive.google.com/file/d/1FlXW9nTu0zbQ9whcG2tkIaduL-cL_97C/view?usp=drive_link"},
{"name":"순천대학교","region":"전남","url":"https://drive.google.com/file/d/1vI1oPVWyTH6bqR9oDTv9zBTBBI36Ws6Q/view?usp=drive_link"}];

// ── 데이터 통합 ──────────────────────────────────────────────────────────────
// PDF 맵 (간략명 → url) 생성 — 검색 매칭용 키 정규화
function normalize(s) {
  return s.replace(/\s|\(.*?\)|대학교$|대학$|대$/g, '').toLowerCase();
}

const pdfMap = new Map();
PDF_RAW.forEach(u => {
  pdfMap.set(normalize(u.name), { url: u.url, name: u.name, region: u.region });
  pdfMap.set(u.name, { url: u.url, name: u.name, region: u.region }); // 원본도 저장
});

// 홈 데이터를 통합 형태로 변환
const MERGED = []; // {name, region, type, homeUrl, pdfUrl}

Object.entries(HOME_RAW).forEach(([region, arr]) => {
  arr.forEach(([name, homeUrl, type]) => {
    const nk = normalize(name);
    const PDF_BLACKLIST = [];
    const pdfEntry = PDF_BLACKLIST.includes(name) ? null :
      pdfMap.get(name) || pdfMap.get(nk)
      || [...pdfMap.entries()].find(([k]) => k.includes(nk) || nk.includes(k))?.[1];
    MERGED.push({ name, region, type, homeUrl, pdfUrl: pdfEntry ? pdfEntry.url : null });
  });
});

// PDF는 있지만 홈 데이터가 없는 항목 추가
PDF_RAW.forEach(u => {
  const nk = normalize(u.name);
  const exists = MERGED.some(m => normalize(m.name) === nk || m.name === u.name
    || normalize(m.name).includes(nk) || nk.includes(normalize(m.name)));
  if (!exists) {
    MERGED.push({ name: u.name, region: u.region, type: null, homeUrl: null, pdfUrl: u.url });
  }
});

MERGED.sort((a, b) => a.name.localeCompare(b.name, 'ko'));

// 지역 목록
const REGION_ORDER = ['서울','경기','인천','강원','경남','경북','광주','대구','대전','부산','전남','전북','제주','충남','충북','울산'];
const allRegions = [...new Set(MERGED.map(u => u.region))];
const orderedRegions = REGION_ORDER.filter(r => allRegions.includes(r));

// ── 상태 ──────────────────────────────────────────────────────────────────
let selRegion = 'ALL', srch = '';

// ── 렌더링 ──────────────────────────────────────────────────────────────────


function renderRegionBtns() {
  document.getElementById('rbtns').innerHTML =
    [['ALL','전체'], ...orderedRegions.map(r => [r, r])].map(([v, l]) =>
      `<button class="rbtn${v === selRegion ? ' on' : ''}" onclick="setRegion('${v}')">${l}</button>`
    ).join('');
}

function getFiltered() {
  return MERGED.filter(u => {
    const regionOk = selRegion === 'ALL' || u.region === selRegion;
    const searchOk = !srch || u.name.includes(srch) || (u.region && u.region.includes(srch));
    return regionOk && searchOk;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('cnt').textContent = filtered.length;
  document.getElementById('ibar').innerHTML = `총 <span>${filtered.length}</span>개 대학`;

  if (!filtered.length) {
    document.getElementById('body').innerHTML = '<div class="empty"><div class="empty-ic">🔎</div>검색 결과가 없습니다.</div>';
    return;
  }

  // 지역별 그룹핑
  const grouped = {};
  filtered.forEach(u => {
    if (!grouped[u.region]) grouped[u.region] = [];
    grouped[u.region].push(u);
  });

  const regions = selRegion === 'ALL'
    ? REGION_ORDER.filter(r => grouped[r])
    : [selRegion].filter(r => grouped[r]);

  document.getElementById('body').innerHTML = regions.map(region => {
    const univs = grouped[region] || [];
    const cards = univs.map(u => {
      const homeBtn = u.homeUrl
        ? `<a class="link-btn btn-home" href="${u.homeUrl}" target="_blank" rel="noopener">🏫 입학처 홈</a>`
        : `<span class="link-btn btn-disabled">🏫 입학처 없음</span>`;

      const pdfBtn = u.pdfUrl
        ? `<a class="link-btn btn-pdf" href="${u.pdfUrl}" target="_blank" rel="noopener">📄 2028 시행계획</a>`
        : `<span class="link-btn btn-disabled">📄 2028 시행계획 없음</span>`;

      return `<div class="card">
        <div class="card-top">
          <div class="card-name">${u.name}</div>
        </div>
        <div class="card-btns">
          ${homeBtn}
          ${pdfBtn}
        </div>
      </div>`;
    }).join('');

    return `<div class="rsec">
      <div class="rsec-hd">
        <span class="rsec-name">${region}</span>
        <span class="rsec-cnt">${univs.length}개</span>
      </div>
      <div class="cards">${cards}</div>
    </div>`;
  }).join('');
}

// ── 이벤트 ──────────────────────────────────────────────────────────────────
function setRegion(r) { selRegion = r; renderRegionBtns(); render(); }


function clearSearch() {
  document.getElementById('srch').value = '';
  srch = '';
  document.getElementById('clr').classList.remove('on');
  render();
}

document.getElementById('srch').addEventListener('input', function() {
  srch = this.value.trim();
  document.getElementById('clr').classList.toggle('on', srch.length > 0);
  render();
});

window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// ── 초기화 ──────────────────────────────────────────────────────────────────
renderRegionBtns();
render();
</script>
</body>
</html>

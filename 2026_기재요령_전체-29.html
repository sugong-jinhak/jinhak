<td>제6·7호</td><td>졸업 후 4년<br>(심의로 동시 가능)</td><td>졸업 후 4년/2년</td><td>졸업 후 2년/동시</td></tr><tr><td>제8호(전학)</td><td>졸업 후 4년</td><td>졸업 후 2년<br>(심의로 동시 가능)</td><td>졸업과 동시(심의)</td></tr><tr><td>제9호(퇴학)</td><td>삭제 대상 아님</td><td>삭제 대상 아님</td><td>삭제 대상 아님</td></tr></tbody></table></div></div>__ENDTABLE__", "➍ 기타 가. 학교폭력 가해학생에 대한 학교장의 긴급조치에 대해 학교폭력대책심의위원회가 추인한 경우 심의위원회의 조치가 되므로 학교생활기록부에 조치사항을 입력한다. ※ 제17조제4항의 긴급조치(접촉, 협박 및 보복행위의 금지)는 심의위원회의 추인 사항이 아니므로 학교생활기록부에 조치사항을 입력하지 않음. ※ 긴급조치 범위: 제1호(서면사과), 제3호(학교에서의 봉사), 제5호(학내외 전문가, 교육감이 정한 기관에 의한 특별 교육이수 또는 심리치료), 제6호(출석정지), 제7호(학급교체) 나. 학업 중단 학생(휴학 등)의 학교폭력 조치사항의 경우 다음과 같이 입력한다. 학업 중단 시기 처리 절차 당해 학년도 ∙ 학적 반영 취소 후 학교폭력 조치사항 입력 이전 학년도 ∙ 학생부 정정절차를 통해 조치사항 입력"]}, {"id": "activity", "title": "창의적 체험활동상황", "emoji": "🎨", "page_range": "p.83~96", "items": ["11 창의적 체험활동상황", "제13조(창의적 체험활동상황)", "① 창의적 체험활동의 3개 영역(자율･자치활동, 동아리활동, 진로활동)별 활동내용, 평가방법 및 기준은 교육과정을 근거로 학교별로 정한다. 훈령 제433호(3학년 적용)", "① 창의적 체험활동의 4개 영역(자율활동, 동아리활동, 봉사활동, 진로활동)별 활동내용, 평가방법 및 기준은 교육과정을 근거로 학교별로 정한다.", "▪창의적 체험활동은 영역별로 학급담임교사와 창의적 체험활동 담당교사가 분담하여 평가하고, 활동 실적, 진보의 정도, 행동의 변화 등 학생의 개별적 특성을 종합하여 ‘특기사항’에 문장으로 입력한다.", "② 중학교의 ‘창의적 체험활동상황’에는 자율･자치활동, 동아리활동, 진로활동의 영역별 특기사항을 입력하고, 고등학교는 영역별 이수시간 및 특기사항을 입력한다. 훈령 제433호(3학년 적용)", "② 제1항의 자율활동, 동아리활동, 진로활동은 영역별 이수시간 및 특기사항(개별적 특성이 드러나는 사항 등)을 입력하고, 봉사활동은 실적을 입력한다.", "▪자율·자치(3학년은 자율)활동, 동아리활동, 진로활동의 이수시간은 영역별로 입력하고, 특기사항은 모든 학생에 대해 입력하되 영역별로 활동 내용이 우수한 사항(참여도, 활동 의욕, 진보의 정도, 태도 변화 등), 실제적인 역할 및 활동 등을 중심으로 개별적인 특성이 드러나게 입력한다. ※ 자퇴･퇴학･제적･휴학의 경우 학적반영일을 기준으로 자율･자치(3학년은 자율)활동, 동아리활동, 진로활동의 이수시간 및 특기사항을 입력함.", "▪창의적 체험활동의 실적은 학교교육과정 운영 계획상 편성된 영역에 해당 내용을 입력하고, 다른 영역에 중복하여 입력하지 않는다.", "③ (초등학교 관련 내용으로 생략)", "④ 창의적 체험활동상황의 ‘봉사활동실적’에는 당해 학년도에 실시한 학교교육계획에 따른 봉사활동과 학생 개인계획에 따른 봉사활동을 입력하되, 봉사활동의 일자 또는 기간, 장소 또는 주관기관명, 활동내용, 시간을 실시 일자 순으로 모두 입력한다. 훈령 제433호(3학년 적용)", "④ 제2항의 봉사활동 영역의 실적은 학교교육계획에 의한 봉사활동과 학생 개인계획에 따른 봉사활동의 구체적인 내용을 별도의 ‘봉사활동 실적’란에 해당 학년도에 실시한 봉사활동의 일자 또는 기간, 장소 또는 주관기관명, 활동내용, 시간을 실시일자 순으로 모두 입력한다.", "▪각급 학교에서는 시도교육청의 봉사활동 운영 계획을 참고하여 학교·지역사회 실정에 맞는 봉사활동 계획을 수립하여 시행한다. ※ 인정대상이 되는 봉사활동은 자원봉사활동의 무보수성, 자발성, 공익성, 비영리성, 비정파성, 비종파성의 기준을 충족하여야 함. 또한 1~2학년 봉사활동은 창의적 체험활동의 각 영역과 연계하여 운영할 수 있음(3학년은 ‘봉사활동 영역’으로 시행). ※ 학교는 단체 헌혈 봉사활동을 학교교육계획에 반영하여, 학생 헌혈의 활성화를 위해 노력(교육부 기초학력진로 교육과-4019(2023.11.3.), 보건복지부 혈액장기정책과-3309(2024.11.27.))", "⑤ 제4조제4항에 따라 창의적 체험활동상황을 누가기록 하는 경우, 교육정보시스템 서식 또는 자체 개발한 서식 등을 활용하되, 학생의 구체적 활동 내용이 포함된 자료를 바탕으로 작성하여 관리할 수 있다.", "⑥ 진로활동 영역의 특기사항에는 학생의 진로희망분야와 각종 진로검사 및 진로상담 결과, 관심 분야 및 진로희망과 관련된 학생의 활동 내용 등 학생의 진로 특성이 드러나는 사항을 입력한다. 훈령 제433호(3학년 적용)", "⑥ 제2항 및 제3항의 진로활동 영역의 특기사항에 진로희망분야와 각종 진로검사 및 진로상담 결과, 관심분야 및 진로희망과 관련된 학생의 활동내용 등 학생의 진로 특성이 드러나는 사항을 담임교사가 입력한다.", "⑦ (초등학교 관련 내용으로 생략)", "⑧ 「학교체육 진흥법」 제10조에 따른 학교스포츠클럽 활동 내용은 동아리활동 영역에 다음 각호의 사항을 입력한다. 이 경우 활동 내용은 학교장이 승인한 기간에 수행한 것으로 한정한다.", "⑨ 제8항에도 불구하고 정규교육과정에 포함되지 않은 학교스포츠클럽활동은 특기사항을 입력하지 않는다.", "▪정규교육과정 내 ‘학교스포츠클럽활동’은 고등학교에는 해당하지 않는다.", "▪정규교육과정 이외의 ‘학교스포츠클럽활동’의 실적은 학기 또는 학년도 단위로 그 활동에 대하여 학교장이 승인한 경우만 인정하고, 교육정보시스템에 누가기록 할 수 있다.", "⑪ 제2항 및 제3항에도 불구하고 동아리활동 중 정규교육과정에는 포함되어 있지 않으나 학교교육계획에 따라 구성한 청소년단체 활동은 초･중학교의 경우 단체명은 입력하되 특기사항은 입력하지 않으며, 고등학교의 경우 단체명 및 특기사항 모두 입력하지 않는다.", "⑫ 자율･자치활동 및 진로활동의 특기사항은 학급 담임교사가 입력하고, 동아리활동의 특기사항은 해당 동아리 담당 교사가 입력한다.", "▣ 창의적 체험활동상황", "➊ 창의적 체험활동상황 영역 ➋ 시간 ➌ 특기사항", "➍ 자율･자치활동 (3학년은 자율활동)", "➎ 동아리활동 (자율동아리) 희망분야 ※ 상급학교 미제공", "➐ 봉사활동 실적 일자 또는 기간 장소 또는 주관기관명 활동 내용 시간 누계시간", "➊ 창의적 체험활동상황 가. 학생의 영역별 활동에 대해 교사가 상시 관찰 및 평가한 내용을 바탕으로 구체적 활동 사실, 학생의 활동 태도, 노력에 의한 행동 변화와 성장 등을 기재한다. 나. 창의적 체험활동상황의 영역별 특기사항 입력을 위해 필요한 경우 누가기록을 활용할 수 있다. 기재 방법", "▸교육정보시스템을 활용하여 누가기록하는 경우 다음과 같이 기록함. - 자율･자치활동(3학년은 자율활동) 누가기록: 교육정보시스템의 [학생생활-창의적체험활동-자율･자치활동 (자율활동)관리]-{누가기록} - 동아리활동 누가기록: 교육정보시스템 [학생생활-창의적체험활동-동아리활동관리-동아리활동관리]-{누가기록} - 진로활동 누가기록: 교육정보시스템 [학생생활-창의적체험활동-진로활동관리]-{누가기록}(또는 [학생생활- 창의적체험활동-진로활동누가기록]) [봉사활동 실적입력] <1~2학년>", "① 학교교육계획에 따른 봉사활동(정규교육과정 내): 교육정보시스템의 [학생생활-창의적체험활동-자율․자치활동 (자율활동)관리/동아리활동관리/진로활동관리]에서 조회 후 기록", "② 학교교육계획에 따른 봉사활동(정규교육과정 이외), 학생 개인계획에 따른 봉사활동: 교육정보시스템의 [학생생활- 창의적체험활동-봉사활동실적관리]에서 조회 후 기록 <3학년> 교육정보시스템의 [학생생활-창의적체험활동-봉사활동실적관리]에서 조회 후 기록", "▸위탁기관에서 활동한 창의적 체험활동상황의 영역별 활동 내용은 [학적-위탁･현장실습학생관리-위탁･현장실습 학생관리-자료관리]의 {창의적체험활동}에서 입력함. 다. 창의적 체험활동상황의 영역별 체험활동 특기사항은 활동 장소가 국내이면서, 다음 하나에 해당하는 경우에 입력할 수 있다. 1) 학교교육계획에 따라 학교가 주최하고 주관한 체험활동 ※ 필요 입력 조건(모두 충족해야 함): ① 학교교육계획 ② 학교에서 주최와 주관 ③ 국내활동 2) 시도교육감이 승인한 ‘학교 밖 교육’ 기관에서 주최하고 주관한 체험활동 중 학교교육과정 운영 계획에 따른 체험활동 ※ 필요 입력 조건(모두 충족해야 함): ① 학교교육과정 운영 계획 ② 시도교육감이 승인한 학교 밖 교육기관에서 주최와 주관 ③ 국내활동 ※ ‘학교 밖 교육’ 기관의 ‘기관명’은 입력할 수 없으며, ‘학교 밖 교육 기관(기관 유형)’으로 통칭하여 입력함. <참고> 학교 밖 교육", "▪학교 밖 교육: ｢초‧중등학교 교육과정 총론｣에 따라 대학 등 지역사회기관에서 운영하는 정규교육과정이며, 학생은 ‘학교 밖 교육’을 통해 고등학교 과목 또는 창의적 체험활동을 이수할 수 있음(<「‘학교 밖 교육’ 운영 안내서」개정·보급 안내>, 교육부 학교교수학습혁신과-1279(2025.2.19.) 참조)", "▪학교 밖 교육 기관의 유형(교육청, 대학, 지역사회기관, 기업) - 교육청: 시도교육청 및 직속기관, 교육지원청 및 소속기관 포함 - 지역사회기관: 지방자치단체 운영 기관, 평생교육법에 따른 평생교육기관 등으로 공공성을 가진 기관에 한함 - 기업: 특성화고등학교, 산업수요 맞춤형 고등학교, 일반고 직업계열학과 운영교에 한하여 기재 가능 3) 타 고등학교에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동", "※ 필요 입력 조건(모두 충족해야 함): ① 학교장 승인 ② 타 고등학교에서 주최와 주관 ③ 국내활동 4) 교육관련기관에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동", "※ 필요 입력 조건(모두 충족해야 함): ① 학교장 승인 ② 교육관련기관에서 주최와 주관 ③ 국내활동", "※ 복수의 기관이 주최하고 주관하는 체험활동은 모든 기관이 교육관련기관 또는 고등학교이어야 하며 학교장이 승인한 체험활동만 기재 가능함. <참고> 교육관련기관", "▪ 교육관련기관은 교육부 및 소속기관, 시도교육청 및 직속기관, 교육지원청 및 소속기관에 한하며, 교육관련기관이 직접 운영하는 기구, 단체, 조직 등을 포함함. - 교육부 소속기관: 대한민국학술원, 국사편찬위원회, 국립국제교육원, 국립특수교육원, 교원소청심사위원회, 중앙교육연수원(총 6개 기관) - 시도교육청 및 직속기관, 교육지원청 및 소속기관 현황은 [참고자료 5] 참조", "※ 입력 가능 여부 예시", "<예시> 학교교육계획에 따라 학교가 주최하고 주관한 국내활동으로 장소가 교외인 체험활동에 참가한 경우 입력할 수 있음.", "<예시> 고등학교 학생이 중학교에서 주최하고 주관한 체험활동에 참가한 경우는 활동 내용과 특기사항을 입력할 수 없음.", "<예시> 학교 밖 교육기관 이외의 외부기관(시민단체 포함)이 주최하고 주관한 체험활동에 참가신청을 받아 학교장 승인 후 참가하는 경우 입력할 수 없음.", "<예시> 학생이 학교장의 승인을 받아 개별 또는 그룹단위로 대학 등에서 이수한 체험활동이나 특정 과정 이수실적을 학교생활기록부에 기재하도록 주최기관 등이 공문으로 요청하는 경우가 있으나 이는 학교생활기록부 어떠한 항목에도 입력할 수 없음.", "라. 학교에서 주최･주관한 행사(의식행사, 발표회, 체육행사, 현장체험학습 등)는 목적, 성격, 주체 등을 고려해 적절한 창의적 체험활동 영역에 포함하여 입력한다. ※ 행사활동의 시간은 자율․자치활동(3학년은 자율활동) 또는 진로활동 영역의 시수로 인정되며, 교육과정상의 계획된 시간과 별도 시수로 확보된 행사활동의 실시 시간을 포함함. 기재 방법", "▸별도 시수로 확보된 행사활동은 교육정보시스템의 [교육과정-학사일정관리-학사일정관리]의 {행사코드관리} 탭에서 행사코드 등록 시 ‘학생부특별활동’을 ‘자율･자치활동(3학년은 자율활동)’이나 ‘진로활동’으로 설정하고 [교육과정 -시간표관리-전체시간표관리]의 {행사처리}에서 등록하되, ‘처리구분’을 ‘현재수업 삭제 후 처리’로 설정함.", "▸행사활동 내용을 교육정보시스템에서 누가기록하는 경우 교육정보시스템의 [학생생활-창의적체험활동-자율․자치 활동(자율활동)관리]의 {누가기록} 탭, [학생생활-창의적체험활동-진로활동관리]의 {누가기록} 탭(또는 [학생생활 -창의적체험활동-진로활동누가기록])에서 등록하며, [교육과정-편제및과목개설관리-과목별/강의실별시수 누계조회]의 ‘과목’에 ‘자율․자치활동(3학년은 자율활동)(학사일정)’이나 ‘진로활동(학사일정)’으로 시수가 조회됨.", "마. 창의적 체험활동상황의 영역별 시수 인정과 특기사항에 입력할 수 있는 내용은 표와 같다. 영 역 시 수 특기사항에 입력할 수 있는 내용 ∙ 정규교육과정의 자율･자치활동(3학년은 자율활동) 자율･ ∙ 학교교육계획에 따라 학교가 주최하고 주관한 체험활동 자치활동 정규교육과정 시수 ∙ 시도교육감이 승인한 학교 밖 교육기관에서 주최하고 주관한 체험활동 중 학교 (3학년은 (행사활동은 별도 행사시수 포함) 교육과정 운영 계획에 따른 체험활동 자율활동) ∙ 타 고등학교에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동 ∙ 교육관련기관에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동 ∙ 정규교육과정의 동아리활동 ∙ 정규교육과정 이외 학교스포츠클럽활동 클럽명 ∙ 학교교육계획에 따른 정규교육과정 이외의 자율동아리활동(동아리명 및 필요 시 간단한 동아리 소개) 동아리 정규교육과정 시수 ∙ 학교교육계획에 따라 학교가 주최하고 주관한 체험활동 ∙ 시도교육감이 승인한 학교 밖 교육기관에서 주최하고 주관한 체험활동 중 학교 교육과정 운영 계획에 따른 체험활동 ∙ 타 고등학교에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동 ∙ 교육관련기관에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동 ∙ 정규교육과정의 진로활동 ∙ 진로희망분야 ∙ 진로지도와 관련된 상담 및 관찰･평가 내용 진로 정규교육과정 시수 ∙ 학교교육계획에 따라 학교가 주최하고 주관한 체험활동 활동 (행사활동은 별도 행사시수 포함) ∙ 시도교육감이 승인한 학교 밖 교육기관에서 주최하고 주관한 체험활동 중 학교 교육과정 운영 계획에 따른 체험활동 ∙ 타 고등학교에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동 ∙ 교육관련기관에서 주최하고 주관한 체험활동 중 학교장이 승인한 체험활동", "※ 정규교육과정에 따라 해외에서 실시한 자율․자치활동(3학년은 자율활동)은 시수만 인정하며, 그 이외의 해외에서 실시한 창의적 체험활동은 시수와 특기사항을 모두 입력하지 않음.", "※ 창의적 체험활동상황의 영역별 시수에는 ‘시도교육감이 승인한 학교 밖 교육기관에서 주최하고 주관한 체험활동 중학교교육과정 운영 계획에 따른 체험활동으로 학생이 이수한 시수’를 포함함(1~2학년). 바. 정규교육과정 이수과정에서 사교육 개입 없이 학교 내에서 학생 주도로 수행한 자율탐구활동*에 한하여 학생의 특기사항**만을 기재할 수 있다. * 자율탐구활동: 학생들이 자율적으로 주제 선정부터 보고서 작성까지 전 과정을 수행하는 일련의 활동 ** (예) 자료 수집 능력 및 분석 능력 탁월, 주제 선정 시 진로와 사회문제 연결 노력 등 ※ 다만, 창의적 체험활동상황에 자율탐구활동 학생활동 산출물(소논문 포함) 실적(제목, 연구 주제 및 참여인원, 소요시간)은 기재할 수 없으며, 정규교육과정 중에 이루어진 활동임을 증빙하기 위한 자료*를 보관해야 함. * (예) 학교교육계획서, 학교장의 승인을 받은 각종 문서, 학생 활동 산출물 등", "➋ 시간 가. 창의적 체험활동의 영역별 이수시간은 정규교육과정 내에서 실시한 학년･학급 단위의 활동시간을 기준으로, 본인이 실제로 참여하여 이수한 시간을 입력한다. ※ 어떠한 사유(경조사 또는 천재지변 등으로 인한 출석인정, 질병･미인정･기타결석, 조퇴 등을 구분하지 않음)로든 참여하지 않은 시간은 제외함. 단, 현장체험학습(수련활동 등) 기간 동안 미참여 학생을 대상으로 별도의 창의적 체험활동 계획을 수립하여 실시한 경우 해당 활동의 이수시간 및 특기사항을 입력할 수 있음. ※ 출석인정 결석으로 인하여 참여하지 않은 창의적 체험활동상황의 영역별 이수시간 확인은 교육정보시스템의 [학적-출결현황및통계-출결현황및통계-결석자및개인별출결현황]의 {개인별출결현황} 탭에서 기간 설정 후 ‘학생찾기’로 조회하여 해당 학생의 성명을 클릭해 확인할 수 있음. 나. 위의 ‘가’에도 불구하고 2026학년도 1·2학년 학생은 출석인정 결석(결과)으로 인해 활동에 참여하지 못한 경우에도 해당 활동의 이수시간을 인정하며 특기사항은 입력하지 않는다. <참고> 창의적 체험활동 이수 기준 창의적 체험활동은 학년도별 수업일수의 3분의 2이상 출석하면 학생의 재적교에서 해당 학년도에 정규교육과정으로 편성한 창의적 체험활동 학점을 모두 취득한 것으로 인정한다.", "➌ 특기사항 가. 창의적 체험활동상황의 특기사항은 활동 내용(활동실적, 진보의 정도, 행동의 변화 등)을 종합하여 학생의 개별적 특성이 드러나도록 입력한다. ※ 개별적 특성이 드러나지 않는 활동실적(내용)의 단순한 나열식 입력은 지양하며, 구체적인 특정 대학명, 기관명(기구, 단체, 조직 등 포함), 상호명, 강사명은 입력하지 않음(<학교생활기록부 작성 시 유의사항> 참고). 나. 특기사항에 정량적인 기록이 가능한 부분은 횟수와 시간 등을 정량적으로 입력할 수 있다.", "<예시> 학급회의(월 1회), 학교폭력예방활동(2026.03.04.-2026.07.08./5회), 양성평등교육(4시간)", "다. 창의적 체험활동 각 영역의 이수시간이 0시간인 학생에 대해서는 <예시>와 같이 그 사유를 특기사항에 입력한다.", "<예시> 순회교육대상학생의 경우: 순회교육으로 활동 내용이 없음. / 장기결석생인 경우: 장기결석으로 활동 내용이 없음. / 위탁학생의 경우: 위탁학생으로 활동 내용이 없음.", "※ 단, 순회교육, 위탁교육기관, 병원학교･원격수업기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력함.", "라. 2026학년도 1~2학년의 경우 창의적 체험활동 시간을 활용하여 실시한 진로연계교육*은 해당 활동의 특기사항을 입력할 수 있다. * 학생이 상급 학교나 학년으로 진학하기 전에 학교생활 적응과 교과 학습의 연계, 다양한 진로 탐색 활동을 통해 연속적인 학습과 성장이 이루어지도록 지원하는 교육(｢초･중등학교 교육과정 총론｣)", "마. 2026학년도 1~2학년의 경우 창의적 체험활동의 각 영역과 연계하여 운영한 봉사활동은 창의적 체험활동상황의 해당 영역 특기사항에 입력할 수 있다.", "바. 학교교육과정 상 편성하지 않은 영역의 특기사항은 입력하지 않는다. 단, 진로활동 영역은 편성하지 않은 경우에도 진로희망분야와 각종 진로검사 및 진로상담 결과, 관심 분야 등 학생의 진로 특성이 드러나는 사항을 학급담임교사가 입력한다.", "사. 창의적 체험활동상황의 영역별 특기사항에 입력할 수 없는 내용은 학교생활기록부 어떠한 항목에도 입력할 수 없다.", "➍ 자율․자치활동(3학년은 자율활동) 가. 자율･자치활동(3학년은 자율활동)의 특기사항은 활동결과에 대한 평가보다는 활동과정에서 드러나는 개별적인 행동 특성, 참여도, 협력도, 활동실적 등을 평가하고 상담기록 등의 관련 자료를 참고하여 실제적인 역할과 활동 위주로 입력한다. 나. 정규교육과정 또는 학교교육계획에 의해 실시한 주제 탐구 활동, 공동체 자치활동 등은 자율･자치활동 (3학년은 자율활동) 특기사항에 입력한다. 다. 자치활동 관련 내용을 특기사항에 입력할 때는 구체적인 임원의 종류를 알 수 있도록 ‘전교’, ‘학년’, ‘학급’ 등을 입력하고, 재임기간을 ( )안에 병기한다.", "<예시> 1학년: 1학기 전교 학생자치회 부회장(2026.03.01.-2026.08.18.) 3학년: 전교 학생자치회 회장(2026.03.01.-2027.02.03.) 재임 기간 기재 방법", "▸임원의 재임기간은 1･2학년은 3월 1일부터 학년말, 3학년은 3월 1일부터 졸업일까지로 입력함. - 학기 단위로 선출하는 경우에는 학기 시작일부터 학기 종료일까지, 월 단위 등으로 선출하는 경우에는 실제 활동기간을 입력하며, 임기 도중 그만두는 경우에는 실제 종료일까지를 재임기간으로 함.", "▸재임 기간이 2개 학년에 걸쳐 있을 경우에는 해당 학년의 자율･자치활동(3학년은 자율활동) 영역에 나누어 임원 재임기간을 입력함.", "▸임원 선거일 이전 전입한 학생이 임원으로 선출된 경우에 재임기간의 시작일은 전입일로 하며, 학기 중 임원의 학적변동 등으로 재선출하는 경우에는 신임 임원 재임기간의 시작일은 재선출일로 함. - 다만, 전입생 등 학적변동으로 인한 임원의 재임기간은 학교의 여건에 따라 달리 정할 수 있음.", "➎ 동아리활동 가. 동아리활동 영역은 자기 평가, 학생상호 평가, 교사 관찰 등의 방법으로 평가하여 참여도, 협력도, 열성도, 특별한 활동실적 등을 참고하여 실제적인 활동과 역할 위주로 입력한다. ※ 학생은 연간 1개 이상의 정규교육과정 내 동아리활동에 참여할 수 있음. ※ 정규교육과정 내 동아리는 학년(학기)초에 구성하여 학년(학기)말까지 활동하는 것을 원칙으로 함. 단, 부득이한 사유로 동아리를 변경한 경우, 학생이 활동한 내용을 동아리별로 모두 기록해야 함. 나. ‘동아리활동’에는 다음 3가지 항목을 예시와 같이 입력한다. 활 동 입력 예시 정규교육과정 내 동아리활동 (영어회화반)(34시간) 영어에 관심이 많고 ~ 학교교육계획에 따른 정규교육과정 이외의 자율동아리활동 (로봇반: 자율동아리) 학교교육계획에 따른 정규교육과정 이외의 학교스포츠클럽활동 (축구발리킥클럽: 방과후학교스포츠클럽) ※ 동아리활동 부서명과 이수시간, 동아리활동의 유형을 구분하는 ‘: 자율동아리’, ‘: 방과후학교스포츠클럽’은 자동으로 표기됨. ※ 교육정보시스템에서는 위 표에 나열된 동아리활동 순서대로 반영되고 동아리활동 부서별로 한 줄씩 띄어 자동으로 반영됨. ※ 하나의 동아리부서에 동아리 지도교사를 복수로 배정할 수 있음. 기재 방법", "▸동아리활동 영역의 특기사항은 교육정보시스템의 [학생생활-창의적체험활동-동아리활동관리-동아리활동관리]의 {학생부자료기록} 탭에서 입력하며, 방과후 학교스포츠클럽(정규교육과정 이외 학교스포츠클럽) 활동은 ‘클럽명’만 입력함.", "▸동아리활동의 유형을 구분하기 위해서는 교육정보시스템의 [학생생활-창의적체험활동-동아리활동관리- 부서만들기]의 ‘동아리활동 부서반 등록/수정/삭제’ 항목에서 ‘동아리부서구분’을 설정함.", "▸학생별 동아리활동의 실제 참여 이수시간을 산정하고자 할 때는 교육정보시스템의 [학생생활-창의적체험활동 -동아리활동관리-이수시간기준등록]에서 동아리활동 이수시간 기준등록을 해야함.", "▸위탁기관에서 활동한 위탁학생의 동아리활동은 교육정보시스템의 다음 메뉴에서 등록함. - [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-자료관리]-{창의적체험활동} 탭의 ‘동아리활동’ 항목", "다. 학교교육계획에 따른 학생의 자율동아리활동은 학년당 한 개만 입력한다. ※ 자율동아리명을 입력하되, 필요 시 동아리 소개를 30자 이내(동아리명과 공백 포함)로 입력할 수 있음.", "<예시> (위드유: 자율동아리) 소외 계층을 위한 봉사동아리", "※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 자율동아리 실적을 제공하지 않음([참고자료 9] 참조).", "라. 자율동아리는 학교교육계획에 따라 학기 초에 구성할 수 있으며, 학기 중에 구성된 자율동아리활동은 입력하지 않는다.", "마. 학교교육계획에 따른 자율동아리 구성 절차는 다음과 같다. 담당부서 학생 담당부서 담당부서 학생/지도교사 동아리 구성, 학교장 승인, 학교교육계획에 동아리활동 전개,  지도교사 섭외,  동아리 담당교사  교육정보시스템에  자율동아리 운영 학교생활기록부 동아리 운영 계획서 취합 및 결재 자율동아리 부서명 계획 수립 기재 작성 및 제출 등록 ※ 자율동아리 운영계획서는 활동계획, 동아리 구성 인원, 지도교사 등의 내용을 포함하여 학교장의 승인을 받음. ※ 자율동아리 입력대상 학생 범위는 학업성적관리위원회의 심의로 결정함. 기재 방법", "▸[학생생활-창의적체험활동-동아리활동관리-부서만들기]에서 부서명을 등록함(‘동아리활동 부서반 수정/ 삭제’ 항목에서 ‘동아리부서구분’을 자율동아리활동인 경우 ‘자율동아리’로 설정함).", "▸[학생생활-창의적체험활동-동아리활동관리-부서배정]에서 학생별로 부서를 배정함.", "▸[학생생활-창의적체험활동-동아리활동관리-동아리활동관리]의 {학생부자료기록} 탭에서 필요시 ‘특기사항’에 동아리 소개만 입력함.", "바. 정규교육과정 이외의 학교스포츠클럽명은 실질적인 활동 내용이 드러나는 클럽명으로 정하여 입력하되, 종목명이 드러나도록 병기하여 입력할 수 있다.", "<예시> 줄넘기반, 케이팝댄스반, 통키반(피구반), 덩크반(농구반)", "사. 정규교육과정 이외의 학교스포츠클럽에 가입하여 활동한 내용은 교육정보시스템의 [{체육}학교스포츠 클럽관리-학교스포츠클럽관리-학교스포츠클럽활동내역관리]에서 필요시 누가기록할 수 있고, ‘동아리 활동’에는 클럽명만 입력한다.", "<예시> 통키반(피구반): 방과후학교스포츠클럽", "아. 정규교육과정 이외의 ‘학교스포츠클럽활동’은 [학생생활-창의적체험활동-동아리활동관리(담임용)]에서 {스포츠클럽정보가져오기}를 통해 동아리활동 영역에 반영된다. 1) 정규교육과정 이외의 ‘학교스포츠클럽활동’은 연중 활동계획서, 대회출전 계획서 등에 대해 학교장의 사전 승인을 받아야 하며, 결과는 대회별, 월별 혹은 학기별 등 증빙자료와 함께 결과보고서를 제출한다. 2) 학생 1명이 2개 이상의 학교스포츠클럽에 가입할 수 있으나, 활동시간과 내용이 중복되어서는 안 된다. 3) 학교스포츠클럽 지도교사는 지도시간이 중복되지 않는 범위 내에서 2개 이상의 클럽 지도가 가능하며, 지도하는 클럽별로 학생의 활동상황을 관리한다. 4) 학교장은 정규교육과정 이외의 ‘학교스포츠클럽활동’ 실적이 상급학교 진학자료로 활용될 수 있으므로, ‘동아리활동’에 클럽명이 허위로 입력되는 일이 없도록 철저한 관리･감독을 하여야 한다. 5) 학교스포츠클럽 등록 시 학교 이외에서 조직된 스포츠클럽은 인정하지 않는다.", "➏ 진로활동 가. 학생의 진로희망(희망분야 또는 희망직업)은 ‘특기사항’ 내의 ‘희망분야’에 입력하며, 이와 관련된 내용은 상급학교 진학 시 전형자료로 제공하지 않는다. ※ 관심 분야나 희망 직업은 커리어넷(www.career.go.kr)의 직업정보를 참고함. ※ 기재 누락과 구분하기 위해 학생이 진로희망을 정하지 못한 경우에도 입력함.", "<예시> ‘진로탐색 중임.’, ‘현재 진로희망 없음.’ 등으로 입력할 수 있음.", "나. 진로활동 영역의 ‘특기사항’에는 다음과 같은 사항을 참고하여 학생의 실제적인 활동과 역할 위주로 입력한다. 1) 특기･진로희망과 관련된 학생의 자질, 학생이 수행한 노력과 활동 2) 학생의 특기･진로를 돕기 위해 학교와 학생이 수행한 활동과 결과 3) 학생･학부모와 진로상담을 한 결과 4) 학생의 활동 참여도, 활동 의욕, 태도의 변화 등 진로활동과 관련된 사항 5) 학급담임교사, 상담교사, 교과담당교사, 진로전담교사의 상담 및 관찰･평가 내용", "다. 학생의 학업진로, 직업진로에 대한 계획서, 진로와 관련된 각종 검사를 바탕으로 특기사항을 입력할 수 있다.", "라. 특성화고등학교, 산업수요 맞춤형 고등학교, 일반고등학교 직업계열 학과 학생이 직업기초능력 평가에 응시한 경우 개인별 결과서(인증서)의 응시 영역 참여 상황을 창의적 체험활동 진로활동 특기사항에 다음 예시와 같이 입력한다. ※ <예시(1~2학년)> 직업기초능력평가(의사소통 국어, 의사소통 영어, 수리활용, 문제해결, 직무적응 영역) 자가진단평가에 참여함.", "<예시(3학년)> 직업기초능력평가(의사소통 국어, 의사소통 영어, 수리활용, 문제해결, 직무적응 영역) 본평가에 참여함.", "➐ 봉사활동 실적 가. 봉사활동 실적에는 학교교육계획에 따라 실시한 봉사활동과 학생 개인계획에 따라 실시한 봉사활동의 구체적인 실적을 입력한다.", "▪ 2022 개정 교육과정에서 봉사활동은 창의적 체험활동의 모든 영역 내 활동과 연계·통합하여 운영할 수 있으므로, 2026학년도 1~2학년의 경우 봉사활동의 성격과 취지에 적합한 봉사활동 실적만 입력한다.", "<예시> (자율‧자치활동) 학급자치회 주관 생태‧환경 보호 캠페인 활동 - 학급자치활동을 3시간 운영(학급회의 2시간, 생태‧환경 보호 캠페인 활동 1시간)한 경우, 전체 시간(3시간) 중 실제 봉사활동을 실시한 시간(1시간)만 ‘봉사활동 실적’에 연계 입력함.", "※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 ‘학교’ 봉사활동 실적은 제공하나, ‘개인’ 봉사활동 실적은 제공하지 않음 ([참고자료 9] 참조). 1) 학생 개인계획에 따라 실시한 봉사활동은 학교장이 승인한 경우만 입력한다. 2) 봉사활동 실적의 ‘장소 또는 주관기관명’란의 ‘학교’ 또는 ‘개인’의 구분은 봉사활동계획 주체에 따라 입력하며, 구체적인 장소 또는 주관기관명을 입력한다. ※ 학교교육계획(정규교육과정 포함)에 따라 시행되는 봉사활동은 ‘장소 또는 주관기관명’에 ‘(학교)’로 입력함. ※ 위탁기관에서 실시한 봉사활동의 경우에는 ‘(학교)위탁기관명’으로 입력함. 단, 아동학대 및 학교폭력 피해학생과 학생미혼모의 경우 위탁기관명이 드러나지 않도록 ‘(학교)재적교명’으로 입력함. ※ 정규교육과정 내 동아리활동이 아닌 청소년단체활동에서 실시한 봉사활동은 ‘봉사활동 실적’에 ‘(개인)’으로 관련 사항을 입력함. 3) ‘활동 내용’에는 객관적인 봉사활동 내용 또는 제목을 간략하게 입력한다. 2026학년도 1~2학년의 경우 ‘활동 내용’의 ‘창의적 체험활동 영역명’은 학교교육계획에 따라 창의적 체험활동의 각 영역에서 봉사활동을 실시한 경우만 입력한다.", "<예시> (자율･자치활동) 학급자치회 주관 생태‧환경 보호 캠페인 활동", "※ ‘활동 내용’에는 학생의 특기사항을 드러낼 수 있는 정성적인 평가내용의 입력은 불가함. 다만, 학교교육계획에 따라 실시한 봉사활동은 교사가 직접 관찰·평가한 학생의 특기사항을 필요시 ‘행동특성 및 종합의견’에 기재 가능함. - 2026학년도 1~2학년의 경우 창의적 체험활동 영역과 연계한 봉사활동의 특기사항은 해당 영역에 기재할 수 있음. 기재 방법 <1~2학년>", "① 학교교육계획에 따른 봉사활동(정규교육과정 내): 교육정보시스템의 [학생생활-창의적체험활동-자율･ 자치활동(자율활동)관리/동아리활동관리/진로활동관리]에서 조회 후 기록 ※ 각 영역별 누가기록 시, ‘일괄등록’ 버튼을 클릭 후 ‘봉사활동실적입력’을 체크하면 자동 연동되어 누가 기록됨. ※ 창의적 체험활동의 각 영역과 연계하여 운영한 봉사활동의 실적은 교육정보시스템의 창의적 체험활동 각 영역 누가기록을 활용하여 입력함.", "② 학교교육계획에 따른 봉사활동(정규교육과정 이외), 학생 개인계획에 따른 봉사활동: 교육정보시스템의 [학생생활-창의적체험활동-봉사활동실적관리]에서 조회 후 기록 <3학년> 교육정보시스템의 [학생생활-창의적체험활동-봉사활동실적관리]에서 조회 후 기록", "나. 물품 및 현금의 단순 기부는 봉사활동 시간으로 환산하여 인정할 수 없으므로 학교생활기록부 어떠한 항목에도 입력하지 않는다.", "다. 다음은 봉사활동 실적으로 입력하지 않는다. 1) 미인정 결석 중 실시한 봉사활동 2) 「초･중등교육법 시행령」 제31조제1항에 따른 학생의 징계 3) 「학교폭력예방 및 대책에 관한 법률」 제17조제1항에 따른 학교폭력 관련 조치사항 등에 의한 학교에서의 봉사, 사회봉사, 출석정지 기간의 봉사활동 4) 「소년법」 제32조제1항제3호에 따른 사회봉사 5) 「교원의 지위 향상 및 교육활동 보호를 위한 특별법」 제25조제2항에 따른 교육활동 침해 학생에 대한 조치 등에 의한 학교에서의 봉사, 사회봉사, 출석정지 기간의 봉사활동", "라. 봉사활동은 시간 단위로 입력하되, 동일 기관에서 같은 내용으로 봉사활동을 지속적으로 한 경우에는 학기말 또는 학년말에 합산하여 시간 단위로 입력할 수 있다(합산하여 1시간이 안 되는 경우는 버림).", "마. 봉사활동 시간은 1일 8시간 이내로 인정한다. ※ 1일 8시간 이내로 인정하는 것이 원칙이며, 평일 수업시간이 7교시인 경우 1시간, 6교시인 경우 2시간, 4교시인 경우 4시간, 휴업일(토요일･공휴일･방학･재량휴업일)인 경우 8시간 이내로 인정함. ※ 교외체험학습 기간 등 학교장 출석인정 결석 기간의 봉사활동은 당일 수업시수와 봉사활동 시간을 합하여 8시간 이내로 함.", "<예시> 교외체험학습일에 봉사활동 8시간을 한 경우 당일 학교 수업이 7시간이면 봉사활동은 1시간만 인정함.", "※ 다만, 헌혈은 1일 최대 봉사활동 인정 가능 시간(8시간)의 제한을 받지 아니하고, 1회당 4시간으로 당해 학년도 3회의 범위 내에서 실적으로 인정함. 또한, 2026학년도 1~2학년 학생이 학교교육계획에 따라 창의적 체험활동과 연계하여 실시한 헌혈에 참가한 경우, 해당 창의적 체험활동 영역의 이수 시간과는 별개로 헌혈 1회당 4시간의 봉사활동 실적을 인정함.", "<예시> 자율･자치활동으로 ‘생명존중 캠페인’을 1시간 실시하고 이와 연계하여 희망하는 학생에 한해 학교교육계획에 따른 헌혈을 실시한 경우 ⇒ ①자율‧자치활동만 참여한 학생: 자율･자치활동 1시간 인정,", "②자율･자치활동과 헌혈에 모두 참여한 학생: 자율‧자치활동 1시간+헌혈 ‘봉사활동 실적’ 4시간 인정", "바. 2026학년도 3학년의 경우 봉사활동이 창의적 체험활동의 한 영역이므로 ‘봉사활동 영역’의 시간은 다른 창의적 체험활동 영역의 ‘이수시간’과 중복하여 인정할 수 없다. 1~2학년의 경우 정규교육과정 내 창의적 체험활동의 각 영역과 연계하여 실시한 봉사활동은 ‘봉사활동 실적’란에 표시되나, ‘봉사활동 실적’ 시간을 창의적 체험활동 영역별 ‘시수’와 중복으로 인정하는 것이 아님에 유의해야 한다. ※ 자율동아리 활동으로 봉사활동을 실시한 경우, 봉사활동 실적으로 인정하지 않음.", "사. 1365 자원봉사포털(나눔포털)(행정안전부)･VMS(보건복지부)･DOVOL(성평등가족부)과 교육정보시스템의 봉사실적 연계를 통해 학생 개인계획에 의한 봉사활동 실적을 입력한다. ※ 실적 연계 사이트는 1365 자원봉사포털(나눔포털), VMS, DOVOL을 통칭하며, 연계 사이트에서 발급한 전송자료에 ‘장소 또는 주관기관명’에 ‘○○도 □□시’로 표기되어 있는 경우 실제로 발급한 기관을 입력함.", "아. 실적 연계 사이트를 통한 봉사활동 실적 반영 시 다음 내용을 반드시 제외해야 하며, 학교생활기록부 기재요령의 유의사항을 준수해야 한다. 1) 시도교육청 학생 봉사활동 운영 계획에 적용되지 않는 봉사활동 실적 2) 봉사활동 실적으로 인정할 수 없는 사례와 영리기관에서 실시한 봉사활동 실적 3) 1일 8시간(수업시간과 봉사활동 시간 합산) 초과 시간 4) 허위 봉사활동 실적 자. 학생 개인계획에 의한 봉사활동 실적 입력은 실적 연계 사이트를 이용하지 않은 경우(기존 방식)와 실적 연계 사이트를 이용한 경우를 확인한 후, 다음 절차에 따라 처리한다. 1) 실적 연계 사이트를 이용하지 않은 경우 학생 학교 학생 학교 학교 봉사활동 계획에 계획서 제출  봉사활동   봉사활동  학교생활기록부 따른 실행 후 (담임, 담당교사의 계획 승인 확인서 평가 기재 확인서 제출 지도 및 상담 등) ※ 사전 봉사활동 계획서를 학교장이 승인(허가)한 경우에만 봉사활동 실적으로 입력할 수 있음. 2) 실적 연계 사이트를 이용하는 경우 학생 학생 학생 학교 학교 실적 연계 봉사활동 교육정보시스템에서 사이트에서  봉사활동  확인서  전송된 봉사활동  학교생활기록부 봉사활동 계획 승인 교육정보시스템 실적자료 기재 검색 후 신청 으로 전송 확인 후 승인 ※ 실적 연계 사이트를 활용(신청 → 실행 → 전송 → 반영을 통한 일련의 과정을 포함)하는 경우, 학생은 봉사활동 계획서 및 확인서를 제출할 필요가 없으나 사전에 담임교사, 담당교사와 상담을 통하여 인정 기관과 활동 내용을 확인함 ※ 실적 , "④ 고등학교의 ‘교과학습발달상황’에는 제1항에 의하여 시행한 평가에 따라 ‘교과’, ‘과목’, ‘학점’, ‘원점수/과목평균’, ‘성취도’, ‘성취도별 분포비율’, ‘석차등급’, ‘수강자수’를 산출하여 각 학기말에 입력한다. 다만, 다음의 교과(목)는 예외로 하여 각 호의 사항을 입력한다. 1. 보통 교과 사회ㆍ과학 교과(군)의 융합 선택 과목(‘여행지리’, ‘역사로 탐구하는 현대 세계’, ‘사회문제 탐구’, ‘금융과 경제생활’, ‘윤리문제 탐구’, ‘기후변화와 지속가능한 세계’, ‘과학의 역사와 문화’, ‘기후변화와 환경생태’, ‘융합과학 탐구’), 특수교육 전문 교과: ‘교과’, ‘과목’, ‘학점’, ‘원점수/과목평균’, ‘성취도’, ‘성취도별 분포비율’, ‘수강자수’ 2. 보통 교과 공통 과목의 ‘과학탐구실험’ 및 체육･예술 교과(군)의 과목(특수목적고등학교의 선택 과목은 해당하지 않음): ‘교과’, ‘과목’, ‘학점’, ‘성취도’ 3. 보통 교과 교양 교과(군)의 과목: ‘교과’, ‘과목’, ‘학점’, ‘이수여부’", "▪보통교과 및 전문교과는 ‘성취도(A-B-C-D-E)’와 ‘석차등급(1등급~5등급)’을 산출하는 것을 원칙으로 하되, 세부적인 사항은 다음을 참조한다. 성취도별 구 분 원점수 과목평균 성취도 석차등급 수강자수 비 고 분포비율 공통 과목 ○ ○ 5단계 ○ 5등급 ○ 과학탐구실험 - - 3단계 - - - ∙ 특수목적고등학교 고등학교 선택 과목 선택 과목 ○ ○ 5단계 ○ 5등급 ○ 보 ∙ 여행지리, 역사로 탐구하는현대세계, 사 사회(역사/도덕 통 회문제 탐구, 금융과 경제 생활, 윤리문 포함)･과학 교 ○ ○ 5단계 ○ ‘･’ ○ 제 탐구, 기후변화와지속 가능한 세계, 과 교과(군) 융합 과 학의 역사와 문화, 기후변화와 환경생태, 융합과학 탐구’만 해당함 체육･예술 ∙ 특수목적고등학교의 체육･예술 교과 - - 3단계 - - - 교과(군) (군) 선택 과목 제외 ∙ 교양 교과(군)의 P는 성취도가 아닌 ‘이 교양 교과(군) - - P - - - 수여부’ 란에 입력 전문교과 ○ ○ 5단계 ○ 5등급 ○ ∙ 일반학교에서 특수교육 대상 학생을 특수교육 전문교과 ○ ○ 5단계 ○ ‘･’ ○ 위해 특수교육 전문교과로 개설시에도 ‘석차등급’ 미산출 성취도별 구 분 원점수 과목평균 성취도 석차등급 수강자수 비 고 분포비율 ∙ 체육･예술 교과(군)의 과목(특수목적고 보통교과 및 전문교과 ‘･’ 등학교의 체육･예술 교과(군) 선택 과 중 수강자수 5명 ○ ○ 5단계 ○ 또는 ○ 목 제외), 공통과목의 ‘과학탐구실 이하인 과목 ‘5등급’ 험’, 교양 교과(군)의 과목 제외 ∙ 체육･예술 교과(군)의 과목(특수목적 공동교육과정 및 고등학교의 체육･예술 교과(군) 선택 과 ○ ○ 5단계 ○ ‘･’ ○ 온라인학교 개설 과목 목 제외), 공통과목의 ‘과학탐구실 험’, 교양 교과(군)의 과목 제외 학교 밖 교육 ‘･’ ‘･’ ‘･’ ‘･’ ‘･’ ‘･’ ∙ 학교 밖 교육으로 이수한 경우 ‘･’ 표기 ※ 다만, 보통 교과의 과학탐구 실험 및 체육‧예술 교과(군)의 과목(특수목적고등학교의 선택 과목은 해당하지 않음)은 ‘성취도(A-B-C)’만으로 성적을 산출하며, 교양 교과(군) ‘이수여부’에는 ‘P’를 입력함. ※ 보통 교과의 사회(역사/도덕 포함)･ 과학 교과(군)의 융합 선택 과목(‘여행지리, 역사로 탐구하는 현대 세계, 사회문제 탐구, 금융과 경제생활, 윤리문제 탐구, 기후변화와 지속가능한 세계, 과학의 역사와 문화, 기후변화와 환경생태, 융합과학 탐구’)과 특수교육 전문 교과는 석차등급을 산출하지 않고, 성취도를 5단계(A~E)로 산출함(세부적인 성적 산출 정보는 훈령 제15조 참조). ※ 전문교과 전공일반과목을 능력단위와 연계하여 운영하는 경우, 전공실무과목과 동일하게 능력단위로 산출함. ※ 일반고등학교(자율고등학교 포함) 경우에도 보통교과 내 특수목적고등학교 선택 과목 편성･운영 시 동일하게 ‘성취도 5단계(A-B-C-D-E)’, ‘석차등급(1~5등급)’을 병기하여 성적을 산출함.", "▪2028 대입제도 개편에 따라 대입전형자료 제공 시 학생 개인별 교과학습발달상황 성적 정보 ([참고자료 10] 「2028 대학입시제도 개편안」 주요 내용) 이외에 과목별 평가방식(정기시험/수행평가 반영 비율, 수행평가 영역명), 학기말 성취도별 분할점수가 추가로 제공됨(교육부 인재선발제도과-108 (2025. 01.13.))", "▪교육과정 편성･운영지침에 따라 국가수준 교육과정의 과목 편제를 변경하여 편성하는 경우에는 편성된 교과(군)의 평가방법 및 성적처리 유형을 준용한다.", "⑤ 중･고등학교의 ‘비고’에는 과목 개설 유형(공동교육과정, 온라인학교, 학교 밖 교육, 온라인 콘텐츠), 과목 이수 상황(미이수, 대체이수, 재이수), 학적변동으로 인한 이수과목 상이 등 교육과정 운영에 따른 특기사항을 간략하게 입력한다.", "▪‘공동교육과정’과 ‘온라인학교’에서 개설한 이수 과목의 ‘석차등급’에는 ‘･’을 입력하며, ‘비고’에는 각각 ‘공동교육과정’, ‘온라인학교’로 표시된다.", "▪‘학교 밖 교육’으로 이수한 과목의 ‘비고’에는 ‘학교 밖 교육’으로, ‘온라인 콘텐츠’로 이수한 과목의 ‘비고’에는 ‘온라인 콘텐츠’로 표시된다.", "▪학점이수 인정기준 적용에 따라 ‘미이수’, ‘대체이수’, ‘재이수’한 학생의 경우 해당 과목의 ‘비고’에는 자동으로 각각 ‘미이수’, ‘대체이수’, ‘재이수’로 표시된다. ※ ‘재이수’란 미이수한 과목을 공동교육과정, 온라인학교, 학교 밖 교육, 온라인 콘텐츠를 통해 다시 수강하여 이수한 경우를 말함.", "⑥ 중･고등학교의 ‘세부능력 및 특기사항’에는 과목별 성취기준에 따른 성취수준의 특성 및 학습활동 참여도 등을 문장으로 입력한다. 다만, 체육･예술 교과(군) 및 전문 교과의 전공 실무 과목은 다음 각 호의 사항을 입력한다. 1. 체육･예술 교과(군) : 성취수준의 특성, 실기능력, 교과적성, 학습활동 참여도 및 태도 등 2. 전문 교과의 전공 실무 과목 : 능력단위별 학습활동 참여도 및 태도 등 3. < 삭 제 > 4. < 삭 제 >", "⑦ 제6항에 따른 중학교의 ‘세부능력 및 특기사항’에는 특기할 만한 사항이 있는 과목 및 학생에 대하여 입력하고, 고등학교는 모든 학생에 대해 입력하는 것을 원칙으로 하되 세부사항은 교육부장관이 별도로 정한다.", "▪‘세부능력 및 특기사항’에는 교사가 교과학습 수업 및 평가 과정에서 수시･상시로 기록한 내용을 중심으로 교과의 전 영역을 고려하여 구체적, 종합적으로 기술한다. ※ ‘세부능력 및 특기사항’의 기술은 성취기준과 성취수준에 근거하여 학생 개인의 성취과정과 성취특성이 명료히 드러나도록 하되, 수업에서 이루어진 활동의 단순 나열이나 이미 성취기준에 명시된 지식의 단순 서술은 지양함.", "▪과목별 세부능력 및 특기사항의 기재는 입력 가능한 최대 글자 수([참고자료 8])를 초과하지 않는 범위 내에서 교사가 자율적으로 입력할 수 있다.", "⑧ 고등학교의 보통 교과 중 교양 교과는 과목명 및 학점을 입력하고, ‘이수여부’에는 ‘P’를 입력한다. 또한, 중학교에서도 고등학교 교양 교과(환경, 보건, 진로와 직업 등) 성격의 과목을 선택하여 이수한 경우 과목명 및 이수시간을 입력하고 ‘이수여부’에는 ‘P’를 입력한다.", "⑩ 제4항에 따라 석차등급을 산출하는 과목 중 수강자수가 5명 이하인 경우, ‘교과’, ‘과목’, ‘학점’, ‘원점수/과목평균’, ‘성취도’, ‘성취도별 분포비율’, ‘수강자수’를 입력하고, ‘석차등급’에는 ‘석차등급’이나 ‘ㆍ’을 입력한다. 다만, 동일 입학년도 교육과정 내에서 동일한 과목인 경우에는 ‘석차등급’란에 ‘석차등급’ 또는 ‘ㆍ’ 표기 중 한 가지 방법으로 동일하게 입력한다.", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 석차등급별 누적비율 — 1·2학년 5등급제</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>석차등급</th><th>석차누적비율</th></tr></thead><tbody><tr><td>1등급</td><td>~ 10% 이하</td></tr><tr><td>2등급</td><td>10% 초과 ~ 34% 이하</td></tr><tr><td>3등급</td><td>34% 초과 ~ 66% 이하</td></tr><tr><td>4등급</td><td>66% 초과 ~ 90% 이하</td></tr><tr><td>5등급</td><td>90% 초과 ~ 100% 이하</td></tr></tbody></table></div></div>__ENDTABLE__", "⑫~⑬ (중학교 관련 내용으로 생략)", "⑭ 교과학습발달상황의 ‘세부능력(성취수준) 및 특기사항’은 교과담당교사가 입력한다. 이 경우 고등학교 1학기 교과학습발달상황은 당해 학년도의 8월 31일까지 입력한다.", "⑮ 고등학교에서 공동교육과정 및 온라인학교 개설 과목으로 이수한 과목은 제4항에 따라 성적을 산출하되, ‘석차등급’란에는 ‘･’을 입력한다.", "▪공동교육과정 성적처리 방식은 다음과 같다.", "1. 거점학교에서는 공동교육과정의 해당 과목을 수강한 학생 모두(수강하였으나 이수하지 못한 학생수도 포함)를 ‘수강자 수’로 하여 성적을 산출한다(일반고등학교, 특수목적고등학교(산업수요 맞춤형 고등학교 포함), 특성화고등학교 등). 2. 본교(거점학교)와 타교 학생(공동교육과정)을 구분하여 운영하는 경우 동일 과목이라도 별도로 개설･운영하고, 별도로 성적을 산출한다. <공동교육과정 관련 과목 개설 및 성적 산출> 구분 과목(강좌) 개설 성적 산출 본교-타교학생 미구분 본교(거점학교) 학생 + 타교 학생 공동교육과정 관련 규정에 따라 운영 (공동교육과정 해당)  성적 산출 본교-타교학생 구분 본교(거점학교)학생 타교 학생 공동교육과정 관련 성적 규정은 타교 운영 (공동교육과정 아님) (공동교육과정 해당) 학생(공동교육과정)에 한해 적용 고등학교에서 학교 밖 교육으로 이수한 과목은 ‘교과’, ‘과목’, ‘학점’을 입력하고, 이외 항목은 모두 ‘･’을 입력한다.", "▪학교 밖 교육 성적처리 방식은 다음과 같다. - 학교 밖 교육기관에서 보내온 ‘교과’, ‘과목’, ‘학점’ 및 ‘과목별 세부능력 및 특기사항’을 입력하고, 이외 항목은 모두 ‘･’을 입력한다. 다만, ‘과목별 세부능력 및 특기사항’에는 객관적 교육내용(과목명, 이수학점, 객관적 학습내용)만을 입력한다. <학교 밖 교육의 과목별 세부능력 및 특기사항 입력 예시> 과목 세부능력 및 특기사항 *항공우주학 기초 탐구: 학교 밖 교육(대학)을 통해 2학점 이수함. 태양계의 행성, 별의 진화, 우주의 구조에 대한 기초 개념을 바탕으로 별자리와 망원경을 이용한 천체 관측 방법을 학습함. 또한 로켓이 뉴턴의 제3법칙에 따라 추진되는 원리, 고체와 액체 연료의 차이, 다단계 로켓의 작동 방식에 대한 학습을 바탕으로 위성이나 우주선을 궤도에 올리기 위한 로켓의 구조와 발사 과정에 대한 실제 적용 사례를 배움. 과목 세부능력 및 특기사항 3D 프린터용 제품 제작: 학교 밖 교육(지역사회기관)을 통해 2학점 이수함. 모둠 활동에서 슬라이싱 된 파일을 활용하여 가상 적층을 실시하고 슬라이싱 상태를 파악하는 과정을 학습함. 슬라이서 프로그램의 3D프린터 설정 기능을 활용하는 방법을 조사하고 기타 설정값을 활용하여 슬라이싱 된 파일과 기준값으로 G코드를 생성하는 방법을 배움. * 과목명 앞에 별표(*)가 붙는 과목은 고교-대학 연계 학점 인정 과목임. <삭제> (중학교 관련 내용으로 생략) 고등학교에서 국제적으로 공인된 교육과정으로 이수한 과목은 시도교육청의 학업성적관리 시행지침에 따라 성적을 입력한다. 고등학교에서 공동교육과정 또는 온라인학교를 통해 재이수한 과목은 ‘교과’, ‘과목’, ‘학점’, ‘성취도’를 입력하고, 이외 항목은 모두 ‘ㆍ’을 입력한다.", "▪공동교육과정 또는 온라인학교를 통해 재이수한 과목의 ‘비고’에는 ‘공동교육과정, 재이수’, ‘온라인학교, 재이수’로 표시된다. ㉑ 고등학교에서 온라인 콘텐츠로 이수한 과목은 ‘교과’, ‘과목’, ‘학점’을 입력하고 이외 항목은 모두 ‘ㆍ’을 입력한다.", "▪‘온라인 콘텐츠’를 활용하여 이수한 과목의 ‘비고’에는 ‘온라인 콘텐츠’로 표시되며, ‘온라인 콘텐츠’를 활용하여 재이수한 과목은 ‘온라인 콘텐츠, 재이수’로 표시된다.", "별표 9(교과학습발달상황 평가 및 관리)", "1. 평가의 목표 및 방침 가. 교과학습의 평가는 학생 개개인의 교육 목표 도달도를 확인하고 교수･학습의 질을 개선하는데 주안점을 두고, 성취기준에 근거하여 교수･학습과 평가활동이 일관성 있게 이루어지도록 한다. 또한, 교과(목)의 성격과 학습자의 특성을 고려하여 적합한 평가 방법을 활용하되, 학생이 다양하고 질 높은 평가 방법을 경험할 수 있도록 노력하여야 한다.", "▪학교는 교육과정의 성취기준에 기반한 평가 계획에 따라 교수･학습 과정에서 학생의 변화와 성장에 대한 자료를 다각도로 수집하여 적절한 피드백을 제공하는 과정중심 평가를 통해 교수･학습의 질을 제고한다.", "나. 시도교육청 및 학교는 교과학습의 평가 및 관리의 객관성･공정성･투명성･신뢰도를 제고하기 위하여 노력하여야 한다. 아울러 평가로 인한 학생의 부담이 과중되지 않도록 평가 유형별 시행 비율, 운영 시기 등을 적절하게 조정하여야 한다.", "▪학교는 교과(목)별 특성과 학생 평가 부담을 고려하여 교과 내, 교과 간 협의를 통해 평가 유형별 (정기시험, 수행평가, 서·논술형 평가) 적정 시행 비율, 횟수, 시기 등을 정한다.", "다. 시도교육감은 별표 9를 준거로 학교급별 학업성적관리 시행지침을 수립한다.", "라. 학교는 시도교육청의 학업성적관리 시행지침을 바탕으로 학업성적관리규정을 제정하고, 교과(학년)협의회와 학업성적관리위원회를 구성하여 운영한다.", "▪학업성적 평가 및 관리의 중요성을 감안하여 학업성적 평가 및 관리의 객관성･공정성･투명성･ 신뢰도를 제고하기 위해 시도교육청은 교육부 훈령을 바탕으로 학업성적관리 시행지침을 마련한다. 또한, 각급 학교에서는 해당 시도 학업성적관리 시행지침을 바탕으로 학업성적관리규정을 정하고, 교과(학년)협의회와 학업성적관리위원회를 구성하여 운영한다.", "▪교과협의회를 운영할 수 없는 학교는 학년협의회를 운영할 수 있다.", "마. 교과학습의 평가는 정기시험과 수행평가를 활용하여 실시한다. 다만, 학교별 학업성적관리규정에 따라 교과(목)의 특성상 수업활동과 연계한 수행평가만으로 평가할 수 있다.", "▪정기시험과 수행평가의 실시 비율, 서･논술형 문항 출제 비율 등 평가의 세부적인 사항은 시도교육청의 ‘학업성적관리 시행지침’에 따라 학교의 ‘학업성적관리규정’으로 정하여 실시한다. ※ 단, 학생의 발달 특성 및 과목의 성격 등을 고려하여 정기시험은 서･논술형 문항만으로도 평가할 수 있음.", "▪수행평가는 성취기준에 기반하여 수업시간 중에 실시한다. 바. 마항에도 불구하고, 감염병의 전국적 유행 등 국가 재난에 준하는 상황에서는 정기시험 또는 수행평가만으로 평가하거나 초등학교와 중학교는 교육부장관이 정하는 바에 따라 정기시험 및 수행평가를 실시하지 않을 수 있다. 2. 평가 운영의 유의사항 가. 교육과정 성취기준을 실제 평가의 상황에서 준거로 사용하기에 적합하도록 재구조화할 수 있다. 다만, 성취기준을 통합하거나 일부 내용을 압축하여 재구조화할 경우, 성취기준의 내용요소 일부가 임의로 삭제되지 않도록 유의해야 한다. 또한, 일부 내용요소를 추가해야 하는 경우에는 학생의 학습 및 평가 부담이 가중되지 않도록 학년(군), 학교급 및 교과(군)간의 연계성을 충분히 고려해야 한다.", "▪학생의 특성･학교 여건 등에 따라 교육과정 및 교과서 내용을 분석하여 교과협의회를 통해 성취기준을 재구조화할 수 있다.", "나. 「공교육 정상화 촉진 및 선행교육 규제에 관한 특별법」 제8조제3항에 따라 정기시험, 수행평가 등 학교 내 학교 시험 및 각종 교내대회에서 학생이 배운 학교교육과정의 범위와 수준을 벗어난 내용을 출제하여 평가하지 않도록 유의한다.", "다. 부정행위 예방 대책과 부정행위자(협조자 포함) 처리 절차 및 처리 기준을 학업성적관리규정으로 정하고, 학기 초에 학생 및 학부모에게 안내한다. 또한, 부정행위 적발 시 절차 및 규정에 따라 엄중히 처리한다.", "▪부정행위 예방대책은 ‘고사 중 소지 금지 물품, 부정행위 유형, 감독 및 고사실 배정 방법 등 구체적인 고사 시행 방법, 감독관 유의사항, 부정행위자 처리 및 지도대책 등’을 포함하여야 하며, 부정행위 발생 시 처리절차 및 관련자 성적관련 처리기준은 ‘학업성적관리규정’에 포함하고, 관련자 징계규정은 ‘학칙’에 포함하여야 한다. ※ 1형 당뇨병으로 고사 시 혈당관리가 필요한 학생의 경우, 혈당 측정 및 인슐린 주입을 위한 의료지원기기와 전자기기 반입을 교사 확인을 거쳐 허용하고, 필요시 시험 중 인슐린 주사 및 당류 섭취를 할 수 있도록 사전 안내(교육부 기초학력진로교육과-1476(2024.4.11.) 참조)", "라. 자녀가 재학하는 학교에 부모 교직원이 재직하는 경우, 자녀가 재학 중인 학년의 출제, 검토, 인쇄, 채점, 평가 관리 등 자녀와 관련한 ‘평가 관련 업무’를 담당하지 않도록 유의한다.", "▪시도교육청의 여건에 따라 부득이하게 자녀가 재학하는 학교에 부모가 교직원으로 재직하는 경우에는 평가 등 자녀와 관련된 업무에서 배제하도록 유의한다. 다만 부득이한 경우, 학교의 학업성적관리규정에 평가의 공정성 제고 방안을 마련해야 한다.", "3. (초등학교 관련 내용으로 생략)", "4. 중학교･고등학교 평가 방법 가. 평가 계획 수립 1) 교과학습의 평가 계획은 각 교과(목)의 교육과정 및 학교･교과의 특성을 감안하여 교과(학년)협의회에서 수립하고, 이를 학교 학업성적관리위원회의 심의를 거쳐 학교장이 최종 결정한다. 다만, 중학교 자유학기에는 학교의 여건을 고려하여 필요시 시도교육청의 학업성적관리 시행지침에 따라 해당 교과 담당 교사별로 평가 계획을 달리 정할 수 있다.", "▪학기(학년)초에 교과목별 성취기준에 따른 성취수준을 마련(교과교육과정에 포함 혹은 별도 관리)하여 이를 교수･학습에 활용하고, 이에 근거하여 평가 계획을 수립하여 실시한다. 2) 평가 계획에는 교과(학년)별 정기시험 및 수행평가의 평가 영역･요소･방법･횟수･반영비율･수행평가 세부기준(배점) 등과 성적처리방법 및 결과의 활용 등을 포함한다.", "▪교과학습의 평가(정기시험과 수행평가)를 위하여 학기(학년) 평가 계획을 학년별･교과목별로 수립하되, 다음의 내용이 포함되도록 한다. 1. 평가의 목적, 평가의 방향과 방침, 평가 유의사항 등 2. 평가(정기시험 및 수행평가)의 영역, 요소, 방법, 시기, 횟수, 반영비율 등 3. 교과목별 기준 성취율과 성취도 4. 과목별 학기 단위 성취수준 설정(공통과목 최소 성취수준 설정 포함) ※ 선택과목의 학기 단위 성취수준 진술 시, 성취도 E(C)의 성취율이 ‘60% 미만’임을 고려하여 진술해야 함(공통과목은 성취율 40%이상~60%미만으로 진술). 5. 수행평가의 세부기준(영역별 배점과 채점기준), 결시자와 학적변동자 처리 기준 등", "▪‘평가(정기시험 및 수행평가)의 영역’은 평가를 실시하고자 하는(평가에서 측정하고자 하는) 영역을 의미하며, ‘교육과정의 영역, 핵심 아이디어, 기능 등’을 활용하여 교과 및 학교의 특성에 따라 결정할 수 있다. 3) 확정된 평가 계획은 정보공시 등을 통해 학생 및 학부모에게 공개한다. 또한, 변경사항이 있는 경우에는 수정하여 평가 실시 전에 재공지한다.", "▪교과별･학년별 평가 계획은 학기 초에 학생 및 학부모에 공개하여야 하며, 평가 실시 전에 평가 방법 및 채점기준 등 평가 운영과 관련된 세부적인 사항을 학생에게 안내하여 학생들이 해당 평가의 평가 방법 및 평가 요소를 인지하도록 하여야 한다. 세부적인 채점기준을 모두 공개하기 어려운 경우, 채점기준에 포함된 평가 요소를 공개하도록 한다. 또한, 평가 계획이 변경되는 경우 학업성적관리위원회의 심의를 통해 변경사항을 확정하고, 평가 실시 전에 변경사항을 학생과 학부모에게 안내하여야 한다. ※ 학교는 정기시험 기출문제(정답 포함)를 공개하되, 공개범위와 방법(학교 홈페이지 탑재, 교내 특정 장소 비치, 출력물 제공 등)은 학업성적관리위원회를 통해 학교장이 정함. ※ 평가 요소는 교육과정 성취기준 도달의 증거로, 학생들이 보여주기를 기대하는 핵심 내용을 구체적으로 기술한 평가 내용을 말함. 4) (중학교 관련 내용으로 생략) 나. 평가 운영 1) 정기시험 문제는 타당도, 신뢰도를 제고할 수 있도록 출제하고, 평가의 영역, 내용 등을 포함한 문항정보표 등 출제 계획을 작성하여 활용하며, 동일 교과(목) 담당교사 간 공동 출제한다.", "▪정기시험의 신뢰도 제고를 위해 문항오류가 없도록 교과 내 검토를 강화하여야 한다.", "▪정기시험의 문항정보표에 내용영역, 성취기준이 표시되도록 한다. 2) 정기시험은 문항별 배점을 표시하여 가급적 100점 만점으로 출제한다. 또한, 다양한 성취수준을 판별할 수 있도록 문항의 난이도를 고려하여 출제하고 난이도에 따른 문항 배열에 유의한다.", "▪특별한 사유가 없는 한 정기시험의 만점은 100점으로 한다.", "▪모든 출제 원안에는 문항별 배점을 표시한다. 또한 석차등급을 산출함에 따라 평가의 변별력을 최대한 높이고, 동점자가 가능한 한 생기지 않도록 문항 수를 적절하게 출제하며, 문항당 배점 및 채점기준 세분화에 유의한다. 3) 정기시험 관련 보안규정과 시험지 유출 시 처리기준은 학업성적관리규정으로 정하고, 평가 문제는 출제･인쇄 및 평가의 전 과정에서 보안이 유지되도록 철저히 관리한다.", "▪정기시험의 보안 강화를 위해 학업성적관리규정에 다음의 사항을 포함하여야 한다. [평가단계별 보안 관리 강화] (예시) ∙ (출제 단계) 교직원 자녀 재학 시 평가 업무 배제, 평가 시행 전 보안 연수 실시 등 ∙ (인쇄 단계) 평가관리시설 출입 통제, 인쇄실 내 전자기기 소지 금지, 평가관리시설 출입자 확인 장치(CCTV, 동작 감지센서 등) 설치, 인쇄 시 평가 담당자 입회, 인쇄 담당자 평가지 수령 당일 인쇄(1일 초과분 평가원안 보안 책임자 보관) 등 ∙ (시행 단계) 고사 당일 평가지 반출, 평가 종료 후 답안지 매수 확인 등 ∙ (채점 단계) 답안지 인수 후 매수 확인, 채점기간 중 학생 통제 등 4) 모든 수행평가는 수업 중 실시하는 것을 원칙으로 하며, 수업시간 외 가정 등에서 이루어지는 ‘과제형 수행평가’는 실시하지 않는다.", "▪과제형 수행평가 금지는 사전 준비가 필요한 암기식 수행평가 등이 포함됨에 유의하여야 한다. ※ 과제형 수행평가는 학생이 수업 외 시간에 학교 밖에서 수행한 과제물의 내용을 측정 대상(채점 요소)으로 삼아 과제 이행 여부 및 수행 정도에 따라 점수를 부여하는 평가 방식임.", "<예시> 과학 수행평가 과제로 ‘이번 학기의 학습 내용 중 탐구하고 싶은 주제를 학생 스스로 선택하여 보고서의 형태로 작성･제출’하도록 하고, 학생이 수업 외 시간에 별도로 수행한 탐구보고서를 평가", "※ 암기식 수행평가는 생각하고 탐구하는 과정 없이 학습 내용을 단순히 기억하고 반복하여 재생산하는 능력만을 측정 대상(채점 요소)으로 삼아, 암기한 내용을 그대로 재현하는 정도에 따라 점수를 부여하는 평가 방식임.", "<예시> 학생에게 생물의 분류 체계를 교과서에 제시된 것과 동일하게 암기하도록 하고, 용어를 순서대로 정확하게 사용하는지 등 암기 내용의 재현 정도에 따라 평가", "▪복수의 학생이 공동으로 수행하는 모둠활동 등을 평가할 때에는 개별 학생에게 역할을 부여하고, 개인별 학습과제에 대한 수행과정과 결과를 평가해야 한다. 5) 수행평가에서 인공지능(AI) 도구를 활용하는 경우, 평가의 공정성 및 신뢰성이 훼손되지 않도록 주의하고, 평가 시행 전 학생 유의사항을 충분히 안내한다.", "▪인공지능(AI)은 맞춤형 피드백 제공 등을 위해 수업·평가에서 보조적으로 활용할 수 있으나, 평가의 공정성·신뢰성을 훼손하지 않도록 유의해야 한다.", "▪교사가 직접 학생의 활동을 관찰할 수 있는 평가를 통해 학생의 독자적 사고에 따른 결과물이 평가에 반영될 수 있도록 해야한다.", "▪실제 평가 상황에서 인공지능(AI) 활용이 금지되는 행위를 명확히 설정하고, 관련 유의사항을 학생·학부모에게 사전 안내해야 한다. 6) 수행평가의 점수는 점수화가 가능한 영역의 점수만 반영하되, 기본점수의 부여 여부, 부여 점수의 범위 등은 학업성적관리규정으로 정한다.", "▪수행평가는 학교 및 교과의 특성에 따라 다양한 방법을 구안하여 적용할 수 있다.", "▪수행평가 문항 출제는 수행평가 출제 계획표 등을 작성하여 활용한다.", "▪수행평가는 학생의 학습과제 수행과정과 결과를 평가한다.", "▪수행평가의 기본점수 부여 여부 및 부여범위 결정 시에는 평가의 목적 등을 고려하여 타당하게 이루어질 수 있도록 해야 한다. ※ 수행평가 영역별 기본점수의 범위는 시도교육청의 학업성적관리 시행지침을 따름.", "▪가급적 수행평가 배점과 반영비율을 조정하여 환산점수에서 소수 둘째 자리 이상의 소수가 발생하지 않도록 유의한다. 예) 수행평가 점수 30점 반영비율 20%이고, 학생이 28점을 받은 경우 환산점수는 18.6666…의 무한 소수가 발생하므로 사전에 수행평가 배점과 반영비율을 적절히 선정하여 무한 소수가 발생하지 않도록 유의함. 7) 정기시험 및 수행평가의 이의신청 절차는 학업성적관리규정으로 정하고, 이의신청이 있을 때에는 절차에 따라 면밀히 검토하여 처리하여야 한다. 또한, 평가문항의 이의신청에 따른 오류 검증을 위해 필요시 외부 전문가의 자문을 받을 수 있다.", "다. (중학교 관련 내용으로 삭제)", "라. 고등학교 학업성적 평가 결과 처리 1) 과목별 성적일람표는 매 학기말 과목 담당교사가 작성한다. 이때, 정기시험과 수행평가의 점수를 합산하여 산출하며, 교육정보시스템 활용을 원칙으로 한다. 2) 정기시험과 수행평가의 영역(고사)별 반영 비율에 따른 환산 점수 합계는 소수 셋째 자리에서 반올림하여 소수 둘째 자리까지 산출한다. 또한, 원점수는 환산 점수 합계를 소수 첫째 자리에서 반올림하여 정수로 산출하고, 과목평균은 원점수를 사용하여 계산하되 소수 둘째 자리에서 반올림하여 소수 첫째 자리까지 산출한다. 성취도별 분포비율은 소수 둘째 자리에서 반올림하여 소수 첫째 자리까지 산출한다.", "<예시> 고등학교 과목별 성적일람표 및 해석 [보통교과 및 전문교과] 2026학년도 제1학기 공통국어1 성적일람표 제1학년 (강의실명) 과목담당교사 ( )인 평가방법(반영비율) 정기시험(60%) 수행평가(40%) 명칭,영역 석차 석차 수강자 1회 2회 ○○○ ◇◇◇ □□□ △△△ 합계 원점수 성취도 (반영비율) 등급 (동석차수) 수 (30%) (30%) (10%) (10%) (10%) (10%) 반/번호, 성명 1/1 김길동 28.41 29.16 8.00 9.00 8.00 10.00 92.57 93 A 1 4(15) 232 1/2 나민주 23.94 21.39 7.00 8.00 7.00 7.00 74.33 74 C 3 123 232 1/3 수강자 최고점 30.00 30.00 10.00 10.00 10.00 10.00 100.00 수강자 최저점 9.95 10.00 5.00 6.00 7.00 5.00 42.95 수강자 평균 23.42 25.74 8.40 8.16 8.76 7.59 82.07 강의실 평균 21.24 24.43 8.50 7.52 8.91 7.35 77.95 과목 평균 82.1 성취도별 분포비율 A(20.2) B(35.3) C(21.5) D(15.9) E(7.1) [보통교과 사회･과학 융합 선택 과목] 2026학년도 제1학기 여행지리 성적일람표 제2학년 (강의실명) 과목담당교사 ( )인 평가방법(반영비율) 정기시험(60%) 수행평가(40%) 명칭,영역 (반영비율) 1회 2회 ○○○ ◇◇◇ □□□ △△△ 합계 원점수 성취도 수강자수 (30%) (30%) (10%) (10%) (10%) (10%) 반/번호, 성명 1/1 김길동 28.41 29.16 8.00 9.00 8.00 10.00 92.57 93 A 232 1/2 나민주 23.94 21.39 7.00 8.00 7.00 7.00 74.33 74 C 232 1/3 수강자 최고점 30.00 30.00 10.00 10.00 10.00 10.00 100.00 수강자 최저점 9.95 10.00 5.00 6.  학생은 없음). ※ [참고] 중간석차 = 1 + (19 - 1) / 2 = 10, 중간석차백분율 = 10 / 96 × 100 = 10.42% ‣ (예 2) 수강자수가 120명인 과목에서 1등 1명, 2등 동점자가 15명인 경우 수강자수가 120명인 경우 정상적으로 처리되면, 1등급 학생은 12명이나, 예시의 경우 2등인 학생 15명은 1등급 인원을 초과하므로 중간석차백분율을 적용하면 7.5%로 이 학생들은 1등급을 부여한다(1등 1명과 2등 15명에게 1등급을 부여하므로, 1등급 인원을 초과하게 됨). ※ [참고] 중간석차 = 2 + (15 - 1) / 2 = 9, 중간석차백분율 = 9 / 120 × 100 = 7.5% 2. 중간석차 적용은 동점자(동석차)가 등급경계에 있는 경우에 적용하며, 등급 범위 내에서 생기는 동점자(동석차)에게는 적용하지 않는다. 6) 석차는 매 학기별로 과목별 환산 점수 합계를 사용하여 산출하되, 과목별로 동점자가 발생할 경우에는 동점자 모두에게 해당 순위의 최상의 석차를 부여하고 ( )안에 동점자 수를 병기한다. 이때 수강자수는 다음 기준에 따라 산출한다. 가) 성적산출을 위한 수강자수는 매 학기말 성적산출 시점을 기준으로 해당 과목을 수강한 학생수(수강하였으나 이수하지 못한 학생수도 포함)로 한다. 다만, 필요하다고 인정되는 경우, 「초･중등교육법」 제48조 및 같은 법 시행령 제78조에 따라 교육감의 승인을 얻어 학과별로 학생을 선발한 학교는 교육과정 특성을 고려하여 시도교육청의 학업성적관리 시행지침에 따라 학교별 학업성적관리규정으로 학과별로 수강자수를 정할 수 있다. 산업수요 맞춤형 고등학교와 특성화고등학교(특정분야의 인재 양성을 목적으로 하는 교육을 실시하는 학교에 한함)는 필요하다고 인정되는 경우, 교육과정 특성을 고려하여 시도교육청 학업성적관리 시행지침에 따라 학교별 학업성적관리규정으로 수강자수를 정할 수 있다.", "▪수강자수 산정 방식은 다음과 같다. 1. 동일한 교과 교육과정(2022 개정 교육과정) 내에서 동일한 교과･과목이고 학점, 수강시기가 같은 경우에는 수강한 학생 모두를 수강자수로 하여 성적을 산출한다. - 다만, 교육과정 편제상으로 학습내용과 성취기준이 달라 평가를 달리할 수밖에 없는 경우에는 당해학교의 학업성적관리규정으로 정하여 달리할 수 있음. 2. ‘학과별로 수강자수를 결정할 수 있는 학교’는 「초･중등교육법」 제48조에 따른 학과를 설치하고, 같은 법 시행령 제78조에 의거한 시도교육청의 기본계획에 따라 교육감의 승인을 얻어 학과별로 학생을 선발한 학교를 의미한다. 나) <삭제> 다) 시도교육청에서 운영하는 공동실습소 또는 직업교육센터, 일반고등학교(자율고등학교 포함), 특수목적 고등학교(산업수요 맞춤형 고등학교 포함) 및 특성화고등학교 등에서 개설한 교과(과정)를 계열(학과)이 서로 다른 학교의 학생들이 함께 수강한 경우의 수강자수는 계열(학과)별로 구분하여 산출할 수 있다. 라) ‘모든 평가가 완료되어 당해 학교의 학업성적관리규정에 따라 성적을 처리할 수 있는 학생’은 현재의 학적 상태와 무관하게 수강자수에 포함하고, ‘재입학･전입학･편입학한 학생’ 중 원적교에서 성적을 취득해 온 학생’은 수강자수에서 제외한다.", "▪정기시험 및 수행평가의 반영비율에 따라 환산 점수 합계를 처리하는 ‘학기말 성적산출 기준일’은 교과(목)별 평가 계획 상 최종 시험일(기말고사, 2차 시험 등)이며, ‘명예졸업’ 학생은 퇴학, 자퇴, 제적, 휴학 학생에 준하여 성적을 처리한다. ※ 과목별 결시생의 인정점 부여는 당해 학교의 학업성적관리규정에 따라 산출하되, 인정점 부여 시 교육정보시스템의 기준고사/영역의 기준점수와 평균점수･평균점수비율에서 사용하는 평균은 당해 정기시험(중간고사, 기말고사, 1차 시험, 2차 시험 등)에 응시한 학생수를 기준으로 산출하기 때문에 응시학생의 학적변동으로 인하여 변경되지 아니함. ※ 교육정보시스템의 동점자처리규정에서 정기시험 배점순을 지정할 경우 결시생의 인정점은 점수만 존재하고 해당고사의 배점 정보는 존재하지 않으므로 배점 정보에 의해 해당 고사를 응시한 학생이 우선이 됨. 7) 채점 등 평가 결과를 전산처리할 경우, 교과 담당교사는 전산처리 결과의 이상 유무를 철저히 대조･ 확인해야 한다.", "▪과목별 결시생의 인정점 부여를 위해 교육정보시스템을 활용한 경우, 도출된 결과값이 학업성적관리 규정에서 정한 인정점 부여 방식과 일치하는지 등 이상 여부를 최종 확인･점검한다. 8) 개인 정보 보호를 위해 정기시험 및 수행평가 결과는 학생 본인만 확인하도록 하며, 타인에게 성적 정보가 노출되지 않도록 유의해야 한다.", "▪정기시험 및 수행평가의 결과(학기말 포함)를 학생 본인에게 확인할 때에는 ‘개인별 성적일람표’ 등을 활용하여 다른 학생에게 성적 정보가 노출되지 않도록 유의하며, 학생 본인의 확인이 어려운 경우 학부모 등 보호자에게 공개하여 확인한다. 9) 성적처리 및 학생 확인이 완료된 정기시험의 학생 답안지는 성적산출의 증빙자료로 5년간 보관한다.", "▪성적 산출의 증빙자료로 ‘성적처리가 끝난 정기시험 학생 답안지’와 함께 ‘문항정보표와 출제원안지’ 등은 「공공기록물 관리에 관한 법률 시행령」 및 「학교 공통업무 보존기간 준칙」에 따라 당해 학교에 5년간 보관한다. 10) 수행평가 결과물의 보관기간은 학업성적관리규정으로 정하며, 학생들의 확인･이의신청･성적처리가 완료된 후 보관한다.", "▪학기 초에 학업성적관리위원회의 심의를 통해 학생의 수행평가 결과물의 보관 기간을 결정하며, 학생들의 이의신청･접수･처리･확인 과정 등 적절한 조치가 완료된 후 보관한다. 11) 성적 산출의 증빙 자료로 활용되는 수행평가의 중요한 자료는 졸업 후 1년 이상 보관하며, 상급학교 진학 시 입학전형권자의 요청이 있을 경우 이를 전형자료로 제공할 수 있다.", "▪‘수행평가의 중요한 자료’라 함은 학생들의 이의신청･접수･처리･확인 과정 등 적절한 조치가 완료된 후 작성된 성적 기록 자료(수행평가 성적일람표 등) 등을 의미한다.", "▪상급학교 진학 시에 입학전형자료로 활용될 수 있는 자료 등은 학교장이 판단하여 보관 방법과 기간 등을 결정한다. 12) 고등학교의 과목 이수기준에 따라 공통과목은 최소 성취수준 보장지도를 실시하며, 운영의 세부사항은 교육부장관이 정하는 지침에 따른다. 5. 학업성적관리위원회의 설치 및 운영 가. 학업성적 평가 및 관리의 객관성･공정성･투명성･신뢰도를 높이고, 학교생활기록부의 전산처리 및 관리, 이에 따른 활동을 강화하기 위하여 「초･중등교육법 시행규칙」 제24조에 따른 학업성적관리위원회(이하 위원회라 한다)를 둔다.", "▪학교별 ‘학업성적관리위원회’는 의무적으로 설치･운영해야 하며, 학업성적관리의 중요성을 감안하여 그 활동을 강화해야 한다. 다만, 학교의 형편에 따라 명칭을 달리하거나 타 위원회와 통합 운영할 수 있다.", "나. 위원회의 위원장은 학교장으로 하며, 학업성적관리위원회의 업무를 총괄한다. 부위원장은 위원 중 학교장이 정한 사람으로 하며, 위원장을 보좌하고 위원장 유고 시 위원장을 대행한다.", "다. 위원의 수는 학교 규모에 따라 정하며, 교직원 중에서 교무분장 업무를 고려하여 학교장이 임명한다.", "▪위원회 구성에서 ‘교무분장’이라 함은 부서별 또는 교과별 업무분장을 의미한다.", "라. 학부모의 의견 수렴과 학업성적관리의 투명성 등을 확보하기 위하여 학교장은 약간 명의 학부모 위원을 위촉할 수 있다.", "▪평가의 공정성 확보를 위해 학부모 위원에게 사전 공개가 불가한 안건은 학부모 위원의 참여를 제한한다.", "마. 위원의 임기는 학년도를 기준으로 매년 3월부터 차년도 2월까지로 한다.", "바. 학업성적관리위원회는 다음의 사항을 심의한다. 1) 학교 학업성적관리규정 제･개정 2) 각 교과(학년)협의회에서 제출한 정기시험 및 수행평가의 영역･요소･방법･시기･횟수･반영비율 등과 성적처리 방법 및 결과의 활용 3) 창의적 체험활동상황의 평가 기준 및 방법 4) 학업성적 평가 및 관리의 객관성･공정성･투명성･신뢰도 제고 방안(평가의 기준･방법･결과의 공개, 홍보, 평가결과 후속조치(이의제기 등)) 5) 학교생활기록부의 기재방법 및 기재내용 등에 관한 사항", "▪학업성적관리위원회 심의내용 중 ‘학교생활기록부의 기재방법 및 기재내용 등에 관한 사항’의 예로 출결 특기사항 기재 관련 사항 등이 있다. 6) 학교생활기록부 정정을 위한 증빙자료의 객관성 여부 등을 포함한 정정에 관한 사항 7) 고등학교의 교과목별 기준성취율에 따른 분할점수 산출 방식 등에 관한 사항 8) 고등학교의 학점 이수 및 최소 성취수준 보장지도 등에 관한 사항 9) 특수교육 기본 교육과정의 일상생활 활동상황 평가 기준 및 방법에 관한 사항 10) 기타 학교 학업성적관리 관련 업무", "사. 위원회의 회의는 다음과 같이 운영한다. 1) 회의는 학기 초 및 심의사항이 발생했을 때 개의하며, 세부적인 개최 시기 등은 시도교육청의 학업성적관리 시행지침에 따라 학교장이 결정할 수 있다. 2) 위원회의 회의는 재적인원의 과반수 출석으로 개의한다. 3) 회의가 종료되면 회의 결과를 작성하고, 위원들의 확인을 받아 보관한다.", "6. 기타 가. 교과목별 정기시험 및 수행평가에 참여하지 못한 학생(결시생)의 성적처리는 결시 이전･이후의 성적 또는 기타 성적의 일정비율을 환산한 성적(인정점)을 부여하되, 인정 사유 및 인정점의 비율 등은 시도교육청의 학업성적관리 시행지침에 따라 당해 학교의 학업성적관리규정으로 정한다. 나. 모든 평가(학기말 성적산출 기준)가 완료되기 이전 전출, 휴학, 면제, 유예, 제적, 자퇴, 퇴학 학생이 그 이전에 취득한 성적이 있을 경우, 이 학생의 재취학･재입학(복학 포함)･전입학･편입학을 위하여 그 성적을 전산입력하거나 별도로 보관하여야 한다. 다. 재취학･재입학･전입학･편입학한 학생은 각 호에 따라 성적을 산출한다. 1) 재취학･재입학･전입학･편입학 일자 이전 원적교의 성적과 재취학･ 재입학･전입학･편입학 이후의 취득한 성적을 합산한다. 2) 재취학･재입학･전입학･편입학 이후 취득한 성적이 있고, 이에 상응하는 원적교 성적이 중복되는 경우에는 재취학･재입학･전입학･편입학 이후 취득한 성적을 인정한다.", "▪복학 및 재･전･편입학한 학생의 정기시험 성적 일부가 중복된 경우 복학 및 재･전･편입학 이후 취득한 성적으로 한다. 다만, 세부적인 사항은 다음을 참조한다. 1회고사 성적 2회고사 성적 구분 비고 원적교 재입학 등 원적교 재입학 등 기본 원칙 ○ × × ○ 원적교 1회고사+재입학 등 2회고사 동일 평가 성적 중복 ○ × ○ ○ 원적교 1회고사+재입학 등 2회고사 동일 평가 성적 미비 × × × ○ 재입학 등 2회고사에 따른 인정점+재입학 등 2회고사 시도교육청*에 따라 학교 학업성적관리규정 또는 학업성적 동일 평가 성적 미비 관리위원회에서 결정 × × × × (모든 평가) *응시기회가 모두 없었을 경우와 모두 결시한 경우에 대한 인정점 부여 기준 마련 ※ 수행평가의 경우, 복학 및 재･전･편입학한 학생의 성적처리 방안을 평가 계획에 포함하되, 교과협의회를 통해 원적교 성적을 유사한 영역 평가의 성적으로 인정 가능 3) 재취학･재입학･전입학･편입학 이후 성적 산출을 위한 원적교의 성적이 없는 경우에는 재취학･재입학･ 전입학･편입학 이후 취득한 평가의 성적을 반영한다. 다만, 결시 등의 사유로 인정점을 부여해야 하는 경우, 해당 학교의 학업성적관리규정에 따른다.", "▪학생이 정기시험 이후 전출･휴학･제적･자퇴･퇴학할 경우, 평가기간 동안 미인정 결시로 인한 인정점은 해당 정기시험을 기준으로 산출하여 입력한다.", "▪정기시험 인정점 부여를 위한 기준점수는 동일 학기 내 학생이 응시한 정기시험 성적을 기준으로 산출하되, 정기시험 성적이 없는 경우 시도교육청 학업성적관리 시행지침에 따른 학업성적관리 규정에 따라 산출한다. 4) 1)~3)호에서 제시되지 않은 예외적인 경우에 대해서는 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 정한다.", "▪재입학, 전입학, 편입학 등 학적변동자의 동일(유사) 과목 성적인정과 반영 방법은 학업성적관리 규정으로 정하되, 학업성적관리규정에 규정되어 있지 않은 경우 학업성적관리위원회에서 정한다. 5) 원적교에서는 전출학생의 전출시점까지 취득한 성적(정기시험 및 수행평가의 점수 및 상세한 기록 등)을 전산자료로 입력하여 전입교로 전송하되, 부득이한 사유로 입력하지 못한 경우 정리하여 비공개로 전입교로 송부하고 사본을 보관하여야 한다.", "▪학생이 전출할 때에는 본 훈령 제4조제5항 및 그 해설에 따라 전출일자까지 원적교에서 입력할 수 있는 자료는 모두 입력하여 전송하고, 부득이한 사유로 입력하지 못한 자료(성적, 월별 출결상황, 기타 입력사항 등)는 정리하여 전입교로 송부하여야 한다.", "라. 「초･중등교육법 시행령」 제19조제1항에 따른 ‘귀국학생 등’은 각 호에 따라 성적을 산출한다. 1) 국내 학교에 취학･재취학･재입학･편입학 이후 취득한 성적만으로 성적을 산출한다. 2) 재취학･재입학･편입학 이전 성적이 국내 학교에 있는 경우 이를 인정하고, 재취학･재입학･편입학 이후에 취득한 성적과 합산한다. 3) 재취학･재입학･편입학 이후 취득한 성적이 있고, 이에 상응하는 이전의 국내학교 성적이 중복되는 경우에는 재취학･재입학･편입학 이후 성적을 인정한다. 4) 1)~3)호에서 제시되지 않은 예외적인 경우에 대해서는 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 정한다.", "▪‘귀국학생 등’의 교과목 및 성적의 기록은 다음과 같이 처리한다. 1) 유학(미인정유학 포함) 후 귀국한 학생의 유학기간의 ‘교과학습발달상황’은 공란으로 둔다. ※ 해당 기간의 기록은 학년을 결정하는 참고자료로 정규교육과정을 이수한 기록이 아니므로 학교생활기록부에 입력하지 않음. 2) 다만, 한국학교에서 취득한 학업성적은 국내 해당 학년의 동일(유사) 과목 학업성적으로 반영하여 처리하되, 동일(유사) 과목 인정 및 결시에 따른 인정점 부여 등의 사항은 전입교 학업성적관리위원회의 결정에 따른다. ※ 한국학교의 성적 산출 방식이 국내학교와 다른 경우 개인별 세부능력 및 특기사항에 교과목 성적을 직접 입력함.", "마. 시도교육청에서는 학업성적관리 시행지침에 장애학생의 평가조정 규정을 마련하여 장애학생이 장애 유형과 정도를 고려한 적절한 평가를 받을 수 있도록 지원하고, 각급 학교에서는 시도교육청의 학업성적 관리 시행지침에 따라 학교별 학업성적관리규정에 장애학생의 평가조정 규정을 정하여 시행한다. 1) 장애학생의 장애 유형과 정도에 따라 필요시 별도의 평가장 설치･운영, 대독, 대필, 보조기기, 지원인력 등 적절한 평가조정을 지원한다. 가) 점자를 사용하는 시각장애학생을 위해 점자 평가자료를 제공하고, 필요시 음성 평가자료를 지원하며, 시험시간을 매 교시별 1.7배 연장한다. 또는 묵자(일반문자)를 사용하는 시각장애학생을 위해 확대독서기(개인지참 가능) 또는 확대/축소 평가자료(118%, 200%, 350%/A4 중 택1)를 제공하고, 시험시간을 매 교시별 1.5배 연장한다. 나) 지체장애학생 중 뇌병변 장애학생을 위해 시험시간을 매 교시별 1.5배 연장하고, 상지기능 장애로 평가 수행이 어려운 경우에는 대필을 지원한다. 다) 보청기나 인공와우를 착용한 학생을 포함하여 청각장애학생이 듣기평가에 참여하기 어려울 경우 지필평가로 대체한다. 2) 학생의 장애가 심하거나 그 밖의 사유로 추가적인 평가조정이 필요한 경우에는 학교 학업성적관리위원회 심의를 거쳐 평가시간 연장 등 필요한 지원 사항을 결정할 수 있다.", "바. 학교의 장이 교육상 필요에 따라 소속 학생을 대상으로 「초･중등교육법」 제24조제3항제1호의 원격수업을 실시한 경우, 각 호에 유의하여 평가를 시행하되, 구체적인 사항은 시도교육청의 학업성적관리 시행지침에 따라 학교장이 정한다. 1) 정기시험은 등교하여 실시하는 것을 원칙으로 한다. 2) 학생의 수행 과정 및 결과를 교사가 직접 관찰･확인한다.", "▪평가는 등교하여 실시하는 것을 원칙으로 하되, 등교하여 실시하는 것이 불가능하여 원격으로 실시할 경우 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 평가의 세부적인 사항을 정하여 실시한다. - 다만, 원격으로 평가를 실시할 경우 평가의 객관성･공정성･투명성･신뢰도를 확보할 수 있는 방안을 마련해야 한다.", "▪학교의 장은 원격수업을 실시할 경우 교과별(학년별) 협의회 등에서 원격수업 운영계획(평가 관련 내용 포함)을 마련하고, 원격수업운영위원회* 심의를 거쳐 운영한다. * 단위학교의 학교학업성적관리위원회, 학교교육과정위원회 등과 통합 운영 가능 ※‘초·중등학교 및 특수학교 원격수업 운영 기준 안내’(교육부 학교교수학습혁신과-744(2023.1.27.)) 참조", "사. 소속 학교 이외 기관‧장소에서 수강한 과목은 각 호에 따라 성적을 산출한다. 1) 위탁학생의 소속 학교는 위탁기관에서 보내온 성적을 입력하되, 구체적인 반영 비율 및 방법은 학업성적관리위원회 심의를 통해 결정한다. 2) 위탁교육기관이 평가를 시행하기 어려운 경우, 재적교에서 응시하는 것을 원칙으로 하되 구체적인 사항은 시도교육청의 학업성적관리 시행지침에 따른다. 3) 학교의 장은 소속 학생이 수업의 일부를 교육감이 지정한 교육기관에서 수강한 경우, 해당 학생의 성적을 위탁학생에 준하여 처리한다.", "▪위탁학생 성적처리 방식은 다음과 같다.", "1. 성적처리는 별표 9 및 시도교육청 학업성적관리 시행지침에 따른 위탁 교육기관의 학업성적관리규정에 따라 처리한다.", "2. 시도교육청 및 위탁 교육기관에서는 해당과목의 학점이수 인정기준을 적용시 학생의 출석률을 설정할 수 있으며, 학업성적관리위원회의 결정에 따라 해당 과목 관련 내용을 학교생활기록부에 반영한다.", "3. 위탁학생이 위탁교(기관)에서 성적을 취득한 경우, 위탁교(기관)의 성적을 인정하고, 재적교 성적산출에 포함하지 않는다. 이때, 위탁교(기관)에서 보내온 성적은 동일 (유사) 과목*으로 인정하여 입력한다. 다만, 성적(성취도, 원점수, 과목평균, 석차등급 등)이 산출되지 않은 과목은 ‘과목별 세부능력 및 특기사항’에 문장으로 이수 내용만을 입력한다. * 위탁교육기관에서 보내온 과목이 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-자료관리], ‘성적의 {과목추가}-과목찾기’에서 조회되지 않을 경우 ‘과목찾기의 과목명 목록’에서 유사한 과목으로 선택함.", "4. 위탁학생이 재적교 학기말 성적 처리 이전에 복교하는 경우, 재적교 성적산출에 포함하며, 자체 평가 실시 및 성적 처리가 불가한 위탁교(기관)에 위탁된 학생은 재적교 평가에 응시한다(미응시 시 처리 방법은 [참고자료 7] ‘위탁학생, 병원학교･원격수업 등 학교 이외의 장소에서의 수강학생 처리’ 참조).", "5. 병원학교･원격수업 등(건강장애 학생)의 경우 소속학교 학업성적관리규정에 따라 성적을 처리한다. 또한, 평가(수행평가, 정기시험)는 평가 당일 소속 학교에 출석함을 원칙으로 하며, 부득이한 경우 소속 학교 학업성적관리위원회의 결정에 따른다.", "▪소년보호기관 위탁 학생의 성적처리 방식은 다음과 같다.", "1. ｢보호소년 등의 처우에 관한 법률｣의 적용을 받아 관련 시설에서 위탁교육 형식으로 학적이 처리되는 학생의 경우는 별표 9의 ‘4조의 라목 6)의 라)’, ‘6조의 다목’의 재･전･편입학생과 같이 처리한다. 다만, 상급학교 입학전형을 위한 내신성적 산출방법은 입학전형권자가 정해야 한다.", "2. 소년보호기관 위탁 학생의 재적교 평가 응시 방법은 다음과 같다. ※ 법무부 소속 소년보호기관 중 수업일수는 인정하나 자체 평가 및 성적처리가 불가한 기관에 한함([참고자료 6] 소년보호기관 관련처리 참고). 가. 기관별 역할 구분 소년보호기관 재적교 1. 응시 희망자 조사 1. 소년보호기관과 평가 운영 방안 협의 2. 응시생 재적교 협조 공문 발송 평가 전 2. 소년보호기관 협조 공문 발송 3. 재적교와 평가 운영 방안 협의 3. 시험지 발송 4. 시험지 수령 <소년보호기관에서 응시> <재적교에서 응시> 1. 평가장 마련 1. 평가장 마련 평가 중 2. 감독관 배정 2. 감독관 배정 3. 평가 실시 후 답안지 수거 3. 평가 실시 후 답안지 수거 평가 후 시험지 수령과 동일한 방안으로 답안지 송부 답안지 수령 후 성적 처리", "나. 유의사항 1) 평가 준비: 소년보호기관이 주관하고 재적교가 협조하여 평가 운영 준비 2) 시험지 및 답안지 송부: 소년보호기관과 재적교가 협의하여 인편 또는 등기우편으로 송부 ※ 일반우편 및 택배 발송을 금지하고, 업무 담당자 외 대리수령 불가 ※ 답안지는 시험지 수령과 동일한 방법으로 송부하는 것을 원칙으로 하되, 부득이한 경우 인편으로 수령하였더라도 등기우편으로 송부 가능 3) 평가 감독관 배정: 평가장을 마련한 곳에서 감독관 배정 ※ 평가 장소와 관계없이 소년보호기관 담당자는 반드시 감독관으로 배석 4) 학생이 미응시 할 경우, 결시 처리 방식은 소속 학교 학업성적관리위원회의 결정에 따라 처리", "▪직업교육 위탁과정 학생 성적처리 방식은 다음과 같다.", "1. 직업교육 위탁과정은 아래 사항을 참고하여 입력한다.", "가. 일반고등학교 및 자율고등학교의 소속 학교에서 이수하는 보통교과 등의 수강자수는 소속 학교의 학생과 합해서 산출･입력한다. 다만, 학점이 일치하지 않을 경우 수강자수는 분리한다.", "나. 산업(정보)학교, 직업교육거점학교, 시도교육청이 인정하는 직업훈련기관 등 직업교육 위탁과정 담당 기관에서 평가한 이수 과목, 원점수, 과목평균, 성취도, 수강자수 등을 학생이 재적한 학교에 통보하면 이것을 그대로 입력해 줄 수 있다. ※ 위탁학생의 성적은 교육정보시스템 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-자료관리]의 ‘성적’ 항목에서 입력함.", "2. 시도교육청에서 운영하는 공동실습소 또는 직업교육센터 등, 일반고등학교(자율고등학교 포함), 특수목적고등학교(산업수요 맞춤형 고등학교 포함) 및 특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함) 등에서 직업교육 위탁과정으로 개설한 교과(과정)를 계열(학과)이 서로 다른 학교의 학생들이 함께 수강한 경우의 수강자수는 계열(학과)별로 구분하여 산출할 수 있다.", "가. 계열(학과)구분", "① 일반고등학교(자율고등학교 포함) : 계열", "② 특성화고등학교, 산업수요 맞춤형 고등학교, 일반고 직업계열 학과 운영교 : 학과", "③ 특수목적고등학교(산업수요 맞춤형 고등학교 제외) : 계열(과학, 국제, 체육), 학과(외국어, 예술)", "<예시> 일반고등학교 A(10명), B(10명), C(10명), 산업수요 맞춤형 고등학교 D학과(12명), E학과(8명) 총 50명이 직업과정을 운영하는 학교 등에서 ‘드론 운용’을 수강하였을 경우 수강자수는 일반고등학교는 30명, 산업수요 맞춤형 고등학교는 D학과 12명, E학과 8명으로 분리하여 산출할 수 있음.", "▪현장실습생 성적처리 방식은 다음과 같다.", "1. 특성화고등학교 및 산업수요 맞춤형 고등학교 현장실습생(산학일체형 도제학교의 도제식 현장교육훈련(OJT) 참여 학생 포함)에 대해서는 이수 여부, 실습기간을 해당 학교장 또는 시도교육감이 정하는 방법으로 아래 사항을 참고하여 입력한다.", "가. 현장실습을 제외한 교과 성적은 교과목별 성적처리방식에 따라 산출한다. 나. 현장실습 성적은 산업체에서 평가한 것과 학교에서 평가한 것을 합산하여 실습 참여 학생의 성적으로 인정할 수 있다. 다. 창의적 체험활동상황 등 비교과 영역의 입력은 현장실습(현장실습과 연계한 취업 등) 기간 중 별도의 계획을 수립하여 실시하는 경우 재적학교 및 현장실습 대상 기관의 자료를 근거로 학급담임교사가 작성한다. 라. 현장실습을 전문교과에 포함하여 운영할 경우, 당해 학교의 학업성적관리규정에 구체적인 평가 방법 등이 포함되도록 하고, 전문교과 성적처리방식과 동일하게 산출하여 입력하되, 교과학습발달상황의 ‘세부능력 및 특기사항’에 현장실습유형, 직무분야(17개 교과군 중에서 입력), 기간, 내용을 다음 예시와 같이 입력한다. 과목 세부능력 및 특기사항 과목 세부능력 및 특기사항 현장실습유형: 현장체험학습(산업체 견학) 현장실습유형: 도제교육(미용) 현장실습 직무분야: 기계 현장실습 직무분야: 미용･관광･레저 실습기간: 2026.○○.○○.-2026.○○.○○. 실습기간: 2026.○○.○○.-2026.○○.○○. 실습내용: 자동차 조립 과정 견학 실습내용: 헤어디자인 L3 과목 세부능력 및 특기사항 과목 세부능력 및 특기사항 현장실습유형: 산업체 현장실습 현장실습유형: 기타(연계교육형 현장실습) 현장실습 직무분야: 재료 현장실습 직무분야: 디자인･문화 콘텐츠 실습기간: 2026.○○.○○.-2026.○○.○○. 실습기간: 2026.○○.○○.-2026.○○.○○. 실습내용: 피복 아크 용접 실습내용: 웹페이지 제작 및 유지 마. 현장실습을 교과목에 포함하지 않고 창의적 체험활동 등으로 운영하는 경우 해당 활동의 평가, 기록 방법에 따르고, 정규 교육과정 이외의 프로그램으로 운영하는 경우에는 해당 학년 교과학습발달상황의 ‘개인별 세부능력 및 특기사항’에 서술형으로 입력한다. 2. 특수교육 대상자의 현장 실습생에 대해서는 이수 여부, 실습기간을 해당 학교장 또는 시･도교육감이 정하는 방법으로 입력하며, ‘1’의 가~마의 내용을 준용하여 입력할 수 있다. ※ 이때, ‘현장실습 직무분야’는 교육과정의 해당 교과(군) 중에서 입력함.", "▪ 「방송통신중학교 및 방송통신고등학교 설치 기준령」 제3조의2에 따라 학교 외 학습경험의 과목 이수 인정을 받은 방송통신고등학교 과목 이수 입력 방식은 다음과 같다.", "1. 「방송통신중학교 및 방송통신고등학교 설치 기준령」 제3조의2에 따라 과목 이수를 인정받은 학생은 ‘과목별 세부능력 및 특기사항’에(관련 과목이 개설되어 있지 않은 경우 ‘개인별 세부능력 및 특기사항’) 과목명, 이수학점을 문장으로 입력한다. 과목 세부능력 및 특기사항 생활과 과학: ‘학교 외 학습경험의 인정’을 통해 ○학점 이수함. 성취도별 석차 학기 ➊교과 과목 학점 원점수/과목평균 성취도 수강자수 비 고 분포비율 등급 이수학점 합계", "※ 성취도별 분포비율의 E비율 내에는 미이수자가 포함되어 있음. 과 목 ➋ 세부능력 및 특기사항 <체육･예술/과학탐구실험> 학기 ➊교과 과목 학점 성취도 비고 이수학점 합계 과 목 ➋ 세부능력 및 특기사항 <교양교과> 학기 ➊교과 과목 학점 이수여부 비고 이수학점 합계 과 목 ➋ 세부능력 및 특기사항", "➊ 교과 가. 과목별 성적일람표(학기말)의 합계점수는 100점으로 환산하여 작성한다. 나. 정기시험, 수행평가, 학기말 평가의 성적처리는 교육정보시스템을 이용하여 처리한다. 다. 학점이수 인정기준에 따른 교과학습발달상황은 다음과 같이 입력한다. 1) 공통과목 학업 성취율 40% 미만인 대상자가 최소 성취수준 보장지도를 이수한 경우 → 해당 과목을 이수 처리하고, 성취도란에 ‘E’(과학탐구 실험은 ‘C’)를 기재(보충학습 여부 미기재) 원점수/ 성취도별 석차 수강자 학기 교과 과목 학점 성취도 비고 과목 평균 분포비율 등급 수 A(11.2) B(24.3) 1 국어 공통국어1 4 39/70 E C(31.7) 5 60 D(24.3) E(8.5)", "※ 과목 출석률 2/3 미만이면서 학업 성취율 40% 미만인 대상자가 최소 성취수준 보장지도를 이수한 경우도 포함 2) 과목 출석률이 2/3 미만인 대상자가 추가학습을 이수한 경우 → 해당 과목을 이수 처리하고, 학생이 성취한 성취도 입력(추가학습 여부 미기재) 원점수/ 성취도별 석차 수강자 학기 교과 과목 학점 성취도 비고 과목 평균 분포비율 등급 수 A(11.2) B(24.3) 1 국어 문학 4 93/70 A C(31.7) 1 60 D(24.3) E(8.5) 3) 과목 이수기준 미도달 대상자(학업 성취율 40% 미만 또는 과목 출석률 2/3 미만)가 최소 성취수준 보장지도 또는 추가학습을 이수하지 않은 경우 → 해당 과목을 미이수 처리하고, 비고란에 ‘미이수’ 기재, 과목별 세부능력 특기사항은 미기재 원점수/ 성취도별 석차 학기 교과 과목 학점 성취도 수강자수 비고 과목 평균 분포비율 등급 1 국어 문학 ･ ･ ･ ･ ･ ･ 미이수 4) 공통수학1, 공통영어1을 수강하였으나 미이수한 학생이 기본수학1, 기본영어1을 대체이수한 경우 → 해당 과목을 대체이수 처리하고, 미이수한 해당 과목의 성적처리 결과는 나이스에서 자동 삭제 원점수/ 성취도별 석차 학기 교과 과목 학점 성취도 수강자수 비고 과목 평균 분포비율 등급 1 수학 공통수학1 ･ ･ ･ ･ ･ ･ 미이수 A(11.2) B(24.3) 2 수학 기본수학1 3 74/68 B C(31.7) 3 89 대체이수 D(24.3) E(8.5) 5) 미이수한 과목을 공동교육과정 또는 온라인학교를 통해 재이수한 경우 → 해당 과목을 재이수 처리하고, 미이수한 해당 과목의 성적처리 결과는 나이스에서 자동 삭제됨. 성취도란에는 해당 과목의 최하위 성취도(5단계인 경우 ‘E’, 3단계인 경우 ‘C’)를 기재함. 원점수/ 성취도별 석차 학기 교과 과목 학점 성취도 수강자수 비고 과목 평균 분포비율 등급 1 영어 영어Ⅰ · · · · · · 미이수 온라인학교, 2 영어 영어Ⅰ 4 · E · · · 재이수 6) 고등학교에서 온라인 콘텐츠를 통해 과목을 이수한 경우 → 해당 과목을 입력하고 비고란에 ‘온라인 콘텐츠’를 기재함. 단, 과목별 세부능력 및 특기사항은 미기재 원점수/ 성취도별 석차 학기 교과 과목 학점 성취도 수강자수 비고 과목 평균 분포비율 등급 온라인 · 국어 문학 4 · · · · · 콘텐츠", "➋ 세부능력 및 특기사항 가. ‘세부능력 및 특기사항’은 학생참여형 수업 및 수업과 연계된 수행평가 등에서 관찰한 내용을 바탕으로 입력하되 과목별 성취기준에 따른 성취수준의 특성 및 학습활동 참여도, 자기주도적 학습에 의한 변화와 성장 정도를 중심으로 기재한다. ※ 과목별 세부능력 및 특기사항은 교과담당교사가 교육정보시스템의 [성적-성적처리-과목별세부능력및특기사항]에서 학기별로 입력한다. ※ 단, 대입수시 전형자료 생성 시에는 3학년의 과목별 세부능력 및 특기사항 중 ‘3학년 1학기(조기졸업생은 2학년 1학기)’ 내용만 생성･제공되고, ‘2학기’ 선택 후 입력한 내용은 반영되지 않음에 유의해야 함. ※ 개인별 세부능력 및 특기사항은 학급담임교사가 교육정보시스템의 [성적-성적처리-개인별세부능력 및 특기사항]에서 아래 ‘마’항의 범위를 유의하여 입력함. 나. 과목별 세부능력 및 특기사항은 모든 교과(군)의 모든 학생을 대상으로 입력하는 것을 원칙으로 한다. 1) 교과수업에 참여하지 못한 학생의 경우 그 사유를 ‘세부능력 및 특기사항’에 입력한다.", "<예시> 순회교육대상학생의 경우: 순회교육으로 특이사항 없음. / 장기결석생인 경우: 장기결석으로 특이사항 없음./ 위탁학생의 경우: 위탁학생으로 특이사항 없음.", "※ 순회교육, 위탁교육기관, 병원학교･원격수업 기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력함. 2) 학생이 해당 과목의 수업 활동에 대부분 참여하지 않아 관찰 내용이 없는 등 부득이한 경우에는 학업성적관리위원회의 심의를 통해 ‘특이사항 없음.’으로 입력할 수 있다.", "다. 전문교과 전공일반과목(능력단위와 연계하여 운영하는 경우) 및 전공실무과목은 해당 학기에 이수한 모든 능력단위를 세부능력 및 특기사항에 입력한다. ※ (학기명) 과목명: 과목별 학습활동 참여도 및 태도, [능력단위: 능력단위명] 학습활동 참여도 및 태도 등", "<예시> 1학기 양식 조리에서 능력단위로 양식 조식조리, 양식 전채･샐러드 조리를 이수한 경우 과목 ➋ 세부능력 및 특기사항 (1학기) 양식 조리: 조리 실습을 흥미로워하며 위생과 안전을 기본으로 생각하며 실천함. [능력단위: 양식 조식조리] 달걀조리에 맞는 재료와 조리 도구를 준비할 수 있는 능력이 우수하고, 부재료를 사용하여 달걀요리 종류에 맞게 화력을 조절하여 모양이 흐트러지지 않도록 능숙하게 조리한 후 모양 있게 담아 완성함. [능력단위: 양식 전채･샐러드 조리] 전채 요리의 역할과 사용된 재료의 특성을 바르게 이해하고, 플레이팅의 중요성을 색과 모양, 여백과 관련지어 설명할 수 있으며, 완성된 요리를 알맞은 온도의 접시에 색과 모양, 여백을 살려 담아냄. 식재료의 특성을 이해하고 전처리하는 능력이 뛰어남.", "라. 학생건강체력평가(PAPS) 1등급을 체육 관련 교과의 ‘세부능력 및 특기사항’에 입력할 수 있다. 마. ‘개인별 세부능력 및 특기사항’에 입력하는 사항은 다음과 같다. 항 목 내 용 한국학교 한국학교의 성적 산출 방식이 국내학교와 다른 경우 학력인정 대안학교 학력인정 대안학교의 성적 산출 방식이 전입교와 다른 경우 영재교육 당해 학기에 관련 과목이 개설되어 있지 않은 경우 발명교육 당해 학기에 기술･가정, 과학 교과 모두 개설되지 않은 경우 방송통신고등학교의 학교 외 학습경험 당해 학기에 관련 과목이 개설되어 있지 않은 경우 인정에 따른 과목 이수 정규 교육과정 이외의 프로그램으로 당해 학기에 현장실습을 전문교과에 포함하지 않거나 창의적 체험활동으로 운영하는 현장실습 운영하지 않은 경우 바. 교과학습발달상황의 ‘세부능력 및 특기사항’에 다음의 항목은 입력할 수 없다. 1) <학교생활기록부 작성 시 유의사항>에서 기재를 금지하고 있는 사항 2) 교내·외 대회 참여 사실과 그 성적 및 수상실적 ※ 대회와 관련하여, 대회의 명칭을 단순행사로 변경하여 입력하는 행위 불가(‘세부능력 및 특기사항’을 포함하여 ‘수상경력’ 이외 학교생활기록부 어떠한 항목에도 변경 입력 불가) 3) K-MOOC, MOOC, KOCW 등 관련 사항 4) 방과후학교 활동 5) 연구보고서(소논문) 관련 사항 ※ 다만, 정규교육과정의 교과 성취기준에 따라 수업 중 연구보고서(소논문) 작성이 가능한 과목*은 특기할 만한 사항이 있는 과목 및 학생에 대하여 연구보고서(소논문) 실적(제목, 연구 주제 및 참여인원, 소요시간)을 제외하고 ‘세부능력 및 특기사항’을 기재할 수 있음. * 연구보고서(소논문) 작성 가능 과목: 수학과제 탐구, 사회문제 탐구, 융합과학 탐구, 과학과제 연구, 사회과제 연구, 윤리문제 탐구", "➌ 기타 가. 방송･정보통신매체를 활용한 수업(온라인수업)의 성적처리 및 입력 방식은 다음과 같다. 1) 교육감이 지정한 교육기관 등에서 「초･중등교육법 시행령」 제48조제4항에 따라 방송･정보통신매체를 이용한 수업을 전부 또는 일부 받은 학생의 경우 위탁학생에 준하여 성적을 처리한다.(구체적인 성적 산출 방식은「2026 학교생활기록부 기재요령 고등학교」 위탁학생 성적처리 방식 참고) 나. 영재교육 이수내용 입력 방식은 다음과 같다. 1) 「영재교육진흥법」에 따른 영재교육기관(영재학교, 영재학급, 영재교육원)에서 수료한 영재교육 관련 내용은 관련 교과의 [성적-성적처리-과목별세부능력및특기사항]에서 ‘영재･발명교육 기록사항’에만 입력한다(「영재교육진흥법 시행령」 제36조제1항･제2항). ※ 단, 당해 학기에 관련 과목이 개설되어 있지 않은 경우 [성적-성적처리-개인별세부능력및특기사항]의 ‘영재･ 발명교육 기록사항’에 입력하되, 체험활동 등 특기사항은 입력하지 않음. ※ 영재학급을 설치한 학교의 장 및 영재교육원의 장은 해당 영재교육기관에서 영재교육을 받은 학생에 대하여 학교생활기록부에 준하는 자료를 작성･관리하고 이를 매 학년말에 소속 학교의 장에게 송부하여야 함 (「영재교육 진흥법 시행령」 제36조제1항).", "[참고] 영재교육기관 ‣ 영재학교: 영재교육을 위하여 이 법에 따라 지정되거나 설립되는 고등학교과정 이하의 학교(「영재교육 진흥법」", "제2조제4호) ‣ 영재학급: 「초･중등교육법」에 따라 설립･운영되는 고등학교과정 이하의 각급 학교에 설치･운영하여 영재교육을 실시하는 학급(「영재교육 진흥법」 제2조제5호) ‣ 영재교육원: 영재교육을 실시하기 위하여 「고등교육법」 제2조에 따른 학교(대학･산업대학･교육대학･ 전문대학･ 방송대학･통신대학･방송통신대학･사이버대학･기술대학･각종학교) 및 이에 준하는 학교로서 다른 법률에 따라 설치된 학교 등에 설치･운영되는 부설기관(「영재교육 진흥법」 제2조제6호) 기재 방법", "▸영재교육기관(영재학교, 영재학급, 영재교육원) 이수내용을 입력할 경우에는 구체적인 기관 명칭은 입력하지 않음.", "<예시> 영재교육원에서 1학년 과정 정보 영역(120시간) 110시간을 이수함. / 영재학급에서 1학년 과정 정보 영역(120시간) 120시간을 이수함.", "▸[성적-성적처리-과목별세부능력및특기사항] 또는 [개인별세부능력및특기사항]의 ‘영재･발명교육 기록사항’에 입력하면 해당 내용이 대입전형자료에서 제외됨.", "▸입력된 글자 수는 ‘세부능력 및 특기사항’의 글자 수에 산입되지 않음. ※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 영재교육 실적은 제공하지 않음.", "다. 발명교육 수료내용 입력 방식은 다음과 같다. 1) 발명교육센터에서 운영하는 교육과정을 수료한 학생의 교육실적은 「발명교육의 활성화 및 지원에 관한 법률 시행령」 제10조제2항･제3항에 따라 관련 교과(기술･가정 또는 과학)의 [성적-성적처리-과목별 세부능력및 특기사항]에서 ‘영재･발명교육 기록사항’에만 입력한다. ※ 단, 당해 학기에 관련 과목이 개설되어 있지 않은 경우 [성적-성적처리-개인별세부능력및특기사항]의 ‘영재･ 발명교육 기록사항’에 입력하되, 체험활동 등 특기사항은 입력하지 않음. ※ 발명교육센터를 설치･운영하는 중앙행정기관 또는 지방자치단체는 해당 발명교육센터에서 운영하는 교육과정을 수료한 학생의 교육실적 자료를 매년 1월 31일을 기준으로 하여 매 학년도 말일까지 학생이 소속된 학교의 장에게 송부하여야 함(「발명교육의 활성화 및 지원에 관한 법률 시행령」 제10조제2항). ※ 교육 수료증이 발급되는 초급(기초)･중급･고급(심화) 또는 특별과정 등 발명교육센터에서 운영하는 교육과정 교육실적 자료를 입력하며(학교 자체 실시 과정 제외), 이 경우 구체적인 센터의 명칭을 입력하지 않음.", "<예시> 발명교육센터에서 실시한 ‘발명･특허 기초과정(20시간)’을 수료함. / 발명교육센터에서 실시한 ‘발명･특허 고급과정(20시간)’을 수료함. 기재 방법", "▸[성적-성적처리-과목별세부능력및특기사항] 또는 [개인별세부능력및특기사항]의 ‘영재･발명교육 기록사항’에 입력하면 해당 내용이 대입전형자료에서 제외됨.", "▸입력된 글자 수는 ‘세부능력 및 특기사항’의 글자 수에 산입되지 않음. ※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 발명교육 실적은 제공하지 않음.", "라. 학적변동자 성적처리 방식은 다음과 같다. 1) 학적변동으로 인해 이전의 훈령을 적용받는 학생의 성적은 복학 등의 시점 당시 훈령에 따른 교과학습발달상황 양식을 적용하여 이전 성적이 그대로 교육정보시스템으로 연동되고 ‘비고’에 해당 사유가 자동 명시된다. 다만, 학교는 기존 출력물을 함께 보관한다. 2) 훈령 제477호(2024.3.1.)의 적용을 받았던 학생이 복학 등의 사유로 이후 훈령의 적용을 받는 경우, 이전 훈령에 적용받은 성적은 이후 훈령에 따른 교과학습발달상황 양식으로 이전 학기의 성적이 그대로 연동되고, ‘비고’에 그 ‘사유’가 자동 명시된다. 다만, 학교는 기존 출력물을 함께 보관한다.", "<예시> 2024학년도 신입생이 1학기 종료 후 휴학하였다가 2026학년도 2학기에 복학한 경우 (1) 1학기에 이수한 ‘진로선택과목’, ‘체육‧예술’, ‘교양교과’를 제외한 과목은 ‘훈령 제530호(2025.7.13.)에 따른 교과학습발달상황 양식으로 이전에 산출된 성적산출 정보만 그대로 연동되고 ‘비고’에 ‘사유(복학 등)’가 자동 명시됨. (2) 1학기에 이수한 ‘진로선택과목’은 이전 양식에 <진로선택과목>부분이 아니라, 훈령 제530호(2025.7.13.)에 따른 교과학습발달상황 양식으로 이전에 산출된 성적산출 정보만 그대로 연동되고 ‘비고’에 ‘사유(복학 등)’가 자동 명시됨. (3) 1학기에 이수한 ‘과학탐구실험’과 ‘진로 선택 과목 중 체육‧예술’은 이전 양식이 아니라, 훈령 제530호 (2025.7.13.)에 따른 교과학습발달상황 양식 중 <체육‧예술/과학탐구실험>부분으로 이전에 산출된 성적산출 정보 중 그대로 연동하되, 대응이 되지 않는 성적산출 정보는 삭제하고 ‘비고’에 ‘사유(복학 등)’가 자동 명시됨. (4) 1학기에 이수한 ‘교양교과’는 이전 ‘성취도(수강자수)’와 ‘석차등급’란에 각각 ‘P’가 입력된 양식이 아니라, 훈령 제530호(2025.7.13.)에 따른 교과학습발달상황 만, 보통교과의 체육.예술 교과(군)의 일반선택 과목은 ‘성취도(A-B-C)’만으로 성적을 산출하며, 교양교과(군)는 ‘성취도’와 ‘석차등급’에는 ‘P’를 각각 입력함. ※ 보통교과 공통과목 ‘과학탐구실험’ 및 ‘진로 선택 과목’의 석차등급은 산출하지 않고, 성취도를 3단계(A~C)로 산출함(세부적인 성적 산출 정보는 훈령 제15조 참조).", "▪전문교과Ⅱ, Ⅲ은 성취도를 5단계(A-B-C-D-E)로 평정하며, ‘석차등급’은 산출하지 않는다. ※ 다만, 전문교과Ⅱ 기초과목은 실무과목과 동일하게 능력단위로 산출할 수 있으며, 능력단위 평가 시 이수시간, 원점수, 성취도만 산출함.", "▪전문교과Ⅰ체육계열·예술계열 교과(군)의 과목은 ‘5단계·9등급’으로 성적처리 하고, 보통교과 체육·예술 교과(군)의 진로 선택 과목(진로 선택으로 편성된 전문교과 포함)은 ‘성취도 3단계·성취도별 분포비율’로 성적처리 한다.", "▪교육과정 편성·운영지침에 따라 국가수준 교육과정의 과목 편제를 변경하여 편성하는 경우에는 편성된 교과(군)의 평가방법 및 성적처리 유형을 준용한다.", "⑤ 중･고등학교의 ‘비고’란에는 공동교육과정 및 학교 밖 교육 이수, 학적변동으로 인한 이수과목 상이 등 교육과정 운영에 따른 특기사항에 관한 내용을 간략하게 입력한다.", "▪‘공동교육과정’으로 이수한 과목의 ‘석차등급’은 공란으로 두며, ‘비고’에는 ‘공동’으로 표시된다.", "▪‘학교 밖 교육’으로 이수한 과목의 ‘비고’에는 ‘학교 밖 교육’이 표시된다.", "⑥ 중･고등학교의 ‘세부능력 및 특기사항’란에는 과목별 성취기준에 따른 성취수준의 특성 및 학습활동 참여도 등을 문장으로 입력한다. 다만, 체육･예술 교과(군) 및 전문교과Ⅱ의 실무과목은 다음 각 호의 사항을 입력한다. 1. 체육･예술 교과(군): 성취수준의 특성, 실기능력, 교과적성, 학습활동 참여도 및 태도 등 2. 전문 교과Ⅱ의 실무과목: 능력단위 기반의 과목별 학습활동 참여도 및 태도 등 3. < 삭 제 > 4. < 삭 제 >", "⑦ 제6항에 따른 중학교의 ‘세부능력 및 특기사항’에는 특기할 만한 사항이 있는 과목 및 학생에 대하여 입력하고, 고등학교는 모든 학생에 대해 입력하는 것을 원칙으로 하되 세부사항은 교육부 장관이 별도로 정한다.", "▪‘세부능력 및 특기사항’에는 교사가 교과학습 수업 및 평가 과정에서 수시·상시로 기록한 내용을 중심으로 교과의 전 영역을 고려하여 구체적, 종합적으로 기술한다. ※ ‘세부능력 및 특기사항’의 기술은 성취기준과 성취수준에 근거하여 학생 개인의 성취과정과 성취수준의 특성이 명료히 드러나도록 하되, 수업에서 이루어진 활동의 단순 나열이나 이미 성취기준에 명시된 지식의 단순 서술은 지양함.", "▪과목별 세부능력 및 특기사항의 기재는 입력 가능한 최대 글자 수([참고자료 8])를 초과하지 않는 범위 내에서 교사가 자율적으로 입력할 수 있다.", "⑧ 고등학교의 보통 교과 중 교양 교과는 과목명 및 이수단위를 입력하고 ‘성취도(수강자수)’란과 ‘석차등급’ 란에는 ‘P’를 각각 입력한다. 다만, 교양 교과를 진로 선택 과목으로 편성 시에는 과목명 및 이수단위를 입력하고 ‘성취도(수강자수)’란과 ‘성취도별 분포비율’란에는 ‘P’를 각각 입력한다. 또한, 중학교에서도 고등학교 교양교과(환경, 보건, 진로와 직업 등) 성격의 과목을 선택하여 이수한 경우 과목명 및 이수시간을 입력하고 이수여부에 ‘P’를 입력한다.", "⑩ 전문 교과Ⅰ 및 보통 교과[공통 과목 과학탐구실험, 진로 선택 과목(진로 선택으로 편성된 전문 교과 포함), 체육･예술 교과(군)의 일반 선택 과목, 교양 교과(군)의 과목 제외]는 과목 수강자수가 13명 이하인 경우 ‘교과’, ‘과목’, ‘단위수’, ‘원점수/과목평균(표준편차)’, ‘성취도(수강자수)’를 입력하고, ‘석차등급’란에는 ‘석차등급’ 이나 ‘･’을 입력한다. 다만, 수강자 수가 13명 이하인 과목이 2과목 이상인 경우에 ‘석차등급’란에 ‘석차등급’ 또는 ‘･’ 표기 중 한 가지 방법으로 동일하게 입력한다.", "⑫ (중학교 관련 내용으로 생략)", "⑬ (중학교 관련 내용으로 생략)", "⑭ 교과학습발달상황의 ‘세부능력(성취수준) 및 특기사항’은 교과담당교사가 입력한다.", "⑮ 고등학교에서 공동교육과정으로 이수한 과목[진로 선택 과목(진로 선택으로 편성된 전문 교과 포함), 체육･예술 교과(군)의 일반 선택 과목, 교양 교과(군)의 과목 제외]은 ‘교과’, ‘과목’, ‘단위수’, ‘원점수/ 과목평균 (표준편차)’, ‘성취도(수강자수)’를 입력한다.", "▪공동교육과정 성적처리 방식은 다음과 같다. 1. 거점학교에서는 공동교육과정의 해당 과목을 수강하여 이수한 학생 모두를 ‘수강자 수’로 하여 성적을 산출한다(일반고등학교, 특수목적고등학교(산업수요 맞춤형 고등학교 포함), 특성화고등 학교 등). ※ 공동교육과정 미이수 학생의 경우 성적 미산출 및 학생부 기재 제외하며, 출석률 2/3 이상인 학생은 학생의 선택과 상관없이 모두 성적을 산출함. ∙ 일반고등학교와 특수목적고등학교(또는 특성화고등학교) 간 전문 교과 과목을 공동교육과정으로 수강하는 경우에는 보통교과 중 ‘진로 선택 과목’으로 편성하고 진로 선택 과목의 성적 산출 방식에 따라 처리한다. ∙ 산업수요 맞춤형 고등학교, 특성화고등학교, 일반고등학교 직업계열 학과 간 전문 교과Ⅱ 과목을 공동교육과정으로 운영하는 경우에는 ‘전문 교과Ⅱ 과목’으로 편성하고 전문 교과Ⅱ 과목의 성적산출 방식에 따라 처리한다. 2. 본교(거점학교)와 타교 학생(공동교육과정)을 구분하여 운영하는 경우 동일 과목이라도 별도로 개설･운영하고, 별도로 성적을 산출한다. <공동교육과정 과목 개설 및 성적 산출> 구분 과목(강좌) 개설 성적 산출 본교-타교학생 미구분 본교(거점학교) 학생 + 타교 학생 공동교육과정 관련 규정에 운영 (공동교육과정 해당) 따라 성적 산출 본교-타교학생 구분 본교(거점학교)학생 타교 학생 공동교육과정 관련 성적 규정은 타교 운영 (공동교육과정 아님) (공동교육과정 해당) 학생(공동교육과정)에 한해 적용", "⑯ 고등학교에서 학교 밖 교육으로 이수한 과목은 ‘교과’, ‘과목’, ‘단위수’를 입력하고, 이외 항목은 모두 ‘･’을 입력한다.", "▪학교 밖 교육 성적처리 방식은 다음과 같다. 1. 학교 밖 교육기관에서 보내온 ‘교과’, ‘과목’, ‘학점’ 및 ‘과목별 세부능력 및 특기사항’을 입력하고, 이외 항목은 모두 ‘･’을 입력한다. 다만, ‘과목별 세부능력 및 특기사항’에는 객관적 교육내용 (과목명, 이수학점, 객관적 학습내용)만을 입력한다. <학교 밖 교육의 과목별 세부능력 및 특기사항 입력 예시> 과목 세부능력 및 특기사항 *항공우주학 기초 탐구: 학교 밖 교육(대학)을 통해 2학점 이수함. 태양계의 행성, 별의 진화, 우주의 구조에 대한 기초 개념을 바탕으로 별자리와 망원경을 이용한 천체 관측 방법을 학습함. 또한 로켓이 뉴턴의 제3법칙에 따라 추진되는 원리, 고체와 액체 연료의 차이, 다단계 로켓의 작동 방식에 대한 학습을 바탕으로 위성이나 우주선을 궤도에 올리기 위한 로켓의 구조와 발사 과정에 대한 실제 적용 사례를 배움 과목 세부능력 및 특기사항 3D 프린터용 제품 제작: 학교 밖 교육(지역사회기관)을 통해 2학점 이수함. 모둠 활동에서 슬라이싱 된 파일을 활용하여 가상 적층을 실시하고 슬라이싱 상태를 파악하는 과정을 학습함. 슬라이서 프로그램의 3D프린터 설정 기능을 활용하는 방법을 조사하고 기타 설정값을 활용하여 슬라이싱 된 파일과 기준값으로 G코드를 생성하는 방법을 배움. * 과목명 앞에 별표(*)가 붙는 과목은 고교-대학 연계 학점 인정 과목임.", "⑱ (중학교 관련 내용으로 생략)", "별표 9(교과학습발달상황 평가 및 관리)", "1. 평가의 목표 및 방침 가. 교과학습의 평가는 학생 개개인의 교육 목표 도달도를 확인하고 교수ㆍ학습의 질을 개선하는데 주안점을 두고, 성취기준에 근거하여 교수ㆍ학습과 평가활동이 일관성 있게 이루어지도록 한다. 또한, 교과(목)의 성격과 학습자의 특성을 고려하여 적합한 평가 방법을 활용하되, 학생이 다양하고 질 높은 평가 방법을 경험할 수 있도록 노력하여야 한다.", "▪학교는 교육과정의 성취기준에 기반한 평가 계획에 따라 교수･학습과정에서 학생의 변화와 성장에 대한 자료를 다각도로 수집하여 적절한 피드백을 제공하는 과정중심 평가를 통해 교수･학습의 질을 제고한다.", "나. 시도교육청 및 학교는 교과학습의 평가 및 관리의 객관성‧공정성‧투명성‧신뢰도를 제고하기 위하여 노력하여야 한다. 아울러 평가로 인한 학생의 부담이 가중되지 않도록 평가 유형별 시행 비율, 운영 시기 등을 적절하게 조정하여야 한다.", "▪학교는 교과(목)별 특성과 학생 평가 부담을 고려하여 교과 내, 교과 간 협의를 통해 평가 유형별 (정기시험, 수행평가, 서·논술형 평가) 적정 시행 비율, 횟수, 시기 등을 정한다.", "다. 시도교육감은 별표 9를 준거로 학교급별 학업성적관리 시행지침을 수립한다.", "라. 학교는 시도교육청의 학업성적관리 시행지침을 바탕으로 학업성적관리규정을 제정하고, 교과(학년) 협의회와 학업성적관리위원회를 구성하여 운영한다.", "▪학업성적 평가 및 관리의 중요성을 감안하여 학업성적 평가 및 관리의 객관성･공정성･투명성･ 신뢰도를 제고하기 위해 시도교육청은 교육부 훈령을 바탕으로 학업성적관리 시행지침을 마련한다. 또한, 각급 학교에서는 해당 시도 학업성적관리 시행지침을 바탕으로 학업성적관리규정을 정하고, 교과(학년) 협의회와 학업성적관리위원회를 구성하여 운영한다.", "▪교과협의회를 운영할 수 없는 학교는 학년협의회를 운영할 수 있다.", "마. 교과학습의 평가는 정기시험과 수행평가를 활용하여 실시한다. 다만, 학교별 학업성적관리규정에 따라 교과(목)의 특성상 수업활동과 연계한 수행평가만으로 평가할 수 있다.", "▪정기시험과 수행평가의 실시 비율, 서·논술형 문항 출제 비율 등 평가의 세부적인 사항은 시도교육청의 ‘학업성적관리 시행지침’에 따라 학교의 ‘학업성적관리규정’으로 정하여 실시한다. ※ 단, 학생의 발달 특성 및 과목의 성격 등을 고려하여 정기시험은 서·논술형 문항만으로도 평가할 수 있음.", "바. 마항에도 불구하고, 감염병의 전국적 유행 등 국가 재난에 준하는 상황에서는 정기시험 또는 수행평가만으로 평가할 수 있고, 초등학교와 중학교는 교육부장관이 정하는 바에 따라 정기시험 및 수행평가를 실시하지 않을 수 있다.", "2. 평가 운영의 유의사항 가. 교육과정 성취기준을 실제 평가의 상황에서 준거로 사용하기에 적합하도록 재구조화할 수 있다. 다만, 성취기준을 통합하거나 일부 내용을 압축하여 재구조화할 경우, 성취기준의 내용요소 일부가 임의로 삭제되지 않도록 유의해야 한다. 또한, 일부 내용요소를 추가해야 하는 경우에는 학생의 학습 및 평가 부담이 가중되지 않도록 학년(군), 학교급 및 교과(군)간의 연계성을 충분히 고려해야 한다.", "▪학생의 특성·학교 여건 등에 따라 교육과정 및 교과서 내용을 분석하여 교과협의회를 통해 성취기준을 재구조화할 수 있다.", "나. 「공교육 정상화 촉진 및 선행교육 규제에 관한 특별법」 제8조제3항에 따라 정기시험, 수행평가 등 학교 내 학교 시험 및 각종 교내대회에서 학생이 배운 학교교육과정의 범위와 수준을 벗어난 내용을 출제하여 평가하지 않도록 유의한다.", "다. 부정행위 예방 대책과 부정행위자(협조자 포함) 처리 절차 및 처리 기준을 학업성적관리규정으로 정하고, 학기 초에 학생 및 학부모에게 안내한다. 또한, 부정행위 적발 시 절차 및 규정에 따라 엄중히 처리한다.", "▪부정행위 예방대책은 ‘고사 중 소지 금지 물품, 부정행위 유형, 감독 및 고사실 배정 방법 등 구체적인 고사 시행 방법, 감독관 유의사항, 부정행위자 처리 및 지도대책 등’을 포함하여야 하며, 부정행위 발생 시 처리절차 및 관련자 성적관련 처리기준은 ‘학업성적관리규정’에 포함하고, 관련자 징계규정은 ‘학칙’에 포함하여야 한다. ※ 1형 당뇨병으로 고사 시 혈당관리가 필요한 학생의 경우, 혈당 측정 및 인슐린 주입을 위한 의료지원기기와 전자기기 반입을 교사 확인을 거쳐 허용하고, 필요시 시험 중 인슐린 주사 및 당류 섭취를 할 수 있도록 사전 안내(교육부 기초학력진로교육과-1476(2024.4.11.) 참고) 라. 자녀가 재학하는 학교에 부모 교직원이 재직하는 경우, 자녀가 재학 중인 학년의 출제, 검토, 인쇄, 채점, 평가 관리 등 자녀와 관련한 ‘평가 관련 업무’를 담당하지 않도록 유의한다.", "▪시도교육청의 여건에 따라 부득이하게 자녀가 재학하는 학교에 부모가 교직원으로 재직하는 경우에는 평가 등 자녀와 관련된 업무에서 배제하도록 유의한다. 다만 부득이한 경우, 학교의 학업성적관리규정에 평가의 공정성 제고 방안을 마련해야 한다.", "3. (초등학교 관련 내용으로 생략)", "4. 중학교･고등학교 평가 방법 가. 평가 계획 수립 1) 교과학습의 평가 계획은 각 교과(목)의 교육과정 및 학교･교과의 특성을 감안하여 교과(학년)협의회에서 수립하고, 이를 학교 학업성적관리위원회의 심의를 거쳐 학교장이 최종 결정한다. 다만, 중학교 자유학기에는 학교의 여건을 고려하여 필요시 시도교육청의 학업성적관리 시행지침에 따라 해당 교과 담당 교사별로 평가 계획을 달리 정할 수 있다.", "▪학기(학년)초에 교과목별 성취기준에 따른 성취수준을 마련(교과교육과정에 포함 혹은 별도 관리)하여 이를 교수･학습에 활용하고, 이에 근거하여 평가 계획을 수립하여 실시한다. 2) 평가 계획에는 교과(학년)별 정기시험 및 수행평가의 평가 영역･요소･방법･횟수･반영비율･수행평가 세부기준(배점) 등과 성적처리방법 및 결과의 활용 등을 포함한다.", "▪교과학습의 평가(정기시험과 수행평가)를 위하여 학기(학년) 평가 계획을 학년별･교과목별로 수립하되, 다음의 내용이 포함되도록 한다. 1. 평가의 목적, 평가의 방향과 방침, 평가 유의사항 등 2. 평가(정기시험 및 수행평가)의 영역, 요소, 방법, 시기, 횟수, 반영비율 등 3. 교과목별 기준 성취율과 성취도 4. 공통과목 국어, 수학, 영어 및 전문교과Ⅱ 실무과목의 과목별 최소 성취수준 설정", "▪‘평가(정기시험 및 수행평가)의 영역’은 평가를 실시하고자 하는(평가에서 측정하고자 하는) 영역을 의미하며, ‘교육과정의 영역, 핵심 아이디어, 기능 등’을 활용하여 교과 및 학교의 특성에 따라 결정할 수 있다. 3) 확정된 평가 계획은 정보공시 등을 통해 학생 및 학부모에게 공개한다. 또한, 변경사항이 있는 경우에는 수정하여 평가 실시 전에 재 공지한다.", "▪교과별･학년별 평가 계획은 학기 초에 학생 및 학부모에 공개하여야 하며, 평가 실시 전에 평가 방법 및 채점기준 등 평가 운영과 관련된 세부적인 사항을 학생에게 안내하여 학생들이 해당 평가의 평가 방법 및 평가 요소를 인지하도록 하여야 한다. 세부적인 채점기준을 모두 공개하기 어려운 경우, 채점기준에 포함된 평가 요소를 공개하도록 한다. 또한, 평가 계획이 변경되는 경우 학업성적관리위원회의 심의를 통해 변경사항을 확정하고, 평가 실시 전에 변경사항을 학생과 학부모에게 안내하여야 한다.", "※ 학교는 정기시험 기출문제(정답 포함)를 공개하되, 공개범위와 방법(학교 홈페이지 탑재, 교내 특정 장소 비치, 출력물 제공 등)은 학업성적관리위원회를 통해 학교장이 정함.", "※ 평가 요소는 교육과정 성취기준 도달의 증거로, 학생들이 보여주기를 기대하는 핵심 내용을 구체적으로 기술한 평가 내용을 말함. 4) (중학교 관련 내용으로 생략).", "나. 평가 운영 1) 정기시험 문제는 타당도, 신뢰도를 제고할 수 있도록 출제하고, 평가의 영역, 내용 등을 포함한 문항정보표 등 출제 계획을 작성하여 활용하며, 동일 교과 담당교사 간 공동 출제를 한다.", "▪정기시험의 신뢰도 제고를 위해 문항오류가 없도록 교과 내 검토를 강화하여야 한다.", "▪정기시험의 문항정보표에 내용영역, 성취기준이 표시되도록 한다. 2) 정기시험은 문항별 배점을 표시하여 가급적 100점 만점으로 출제하고 문항의 수준별 난이도의 배열에 유념한다.", "▪특별한 사유가 없는 한 정기시험의 만점은 100점으로 한다.", "▪모든 출제 원안에는 문항별 배점을 표시한다. 또한 석차등급을 산출함에 따라 평가의 변별력을 최대한 높이고, 동점자가 가능한 한 생기지 않도록 문항 수를 적절하게 출제하며, 문항당 배점 및 채점기준 세분화에 유의한다. 3) 정기시험 관련 보안규정과 시험지 유출 시 처리기준은 학업성적관리규정으로 정하고, 평가 문제는 출제ㆍ인쇄 및 평가의 전 과정에서 보안이 유지되도록 철저히 관리한다.", "▪정기시험의 보안 강화를 위해 학업성적관리규정에 다음의 사항을 포함하여야 한다. [평가단계별 보안 관리 강화] (예시) ∙ (출제 단계) 교직원 자녀 재학 시 평가 업무 배제, 평가 시행 전 보안 연수 실시 등 ∙ (인쇄 단계) 평가관리시설 출입 통제, 인쇄실 내 전자기기 소지 금지, 평가관리시설 출입자 확인 장치(CCTV, 동작 감지센서 등) 설치, 인쇄 시 평가 담당자 입회, 인쇄 담당자 평가지 수령 당일 인쇄(1일 초과분 평가원안 보안 책임자 보관) 등 ∙ (시행 단계) 고사 당일 평가지 반출, 평가 종료 후 답안지 매수 확인 등 ∙ (채점 단계) 답안지 인수 후 매수 확인, 채점기간 중 학생 통제 등 4) 모든 수행평가는 수업 중 실시하는 것을 원칙으로 하며, 수업시간 외 가정 등에서 이루어지는 ‘과제형 수행평가’는 실시하지 않는다.", "▪과제형 수행평가 금지는 사전 준비가 필요한 암기식 수행평가 등이 포함됨에 유의하여야 한다. ※ 과제형 수행평가는 학생이 수업 외 시간에 학교 밖에서 수행한 과제물의 내용을 측정 대상(채점 요소)으로 삼아 과제 이행 여부 및 수행 정도에 따라 점수를 부여하는 평가 방식임.", "<예시> 과학 수행평가 과제로 ‘이번 학기의 학습 내용 중 탐구하고 싶은 주제를 학생 스스로 선택하여 보고서의 형태로 작성･제출’하도록 하고, 학생이 수업 외 시간에 별도로 수행한 탐구보고서를 평가", "※ 암기식 수행평가는 생각하고 탐구하는 과정 없이 학습 내용을 단순히 기억하고 반복하여 재생산하는 능력만을 측정 대상(채점 요소)으로 삼아, 암기한 내용을 그대로 재현하는 정도에 따라 점수를 부여하는 평가 방식임.", "<예시> 학생에게 생물의 분류 체계를 교과서에 제시된 것과 동일하게 암기하도록 하고, 용어를 순서대로 정확하게 사용하는지 등 암기 내용의 재현 정도에 따라 평가", "▪복수의 학생이 공동으로 수행하는 모둠활동 등을 평가할 때에는 개별 학생에게 역할을 부여하고, 개인별 학습과제에 대한 수행과정과 결과를 평가해야 한다. 5) 수행평가에서 인공지능(AI) 도구를 활용하는 경우, 평가의 공정성 및 신뢰성이 훼손되지 않도록 주의하고, 평가 시행 전 학생 유의사항을 충분히 안내한다.", "▪인공지능(AI)은 맞춤형 피드백 제공 등을 위해 수업·평가에서 보조적으로 활용할 수 있으나, 평가의 공정성·신뢰성을 훼손하지 않도록 유의해야 한다.", "▪교사가 직접 학생의 활동을 관찰할 수 있는 평가를 통해 학생의 독자적 사고에 따른 결과물이 평가에 반영될 수 있도록 해야한다.", "▪실제 평가 상황에서 인공지능(AI) 활용이 금지되는 행위를 명확히 설정하고, 관련 유의사항을 학생･ 학부모에게 사전 안내해야 한다. 6) 수행평가의 점수는 점수화가 가능한 영역의 점수만 반영하되, 기본점수의 부여 여부, 부여 점수의 범위 등은 학업성적관리규정으로 정한다.", "▪수행평가는 학교 및 교과의 특성에 따라 다양한 방법을 구안하여 적용할 수 있다.", "▪수행평가 문항 출제는 수행평가 출제 계획표 등을 작성하여 활용한다.", "▪수행평가는 학생의 학습과제 수행과정과 결과를 평가한다.", "▪수행평가의 기본점수 부여 여부 및 부여범위 결정 시에는 평가의 목적 등을 고려하여 타당하게 이루어질 수 있도록 해야 한다. ※ 수행평가 영역별 기본점수의 범위는 시도교육청의 학업성적시행관리지침을 따름.", "▪가급적 수행평가 배점과 반영비율을 조정하여 환산점수에서 소수 둘째 자리 이상의 소수가 발생하지 않도록 유의한다. 예) 수행평가 점수 30점 반영비율 20%이고, 학생이 28점을 받은 경우 환산점수는 18.6666…의 무한 소수가 발생하므로 사전에 수행평가 배점과 반영비율을 적절히 선정하여 무한 소수가 발생하지 않도록 유의함. 7) 정기시험 및 수행평가의 이의신청 절차는 학업성적관리규정으로 정하고, 이의신청이 있을 때에는 절차에 따라 면밀히 검토하여 처리하여야 한다. 또한, 평가문항의 이의신청에 따른 오류 검증을 위해 필요시 외부 전문가의 자문을 받을 수 있다.", "다. (중학교 관련 내용으로 생략)", "라. 고등학교 학업성적 평가 결과 처리 1) 과목별 성적일람표는 매 학기말 교과 담당교사가 작성하고, 전산처리할 경우 전산 입력하여 관리함을 원칙으로 한다. 과목별 성적 일람표는 정기시험(명칭, 반영비율 등 명기)와 수행평가(영역, 반영비율 등 명기)의 점수를 합산하여 각 호와 같이 성적을 산출한다. 가) 교양교과(군)의 과목 및 나)∼마)호를 제외한 모든 과목은 원점수, 과목 평균, 과목 표준편차, 성취도(수강자수), 석차(동석차수), 석차등급을 산출한다. 나) 보통 교과의 진로 선택 과목은 원점수, 과목평균, 성취도(수강자수), 성취도별 분포비율을 산출한다. 다) 보통 교과 공통 과목의 ‘과학탐구실험’과 전문 교과Ⅱ, Ⅲ은 원점수, 과목 평균, 과목 표준편차, 성취도(수강자수)만 산출하고, 이 중 전문 교과Ⅱ의 실무과목은 능력단위로 산출할 수 있으며, 능력단위 평가 시 이수시간, 원점수, 성취도만 산출한다. 라) 보통 교과 체육･예술 교과(군)의 일반 선택 과목은 성취도만 산출한다. 마) 고등학교에서 공동교육과정으로 이수한 과목[보통 교과 진로 선택 과목, 체육･예술 교과(군)의 일반 선택 과목, 교양 교과(군)의 과목 제외]은 원점수, 과목 평균, 과목 표준편차, 성취도 (수강자수)를 산출한다. 2) 원점수는 정기시험 및 수행평가의 반영비율 환산 점수 합계를 소수 첫째 자리에서 반올림하여 정수로 기록하며, 과목평균, 과목표준편차는 원점수를 사용하여 계산하여 소수 둘째 자리에서 반올림하여 소수 첫째 자리까지 기록한다.", "▪가급적 수행평가 배점과 반영비율을 조정하여 환산점수에서 소수 둘째 자리 이상의 소수가 발생하지 않도록 유의한다. 예) 수행평가 점수 30점 반영비율 20%이고, 학생이 28점을 받은 경우 환산점수는 18.6666…의 무한 소수가 발생하므로 사전에 수행평가 배점과 반영비율을 적절히 선정하여 무한 소수가 발생하지 않도록 유의함.", "<예시> 고등학교 과목별 성적일람표 및 해석 [보통교과] 2026학년도 제1학기 화법과 작문 성적일람표 제3학년 (강의실명) 과목담당교사 ( )인 평가방법(반영비율) 정기시험(60%) 수행평가(40%) 명칭,영역 석차 (반영비율) 1회 2회 ○○○ ◇◇◇ □□□ △△△ 합계 원점수 성취도 (동석차수) (30%) (30%) (10%) (10%) (10%) (10%) /수강자수 반/번호, 성명 1/1 김길동 28.41 29.16 8.00 9.00 8.00 10.00 92.57 93 A 1 4(15)/532 1/2 나민주 23.94 21.39 7.00 8.00 7.00 7.00 74.33 74 C 5 273/532 1/3 수강자 최고점 30.00 30.00 10.00 10.00 10.00 10.00 100.00 수강자 최저점 9.95 10.00 5.00 6.00 7.00 5.00 42.95 수강자 평균 23.42 25.74 8.40 8.16 8.76 7.59 82.07 강의실 평균 21.24 24.43 8.50 7.52 8.91 7.35 77.95 과목 평균 82.1 과목 표준편차 [전문교과] 2026학년도 제1학기 상업 경제 성적일람표 제3학년 (강의실명) 과목담당교사 ( )인 평가방법(반영비율) 정기시험(60%) 수행평가(40%) 명칭,영역 성취도 (반영비율) 1회 2회 ○○○ ◇◇◇ □□□ △△△ 합계 원점수 성취도 (수강자수) (30%) (30%) (10%) (10%) (10%) (10%) 반/번호, 성명 1/1 김길동 28.41 29.16 8.00 9.00 8.00 10.00 92.57 93 A(553) 232 1/2 나민주 23.94 21.39 7.00 8.00 7.00 7.00 74.33 74 C(553) 232 1/3 수강자 최고점 30.00 30.00 10.00 10

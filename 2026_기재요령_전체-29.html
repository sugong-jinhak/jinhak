방식은 다음과 같다.", "1. 단위학교 학업성적관리규정의 동점자(동석차)처리규정 적용에도 불구하고, 동점자(동석차)가 발생했을 경우는 중간석차를 적용하여 등급을 부여한다. ‣ 중간석차 및 중간석차백분율 계산식은 다음과 같다. ∙ 중간석차 = 석차 + (동석차 인원수 - 1) / 2 ∙ 중간석차백분율 = 중간석차 / 수강자수 × 100 ‣ (예 1) 수강자수 96명인 과목에서 1등 동점자가 7명인 경우 수강자수가 96명인 경우 정상적으로 처리되면, 1등급 학생은 4명이나 현재 1등인 학생이 7명이므로, 중간석차백분율을 적용하면 4.17%이므로 모두 2등급을 부여한다(1등급인 학생은 없음).", "※ [참고] 중간석차 = 1 + (7 - 1) / 2 = 4, 중간석차백분율 = 4/ 96 × 100 = 4.17% ‣ (예 2) 수강자수가 130명인 과목에서 1등 1명, 2등 동점자가 6명인 경우 수강자수가 130명인 경우 정상적으로 처리되면, 1등급 학생은 5명이나, 예시의 경우 2등인 학생 6명은 1등급 인원을 초과하므로 중간석차백분율을 적용하면 3.46%로 이 학생들은 1등급을 부여한다(1등 1명과 2등 6명에게 1등급을 부여하므로, 1등급 인원을 초과하게 됨).", "※ [참고] 중간석차 = 2 + (6 - 1) / 2 = 4.5, 중간석차백분율 = 4.5 / 130 × 100 = 3.46%", "2. 중간석차 적용은 동점자(동석차)가 등급경계에 있는 경우에 적용하며, 등급 범위 내에서 생기는 동점자(동석차)에게는 적용하지 않는다. 6) 석차는 매 학기별로 과목별 정기시험 및 수행평가의 반영비율 환산점수 합계를 소수 셋째 자리에서 반올림하여 소수 둘째 자리까지 구하여, 다음과 같이 산출한다. 가) 성적산출을 위한 수강자수는 매 학기말 성적산출 시점을 기준으로 해당 과목을 수강한 학생수(수강하였으나 이수하지 못한 학생수도 포함)로 한다. 다만 필요하다고 인정되는 경우, 「초･중등교육법」 제48조 및 같은 법 시행령 제78조에 따라 교육감의 승인을 얻어 학과별로 학생을 선발한 학교는 교육과정 특성을 고려하여 시도교육청 학업성적관리 시행지침에 따라 학교별 학업성적관리규정으로 학과별로 수강자수를 정할 수 있다. 산업수요 맞춤형 고등학교와 특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함)는 필요하다고 인정되는 경우, 교육과정 특성을 고려하여 시도교육청 학업성적관리 시행지침에 따라 학교별 학업성적관리규정으로 수강자수를 정할 수 있다.", "▪수강자수 산정 방식은 다음과 같다.", "1. 동일한 교과 교육과정(2015 개정 교육과정) 내에서 동일한 교과･과목이고 학점, 수강시기가 같은 경우에는 수강한 학생 모두를 수강자수로 하여 성적을 산출한다. - 다만, 교육과정 편제상으로 학습내용과 성취기준이 달라 평가를 달리할 수밖에 없는 경우에는 당해학교의 학업성적관리규정으로 정하여 달리할 수 있음.", "2. ‘학과별로 수강자수를 결정할 수 있는 학교’는 「초･중등교육법」 제48조에 따른 학과를 설치하고, 같은 법 시행령 제78조에 의거한 시도교육청의 기본계획에 따라 교육감의 승인을 얻어 학과별로 학생을 선발한 학교를 의미한다. 나) 직업교육 위탁과정 학생의 위탁교과와 특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함) 및 특수목적고등학교(산업수요 맞춤형 고등학교 포함)의 개인별 평가가 곤란한 전문(공), 실기(습) 교과는 원점수, 과목평균 등을 기록할 수 있고, 성취도 또는 이수여부를 기록한다. 다) 과목별로 동점자가 발생할 경우에는 그 동점자 모두에게 해당 순위의 최상의 석차를 부여하고 ( )안에 동점자 수를 병기한다. 라) 시도교육청에서 운영하는 공동실습소, 일반고등학교(자율고등학교 포함), 특수목적고등학교(산업 수요 맞춤형 고등학교 포함) 및 특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함) 등에서 개설한 교과(과정)를 계열이 서로 다른 학교의 학생들이 함께 수강한 경우의 수강자수는 계열별로 구분하여 산출할 수 있다. 마) ‘재･전･편입학생’과 ‘명예졸업, 학업중단 퇴학, 자퇴, 제적, 휴학 및 전출 학생 중 모든 평가가 완료되어 당해 학교의 학업성적관리규정에 따라 성적을 처리할 수 있는 학생’은 수강자수에 포함하고, ‘모든 평가가 완료되기 이전(학기말 최종 성적처리 불가능)의 명예졸업생 및 퇴학, 자퇴, 제적, 휴학’과 ‘재･전･ 편입학생 중 원적교에서 성적을 취득해 온 학생’은 수강자수에서 제외한다.", "▪정기시험 및 수행평가의 반영비율에 따라 환산 점수 합계를 처리하는 ‘학기말 성적산출 기준일’은 교과(목)별 평가 계획 상 최종 시험일(기말고사, 2차 시험 등)이며, ‘명예졸업’ 학생은 퇴학, 자퇴, 제적, 휴학 학생에 준하여 성적을 처리한다. ※ 과목별 결시생의 인정점 부여는 당해 학교의 학업성적관리규정에 따라 산출하되, 인정점 부여 시 교육정보 시스템의 기준고사/영역의 기준점수와 평균점수･평균점수비율에서 사용하는 평균은 당해 정기시험 (중간고사, 기말고사, 1차 시험, 2차 시험 등)에 응시한 학생수를 기준으로 산출하기 때문에 응시학생의 학적변동으로 인하여 변경되지 아니함. ※ 교육정보시스템의 동점자처리규정에서 정기시험 배점순을 지정할 경우 결시생의 인정점은 점수만 존재하고 해당고사의 배점 정보는 존재하지 않으므로 배점 정보에 의해 해당 고사를 응시한 학생이 우선이 됨. 7) 채점 등 평가 결과를 전산처리할 경우, 교과 담당교사는 전산처리 결과의 이상 유무를 철저히 대조･ 확인해야 한다.", "▪과목별 결시생의 인정점 부여를 위해 교육정보시스템을 활용한 경우, 도출된 결과값이 학업성적관리 규정에서 정한 인정점 부여 방식과 일치하는 지 등 이상 여부를 최종 확인·점검한다. 8) 개인 정보 보호를 위해 정기시험 및 수행평가 결과는 학생 본인만 확인하도록 하며, 타인에게 성적 정보가 노출되지 않도록 유의해야 한다.", "▪정기시험 및 수행평가의 결과(학기말 포함)를 학생 본인에게 확인할 때에는 ‘개인별 성적 일람표’ 등을 활용하여 다른 학생에게 성적 정보가 노출되지 않도록 유의하며, 학생 본인의 확인이 어려운 경우 학부모 등 보호자에게 공개하여 확인한다. 9) 성적처리 및 학생 확인이 완료된 정기시험의 학생 답안지는 성적산출의 증빙자료로 5년간 보관한다.", "▪성적 산출의 증빙자료로 ‘성적처리가 끝난 정기시험 학생 답안지’와 함께 ‘문항정보표와 출제원안지’ 등은 「공공기록물 관리에 관한 법률 시행령」 및 「학교 공통업무 보존기간 준칙」에 따라 당해 학교에 5년간 보관한다. 10) 수행평가 결과물의 보관기간은 학업성적관리규정으로 정하며, 학생들의 확인･이의신청･성적처리가 완료된 후 보관한다.", "▪학기 초에 학업성적관리위원회의 심의를 통해 학생의 수행평가 결과물의 보관 기간을 결정하며, 학생들의 이의신청·접수·처리·확인 과정 등 적절한 조치가 완료된 후 보관한다. 11) 성적 산출의 증빙 자료로 활용되는 수행평가의 중요한 자료는 졸업 후 1년 이상 보관하며, 상급학교 진학 시 입학전형권자의 요청이 있을 경우 이를 전형자료로 제공할 수 있다.", "▪‘수행평가의 중요한 자료’라 함은 학생들의 이의신청･접수･처리･확인 과정 등 적절한 조치가 완료된 후 작성된 성적 기록 자료(수행평가 성적일람표 등) 등을 의미한다.", "▪상급학교 진학 시에 입학전형자료로 활용될 수 있는 자료 등은 학교장이 판단하여 보관방법과 기간 등을 결정한다.", "5. 학업성적관리위원회의 설치 및 운영 가. 학업성적 평가 및 관리의 객관성･공정성･투명성과 신뢰도를 높이고, 학교생활기록부의 전산처리 및 관리, 이에 따른 활동을 강화하기 위하여 「초･중등교육법 시행규칙」 제24조에 따른 학업성적관리위원회(이하 위원회라 한다)를 둔다.", "▪학교별 ‘학업성적관리위원회’는 의무적으로 설치･운영해야 하며, 학업성적관리의 중요성을 감안하여 그 활동을 강화해야 한다. 다만, 학교의 형편에 따라 명칭을 달리하거나 타 위원회와 통합 운영할 수 있다.", "나. 위원회의 위원장은 학교장으로 하며, 학업성적관리위원회의 업무를 총괄한다. 부위원장은 위원 중 학교장이 정한 사람으로 하며, 위원장을 보좌하고 위원장 유고시 위원장을 대행한다.", "다. 위원의 수는 학교 규모에 따라 정하며, 교직원 중에서 교무분장 업무를 고려하여 학교장이 임명한다.", "▪위원회 구성에서 ‘교무분장’이라 함은 부서별 또는 교과별 업무분장을 의미한다.", "라. 학부모의 의견 수렴과 학업성적관리의 투명성 등을 확보하기 위하여 학교장은 약간 명의 학부모 위원을 위촉할 수 있다.", "▪평가의 공정성 확보를 위해 학부모 위원에게 사전 공개가 불가한 안건은 학부모위원의 참여를 제한한다.", "마. 위원의 임기는 학년도를 기준으로 매년 3월부터 차년도 2월까지로 한다.", "바. 학업성적관리위원회는 다음의 사항을 심의한다. 1) 학교 학업성적관리규정 제･개정 2) 각 교과(학년)협의회에서 제출한 정기시험 및 수행평가의 영역･요소･방법･시기･횟수･반영비율 등과 성적처리 방법 및 결과의 활용 3) 창의적 체험활동상황의 평가 기준 및 방법 4) 학업성적 평가 및 관리의 객관성･공정성･투명성과 신뢰도 제고 방안(평가의 기준･방법･결과의 공개, 홍보, 평가결과 후속조치(이의제기 등)) 5) 학교생활기록부의 기재방법 및 기재내용 등에 관한 사항", "▪학업성적관리위원회 심의내용 중 ‘학교생활기록부의 기재방법 및 기재내용 등에 관한 사항’의 예로 출결 특기사항 기재 관련 사항 등이 있다. 6) 학교생활기록부 정정을 위한 증빙자료의 객관성 여부 등을 포함한 정정에 관한 사항 7) 고등학교의 교과목별 기준성취율에 따른 분할점수 산출 방식 등에 관한 사항 8) 기타 학교 학업성적관리 관련 업무", "사. 위원회의 회의는 다음과 같이 운영한다. 1) 회의는 학기 초 및 심의사항이 발생했을 때 개의하며, 세부적인 개최 시기 등은 시도교육청의 학업성적관리 시행지침에 따라 학교장이 결정할 수 있다. 2) 위원회의 회의는 재적인원의 과반수 출석으로 개의한다. 3) 회의가 종료되면 회의 결과를 작성하고, 위원들의 확인을 받아 보관한다.", "6. 기타 가. 교과목별 정기시험 및 수행평가에 참여하지 못한 학생(결시생)의 성적처리는 결시 이전･이후의 성적 또는 기타 성적의 일정비율을 환산한 성적(인정점)을 부여하되, 인정 사유 및 인정점의 비율 등은 시도교육청의 학업성적관리 시행지침에 따라 당해 학교의 학업성적관리규정으로 정한다.", "▪지필평가 인정점 부여를 위한 기준점수는 동일 학기 내 학생이 응시한 지필평가 성적을 기준으로 산출하되, 지필평가 성적이 없는 경우 시도교육청 학업성적관리 시행지침에 따라 학업성적관리규정에 따라 산출한다.", "나. 모든 평가(학기말 성적산출 기준)가 완료되기 이전 전출, 휴학, 면제, 유예, 제적, 자퇴, 퇴학 학생이 그 이전에 취득한 성적이 있을 경우, 이 학생의 재취학, 전･편입학을 위하여 그 성적을 전산입력하거나 별도로 보관하여야 한다.", "다. 재취학, 재･전･편입학생은 각 호에 따라 성적을 산출한다. 1) 재취학, 재･전･편입학 일자 이전 원적교의 성적과 재취학, 재･전･편입학 이후의 취득한 성적을 합산한다. 2) 재취학, 재･전･편입학 이후 취득한 성적이 있고, 이에 상응하는 원적교 성적이 중복되는 경우에는 재취학, 재･전･편입학 이후 취득한 성적을 인정한다.", "▪복학 및 재･전･편입학한 학생의 정기시험 성적 일부가 중복된 경우 복학 및 재･전･편입학 이후 취득한 성적으로 한다. 다만, 세부적인 사항은 다음을 참조한다. 1회고사 성적 2회고사 성적 구분 비고 원적교 재입학 등 원적교 재입학 등 기본 원칙 ○ × × ○ 원적교 1회고사 + 재입학 등 2회고사 동일 평가 성적 중복 ○ × ○ ○ 원적교 1회고사 + 재입학 등 2회고사 동일 평가 성적 미비 × × × ○ 재입학 등 2회고사에 따른 인정점 + 재입학 등 2회고사 시도지침*에 따라 학교 학업성적관리규정 또는 학업성 동일 평가 성적 미비 적관리위원회에서 결정 × × × × (모든 평가) * 응시기회가 모두 없었을 경우와 모두 결시한 경우에 대한 인정점 부여 기준 마련", "※ 수행평가의 경우, 복학 및 재･전･편입학한 학생의 성적처리 방안을 평가 계획에 포함하되, 교과협의회를 통해 원적교 성적을 유사한 영역 평가의 성적으로 인정 가능", "▪전·편입학, 귀국 등에 따른 미이수 교과목 보충 학습 과정 입력 방식은 다음과 같다. - 전·편입학, 귀국 등에 따라 공통과목을 이수하지 못하여 ‘보충 학습 과정’을 실시한 경우에는 ‘교과학습발달상황’의 ‘세부능력 및 특기사항’에 과목명, 수강기간, 수강시간 등을 문장으로 입력한다. 예) 교과학습발달상황의 세부능력 및 특기사항 과목 세부능력 및 특기사항 한국사: 전입으로 인한 미이수 과목을 ‘보충 학습 과정에 참여하여 ○○시간(2025.○○.○○.-2025.○○.○○.) 수강함.", "※ ‘보충 학습 과정’을 ‘방송･정보통신매체를 활용한 수업(온라인수업)’으로 실시한 경우를 포함하며, 당해 학기에 관련 과목이 개설되지 않은 경우에는 ‘개인별 세부능력 및 특기사항’에 입력함. 3) 재취학, 재･전･편입학한 이후 성적 산출을 위한 원적교의 성적이 없는 경우에는 재취학, 재･전･편입학 이후 취득한 평가의 성적을 반영한다. 다만, 결시 등의 사유로 인정점을 부여해야 하는 경우, 해당 학교의 학업성적관리규정에 따른다.", "▪학생이 정기시험 이후 전출·휴학·제적·자퇴·퇴학할 경우, 평가기간 동안 미인정 결시로 인한 인정점은 당해 정기시험을 기준으로 산출하여 입력한다.", "▪정기시험 인정점 부여를 위한 기준점수는 동일 학기 내 학생이 응시한 정기시험 성적을 기준으로 산출하되, 정기시험 성적이 없는 경우 시도교육청 학업성적관리 시행지침에 따른 학업성적관리 규정에 따라 산출한다. 4) 1)~3)호에서 제시되지 않은 예외적인 경우에 대해서는 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 정한다.", "▪재입학, 전입학, 편입학 등 학적변동자의 동일(유사) 과목 성적인정과 반영 방법은 학업성적관리 규정으로 정하되, 학업성적관리규정에 규정되어 있지 않은 경우 학업성적관리위원회에서 정할 수 있다. 5) 원적교에서는 전출학생의 전출시점까지 취득한 성적(정기시험 및 수행평가의 점수 및 상세한 기록 등)을 전산자료로 입력하여 전입교로 전송하되, 부득이한 사유로 입력하지 못한 경우 정리하여 비공개로 전입교로 송부하고 사본을 보관하여야 한다.", "▪학생이 전출할 때에는 본 훈령 제4조제5항 및 그 해설에 따라 전출일자까지 원적교에서 입력할 수 있는 자료는 모두 입력하여 전송하고, 부득이한 사유로 입력하지 못한 자료(성적, 월별 출결상황, 기타 입력사항 등)는 정리하여 전입교로 송부하여야 한다.", "라. 「초･중등교육법 시행령」 제19조제1항에 따른 ‘귀국학생 등’은 각 호에 따라 성적을 산출한다. 1) 국내 학교에 취학, 재취학, 재･편입학한 후 취득한 성적만으로 성적을 산출한다. 2) 재취학, 재･편입학 이전 성적이 국내 학교에 있는 경우 이를 인정하고, 재취학, 재･편입학 이후에 취득한 성적과 합산한다. 3) 재취학, 재･편입학 후 취득한 성적이 있고, 이에 상응하는 이전의 국내학교 성적이 중복되는 경우에는 재취학, 재･편입학 이후 성적을 인정한다. 4) 1)~3)호에서 제시되지 않은 예외적인 경우에 대해서는 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 정한다.", "▪귀국학생 교과목 및 성적의 기록은 다음과 같이 처리한다. 1. 유학(미인정유학 포함) 후 귀국한 학생의 유학기간의 ‘교과학습발달상황’은 공란으로 둔다. ※ 해당 기간의 기록은 학년을 결정하는 참고자료로 정규교육과정을 이수한 기록이 아니므로 학교생활기록부에 입력하지 않음. 2. 다만, 한국학교에서 취득한 학업성적은 국내 해당 학년의 동일(유사) 과목 학업성적으로 반영하여 처리하되, 동일(유사) 과목 인정 및 결시에 따른 인정점 부여 등의 사항은 전입교 학업성적관리 위원회의 결정에 따른다. ※ 한국학교의 성적 산출 방식이 국내학교와 다른 경우 교육정보시스템의 [성적-성적처리-개인별세부능력 및 특기사항]에 교과목 성적을 직접 입력함.", "마. 시도교육청에서는 학업성적관리 시행지침에 장애학생의 평가조정 규정을 마련하여 장애학생이 장애 유형과 정도를 고려한 적절한 평가를 받을 수 있도록 지원하고, 각급 학교에서는 시도교육청의 학업성적관리 시행지침에 따라 학교별 학업성적관리규정에 장애학생의 평가조정 규정을 정하여 시행한다. 1) 장애학생의 장애 유형과 정도에 따라 필요 시 별도의 평가장 설치･운영, 대독, 대필, 보조기기, 보조인력 등 적절한 평가조정을 지원한다. 가) 점자를 사용하는 시각장애학생을 위해 점자 평가자료를 제공하고, 필요 시 음성 평가자료를 지원하며, 시험시간을 매 교시별 1.7배 연장한다. 또는 묵자(일반문자)를 사용하는 시각장애학생을 위해 확대독서기(개인지참 가능) 또는 확대/축소 평가자료(118%, 200%, 350% / A4 중 택1)를 제공하고, 시험시간을 매 교시별 1.5배 연장한다. 나) 지체장애학생 중 뇌병변 장애학생을 위해 시험시간을 매 교시별 1.5배 연장하고, 상지기능 장애로 평가 수행이 어려운 경우에는 대필을 지원한다. 다) 보청기나 인공와우를 착용한 학생을 포함하여 청각장애학생이 듣기평가에 참여하기 어려울 경우 지필평가으로 대체한다. 2) 학생의 장애가 심하거나 그 밖의 사유로 추가적인 평가조정이 필요한 경우에는 학교 학업성적관리위원회 심의를 거쳐 평가시간 연장 등 필요한 지원 사항을 결정할 수 있다.", "바. 학교의 장이 교육상 필요에 따라 소속 학생을 대상으로 「초ㆍ중등교육법」 제24조제3항제1호의 원격수업을 실시한 경우, 각 호에 유의하여 평가를 시행하되, 구체적인 사항은 시도교육청의 학업성적 관리 시행지침에 따라 학교장이 정한다. 1) 정기시험은 등교하여 실시하는 것을 원칙으로 한다. 2) 학생의 수행 과정 및 결과를 교사가 직접 관찰·확인한다.", "▪평가는 등교하여 실시하는 것을 원칙으로 하되, 등교하여 실시하는 것이 불가능하여 원격으로 실시할 경우 시도교육청의 학업성적관리 시행지침에 따라 학교 학업성적관리위원회의 심의를 통해 평가의 세부적인 사항을 정하여 실시한다. - 다만, 원격으로 평가를 실시할 경우 평가의 객관성·공정성·투명성·신뢰도를 확보할 수 있는 방안을 마련해야 한다.", "▪학교의 장은 원격수업을 실시할 경우 교과별(학년별) 협의회 등에서 원격수업 운영계획(평가 관련 내용 포함)을 마련하고, 원격수업운영위원회* 심의를 거쳐 운영한다. * 단위학교의 학교학업성적관리위원회, 학교교육과정위원회 등과 통합 운영 가능 ‘초‧중등학교 및 특수학교 원격수업 운영 기준 안내’(교육부 학교교수학습혁신과-744(2023.1.27.)) 참조", "사. 소속 학교 이외 기관‧장소에서 수강한 과목은 각 호에 따라 성적을 산출한다. 1) 위탁학생의 소속 학교는 위탁기관에서 보내온 성적을 입력하되, 구체적인 반영 비율 및 방법은 학업성적 관리위원회 심의를 통해 결정한다. 2) 위탁교육기관이 평가를 시행하기 어려운 경우, 재적교에서 응시하는 것을 원칙으로 하되 구체적인 사항은 시도교육청의 학업성적관리 시행지침에 따른다. 3) 학교의 장은 소속 학생이 수업의 일부를 교육감이 지정한 교육기관에서 수강한 경우, 해당 학생의 성적을 위탁학생에 준하여 처리한다.", "▪위탁학생 성적처리 방식은 다음과 같다. 1. 위탁학생이 위탁교(기관)에서 성적을 취득한 경우, 위탁교(기관)의 성적을 인정하고, 재적교 성적산출에 포함하지 않는다. 이 때, 위탁교(기관)에서 보내온 성적은 동일 (유사) 과목*으로 인정하여 입력한다. 다만, 성적(성취도, 원점수, 과목평균, 표준편차, 석차등급 등)이 산출되지 않은 과목은 ‘과목별 세부능력 및 특기사항’에 문장으로 이수 내용만을 입력한다. * 위탁교육기관에서 보내온 과목이 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-자료관리], ‘성적의 {과목추가}-과목찾기’에서 조회되지 않을 경우 ‘과목찾기의 과목명 목록’에서 유사한 과목으로 선택함. 2. 위탁학생이 학기말 성적 처리 이전에 복교하는 경우, 재적교 성적산출에 포함하며, 자체 평가 실시 및 성적 처리가 불가한 위탁교(기관)에 위탁된 학생은 재적교 평가에 응시한다(미응시 시 처리 방법은", "[참고자료 7] ‘위탁학생, 병원학교･원격수업 등 학교 이외의 장소에서의 수강학생 처리’ 참조).", "▪소년보호기관 위탁 학생의 성적처리 방식은 다음과 같다. 1. ｢보호소년 등의 처우에 관한 법률｣의 적용을 받아 관련 시설에서 위탁교육 형식으로 학적이 처리되는 학생의 경우는 별표 9의 ‘4조의 라목 6)의 라)’, ‘6조의 다목’의 재･전･편입학생과 같이 처리한다. 다만, 상급학교 입학전형을 위한 내신성적 산출방법은 입학전형권자가 정해야 한다. 2. 소년보호기관 위탁 학생의 재적교 평가 응시 방법은 다음과 같다. ※ 법무부 소속 소년보호기관 중 수업일수는 인정하나 자체 평가 및 성적처리가 불가한 기관에 한함([참고자료 6] 소년보호기관 관련처리 참고). 가. 기관별 역할 구분 소년보호기관 재적교 1. 응시 희망자 조사 1. 소년보호기관과 평가 운영 방안 협의 2. 응시생 재적교 협조 공문 발송 평가 전 2. 소년보호기관 협조 공문 발송 3. 재적교와 평가 운영 방안 협의 3. 시험지 발송 4. 시험지 수령 <소년보호기관에서 응시> <재적교에서 응시> 1. 평가장 마련 1. 평가장 마련 평가 중 2. 감독관 배정 2. 감독관 배정 3. 평가 실시 후 답안지 수거 3. 평가 실시 후 답안지 수거 평가 후 시험지 수령과 동일한 방안으로 답안지 송부 답안지 수령 후 성적 처리 나. 유의사항 1) 평가 준비: 소년보호기관이 주관하고 재적교가 협조하여 평가 운영 준비 2) 시험지 및 답안지 송부: 소년보호기관과 재적교가 협의하여 인편 또는 등기우편으로 송부 ※ 일반우편 및 택배 발송을 금지하고, 업무 담당자 외 대리수령 불가 ※ 답안지는 시험지 수령과 동일한 방법으로 송부하는 것을 원칙으로 하되, 부득이한 경우 인편으로 수령하였더라도 등기우편으로 송부 가능 3) 평가 감독관 배정: 평가장을 마련한 곳에서 감독관 배정 ※ 평가 장소와 관계없이 소년보호기관 담당자는 반드시 감독관으로 배석 4) 학생이 미응시 할 경우, 결시 처리 방식은 소속 학교 학업성적관리위원회의 결정에 따라 처리", "▪직업교육 위탁과정 학생 성적처리 방식은 다음과 같다. 1. 직업교육 위탁과정은 아래 사항을 참고하여 입력한다. 가. 일반고등학교 및 자율고등학교의 직업교육 위탁과정 학생의 위탁교과와 특성화고등학교 (특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함) 및 특수목적고등학교 (산업수요 맞춤형 고등학교 포함)의 개인별 평가가 곤란한 전문(공), 실기(습) 교과는 평가한 원점수, 과목평균, 성취도 등을 기록하거나, 이수 여부만을 기록한다. 나. 일반고등학교 및 자율고등학교의 소속 학교에서 이수하는 보통교과 등의 수강자수는 소속 학교의 학생과 합해서 산출･입력한다. 다만, 학점이 일치하지 않을 경우 수강자수는 분리한다.", "다. 산업(정보)학교, 직업교육거점학교, 시도교육청이 인정하는 직업훈련기관 등 직업교육 위탁과정 담당 기관에서 평가한 이수 과목, 원점수, 과목평균, 과목표준편차, 성취도, 수강자수 등을 학생이 재적한 학교에 통보하면 이것을 그대로 입력해 줄 수 있다. ※ 위탁학생의 성적은 교육정보시스템 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-자료관리]의 ‘성적’ 항목에서 입력함.", "라. 단, 아래의 경우에 해당하여 성취도를 산출하지 않는 경우에는 ‘P(이수)’로 처리한다. <성취도를 산출하지 않는 경우> - 교육과정상 개인별 평가가 곤란하다고 판단되는 경우 - 성취도 산출이 위탁교육 목적 달성에 지장이 된다고 판단되는 경우 - 기타 이수 내용, 시간수, 수업절차, 운영방식 등을 고려할 때 성취도를 산출하지 않는 것이 타당하다고 판단되는 경우", "2. 시도교육청에서 운영하는 공동실습소 또는 직업교육센터 등, 일반고등학교(자율고등학교 포함), 특수목적고등학교(산업수요 맞춤형 고등학교 포함) 및 특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함) 등에서 개설한 교과(과정)를 계열(학과)이 서로 다른 학교의 학생들이 함께 수강한 경우의 수강자수는 계열(학과)별로 구분하여 산출할 수 있다.", "가. 계열(학과)구분", "① 일반고등학교(자율고등학교 포함) : 계열", "② 특성화고등학교, 산업수요 맞춤형 고등학교, 일반고 직업계열 학과 운영교 : 학과", "③ 특수목적고등학교(산업수요 맞춤형 고등학교 제외) : 계열(과학, 국제, 체육), 학과(외국어, 예술)", "<예시> 일반고등학교 A(10명), B(10명), C(10명), 산업수요 맞춤형 고등학교 D학과(12명), E학과(8명) 총 50명이 직업과정을 운영하는 학교 등에서 ‘드론 운용’을 수강하였을 경우 수강자수는 일반고등학교는 30명, 산업수요 맞춤형 고등학교는 D학과 12명, E학과 8명으로 분리하여 산출할 수 있음.", "▪현장실습생 성적처리 방식은 다음과 같다.", "1. 특성화고등학교 및 산업수요 맞춤형 고등학교 현장실습생(산학일체형 도제학교의 도제식 현장교육 훈련(OJT) 참여 학생 포함)에 대해서는 이수 여부, 실습기간을 해당 학교장 또는 시도교육감이 정하는 방법으로 아래 사항을 참고하여 입력한다. 가. 현장실습을 제외한 교과 성적은 학기별 종합 성적에 의하여 교과목별 원점수, 과목평균, 과목표준편차, 석차등급 또는 성취도, 수강자수를 산출한다. 나. 현장실습 성적은 산업체에서 평가한 것과 학교에서 평가한 것을 합산하여 실습 참여 학생의 성적으로 인정할 수 있다. 다. 창의적 체험활동상황 등 비교과 영역의 입력은 현장실습(현장실습과 연계한 취업 등) 기간 중 별도의 계획을 수립하여 실시하는 경우 재적학교 및 현장실습 대상 기관의 자료를 근거로 학급담임교사가 작성한다. 라. 현장실습을 전문교과에 포함하여 운영할 경우, 당해 학교의 학업성적관리규정에 구체적인 평가 방법 등이 포함되도록 하고, 원점수/과목평균(표준편차), 성취도(수강자수)를 산출하여 입력하되, 교과학습발달상황의 ‘세부능력 및 특기사항’에 현장실습유형, 직무분야(17개 교과군 중에서 입력), 기간, 내용을 다음 예시와 같이 입력한다. 과목 세부능력 및 특기사항 과목 세부능력 및 특기사항 현장실습유형: 현장체험학습(산업체 견학) 현장실습유형: 도제교육(미용) 현장실습 직무분야: 기계 현장실습 직무분야: 미용･관광･레저 실습기간: 2026.○○.○○.-2025.○○.○○. 실습기간: 2026.○○.○○.-2025.○○.○○. 실습내용: 자동차 조립 과정 견학 실습내용: 헤어디자인 L3 과목 세부능력 및 특기사항 과목 세부능력 및 특기사항 현장실습유형: 산업체 현장실습 현장실습유형: 기타(연계교육형 현장실습) 현장실습 직무분야: 재료 현장실습 직무분야: 디자인･문화 콘텐츠 실습기간: 2025.○○.○○.-2025.○○.○○. 실습기간: 2025.○○.○○.-2025.○○.○○. 실습내용: 피복 아크 용접 실습내용: 웹페이지 제작 및 유지 마. 현장실습을 교과목에 포함하지 않고 창의적 체험활동 등으로 운영하는 경우 해당 활동의 평가, 기록 방법에 따르고, 정규 교육과정 이외의 프로그램으로 운영하는 경우에는 해당 학년 교과학습발달상황의 ‘개인별 세부능력 및 특기사항’에 서술식으로 입력한다. 2. 특수교육 대상자의 현장 실습생에 대해서는 이수 여부, 실습기간을 해당 학교장 또는 시도교육감이 정하는 방법으로 입력하며, ‘1’의 가~마의 내용을 준용하여 입력할 수 있다. ※ 이때, ‘현장실습 직무분야’는 교육과정의 해당 교과(군) 중에서 입력함.", "▪ 「방송통신중학교 및 방송통신고등학교 설치 기준령」 제3조의2에 따라 학교 외 학습경험의 과목 이수 인정을 받은 방송통신고등학교 과목 이수 입력 방식은 다음과 같다.", "1. 「방송통신중학교 및 방송통신고등학교 설치 기준령」 제3조의2에 따라 과목 이수를 인정받은 학생은 ‘과목별 세부능력 및 특기사항’에(관련 과목이 개설되어 있지 않은 경우 ‘개인별 세부능력 및 특기사항’) 과목명, 이수학점을 문장으로 입력한다. 과목 세부능력 및 특기사항 생활과 과학: ‘학교 외 학습경험의 인정’을 통해 ○학점 이수함. 원점수/과목평균 성취도 학기 ➊교과 과목 학점수 석차등급 비고 (표준편차) (수강자수) 이수학점 합계 과목 ➋ 세부능력 및 특기사항 <진로 선택 과목> 성취도 학기 ➊교과 과목 학점수 원점수/과목평균 성취도별 분포비율 비고 (수강자수) 이수학점 합계 과목 ➋ 세부능력 및 특기사항 <체육･예술> 학기 ➊교과 과목 학점수 성취도 비고 이수학점 합계 과목 ➋ 세부능력 및 특기사항", "➊ 교과 가. 과목별 성적일람표(학기말)의 합계점수는 100점으로 환산하여 작성한다. 나. 정기시험, 수행평가, 학기말 평가의 성적처리는 교육정보시스템을 이용하여 처리한다. 다. 귀국학생 교과목 및 성적의 기록은 다음과 같이 처리한다.", "➋ 세부능력 및 특기사항 가. 세부능력 및 특기사항’은 학생참여형 수업 및 수업과 연계된 수행평가 등에서 관찰한 내용을 바탕으로 입력하되 과목별 성취기준에 따른 성취수준의 특성 및 학습활동 참여도, 자기주도적 학습에 의한 변화와 성장 정도를 중심으로 기재한다. ※ 과목별 세부능력 및 특기사항은 교과담당교사가 교육정보시스템의 [성적-성적처리-과목별세부능력 및 특기사항]에서 학기별로 입력할 수 있으며, 동일 과목에 대해 1학기와 2학기에 내용을 각각 입력하는 경우 교육정보시스템에 ‘(1학기)’, ‘(2학기)’와 같이 ‘(학기명)’이 자동으로 입력됨(2학기는 다음 줄에 표기됨). ※ 단, 대입수시 전형자료 생성 시에는 3학년의 과목별 세부능력 및 특기사항 중 ‘3학년 1학기(조기졸업생은 2학년 1학기)’ 내용만 생성･제공되고, ‘2학기’ 선택 후 입력한 내용은 반영되지 않음에 유의해야 함. ※ 개인별 세부능력 및 특기사항은 학급담임교사가 교육정보시스템의 [성적-성적처리-개인별세부능력 및 특기사항]에서 아래 ‘마’항의 범위를 유의하여 입력함. 나. 과목별 세부능력 및 특기사항은 모든 교과(군)의 모든 학생을 대상으로 입력하는 것을 원칙으로 한다. 1) 교과수업에 참여하지 못한 학생의 경우 그 사유를 ‘세부능력 및 특기사항’에 입력한다.", "<예시> 순회교육대상학생의 경우: 순회교육으로 특이사항 없음. / 장기결석생인 경우: 장기결석으로 특이사항 없음. / 위탁학생의 경우: 위탁학생으로 특이사항 없음.", "※ 순회교육, 위탁교육기관, 병원학교･원격수업 기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력함. 2) 학생이 해당 과목의 수업 활동에 대부분 참여하지 않아 관찰 내용이 없는 등 부득이한 경우에는 학업성적관리위원회의 심의를 통해 ‘특이사항 없음.’으로 입력할 수 있다.", "다. 전문교과Ⅱ의 기초과목, 실무과목은 과목별로 입력하되, 특기할 만한 사항이 있는 능력단위를 포함하여 다음과 같이 입력할 수 있다. ※ (학기명) 과목명: 학습활동 참여도 및 태도 등 (단, 능력단위명 기재시 “[능력단위: 능력단위명]”으로 표기) 과목 세부능력 및 특기사항 (1학기) 식품품질관리: 식품 제조의 전과정에서 품질관리의 절차와 방법을 이해하고 있음. [능력단위: 입고검사] 입고 시 발주서에 따라 원･부재료의 입고 품목을 확인하고 각 품목별 입고 절차를 체계적으로 수행함. 특히 샘플 검사 후 적합 여부를 판정하여 결과를 기록한 후 발표함.", "라. 학생건강체력평가(PAPS) 1등급을 체육 관련 교과의 ‘세부능력 및 특기사항’에 입력할 수 있다.", "마. ‘개인별 세부능력 및 특기사항’에 입력하는 사항은 다음과 같다. 항 목 내 용 한국학교 한국학교의 성적 산출 방식이 국내학교와 다른 경우 학력인정 대안학교 학력인정 대안학교의 성적 산출 방식이 전입교와 다른 경우 전･편입학, 귀국 등에 따른 전･편입학, 귀국 등에 따라 공통과목을 이수하지 못하여 온･오프라인의 방법으로 미이수 공통과목 보충 학습 과정 ‘보충 학습 과정’을 실시했는데 당해 학기에 관련 과목이 개설되지 않은 경우 영재교육 당해 학기에 관련 과목이 개설되어 있지 않은 경우 발명교육 당해 학기에 기술･가정, 과학 교과 모두 개설되지 않은 경우 방송통신고등학교의 학교 외 학습경험 당해 학기에 관련 과목이 개설되어 있지 않은 경우 인정에 따른 과목 이수 수업량 유연화에 따른 학교 자율적 특정 과목의 세부능력 및 특기사항으로 한정하기 어려운 경우 교육활동 교육감이 지정한 교육기관의 방송･정보통신매체를 활용한 수업을 수강하였으나 당해 교육감이 지정한 교육기관의 방송･ 학기에 관련 과목이 개설되어 있지 않은 경우(성적의 일부 또는 전부가 산출되지 않은 정보통신매체를 활용한 수업 과목에 한하여 수강 내용 기재) (온라인 수업) ※ 다만, 전‧편입학, 귀국 등에 해당하지 않는 학생이 온라인 보충과정을 통해 수강한 내용은 기재 불가 정규 교육과정 이외의 당해 학기에 현장실습을 전문교과에 포함하지 않거나 창의적 체험활동으로 운영하지 프로그램으로 운영하는 현장실습 않은 경우", "바. 수업량 유연화에 따른 학교 자율적 교육활동 내용 입력 방식 1) 「초·중등교육과정 총론(교육부고시 제2019-211호)」, 「고교 서열화 해소 및 일반고 교육역량 강화 방안」(교육부 학교혁신정책과-6170, ’19.11.25.)에 따라 ‘수업량 유연화에 따른 학교 자율적 교육활동’ 관련 내용을 해당 과목의 ‘세부능력 및 특기사항’ 또는 ‘개인별 세부능력 및 특기사항’에 입력할 수 있다. ※ 입력여부는 교육적 유의미성 등을 고려하여 학교에서 판단하고, 관련 과목의 ‘세부능력 및 특기사항’ 및 ‘개인별 세부능력 및 특기사항’ 등에 중복기재가 되지 않도록 유의함. 가) 학교 자율적 교육활동이 교과와 연계되는 경우에는 해당과목의 ‘세부능력 및 특기사항’에 입력할 수 있다. 나) 학교 자율적 교육활동이 특정 과목의 세부능력 및 특기사항으로 한정하기 어려운 경우 등에는 ‘개인별 세부능력 및 특기사항’에 입력할 수 있다.", "사. 교과학습발달상황의 ‘세부능력 및 특기사항’에 다음의 항목은 입력할 수 없다. 1) <학교생활기록부 작성 시 유의사항>에서 기재를 금지하고 있는 사항 2) 교내·외 대회 참여 사실과 그 성적 및 수상실적 ※ 대회와 관련하여, 대회의 명칭을 단순행사로 변경하여 입력하는 행위 불가(‘세부능력 및 특기사항’을 포함하여 ‘수상경력’ 이외 학교생활기록부 어떠한 항목에도 변경 입력 불가) 3) K-MOOC, MOOC, KOCW 등 관련 사항 4) 방과후학교 활동 5) 연구보고서(소논문) 관련 사항 ※ 다만, 정규교육과정의 교과 성취기준에 따라 수업 중 연구보고서(소논문) 작성이 가능한 과목*은 특기할 만한 사항이 있는 과목 및 학생에 대하여 연구보고서(소논문) 실적(제목, 연구 주제 및 참여인원, 소요시간)을 제외하고 ‘세부능력 및 특기사항’을 기재할 수 있음. * 연구보고서(소논문) 작성 가능 과목: 수학과제 탐구, 사회문제 탐구, 융합과학 탐구, 과학과제 연구, 사회과제 연구", "➌ 기타 가. 방송･정보통신매체를 활용한 수업(온라인수업) 성적처리 및 입력 방식은 다음과 같다. 1) 교육감이 지정한 교육기관 등에서 「초･중등교육법 시행령」 제48조제4항에 따라 방송･정보통신매체를 이용한 수업을 전부 또는 일부 받은 학생의 경우 위탁학생에 준하여 성적을 처리한다. 가) 위탁학생이 위탁교(기관)에서 성적을 취득한 경우, 위탁교(기관)의 성적을 인정하고, 재적교 성적산출에 포함하지 않는다. 이때, 위탁교(기관)에서 보내온 성적은 동일(유사) 과목으로 인정하여 입력한다. 나) 다만, 성적(성취도, 원점수, 과목평균, 표준편차, 석차등급 등)의 일부 또는 전부가 산출되지 않은 과목은 ‘세부능력 및 특기사항’에(관련 과목이 개설되어 있지 않은 경우 ‘개인별 세부능력 및 특기사항’) 문장으로 수강내용(과목명, 수강기간, 수강시간)만을 입력한다. ※ 단, 전․편입학, 귀국 등에 해당하지 않는 학생이 온라인 보충과정을 통해 수강한 내용은 기재 불가 나. 영재교육 이수내용 입력 방식은 다음과 같다. 1) 「영재교육진흥법」에 따른 영재교육기관(영재학교, 영재학급, 영재교육원)에서 수료한 영재교육 관련 내용은 관련 교과의 [성적-성적처리-과목별세부능력및특기사항]에서 ‘영재·발명교육 기록사항’에만 입력한다(「영재교육진흥법 시행령」 제36조제1항·제2항). ※ 단, 당해 학기에 관련 과목이 개설되어 있지 않은 경우 [성적-성적처리-개인별세부능력및특기사항]의 ‘영재･ 발명 교육 기록사항’에 입력하되, 체험활동 등 특기사항은 입력하지 않음. ※ 영재학교: 영재교육을 위하여 이 법에 따라 지정되거나 설립되는 고등학교과정 이하의 학교(「영재교육 진흥법」", "[참고] 영재교육기관", "▸영재학교: 영재교육을 위하여 이 법에 따라 지정되거나 설립되는 고등학교과정 이하의 학교(「영재교육 진흥법」", "▸영재학급: 「초･중등교육법」에 따라 설립･운영되는 고등학교과정 이하의 각급 학교에 설치･운영하여 영재교육을 실시하는 학급(「영재교육 진흥법」 제2조제5호)", "▸영재교육원: 영재교육을 실시하기 위하여 「고등교육법」 제2조에 따른 학교(대학･산업대학･교육대학･ 전문대학･ 방송대학･통신대학･방송통신대학･사이버대학･기술대학･각종학교) 및 이에 준하는 학교로서 다른 법률에 따라 설치된 학교 등에 설치･운영되는 부설기관(「영재교육 진흥법」 제2조제6호) 기재 방법", "▸영재교육기관(영재학교, 영재학급, 영재교육원) 이수내용을 입력할 경우에는 구체적인 기관 명칭은 입력하지 않음.", "<예시> 영재교육원에서 1학년 과정 정보 영역(120시간) 110시간을 이수함. / 영재학급에서 1학년 과정 정보 영역(120시간) 120시간을 이수함.", "▸[성적-성적처리-과목별세부능력및특기사항] 또는 [개인별세부능력및특기사항]의 ‘영재･발명교육 기록사항’에 입력하면 해당 내용이 대입전형자료에서 제외됨.", "▸입력된 글자 수는 ‘세부능력 및 특기사항’의 글자 수에 산입되지 않음. ※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 영재교육 실적은 제공하지 않음.", "다. 발명교육 수료내용 입력 방식은 다음과 같다. 1) 발명교육센터에서 운영하는 교육과정을 수료한 학생의 교육실적은 「발명교육의 활성화 및 지원에 관한 법률 시행령」 제10조제2항･제3항에 따라 관련 교과(기술･가정 또는 과학)의 [성적-성적처리-과목별 세부능력 및특기사항]에서 ‘영재･발명교육 기록사항’에만 입력한다. ※ 단, 당해 학기에 관련 과목이 개설되어 있지 않은 경우 [성적-성적처리-개인별세부능력및특기사항]의 ‘영재･ 발명교육 기록사항’에 입력하되, 체험활동 등 특기사항은 입력하지 않음. ※ 발명교육센터를 설치･운영하는 중앙행정기관 또는 지방자치단체는 해당 발명교육센터에서 운영하는 교육과정을 수료한 학생의 교육실적 자료를 매년 1월 31일을 기준으로 하여 매 학년도 말일까지 학생이 소속된 학교의 장에게 송부하여야 함(「발명교육의 활성화 및 지원에 관한 법률 시행령」 제10조제2항). ※ 교육 수료증이 발급되는 초급(기초)･중급･고급(심화) 또는 특별과정 등 발명교육센터에서 운영하는 교육과정 교육실적 자료를 입력하며(학교 자체 실시 과정 제외), 이 경우 구체적인 센터의 명칭을 입력하지 않음.", "<예시> 발명교육센터에서 실시한 ‘발명･특허 기초과정(20시간)’을 수료함. / 발명교육센터에서 실시한 ‘발명･ 특허 고급과정(20시간)’을 수료함.", "▸[성적-성적처리-과목별세부능력및특기사항] 또는 [개인별세부능력및특기사항]의 ‘영재･발명교육 기록사항’에 입력하면 해당 내용이 대입전형자료에서 제외됨..", "▸입력된 글자 수는 ‘세부능력 및 특기사항’의 글자 수에 산입되지 않음. ※ 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 발명교육 실적은 제공하지 않음.", "라. 학적변동자 성적처리 방식은 다음과 같다. 1) 교육인적자원부 훈령 제616호(2001.03.29.)의 적용을 받았던 학생이 재입학 등의 사유로 교육인적 자원부 훈령 제671호(2005.02.25.) 이후 훈령의 적용을 받는 경우에는 양식은 변경하지 않고 해당 학기 성적을 입력하고 ‘비고’에 해당 사유를 명시하며 학교는 기존 출력물을 함께 보관한다. 원점수/과목평균 성취도 학기 교과 과목 단위수 석차등급 비고 (표준편차) (수강자수) 1 수학 공통수학 4 수 1(3)/ 240 재입학 이수단위 합계 2) 훈령 제243호(2018.3.1.)의 적용을 받았던 학생이 복학 등의 사유로 제477호(2024.3.1.)의 적용을 받는 경우에 보통교과 ‘과학탐구실험’과 ‘진로 선택 과목’은 ‘석차등급’이 있는 양식에 해당 학기의 성적을 그대로 연동하고, ‘비고’에 그 ‘사유’(진로선택과목은 ‘사유’ 및 ‘진로선택’)를 명시하며 학교는 기존 출력물을 함께 보관한다. ※ 대입 정보 제공 시 ‘석차 등급’이 산출된 과목은 ‘성취도’를 제공하지 않고 ‘석차등급’을 제공함.", "<예시> 2018학년도 신입생이 1학기 종료 후 휴학하였다가 2024학년도 2학기에 복학한 경우 - 1학기 성적은 취득한 성적을 그대로 인정하여 각 교과(군)의 해당 항목에 입력하되, 다음의 사항에 유의함. ※ (과학탐구실험) 성적 산출 방식 변경, (진로선택과목) 성적 산출 방식 및 학생부 양식 변경 1) 1학기에 이수한 ‘과학탐구실험’은 ‘원점수 / 과목평균(표준편차), 성취도(수강자수), 석차등급’을 모두 입력하고 ‘비고’에 그 ‘사유(복학)’를 명시함. 2) 1학기에 이수한 ‘진로선택과목’은 신설된 ‘진로선택과목’이 아닌, ‘석차등급’이 있는 양식에 ‘원점수/과목평균 (표준편차), 성취도(수강자수), 석차등급’을 입력하고 ‘비고’에 ‘사유(복학)’ 및 ‘진로선택’을 명시함.", "<예시> 교과학습발달상황 입력 [1학년] 원점수/과목평균 성취도 학기 교과 과목 학점 석차등급 비고 (표준편차) (수강자수) … … … … … … 1 체육 스포츠 생활 2 98/78(5.2) A(150) 1 복학, 진로선택 과학 과학탐구실험 1 98/75(8.5) A(150) 1 복학 과학 과학탐구실험 1 95/73 A(135) … … … … … … 이수학점 합계 <진로선택과목> 성취도 학기 교과 과목 학점 원점수/과목평균 성취도별 분포비율(%) 비고 (수강자수) 국어 실용국어 4 96/72 A(150) A(30.2) B(45.3) C(24.5) … … … … … … 이수학점 합계 마. 소년보호기관 위탁 학생의 재적교 평가 응시 방법은 다음과 같다. ※ 법무부 소속 소년보호기관 중 수업일수는 인정하나 자체 평가 및 성적처리가 불가한 기관에 한함([참고자료 6] 소년보호기관 관련처리 참고). 1) 기관별 역할 구분 소년보호기관 재적교 1. 응시 희망자 조사 1. 소년보호기관과 평가 운영 방안 협의 2. 응시생 재적교 협조 공문 발송 평가 전 2. 소년보호기관 협조 공문 발송 3. 재적교와 평가 운영 방안 협의 3. 시험지 발송 4. 시험지 수령 <소년보호기관에서 응시> <재적교에서 응시> 1. 평가장 마련 1. 평가장 마련 평가 중 2. 감독관 배정 2. 감독관 배정 3. 평가 실시 후 답안지 수거 3. 평가 실시 후 답안지 수거 평가 후 시험지 수령과 동일한 방안으로 답안지 송부 답안지 수령 후 성적 처리 2) 유의사항 가) 평가 준비: 소년보호기관이 주관하고 재적교가 협조하여 평가 운영 준비 나) 시험지 및 답안지 송부: 소년보호기관과 재적교가 협의하여 인편 또는 등기우편으로 송부 ※ 일반우편 및 택배 발송을 금지하고, 업무 담당자 외 대리수령 불가 ※ 답안지는 시험지 수령과 동일한 방법으로 송부하는 것을 원칙으로 하되, 부득이한 경우 인편으로 수령하였더라도 등기우편으로 송부 가능 다) 평가 감독관 배정: 평가장을 마련한 곳에서 감독관 배정 ※ 평가 장소와 관계없이 소년보호기관 담당자는 반드시 감독관으로 배석 라) 학생이 미응시 할 경우, 결시 처리 방식은 소속 학교 학업성적관리위원회의 결정에 따라 처리 바. 특수교육 교육과정의 전문 교과Ⅲ 1) 2015 개정 특수교육 교육과정의 ‘전문 교과Ⅲ’는 전문 교과Ⅱ의 성적처리 유형 및 평가 방법 등을 준용하여 처리한다.  교과학습발달상황의 주요 용어 정리  (성취평가제) ‘학생이 무엇을 어느 정도 성취하였는가’라는 평가의 본래적 의미를 강조하는 평가제도  (성취기준) 각 교과목에서 학생들이 학습을 통해 성취하기를 기대하는 지식･이해, 과정･기능, 가치･태도 등의 능력 과 특성을 진술한 것으로 교수･학습 및 평가의 실질적인 근거로써 교사가 무엇을 가르치고 평가해야 하는지, 학생이 무엇을 공부하고 성취해야 하는지에 관한 실질적인 지침이 됨  (성취수준) 학습 정도를 판단하기 위해 각 성취기준에 도달한 정도를 3~5단계로 구분하고 각 단계에 속한 학생들이 무엇을 알고, 할 수 있는지를 기술한 것으로 성취기준별 성취수준 및 영역별 성취수준으로 구성  (영역별 성취수준) 영역에 해당하는 교수･학습이 끝났을 때 학생이 성취하기를 기대하는 지식･이해, 과정･기능, 가치･태도에 도달한 정도를 수준별로 ‘종합적’이고 ‘포괄적’으로 기술한 것  (학기 단위 성취수준) 학생이 한 학기 동안 학습한 성취기준에 도달한 정도를 종합하여 나타내는 지표로서, 과목 내 성취기준을 포괄하는 전반적인 특성을 나타내며, 한 학기 동안 교수･학습 목표를 설정하고, 수업 및 평가를 계획하고 운영하는 데 기초 자료로 활용할 수 있음  (최소 성취수준) 각 과목의 교수‧학습이 끝났을 때 학생들이 성취하기를 기대하는 지식･이해, 과정･기능, 가치･태도에 최소한으로 도달한 정도를 의미함  (정기시험) ‘중간 또는 기말고사(1회, 2회고사 등)’와 같은 ‘일제식 정기고사’를 의미하며, ‘문항정보표’의 구성에 따라 ‘선택형’과 ‘서답형’으로 구분. 단, ‘영어듣기평가’는 수행평가로 간주할 수 있으며, 학교에서 형성평가 및 수행평가의 일환으로 실시하는 ‘선택형’ 및 ‘서답형’ 문항으로 구성된 평가는 본 훈령의 ‘정기시험’에 해당하지 않음 ※ 정기시험 문항 중 선택형 문항(진위형, 배합형, 선다형), 서답형 문항(완성형, 단답형, 서술형, 논술형)의 구분은 「고등학 교 학생평가 안내서(톺아보기)」 자료 참고  (수행평가) 교과담당교사가 교과 수업시간에 학습자들의 학습과제 수행 과정 및 결과를 직접 관찰하고, 그 관찰 결과를 전문적으로 판단하는 평가방법 ※ 수행평가 과제 유형은 「고등학교 학생평가 안내서(톺아보기)」 자료를 참고 (예) 서술･논술, 구술･발표, 토의･토론, 프로젝트, 실험･실습, 포트폴리오 등 ※ 수행평가에서 사용하는 용어는 다음과 같은 의미를 가짐 가) 학습과제: 학습자들에게서 성취되기를 기대하는 교육과정상 각 교과 교육목표와 관련되는 것으로, 실제 생활에 가치 있고 중요하며 유용한 과제를 의미 나) 수행: 학생이 단순히 답을 선택하는 것이 아니라, 학생 스스로 답을 구성하는 것, 산출물이나 작품을 만들어내는 것, 태도나 가치관을 행동으로 드러내는 것 등을 모두 포함 다) 관찰: 학습자가 수행하는 과정이나 그 결과를 평가자가 읽거나, 듣거나, 보거나, 느끼거나 하는 활동을 모두 포함 라) 판단: 평가자가 관찰한 것을 객관성･합리성･타당성･신뢰성 등이 있는 기준을 준거로 점수화하거나, 문장화하는 것을 의미 ", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 석차등급별 누적비율 — 3학년 9등급제</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>석차등급</th><th>석차누적비율</th></tr></thead><tbody><tr><td>1등급</td><td>~ 4% 이하</td></tr><tr><td>2등급</td><td>4%~11% 이하</td></tr><tr><td>3등급</td><td>11%~23% 이하</td></tr><tr><td>4등급</td><td>23%~40% 이하</td></tr><tr><td>5등급</td><td>40%~60% 이하</td></tr><tr><td>6등급</td><td>60%~77% 이하</td></tr><tr><td>7등급</td><td>77%~89% 이하</td></tr><tr><td>8등급</td><td>89%~96% 이하</td></tr><tr><td>9등급</td><td>96%~100% 이하</td></tr></tbody></table></div></div>__ENDTABLE__"]}, {"id": "book", "title": "독서활동상황", "emoji": "📗", "page_range": "p.162~163", "items": ["제15조의3(독서활동상황)", "① 중･고등학교의 ‘독서활동상황’에는 독서활동에 특기할 만한 사항이 있는 학생을 대상으로 교과별･ 개인별 독서활동상황을 학기 단위로 입력한다.", "▪‘독서활동상황’에는 학기를 구분하여 학생이 읽은 책의 제목과 저자를 입력한다. ※ ‘(1학기)’, ‘(2학기)’는 교육정보시스템에서 학기별로 입력 시 자동으로 입력됨.", "② 독서활동상황은 학생이 읽은 책의 제목과 저자를 교과 담당교사 또는 학급 담임교사가 입력한다.", "▪독서활동은 교과목별로 해당 교과 관련 독서활동을 교과담당교사가 입력하되, 특정 교과에 해당하지 않을 경우 학급담임교사가 공통으로 입력할 수 있다.", "▪독서활동상황은 독서기록장, 독서 포트폴리오, 독서로(구 독서교육종합지원시스템)의 증빙자료를 근거로 입력하며, 증빙자료는 학생 개인이 보관한다.", "▣ 독서활동상황 학년 ➊ 과목 또는 영역 ➋ 독서 활동 상황", "➊ 과목 또는 영역 가. ‘과목 또는 영역’에는 교과담당교사가 입력하는 경우 해당 과목명이, 학급담임교사가 입력하는 경우 ‘공통’이 자동으로 입력된다. 기재 방법", "▸ 교과담당교사는 교육정보시스템의 [성적-성적처리-과목별독서활동]에서 입력함.", "▸ 학급담임교사는 [학생생활-독서활동상황-독서활동상황기록]에서 입력함.", "➋ 독서활동상황 가. ‘독서활동상황’에는 독서활동에 특기할 만한 사항이 있는 학생을 대상으로 읽은 책을 ‘도서명(저자)’ 형식으로만 입력한다. ※ 독서 과정의 관찰･확인이 어려운 독서 성향 등은 기재하지 않고, 읽은 책의 제목과 저자만 기재하여 독서활동 기록의 신뢰도를 제고함. ※ ISBN에 등재된 도서에 한해 기재 가능하며 정기간행물 즉, ISSN에 등재된 도서는 기재할 수 없음. ※ 도서명과 저자명에 쓰인 대학명, 상호명, 기관명 등은 입력할 수 있음.", "<예시> 국어 교과의 경우 학년 과목 또는 영역 독서 활동 상황 (1학기) 공중그네(오쿠다 히데오), 꿈꾸는 다락방(이지성), 교실 밖 국어여행(강혜원 외) 1 국어 (2학기) 연을 쫓는 아이(할레드 호세이니), 세 잔의 차(그레그 모텐슨, 데이비드 올리버 렐린), 데미안(헤르만 헤세)", "나. 학생이 동일한 책을 반복하여 읽고 동일하지 않은 독서 증빙자료를 제출한 경우, 학년･학기･ 과목(또는 영역)에 상관없이 중복하여 입력할 수 있다. ※ 원서와 한국어 번역본을 읽고 동일하지 않은 증빙자료를 제출한 경우에도 각각 입력할 수 있음.", "다. 단순 독후활동(감상문 작성 등) 외 교육활동을 전개하였다면, 도서명을 포함하여 그 내용을 다른 영역(교과학습발달상황 세부능력 및 특기사항, 창의적 체험활동상황 영역별 특기사항 등)에 입력할 수 있다. ※ 다만, 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 ‘독서활동상황’은 제공하지 않음."]}, {"id": "behavior", "title": "행동특성 및 종합의견", "emoji": "✏️", "page_range": "p.164~168", "items": ["15 행동특성 및 종합의견", "제16조(행동특성 및 종합의견)", "① ‘행동특성 및 종합의견’에는 학년 동안 지속적으로 관찰한 학생의 행동특성을 바탕으로, 학생을 총체적으로 이해할 수 있는 종합의견을 학급 담임교사가 문장으로 입력한다.", "▪‘행동특성 및 종합의견’은 모든 학생에 대해 입력하며, 행동특성을 포함한 각 항목에 기록된 자료를 종합하여 학급담임교사가 문장으로 입력한다. ※ 학급담임교사가 직접 관찰이 불가능한 경우 그 사유를 입력할 수 있음.", "▪학생의 학습, 행동 및 인성 등 학교 교육활동 전반에서 지속적으로 관찰된 학생의 행동특성을 바탕으로 입력하고, 학생의 성장 정도, 특기사항, 발전 가능성 등을 고려하여 학생의 성장을 지원하는 교육적 관점에서 작성한다. ※ 행동특성과 관련한 누가기록 여부 및 방법은 학교장이 정하되, 학생의 부정적인 행동특성을 입력하는 경우에는 학생의 행동특성이 구체적으로 드러나도록 누가 기록할 것을 권장함.", "▣ 행동특성 및 종합의견 학년 ➊ 행동특성 및 종합의견", "➊ 행동특성 및 종합의견 가. 종합의견은 학기를 구분하여 입력할 수 있으며, 학기별로 입력하는 경우 교육정보시스템에 ‘(1학기)’, ‘(2학기)’와 같이 직접 입력한다. ※ 교육정보시스템을 이용하여 누가 기록하는 경우에는 [학생생활-행동특성및종합의견-행동특성및종합의견]의 {누가기록} 탭에서 입력함. 나. 다른 항목에 입력할 수 없는 내용(방과후학교 활동 등)은 행동특성 및 종합의견에도 입력할 수 없다. ※ <학교생활기록부 작성 시 유의사항>을 참고함. 다. 체육･예술활동은 학교교육활동을 통한 체육 및 예술활동을 종합적으로 입력할 수 있다. 라.「영재교육진흥법」에 따른 영재교육기관(영재학교, 영재학급, 영재교육원)에서 수료한 영재교육 관련 내용은 ‘행동특성 및 종합의견’에 입력하지 않고, 교과학습발달상황 ‘세부능력 및 특기사항’에 입력한다(「영재교육진흥법 시행령」 제36조제1항·제2항). 16 기타사항", "① ‘졸업 대장 번호’에는 졸업대장의 번호를 입력한다.", "② ‘구분’에는 학생의 학과, 반, 번호, 담임성명을 입력한다. 다만, 변경사항이 있을 경우 변경 전･후의 내용을 모두 입력한다.", "③ ‘전공･과정’에는 특성화고등학교 및 산업수요 맞춤형 고등학교의 학기별 세부전공, 산업체 실습과정 또는 일반고등학교, 특수목적고등학교 및 자율고등학교의 개인별 과정선택 등 교육과정 이수에 따른 특기사항을 입력한다. 또한, 특성화고등학교 및 산업수요 맞춤형 고등학교의 학생이 타학과 과목을 부전공으로 이수한 경우, 과정명을 입력한다.", "▪특성화고등학교 및 산업수요 맞춤형 고등학교의 학기별 세부전공(전공과정명) 이수, 산업체 실습과정 현장실습 등을 명확히 구별하고, 일반고등학교, 특수목적고등학교 및 자율고등학교의 개인별 과정 선택, 직업교육 위탁과정, 대안교육 위탁교육기관 등 교육과정 이수에 따른 특기사항을 입력한다. 단, 특성화고등학교 및 산업수요 맞춤형 고등학교에서 타학과 수업을 24학점 이상 이수하면 ‘부전공’으로 입력한다.", "④ ‘사진’에는 입학년도에 촬영한 천연색 상반신 사진(3.5㎝×4.5㎝, 전산자료)을 입력하며, 졸업학년도에 촬영한 사진으로 교체 입력한다.", "▪졸업학년도에 교체 입력하는 것은 여권용 사진으로 한다.", "➊ 졸업 대장 번호 구분 ➋ 학과 반 번호 ➌ 담임성명", "➎ 전공･과정 1학기 2학기 비고", "➊ 졸업 대장 번호 가. ‘졸업 대장 번호’는 졸업대장의 번호를 입력한다. 기재 방법", "▸교육정보시스템의 [학적-졸업/수료 관리-졸업/수료대장 번호 부여]", "➋ 학년반 이력 가. 학과, 학년, 반, 번호의 변경 시 변경 내용을 모두 입력한다.", "➌ 학급담임교사 이력 가. 학년 중 학급담임교사가 변경된 경우 학교장이 임명한 학급담임교사는 모두 입력하되, 줄이 바뀌어 표시되도록 한다. 기재 방법", "▸교육정보시스템의 [교육과정-학급담임편성관리-학급담임편성관리]에서 ‘학생부반영’과 ‘이력추가’를 선택한 후 등록함.", "▸학급담임교사가 A교사 → B교사 → C교사로 변경된 경우에는 A교사, B교사, C교사 모두 입력함.", "▸학급담임교사가 A교사 → B교사 → A교사로 변경된 경우에는 A교사, B교사, A교사 모두 입력함.", "나. 한 학급에 복수로 학급담임교사를 임명한 경우 복수로 임명된 학급담임교사를 모두 입력하되, 같은 줄에 나란히 표시되도록 한다.", "➍ 사진 가. 입력하는 사진은 학생의 얼굴을 잘 식별할 수 있도록 원형을 유지해야 한다. ※ 입학년도에 모자를 쓰지 않고 촬영한 천연색 상반신 사진(3.5㎝×4.5㎝)을 입력함. 나. 교육정보시스템 입력용 사진의 파일용량은 200KB(JPEG 형식 기준, 해상도 300dpi 정도)까지 지원하며, [학적-기본학적관리-사진일괄입력]의 {사진일괄변환}을 활용하여 입력할 수 있다.", "➎ 전공･과정 가. 산업계의 수요에 직접 연계된 교육과정을 운영하는 산업수요 맞춤형 고등학교, 특성화고등학교, 일반고등학교 직업계열학과의 학기별 세부전공(전공과정명) 이수, 산업체 실습과정, 일반고등학교･ 특수목적고등학교･자율고등학교의 개인별 과정선택을 입력한다. ※ <예시> (세부전공) CNC 선반과정 나. 전공･과정은 교육정보시스템의 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-위탁･현장실습 학생 학교생활기록부Ⅱ)의 ‘학교폭력 조치상황 관리’에 입력된 ｢학교폭력 예방 및 대책에 관한 법률｣ 제17조제1항제1호･제2호･제3호의 조치사항을 학생의 졸업과 동시에 삭제하여야 한다."]}, {"id": "correct", "title": "자료의 정정", "emoji": "🔧", "page_range": "p.171~177", "items": ["제19조(자료의 정정)", "① 학교는 학년도 종료일까지 학교생활기록부 작성을 마감하고, 마감 이후에는 이전의 입력 자료에 대한 정정을 원칙적으로 금지한다.", "▪학교생활기록부의 당해 학년도 입력이 완료되면 학교생활기록부Ⅱ 출력물과 각종 보조부의 내용을 3회 이상 대조･확인 작업을 철저히 하여 오류가 없도록 한다. ※ 당해 학년도 학교생활기록부 대조･확인 작업은 당해 학교별로 별도의 계획을 수립하여 실시하되, 대조･확인 방법은 학교별로 정하여 실시함.", "② 제1항에도 불구하고 객관적인 증빙자료가 있는 경우에만 정정이 가능하다. 이 경우, 반드시 정정내용에 관한 증빙자료를 첨부하여 증빙자료의 객관성 여부, 정정의 사유, 정정내용 등에 대하여 학교 학업성적관리위원회의 심의 절차를 거친 후 학교생활기록부 정정대장(별표 10의 1조)의 결재 절차에 따라 재학생은 정정 사항의 발견 학년도 학급 담임교사, 졸업생은 업무 담당자가 정정 처리해야 한다. 다만, 제7조의 인적･학적사항 중 학생정보의 정정은 학업성적관리위원회의 심의를 생략할 수 있다.", "▪당해 학년도 이전의 학교생활기록부 입력 자료에 대한 정정은 원칙적으로 금지하나 객관적인 증빙자료가 있는 경우에 한해서 학업성적관리위원회의 심의 절차를 거쳐 학교생활기록부를 정정할 수 있다. 다만, 인적･학적사항의 ‘학생정보’의 정정은 학업성적관리위원회의 심의 절차 없이 증빙자료만으로 학교생활기록부를 정정할 수 있다. 1. 서술형 항목의 정정을 위한 객관적 증빙자료는 다음 기준을 모두 충족해야 한다. 가. 해당 증빙자료가 해당 학년도에 작성되었는지를 객관적으로 확인할 수 있는지 여부 나. 해당 증빙자료가 훈령과 지침(기재요령)에 명시된 항목별 입력 주체가 작성한 것임을 객관적으로 확인할 수 있는지 여부 2. 1에 따른 정정 외에도 훈령과 지침(기재요령)에 명시된 항목별 입력 주체의 과실로 인해 발생한 다음 3가지 경우에 한하여 해당 학년도의 학생의 교육활동 결과물 등을 바탕으로 학교생활기록부를 정정할 수 있다. 가. 서술형 항목의 영역별 기재 내용 전체가 학생 간에 동일한 경우 나. 서술형 항목의 영역별 기재 내용 전체가 학생 간에 뒤바뀐 경우 다. 서술형 항목의 영역별 기재 내용 전체가 누락된 경우 3. 학교가 2에 따른 사안으로 인해 학교생활기록부를 정정하는 경우, 학업성적관리위원회에서는 해당 교사에게 확인서를 제출받아 과실 여부를 판단하고, 정정 필요시 정정내용에 허위 또는 과장 기재가 없는지 철저히 확인해야 한다. 4. 정정내용은 1차적으로 해당 학년도의 항목별 입력 주체가 작성하며, 만약 입력 주체의 부재(전근, 퇴직, 사망, 연락 두절 등)로 인해 정정내용에 대한 초안 작성이 어려운 경우, 정정을 위해 필요한 자료를 토대로 학업성적관리위원회에서 정정내용을 결정한다. ※ 다만, 입력 주체의 전근은 가급적 공문을 통해 정정내용에 대한 초안을 송부받아 처리해야 하며, 부득이 어려운 경우에만 학업성적관리위원회에서 정정 내용을 결정하도록 함.", "▪학교생활기록부의 입력 내용에 대한 책임은 자료입력 당시의 사용자(학급담임교사, 업무담당교사 등)에게 있으며, 발견 학년도의 학급담임교사가 정정한다. 정정입력이 완료되면 입력 내용을 출력하여 그 출력물과 각종 보조자료의 내용과 대조･확인 작업을 실시하여 이상여부를 확인한다. ※ 제적, 자퇴, 퇴학 등 학업 중단 학생의 학교생활기록부도 객관적인 증빙자료가 있는 경우 정정할 수 있으며, 정정은 업무담당자가 수행함.", "▪졸업생의 학교생활기록부(종전의 모든 학교생활기록부 포함)의 내용에 정정사항이 발견되었거나 정정을 요구하는 민원이 있을 경우에는 현재 관리･보관하고 있는 학교생활기록부를 학교장이 「학교생활기록 작성 및 관리지침」 별표 10의 1조 서식에 따라 정정하여야 한다. 이 경우 그 근거가 되는 증빙자료를 첨부하여야 한다. ※ 졸업생의 학교생활기록부 정정은 업무담당자가 수행함.", "③ 학교생활기록부 정정대장은 별표 10에 따라 기재 및 관리하며, 교육정보시스템에서 제공하는 결재 절차를 거쳐 학기 중에는 전자문서로 관리하고 매 학년도 말 처리가 종료되면 출력하여 증빙자료와 함께 준영구 보관한다.", "④ 학교의 장은 「초･중등교육법」 제30조의6제1항제1호 및 제2호에 따라 학교생활기록부(별지 제1호 서식부터 제12호까지의 서식 가운데 하나)를 감독･감사 권한을 가진 행정기관 또는 상급학교에 제공하는 경우 교육부, 시도교육청 또는 입학전형을 실시하는 상급학교의 요청에 따라 해당 학생의 학교생활기록부 정정대장(별표 10의 1조)을 제공할 수 있다.", "⑤ 학교의 장은 제4항에 따라 정정대장을 제공할 경우 다음 각 호의 어느 하나에 해당하는 내용 중 학생의 개인정보를 보호할 필요가 있다고 판단되는 사항은 제외하여 제공해야 한다. 1. 학생 본인 및 가족(보호자 포함)의 질병명 등 2. ‘인적･학적사항’의 학생 성명, 성별, 주민등록번호, 주소 3. 제18조제4항･제6항에 따른 조치사항 삭제와 관련된 내용", "별표 10(학교생활기록부 정정대장 기재 및 관리)", "1. 학교생활기록부 정정대장 정정 대상자 정정 사항 결재 및 입력확인 일련 정정 오류 정정 학년도･학년･반･번호 정정 담임 담당 번호 연월일 성명 항목 내용 내용 교감 교장 (졸업대장번호) 사유 (담당) 부장 (정정 전) (정정 후)", "2. 정정대장 기재 및 관리방법 가. 정정사항은 학년도 단위로 작성하여 증빙자료와 함께 합철하며, 일련번호는 학년도별로 일련번호를 기재한다. 정정대상자가 졸업생일 경우, 졸업대장번호를 병기한다.", "▪학교생활기록부 정정대장은 학년도 단위로 작성･관리한다. ※ 동일 학년도에는 재학생과 졸업생이 하나의 정정대장을 사용함.", "▪학교생활기록부 정정과 관련된 증빙자료는 학교생활기록부 정정대장 일련번호 순으로 정리하여 보관한다.", "나. 학급 담임(담당)교사는 반드시 정정사유를 확인할 수 있는 증빙자료를 첨부하여 학교 학업성적관리위원회의 심의를 거친 후(인적･학적사항의 학생정보 정정은 생략 가능) 학교생활기록부 정정대장(별표 10의 1조)의 결재 절차를 거쳐 정정 처리해야 한다. 다만, 학생 본인 및 가족(보호자 포함)의 질병명을 삭제할 경우에는 증빙자료 없이 사유를 ‘개인정보 보호’로 하여 학교장 결재를 거쳐 정정할 수 있다.", "▪이전 학년도 학교생활기록부 입력 자료에 대한 정정은 원칙적으로 금지하나 내용의 의미 변화가 없는 단순 오･탈자의 정정은 가능하며, 이때 증빙자료는 단순 오･탈자가 포함된 쪽의 정정 전의 출력물로 한다.", "▪학생 본인 및 가족(보호자 포함)의 질병명은 학업성적관리위원회의 심의를 통해 개인정보 보호의 필요 여부를 결정한다.", "다. 각종 보조부의 내용에 오류가 있는 경우에는 당해 학교의 규정에 따라 보조부의 정정 결재부터 시행한 후 학교생활기록부를 정정한다. 다만, 교육정보시스템에서 제공하는 학교생활기록부 정정 결재 절차를 거친 경우에는 보조부의 결재를 시행한 것으로 본다.", "▪이전 학년도 학교생활기록부 정정 시 교과학습발달상황은 교과(목) 성적 재산출과 보조부(교과(목) 성적일람표 등)의 정정결재 후 학교생활기록부를 정정한다. 또한, 수상대장에 반영된 수상경력의 정정 시 ‘수상대장반영여부’를 선택하여 학교생활기록부를 정정한다.", "라. 학교생활기록부 정정대장은 교육정보시스템에서 제공하는 결재 절차를 거쳐 학기 중에는 전자문서로 관리하다가 매 학년도 말 처리가 종료되면 출력하여 증빙자료와 함께 준영구 보관하되, 기록물이 훼손되지 않도록 보관에 유의한다.", "▪학교생활기록부 정정대장 출력 시 1면에 1쪽씩 출력한다.", "▪교육정보시스템의 전자결재를 사용하는 경우 학교생활기록부 정정 전 출력물과 정정 입력 후 출력물을 첨부하지 않는다(결재 시 교육정보시스템에서 정정 전 내용과 정정 후 내용 확인 가능). 단, 유급･ 재입학･편입학･복학 등에 따라 학교생활기록부의 중복기간 자료를 삭제하는 경우 삭제 전 출력물을 객관적 증빙자료로 보관한다. 마. 졸업생으로서 전산 입력이 불가능할 경우에는 정정사유를 확인할 수 있는 증빙자료를 첨부하여 학교 학업성적관리위원회의 심의 절차를 거친 후(인적･학적사항의 학생정보 정정은 생략 가능) 학교생활 기록부 출력물에 두 줄을 긋고 정정하여 학교장이 날인한다. 관련 자료는 학교생활기록부 출력물 뒤에 첨부하고, 기 제작된 전산매체에 정정내용을 구별할 수 있는 설명서를 첨부해 라벨을 붙여 정정된 내용을 추후에도 파악할 수 있도록 조치해야 한다.", "▪전산으로 관리되지 않은 졸업생의 수기 학교생활기록부의 정정은 학교생활기록부 원본에 두 줄을 긋고 정정하여 학교장의 날인을 받으며, 관련 증빙자료는 수기 학교생활기록부 출력물 뒤에 첨부하여 보관한다. 이때, 학교생활기록부 정정대장은 별도로 작성하여 학년도 말에 출력한 학교생활기록부 정정대장에 합철하여 보관한다.", "▪교육정보시스템에서 학교생활기록부 정정대장의 전자결재가 가능하지 않은 경우에는 정정 전 출력물과 정정 입력 후 출력물을 정정사유 증빙자료와 함께 첨부하여 학교장이 정정 내용 및 입력상황을 확인할 수 있도록 한다.", "▪학교생활기록부 정정대장 작성은 정정 항목별로 구분하여 작성한다.", "▪학교생활기록부 정정대장 작성 시 정정사항의 오류내용, 정정내용, 정정사유는 구체적으로 입력하여 정정한 내용을 쉽게 파악할 수 있도록 한다. ※ 오류내용에는 정정 전의 내용을, 정정내용에는 정정 후의 내용을 입력하되, 기재예시에 준하여 입력함.", "<예시> 학교생활기록부 정정대장 정정 대상자 정정 사항 결재 및 입력확인 일련 정 정 번호 연월일 학년도･학년･반･번호 오류내용 정정내용 정정 담임 담당 성명 항목 교감 교장 (졸업대장번호) (정정 전) (정정 후) 사유 (담당) 부장 2026년 3학년 2반 성명 2026-1 2026.04.10. ◦◦◦ 인적･학적사항 ▫▫▫ 개명 24번 ‘○○○’ 2024.06.07. 학교폭력예방 및 2학년 2026년 2학년 3반 대책에 관한 법률 삭제 후 ‘학교폭력 재입학에 2026-2 2026.04.15. ◦◦◦ 학적사항 15번 제17조 조치상황 관리’에 입력 따른 변경 제1항제8호에 훈령 적용 따른 전학 조치 1학년 2026년 2학년 질병결석 ‘2’ 질병결석 2026-3 2026.05.08. ▵▵▵ 출결상황 질병결석 ‘2’ 전기과 5반 7번 입력 입력 누락 출결상황, 중복기간 자료 삭제 창의적 (출결상황, 창의적 학적변동 체험활동 체험활동상황, (복학)으로 2026년 2학년 4반 상황 2026-4 2026.05.15. ▫▫▫ 중복 학년자료 세부능력 및 특기사항, 인한 중복 18번 세부능력/ 행동특성 및 종합 학년자료 특기사항 의견의 자동 연계 자료 삭제 행동특성 및 포함) 종합의견 2026년 3학년 1학년 수업일수 ‘191’ 2026-5 2026.06.03. ◦◦◦ 출결상황 입력 오류 기계과 2반 31번 수업일수 ‘186’ 입력 2학년 2학기 복학으로 2026년 2학년 7반 교과학습 2학년 인한 2학년 2026-6 2026.09.02. ▵▵▵ 삭제 29번 발달상황 2학기 성취도 2학기 중복 성적자료 1학년 봉사활동 1건 2026년 3학년 5반 봉사활동 2026-7 2026.09.11. ▫▫▫ 봉사활동 입력-2024.10.22. 입력누락 21번 실적 누락 (5시간) 1학년 표창장(선행부문) 2026년 3학년 8반 표창장 (제2024-1221호) 표창장 2026-8 2026.10.16. ◦◦◦ 수상경력 26번 (선행부문) 입력, 2025.02.10. (선행부문) 누락 수상 누락 창의적 2학년 2026년 3학년 전교 학생회 2026-9 2026.12.11. ▵▵▵ 체험활동 자율활동 특기사항 입력오류 10반 4번 부회장으로 상황 ‘전교학생회회장으로’ 정정 대상자 정정 사항 결재 및 입력확인 일련 정 정 번호 연월일 학년도･학년･반･번호 오류내용 정정내용 정정 담임 담당 성명 항목 교   // 폰트 로드 후 재계산
  if(document.fonts) document.fonts.ready.then(fixSticky);
  document.getElementById('si').addEventListener('input',e2=>{
    q=e2.target.value.trim();
    document.getElementById('sx').classList.toggle('on',q.length>0);
    if(q){setMode('srch');}else{render();}
  });
});

function buildTabs(){
  document.getElementById('stabs').innerHTML=
    D.map(s=>`<button class="stab" onclick="goSec('${s.id}')" id="st-${s.id}">${s.emoji} ${e(s.title)}</button>`).join('');
}

function goSec(id){
  curSec=id;
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.id==='st-'+id));
  setMode('sec');
}

function setMode(m,silent=false){
  mode=m;
  ['all','sec','srch','bm'].forEach(x=>document.getElementById('nb-'+x)?.classList.toggle('on',x===m));
  if(!silent)render();
}

function clrS(){q='';document.getElementById('si').value='';document.getElementById('sx').classList.remove('on');setMode('all');}

function render(){
  const el=document.getElementById('con');
  if(mode==='srch'&&q)el.innerHTML=renderSrch();
  else if(mode==='sec')el.innerHTML=renderSec();
  else if(mode==='bm')el.innerHTML=renderBm();
  else el.innerHTML=renderAll();
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll('.grp-hdr').forEach(hdr=>{
    hdr.addEventListener('click',()=>{
      const g=hdr.closest('.grp');const id=g.dataset.id;
      g.classList.toggle('open');
      if(g.classList.contains('open'))openG.add(id);else openG.delete(id);
    });
  });
  document.querySelectorAll('.sido-card-hdr').forEach(hdr=>{
    hdr.addEventListener('click',()=>{
      const c=hdr.closest('.sido-card');const id=c.dataset.id;
      c.classList.toggle('open');
      if(c.classList.contains('open'))openSido.add(id);else openSido.delete(id);
    });
  });
}

function isTable(text){return text.startsWith('__TABLE__');}
function tableHtml(text){
  // __TABLE__...html...__ENDTABLE__ 형식
  const inner=text.replace('__TABLE__','').replace('__ENDTABLE__','');
  return`<div style="overflow-x:auto">${inner}</div>`;
}
/* ── 포맷 헬퍼 ── */
function fmtEx(text, sq) {
  // <예시> 처리
  const content = text.replace(/^<예시>\s*/, '').replace(/^<예시\s+/, '').trim();

  // 학적 기재예시 (날짜 + 항목명 구조)
  const dateRows = [...content.matchAll(/(\d{4}년 \d{2}월 \d{2}일)\s+([^\d]+?)(?=\d{4}년|$)/gs)];
  if (dateRows.length >= 2 && (content.includes('학적사항') || content.includes('특기사항'))) {
    const titleM = content.match(/^(.+?)\s+\d{4}년/);
    const title = titleM ? `<div class="ex-subtitle">${e(titleM[1])}</div>` : '';
    // 필드별 그룹핑
    let rows = '';
    const sections = content.split(/(학적사항|특기사항)/);
    let cur = '';
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      if (s === '학적사항' || s === '특기사항') {
        cur = s;
        rows += `<div class="ex-field">${cur}</div>`;
      } else if (cur) {
        const lines = s.trim().split(/(?=\d{4}년)/).filter(l => l.trim());
        lines.forEach(l => {
          const dm = l.match(/^(\d{4}년 \d{2}월 \d{2}일)\s+(.*)/s);
          if (dm) rows += `<div class="ex-entry"><span style="color:#1e4fa0;font-weight:600">${e(dm[1])}</span>　${hl(dm[2].trim(), sq)}</div>`;
          else if (l.trim()) rows += `<div class="ex-entry">${hl(l.trim(), sq)}</div>`;
        });
      } else {
        if (s.trim()) rows += `<div style="font-size:13px;margin-bottom:6px">${hl(s.trim(), sq)}</div>`;
      }
    }
    return `<div class="ex-box">${title}<div class="ex-label">📌 기재 예시</div>${rows}</div>`;
  }

  // 절차 흐름 예시
  if (content.includes('→') && content.split('→').length >= 3) {
    const steps = content.split('→').map(s => s.trim()).filter(Boolean);
    const stepsHtml = steps.map((s,i) => 
    `<span class="flow-step">${hl(s, sq)}</span>${i<steps.length-1?'<span class="flow-arrow">→</span>':''}`
  ).join('');
    return `<div class="ex-box"><div class="ex-label">📌 기재 예시</div><div class="flow-steps" style="margin-top:6px">${stepsHtml}</div></div>`;
  }

  // 일반 예시
  return `<div class="ex-box"><div class="ex-label">📌 기재 예시</div><div class="ex-content">${hl(content, sq)}</div></div>`;
}

function fmtFlow(text, sq) {
  const m = text.match(/^(.*?절차.*?)[：:]\s*(.+)/s) || text.match(/^(.*?단계.*?)[：:]\s*(.+)/s);
  const label = m ? m[1].replace(/^[※\s]+/, '').trim() : '처리 절차';
  const stepsText = m ? m[2] : text.replace(/→/g, '→');
  const steps = stepsText.split('→').map(s => s.trim()).filter(Boolean);
  const stepsHtml = steps.map((s,i) => 
    `<span class="flow-step">${hl(s, sq)}</span>${i<steps.length-1?'<span class="flow-arrow">→</span>':''}`
  ).join('');
  return `<div class="flow-box"><div class="flow-label">🔄 ${e(label)}</div><div class="flow-steps">${stepsHtml}</div></div>`;
}

function fmtList(text, sq) {
  // 가. 나. 다. 분리
  const GA = /\s([가나다라마바사아자차카타파하])\.\s/g;
  const NUM = /\s([1-9])\)\s/g;

  let intro = '', items = [];
  const gaSplit = ('\u0000' + text).split(/(?=\s[가나다라마바사아자차카타파하]\.\s)/);
  if (gaSplit.length > 2) {
    intro = gaSplit[0].replace('\u0000','').trim();
    items = gaSplit.slice(1).map(s => {
      const m = s.match(/^\s*([가나다라마바사아자차카타파하])\.\s*(.*)/s);
      return m ? { marker: m[1]+'.', text: m[2].trim() } : { marker:'·', text: s.trim() };
    });
  } else {
    const numSplit = ('\u0000' + text).split(/(?=\s[1-9]\)\s)/);
    if (numSplit.length > 2) {
      intro = numSplit[0].replace('\u0000','').trim();
      items = numSplit.slice(1).map(s => {
        const m = s.match(/^\s*([1-9])\)\s*(.*)/s);
        return m ? { marker: m[1]+')', text: m[2].trim() } : { marker:'·', text: s.trim() };
      });
    }
  }
  if (!items.length) return null;

  const itemsHtml = items.map(it => {
    // 하위 [기재불가 ...] 또는 괄호 리스트 처리
    const subM = it.text.match(/^(.*?)\[([^\]]+)\](.*)$/s);
    if (subM) {
      const before = subM[1].trim();
      const bracket = subM[2];
      const after = subM[3].trim();
      const subItems = bracket.split(/,|、/).map(s=>s.trim()).filter(Boolean);
      const subHtml = subItems.map(s=>`<span class="sub-marker">·</span><span class="sub-text">${hl(s,sq)}</span>`).join('');
      return `<div class="list-item"><span class="list-marker">${e(it.marker)}</span><span class="list-text">${hl(before,sq)}${after?'<br><span style="color:var(--sub);font-size:12.5px">'+hl(after,sq)+'</span>':''}<div class="sub-list" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${subHtml}</div></span></div>`;
    }
    return `<div class="list-item"><span class="list-marker">${e(it.marker)}</span><span class="list-text">${hl(it.text, sq)}</span></div>`;
  }).join('');

  return `<div class="list-box">${intro ? `<div class="list-intro">${hl(intro, sq)}</div>` : ''}<div class="list-items">${itemsHtml}</div></div>`;
}

function formatContent(text, sq) {
  // 예시 블록
  if (/^<예시[>＞\s]/.test(text)) return fmtEx(text, sq);
  // 흐름 절차 (→ 3개 이상)
  if (text.includes('→') && text.split('→').length >= 4) return fmtFlow(text, sq);
  // 가. 나. 다. 목록 (3개 이상)
  const gaCount = (text.match(/\s[가나다라마바사아자차카타파하]\.\s/g)||[]).length;
  if (gaCount >= 2) { const r = fmtList(text, sq); if(r) return r; }
  // 1) 2) 3) 목록
  const numCount = (text.match(/\s[1-9]\)\s/g)||[]).length;
  if (numCount >= 2) { const r = fmtList(text, sq); if(r) return r; }
  return null;
}

function paraHtml(text,sq,secId,idx){
  if(isTable(text)) return tableHtml(text);
  const bmId=`${secId||'_'}-${idx||0}`;
  const isBm=bm.includes(bmId);
  const bmBtn=`<button class="bm-btn${isBm?' on':''}" onclick="togBm('${bmId}',this)" title="${isBm?'북마크 해제':'북마크 추가'}">${isBm?'⭐':'☆'}</button>`;

  // 서식 있는 콘텐츠
  const fmt = formatContent(text, sq);
  if (fmt) {
    return `<div class="para" style="padding:0;background:transparent;border:none;box-shadow:none">
      <div class="para-text" style="flex:1">${fmt}</div>
      ${bmBtn}
    </div>`;
  }

  // 기본 단락 (라벨 포함)
  const lbl=paraLabel(text);
  const lblHtml=lbl?`<span class="para-label ${lbl[0]}">${lbl[1]}</span><br>`:'';
  return`<div class="para">
    <div class="para-text">${lblHtml}${hl(text,sq)}</div>
    ${bmBtn}
  </div>`;
}

function togBm(id,btn){
  const idx=bm.indexOf(id);
  if(idx>=0){bm.splice(idx,1);}else{bm.push(id);}
  localStorage.setItem('req26_bm',JSON.stringify(bm));
  if(btn){
    const isNow=bm.includes(id);
    btn.classList.toggle('on',isNow);
    btn.textContent=isNow?'⭐':'☆';
    btn.title=isNow?'북마크 해제':'북마크 추가';
  }
  // 즐겨찾기 탭이면 바로 갱신
  if(mode==='bm')render();
}

function renderBm(){
  if(!bm.length)return`<div class="bm-empty"><span class="ic">⭐</span><p>북마크한 항목이 없습니다.<br>각 항목 옆 ☆ 버튼을 눌러 저장하세요.</p></div>`;
  let html=`<div class="rcnt">북마크 ${bm.length}건</div>`;
  // bm id 형식: secId-itemIndex
  D.forEach(sec=>{
    const bmItems=[];
    sec.items.forEach((item,idx)=>{
      const bmId=`${sec.id}-${idx}`;
      if(bm.includes(bmId))bmItems.push({item,idx,bmId});
    });
    if(!bmItems.length)return;
    html+=`<div class="sec-label">${sec.emoji} ${e(sec.title)}<span class="sbdg">${bmItems.length}</span></div>`;
    bmItems.forEach(({item,idx,bmId})=>{
      const lbl=paraLabel(item);
      const lblHtml=lbl?`<span class="para-label ${lbl[0]}">${lbl[1]}</span><br>`:'';
      html+=`<div class="para">
        <div class="para-text">${lblHtml}${e(item)}</div>
        <button class="bm-btn on" onclick="togBm('${bmId}',this)" title="북마크 해제">⭐</button>
      </div>`;
    });
  });
  return html;
}

function sidoHtml(){
  let html='<div class="sido-grid">';
  SIDO.forEach((s,i)=>{
    const id='sido-'+i;
    const isOpen=openSido.has(id);
    const shortName=s.sido.replace(/특별자치시|특별자치도|광역시|특별시|도/g,'').replace('교육청','').trim();
    html+=`<div class="sido-card${isOpen?' open':''}" data-id="${id}">
      <div class="sido-card-hdr">
        <h3>${e(shortName)}<br><span style="font-size:10.5px;opacity:.8">교육청</span></h3>
        <div style="text-align:right">
          <div class="cnt-badge">직속 ${s.direct_count}개</div>
          ${s.support_orgs.length?`<div class="cnt-badge" style="margin-top:3px">지원청 ${s.support_orgs.length}개</div>`:''}
        </div>
        <span class="sido-card-arr">▾</span>
      </div>
      <div class="sido-card-body">
        <div class="sup-title">직속기관 (${s.direct_count}개)</div>
        <div class="orgs-list">${s.direct_orgs.map(o=>`<span class="org-tag">${e(o)}</span>`).join('')}</div>
        ${s.support_orgs.length?`
        <div class="sup-section">
          <div class="sup-title">교육지원청 (${s.support_orgs.length}개)</div>
          <div class="sup-list">${s.support_orgs.map(o=>`<span class="sup-tag">${e(o)}</span>`).join('')}</div>
        </div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  return html;
}

function grpHtml(sec,sq){
  const isOpen=openG.has(sec.id);
  const items=sq?sec.items.filter(i=>i.toLowerCase().includes(sq.toLowerCase())):sec.items;
  if(sq&&!items.length)return'';
  
  // ref 섹션은 시도교육청 카드 포함
  let bodyContent='';
  if(sec.id==='ref'){
    bodyContent=`<div class="para" style="background:#eef3ff;border-color:#c0d0ff;font-size:13px;font-weight:600;color:var(--navy)">📍 05. 시도교육청·교육지원청 직속(소속)기관 현황 (2026.03. 기준)</div>`;
    bodyContent+=sidoHtml();
    bodyContent+=items.map((i,n)=>paraHtml(i,sq,sec.id,n)).join('');
  } else {
    bodyContent=items.map((i,n)=>paraHtml(i,sq,sec.id,n)).join('');
  }
  
  return`<div class="grp${isOpen?' open':''}" data-id="${sec.id}">
    <div class="grp-hdr">
      <span class="g-emoji">${sec.emoji}</span>
      <div class="g-info">
        <div class="g-title">${e(sec.title)}</div>
        <div class="g-meta">${e(sec.page_range)} · ${items.length}개 항목</div>
      </div>
      <span class="g-badge">${items.length}</span>
      <span class="g-arr">▾</span>
    </div>
    <div class="grp-body">${bodyContent}</div>
  </div>`;
}

function renderAll(){
  const total=D.reduce((a,s)=>a+s.items.length,0);
  const stats=D.map(s=>`<span class="istat">${s.emoji} ${s.items.length}</span>`).join('');
  let html=`<div class="intro">
    <strong>📚 2026학년도 학교생활기록부 기재요령 (고등학교)</strong>
    17개 시도교육청 공동 발행 · 전체 223페이지의 기재요령을 섹션별로 열람할 수 있습니다.
    <div class="intro-stats">${stats}</div>
  </div>`;
  html+=D.map(s=>grpHtml(s,'')).join('');
  return html;
}

function renderSec(){
  if(!curSec){
    return`<div class="intro"><strong>섹션을 선택하세요</strong>위 탭이나 아래 목록에서 원하는 섹션을 선택하세요.</div>`+
    D.map(s=>`<div class="grp-hdr" style="border-radius:var(--r);border:1px solid var(--border);margin-bottom:7px;cursor:pointer" onclick="goSec('${s.id}')">
      <span class="g-emoji">${s.emoji}</span>
      <div class="g-info"><div class="g-title">${e(s.title)}</div><div class="g-meta">${e(s.page_range)} · ${s.items.length}개</div></div>
      <span style="color:#adbad4;font-size:18px">›</span>
    </div>`).join('');
  }
  const sec=D.find(s=>s.id===curSec);
  if(!sec)return'';
  let html=`<div class="sec-label">${sec.emoji} ${e(sec.title)} <span class="sbdg">${sec.items.length}</span></div>`;
  if(sec.id==='ref'){
    html+=`<div class="para" style="background:#eef3ff;border-color:#c0d0ff;font-size:13px;font-weight:600;color:var(--navy)">📍 05. 시도교육청·교육지원청 직속(소속)기관 현황 (2026.03. 기준)</div>`;
    html+=sidoHtml();
  }
  html+=sec.items.map((i,n)=>paraHtml(i,'',sec.id,n)).join('');
  return html;
}

function renderSrch(){
  const lq=q.toLowerCase();
  let res=[];
  D.forEach(sec=>sec.items.forEach((item,idx)=>{
    if(item.startsWith('__TABLE__')) return;
    if(item.toLowerCase().includes(lq))res.push({text:item,sec:sec.title,emoji:sec.emoji,secId:sec.id,idx});
  }));
  // 시도 검색
  let sidoRes=[];
  SIDO.forEach(s=>{
    if(s.sido.includes(q)||s.direct_orgs.some(o=>o.includes(q))||s.support_orgs.some(o=>o.includes(q))){
      sidoRes.push(s);
    }
  });
  
  if(!res.length&&!sidoRes.length)return`<div class="no-res"><div class="ic">🔍</div><p>'${e(q)}' 검색 결과 없음</p></div>`;
  let html=`<div class="rcnt">검색 결과 ${res.length+sidoRes.length}건</div>`;
  
  if(sidoRes.length){
    html+=`<div class="sec-label">📍 시도교육청<span class="sbdg">${sidoRes.length}</span></div>`;
    html+='<div class="sido-grid">';
    sidoRes.forEach((s,i)=>{
      const id='sr-'+i;
      const isOpen=openSido.has(id)||true;
      const shortName=s.sido.replace(/특별자치시|특별자치도|광역시|특별시|도/g,'').replace('교육청','').trim();
      html+=`<div class="sido-card open" data-id="${id}">
        <div class="sido-card-hdr"><h3>${e(shortName)}<br><span style="font-size:10px;opacity:.8">교육청</span></h3>
          <span class="cnt-badge">직속 ${s.direct_count}개</span>
          <span class="sido-card-arr">▾</span></div>
        <div class="sido-card-body">
          <div class="sup-title">직속기관</div>
          <div class="orgs-list">${s.direct_orgs.map(o=>`<span class="org-tag">${hl(o,q)}</span>`).join('')}</div>
          ${s.support_orgs.length?`<div class="sup-section"><div class="sup-title">교육지원청</div><div class="sup-list">${s.support_orgs.map(o=>`<span class="sup-tag">${hl(o,q)}</span>`).join('')}</div></div>`:''}
        </div>
      </div>`;
    });
    html+='</div>';
  }
  
  const grouped={};
  res.forEach(r=>{const k=r.emoji+' '+r.sec;if(!grouped[k])grouped[k]=[];grouped[k].push(r);});
  Object.entries(grouped).forEach(([title,items])=>{
    html+=`<div class="sec-label">${e(title)}<span class="sbdg">${items.length}</span></div>`;
    items.forEach(r=>html+=paraHtml(r.text,q,r.secId,r.idx));
  });
  return html;
}

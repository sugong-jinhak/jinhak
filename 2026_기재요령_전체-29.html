<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>2026 학교생활기록부 기재요령</title>
<style>
:root{
  --navy:#0f2d5e;--blue:#1e4fa0;--accent:#c94218;
  --bg:#f1f4fb;--card:#fff;--text:#1a2840;--sub:#56688a;
  --border:#d8e2f4;--tag:#e8eeff;--tagc:#2e4dc0;
  --ans:#f5f8ff;--green:#16724a;--gbg:#e8f8f0;
  --r:12px;--sh:0 1px 10px rgba(15,45,94,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}html{}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;padding-bottom:88px;}

/* ── 헤더 ── */
.hdr{background:linear-gradient(140deg,#0c2449,var(--blue));color:#fff;padding:14px 15px 11px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,.22);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.hdr h1{font-size:15.5px;font-weight:700;letter-spacing:-.3px;line-height:1.3;}
.hdr-tag{background:rgba(255,255,255,.2);border-radius:7px;padding:2px 8px;font-size:11px;white-space:nowrap;flex-shrink:0;}
.hdr-sub{font-size:11px;opacity:.75;margin-top:3px;}

/* ── 섹션 탭 (고정) ── */
.stabs-wrap{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border);box-shadow:0 2px 6px rgba(15,45,94,.06);width:100%;left:0;}
.stabs{display:flex;overflow-x:auto;gap:5px;padding:7px 13px;scrollbar-width:none;-ms-overflow-style:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:5px 12px;font-size:12.5px;font-family:inherit;color:var(--sub);cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s;}
.stab.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700;}

/* ── 검색 ── */
.sw{padding:8px 12px 6px;background:var(--bg);position:sticky;top:0;z-index:190;}
.sb{display:flex;align-items:center;background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:7px 11px;gap:7px;box-shadow:0 2px 6px rgba(15,45,94,.06);min-width:0;}
.sb input{border:none;outline:none;font-size:15px;color:var(--text);width:100%;min-width:0;font-family:inherit;background:transparent;}
.sb input::placeholder{color:#adbad4;}
.si{color:#adbad4;font-size:16px;flex-shrink:0;}
.sx{background:none;border:none;color:#adbad4;font-size:16px;cursor:pointer;padding:2px;display:none;flex-shrink:0;}
.sx.on{display:block;}

/* ── 콘텐츠 ── */
.con{padding:4px 12px 8px;}

/* ── 인트로 ── */
.intro{background:linear-gradient(130deg,#e4ecff,#eef2ff);border:1px solid #c0d0ff;border-radius:var(--r);padding:13px 14px;margin-bottom:12px;font-size:13px;line-height:1.7;color:var(--navy);}
.intro strong{display:block;font-size:14.5px;font-weight:700;margin-bottom:5px;}
.intro-stats{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.istat{background:rgba(46,77,192,.1);color:var(--tagc);font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;}

/* ── 아코디언 그룹 ── */
.grp{margin-bottom:7px;}
.grp-hdr{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;box-shadow:var(--sh);user-select:none;-webkit-user-select:none;}
.grp.open .grp-hdr{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;}
.g-emoji{font-size:20px;flex-shrink:0;}
.g-info{flex:1;min-width:0;}
.g-title{font-size:13.5px;font-weight:700;color:var(--text);word-break:keep-all;}
.g-meta{font-size:11.5px;color:var(--sub);margin-top:2px;}
.g-badge{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:9px;flex-shrink:0;}
.g-arr{color:#adbad4;font-size:14px;flex-shrink:0;transition:transform .2s;}
.grp.open .g-arr{transform:rotate(180deg);}
.grp-body{display:none;background:var(--ans);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:8px 10px 12px;overflow-x:hidden;}
.grp.open .grp-body{display:block;}

/* ── 단락 카드 ── */
.para{background:#fff;border:1px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:6px;font-size:13.5px;line-height:1.72;color:var(--text);box-shadow:0 1px 4px rgba(15,45,94,.04);word-break:keep-all;overflow-wrap:break-word;}
.para:last-child{margin-bottom:0;}
.para-label{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:6px;margin-bottom:5px;}
.lbl-rule{background:#e8eeff;color:#2e4dc0;}
.lbl-guide{background:#e8f8f0;color:#16724a;}
.lbl-note{background:#fff3e8;color:#b85a10;}
.lbl-ex{background:#f3e8ff;color:#6b2da8;}

/* ── 시도교육청 카드 ── */
.sido-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px;}
.sido-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh);}
.sido-card-hdr{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.sido-card-hdr h3{font-size:12.5px;font-weight:700;line-height:1.3;word-break:keep-all;}
.sido-card-hdr .cnt-badge{background:rgba(255,255,255,.25);font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:6px;white-space:nowrap;}
.sido-card-body{display:none;padding:10px 11px;overflow-x:hidden;word-break:keep-all;}
.sido-card.open .sido-card-body{display:block;}
.sido-card-arr{font-size:12px;opacity:.7;transition:transform .2s;flex-shrink:0;margin-left:6px;}
.sido-card.open .sido-card-arr{transform:rotate(180deg);}
.orgs-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.org-tag{background:var(--tag);color:var(--tagc);font-size:11px;padding:3px 7px;border-radius:6px;font-weight:500;word-break:keep-all;}
.sup-section{margin-top:8px;}
.sup-title{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.3px;}
.sup-list{display:flex;flex-wrap:wrap;gap:3px;}
.sup-tag{background:#f0f5ff;color:#4a6bc8;font-size:11px;padding:2px 7px;border-radius:6px;}
@media(max-width:400px){.sido-grid{grid-template-columns:1fr;}.tbl{font-size:11px;}.tbl th,.tbl td{padding:5px 6px;}}

/* ── 검색 결과 ── */
.rcnt{font-size:12px;color:var(--sub);padding:4px 0 8px;}
.sec-label{font-size:12.5px;font-weight:700;color:var(--sub);display:flex;align-items:center;gap:5px;margin:14px 0 7px;letter-spacing:.3px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.sbdg{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px;}
.no-res{text-align:center;padding:50px 20px;color:var(--sub);}
.no-res .ic{font-size:36px;margin-bottom:10px;}
mark{background:#fff176;color:var(--text);border-radius:2px;padding:0 1px;}


/* ── 예시·흐름 블록 ── */
.ex-box{background:linear-gradient(135deg,#f0f7ff,#e8f0ff);border:1.5px solid #b8d0ff;border-radius:11px;padding:11px 12px;margin:6px 0;box-shadow:0 2px 6px rgba(30,79,160,.07);overflow-x:hidden;word-break:keep-all;overflow-wrap:break-word;}
.ex-label{display:inline-flex;align-items:center;gap:5px;background:#1e4fa0;color:#fff;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.3px;}
.ex-subtitle{font-size:13px;font-weight:700;color:#0f2d5e;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed #b8d0ff;}
.ex-content{font-size:13px;color:#1a2840;line-height:1.75;}
.ex-tbl{font-size:12.5px;}
.ex-tbl td.date-cell{white-space:normal;color:#1e4fa0;font-weight:600;min-width:90px;word-break:keep-all;}

/* ── 흐름 절차 ── */
.flow-box{background:linear-gradient(135deg,#f0fff6,#e8f8f0);border:1.5px solid #b0e0c8;border-radius:11px;padding:12px 14px;margin:6px 0;}
.flow-label{font-size:12px;font-weight:700;color:#16724a;margin-bottom:10px;}
.flow-steps{display:flex;flex-wrap:wrap;align-items:center;gap:4px;}
.flow-arrow{color:#16724a;font-weight:700;font-size:13px;padding:0 2px;align-self:center;flex-shrink:0;}
.flow-step{background:#fff;border:1.5px solid #b0e0c8;border-radius:8px;padding:6px 11px;font-size:12.5px;color:#1a2840;font-weight:500;white-space:normal;word-break:keep-all;max-width:100%;}



/* ── 목록 블록 ── */
.list-box{background:#fafbff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin:4px 0;overflow-x:hidden;}
.list-intro{font-size:13.5px;color:var(--text);margin-bottom:8px;line-height:1.65;}
.list-items{display:flex;flex-direction:column;gap:5px;}
.list-item{display:flex;gap:8px;font-size:13px;line-height:1.65;}
.list-marker{flex-shrink:0;font-weight:700;color:#1e4fa0;min-width:24px;}
.list-text{color:var(--text);flex:1;min-width:0;word-break:keep-all;overflow-wrap:break-word;}
.sub-list{margin-top:4px;padding-left:12px;display:flex;flex-direction:column;gap:3px;}
.sub-item{display:flex;gap:6px;font-size:12.5px;color:var(--sub);}
.sub-marker{flex-shrink:0;color:#c94218;min-width:18px;}

/* ── 기재예시 내 특기사항 강조 ── */
.ex-field{font-size:11px;font-weight:700;color:#fff;background:#56688a;padding:2px 7px;border-radius:5px;margin:6px 0 3px;display:inline-block;}
.ex-entry{font-size:13px;color:#1a2840;padding:4px 0 4px 8px;border-left:3px solid #b8d0ff;margin-bottom:4px;line-height:1.6;}


/* 가로 넘침 방지 — sticky 조상 제외 */
.grp, .para, .ex-box, .flow-box, .list-box, .intro, .rcnt, .bm-empty, .sec-label {
  max-width: 100%;
  box-sizing: border-box;
}
img, video, iframe { max-width:100%; }

/* ── 북마크 버튼 ── */
.bm-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0;opacity:.45;transition:opacity .15s,transform .12s;line-height:1;-webkit-tap-highlight-color:transparent;}
.bm-btn:active{transform:scale(1.25);}
.bm-btn.on{opacity:1;}
.para{position:relative;display:flex;align-items:flex-start;gap:8px;}
.para-text{flex:1;min-width:0;}
.bm-empty{text-align:center;padding:60px 20px;color:var(--sub);}
.bm-empty .ic{font-size:44px;display:block;margin-bottom:14px;}
.bm-empty p{font-size:14px;line-height:1.7;}

/* ── 표 ── */
.tbl-wrap{margin:8px 0 10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--sh);}
.tbl-cap{background:linear-gradient(90deg,var(--navy),var(--blue));color:#fff;font-size:12.5px;font-weight:700;padding:8px 13px;letter-spacing:.2px;}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto;}
.tbl th{background:#f0f4ff;color:var(--navy);font-weight:700;padding:7px 8px;text-align:center;border-bottom:2px solid var(--border);border-right:1px solid var(--border);word-break:keep-all;white-space:normal;font-size:11.5px;}
.tbl th:last-child{border-right:none;}
.tbl td{padding:6px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text);vertical-align:top;white-space:pre-wrap;line-height:1.55;word-break:keep-all;font-size:12px;}
.tbl td:last-child{border-right:none;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:nth-child(even) td{background:#fafbff;}
.tbl-note{font-size:11.5px;color:var(--sub);padding:7px 13px 9px;background:#f8f9ff;border-top:1px solid var(--border);line-height:1.6;white-space:pre-wrap;}
/* ── 하단 탭바 ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:300;box-shadow:0 -2px 10px rgba(0,0,0,.07);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0 9px;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--sub);font-size:10.5px;font-weight:500;transition:color .15s;}
.nb.on{color:var(--navy);}
.nb .ni{font-size:18px;}

@media(min-width:600px){.con,.sw,.stabs-wrap,.nav{max-width:640px;margin-left:auto;margin-right:auto;}.nav{left:50%;transform:translateX(-50%);}.stabs-wrap{left:50%;transform:translateX(-50%);width:100%;max-width:640px;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <h1>📋 학교생활기록부 기재요령</h1>
    <span class="hdr-tag">2026 고등학교</span>
  </div>
  <div class="hdr-sub">17개 시도교육청 · 전체 223페이지 · 981개 항목 · 표 13개</div>
</div>

<div class="stabs-wrap">
  <div class="stabs" id="stabs"></div>
</div>

<div class="sw">
  <div class="sb">
    <span class="si">🔍</span>
    <input type="search" id="si" placeholder="조문·키워드·내용 검색..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <button class="sx" id="sx" onclick="clrS()">✕</button>
  </div>
</div>

<div class="con" id="con"></div>

<div class="nav">
  <button class="nb on" onclick="setMode('all')" id="nb-all"><span class="ni">📋</span>전체보기</button>
  <button class="nb" onclick="setMode('sec')" id="nb-sec"><span class="ni">📑</span>섹션별</button>
  <button class="nb" onclick="setMode('srch')" id="nb-srch"><span class="ni">🔍</span>검색</button>
  <button class="nb" onclick="setMode('bm')" id="nb-bm"><span class="ni">⭐</span>즐겨찾기</button>
</div>

<script>
const D=[{"id": "notice", "title": "작성 시 유의사항", "emoji": "⚠️", "page_range": "p.24~28", "items": ["01 학교생활기록부 작성 시 유의사항", "1. 학교생활기록부는 학생의 성장과 학습 과정을 상시 관찰･평가한 누가기록 중심의 종합 기록이어야 함.", "2. 학교생활기록부에는 학교교육계획이나 학교교육과정에 따라 학교에서 실시한 각종 교육활동의 이수상황(활동내용에 따른 개별적 특성이 드러나는 사항 중심)을 기재하는 것이 원칙임. - 학교교육계획 이외의 체험활동은 교육관련기관(교육부 및 소속기관, 시도교육청 및 직속기관, 교육지원청 및 소속기관)에서 주최하고 주관한 행사, 봉사활동 실적 등만 학교장이 승인한 경우에 한해 기재 가능함.", "3. 다음은 사교육 유발 요인이 큰 사항으로 ‘행동특성 및 종합의견’을 포함하여 학교생활기록부의 어떠한 항목에도 기재할 수 없음. 가. 각종 공인어학시험 참여 사실과 그 성적 및 수상 실적 [기재불가 공인어학시험] 영어(TOEIC, TOEFL, TEPS), 중국어(HSK), 일본어(JPT, JLPT), 프랑스어(DELF, DALF), 독일어(ZD, TESTDAF, DSH, DSD), 러시아어(TORFL), 스페인어(DELE), 상공회의소한자시험, 한자능력검정, 실용한자, 한자급수자격검정, YBM 상무한검, 한자급수인증시험, 한자자격검정 등 나. 교과･비교과 관련 교내･외 대회 참여 사실과 그 성적 및 수상 실적* * 교내대회는 ‘수상경력’ 항목에만 입력할 수 있으며, 교외대회는 학교장의 참가 허락을 받아 참여한 경우에도 기재할 수 없음. 다. 교외 기관･단체(장) 등에게 수상한 교외상(표창장, 감사장, 공로상 등도 기재 불가함) 라. 교내･외 인증시험 참여 사실이나 그 성적 마. 모의고사･전국연합학력평가 성적(원점수, 석차, 석차등급, 백분위 등 성적 관련 내용 일체) 및 관련 교내 수상실적 바. 논문을 학회지 등에 투고 또는 등재하거나 학회 등에서 발표한 사실 사. 도서출간 사실 아. 지식재산권(특허, 실용신안, 상표, 디자인 등) 출원 또는 등록 사실 자. 어학연수, 봉사활동 등 해외 활동실적 및 관련 내용 차. 부모(친인척 포함)의 사회･경제적 지위(직종명, 직업명, 직장명, 직위명 등) 암시 내용 카. 장학생･장학금 관련 내용", "타. 구체적인 특정 대학명, 기관명1)(기구, 단체, 조직 등 포함), 상호명, 강사명2) 등 1) 기관명", "▪ 교육관련기관(교육부 및 소속기관*, 시도교육청 및 직속기관, 교육지원청 및 소속기관**에 한함)의 경우 기관명을 입력할 수 있음. * 교육부 소속기관: 대한민국학술원, 국사편찬위원회, 국립국제교육원, 국립특수교육원, 교원소청심사위원회, 중앙교육연수원 (총 6개 기관) ** 시도교육청 및 직속기관, 교육지원청 및 소속기관: [참고자료 5] 참조 ※ 교육관련기관이 직접 운영하는 기구, 단체, 조직 등 포함", "▪봉사활동 실적의 ‘장소 또는 주관기관명’ 에는 구체적인 장소 또는 주관기관명을 입력함.", "▪시도교육감이 승인한 학교 밖 교육기관의 경우 ‘기관명’은 입력할 수 없으며, ‘학교 밖 교육기관(기관 유형*)’으로 통칭하여 입력함. * (기관유형) 교육청, 대학, 지역사회기관, 기업", "▸ 교육청: 시도교육청 및 직속기관, 교육지원청 및 소속기관 포함", "▸ 지역사회기관: 지방자치단체 운영 기관, 평생교육법에 따른 평생교육기관 등으로 공공성을 가진 기관에 한함", "▸ 기업: 특성화고등학교, 산업수요 맞춤형 고등학교, 일반고 직업계열학과 운영교에 한하여 기재 가능 2) 강사명", "▪특정 강사명은 강사로 활동하고 있는 사람 모두를 지칭하는 것이 아니라, 학생들이 참여한 강의(또는 교육활동)의 강사를 말함.", "파. 자격증 명칭 및 취득 사실 ※ ‘자격증 취득 및 국가직무능력표준 이수상황’ 이외 항목에 입력 불가", "4. 학교생활기록부에는 학생이 재학(또는 졸업 예정)한 고등학교를 알 수 있는 내용*은 ‘인적･학적사항’, 수상 경력의 ‘수여기관’, 봉사활동 실적의 ‘장소 또는 주관기관명’을 제외한 어떠한 항목에도 기재할 수 없음. * 학교명, 재단명, 학교 축제명, 학교 별칭 등 학교를 알 수 있는 내용 일체", "5. 학교생활기록부 기재는 교사의 고유권한으로 학교생활기록부 서술형 항목은 교사가 평소 학생을 직접 관찰･ 평가한 내용을 바탕으로 작성하는 것이 원칙이므로, 다음과 같이 학교생활기록부의 신뢰도를 저하시키는 사례가 발생하지 않도록 유의하여야 함. 가. 학교생활기록부에 ‘항목과 관련이 없거나 기록해서는 안 되는 내용의 기재’, ‘단순 사실을 과장하거나 부풀려서 기재’, ‘사실과 다른 내용을 허위로 기재’하는 행위 ※ 학교생활기록부 허위사실 기재는 ‘학생성적 관련 비위’로 간주하여 「교육공무원 징계양정 등에 관한 규칙」을 적용하며 징계의 감경에서 제외됨. 나. 학교생활기록부 서술형 항목에 기재될 내용을 학생에게 작성하여 제출하도록 하는 행위 다. AI를 활용하여 생성한 자료를 학교생활기록부의 서술형 항목에 그대로 입력하는 행위 ※ 작성 과정에서 윤문 등을 위한 보조 수단으로 생성형 AI의 도움을 받을 경우, 반드시 최종 입력 전에 작성 내용에 대해서 학생의 실제 수행과는 무관한 허위 또는 과장 기재 여부, 학교생활기록부 기재요령의 각종 유의사항 준수 여부 등을 철저히 확인해야 함.", "6. 학부모 등의 학교생활기록부 기재 및 수정 관련 부당 요구는 「부정청탁 및 금품등 수수의 금지에 관한 법률」 제5조제1항제10호에 해당하는 위법 행위임.", "7. 「학교생활기록 작성 및 관리지침」 제3조제3항에 따라 학교생활기록부 입력 및 정정 권한과 관련하여 업무의 편의나 관행을 이유로 담당이 아닌 교사에게 입력 및 정정 권한을 부여하는 행위를 금지함.", "8. 학교생활기록부 기재요령 내 ‘기재방법’은 준수하되, ‘기재예시’는 참고자료이며 의미의 변동이 없는 범위에서 다르게 기재할 수 있음. 02 학교생활기록부 관련 문의 방법 단위학교 내 연수를 통해 학교생활기록부 기재요령을 숙지하여 처리하되, 도움이 필요할 경우 1차적으로 교육지원청에 문의하여 해결하고, 부득이하게 전문적인 조문의 해설 등 자문을 구하고자 할 경우 다음의 절차에 따라 문의함.  학교에서 - 단위학교에서는 교육지원청(시도교육청)에 질의함. ※ 「행정업무의 운영 및 혁신에 관한 규정」에 따라 「학교생활기록 작성 및 관리지침」의 해석에 대한 질의는 직근 상급 행정기관에 하여야 함(단위학교 → 교육지원청 → 시도교육청).  교육지원청에서 - 단위학교의 질의(서면, 전화, 인터넷) 내용에 대해 성실히 응대하되, 자체 판단이 어렵거나 명확히 답변할 수 없는 내용이 있는 경우 시도교육청에 문의하여 답변함.  시도교육청에서 - 교육지원청의 질의(서면, 전화, 인터넷) 내용에 대해 성실히 응대하되, 자체 판단이 어렵거나 명확히 답변할 수 없는 내용이 있는 경우 교육부 해당 부서에 문의함. - 시도교육청은 17개 시도교육청에 공통으로 적용될 사항에 대하여 교육부로 질의함. 학교생활기록부 기재요령에는 다양한 교육정책(학교폭력, 특수교육 등)에 대한 내용이 포함되어 있으며, 운영 등에 대한 구체적인 사항은 교육(지원)청 및 교육부의 해당 업무(학교폭력, 특수교육 등) 담당 부서로 질의함. 2026학년도 학교생활기록부 기재요령 고등학교 III 「\u0007학교생활기록 작성 및 관리지침」 해설 및 기재요령"]}, {"id": "process", "title": "처리요령", "emoji": "⚙️", "page_range": "p.33~36", "items": ["① 학교생활기록의 자료 입력 및 정정 업무는 당해 학년도에 업무를 담당하는 사용자가 수행함을 원칙으로 한다.", "▪학교생활기록부 항목별 입력 주체를 명확히 하여 학교생활기록부 기재와 관리의 책무성을 제고한다. 항목 입력 주체 출결상황 특기사항 학급담임교사 학교폭력 조치상황 관리 학급담임교사 자율･자치활동 학급담임교사 창의적 체험활동상황 (3학년은 자율활동) 영역별 특기사항 진로활동 학급담임교사 동아리활동 해당 동아리 담당교사 일상생활 활동상황 특기사항 영역별 담당교사 과목별 세부능력 및 특기사항 교과담당교사 교과학습발달상황 개인별 세부능력 및 특기사항 학급담임교사 독서활동상황 교과담당교사, 학급담임교사 행동특성 및 종합의견 학급담임교사 * 특수학교 1~2학년 재학생 중 ‘기본교육과정’을 이수한 학생에 한하여 적용됨(이하, 해당 문구 생략).", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 항목별 입력 주체</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>항목</th><th>입력 주체</th></tr></thead><tbody><tr><td>출결상황 특기사항</td><td>학급담임교사</td></tr><tr><td>학교폭력 조치상황 관리</td><td>학급담임교사</td></tr><tr><td>창의적 체험활동 — 자율·자치활동(3학년: 자율활동)</td><td>학급담임교사</td></tr><tr><td>창의적 체험활동 — 진로활동</td><td>학급담임교사</td></tr><tr><td>창의적 체험활동 — 동아리활동</td><td>해당 동아리 담당교사</td></tr><tr><td>일상생활 활동상황 특기사항 *</td><td>영역별 담당교사</td></tr><tr><td>교과학습발달상황 — 과목별 세부능력 및 특기사항</td><td>교과담당교사</td></tr><tr><td>교과학습발달상황 — 개인별 세부능력 및 특기사항</td><td>학급담임교사</td></tr><tr><td>독서활동상황</td><td>교과담당교사, 학급담임교사</td></tr><tr><td>행동특성 및 종합의견</td><td>학급담임교사</td></tr></tbody></table></div><div class=\"tbl-note\">* 특수학교 1~2학년 재학생 중 기본교육과정 이수 학생에 한함</div></div>__ENDTABLE__", "▪학교생활기록부 정정 시 학교생활기록부 정정대장 결재 절차에 따라 발견 학년도 학급담임교사가 정정처리를 하며, 졸업생 및 학업 중단 학생의 경우 업무담당자가 정정한다.", "② 사용자는 학생에 대해 직접 관찰･평가한 내용을 근거로 자료를 입력해야 한다.", "▪학교생활기록부의 서술형 항목은 교사가 직접 관찰･평가한 내용을 근거로 입력하며, 학교교육계획에 따라 실시한 교육활동 중 교사 지도하에 학생이 직접 작성한 자료*는 활용할 수 있다. * ‘학교교육계획에 따라 실시한 교육활동 중 교사 지도하에 학생이 직접 작성한 자료’로 학생부 기재 시 활용 가능한 자료는 아래 사례로 한정함.", "① 동료평가서, ② 자기평가서, ③ 수업산출물(수행평가 결과물 포함), ④ 소감문, ⑤ 독후감 - 학생부 내 서술형 항목 입력을 위해 학생·학부모 등에게 상기 ①∼⑤의 자료에 해당하지 않는 자료를 요구하거나 받아서는 안 됨.", "▪학생평가 및 평가결과에 근거한 학교생활기록부 기재는 교사의 고유권한으로 학생이나 학부모 등으로부터 학칙 및 관리지침에 반하는 내용을 전달 받아 작성하는 경우 부정청탁에 해당할 수 있다(국민권익위원회 청탁금지해석과-2201(2018.11.19.)). ※ 「부정청탁 및 금품등 수수의 금지에 관한 법률」 제5조(부정청탁의 금지) ① 누구든지 직접 또는 제3자를 통하여 직무를 수행하는 공직자 등에게 다음 각 호의 어느 하나에 해당하는 부정청탁을 해서는 아니 된다. 10. 각급 학교의 입학･성적･수행평가･논문심사･학위수여 등의 업무에 관하여 법령을 위반하여 처리･조작 하도록 하는 행위 ※ 학교생활기록부에 허위사실을 기재할 경우 「교육공무원 징계양정 등에 관한 규칙」을 엄격하게 적용함.", "▪학교생활기록부 영역별 내용은 해당 영역에만 입력한다. ※ 입력 글자 수 초과를 이유로 특정 영역의 내용을 타 영역에 입력하지 않음.", "③ 문자는 한글로(부득이한 경우 영문으로), 숫자는 아라비아 숫자로 입력한다.", "▪학교생활기록부의 문자는 한글로 입력하되, 부득이한 경우 영문으로 입력할 수 있다. - 외국인 성명, 도로명 주소에 포함된 영문, 일반화된 명사(CEO, PD, UCC, IT, POP, CF, TV, PAPS, SNS, PPT, AI 등), 고유 명사(도서명과 저자명 등), 단위 등", "④ 학교생활기록부 작성에 필요한 보조부는 각 학교의 실정에 맞게 계획을 수립하여 전산입력･관리하되, 창의적 체험활동상황, 일상생활 활동상황, 행동특성 및 종합의견의 누가기록 여부 및 방법은 학교장이 정한다.", "▪교육정보시스템에서 관리하는 보조부 등 누가기록 자료는 별도로 출력하여 결재를 받지 않으며 수기장부로 관리하지 않는다.", "▪‘창의적 체험활동상황, 일상생활 활동상황, 행동특성 및 종합의견의 누가기록 방법’은 기재 양식, 기재된 기록의 관리 방법 등을 의미한다. ※ 학교생활기록부 내 ‘창의적 체험활동상황, 일상생활 활동상황, 행동특성 및 종합의견의 누가기록 입력 여부·관리 방법 등’을 학교장이 정하도록 한 바, 전산입력 방법도 그 중 하나임.", "▪학생이 전출·휴학·제적·자퇴·퇴학할 경우에도 원적교에서는 해당 학생이 재학할 때까지의 각종 자료를 교육정보시스템 등에 입력하여 보관해야 한다. 다만, 창의적 체험활동상황 영역별 누가기록, 일상생활 활동상황 영역별 누가기록, 행동특성 및 종합의견 누가기록 관련 사항은 학교장이 정한 지침에 따른다. ※ ‘각종 자료’라 함은 학적 특기사항, 출결상황(고등학교 과목별 출결현황 포함), 창의적 체험활동상황 영역별 특기사항, 일상생활 활동상황 특기사항, 교과학습발달상황 세부능력 및 특기사항, 행동특성 및 종합의견 등을 말함. ※ 교육정보시스템을 통하여 전송받을 수 있는 전입생의 자료는 기본학적, 성적, 건강기록부, 학교생활기록부, 출결내역, PAPS, 학부모서비스 신청내역, 학교생활기록부 정정대장, 개별화 교육계획 등이며, 학생생활 및 학교스포츠클럽 누가기록 자료의 경우 교육정보시스템을 활용하여 입력·관리한 경우 전송 가능함.", "⑤ 학생이 전･편입학, 재취학 할 경우 원적교의 장은 재학 당시까지의 상황을 입력한 학교생활기록부 전산자료를 전･편입학, 재취학하는 학교로 이송한다.", "▪전출입 시 자료 송부는 다음에 따라 처리한다. 1. 전출 시에는 교육정보시스템 등에 전출일 현재까지의 각종 자료를 입력･확인 후 전입교로 전송한다. 이때, 입력의 근거가 되는 증빙서류는 원적교에서 보관한다. 2. 위 ‘1’의 각종 자료는 전출 당일 전송하는 것을 원칙으로 하며, 별도의 ‘전출(입) 요청 공문’ 혹은 ‘전입(출) 승인 공문’은 발송하지 않는다. ※ 전출 당일 모든 자료의 전송이 어려울 경우에는 기본학적 자료만 전출 당일 전송하고 나머지 자료는 전입교와 협의를 통해 추후 전송 가능함. 3. 위 ‘1’에도 불구하고, 부득이한 사유로 전출일까지 입력하지 못한 당해 학년도의 누락 자료가 있을 경우에는 다음과 같이 처리한다. 가. (전출교) 작성한 증빙서류를 포함한 ‘자료 입력 관련 공문’을 전입교로 전송함. 나. (전입교) 소속 시도교육청 지침에 따라 위 ‘가’의 ‘자료 입력 관련 공문’ 등을 근거로 자료를 입력･관리함. ※ <예시> 수상대상자가 시상일자 이전에 전출한 경우 전입교에서 [학생생활-수상경력-학급별수상 관리]의 {학급별수상관리} 탭에서 입력할 수 있으며, 수상연월일은 전출교에서 보내온 공문을 근거로 입력함. 4. 이전 학년도 자료의 정정은 전출교에서 자료를 받아 전입교에서 처리한다. ※ 전출교는 학교생활기록부 내용의 대조･확인 작업을 철저히 하여 오류가 없도록 확인한 후 자료를 전송할 책임이 있음. 5. 교육정보시스템 또는 공문을 통해 전송된 자료에 학교폭력 관련 조치사항이 포함되어 있는 경우 전입교에서는 ‘학교폭력 가해학생 조치사항 관리 대장’에 추가 기록하여 비공개 문서로 관리한다. 6. 전출교는 ‘학교폭력 가해학생 조치(제1호, 제2호, 제3호) 조건부 기재유보 관리대장’에 기록된 조치사항을 공문을 통해 전입교에 전송하고, 전입교에서는 ‘학교폭력 가해학생 조치(제1호, 제2호, 제3호) 조건부 기재유보 관리대장’에 추가 기록하여 비공개 문서로 관리한다.", "▪타교 편입학 시 자료 송부 방법은 ‘전출입 시 자료 송부 방법’을 준용한다.  학교생활기록부 발급 관련 사항은 다음을 참조한다.  재학(휴학)생 및 학업 중단 학생(자퇴·퇴학·제적)의 학교생활기록부를 나이스 플러스/학부모서비스나 교육정보시스템의 [{민원}민원업무]를 통해 제공하는 경우, 작성이 완료되지 않은 학교생활기록부의 서술형 항목(창의적 체험활동상황 영역별 특기사항, 교과학습발달상황 세부능력 및 특기사항, 행동 특성 및 종합의견)은 제공하지 않는다. - 당해 학년도 학교생활기록부 서술형 입력 항목은 「공공기관의 정보공개에 관한 법률」 제9조제1항 제5호에 따라 내부검토 과정에 있는 사항 등으로서 공개될 경우 업무의 공정한 수행에 현저한 지장을 초래한다고 인정할 만한 상당한 이유가 있는 정보에 해당하므로 학년도 종료 전에는 당사자를 포함하여 비공개하는 것이 원칙임. ※ 재학생은 당해 학년도, 학년도 종료 전 휴학한 학생은 휴학 당시 학년도, 학업 중단 학생은 학업 중단 발생 학년도의 서술형 항목 자료는 제공하지 않음. ※ 학교생활기록부 증명 발급은 교육정보시스템의 [학생부] 메뉴를 활용하지 않고, 반드시 [{민원}민원업무] 메뉴의 ‘학교생활기록부(유,초,중,고)’를 활용하며, 상급학교 전형자료를 온라인으로 제공하지 않는 학생의 상급학교 전형자료용 학교생활기록부는 [{민원}민원업무] 메뉴의 ‘생활기록부(대입전형용)’를 이용하여 출력함.  학교생활기록부 전산화 이전 졸업생의 학교생활기록부 발급 시 부모 정보와 관련된 사항(교육부훈령 제243호 기준 인적사항 내 가족상황 및 특기사항)은 제공되지 않도록 유의한다.  학교생활기록부 기재에 필요한 개인정보 보유기간의 경과와 개인정보의 처리 목적 달성 등 개인정보가 불필요하게 되었을 때는 지체없이 개인정보를 파기하여야 하며, 파기 시에는 복구 또는 재생되지 아니하도록 조치하여야 한다.  적용 훈령 변경에 따른 학교생활기록부 입력 방법은 다음과 같다.  훈령 제243호(2018.3.1.) 이전 훈령의 적용을 받았던 학생이 복학, 재입학, 편입학 등의 사유로 제280호(2019.3.1.) 이후 훈령의 적용을 받아 항목별 입력 가능한 글자 수가 축소되는 경우, 학업성적관리위원회의 심의를 통해 변경된 글자 수에 맞도록 수정하여 입력해야 한다.  훈령 제477호(2024.3.1.) 이전 훈령의 적용을 받았던 학생이 복학, 재입학, 편입학 등의 사유로 ‘학교폭력 가해학생에 대한 조치사항’을 옮겨 적어야 할 경우, 정정 절차를 거쳐 기존의 내용은 삭제하고 「학교폭력 조치상황 관리」에 입력해야 한다.  학교생활기록부 서술형 항목 입력 시 유의사항은 다음과 같다.  학교생활기록부 서술형 항목 입력 시 특수문자, 문단구분 기호(번호) 입력은 지양한다.  특기사항 등에 입력하는 서술형 문장은 명사형 어미로 종결하며, 문단(내용) 단위로 줄 바꿈을 하여 입력할 수 있다."]}, {"id": "student", "title": "인적·학적사항", "emoji": "👤", "page_range": "p.38~52", "items": ["제7조(인적･학적사항)", "① ‘학생정보’에는 성명, 성별, 주민등록번호와 입학 당시의 주소를 입력하되, 재학 중 주소가 변경된 경우 변경된 주소를 누가하여 입력한다.", "▪학생의 성명, 성별, 주민등록번호와 주소는 주민등록표 등(초)본과 일치하여야 한다.", "▪주소를 누가 기록하여 학생의 거주 관계를 이해하는 자료로 활용한다.", "② 중･고등학교의 ‘학적사항’에는 입학 전 전적학교의 졸업 연월일과 학교명을 입력하며, 검정고시 합격자는 합격 연월일과 ‘졸업학력 검정고시 합격’이라고 입력한다.", "▪검정고시 합격자는 검정고시 합격 연월일과 검정고시 합격 내용을 입력하되, ‘중학교 졸업학력 검정고시 합격’으로 입력한다.", "③ 재학 중 학적변동이 발생한 경우 전출교와 전입교에서 각각 학적변동이 발생한 일자, 학교와 학년, 학적변동 내용을 ‘학적사항’에 입력한다. 학적 처리에 사용하는 용어는 별표 7과 같다.", "▪초･중･고등학생의 입학전형, 전･편입학, 재입학, 휴학, 자퇴, 퇴학 등 학적에 대한 세부사항은 시도교육청의 지침에 따른다. ※ 특수교육대상자는 의무 교육대상자의 학적처리에 준하여 처리함.(중학교 기재요령 ‘인적･학적사항’ 참고) - 단, 특수교육대상자의 ‘유예 및 면제’는 「장애인 등에 대한 특수교육법 시행령」 제14조에 따라 교육감 또는 교육장에게 신청하고, 관할 특수교육운영위원회의 심의를 거쳐 결정함", "④ ‘특기사항’에는 교육부장관이 별도로 정하는 학적변동의 사유를 입력한다.", "▪‘교육부장관이 별도로 정하는 학적변동’이란 자퇴, 퇴학, 휴학, 유급, 조기진급 및 학교장이 기재가 필요하다고 인정하는 학적변동 사항을 의미한다.", "별표 7(학적처리에 사용하는 용어)", "1. 입학 : 학교에 들어감(신입학)", "▪당해 학년 수업일수의 3분의 2이상 남은 시점까지 1학년으로 처음 학교에 들어오는 경우를 말한다.", "▪외국인 학생(대한민국 국적이 없는 경우)이 1학년으로 신입학하는 경우 국내 학생과 동일하게 입학으로 처리한다.", "2. 취학 : 처음으로 의무교육에 해당하는 학교의 적정 학년에 들어감", "3. 재학 : 당해 학교의 학생 신분(학적)을 보유함", "4. 재입학 : 고등학교에서 학업을 중단한 자가 중단 이전의 학교에 재학 당시 학년 또는 그 아래의 학년으로 다시 입학함 ※ 의무교육에 해당하는 학교 및 특수교육대상학생은 불가", "5. 재취학 : 의무교육 대상자로서 ‘면제, 유예, 정원 외 학적관리’ 중인 자(의무교육을 중단한 자)가 다시 의무교육을 받고자 의무교육에 해당하는 학교에 다니게 됨", "6. 편입학 : 의무교육 대상이 아닌 자가 학업 중단 이전의 학교에 재학 당시 학년의 차상급 학년으로 다시 입학하거나, 다른 학교로 다시 입학함 ※ 의무교육 대상이 아닌 자가 학업중단 이전과 동일 또는 하위의 초･중학교 학년으로 다시 입학하는 경우에도 편입학으로", "▪편입학할 수 있는 자는 편입학하는 학년의 이전 학년까지의 과정을 수료한 자 및 이와 동등 이상의 학력이 있다고 인정되는 자이어야 한다(「초･중등교육법 시행령」 제74조).", "▪외국인 학생이 학력인정 및 학력심의절차에 따라 고등학교에 들어오는 경우 편입학으로 처리한다 (1학년 신입학 제외).", "▪고등학교의 장은 편입학하고자 하는 자(중학교를 졸업한 자 또는 「초·중등교육법 시행령」 제97조에 따라 이와 동등한 학력을 인정받은 자)가 편입학 신청 시, 「조기진급 등에 관한 규정」 제5조에 따른 조기진급·졸업·진학 평가위원회가 실시하는 신청인의 학교 외 학습경험에 관한 심의 및 교과목별 이수인정평가의 결과에 따라 학년을 정하여 편입학하게 할 수 있다(「초·중등교육법 시행령」 제98조의4) ※ 근로청소년을 위한 특별학급에서 1년 이상(고등학교 2학년 2학기 이후 편입학 시 1학기 이상) 학습한 경험이 있는 자가 편입학을 신청하는 경우에도 이와 동일하게 적용함.", "▪입학･편입학은 해당 학교의 교육과정 이수에 지장이 없는 범위인 당해 학년 수업일수의 3분의 2이상 남은 시점까지 수시로 입급할 수 있다(「초･중등교육법 시행령」 제50조, 제89조). ※ 학생의 출석일수가 당해 학년 수업일수의 3분의 2 미만이 될 경우에는 각 학년 과정의 수료에 필요한 출석일수 부족 등으로 수료 또는 졸업 인정이 되지 않으므로 원칙적으로 당해 학년도 입학･편입학 등은 불가능함. ※ 다만, 학생과 학부모가 원할 경우 당해 학교장은 학교의 교육 여건 등을 고려하여 학생의 학습권 보호 차원에서 입학·편입학을 허가할 수 있음. 이때 학교에서는 허가에 앞서 학생, 학부모에게 당해 학년도에는 출석일수 부족으로 수료 또는 졸업이 되지 않음을 정확히 주지 및 확인시켜 주어야 함.", "7. 전입학 : 다른 학교 재학생이 우리 학교 재학생이 됨", "▪전입학의 경우 전출교와 전입교의 출석일수 합이 전입교 수업일수의 3분의 2 이상이 되는 경우에만 해당 학년을 수료할 수 있다.", "8. 복학 : 휴학기간 만료에 따라 다시 학교에 들어옴", "9. 진급 : 해당 학년의 교육과정을 수료하여 상급 학년으로 올라감", "10. 조기진급 : 학칙에 따라 상급 학년의 교육과정을 조기 이수하여 차상급 학년으로 진급함", "11. 전출 : 다른 학교로 전입학하기 위해 전입 학교로 학적을 옮김 12. 유급 : 해당 학년 교육과정 미수료에 따라 상급 학년으로 진급하지 못함", "▪유급은 출석일수 부족*으로 해당 학년 교육과정을 미수료하여 상급학년으로 진급하지 못한 것으로 다음 학년도 1학기 시작일부터 다시 학업을 수행해야 한다. * 출석일수 부족은 당해 학년도 수업일수 3분의 2이상 출석하지 못한 것을 말함.", "<예시> 수업일수가 191일인 경우 191의 3분의 2는 127.33… 으로 계산되나 소수점 이하를 올림하여 128일 이상 출석하지 못한 경우 학년말에 유급대상자로 선정함.", "13. 휴학 : 질병 등의 사유로 학교장의 허가 하에 일정기간 동안 교육과정 이수를 중단함 ※ 의무교육에 해당하는 학교 및 특수교육대상학생은 불가", "14. 면제 : 「초･중등교육법」 제14조에 따라 취학 및 교육 의무를 면함", "15. 취학유예 : 「초･중등교육법 시행령」제28조에 따라 해당 학년도에 취학하여 교육받을 의무를 다음 학년도까지 보류함", "16. 유예 : 재학 중 교육감이 정하는 질병이나 그 밖의 부득이한 사유가 있는 경우, 관계 법령에서 정하고 있는 경우, 의무교육대상자의 교육받을 의무를 다음 학년도까지 보류함 ※ 학칙에 따라 ‘정원 외 학적관리’할 수 있음", "17. 제적 : 고등학교에서 사망(명예졸업에 해당하는 경우 제외) 등 학칙에 따라 재학생 자격이 소멸되어 학적에서 제외됨 ※ 의무교육에 해당하는 학교 및 특수교육대상학생은 불가", "18. 자퇴 : 고등학교에서 개인 또는 가정사정으로 인해 학생의 바람으로 재학생의 신분을 포기함 ※ 의무교육에 해당하는 학교 및 특수교육대상학생은 불가", "19. 퇴학 : 고등학교에서 징계 등 학칙에 따라 재학생의 신분을 박탈함 ※ 의무교육에 해당하는 학교 및 특수교육대상학생은 불가", "20. 수료 : 해당 학년의 전 교육과정을 이수함", "21. 졸업 : 전 학년 교육과정을 수료하여 해당 학교의 학업을 마침", "22. 조기졸업 : 학칙에 따른 수업 연한의 단축을 통해 해당 학교 전 교육과정을 조기에 수료하여 해당학교의 전 과정을 마침", "23. 명예졸업 : 학칙에서 정하는 바에 따라 학교장이 명예졸업으로 인정한 경우를 말함 ※ 명예졸업은 수료 및 졸업, 학력인정, 자격인정과 무관함", "▪명예졸업은 학칙에서 정하는 바에 따라 학교장이 명예졸업으로 인정한 경우를 말하며, 수료 및 졸업 (「초･중등교육법 시행령」 제50조), 학력인정(「초･중등교육법 시행령」 제96조, 제97조, 제98조)이나 자격인정(「초･중등교육법 시행령」 제99조, 제100조, 제101조, 제102조, 제103조)과 무관하다.", "▪명예졸업 대상자 선정 등은 학업성적관리위원회에서 심의한다. ※ 명예졸업 처리 절차 : 심의 신청 → 학업성적관리위원회 개최 및 심의 → 명예졸업 인정 시 교육정보시스템에 명예졸업 대상자로 등록 → 당해 학년도 졸업일을 기준으로 명예졸업 처리", "24. 졸업유예 : 고등학교에서 출석일수는 충족하였으나, 졸업에 필요한 학점을 모두 취득하지 못해 졸업 자격을 얻지 못함", "▪졸업유예는 고교학점제 적용(2025학년도 입학생부터)에 따라, 수업일수의 3분의 2이상 출석하여 출석일수 기준은 충족하였으나 졸업에 필요한 학점(192학점 이상)을 취득하지 못해 졸업 자격을 얻지 못한 경우를 말한다. ｢초･중등교육법 시행령｣ 제92조의3(학점제의 운영 등) 법 제48조제3항에 따른 고교학점제(이하 “고교학점제”라 한다)의 운영, 고교학점제를 운영하는 학교의 학생이 졸업에 필요한 교과목 이수의 인정 기준과 학점 수 등에 관한 사항은 법 제23조제2항에 따른 교육과정의 범위에서 학칙으로 정한다.", "▣ 인적･학적사항 성명： 성별： 주민등록번호：", "➊ 학생정보 주소： 년 월 일 ○○중학교 제3학년 졸업", "➋ 학적사항 년 월 일 □□고등학교 제1학년 입학", "➊ 학생정보 가. 학생의 성명은 성과 이름 사이에 공백을 두지 않는다. 나. 외국인의 경우 여권(외국인등록증, 외국인등록 사실증명, 국내거소신고 사실증명)에 표기된 영문 또는 한글의 성명과 성별을 그대로 입력한다. ※ 증빙서류에 학생의 성명이 영문과 한글로 병기되어 있는 경우, 학생과 학부모의 희망에 따라 성명 표기 방식을 선택할 수 있음. ※ 성별은 ‘남’ 또는 ‘여’로 구분하여 입력하며, 복수국적인 경우 대한민국 국적을 적용하여 입력함. 다. 우리나라 주민등록번호가 미부여된 외국국적자 등의 경우, 외국인등록번호나 국내거소신고번호를 입력한다. - 다만, 외국인등록번호나 국내거소신고번호가 없는 경우 주민등록번호 입력방식에 따라 앞 6자리는 생년월일, 뒤 7자리는 남자는 ‘3000000’, 여자는 ‘4000000’으로 입력하며 동성 쌍둥이일 경우 끝자리에 1･2를 부여함. 기재 방법", "▸ 남학생의 경우: 060521-3000000", "▸ 여학생의 경우: 070809-4000000", "▸ 동성 쌍둥이인 경우: 080315-3000001, 080315-3000002", "라. 교육정보시스템 [학적-기본학적관리-학생주소연계]를 통하여 학생의 주소를 입력할 수 있다.", "마. 학생정보 변경 시, 신입생의 학생정보 변경은 ‘수정’ 처리하며, 재학생 및 졸업생의 학생정보 변경은 ‘정정’ 처리한다. 다만, 신입생의 개명(표기방식 변경 포함)은 정정대장을 작성하여 ‘정정’ 처리하고, 신입생과 재학생의 주소는 별도 정정절차 없이 교육정보시스템의 {누가주소등록}탭에서 처리한다. ※ 개명(표기방식 변경 포함)으로 인한 정정은 이를 증빙할 수 있는 서류(학생 본인의 개명 이력이 표기된 주민등록표 초본 또는 기본증명서, 여권 등)를 근거로 하며, 학생정보 정정의 경우 학업성적관리위원회의 심의를 생략할 수 있음. ※ 비밀전학의 경우 학생의 피해가 발생하지 않도록 전입교에서는 변경된 주소를 누가기록하지 않음. <관련 법령> 「아동복지법 시행령」 제26조의4(피해아동의 취학에 대한 지원), 「아동학대범죄의 처벌 등에 관한 특례법」", "제35조(비밀엄수 등의 의무) 및 「가정폭력방지 및 피해자보호 등에 관한 법률 시행령」 제1조의3(아동의 취학 지원), 「가정폭력범죄의 처벌 등에 관한 특례법」 제18조(비밀엄수 등의 의무) 기재 방법", "▸신입생의 학생정보(성명 제외) 수정: 교육정보시스템의 [학적-기본학적관리-기본신상관리]", "▸재학생: 교육정보시스템의 [학생부-정정대장관리-정정대장작성]", "▸학업 중단 학생: 교육정보시스템의 [학생부-정정대장관리-정정대장작성], {재학아닌학생} ※ 신입생이 입학 학년도에 학업을 중단하고 개명을 제외한 학생정보 변경을 요청할 경우에는 학적반영 취소 후 수정", "▸ 졸업생: 교육정보시스템의 [학적-졸업생자료관리-졸업생학생부정정대장작성]", "▸ 보존시스템으로 자료가 이관된 졸업생: 교육정보시스템의 [학생부보존-학생부정정관리-졸업생학생부정정 대장작성]", "➋ 학적처리에 사용하는 용어: [훈령 및 해설] 내용 참조", "➌ 특기사항 가. 교명이 변경된 경우에는 특기사항에 교명 변경 내용을 입력한다. 기재 방법", "▸교육정보시스템 [학적-기본학적관리-기본신상관리]의 {학적사항} 탭에서 ‘학적특기사항’의 ‘일괄입력’을 선택하고 관련 내용을 등록함.", "<예시> 2026.03.01. 학교 통폐합으로 인한 교명 변경", "나. 자퇴, 퇴학, 휴학, 유급, 조기진급 및 학교장이 기재가 필요하다고 인정하는 학적변동의 사유를 입력한다. ※ 귀국학생 등의 재입학･편입학 시 해외 수학 기간 및 외국학교명은 ‘특기사항’에 기재하지 않음.", "<예시> 출석일수 미달로 유급된 경우 2022년 02월 10일 □□중학교 제3학년 졸업 학적사항 2022년 03월 02일 ○○고등학교 제1학년 입학 2026년 02월 13일 ○○고등학교 제3학년 졸업 특기사항 2023.02.28. 출석일수 미달로 고등학교 1학년 유급", "<예시> 질병으로 휴학한 경우 2023년 02월 10일 ○○중학교 제3학년 졸업 학적사항 2023년 03월 02일 □□고등학교 제1학년 입학(2024년 06월 19일 휴학) 특기사항 2024.06.19. 질병치료로 휴학", "<예시> 질병으로 휴학 후 자퇴한 경우 2023년 02월 10일 ○○중학교 제3학년 졸업 학적사항 2023년 03월 02일 □□고등학교 제1학년 입학(2023년 06월 15일 휴학)(2024년 04월 05일 자퇴) 2023.06.15. 질병치료로 휴학 특기사항 2024.04.05. 가정 사정으로 자퇴", "<예시> 학칙에 따라 명예졸업으로 인정된 경우 2026년 02월 07일 ○○중학교 제3학년 졸업 학적사항 2026년 03월 01일 □□고등학교 제1학년 입학 2027년 02월 05일 □□고등학교 명예졸업 특기사항 2026.07.08. 학교교육활동 중 사망", "<예시> 사망으로 인해 제적 처리된 경우 2026년 02월 07일 ○○중학교 제3학년 졸업 학적사항 2026년 03월 01일 □□고등학교 제1학년 입학(2026년 06월 17일 제적) 특기사항 2026.06.17. 질병으로 사망", "➍ 기타 가. 전출일과 전입일은 연중 공백기간이 없도록 처리하되, 전출일과 전입일이 동일한 경우 당일은 전입일로 하고 전출일은 전입일 하루 전으로 처리한다. 기재 방법", "▸ 금요일까지 전출교에 등교하고 월요일에 전입교에 등교한 경우 전출일은 일요일로, 전입일은 월요일로 함.", "▸ 단, 도서벽지 등 국내 원격지의 전출입일 경우 1일의 공백을 인정하고, 국외 원격지의 전출입일 경우 최대 3일의 공백을 인정하며, 이 기간은 수업일수에서 제외함.", "▸ 전출일과 전입일이 동일하여 화요일에 전출하고 화요일에 전입한 경우, 전출교에서는 월요일까지를 수업일수로, 전입교에서는 화요일부터 수업일수로 처리함.", "※ 신입생 학적 생성일은 학년도 시작일(3.1.)로 통일하되, 대입 농어촌전형 등의 자격과 관련하여 필요할 경우 3월 1일 동일 날짜에 전출입 처리 가능(교육부 기초학력진로교육과-669(2024.2.21.) 참조)", "나. 유급･재입학･편입학･복학 학생의 학교생활기록부 입력 방법은 다음과 같다. 1) 유급 대상자는 진급 및 졸업 대상자에서 제외한다. 기재 방법", "▸유급대상자는 학년도말에 [학적-진급대상자 반편성관리-진급대상자 반편성관리-대상자생성]의 {유급자관리} 탭에서 등록하여 진급처리에서 제외함. 2) 유급･재입학･편입학･복학한 학생의 학교생활기록부를 입력할 때는 학년이력, 인적･학적사항, 학교폭력 관련 조치사항을 제외한 항목(수업일수, 출결상황, 성적, 기타 비교과 영역 등 제반 내용)에 대하여, 중복된 기간 동안의 내용은 학교생활기록부 정정 절차에 따라 삭제한다. 즉, 재입학･편입학･복학일 이전의 내용은 학업 중단 시의 내용으로 입력하고, 유급･재입학･편입학･복학일 이후의 내용은 유급･ 재입학･편입학･ 복학 후 새로 수행하는 사항을 입력한다. 기재 방법", "▸2025.07.09.자로 ○○고등학교 3학년에서 학업 중단하고, 2026.05.06.자로 ○○고등학교 3학년으로 재입학하는 경우에는 2025.05.06.-2025.07.09.까지의 내용은 삭제함. 2025.05.06. 2025.07.09. 3학년 자퇴 이전 내용 인정 중복기간 삭제 새로 수행하는 사항 입력 2026.05.06. 3학년 재입학 2026.07.09.", "▸2024.11.07.자로 ○○고등학교 2학년에서 학업 중단하고, 2026.08.26.자로 ○○고등학교 2학년으로 재입학 후 다시 2026.10.16.자로 학업 중단을 한 경우에는 2024.08.26.자 이후의 내용은 삭제하되, 재입학 이후의 기간(2026.08.26.-2026.10.16.) 동안 수행한 내용만을 입력함. 2024.08.26. 2024.11.07. 2학년 자퇴 이전 내용 인정 중복기간 삭제 이후 내용 삭제 새로 수행하는 사항 입력 2026.08.26. 2학년 재입학 2026.10.16. 2학년 자퇴 ※ 유급･재입학･편입학･복학 등에 따라 학생의 중복기간 자료를 삭제하는 경우, 삭제 전 출력물을 객관적 증빙자료로 보관함.", "<예시> 학업을 중단하였다가 재학 당시 학년으로 들어온 경우 2025년 02월 14일 ○○중학교 제3학년 졸업 학적사항 2025년 03월 01일 □□고등학교 제1학년 입학(2025년 04월 18일 자퇴) 2026년 03월 04일 □□고등학교 제1학년 재입학 특기사항 2025.04.18. 가정 사정으로 자퇴", "<예시> 학업을 중단하였다가 다른 학교로 다시 들어온 경우 2025년 02월 14일 ○○중학교 제3학년 졸업 학적사항 2025년 03월 01일 □□고등학교 제1학년 입학(2025년 06월 13일 자퇴) 2026년 03월 01일 △△고등학교 제1학년 편입학 특기사항 2025.06.13. 학교생활부적응으로 자퇴", "다. ‘귀국학생 등’의 학적 처리 방법은 다음과 같다. 1) ‘귀국학생 등’의 학년을 결정할 때, 다음 각 호에 해당하는 경우에는 남은 수업일수가 당해 학년도 수업일수의 3분의 2이상에 미달하여도 해당 학년 수료에 영향을 받지 아니한다. 가) 학년 배정을 받아 편입학하는 경우 나) 「조기진급 등에 관한 규정」 제5조에 따른 조기진급･졸업･진학 평가위원회가 실시하는 교과목별 이수인정 평가의 결과에 따라 학년을 정하여 편입학하는 경우 2) ‘귀국학생 등’이란 「초･중등교육법 시행령」 제19조제1항의 각호에 해당하는 학생을 말한다. [「초･중등교육법 시행령」 제19조(귀국 학생 및 다문화학생 등의 입학 및 전학)]", "① 다음 각 호의 어느 하나에 해당하는 아동이나 학생(이하 이 조에서 “귀국학생등”이라 한다)의 보호자는 제17조 및 제21조에 따른 입학 또는 전학 절차를 갈음하여 거주지가 속하는 학구 안에 있는 초등학교의 장에게 귀국학생 등의 입학 또는 전학을 신청할 수 있다.", "1. 외국에서 귀국한 아동 또는 학생", "2. 재외국민의 자녀인 아동 또는 학생", "3. 「북한이탈주민의 보호 및 정착지원에 관한 법률」 제2조제1호에 따른 북한이탈주민인 아동 또는 학생", "4. 외국인인 아동 또는 학생", "5. 그 밖에 초등학교에 입학하거나 전학하기 전에 국내에 거주하지 않았거나 국내에 학적이 없는 등의 사유로", "제17조 및 제21조에 따른 입학 또는 전학 절차를 거칠 수 없는 아동 또는 학생 …(이하 생략)… 3) ‘귀국학생 등’의 해당 학년 수료기준 출석일수는 ‘입급일부터 학년 종료일까지 남은 수업일수’의 3분의 2이상이다. 4) ‘귀국학생 등’이 외국학교에서 수학한 같은 기간의 기록은 학년을 결정하는 참고자료로, 해당 학년의 정규교육과정을 이수한 기록이 아니므로 해당 학교의 학교생활기록부에 입력하지 않는다. 5) 외국인인 학생과 인정 유학한 학생이 국내학교에 편입학하고자 할 때, 외국학교의 재학기간과 교육과정 이수 내용을 근거로 학년을 결정하는 경우에는 교과목별 이수인정평가를 실시하지 않는다.", "<예시> 인정 유학으로 자퇴 후 편입학한 경우 2024년 02월 15일 ○○중학교 제3학년 졸업 학적사항 2024년 03월 01일 □□고등학교 제1학년 입학(2025년 02월 15일 자퇴) 2026년 09월 02일 □□고등학교 제3학년 편입학 특기사항 2025.02.15. 가정 사정으로 자퇴 6) ‘귀국학생 등’이 입학･편입학 시, 해당 학교에 제출하는 서류는 다음과 같다. 가) 아포스티유 확인을 받은 재학증명서(입･퇴학연월일 및 재학 학년 명시, 학교장 서명 또는 날인), 아포스티유 협약국이 아닌 경우에는 영사관(대사관)의 공증 필요", "※ 해외 당사국이 학력을 인정하는 초･중･고등학교*에서 유학을 한 경우, 교육부의 「귀국학생 등의 학적서류 처리절차 간소화 안내」(2014.8.22.)에 따라 우리나라 학교에 취학･재취학･편입학 시 제출해야 할 서류에 대해 아포스티유 발급 또는 영사확인 절차를 생략함. * 목록 위치: 교육부 누리집(www.moe.go.kr)의 정책>초･중･고 교육>귀국학생 등의 학적서류 처리절차 간소화 대상 학교 목록", "※ 교육부 홈페이지 미탑재 학교일 경우 민원인이 해당국의 정규교육기관임을 소명(소재국 관할교육청의 학력 인정학교 목록 등)하거나 종전처럼 아포스티유 또는 영사관 공증절차를 거쳐 확인함. 나) 성적증명서 다) 국내 이전 학교 학교생활기록부(해당자) 라) 출입국에 관한 사실증명 마) 주민등록표 등본(귀국일자 이후 발행된 것) 바) 「감염병의 예방 및 관리에 관한 법률」 제27조에 따른 예방접종증명서 권장", "※ 󰡔학생 감염병 예방･위기대응 매뉴얼󰡕의 ‘해외 전입 학생 예방접종관리’ 참고 사) 기타 시도교육청의 지침에 따른 서류(반드시 관할교육청의 서류 확인 필요) 7) ‘귀국학생 등’이 입학･편입학 시, 학년 배정 방법은 다음과 같다. 가) 학년 배정은 외국학교 재학증명서 상의 재학기간과 성적증명서 상의 교육과정 이수 내용을 우리나라 학제(12학년제)에 맞추어 계산하여 정하되, 외국학교 입학 전 국내학교의 최종 재학 학년에 외국학교 재학기간을 합산하여 우리나라 학제에 맞추어 계산한다.", "▸ 외국학교에서의 1~6학년: 우리나라의 초등학교 과정", "▸ 외국학교에서의 7~9학년: 우리나라의 중학교 과정", "▸ 외국학교에서의 10~12학년: 우리나라의 고등학교 과정 나) 9월에 1학기가 시작되는 나라에서 수학하여 학제 차이로 인해 한 학기가 중복된 경우, 귀국 후 국내학교에 편입학할 때 한 학기 올려주고, 한 학기 월반이 되었을 경우 국내학교에 편입학할 때 한 학기 내려서 학년을 배정한다. 다) 국내학교에서 이수하지 못한 학기 수만큼 외국 정규학교에서 이수하여야 하며, 이수학기가 부족한 경우 아래 학년(학기)으로 입급한다. 라) 국내학교의 재학 학기보다 하위 학년(학기)을 이수한 경우 정상적인 학기 이수로 볼 수 없다.", "※ 다만, 학제 차이로 인하여 한 학기 내려가거나 올라갈 수 있음. 마) 외국 정규학교 이수기간은 최소 6개월(한 학기) 이상인 경우 인정된다(「국외유학에 관한 규정」", "<예시> ‘귀국학생 등’이 처음으로 1학년이 아닌 학년에 들어온 경우 학적사항 2026년 09월 02일 △△고등학교 제2학년 편입학 특기사항", "※ ‘귀국학생 등’이 고등학교의 적정 학년에 들어오는 경우 편입학으로 처리함", "<예시> ‘귀국학생 등’이 당해 학년 수업일수의 3분의 2이상 남은 시점에 1학년으로 처음 들어온 경우 학적사항 2026년 05월 09일 □□고등학교 제1학년 입학 특기사항", "<예시> ‘귀국학생 등’이 자퇴 후 편입학한 경우 2024년 03월 01일 △△고등학교 제1학년 입학(2025년 09월 11일 자퇴) 학적사항 2026년 05월 02일 △△고등학교 제3학년 편입학 특기사항 2025.09.11. 가정 사정으로 자퇴", "<예시> ‘귀국학생 등’이 시도교육청에서 학력심의를 통해 들어온 경우 학적사항 2026년 09월 02일 △△고등학교 제2학년 편입학 특기사항 ○○교육청의 학력심의를 통해 편입학 이전 학력 인정", "<예시> 외국인 학생이 본국으로 귀국하기 위해 자퇴한 경우 학적사항 2025년 07월 25일 □□고등학교 제1학년 편입학(2026년 01월 08일 자퇴) 특기사항 2026.01.08. 본국 귀국으로 인한 자퇴", "라. 한국학교 전출입 처리 방법은 다음과 같다. 1) 교육정보시스템을 사용하는 한국학교와의 전출입의 경우 한국학교에서는 한국학교장의 직인이 날인된 전학확인서를 보호자에게 발급하고, 보호자는 이를 국내학교에 제출하여야 한다. 이후 절차는 국내학교 전출입 방법과 동일하다. 2) 교육정보시스템을 사용하지 않는 한국학교와의 전출입 절차는 다음과 같다. <국내학교에서 한국학교로 전출 시>", "① 국내학교에서 한국학교로 전출 동의 요청 공문을 발송함.", "② 교육정보시스템의 [학적-전출관리-전출관리-종합자료검색]의 {전출생추가등록}에서 한국학교로 전출 처리함.", "③ 국내학교에서 한국학교장에게 전출 승인 공문을 팩스로 전송하고, 공문 원본과 전학서류 일체를 밀봉하여 보호자에게 전달, 보호자는 한국학교장에게 제출함. <한국학교에서 국내학교로 전입 시>", "① 국내학교에서 한국학교로 전입 동의 요청 공문을 발송함.", "② 교육정보시스템의 [학적-기본학적관리-추가입학/입력누락자등록]에서 전입생으로 등록함.", "③ 한국학교에서 받은 전학서류(학교생활기록부, 재학증명서 등)를 참고하여 이전 학년도 학생 자료를 [학적- 기본학적관리-추가입학/입력누락자자료입력]에서 입력함. ※ 한국학교에서는 전학서류 발급 시 한국학교장의 직인을 반드시 날인하고, 보호자는 귀국 후 한국학교에서 발급받은 서류를 국내학교에 제출함. ※ 교육부 인가 한국학교([참고자료 1] 참조)에서 국내학교로 전입할 경우 국내학교에서의 전학 처리와 동일한 과정을 거치기 때문에 외국 소재 타 학교에서의 편입학 처리와 구별해야 함. ※ 국내학교(A) 전출 → 한국학교(B) 전입 ･ 전출 → 국내학교(C) 전입 시 국내학교(A) 또는 한국학교(B)로부터 이전학년도 자료를 받아 입력함. 3) 한국학교에서 취득한 학업성적은 국내 해당 학년의 동일(유사) 과목 학업성적으로 반영하여 처리한다. 다만, 동일(유사) 과목 인정 및 결시에 따른 인정점 부여 등의 사항은 전입교 학업성적관리위원회의 결정에 따른다. 기재 방법", "▸한국학교의 성적산출 방식이 국내학교와 다른 경우 교육정보시스템의 [성적-성적처리-개인별세부능력및 특기사항]에 교과목 성적을 직접 입력함. 4) 교육정보시스템을 사용하는 한국학교는 [참고자료 1] ‘재외한국학교 현황’을 참조한다.", "※ 한국학교에 따라 추가로 교육정보시스템을 사용할 수 있으며, 교육정보시스템 사용 한국학교인 경우라도 학년에 따라 사용하지 않을 수 있음(해당 한국학교 확인 필수). 5) 한국학교와 국내학교 간의 전출입은 정당한 해외 출국*에 한하여 인정한다. * 정당한 해외 출국이란 이민, 가족의 해외취업, 공무원 및 상사주재원인 부모의 해외 파견, 연구 수행 목적의 교환 교수 등에 의해 가족이 동행하여 외국으로 출국한 경우임. 6) 한국학교와의 전출입인 경우 출입국과 전출입을 위하여 소요되는 기간(3일 이내)을 수업일수에서 제외한다.", "마. 북한이탈주민 학생 학적 처리 방법은 다음과 같다. 1) 북한이탈주민인 학생의 전학은 「초･중등교육법 시행령」 제98조의2(학력심의위원회의 설치･운영 등) 및 제98조의3(학력인정과 학년결정을 할 수 있는 학교 등)에 따라 교육감 소속의 학력심의위원회 또는 교육감이 지정한 학교의 장(학업성적관리위원회)이 심의한 학력인정 및 학년 결정에 따라 전학 처리하고 이외의 사항에 대해서는 일반 학적 처리 절차에 준하여 처리한다. ※ 북한이탈주민인 학생의 학력인정과 학적관리는 ‘북한배경학생 지도교사용 매뉴얼(한국교육개발원, 2024.12.)’을 참조함(탈북청소년교육지원센터: www.hub4u.or.kr-자료마당-매뉴얼 및 참고자료).", "<예시> 북한이탈주민 학생의 경우 학적사항 2026년 03월 01일 ◇◇고등학교 제1학년 입학 특기사항 하나원 하나둘학교를 수료한 후 ㅇㅇㅇ교육청의 학력심의를 통해 중학교 졸업 학력 인정", "※ 북한이탈주민인 학생이 당해 학년 수업일수의 3분의 2이상 남은 시점까지 1학년으로 처음 들어오는 경우는 입학으로 처리함. 학적사항 2026년 06월 12일 □□고등학교 제2학년 편입학 특기사항 하나원 하나둘학교를 수료한 후 ㅇㅇㅇ교육청의 학력심의를 통해 편입학 이전 학력 인정", "※ 북한이탈주민인 학생이 고등학교에 중도 입급하는 경우 편입학으로 처리함.", "바. 제주국제학교 학적 처리 방법은 다음과 같다. 1) 다음 어느 하나에 해당하는 사람은 상급학교 입학 시 해당 학교를 졸업한 사람과 같은 수준의 학력이 있다고 인정한다. [초등학교 졸업자와 동등의 학력인정] 1. 전입을 통해 일반학교와 제주국제학교를 거친 경우 6년에 해당하는 학교교육과정을 마친 사람 2. 제주국제학교 초등학교 교육과정 전부를 마친 사람 ※ 단, ‘5년제’ 교육과정 수료자 중 보호자가 희망할 시, 초등 6학년으로의 전학이 가능함. [중학교 졸업자와 동등의 학력인정] 1. 전입을 통해 일반학교와 제주국제학교를 거친 경우 9년에 해당하는 학교교육과정을 마친 사람 2. 제주국제학교 중학교 교육과정 전부를 마친 사람 ※ 단, ‘8년제’ 교육과정 수료자 중 보호자가 희망할 시, 중학교 3학년으로의 전학이 가능함. [고등학교 졸업자와 동등의 학력인정] 1. 전입을 통해 일반학교와 제주국제학교를 거친 경우 12년에 해당하는 학교교육과정을 마친 사람 2. 제주국제학교 고등학교 교육과정 전부를 마친 사람 2) 국내학교에서 제주국제학교로 전출하거나 제주국제학교에서 국내학교로 전입하는 경우에는 ‘라’항의 ‘한국학교 전출입 처리 방법’에 준하여 처리하며, 제주국제학교에서 국내학교로 전입 시 학년배정은 ‘다’항의 ‘귀국학생 등의 학적 처리 방법’에 준하여 처리한다. ※ 제주국제학교: KIS-Jeju(한국국제학교), NLCS Jeju, BHA(Branksome Hall Asia), SJA jeju(Saint Johnsbury Academy Jeju) ※ 제주국제학교에서 국내학교로 이동하는 전입생의 국제학교 재학기간의 ‘교과학습발달상황’ 및 ‘창의적체험 활동상황’은 공란으로 둠. ※ 기타 세부적인 학적 처리에 대한 지침은 해당 시도교육청 지침에 따라 처리함. 사. 학력인정 외국교육기관･외국인학교 학적 처리 방법은 다음과 같다. 1) 국내학교에서 학력인정 초·중등 외국교육기관·외국인학교로 전출하거나 학력인정 초·중등 외국교육기관･ 외국인학교에서 국내학교로 전입하는 경우에는 ‘라’항의 ‘한국학교 전출입 처리 방법’에 준하여 처리하며, 학력인정 초·중등 외국교육기관·외국인학교에서 국내학교로 전입 시 학년배정은 ‘다’ 항의 ‘귀국학생 등의 학적 처리 방법’에 준하여 처리한다. ※ 학력인정 초·중등 외국교육기관에는 채드윅송도국제학교, 칼빈매니토바국제학교, 대구국제학교가 있으며, 학력 인정 외국인학교에는 청라달튼외국인학교가 있음. ※ 초·중등 학력인정 외국교육기관·외국인학교에서 국내학교로 이동하는 전입생의 해당 재학기간의 ‘교과학습발달상황’ 및 ‘창의적 체험활동상황’은 공란으로 둠. 아. 소년원학교 등 학적처리 방법은 다음과 같다. 1) 재학생의 소년원학교 입교는 「초･중등교육법」에 따라 입학･전학 또는 편입학한 것으로 본다(「보호소년 등의 처우에 관한 법률」 제31조제1항). ※ 교육정보시스템에서는 위탁학생으로 등록하여 관리하며, ‘교육구분’ 설정에 ‘기타’로 등록함. 2) 소년원학교 등의 학적처리는 ｢보호소년 등의 처우에 관한 법률｣ 제31조, 제32조, 제34조에 따르며, ｢보호소년 등의 처우에 관한 법률 시행령｣ 제64조의2, 제65조, 제85조를 참조한다. 3) 소년원학교 재학 중인 학생이 희망할 경우 학력인정 검정고시에 응시할 수 있다(「보호소년 등의 처우에 관한 법률 시행령」 제69조제1호~제3호).", "제69조(학력인정 검정고시의 응시 특례) 소년원학교에 재학 중인 보호소년 중 다음 각 호 어느 하나에 해당하는 사람은 학력인정 검정고시에 응시할 수 있다. 1. 초등학교 졸업학력 검정고시는 12세 이상으로 초등학교 교육과정을 이수 중인 사람 2. 중학교 졸업학력 검정고시는 15세 이상으로 중학교 교육과정을 이수 중인 사람 3. 고등학교 졸업학력 검정고시는 18세 이상으로 고등학교 교육과정을 이수 중인 사람 4) 재학생이 소년보호기관(소년원, 소년분류심사원, 청소년비행예방센터)에 입교한 경우, 재적교에서는", "[참고자료 6]을 참조하여 처리한다.", "자. 아동학대･가정폭력 관련 법*에 따른 피해학생의 취학지원 및 비밀처리 방법은 다음과 같다. * 「가정폭력방지 및 피해자보호 등에 관한 법률」, 「가정폭력방지 및 피해자보호 등에 관한 법률 시행령」, 「가정폭력범죄의 처벌 등에 관한 특례법」, 「아동복지법」, 「아동복지법 시행령」, 「아동학대범죄의 처벌 등에 관한 특례법」 등 1) 피해학생이 주소지 외 지역에 취학(입학, 재입학, 전입학 및 편입학 포함)하는 경우, 지방자치단체 등의 요청에 따라 우선적으로 지원한다. 또한, 전학 간 학교, 거주지, 연락처 등을 가해자(친권자 포함)에게 비밀로 하여 2차 피해가 발생하지 않도록 조치한다. ※ 전입 처리 시 교육정보시스템에서 비밀전입여부에 체크처리를 하여 전송되는 학생자료 중 학부모서비스 신청정보를 제외함. 2) 피해학생이 전학을 신청했을 시, 주소를 이전하지 않더라도(동일 지역 내 포함) 아동학대･가정폭력 발생 사실을 입증할 수 있는 객관적인 자료를 제출받고 전입학 또는 편입학을 허가한다.", "※ 객관적인 자료의 예시: 가정폭력상담소 또는 가정폭력피해자보호시설에서 발급한 가정폭력피해 상담 사실확인서, 지방자치단체의 취학지원 요청 공문과 학대피해아동 취학지원 요청서, 학대 피해아동 담당 지방자치단체 또는 아동보호전문기관의 사실 확인서 등", "차. 위탁학생, 병원학교·원격수업 등 학교 이외의 장소에서의 수강학생의 학적 처리 방법은 다음과 같다. 1) 소년보호기관, 대안교육 위탁교육기관, 지방자치단체, 직업교육 위탁기관, 병원학교･원격수업기관, 방송･ 정보통신매체 등에 참여하는 학생의 학적은 [참고자료 7]을 참조하여 재학생과 동일하게(소년보호 기관의 경우 재학생에 준하여) 관리한다. ※ 위탁학생은 교육정보시스템의 [학적-위탁·현장실습학생관리-위탁·현장실습학생등록]에서 학기 단위로 등록함. ※ 위탁학생 등록 시 ‘교육구분’ 설정에서 소년보호기관은 '기타'로, 대안교육 위탁교육기관은 '대안교육위탁기관'으로, 직업교육 위탁기관은 ‘직업교육위탁과정’으로, 병원학교･원격수업기관은 ‘병원학교’ 또는 ‘원격수업’으로, 방송･정보통신매체는 ‘원격수업’으로, 학교 밖 교육은 ‘학교 밖 교육’으로 등록함. 2) 학생미혼모의 대안교육 위탁교육기관을 교육정보시스템에서 등록 시 위탁교육 기관명이 드러나지 않도록 교육구분 설정을 ‘기타’로 하여 등록한다. ※ 2024학년도 이전의 기관명은 ‘학생미혼모 위탁교육기관 학생부 기재 개선(안) 안내’(교육부 교육복지정책과- 6436(2023.10.10.)) 공문을 근거로 정정할 수 있음. ※ 위탁교육기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력하되, 학생미혼모의 위탁교육 기관명이 드러나지 않도록 봉사활동 실적의 ‘장소 또는 주관기관명’과 수상경력의 ‘수여기관’에는 위탁교육 기관명을 재적교로 입력함.", "카. 이주배경학생의 학력인정･학적관리 및 방송통신고등학교 학적처리 방법은 다음과 같다. 1) 외국인학생의 경우 ‘외국 국적 학생을 위한 학적 관리 도움자료(’25.12.)(다문화교육포털, edu4mc.or.kr → 자료실 → 센터 발간자료 → 매뉴얼/도움자료)’를 참고할 수 있다. 2) 방송통신고등학교의 전･편입학 업무는 「방송통신중학교 및 방송통신고등학교 설치기준령」 제5조 제2항에 따라 시도의 교육 규칙으로 정한다. ※ 전입학으로 처리하는 경우 전출교와 전입교의 출석일수 합이 전입교 수업일수의 3분의 2이상이 되는 경우에만 해당 학년을 수료할 수 있음.", "타. 학력인정 대안학교 및 영재학교 전출입 처리 방법은 다음과 같다. 1) 재학 중 고등학교와 학력인정 대안학교 간 이동하는 경우는 전출입으로 처리한다. ※ 학력인정 대안학교에서 전입해 오는 경우 전입교 학업성적관리위원회의 결정에 따라 학교생활기록부의 ‘교과학습발달상황’에 관련 내용을 입력할 수 있음(단, 성적산출 방식이 다른 경우에는 과목 성적란에는 입력하지 않으나 ‘개인별 세부능력 및 특기사항’에는 입력할 수 있음). ※ 학력인정 대안학교 현황은 [참고자료 4]를 참조함. 2) 영재학교 재학 중 영재학교가 아닌 학교로 이동하는 경우는 전출입으로 처리하되, 학업성적관리위원회 심의를 거쳐 학교생활기록부를 작성하여 관리한다. 기재 방법", "▸‘전입교’ 교육정보시스템의 [학적-전입관리-전입관리-전편재입/복학생등록]에서 전입생으로 등록 및 자료 요청하며, 영재학교는 [학적-전출관리-전출관리-전출자료요청접수]에서 전출생 자료 요청사항을 확인한 후 인적･학적사항을 전송함.", "파. 검정고시 합격자의 학적사항 입력 방법은 다음과 같다. 1) 중학교 졸업학력 검정고시 합격 후 고등학교에 입학한 경우 학적사항에 검정고시 합격 연월일과 ‘중학교 졸업학력 검정고시 합격’으로 입력한다. 기재 방법", "▸[학적-기본학적관리-기본신상관리]의 {학적사항} 탭에서 ‘변동일자’에 합격연월일을 입력하고, ‘학적변동구분’에 ‘중학교 졸업학력 검정고시 합격’을 선택한 후 저장함.", "<예시> 중학교 졸업학력 검정고시 합격 후 입학한 경우 2025년 05월 08일 중학교 졸업학력 검정고시 합격 학적사항 2026년 05월 26일 △△고등학교 제1학년 입학 특기사항", "※ 당해 학년 수업일수의 3분의 2이상 남은 시점까지 1학년으로 처음 들어오는 경우는 입학으로 처리함."]}, {"id": "attend", "title": "출결상황", "emoji": "📅", "page_range": "p.53~66", "items": ["① ‘수업일수’에는 「초･중등교육법 시행령」 제45조에 따른 수업일수를 입력한다.", "▪학교의 수업일수는 「초･중등교육법 시행령」 제45조(수업일수) 규정에 의한 다음 각 호의 기준에 따라 학교의 장이 정한다. 다만, 학교의 장은 천재지변, 연구학교의 운영 또는 제105조에 따른 자율학교의 운영 등 교육과정의 운영상 필요한 경우에는 다음 각 호의 기준의 10분의 1의 범위에서 수업일수를 줄일 수 있다. 1. 초등학교･중학교･고등학교･고등기술학교 및 특수학교(유치원 과정 제외): 매 학년 190일 이상 2. 고등공민학교: 매 학년 170일 이상", "▪학생의 각 학년 과정의 수료에 필요한 출석일수는 「초･중등교육법 시행령」 제45조의 규정에 의한 수업일수의 3분의 2이상으로 한다(「초･중등교육법 시행령」 제50조제2항).", "② 출결상황은 별표 8에 따라 ‘결석일수’, ‘지각, ’조퇴‘, ’결과‘로 나누어 입력하되, 질병･미인정･기타로 구분하여 연간 총일수 또는 횟수를 각각 입력한다.", "▪‘지각’은 학교장이 정한 등교시각까지 출석하지 않은 경우로 학교장이 정한 등교시각 이후부터 하교시각 사이에 등교하면 지각으로 처리한다.", "▪‘조퇴’는 학교장이 정한 등교시각과 하교시각 사이에 하교한 경우를 말한다.", "▪‘결과’는 수업시간의 일부 또는 전부에 불참하거나 학교장이 정한 시각 이후에 수업에 참여한 경우 등을 말한다.", "③ 학적변동이 발생한 경우 동 학년의 수업일수 및 출결상황은 학적변동 전･후의 것을 합산하여 입력한다.", "④ ‘특기사항’에는 결석사유 등 교육부장관이 별도로 정하는 내용을 학급 담임교사가 입력한다.", "▪‘특기사항’에는 개근 또는 기타결석의 사유 등을 입력한다. ※ 개근은 해당 학년 동안 1회의 결석(지각, 조퇴, 결과)도 없는 경우이며, 교내에서 개근상･정근상 수상 대상자의 수상 여부의 판단은 시도교육청 및 학교별 방침에 따라 달리 적용할 수 있음.", "별표 8(출결상황 관리)", "1. 수업일수 가. 수업일수는 「초･중등교육법 시행령」제45조에 따라 학교장이 정한 학년별 학생이 연간 출석해야 할 총 일수를 말한다. 나. 학적변동(면제･유예･휴학･제적･자퇴･퇴학･전출 등) 발생일까지를 수업일수에 산입한다. 다. 학적 변동 전･후에 중복 일수가 있는 경우, 새로 학적을 부여받은(재입학･재취학･편입학･전입학･복학 등) 일수만 수업일수로 계산한다. 라. 학적을 새로 부여받은 자의 당해 학년 수업일수는 원적교의 당해 학년 수업일수와 합산하되, 중복되는 기간의 수업일수는 제외한다. 마. 재입학･전입학･복학 학생의 수업일수는 다른 학생의 수업일수와 같지 않을 수 있으나, 그 수업일수가 당해 학교 당해 학년 수업일수의 3분의 2 미만이 될 경우에는 각 학년 과정의 수료에 필요한 출석일수 부족으로 수료 또는 졸업 인정이 되지 않아 원칙적으로 당해 학년도 재입학･전입학･복학이 불가능하다. ※ 「초･중등교육법 시행령」 제50조제2항 참조", "▪다만, 학생과 학부모가 재입학･전입학･복학을 요구할 경우, 당해 학교의 장은 학교의 교육여건 등을 고려하여 학생의 학습권 보호 차원에서 재입학･전입학･복학을 허가할 수 있다. 이때 학교에서는 허가에 앞서 학생, 학부모에게 당해 학년도에는 출석일수 부족으로 수료 또는 졸업이 되지 않음을 정확히 주지 및 확인시켜 주어야 한다.", "2. 결석 가. 결석일수의 산정 1) 학칙에 따라, 출석하여야 할 날짜에 출석하지 않았을 때는 결석으로 처리한다. 2) 학적을 새로 부여받은 자의 당해 학년 결석일수는 원적교의 당해 학년 결석일수와 합산하되, 중복되는 기간의 결석일수는 제외한다. 나. 출석 인정 결석 1) 지진, 폭우, 폭설, 폭풍, 해일 등의 천재지변 또는 법정 감염병 등(학교 내 확산 방지를 위해 학교장이 필요하다고 인정하는 비법정 감염병을 포함)으로 출석하지 못한 경우 2) 병역관계 등 공적의무 또는 공권력의 행사로 인하여 출석하지 못한 경우", "▪‘병역관계 등 공적의무 또는 공권력 행사로 인하여 출석하지 못한 경우’라 함은 징병신체검사, 증인 출두를 말한다. ※ 현역병 지원입대는 학생이 졸업 전에 입대하지 않도록 지도하되, 지원입대를 한 경우는 「병역법」 제73조에 따라 휴학으로 처리하는 것을 원칙으로 하고, 졸업을 위한 출석일수를 충족한 경우, ‘기타결석’으로 처리 가능 ※ ‘지원입대’의 경우 신체검사 참여 등은 ‘기타결석’으로 처리함. ※ ‘특성화고등학교(특정분야의 인재양성을 목적으로 하는 교육을 실시하는 학교에 한함), 산업수요 맞춤형 고등학교, 일반고등학교 직업계열 학과(직업교육 위탁과정 제외)’는 부사관 입교를 ‘현장실습’ 이수로 처리함.", "▪법원소년부의 조사･심리 기간과 소년분류심사원에서의 재소기간(소년분류심사원에 위탁되거나 유치된 소년의 위탁기간)은 재적학교에서 출석인정 결석으로 처리한다(「소년법」 제13조, 제18조, 「보호소년 등의 처우에 관한 법률」 제31조(학적 관리) 제2항, 같은 법 시행령 제52조(상담조사 등) 제2항, 제85조(대안교육 대상자의 출석일수 인정) 제1항).", "▪보호관찰소에서 명한 사회봉사 및 특별교육 등의 수강기간, 대안교육 기간은 재적학교에서 출석인정 결석으로 처리한다(「소년법」 제32조(보호처분의 결정) 제1항제2호부터 제5호, 제2항제1호부터 제2호, 제32조의2(보호관찰처분에 따른 부가처분 등) 제1항, 제3항, 「보호소년 등의 처우에 관한 법률」 제42조의2(대안교육 및 비행예방 등) 제1항제1호, 같은 법 시행령 제85조(대안교육 대상자의 출석일수 인정) 제1항, 「보호관찰 등에 관한 법률 시행령」 제19조(특별준수사항) 제2호). 3) 학교장의 허가를 받은 ‘학교･시도(교육청)･국가를 대표한 대회 및 훈련 참가, 산업체 실습과정(현장실습, 현장 실습과 연계한 취업), 교환학습, 교외체험학습, 「학교보건법」제8조에 따른 등교중지’ 등으로 출석하지 못한 경우", "▪학생선수 출결처리 방법은 다음과 같다. ※ (학생선수) 학교운동부에 소속되어 운동하는 학생이나 「국민체육진흥법」 제33조와 제34조에 따른 체육단체에 등록되어 선수로 활동하는 학생을 말함(「학교체육 진흥법」 제2조제4호).", "1. 학교장의 허가를 받아 학생선수가 대회 및 훈련 참가를 위해 결석한 경우, 학생선수의 학습권 보장과 정상적인 학교생활 참여를 위해 초등학교 20일, 중학교 35일, 고등학교 50일 범위 내에서 출석인정 결석으로 처리한다.", "2. 다만, 학생선수가 ①국가대표(꿈나무, 청소년대표, 국가대표후보 포함)로서 국제대회 및 국가대표 훈련에 참가하는 경우, ②전국(소년)체육대회(지역 예선 포함)에 참가하는 경우에는 소속 학교 학업성적관리위원회의 심의(학생선수의 학습권, 교육적 목적 등을 종합적으로 고려)를 거쳐 초등학교 20일, 중학교 35일, 고등학교 50일에 포함하지 않고 예외 처리한다. ※ 대한체육회(대한장애인체육회)에서 인정하는 관련 공문(기간, 장소, 명단 명시 등)에 근거하여 처리함 (교육부 인성체육예술교육과-3111(2024.11.13.) 참조). ※ 학생선수 훈련 및 대회 참가 시 교외체험학습 등으로 출석인정 처리 불가 ※ 국가대표(꿈나무, 청소년대표, 국가대표후보 포함)로서 장기간 국내에서 훈련에 참가한 경우에는 훈련 장소 인근학교에 위탁교육을 통해 이수한 수업도 인정함. ※ 학업성적관리위원회에서는 수업 결손에 따른 출결처리 및 성적처리 등에 관한 사항을 심의함.", "3. 학생선수 출결처리에 따른 적용 방법은 다음과 같다. 가. 1일 단위의 대회 또는 훈련 참가의 경우: 1일 단위로 누적하여 관리", "<예시> 학생선수가 4일 동안 대회에 참가한 경우 허용일수(초등학교 20일, 중학교 35일, 고등학교 50일)에서 4일 제외함.", "나. 대회 또는 훈련 참가로 인한 지각･조퇴･결과의 경우: 6시간(수업시간) 누적 시 1일로 간주", "<예시> 학생선수가 대회 또는 훈련 참가로 조퇴 4시간, 결과 4시간, 지각 4시간을 한 경우 합산이 12시간이 되므로 2일로 간주하여 허용일수에서 2일 제외함.", "다. 학생선수에 대한 당해 학년도 출석인정 결석 허용일수(초등학교 20일, 중학교 35일, 고등학교 50일) 적용 방법은 출석인정 결석 처리를 위한 일수 산정 방법에 한정되는 것으로 진급･수료･졸업을 위한 출석일수 산정과는 무관", "▪교환학습 출결 처리 방법은 다음과 같다. ∙ 기간: 교육과정 이수에 지장이 없는 범위 안에서 학칙이 정한 범위 ∙ 내용: 교환학습 ∙ 방법: 학부모의 교환학습 신청 → 관련 학교장 상호 협의 → 협의사항 학부모에 통보 → 교환학습 실시 → 위탁학교의 생활기록을 재적학교에 통보", "▪교외체험학습 출결 처리 방법은 다음과 같다. ∙ 기간 및 횟수: 교육과정 이수에 지장이 없는 범위 안에서 학칙이 정한 범위 ∙ 내용: 현장체험학습, 친인척 방문, 가족동반 여행, 고적 답사 및 향토행사 참여 등 ※ 정상적인 교육과정 이수에 지장을 주는 과도한 체험학습 허가 자제 ※ 감염병 위기 경보 단계가 ‘심각’ 단계인 경우에 한해 교외체험학습 승인(허가) 사유에 ‘가정학습’을 포함하며, 학교장은 가정학습 승인 시 학생의 안전, 건강을 최우선으로 판단하여 승인여부를 결정함. ∙ 방법: 교외체험학습 신청(신청서 및 학습계획서 제출) → 학교장 심사 후 승인 통보 → 교외체험학습 실시 → 교외체험학습 보고서 제출 → 면담 등을 통한 사실 확인 후 출석인정 결석으로 처리 ※ 「초･중등교육법 시행령」 제48조제5항에 따라 학교장은 교육상 필요한 경우, 보호자의 동의를 얻어 학칙이 정하는 범위 안에서 교외체험학습을 허가하여 수업으로 인정할 수 있으나, 학교생활기록부의 어느 항목에도 내용을 입력하지 않음. 4) 「초･중등교육법 시행령」 제31조제1항에 따른 학교 내의 봉사, 사회봉사, 특별교육이수 기간 5) 「초･중등교육법」 제28조제7항에 따른 상담, 진로 프로그램 등 숙려제 참여 인정 기간", "▪학교의 장은 학업 중단의 징후가 발견되거나 학업 중단의 의사를 밝힌 학생에게 학업 중단에 대하여 숙려할 기회를 주어야 한다. 이 경우 학교의 장은 그 숙려기간을 출석인정 결석으로 처리할 수 있다(「초･중등교육법」 제28조제7항). ※ 해당 학생에 대한 판단기준, 숙려기간, 숙려기간 동안의 출석일수 인정 범위 등에 필요한 사항은 교육감이 정함(「초･중등교육법」 제28조제8항). ※ 정기시험 기간에 학업 중단 숙려 기간은 부여하지 않는 것을 권장하나, 부득이하게 기간이 중복된 경우 정기시험에 참여하도록 하고, 참여하지 못한 경우 결시생 인정점 부여기준은 시도교육청 학업성적관리 시행지침에서 정함. 6) 다음 경조사로 인하여 출석하지 못한 경우 구 분 대 상 일 수 결혼 ∙ 형제, 자매, 부, 모 1 입양 ∙ 학생 본인 20 ∙ 부모, 조부모, 외조부모 5 ∙ 부모의 조부모(증조부모, 외증조부모), 부모의 외조부모(진외증조부모, 외외증조부모) 사망 3 ∙ 형제･자매 및 그의 배우자 ∙ 부모의 형제･자매 및 그의 배우자 3", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 경조사 출석인정 결석 일수</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>구분</th><th>대상</th><th>일수</th></tr></thead><tbody><tr><td>결혼</td><td>형제, 자매, 부, 모</td><td>1일</td></tr><tr><td>입양</td><td>학생 본인</td><td>20일</td></tr><tr><td>사망</td><td>부모, 조부모, 외조부모</td><td>5일</td></tr><tr><td>사망</td><td>부모의 조부모(증조·외증조), 부모의 외조부모</td><td>3일</td></tr><tr><td>사망</td><td>형제·자매 및 그의 배우자</td><td>3일</td></tr><tr><td>사망</td><td>부모의 형제·자매 및 그의 배우자</td><td>1일</td></tr></tbody></table></div><div class=\"tbl-note\">※ 재량휴업일·공휴일·토요일은 산입하지 않음</div></div>__ENDTABLE__", "※ 경조사 일수에 재량휴업일과 공휴일 및 토요일은 산입하지 않음.", "▪경조사로 인한 출석인정 결석은 그 사유가 발생한 날을 포함하여 전후에 실시하는 것을 원칙으로 한다. 사망의 경우에는 그 사유가 발생한 날을 포함하지 않고 그 다음 날부터 처리할 수 있다. ※ 경조사로 인한 출석인정 결석 기간 산정 시 토요일, 공휴일, 재량휴업일은 불포함하며 해당기간 내에서 학생은 상황에 따라 출석할 수 있음. 7) 기타 부득이한 사유로 학교장의 허가를 받아 결석하는 경우", "▪학교장은 초･중･고 여학생 중 생리통이 극심해 출석이 어려운 경우(월 1일 결석)에는 ‘기타 부득이한 사유로 학교장의 허가를 받아 결석하는 경우’로 보아 출석인정 결석으로 처리한다. ※ 생리통으로 인한 결석(지각, 조퇴, 결과 포함) 시 출석 인정을 위해 담임교사 의견서, 학부모 의견서 외의 의료적 확인(진단서, 소견서, 처방전 등)을 요구하는 것은 지양해야 함. ※ 생리통으로 인한 출석인정 결석 시, 월 1일을 산정하는 기준은 지각･조퇴･결과 횟수 및 인정 시간 등을 토대로 학업성적관리위원회를 통해 학교장이 정함. ※ 출석인정 시 성적은 시도교육청 학업성적관리 시행지침에 따라 학교장이 당해 학교의 ‘학업성적관리규정’에 기준을 정하여 결정함. 8) 「학교폭력예방 및 대책에 관한 법률」 제12조에 따른 학교폭력대책심의위원회의 개최 및 동 위원회의 학교폭력 피해학생에 대한 보호조치 요청 이전에, 학교폭력 피해자가 학교폭력으로 인한 피해로 출석하지 못하였음을 같은 법 제14조제3항에 따른 학교폭력 전담기구의 사실 확인을 거쳐 학교의 장이 인정한 경우", "▪「학교폭력예방 및 대책에 관한 법률」 제16조(피해학생의 보호) 제1항의 조치 등 보호가 필요한 학생에 대하여 학교의 장이 인정하는 경우 그 조치에 필요한 결석을 출석인정 결석으로 처리할 수 있다.", "▪학교장은 「학교폭력예방 및 대책에 관한 법률」 제16조제2항, 같은 법 제17조제8항에 따라 피･가해학생이 학교폭력대책심의위원회에 의견진술 절차 등의 사유로 심의위원회에 참석하는 경우, 출석인정 결석으로 처리한다.", "▪「학교폭력예방 및 대책에 관한 법률」 제17조제1항제4호에 따른 ‘사회봉사’와 같은 조 제1항제5호 및 제3항에 따른 ‘학내외 전문가, 교육감이 정한 기관에 의한 특별 교육이수 또는 심리치료’로 인한 결석은 출석인정 결석으로 처리한다. 9) 시도경찰청 「소년업무규칙」에 따른 경찰관서의 선도프로그램에 참여하는 경우", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 경찰관서 선도프로그램 유형</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>구분</th><th>운영기관</th><th>내용</th></tr></thead><tbody><tr><td>전문기관 연계 선도 프로그램(사랑의 교실)</td><td>청소년상담복지센터 등</td><td>상담·법교육 및 도박·마약·성범죄 등 재범 위험성 감소 프로그램</td></tr><tr><td>치유 선도 프로그램(마음나눔교실)</td><td>경찰관서 지정 신경정신과 병원</td><td>도박·마약중독 및 폭력성향·분노조절장애 등 비행소년 선별·진단·치유</td></tr><tr><td>경찰 선도 프로그램(희망동행교실)</td><td>경찰관서</td><td>비행소년 대상 회복적 정의 교육</td></tr></tbody></table></div></div>__ENDTABLE__", "▪경찰관서의 선도프로그램(경찰단계 선도프로그램)의 유형은 다음과 같다. 구분 운영기관 프로그램 내용 전문기관 연계 선도 청소년 전문기관과 연계, 청소년상담사 등 전문가가 진행하는 청소년상담복지센터 등 프로그램 상담･법교육 및 도박･마약･성범죄 등 특정범죄 재범 위험성 감소를 청소년 관련 전문기관 (사랑의 교실) 위한 프로그램 신경정신과 전문의･임상심리사가 도박･마약중독 및 폭력성향･ 치유 선도 프로그램 경찰관서에서 지정하는 분노조절장애 등 정신의학적 원인 제거가 필요한 비행소년을 (마음나눔교실) 신경정신과 병원 선별･진단･치유하는 프로그램 학교전담경찰관 및 청소년 전문강사가 비행소년을 대상으로 자신의 경찰 선도 프로그램 경찰관서 비행에 대한 책임과 사과, 피해회복을 위한 노력 등 회복적 정의를 (희망동행교실) 교육하는 프로그램 10) 「공직선거법」 및 「지방교육자치에 관한 법률」에 따라 투표에 참가하는 경우", "▪투표에 참여하는 경우 출석 인정 범위는 투표에 직접 필요한 시간으로 하며, ‘직접 필요한 시간’에는 투표에 소요된 시간에 당일 왕복 소요 시간을 포함할 수 있다. ※ 사전투표의 경우, 교육활동에 지장이 없는 범위(하교 후, 주말 등)에서 학생이 참여하도록 안내하고, 이로 인한 결석(지각, 조퇴 등 포함)은 출석으로 인정하지 않음. 11) 「공직선거법」에 따라 공직에 선출되어 의정활동(본회의, 상임위원회 회의 당일 참석)을 사유로 수업일수의 10% 이내에서 결석하는 경우 12) 그 밖에 법령 및 행정규칙에서 출석으로 인정하도록 한 경우", "▪ ‘나. 출석 인정 결석’의 1)~11)에 명시되어 있지 않으나, 상위 법령 및 행정규칙에 따라 출석인정 결석으로 처리할 수 있다.", "▪ 「교원의 지위향상 및 교육활동 보호를 위한 특별법｣과 관련하여 출석 인정 결석 처리하는 경우는 다음과 같다. 1. 「교원의 지위향상 및 교육활동 보호를 위한 특별법｣ 제20조제2항에 따른 분리 조치 시, 불가피한 사정에 의하여 학교 외의 장소에서 학생을 ‘분리 조치’하게 될 경우 2. 「교원의 지위향상 및 교육활동 보호를 위한 특별법｣ 제25조제6항에 따라 학생이 지역교권보호 위원회에 의견진술 절차 등의 사유로 참석하는 경우 3. 「교원의 지위향상 및 교육활동 보호를 위한 특별법｣ 제25조제2항제2호와 제3호에 따른 ‘사회봉사’와 ‘학내외 전문가에 의한 특별교육 이수 또는 심리치료’, 제25조제3항과 제4항에 따른 ‘특별교육 이수 또는 심리치료’로 인해 결석하는 경우 4. 동일 사안으로 교권보호위원회와 학교폭력대책심의위원회에서 각각 ‘전학’ 조치를 받아 모든 조치를 이행할 때(A교 전출→B교 전입ㆍ전출→C교 전입), 중간 과정 학교장(B교)의 허락하에 가정학습을 실시한 경우 ※ 중간 과정 학교(B교)의 수업일은 출석이 원칙이나 학교장이 허락한 경우 가정학습 실시 가능", "▪「초·중등교육법」 제20조의4제4항에 따라 보호자에게 학생 인계를 요청하여 가정학습을 하게 한 경우", "다. 질병으로 인한 결석 1) 결석한 날부터 5일 이내에 의사의 진단서 또는 의견서(병명, 진료기간 등이 기록된 의사 소견서, 진료 확인서 등의 증빙서류)를 첨부한 결석 신고서를 제출하여 학교장의 승인을 받은 경우 2) 다만, 상습적이지 않은 2일 이내의 결석은 질병으로 인한 결석임을 증명할 수 있는 자료(학부모 의견서, 처방전, 담임교사 확인서 등)가 첨부된 결석 신고서를 결석한 날로부터 5일 이내에 제출하여 학교장의 승인을 받은 경우", "▪결석 신고서를 제출하는 ‘결석한 날로부터 5일 이내’라고 하는 것은 ‘결석을 시작한 날’로부터 기한(5일 또는 부득이한 경우 학교장이 정한 기한) 내를 의미한다.", "※ ‘나이스 학부모 서비스’를 통해 제출한 결석 신고서 및 증빙서류는 「전자정부법」 제2조제8호에 따른 ‘전자화문서’로서 별도의 출력 보관이나 원본 제출이 불필요하며, 증빙자료로서 학부모 의견서나 담임교사 확인서를 활용할 경우 별도로 작성하여 첨부하지 않고 ‘나이스 학부모 서비스’ 신청 및 접수 시 해당란에 작성하는 것으로 갈음할 수 있음. 3) 병원학교 및 원격수업 등 방송･정보통신매체를 이용하여 수업 받는 건강장애학생이 결석한 경우 4) 의사의 진단서 또는 의견서를 통해 기저질환(천식, 아토피, 알레르기, 호흡기질환, 심혈관 질환 등)을 가진 민감군으로 확인된 학생이 미세먼지와의 관련성이 드러나는 소견 또는 향후 치료의견 등이 명시된 의사의 진단서(소견서)를 첨부한 결석 신고서를 결석한 날로부터 5일 이내에 제출하여 학교장의 승인을 받은 경우", "▪미세먼지 민감군 학생에 대해 다음의 경우에 한해 질병결석으로 처리한다. 1. 적용대상: 의사의 진단서(의사 소견서)를 통해 인정된 기저질환(천식, 아토피, 알레르기, 호흡기질환, 심혈관질환 등)을 가진 민감군으로 확인된 학생 2. 등교시간대 거주지나 학교 주변 실시간 미세먼지 또는 초미세먼지 농도가 ‘나쁨’ 이상이며, 학부모가 학교에 사전 연락(전화 또는 문자 등)한 경우에 한하여 질병결석으로 인정한다. ※ 국립환경과학원·한국환경공단에서운영하는에어코리아(www.airkorea.or.kr) 등을 통해 실시간 미세먼지 농도 및 예보 확인이 가능함. 5) 의사의 진단서 또는 의견서를 통해 만성질환 등 장기적 치료가 필요한 것으로 확인된 학생이 의사의 진단서(소견서)를 첨부한 결석 신고서를 결석한 날로부터 5일 이내에 제출하여 학교장의 승인을 받은 6) 기후에너지환경부로부터 가습기살균제 건강피해자 증명서를 발급받은 학생이 의사의 진단서(소견서)를 첨부한 결석 신고서를 결석한 날로부터 5일 이내에 제출하여 학교장의 승인을 받은 경우", "▪가습기살균제 건강 피해 학생이 호흡곤란･편두통 등 기저질환으로 가정에서 요양하거나, 정신건강 모니터링(마음건강 프로그램)에 참여한 경우에도 질병결석으로 처리한다.", "※ 4)∼6)의 경우 결석 신고서 제출 시 첨부하는 증빙서류는 학기 초 최초 제출한 의사의 진단서(소견서)로 해당 학기 질병 결석 증빙을 갈음할 수 있음.", "라. 미인정 결석 1) 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제6호에 따른 출석정지 2) 「교원의 지위 향상 및 교육활동 보호를 위한 특별법」 제25조제2항제4호에 따른 출석정지 3) 「초･중등교육법 시행령」 제31조제1항제4호에 따른 출석정지 4) 「초･중등교육법 시행령」 제31조제6항의 가정학습 기간 5) 범법행위로 인한 책임있는 사유로 결석한 경우(관련 기관 출석, 체포, 도피, 구속(구인, 구금, 구류 포함), 교도소 수감 등)", "▪‘범법행위로 인한 책임 있는 사유’란 범법행위의 피의자로서 수사기관(경찰, 검사)의 수사 대상이 된 경우를 말한다. ※ 단, 재판 결과 최종 무죄판결을 받은 경우(항소심 또는 상고심이 진행 중인 경우 제외)에는 ‘출석인정 결석’으로 변경하여 입력함(정기시험 기간 제외, 성적은 미변경). 6) 태만, 가출, 출석 거부 등 고의로 결석한 경우 7) 기타 합당하지 않은 사유로 결석한 경우", "▪‘기타 합당하지 않은 사유로 결석한 경우’라 함은 학원 수강(예술･체육계 포함)으로 인한 결석, 학칙으로 정한 교외체험학습 기간을 초과한 결석, 해외 어학연수로 인한 결석 등을 말한다.", "마. 기타 결석 1) 부모･가족 봉양, 가사 조력, 간병 등 부득이한 개인사정에 의한 결석임을 학교장이 인정하는 경우 2) 공납금 미납을 사유로 결석한 경우 3) 「공직선거법」 및 「정당법」에 따라 결석한 경우 가) 공직에 선출되어 의정활동(본회의, 상임위원회 회의 당일 참석)을 사유로 수업일수의 10%를 초과하여 결석한 경우", "▪공직에 선출된 자가 의정활동(본회의, 상임위원회 회의 당일 참석)을 사유로 수업일수의 10%를 초과하여 결석하는 경우, 후보등록자 본인의 선거운동, 정당발기인 또는 당원으로서의 정당활동을 사유로 결석하는 경우에 한해 기타결석으로 처리하고 ‘특기사항’에 ‘교외활동(00일)’로 사유를 입력한다. 단, 정치활동 참여 관련 사항은 출결 특기사항 외 학교생활기록부 어디에도 기재하지 않는다. 나) 후보등록자 본인이 선거운동을 사유로 결석한 경우 다) 정당의 발기인 또는 당원으로서 정당활동을 사유로 결석한 경우 4) 기타 합당한 사유에 의한 결석임을 학교장이 인정하는 경우", "3. 지각･조퇴･결과 가. 지각: 학교장이 정한 등교시각까지 출석하지 않은 경우 나. 조퇴: 학교장이 정한 등교시각과 하교시각 사이에 하교한 경우 다. 결과: 수업시간의 일부 또는 전부에 불참한 경우", "▪지각･조퇴･결과는 결석에 준하여 처리하되, 구체적인 기준과 절차는 관련 학교 규정에 따라 학교장이 정한다. ※ 지각･조퇴･결과는 횟수와 관계없이 해당 학년 수료에 영향을 주지 않음. ※ 등교시각, 하교시각은 학교장이 정하므로 학교마다 다를 수 있음.", "라. 위의 2. 나의 각 항에 해당하는 사유로 인한 지각, 조퇴, 결과는 각각의 횟수에 포함하지 않는다.", "▪고등학교는 2025학년도 1학년부터 각 학년 과정의 수료에 필요한 출석일수(수업일수의 3분의 2이상) 외에도, 학점 취득을 위한 ‘과목출석률(1학점당 수업량(16회)의 3분의 2이상 출석)’이 적용된다. 따라서, 과목 담당교사는 매시간 학생의 수업 참여 여부를 확인하고 나이스에 입력해야 한다(단, 출석인정 결석(결과)의 경우, 출석으로 반영). ※ 학교는 출결관련 규정에 결과처리 기준을 포함하여야 하며, 사전에 학생 및 학부모에게 안내하여 정확한 출결 관리가 이루어질 수 있도록 노력해야 함.", "마. 지각, 조퇴, 결과의 사유는 각각 결석 사유와 동일하게 질병, 미인정, 기타로 처리한다.", "바. 같은 날짜에 지각, 조퇴, 결과가 발생한 경우에는 학교장이 판단하여 어느 한 가지 경우로만 처리한다.", "사. 같은 날짜에 결과가 1회 이상이라도 1회로 처리한다.", "아. 학적을 새로 부여받은 자의 당해 학년 지각･조퇴･결과 횟수는 원적교의 당해 학년 각 횟수와 합산하되, 중복되는 기간의 각 횟수는 제외한다.", "4. 소속 학교에서 실시한 원격수업 수강학생 출결 처리 가. 학교의 장이 교육상 필요에 따라 소속 학생을 대상으로 교과(목) 및 창의적 체험활동 내용의 일부 또는 전부를 「초･중등교육법」 제24조제3항제1호의 원격수업으로 실시한 경우, 학생의 출결은 등교수업에 준하여 처리하되 구체적인 사항은 시도교육청의 지침에 따라 학교장이 정한다.", "▪학교의 장은 교육목적상 원격수업 운영이 필요한 경우, 교과별(학년별) 협의회 등에서 원격수업 운영 계획 (출결･학교생활기록부 관리 계획 포함)을 마련하고 원격수업운영위원회*의 심의를 거쳐 운영한다. * 단위학교의 학업성적관리위원회, 학교교육과정위원회 등과 통합 운영 가능 ※ ‘초‧중등학교 및 특수학교 원격수업 운영 기준 안내’(교육부 학교교수학습혁신과-744(2023.1.27.)) 참조", "▪출결 확인은 등교 수업에 준하여 처리하되, 실시간 쌍방향 수업에서 접속 불량 등으로 원격수업 참여가 어려운 학생에 대한 출결 처리 방법 등 구체적인 사항은 시도교육청의 지침에 따라 학교장이 정한다.", "▪원격수업에서 교사가 학생의 수행 과정과 결과를 직접 관찰･확인한 경우 학교생활기록부에 기재할 수 있으며, 직접 관찰･확인하지 못한 경우에는 기재할 수 없다. 다만, 원격수업에서 직접 관찰･ 확인하지 못한 경우에도 등교수업과 연계하여 교사가 직접 관찰･확인한 학생 활동은 기재할 수 있다.", "5. 소속 학교 이외 기관･장소에서의 수강학생 출결 처리 가. 위탁학생의 소속 학교는 위탁교육기관에서 보내온 출결 상황을 그대로 입력하며, 위탁교육기관은 시도교육청의 관련 지침 및 위탁교육 운영 방법과 형태에 따라 학생의 출결과 수강 여부를 확인한다. 나. 학생이 수업의 일부는 위탁교육기관에서 수강하고 일부는 소속 학교에서 수강한 경우, 위탁교육기관의 수업일수 및 출결 내용과 소속 학교의 수업일수 및 출결 내용을 합산하여 처리한다.", "▪소년보호기관별 수업일수 인정 여부 처리는 [참고자료 6] ‘소년보호기관 관련 처리’를 참조한다.", "▪재학 중 소년분류심사원에 위탁되거나 유치된 소년의 위탁 또는 조사를 위하여 출석하는 기간과 1개월 이내의 소년원 송치(보호처분 8호) 기간은 재적학교에서 ‘출석인정 결석’으로 처리한다 (「보호소년 등의 처우에 관한 법률」 제31조제2항).", "▪「보호소년 등의 처우에 관한 법률」 제42조의2제1항에 따라 판사 또는 검사가 의뢰한 대안교육 대상 소년이 소년원과 소년분류심사원에서 정해진 대안교육과정(비행예방 및 재범방지 또는 사회적응을 위한 체험과 인성위주의 교육과정)을 이수하였을 때에는 그 기간을 재적학교에서 출석인정 결석으로 처리한다(「보호소년 등의 처우에 관한 법률 시행령」 제85조). ※ 법무부의 청소년비행예방센터(청소년꿈키움센터)는 직제상 지역 소년원 및 서울소년분류심사원 소속기관임 ([참고자료 6] 참조).", "▪방송･정보통신매체를 활용한 수업은 재적학교에서 위탁학생에 준하여 처리한다.", "▪건강장애를 지닌 특수교육대상자를 위한 병원학교 및 원격수업을 이용하는 학생은 위탁학생으로 관리하며, 위탁학생 중 위탁교(기관)뿐만 아니라 소속교에도 출석한 경우, 해당 월의 수업일수와 출결내용은 위탁교의 수업일수 및 출결내용과 소속교의 수업일수 및 출결내용을 합산한다. 1. 「장애인 등에 대한 특수교육법 시행령」 제10조(특수교육대상자의 선정) 및 교육부의 연간 ‘특수교육 운영계획’에 따라 건강장애로 선정된 학생의 병원학교 수업참여 및 교육계획 기간 내에 이수한 원격수업은 출석으로 인정한다. ※ (건강장애를 지닌 특수교육대상자) 만성질환으로 인하여 3개월 이상의 장기입원 또는 통원치료 등 계속적인 의료적 지원이 필요하여 학교생활 및 학업수행에 어려움이 있는 학생 ※ (병원학교) 3개월 이상 병원입원 또는 장기요양 등으로 인한 장기결석으로 유급이 예상되는 건강장애를 지닌 특수교육대상자를 위하여 병원 내에 설치된 특수학급 ※ (원격수업) 3개월 이상 병원입원 또는 장기요양 등으로 인한 장기결석으로 유급이 예상되는 건강장애를 지닌 특수교육대상자를 위한 방송･정보통신매체 이용 교육 2. 건강장애 선정대상자는 아니지만 3개월 이상 치료를 요하는 화상, 교통사고 등의 심각한 외상적 부상으로 불가피하게 장기결석이 예상되는 학생의 학습권을 보장하기 위해 치료 기간에는 병원학교 수업 참여 또는 원격수업을 이수하도록 시도교육청이 허가하고 이에 따라 이수한 원격수업은 출석으로 인정할 수 있다. ※ [참고] 병원학교 및 원격수업 출석인정 절차 학교장은 진단서 관할교육청에서는 병원학교 또는 원격수업 학교장은 및 담임교사 의견을 병원학교 또는 원격수업 기관장은 학생의 출석에 출석 확인을 첨부하여 관할교육청에  기관에  대해 출석 확인을  반영하여 공문으로 신청 등록 조치 학교에 제공 출석인정 ※ 학교장은 학생이 치료 후 학교에 복귀하면 병원학교 또는 원격수업 기관에 공문으로 등록 해지 조치하고 관할교육청에 결과를 보고함.", "▪「아동복지법」 및 「아동학대범죄의 처벌 등에 관한 특례법」에 따른 지방자치단체가 가정폭력 또는 아동 학대 예방을 위해 분리보호된 학생을 보호하는 경우 보호기간 동안에 대해 위탁학생으로 관리한다. ※ 해당 학생의 학습 결손 방지를 위하여, 필요한 경우 지방자치단체장의 요청 등에 따라 학적변동 없이 교육감(또는 교육장)이 지정하는 학교에서 교육활동을 지원받을 수 있음. ※ 위탁교육기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력하되, 학대 피해학생의 위탁교육 기관명이 드러나지 않도록 봉사활동 실적의 ‘장소 또는 주관기관명’과 수상경력의 ‘수여기관’에는 기관명을 재적교로 입력함(‘학대 피해학생 등교학습 지원 방안 개선(안) 시행 안내’, 교육부 학생맞춤통합지원과-1026(’24.8.30.) 참조).", "다. 학교의 장은 소속 학생이 수업의 일부를 교육감이 지정한 교육기관에서 수강한 경우, 해당 학생의 출결을 위탁학생에 준하여 처리한다.", "▪학교의 장이 소속 학생의 상황과 필요에 따른 전문･심화교육 등을 지원하기 위해 수업의 일부를 교육감이 지정한 교육기관에서 수강하도록 한 경우, 해당 학생의 출결을 위탁학생에 준하여 처리한다. ※ 학생이 하루 중 일부 교시는 소속교에 출석하고 일부 교시는 교육감이 지정한 교육기관에 출석하는 경우, 소속교의 출결상황과 교육감이 지정한 교육기관에서의 출결상황을 모두 반영하여 일일 출결을 처리해야 함.", "➋ 결석일수 지각 조퇴 결과 학년 ➊ 수업일수 ➌ 특기사항 질병 미 인 정 기타 질병 미인정 기타 질병 미인정 기타 질병 미인정 기타", "가. 전출일과 전입일이 동일한 경우 전입일만 수업일수로 산정한다.", "<예시> 전출일과 전입일이 동일하여 화요일에 전출하고 화요일에 전입한 경우, 전출교에서는 월요일까지를 수업일수로, 전입교에서는 화요일부터 수업일수로 처리함.", "나. 위탁학생의 경우에는 위탁할 때까지 재적교 수업일수와 위탁 이후 위탁기관의 수업일수를 합산하여 산정한다. ※ 위탁학생의 수업일수는 해당 학년의 수업일수와 다를 수 있음. ※ 위탁학생이 위탁교(기관)뿐만 아니라 소속교에도 출석한 경우, 해당 월의 수업일수와 출결 내용은 위탁교와 소속교의 수업일수 및 출결 내용을 합산하여 [학적-위탁·현장실습학생관리-출결관리]에서 입력함.", "➋ 결석일수: [훈령 및 해설] 내용 참조", "가. 특기사항에 입력하는 내용은 다음과 같다. 1) 기타결석: 1일이라도 사유를 입력함. 2) 질병･미인정 결석: 학생의 출결상황에 대한 이해를 높이기 위해 필요한 경우 사유를 입력할 수 있음. ※ 다만, 질병결석 사유를 입력할 경우 개인정보를 보호할 필요가 있다고 판단되는 질병은 기재하지 않도록 유의해야 함. ※ 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제6호에 따른 출석정지, 「교원의 지위 향상 및 교육활동 보호를 위한 특별법」 제25조제2항제4호에 따른 출석정지, 「초·중등교육법 시행령」 제31조(학생의 징계 등)제1항 제4호에 따른 출석정지에 따른 미인정 결석은 출결 특기사항에 사유를 입력하지 않음. 3) 지각･조퇴･결과: 입력하지 않으나 횟수가 많은 지각･조퇴･결과의 경우 사유를 입력할 수 있음. ※ ‘2) 질병·미인정 결석’과 ‘3) 지각·조퇴·결과’의 사유 입력 여부, 입력 기준, 입력 내용 등 구체적인 사항은 학교장이 정하되, 단위 학교 내에서 동일하게 적용함. 4) 출석인정 결석: 사유를 입력하지 않음.", "<예시> 학교가 질병·미인정으로 연속 5일 이상 결석 시 사유를 기재하기로 한 경우 수업 결석일수 지각 조퇴 결과 학년 특기사항 일수 질병 미인정 기타 질병 미인정 기타 질병 미인정 기타 질병 미인정 기타 2 2 1 2 2 6 3 5 편도선수술(5일) 15 1 다리수술(10일), 감기(5일) 3 1 부모간병(3일) 27 1 10 5 학교생활부적응(27일), 모간병(1일) 1 가사조력(1일) 기재 방법", "▸교육정보시스템의 [학적-출결관리-출결관리-출결특기사항등록]에서 학생 성명을 클릭하여 ‘일일출결 상세조회’ 화면에서 ‘사유’란을 근거로 입력할 수 있음.", "나. 특기사항에는 학교생활기록부에 기재할 수 없는 내용을 입력할 수 없다. ※ (입력 불가능 내용의 예) 해외 봉사활동, 해외 어학연수, 교외 대회 참가 등", "다. 출석인정 결석은 출석으로 처리하며, 해당 학년 동안 1회의 결석･지각･조퇴･결과도 없는 경우 출결상황 ‘특기사항’에 ‘개근’으로 입력한다. ※ 해당 학년 동안 1회의 결석･지각･조퇴･결과도 없는 경우 교육정보시스템에서 학교생활기록부 마감 시 출결상황 ‘특기사항’에 ‘개근’을 입력함.", "라. 교육정보시스템의 [학적-출결관리-출결관리-일일출결관리(담임용)]의 ‘사유’란은 출결상황 특기사항의 보조부로, 결석･지각･조퇴･결과의 사유를 입력할 수 있다.", "마. 출석 인정 결석의 출석처리는 교육정보시스템의 [학적-출결관리-출결관리-일일출결관리(담임용)]에서 ‘출석인정 결석’으로 처리한다.", "가. 위탁학생 출결처리 방법은 다음과 같다. 1) 소년보호기관, 대안교육 위탁교육기관, 지방자치단체, 직업교육 위탁기관, 병원학교･원격수업기관, 방송･정보통신매체 등의 학적관리 및 수업일수, 교과 성적, 비교과 영역의 인정 여부는 표와 같다. 구분 학적 수업일수 교과 성적 비교과 영역 비고 소년보호기관", "__TABLE__<div class=\"tbl-wrap\"><div class=\"tbl-cap\">📊 위탁기관별 학적·수업일수·성적·비교과 인정 여부</div><div class=\"tbl-scroll\"><table class=\"tbl\"><thead><tr><th>구분</th><th>학적</th><th>수업일수</th><th>교과성적</th><th>비교과</th><th>비고</th></tr></thead><tbody><tr><td>소년보호기관</td><td>참조</td><td>참조</td><td>참조</td><td>참조</td><td>[참고자료 6·7]</td></tr><tr><td>대안교육 위탁교육기관</td><td>위탁학생관리</td><td>인정</td><td>인정</td><td>인정</td><td>학교생활부적응 등</td></tr><tr><td>지방자치단체</td><td>위탁학생관리</td><td>인정</td><td>미인정</td><td>인정</td><td>아동학대예방</td></tr><tr><td>직업교육 위탁기관</td><td>위탁학생관리</td><td>인정</td><td>인정</td><td>인정</td><td>직업교육 위탁</td></tr><tr><td>병원학교·원격수업기관</td><td>위탁학생관리</td><td>인정</td><td>미인정</td><td>인정</td><td>건강장애학생</td></tr><tr><td>방송·정보통신매체</td><td>위탁학생관리</td><td>인정</td><td>인정</td><td>인정</td><td>타기관 수강학생</td></tr><tr><td>국내교환학습</td><td>위탁학생관리</td><td>인정</td><td>인정</td><td>인정</td><td>교환학생</td></tr></tbody></table></div></div>__ENDTABLE__", "[참고자료6,7] [참고자료6,7] [참고자료6,7] [참고자료6,7] (소년원, 소년분류심사원, 참조 참조 참조 참조 청소년 비행예방센터) 학교생활부적응, 대안교육 위탁학생관리 인정 인정 인정 학업 중단 위기학생, 위탁교육기관 학생미혼모, 이주배경학생 아동학대예방을 위한 지방자치단체 위탁학생관리 인정 미인정 인정 보호기관 위탁학생 직업교육 위탁기관 위탁학생관리 인정 인정 인정 직업교육 위탁과정 학생 병원학교･원격수업기관 위탁학생관리 인정 미인정 인정 건강장애학생 방송･정보통신매체 위탁학생관리 인정 인정 인정 타 기관 수강학생 국내교환학습 위탁학생관리 인정 인정 인정 교환학생 기재 방법", "▸위탁학생은 교육정보시스템의 [학적-위탁･현장실습학생관리-위탁･현장실습학생관리-위탁･현장실습 학생등록]에서 학기 단위로 등록함.", "▸위탁학생 등록 시 ‘교육구분’ 설정에서 대안교육 위탁교육기관은 ‘대안교육위탁기관’으로, 직업교육 위탁기관은 ‘직업교육위탁과정’으로, 병원학교･원격수업기관은 ‘병원학교’ 또는 ‘원격수업’으로, 방송･정보통신매체는 ‘원격수업’으로, 학교 밖 교육은 ‘학교 밖 교육’으로, 나머지(학생미혼모 포함)는 ‘기타’로 등록함.", "※ 항목별 자세한 처리 방법은 [참고자료 7] ‘위탁학생, 병원학교･원격수업 등 학교 이외의 장소에서의 수강학생 처리’를 참조함.", "※ 위탁교육기관, 병원학교･원격수업기관의 활동 내용이 있는 경우, 학교생활기록부 기재요령의 각종 유의사항을 준수하여 해당 기관의 자료를 입력함. 나. 학점이수 인정기준 적용에 따른 출결처리 방법은 다음과 같다. 1) 2026학년도 1･2학년으로 학기 중에 전･편입학하는 학생은 다음 각 호에 따라 과목별 출석률을 산출한다. 가) 원적교와 전･편입교의 과목이 같은(유사) 경우 원적교의 결과 횟수를 전･편입교 출석에 반영하여 출석률을 산출하되, 학점이 다른 경우에는 환산하여 반영한다. [연계 과목 결과 횟수 반영 환산식] 원적교 해당 과목의 전편입교 해당 과목의 학점 전출일까지의 총 결과 횟수 원적교 해당 과목의 학점 예) 원적교의 ‘확률과 통계’ 과목의 전출일까지의 총 결과 횟수가 10회이고, 원적교의 ‘확률과 통계’(3학점) 과목을 전･편입교 ‘확률과 통계’(4학점)로 연계하여 과목출석률을 산출하는 경우, 10회×4/3=13.33.. 으로, 13회를 반영함. ※ 소수점 첫째 자리에서 반올림 나) 원적교와 전･편입교 간 과목이 일치하지 않아 신규 수강과목으로 보아 출석률을 산출해야 하는 경우에는 전체 수강과목의 평균 결과 횟수를 산출하여 신규 수강과목에 반영한다. [평균 결과 횟수 반영 환산식] 원적교 전체 수강과목(창의적 체험활동 포함)의 전출일까지의 총 결과 횟수 전･편입교 기준 신규 수강과목의 원적교 전체 수강과목(창의적 체험활동 포함)의 전･편입일 전일까지의 총 수업 횟수 전출일까지의 총 수업 횟수 예) 원적교에서 전출일까지 수강한 과목(창의적 체험활동 포함)의 총 수업 횟수가 128회이고 10회 결과한 학생의 전･편입교 기준 신규 수강과목의 총 수업 횟수가 12회인 경우, 10/128×12=0.9375이므로 신규 수강과목에 대해 1회의 결과 횟수 반영 ※ 소수점 첫째 자리에서 반올림 다) 학기 중 재입학, 복학 등 학적 변동자, 위탁교육을 마치고 복교한 학생도 위의 가), 나)의 방법을 준용하여 처리한다. 라) 귀국학생 등이 학기 중 편입학하는 경우의 과목출석률은 입급일로부터 학기 종료일까지 남은 수업 횟수의 2/3이상으로 한다. ※ 2025학년도 이후 고교학점제 학점이수 인정기준 적용에 따라 학기 중 신입학하는 학생은 입학 전 수업에 대한 출결 등 정보가 없는 점을 고려, 귀국학생의 경우에 준하여 처리함(‘<2025학년도 이후 고교학점제 학점이수 인정기준 및 최소 성취수준 보장지도 운영계획> 관련 추가 안내’, 교육부 기초학력진로교육과- 1054(2025.4.2.) 참조)"]}, {"id": "award", "title": "수상경력", "emoji": "🏆", "page_range": "p.67~71", "items": ["① 중･고등학교의 ‘수상경력’에는 교내상만 입력하며, 수상명, 등급(위), 수상연월일, 수여기관, 참가대상 (참가인원)을 입력한다.", "▪학교생활기록부의 공신력을 높이고, 사교육을 유발하는 입학전형 요소 배제의 일환(<고등학교 선진화를 위한 입학제도 및 체제 개편 방안> 등)으로 2011학년도부터 중·고등학교 모두 ‘수상경력’에 교내상만 입력하고 교외상은 입력하지 않는다. ※ 교육정보시스템의 교외상 수상대장 입력 여부는 학교장이 정하나 학교생활기록부에는 반영하지 않으며, 각종 교외상 수상 사실 및 대회 참가 내용은 입력하지 않음", "▪학년 초 학교교육계획에 따라 실시한 교내상만을 기재하며, 수상 사실은 학교생활기록부 수상경력 이외의 어떠한 항목(창의적 체험활동상황의 ‘특기사항’, 교과학습발달상황의 ‘세부능력 및 특기사항’, 행동특성 및 종합의견 등)에도 입력하지 않는다. ※ ‘대회’라는 용어는 수상경력을 제외한 다른 항목에 입력할 수 없으며, 시상 계획이 있는 각종 교내대회 및 행사의 준비 과정, 참가 사실 등은 수상 여부와 관계없이 기재하지 않음.", "③ 동일한 작품이나 내용으로 수준이 다른 상을 여러 번 수상하였을 경우, 최상위 수상 경력만 입력한다.", "▪교내 동일 대회로 예선과 결선이 이어지는 대회는 최상위 수상실적 하나만 입력한다.", "▣ 수상경력 학년 (학기) ➊ 수상명 ➋ 등급(위) 수상연월일 ➌ 수여기관 ➍ 참가대상(참가인원)", "➊ 수상명 가. 수상명 입력 시 연간 시상 계획의 수상명과 일치하게 입력한다. ※ 단, 수상명에는 학생이 재학(또는 졸업 예정)한 고등학교를 알 수 있는 내용을 입력하지 않음. 나. 공동수상은 동일 실적물로 2인 이상이 수상한 경우로 동일한 상장번호로 발급한다. ※ ‘수상명’ 란에 수상명을 입력하고 ( )안에 ‘공동수상’ 과 ‘수상인원’ 을 입력함. 다. 동급의 상을 여러 명이 수상한 경우라도 각자의 실적물로 수상한 경우는 개별 수상에 해당된다. ※ 개별 실적물로 3명이 은상(2위)을 수상한 경우 개인별 수상실적으로 등록함. 라. 교과우수상을 여러 과목에서 수상한 경우는 ( )안에 수상 과목을 병기한다. 기재 방법", "▸교과우수상(공통국어1, 공통영어1, 공통수학1, 음악, 체육1)", "마. 교과우수상의 과목명은 교과목의 정식 명칭으로 입력한다. 기재 방법", "▸‘기술･가정, 수학Ⅱ, 화법과 작문’ 등과 같이 교과목의 정식 명칭으로 입력함.", "바. 표창장은 경우 어떤 내용의 표창인지 알 수 있도록 ( )안에 세부 표창 내용을 입력한다. 기재 방법", "▸표창장(선행부문), 표창장(모범학생부문)：표창장의 ‘등급(위)’은 공란으로 둠.", "사. 각종 대회에서 참가부문이 있는 경우에는 ( )안에 참가부문을 입력한다. 기재 방법", "▸컴퓨터대회(문서작성부문), 과학탐구대회(과학상상화그리기부문)", "가. 등위는 등급에 대한 등위를 나타내는 것으로 대회 결과 확정된 등위를 입력한다. 기재 방법", "▸최우수상(1위)이 없는 경우는 우수상(1위)으로 입력함.", "나. ‘등급(위)’에 상의 등급과 등위를 병기하되, 상장에 명시된 내용을 그대로 입력한다. 기재 방법", "▸상의 종류가 ‘금상’, ‘은상’, ‘동상’인 경우 ‘금상(1위)’, ‘은상(2위)’, ‘동상(3위)’으로 입력함.", "▸상의 종류가 ‘대상’, ‘금상’, ‘은상’, ‘동상’인 경우 ‘대상(1위)’, ‘금상(2위)’, ‘은상(3위)’, ‘동상(4위)’으로 입력함.", "※ 대회 수상실적인 경우만 ‘등급(위)’을 입력하되, 등위만 있는 경우 등급을 입력하지 않을 수 있음.", "➌ 수여기관 가. 수여기관에는 기관명이 아닌 기관장을 입력한다.", "<예시> △△고등학교장", "➍ 참가대상(참가인원) 가. 동일 대회에서 학년별로 시상하는 경우, 참가대상은 각 학년으로 한다. ※ ○○대회에 전교생이 참가하고 시상은 학년별로 한 경우, 참가대상은 각각 ‘1학년’, ‘2학년’, ‘3학년’임. 나. 참가대상과 참가인원은 실제 대회에 참가한 대상과 인원으로 하고, 대회의 실시 결과 등을 근거로 입력한다. - 참가인원의 입력 기준은 대회인 경우 대회참가인원 기준으로, 포상대상자로 추천인 경우 추천대상인원 기준으로 적용한다.", "<예시> 전교생(학년 전체)이 참가한 대회: 전교생(450명), 1학년(200명) 전교생(학년 전체) 중 일부만 참가하거나 희망자를 대상으로 하는 대회: 1･2･3학년 전자과(178명), 전교생 중 참가자(185명), 1학년 중 참가자(92명)", "다. 교과우수상의 경우 ‘참가대상(참가인원)’에 참가대상은 ‘수강자’로 입력하되, 참가인원은 입력하지 않는다.", "<예시> 수상경력 작성 수 상 명 등급(위) 수상연월일 수여기관 참가대상(참가인원) 과학탐구 대회(실험부문, 공동수상, 3인) 금상(1위) 2026.04.24. ○○학교장 1학년 중 참가자 (80명) 표창장(선행부문) 2026.05.07. ○○학교장 전교생(1,200명) 드론날리기 대회 금상(1위) 2026.05.14. ○○학교장 1학년 중 참가자 (38명) 독후감쓰기 대회 장려상(3위) 2026.05.22. ○○학교장 1･2학년(720명) 정보통신 대회(정보검색부문) 대상(1위) 2026.06.12. ○○학교장 전교생 중 참가자 (185명) 교과우수상(공통국어1, 통합사회1) 2026.07.22. ○○학교장 수강자 컴퓨터경진 대회(문서작성부문) 우수상(2위) 2026.09.11. ○○학교장 전교생(1,200명) 예술제(시화부문) 우수상(2위) 2026.10.19. ○○학교장 전교생(1,200명) 독서논술 대회 1위 2026.11.05. ○○학교장 1학년(410명) 소프트웨어경진 대회(웹프로그래밍부문) 최우수상(1위) 2026.12.16. ○○학교장 △△과･□□과 (355명) 자동차정비기능 대회(공동수상, 2인) 장려상(3위) 2027.02.05. ○○학교장 1･2･3학년 ○○과(655명) 학생토론 대회(공동수상, 3인) 우수상(2위) 2027.02.09. ○○학교장 전교생 중 참가자 (60명)", "※ 무학년으로 개설된 과목의 경우 참가대상은 ‘수강자’로 입력함.", "➎ 기타 가. 다음의 경우에는 시상은 할 수 있으나 수상경력에는 하나의 수상실적만 내용만 기재할 수 있다. 1) 동일한 수상명으로 월별･격월･분기별로 수상한 경우 2) 동일 학기 또는 동일 학년 기간 동안 하나의 교과성취도를 기준으로 복수의 상을 수상한 경우 나. 학년･학급 단위의 단체수상(체육대회 응원상, 환경미화상, 합창대회 등)이나, 당선증･임명장･인증서는 입력하지 않는다. ※ 학년･학급 단위의 단체수상은 수상대장에는 입력할 수 있으나 수상경력에는 반영하지 않음. 다. 대안교육 위탁교육기관･직업교육 위탁과정 학생･공동교육과정 수강학생과 국내학교 간 교환학생 (도･농 교류 등)이 위탁기관 및 교환학교에서 받은 상은 교내상으로 입력할 수 있다. ※ 당해 학교의 상장번호 자동 채번 설정과 관계없이 직접 입력할 수 있는 [학생생활-수상경력-학급별수상관리]의 {학급별수상관리} 탭에서 등록하며, ‘수여기관’에는 위탁기관장을 입력함. 단, 학대 피해학생과 학생미혼모의 경우 위탁교육 기관명이 드러나지 않도록 ‘수여기관’에 재적교 학교장을 입력함(‘학대 피해학생 등교학습 지원 방안 개선(안) 시행 안내’, 교육부 학생맞춤통합지원과-1026(2024.8.30.) 참조). 라. 영재교육기관(영재학교, 영재학급, 영재교육원) 관련 수상, 학교운영위원장상, 재단이사장상, 동문회장상, 학부모회장상 등은 입력할 수 없다. 마. ‘학교생활기록부 작성 시 유의사항’에서 금지하는 실적을 근거로 한 수상실적은 학교생활기록부에 기재하지 않는다. ※ 야간자율학습과 관련된 내용을 근거로 교내상을 시상한 경우 기재하지 않음.  학교생활기록부의 공신력 및 교내상의 신뢰성 제고를 위한 중·고등학교의 ‘교내상’ 운영 관련 내용은 다음과 같다.", "1. 「공교육 정상화 촉진 및 선행교육 규제에 관한 특별법」의 제8조제3항제2호(각종 교내 대회에서 학생이 배운 학교교육과정의 범위와 수준을 벗어난 내용을 출제하여 평가하는 행위)에 저촉되는 대회는 실시할 수 없다.", "2. 학년 초 학교교육계획에 연간 대회 및 수상내용 등의 실시계획(수상비율, 시행학기, 담당부서, 공개방식 등)을 기재한다. ※ 학년 초 학교교육계획에 따라 실시한 교내상만 수상경력에 입력할 수 있음. 단, 교육목표 달성을 위하여 불가피한 경우, 2학기 초(학기 시작 후 30일 이내)에 2학기 시상 계획을 변경(수정·삭제·추가)하여 학교장 결재 및 변경 계획을 공개한 경우 수상실적을 입력할 수 있음.", "<예시> 교내상 운영 계획 서식 연번 수상명 시행(학기) 참가대상 수상비율 담당부서 공개방식 1 독후감쓰기대회 1학기 전교생 중 참가자 20% □□부 학교홈페이지 2 표창장(선행부문) 2학기 전교생 10% ◇◇부 가정통신문, SNS ※ 연간 시상 계획과 대회 운영 계획, 대회 운영 결과, 상장의 대회명이 모두 일치해야 함.", "3. 교내상 수상인원은 대회(부문)별 참가인원의 20% 이내로 권장하며, 표창장 등의 포상 수상 인원은 추천 대상 인원과 학교 규모 등을 고려하여 학업성적관리위원회의 심의로 결정한다. ※ 상위등급 수상 인원이 하위등급 수상 인원을 초과하지 않도록 함.", "4. 교내대회가 공정하게 이루어지도록 대회 실시 이전에 대회 요강(시기, 운영·심사 방법, 수상인원 등)을 공개한다. ※ 공개 방법은 나이스 플러스/학부모서비스, 가정통신문, 학교홈페이지, 학교･학급 게시, SNS 활용 등 학교장 재량으로 정함.", "5. 2024학년도 대입(졸업생 포함)부터 상급학교 진학 시 ‘수상경력’은 제공하지 않는다."]}, {"id": "cert", "title": "자격증·NCS 이수상황", "emoji": "🎓", "page_range": "p.72~77", "items": ["09 자격증 취득 및 국가직무능력표준 이수상황", "제10조(자격증 취득 및 국가직무능력표준 이수상황)", "① 고등학교의 ‘자격증 취득상황’에는 고등학교 재학 중에 취득한 자격증의 명칭 또는 종류, 번호 또는 내용, 취득연월일, 발급기관을 입력하며 원본을 대조한 후에 취득한 순서대로 입력한다.", "▪자격증 증빙자료로 자격증 원본이나 자격증 취득확인서가 있으며, 자격증 입력 시 사본을 별도로 보관한다.", "▪자격증은 취득한 순서대로 누가하여 입력하며, 이전 학년도에 취득한 자격증 입력 시 학교생활기록부 정정은 불필요하다.", "▪제2항 각 호 외에 교내·외 각종 인증 취득 사항은 학교생활기록부에 입력하지 않으며, 자격증 명칭 및 취득 사실은 ‘자격증 취득상황’ 이외의 어떠한 항목에도 입력하지 않는다.", "② 제1항에 따라 입력할 수 있는 자격증은 다음 각 호와 같다. 1. 「국가기술자격법」에 따른 국가기술자격증 2. 개별 법령에 따른 국가자격증 3. 「자격기본법」에 따른 국가공인을 받은 민간자격증 중 교육부장관이 정한 자격증", "▪학생이 재학 중 취득한 기술 관련 자격증으로 「국가기술자격법」에 따른 국가기술자격증, 개별 법령에 따른 국가자격증, 「자격기본법」에 따른 국가공인을 받은 민간자격증을 입력한다. ※ 국가기술자격은 「국가기술자격법 시행규칙」 제3조 및 같은 법 시행규칙 [별표 2]를 참조하며, 국가기술자격증과 국가자격증의 관련 정보는 www.q-net.or.kr에서 확인할 수 있음. ※ 국가공인을 받은 민간자격증 중 교육부장관이 정한 자격증은 [참고자료 2] ‘기술 관련 민간자격 국가공인 현황’을 참조함.", "▪현행 「자격기본법」에는 국가공인 민간자격증의 서식에 대한 규정이 없으므로 자격 종목 명칭, 자격등급, 유효기간을 기준으로 판단해야 하며 특히, 급수의 구분이 있는 경우 표시된 급수와 공인 유효기간 내에 취득한 자격증인지를 확인해야 한다. ※ 공인받은 자격증은 소관 부처에서 관장(자격의 관리·운영, 취소 등)하며, 급수가 있는 경우 해당 급수만 공인 자격증으로 유효하고, 공인 유효기간 내 취득한 자격증에만 공인의 효력이 있음.", "④ 고등학교의 ‘국가직무능력표준 이수상황’에는 고등학생이 학교교육계획에 따라 이수한 국가직무 능력표준 이수상황을 ‘학년’, ‘학기’, ‘세분류’, ‘능력단위(능력단위코드)’, ‘이수시간’, ‘원점수’, ‘성취도’, ‘비고’로 입력한다.", "▪학교교육계획에 따라 국가직무능력표준을 이수한 경우 학교생활기록부에 등록하여 그 결과를 관리하며, 이때 학교교육계획은 정규교육과정과 학교장이 승인한 정규교육과정 이외의 교육활동 모두 해당한다. ※ 국가직무능력표준(NCS)은 산업현장에서 직무를 수행하기 위해 요구되는 지식･기술･소양 등의 내용을 국가가 산업부문별･수준별로 체계화한 것을 말함(「자격기본법」 제2조제2호).", "▣ 자격증 취득 및 국가직무능력표준 이수상황 <자격증 취득상황> 구 분 ➊ 명칭 또는 종류 ➋ 번호 또는 내용 ➌ 취득연월일 ➍ 발급기관 자격증 <국가직무능력표준 이수상황>", "➊ 학년 ➋ 학기 ➌ 세분류 ➎ 이수시간 ➏ 원점수 ➐ 성취도 ➑ 비고 (능력단위코드) <자격증 취득상황>", "➊ 명칭 또는 종류 가. 기술 관련 국가공인 민간자격증은 급수와 취득 연도를 확인하고 공인기간 내 공인 효력이 있는 것만 입력한다. ※ 재학 중 취득한 국가기술자격증, 국가자격증, 국가공인 민간자격증 중 교육부장관이 정한 자격증만 입력할 수 있으며, 그 외의 각종 민간자격증과 국제공인자격증은 입력할 수 없음. - 국가기술자격증 및 국가전문자격증 참조 사이트: www.q-net.or.kr ※ 동일 명칭 또는 종류의 자격증이더라도 등급이 다른 경우 취득한 순서대로 입력함. ※ 교육정보시스템의 [학생생활-자격증및NCS이수상황-자격증코드관리]의 {등록}에서 자격증을 {조회}하면 국가공인 민간자격증이 모두 검색되므로, 반드시 교육부장관이 정한 자격증인지([참고자료 2] 참조) 공인유효 기간에 해당하는지 등을 확인 후 등록해야 함. 나. 「국가기술자격법」에 따라 단일등급의 경우 등급을 별도로 표기하지 않으므로 ‘워드프로세서 1급’은 2012년 1월 1일부로 ‘워드프로세서’로 자격 명칭이 표기된다.", "➋ 번호 또는 내용 가. 자격증 번호 입력 시 숫자와 영문을 구분하여 정확하게 입력한다.", "➌ 취득연월일 가. 자격증의 취득연월일은 자격증 합격일(등록일)을 기준으로 입력한다.", "➍ 발급기관 가. 자격증 발급기관에는 기관장이 아닌 기관명*을 입력한다. * 한국산업인력공단, 대한상공회의소, 한국생산성본부 등", "<예시> 자격증 취득상황 작성 구분 명칭 또는 종류 번호 또는 내용 취득연월일 발급기관 정보기술자격(ITQ)A등급-한글엑셀 A001-2026103-002317 2026.04.05. 한국생산성본부 정보기술자격(ITQ)A등급-한글파워포인트 A001-2026103-002317 2026.04.05. 0109_14v2)", "※ ‘능력단위코드’ 및 ‘비고’는 교육정보시스템에서 자동으로 입력됨. * [참고] 국가직무능력표준 이수상황 ‘비고’ 입력", "① 정규교육과정 내 전공 일반 과목의 능력단위를 이수한 경우", "② 정규교육과정 내 실무 과목의 능력단위를 이수할 경우", "③ 정규교육과정 내 실무 과목의 학생선택 능력단위(도제학교 등 기업 특화과정으로 이수하는 능력단위)를 이수할 경우", "④ 정규교육과정 내 기초 과목의 능력단위를 이수할 경우", "⑤ 정규교육과정 외 실무 과목의 능력단위를 이수할 경우", "⑥ 정규교육과정 내 공동교육과정을 통해 능력단위를 이수할 경우", "⑦ 정규교육과정 내 학교 밖 교육을 통해 능력단위를 이수할 경우", "⑧ 위탁기관을 통해 실무 과목과 연결된 능력단위를 이수할 경우(과목단위 이수)", "⑨ 위탁기관을 통해 실무 과목과 연결되지 않은 능력단위를 이수할 경우(능력단위 이수)", "⑩ 현장실습을 나가기 전 정규교육과정 내 실무 과목의 능력단위를 이수할 경우", "⑪ 정규교육과정 내 실무 과목의 능력단위에 대해 현장실습으로 인한 인정점을 부여받은 경우", "⑫ 능력단위의 평가가 완료되지 않은 상태에서 전출 등 학적변동이 일어나는 경우"]}, {"id": "violence", "title": "학교폭력 조치상황", "emoji": "🛡️", "page_range": "p.78~82", "items": ["10 학교폭력 조치상황 관리", "제16조의2(학교폭력 조치상황 관리) ‘학교폭력 조치상황 관리’에는 「학교폭력예방 및 대책에 관한 법률」 제17조제1항에 따른 가해학생에 대한 조치결정 일자 및 조치사항을 입력한다.", "▪ <학교폭력 근절 종합대책(2023.4.12.)>에 따라 ‘학교폭력 가해학생에 대한 조치사항’을 2024학년도 1학년부터 학교생활기록부 ‘학교폭력 조치상황 관리’에 일원화하여 입력한다. ※ 단, 2024학년도 이전의 학업 중단 학생이 재･편입학･복학할 때 ‘학교폭력 가해학생에 대한 조치사항’이 기재되어 있을 경우 그 내용을 ‘학교폭력 조치상황 관리’에 정정 절차를 거쳐 옮겨 적어야 함.", "▪「학교폭력예방 및 대책에 관한 법률」 제17조제1항에 따른 ‘가해학생에 대한 조치사항’은 학교에서 조치결정 통보 공문을 접수한 즉시 ‘학교폭력 조치상황 관리’에 입력한다.", "▪학교폭력 사안이 신고된 때부터 「학교폭력예방 및 대책에 관한 법률」 제17조에 따른 조치 이행이 완료될 때까지 원칙적으로 가해학생의 신청에 의한 학적변동은 제한한다. 다만, 가해학생에게 같은 법 제17조제1항제8호(전학)에 따른 조치와 함께 수 개의 조치가 동시에 부과된 경우 교육장은 위 제8호(전학)의 조치를 우선적으로 시행할 수 있다. ※ 신청에 의한 학적변동이 아닌 「초･중등교육법」 제18조, 같은 법 시행령 제31조에 따른 퇴학, 「교원의 지위 향상 및 교육활동 보호를 위한 특별법」에 따른 가해학생 전학, 퇴학 조치의 경우는 우선적으로 실시 가능함.", "▪「학교폭력예방 및 대책에 관한 법률」 제17조제3항에 따라 가해학생이 교육감이 정한 기관에서 특별교육을 이수하거나 심리치료를 받은 사실은 입력하지 않는다. ※ 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제2호부터 제4호까지 및 제6호부터 제8호까지의 처분을 받은 가해학생은 교육감이 정한 기관(대안교육기관을 포함)에서 특별교육을 이수하거나 심리치료를 받아야 하며, 그 기간은 심의위원회에서 정함.", "▪ 학업 중단 중인 학생의 ‘학교폭력 가해학생에 대한 조치사항’도 학교생활기록부에 입력해야 한다.", "▣ 학교폭력 조치상황 관리 학년 ➊ 조치결정 일자 ➋ 조치사항 2026. OO. OO. 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제8호에 따른 전학", "➊ 조치결정 일자 가. 조치결정 일자는 ‘학교폭력대책심의위원회’의 조치 요청에 대해 교육장이 조치를 결정한 날(교육지원청 내부결재일)을 의미한다. 나. 행정심판･소송이 청구된 경우에는 조치사항을 먼저 입력하고, 향후 조치가 변경될 경우 이를 수정하되, 최초 조치결정 일자는 변경하지 않는다.", "➋ 조치사항 가. 「학교폭력예방 및 대책에 관한 법률」 제17조에 따른 ‘가해학생에 대한 조치사항’은 학교에서 조치결정 통보 공문을 접수한 즉시 ‘학교폭력 조치상황 관리’에 입력한다. ※ 학교폭력 가해학생에 대한 조치사항 입력 예시 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제1호에 따른 피해학생에 대한 서면사과 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제2호에 따른 피해학생 및 신고･고발 학생에 대한 접촉, 협박 및 보복행위의 금지 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제3호에 따른 학교에서의 봉사 10시간 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제4호에 따른 사회봉사 20시간 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제5호에 따른 학내외 전문가, 교육감이 정한 기관에 의한 특별 교육이수 또는 심리치료 10시간 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제6호에 따른 출석정지 3일 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제7호에 따른 학급교체 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제8호에 따른 전학 • 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제9호에 따른 퇴학처분 나. 「학교폭력예방 및 대책에 관한 법률」 제17조제1항과 제2항에 따라 수 개의 조치가 동시에 부과되거나 서로 다른 조치사항이 2회 이상인 경우, 각각의 조치사항을 ‘학교폭력 조치상황 관리’에 모두 입력한다. 다. 「학교폭력예방 및 대책에 관한 법률」 제17조제1항제1호부터 제3호까지의 조치사항을 이행 기간 내에 이행한 가해학생에 대한 조치사항은 입력을 유보하고, 해당 조치사항은 「학교폭력 가해학생 조치(제1호･제2호･제3호) 조건부 기재유보 관리대장」에 기록하여 관리한다. ※ 제1호･제2호･제3호 조치사항의 조건부 기재유보는 2020. 3. 1. 이후 신고된 최초의 학교폭력 사안에 한하여 적용함. ※ 학교장은 ‘학교폭력 가해학생 조치사항 관리 대장’, ‘학교폭력 가해학생 조치(제1호･제2호･제3호) 조건부 기재유보 관리대장’이 비공개 문서로 관리되고 업무 인수･인계 과정에서 누락되는 일이 없도록 책임 관리함. 1) 동일한 학교폭력 사안으로 「학교폭력 예방 및 대책에 관한 법률」 제17조제1항제1호부터 제3호까지의 조치를 동시에 부과받은 경우에도 각각의 조치사항을 이행하면 입력을 유보한다. 2) 동일한 학교폭력 사안으로 「학교폭력 예방 및 대책에 관한 법률」 제17조제1항제1호부터 제3호까지의 조치와 제4호부터 제8호까지의 조치를 동시에 부과 받은 경우, 제1호부터 제3호까지의 조치는 조치사항을 이행하면 기재를 유보하고, 제4호부터 제8호까지의 조치사항은 입력하도록 한다. 3) 정해진 이행 기간 내에 조치사항을 이행하지 않으면 조치사항을 기재하고, 이후 조치사항을 이행하여도 기재내용은 유지한다. 4) 학교폭력 가해학생이 「학교폭력 예방 및 대책에 관한 법률」 제17조제1항제1호부터 제3호까지의 조치를 받고, 이행 기간 만료 이전에 집행정지(효력정지) 인용 결정을 받아 조치를 미이행했을 경우, 집행정지 기간 동안 조치이행 의무가 정지된 점을 고려하여 학교생활기록부 기재를 유보한다. 5) 다만, 본안에 대한 심리 결과 청구가 기각된 경우, 「학교폭력예방 및 대책에 관한 법률」 제17조제1항 조치를 집행정지(효력정지) 결정 당시 남은 이행 기간 내에 이행했는지 여부에 따라, 동 조치사항에 대한 학교생활기록부의 입력 여부를 결정한다. 라. 위의 ‘다’항에 따라 조치사항 입력이 유보된 가해학생이 동일학교급에서 다시 다른 학교폭력으로 「학교폭력 예방 및 대책에 관한 법률」 제17조제1항의 조치를 받은 경우에는 이전에 입력이 유보된 조치사항을 포함하여 모두 입력한다. 1) 기재 유보된 조치와 새롭게 추가된 조치를 받은 학년도가 각각 다른 경우 모든 조치사항을 추가 조치된 학년도의 학교생활기록부에 병기하여 기재하되 조치결정 일자는 각각 입력한다.", "➌ 학교폭력 조치사항 삭제 가. 학교생활기록부에 기재된 학교폭력 가해학생

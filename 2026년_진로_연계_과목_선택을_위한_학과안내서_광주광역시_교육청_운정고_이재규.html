<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 진로 연계 학과안내서 · 광주광역시교육청</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --ink: #18181b;
  --ink-muted: #52525b;
  --ink-soft: #71717a;
  --border: #e4e4e7;
  --border-soft: #f4f4f5;
  --accent: #18181b;
  --hover: #f4f4f5;
  /* Category colors */
  --c-tech: #6d54d3;
  --c-business: #1f5da5;
  --c-social: #0e6e57;
  --c-law: #a13a5a;
  --c-lang: #94560f;
  --c-humanities: #525252;
  --c-agri: #3b6d11;
  --c-health: #0a8e6d;
  --c-medical: #a33d1f;
  --c-life: #b8721a;
  --c-natural: #2563c4;
  --c-arch: #404040;
  --c-mech: #5b40bd;
  --c-bio_chem: #4a8a14;
  --c-sports: #b3322d;
  --c-art: #a13a5a;
  --c-edu: #6d54d3;
  --c-free: #525252;
  --c-military: #525252;
}
* { box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
  font-feature-settings: 'ss03', 'ss04';
  background: var(--bg);
  color: var(--ink);
  margin: 0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-weight: 400;
}
button, input { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* Header */
.hero {
  background: linear-gradient(180deg, #f6f5f0 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 56px 24px 36px;
}
.hero-inner {
  max-width: 1240px; margin: 0 auto;
}
.eyebrow {
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-muted); font-weight: 600; margin-bottom: 12px;
}
.h-title {
  font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.1;
  letter-spacing: -0.02em; margin: 0 0 12px;
}
.h-sub {
  font-size: 15px; color: var(--ink-muted); max-width: 640px; margin: 0;
  font-weight: 400;
}
.h-stats {
  display: flex; gap: 28px; margin-top: 28px; flex-wrap: wrap;
}
.h-stat {
  display: flex; flex-direction: column; gap: 2px;
}
.h-stat-num { font-size: 20px; font-weight: 700; }
.h-stat-lbl { font-size: 12px; color: var(--ink-soft); }

/* Controls */
.controls-wrap {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.controls {
  max-width: 1240px; margin: 0 auto;
  display: flex; flex-direction: column; gap: 12px;
}
.search-row { display: flex; gap: 8px; align-items: center; }
.search-input-wrap { flex: 1; position: relative; }
.search-input {
  width: 100%; padding: 12px 14px 12px 42px;
  border: 1px solid var(--border); border-radius: 10px;
  background: var(--surface); font-size: 15px;
  transition: border-color 0.15s;
}
.search-input:focus { outline: none; border-color: var(--ink); }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: var(--ink-soft); pointer-events: none;
}
.mode-toggle {
  display: flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 3px; gap: 2px;
}
.mode-btn {
  background: transparent; border: 0; padding: 8px 14px; border-radius: 7px;
  cursor: pointer; font-size: 13px; color: var(--ink-muted); font-weight: 500;
  white-space: nowrap;
}
.mode-btn.active { background: var(--ink); color: white; }

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--surface);
  cursor: pointer; color: var(--ink-muted); font-weight: 500;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--ink-soft); color: var(--ink); }
.chip.active { background: var(--ink); color: white; border-color: var(--ink); }
.chip-count { font-size: 11px; opacity: 0.6; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Subject picker */
.subj-picker {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; display: none;
}
.subj-picker.active { display: block; }
.subj-picker-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.subj-picker-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.subj-picker-clear { font-size: 12px; color: var(--ink-soft); cursor: pointer; background: none; border: 0; padding: 0; }
.subj-picker-clear:hover { color: var(--ink); }
.subj-group { margin-bottom: 12px; }
.subj-group:last-child { margin-bottom: 0; }
.subj-group-lbl { font-size: 11px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.subj-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.subj-chip {
  font-size: 12px; padding: 4px 10px; border-radius: 6px;
  background: var(--border-soft); border: 1px solid transparent;
  cursor: pointer; transition: all 0.15s; color: var(--ink-muted);
}
.subj-chip:hover { background: var(--border); color: var(--ink); }
.subj-chip.selected { background: var(--ink); color: white; }
.subj-toggle {
  background: none; border: 0; color: var(--ink-soft);
  font-size: 12px; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px;
}
.subj-toggle:hover { color: var(--ink); }

/* Main grid */
.main { max-width: 1240px; margin: 0 auto; padding: 28px 24px 80px; }
.result-info {
  font-size: 13px; color: var(--ink-muted); margin-bottom: 16px;
}
.result-info strong { color: var(--ink); font-weight: 600; }
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; cursor: pointer; text-align: left; color: inherit;
  font: inherit; transition: all 0.2s; position: relative; overflow: hidden;
}
.card:hover {
  border-color: var(--ink-soft);
  transform: translateY(-1px);
}
.card-stripe {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.card-cat {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  margin-bottom: 10px;
}
.card-cat-dot { width: 7px; height: 7px; border-radius: 50%; }
.card-name {
  font-size: 17px; font-weight: 700; line-height: 1.3;
  margin-bottom: 8px; letter-spacing: -0.01em;
}
.card-desc {
  font-size: 13px; color: var(--ink-muted); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-match {
  font-size: 11px; margin-top: 10px; padding-top: 10px;
  border-top: 1px dashed var(--border);
  color: var(--ink-soft);
}
.card-match strong { color: var(--ink); font-weight: 600; }

.empty {
  text-align: center; padding: 60px 20px; color: var(--ink-soft);
}
.empty-title { font-size: 15px; font-weight: 600; color: var(--ink-muted); margin-bottom: 6px; }
.empty-sub { font-size: 13px; }

/* Detail view */
.detail {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 32px 36px; margin-top: 0;
}
.detail-back {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px; font-size: 13px; cursor: pointer; color: var(--ink-muted);
  margin-bottom: 20px; transition: all 0.15s;
}
.detail-back:hover { background: var(--hover); color: var(--ink); }
.detail-cat {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  margin-bottom: 8px;
}
.detail-name {
  font-size: clamp(24px, 3vw, 32px); font-weight: 800;
  margin: 0 0 28px; letter-spacing: -0.02em; line-height: 1.15;
}
.detail-row {
  display: grid; grid-template-columns: 110px 1fr; gap: 24px;
  padding: 16px 0; border-top: 1px solid var(--border-soft);
}
.detail-row:first-of-type { border-top: 0; padding-top: 0; }
.detail-lbl {
  font-size: 13px; font-weight: 600; color: var(--ink);
  letter-spacing: -0.005em;
}
.detail-val {
  font-size: 14px; color: var(--ink-muted); line-height: 1.7;
  word-break: keep-all; overflow-wrap: break-word;
}

.detail-section {
  margin-top: 32px; padding-top: 24px;
  border-top: 1px solid var(--border);
}
.detail-section-title {
  font-size: 14px; font-weight: 700; color: var(--ink);
  margin: 0 0 16px; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.detail-section-title::before {
  content: ''; display: block; width: 3px; height: 14px;
  background: var(--ink); border-radius: 1.5px;
}

.subj-table {
  display: grid; grid-template-columns: 90px 1fr; gap: 8px 16px;
}
.subj-row-lbl {
  font-size: 13px; font-weight: 600; color: var(--ink); padding: 6px 0;
}
.subj-row-vals {
  display: flex; flex-wrap: wrap; gap: 5px; padding: 3px 0;
}
.tag {
  font-size: 12px; padding: 3px 9px; border-radius: 5px;
  background: var(--border-soft); color: var(--ink-muted);
  border: 1px solid transparent;
}
.tag.match { background: #fff3a0; color: #5c4708; border-color: #efde6a; font-weight: 500; }

.bullets { margin: 0; padding-left: 18px; }
.bullets li {
  font-size: 14px; color: var(--ink-muted); line-height: 1.7;
  margin-bottom: 2px; word-break: keep-all;
}

.books-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 4px 18px;
}
.book-item {
  font-size: 13px; color: var(--ink-muted); line-height: 1.6;
  padding: 3px 0;
}
.book-item::before { content: '· '; color: var(--ink-soft); }
.book-author {
  color: var(--ink-soft); font-size: 12px;
}

.detail-page {
  font-size: 12px; color: var(--ink-soft); margin-top: 32px;
  padding-top: 16px; border-top: 1px solid var(--border-soft);
}

footer {
  max-width: 1240px; margin: 60px auto 0; padding: 24px;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--ink-soft);
  line-height: 1.7;
}

@media (max-width: 720px) {
  .hero { padding: 36px 18px 24px; }
  .controls-wrap { padding: 14px 18px; }
  .main { padding: 20px 18px 60px; }
  .detail { padding: 24px 20px; }
  .detail-row { grid-template-columns: 1fr; gap: 4px; }
  .detail-lbl { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
  .subj-table { grid-template-columns: 1fr; gap: 4px; }
  .subj-row-lbl { font-size: 12px; color: var(--ink-soft); padding-bottom: 0; }
  .grid { grid-template-columns: 1fr; gap: 10px; }
  .h-stats { gap: 20px; }
}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-inner">
    <div class="eyebrow">광주광역시교육청 · 2026</div>

</header>

<div class="controls-wrap">

    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" id="search" type="text" placeholder="학과명, 키워드, 진출 분야로 검색…" autocomplete="off">

      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="search">학과 검색</button>

</div>

<main class="main">

  <div id="content"></div>
</main>

const state = {
  cat: 'all',
  query: '',
  mode: 'search',
  selectedSubjects: new Set(),
  detail: null,
  expandedSubj: { gen: false, career: false, fusion: false },
};

const elContent = document.getElementById('content');
const elResultInfo = document.getElementById('result-info');
const elChips = document.getElementById('chips');
const elSearch = document.getElementById('search');
const elSubjPicker = document.getElementById('subj-picker');

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

// Build subject indexes for reverse search
const ALL_SUBJECTS = { gen: new Map(), career: new Map(), fusion: new Map() };
DATA.departments.forEach(d => {
  ['subGen', 'subCareer', 'subFusion'].forEach((k, i) => {
    const bucket = ['gen', 'career', 'fusion'][i];
    (d[k] || []).forEach(s => {
      const cur = ALL_SUBJECTS[bucket].get(s) || 0;
      ALL_SUBJECTS[bucket].set(s, cur + 1);
    });
  });
});
// Keep only subjects used by 2+ departments (filter noise)
['gen', 'career', 'fusion'].forEach(b => {
  ALL_SUBJECTS[b] = [...ALL_SUBJECTS[b].entries()]
    .filter(([s, c]) => c >= 2)
    .sort((a, b) => b[1] - a[1]);
});

// Stats
document.getElementById('stat-depts').textContent = DATA.departments.length;
document.getElementById('stat-books').textContent = DATA.departments.reduce((a, d) => a + (d.books?.length || 0), 0).toLocaleString();

function renderChips() {
  const total = DATA.departments.length;
  const counts = { all: total };
  DATA.departments.forEach(d => { counts[d.catKey] = (counts[d.catKey] || 0) + 1; });
  const chips = [{ key: 'all', label: '전체' }, ...DATA.categories];
  elChips.innerHTML = chips.map(c => {
    const cnt = counts[c.key] || 0;
    const dot = c.key === 'all' ? '' : `<span class="chip-dot" style="background:${CAT_COLORS[c.key]}"></span>`;
    return `<button class="chip ${state.cat === c.key ? 'active' : ''}" data-cat="${c.key}">${dot}${esc(c.label)} <span class="chip-count">${cnt}</span></button>`;
  }).join('');
  elChips.querySelectorAll('.chip').forEach(b => {
    b.onclick = () => { state.cat = b.dataset.cat; render(); };
  });
}

    </div>
  `;
  const body = groups.map(g => {
    const all = ALL_SUBJECTS[g.key];
    const expanded = state.expandedSubj[g.key];
    const shown = expanded ? all : all.slice(0, 14);
    const chips = shown.map(([s, _]) => {
      const selected = state.selectedSubjects.has(s);
      return `<button class="subj-chip ${selected ? 'selected' : ''}" data-subj="${esc(s)}">${esc(s)}</button>`;
    }).join('');
    const moreBtn = all.length > 14 ? `<button class="subj-toggle" data-toggle="${g.key}">${expanded ? '간단히 ▲' : `+ ${all.length - 14}개 더 보기 ▼`}</button>` : '';
    return `
      <div class="subj-group">
        <div class="subj-group-lbl">${g.label}</div>
        <div class="subj-chips">${chips}${moreBtn ? ` ${moreBtn}` : ''}</div>
      </div>
    `;
  }).join('');
  elSubjPicker.innerHTML = head + body;
  elSubjPicker.querySelectorAll('.subj-chip').forEach(c => {
    c.onclick = () => {
      const s = c.dataset.subj;
      if (state.selectedSubjects.has(s)) state.selectedSubjects.delete(s);
      else state.selectedSubjects.add(s);
      render();
    };
  });
  elSubjPicker.querySelectorAll('.subj-toggle').forEach(t => {
    t.onclick = () => {
      const k = t.dataset.toggle;
      state.expandedSubj[k] = !state.expandedSubj[k];
      render();
    };
  });
  const clr = document.getElementById('subj-clear');
  if (clr) clr.onclick = () => { state.selectedSubjects.clear(); render(); };
}

function scoreReverse(d) {
  if (state.selectedSubjects.size === 0) return 0;
  const set = state.selectedSubjects;
  let score = 0;
  const matches = [];
  (d.subGen || []).forEach(s => { if (set.has(s)) { score += 1; matches.push(s); } });
  (d.subCareer || []).forEach(s => { if (set.has(s)) { score += 2; matches.push(s); } });
  (d.subFusion || []).forEach(s => { if (set.has(s)) { score += 2; matches.push(s); } });
  return { score, matches };
}

function filteredDepartments() {
  let list = DATA.departments;
  if (state.cat !== 'all') list = list.filter(d => d.catKey === state.cat);
  if (state.query) {
    const q = state.query.toLowerCase();
    list = list.filter(d => {
      const hay = [d.name, d.summary, d.related, d.subjects, d.univ, d.career,
                   (d.subGen || []).join(' '), (d.subCareer || []).join(' '),
                   (d.subFusion || []).join(' '), (d.competence || []).join(' '),
                   (d.books || []).join(' ')].join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if (state.mode === 'reverse' && state.selectedSubjects.size > 0) {
    list = list.map(d => ({ ...d, _match: scoreReverse(d) }))
               .filter(d => d._match.score > 0)
               .sort((a, b) => b._match.score - a._match.score);
  }
  return list;
}

function renderGrid() {
  const list = filteredDepartments();
  // result info
  let info = `<strong>${list.length}</strong>개 학과`;
  if (state.cat !== 'all') {
    const cat = DATA.categories.find(c => c.key === state.cat);
    if (cat) info = `${cat.label} 분야 ${info}`;
  }
  if (state.query) info += ` · "${esc(state.query)}" 검색`;
  if (state.mode === 'reverse' && state.selectedSubjects.size > 0) {
    info = `<strong>${list.length}</strong>개 학과가 선택한 ${state.selectedSubjects.size}개 과목과 연결됩니다 (가중치 순)`;
  }
  elResultInfo.innerHTML = info;
  if (list.length === 0) {
    elContent.innerHTML = `<div class="empty">
      <div class="empty-title">결과가 없습니다</div>
      <div class="empty-sub">${state.mode === 'reverse' ? '다른 과목을 선택해보세요.' : '검색어를 다르게 입력해보세요.'}</div>
    </div>`;
    return;
  }
  elContent.innerHTML = `<div class="grid">${list.map(d => {
    const color = CAT_COLORS[d.catKey];
    const matchInfo = state.mode === 'reverse' && d._match ?
      `<div class="card-match">매칭 <strong>${d._match.matches.length}</strong>개: ${esc(d._match.matches.slice(0, 3).join(', '))}${d._match.matches.length > 3 ? ` 외 ${d._match.matches.length - 3}개` : ''}</div>` : '';
    return `
      <button class="card" data-id="${d.id}">
        <div class="card-stripe" style="background:${color}"></div>
        <div class="card-cat" style="color:${color}"><span class="card-cat-dot" style="background:${color}"></span>${esc(d.cat)}</div>
        <div class="card-name">${esc(d.name)}</div>
        <div class="card-desc">${esc(d.summary || '요약 정보가 없습니다.')}</div>
        ${matchInfo}
      </button>
    `;
  }).join('')}</div>`;
  elContent.querySelectorAll('.card').forEach(c => {
    c.onclick = () => { state.detail = c.dataset.id; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  });
}

function renderDetail() {
  const d = DATA.departments.find(x => x.id === state.detail);
  if (!d) { state.detail = null; render(); return; }
  const color = CAT_COLORS[d.catKey];
  elResultInfo.innerHTML = '';
  const matchedSubjects = state.mode === 'reverse' ? state.selectedSubjects : new Set();
  const subjTag = (s) => `<span class="tag ${matchedSubjects.has(s) ? 'match' : ''}">${esc(s)}</span>`;
  const subjRow = (lbl, arr) => arr && arr.length ? `
    <div class="subj-row-lbl">${lbl}</div>
    <div class="subj-row-vals">${arr.map(subjTag).join('')}</div>
  ` : '';
  const bullets = (arr) => arr && arr.length ? `<ul class="bullets">${arr.map(b => `<li>${esc(b)}</li>`).join('')}</ul>` : '';
  const books = (arr) => arr && arr.length ? `<div class="books-grid">${arr.map(b => {
    const m = b.match(/^(.+?)\(([^)]+)\)\s*$/);
    if (m) return `<div class="book-item">${esc(m[1].trim())} <span class="book-author">(${esc(m[2])})</span></div>`;
    return `<div class="book-item">${esc(b)}</div>`;
  }).join('')}</div>` : '';

  elContent.innerHTML = `
    <div class="detail">
      <button class="detail-back" id="back-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로
      </button>
      <div class="detail-cat" style="color:${color}"><span class="card-cat-dot" style="background:${color}"></span>${esc(d.cat)}</div>
      <h2 class="detail-name">${esc(d.name)}</h2>

      ${d.summary ? `<div class="detail-row"><div class="detail-lbl">학과 개요</div><div class="detail-val">${esc(d.summary)}</div></div>` : ''}
      ${d.related ? `<div class="detail-row"><div class="detail-lbl">관련 학과</div><div class="detail-val">${esc(d.related)}</div></div>` : ''}
      ${d.subjects ? `<div class="detail-row"><div class="detail-lbl">주요 교과목</div><div class="detail-val">${esc(d.subjects)}</div></div>` : ''}
      ${d.univ ? `<div class="detail-row"><div class="detail-lbl">개설 대학</div><div class="detail-val">${esc(d.univ)}</div></div>` : ''}
      ${d.career ? `<div class="detail-row"><div class="detail-lbl">졸업 후 진출</div><div class="detail-val">${esc(d.career)}</div></div>` : ''}

      ${(d.subGen?.length || d.subCareer?.length || d.subFusion?.length) ? `
      <div class="detail-section">
        <h3 class="detail-section-title">고교 권장 과목</h3>
        <div class="subj-table">
          ${subjRow('일반 선택', d.subGen || [])}
          ${subjRow('진로 선택', d.subCareer || [])}
          ${subjRow('융합 선택', d.subFusion || [])}
        </div>
      </div>` : ''}

      ${d.competence?.length ? `
      <div class="detail-section">
        <h3 class="detail-section-title">권장 역량</h3>
        ${bullets(d.competence)}
      </div>` : ''}

      ${d.books?.length ? `
      <div class="detail-section">
        <h3 class="detail-section-title">권장 도서 (${d.books.length}권)</h3>
        ${books(d.books)}
      </div>` : ''}

      <div class="detail-page">원본 PDF 페이지 ${d.page}–${d.page + 1}</div>
    </div>
  `;
  document.getElementById('back-btn').onclick = () => { state.detail = null; render(); };
}

function render() {
  renderChips();
  renderSubjectPicker();
  if (state.detail) renderDetail();
  else renderGrid();
}

// Event handlers
elSearch.addEventListener('input', (e) => { state.query = e.target.value; state.detail = null; render(); });
document.querySelectorAll('.mode-btn').forEach(b => {
  b.onclick = () => {
    state.mode = b.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.toggle('active', x.dataset.mode === state.mode));
    if (state.mode === 'search') state.selectedSubjects.clear();
    state.detail = null;
    render();
  };
});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선행학습영향평가 면접 예시 문항 2024-2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f6f5f2;--bg3:#eeedea;
  --text:#1a1a18;--text2:#5e5e5a;--text3:#9e9e99;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.20);
  --y2026:#1a4fa0;--y2026bg:#e8f0fb;
  --y2025:#276e3b;--y2025bg:#e4f3ea;
  --y2024:#8b4a00;--y2024bg:#fdf0e0;
  --radius:8px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0f0ec;--text2:#a0a09a;--text3:#606060;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.20);
  --y2026:#85b7eb;--y2026bg:#0e2340;
  --y2025:#6dbf82;--y2025bg:#0e2e1a;
  --y2024:#e8a050;--y2024bg:#2e1a00;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}

/* HEADER */
.site-header{background:var(--bg);border-bottom:.5px solid var(--border2);padding:1.25rem 1.5rem 1rem;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.75rem;}
.header-title h1{font-size:17px;font-weight:600;color:var(--text);}
.header-title p{font-size:11px;color:var(--text3);margin-top:3px;}
.header-stats{display:flex;gap:12px;flex-shrink:0;}
.stat{text-align:center;}
.stat-num{font-size:18px;font-weight:700;color:var(--text);line-height:1;}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px;}

/* SEARCH */
.search-wrap{display:flex;flex-direction:column;gap:8px;}
.search-row1{display:grid;grid-template-columns:1fr 220px auto;gap:8px;}
.search-wrap input,.search-wrap select{
  padding:8px 11px;font-size:13px;
  border:.5px solid var(--border2);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-family:inherit;outline:none;
  transition:border-color .15s;
}
.search-wrap input:focus,.search-wrap select:focus{border-color:var(--text);}
.btn-reset{padding:8px 14px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;}
.btn-reset:hover{background:var(--bg2);}

/* YEAR PILLS */
.year-pills{display:flex;gap:6px;margin-top:4px;}
.pill{padding:5px 14px;font-size:12px;font-weight:500;border-radius:20px;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;}
.pill.active-all{background:var(--text);color:var(--bg);border-color:transparent;}
.pill.active-2026{background:var(--y2026bg);color:var(--y2026);border-color:var(--y2026);}
.pill.active-2025{background:var(--y2025bg);color:var(--y2025);border-color:var(--y2025);}
.pill.active-2024{background:var(--y2024bg);color:var(--y2024);border-color:var(--y2024);}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:1.25rem 1rem 3rem;}
.result-info{font-size:12px;color:var(--text3);margin-bottom:.875rem;padding-left:2px;}

/* CARDS */
.card-list{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s;}
.card:hover{border-color:var(--border2);}
.card.open{border-color:var(--border2);}
.card-head{padding:.875rem 1.125rem;display:flex;align-items:flex-start;gap:10px;}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500;line-height:1.4;}
.badge-univ{background:var(--bg2);color:var(--text2);}
.badge-cat{background:var(--bg3);color:var(--text3);}
.badge-year-2026{background:var(--y2026bg);color:var(--y2026);}
.badge-year-2025{background:var(--y2025bg);color:var(--y2025);}
.badge-year-2024{background:var(--y2024bg);color:var(--y2024);}
.card-arrow{font-size:11px;color:var(--text3);flex-shrink:0;margin-top:3px;transition:transform .2s;}
.card.open .card-arrow{transform:rotate(90deg);}
.card-preview{padding:0 1.125rem .875rem;font-size:13px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-body{display:none;border-top:.5px solid var(--border);padding:1rem 1.125rem;}
.card.open .card-body{display:block;}
.q-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.q-item{padding:9px 12px;background:var(--bg2);border-radius:var(--radius);font-size:13px;color:var(--text);line-height:1.65;}

/* COMPARE MODE */
.compare-view{display:flex;flex-direction:column;gap:10px;}
.compare-section{border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.compare-header{padding:.6rem 1rem;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;}
.compare-body{padding:.75rem 1rem;display:flex;flex-direction:column;gap:6px;}
.compare-q{padding:8px 11px;border-radius:var(--radius);font-size:13px;line-height:1.65;}
.compare-section.y2026 .compare-header{background:var(--y2026bg);color:var(--y2026);}
.compare-section.y2025 .compare-header{background:var(--y2025bg);color:var(--y2025);}
.compare-section.y2024 .compare-header{background:var(--y2024bg);color:var(--y2024);}
.compare-section.y2026 .compare-q{background:var(--y2026bg);color:var(--text);}
.compare-section.y2025 .compare-q{background:var(--y2025bg);color:var(--text);}
.compare-section.y2024 .compare-q{background:var(--y2024bg);color:var(--text);}
.no-data{padding:1rem;font-size:13px;color:var(--text3);font-style:italic;}

/* UNIV COMPARE CARD */
.univ-compare-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;}
.univ-compare-head{padding:.875rem 1.125rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.univ-compare-head h2{font-size:15px;font-weight:600;color:var(--text);}
.univ-compare-body{display:none;border-top:.5px solid var(--border);}
.univ-compare-card.open .univ-compare-body{display:block;}
.univ-compare-card.open .card-arrow{transform:rotate(90deg);}

/* EMPTY */
.empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:14px;}

/* FOOTER */
.footer{text-align:center;padding:1.5rem;font-size:11px;color:var(--text3);}

/* MODE TOGGLE */
.mode-toggle{display:flex;gap:0;border:.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;flex-shrink:0;}
.mode-btn{padding:6px 14px;font-size:12px;background:transparent;color:var(--text2);border:none;cursor:pointer;transition:all .15s;}
.mode-btn.active{background:var(--text);color:var(--bg);}

@media(max-width:520px){
  .search-row1{grid-template-columns:1fr;}
  .search-row2{grid-template-columns:1fr;}
  .header-stats{gap:8px;}
  .stat-num{font-size:15px;}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="header-title">
      <h1>선행학습영향평가 면접 예시 문항</h1>
      <p>TEAM 진심 (와우고 서기남, 와우고 송현제, 오남고 이지희, 향일고 김기정, 새솔고 김태진)</p>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="statUniv">72</div><div class="stat-label">개 대학</div></div>

<main class="main">

<footer class="footer">

</footer>

const DATA = [{"y":2026,"u":"가톨릭대학교","c1":"진로역량","c2":"","q":"사회탐구보고서 발표에서 인상적인 활동이 보이는데, 본인이 다른 경쟁자들보다 좋은 평가를 받았던 가장 큰 이유는 무엇인가요? 지금 다시 그 활동을 한다면 어떤 점을 보완하고 싶은지 이야기해 보세요.\n지원자는 시각장애인을 도와주는 의료용 로봇을 만들고 싶다고 하였고 공학을 전공하는 것이 더 꿈에 가까이 가는 것 같은데 본인이 반드시 지금의 전공을 선택해야 하는 이유는 무엇인가요?\n자연과학을 전공하기 위해서는 인문학적 소양의 중요성을 알고 있는 것 같아요. 그렇게 생각하게 된 계기는 무엇이며, 인문학적 소양을 쌓기 위해 구체적으로 어떤 노력을 하였는지 이야기해 보세요.\n지원자의 꿈은 교사인데, 어떤 교사가 좋은 교사라고 생각하나요? 그런 자질을 어떻게 기를 수 있으며 어떤 노력을 해 왔나요?"},{"y":2026,"u":"가톨릭대학교","c1":"학업역량","c2":"","q":"1학년 수학 수업에서 발표를 하여 학우들의 좋은 호응을 받았다고 했는데, 어떤 점을 인정받은 것이며 그 활동을 통해서 얻은 점을 말해 보세요.\n2학년 담임 선생님께서 지원자를 학교에서 가장 귀감이 되는 학생으로 언급해 주었는데, 본인의 어떠한 점을 평가받았다고 생각하며, 본인의 활동으로 인해 학우들이나 학교에 어떤 플러스가 되었다고 생각하나요?\n선생님이 지원자를 자기주도성이 강하다고 평가하였는데, 본인의 어떤 점에 대해 그렇게 평가 했다고 생각하나요?\n수업 시간에 질문이 많은 학생으로 작성되어 있는데, 질문을 많이 하게 된 이유는 무엇이며 특히 기억에 남는 질문이 있나요?"},{"y":2026,"u":"가톨릭대학교","c1":"공동체역량","c2":"","q":"기숙사 생활에서 갈등상황을 해결했다고 했는데, 그 상황 이전에 본인이 어떻게 행동했다면 그 갈등상황이 발생하지 않았을 것이라 생각하나요?\n봉사동아리에 참여하게 된 계기는 무엇이며, 가장 의미있었던 활동과 그 활동에서 본인의 역할이 무엇이었는지 말해보세요.\n특수반 학생 도우미 활동을 통해서 본인이 가장 얻었다고 생각하는 점은 무엇이며, 그 특수반 학생과 나눈 대화 중 가장 기억에 남는 말과 그 이유는 무엇인가요?\n3년간 같은 동아리 활동을 한 이유는 무엇이며, 그것이 본인의 어떤 점을 성장시켰다고 생각하나요?"},{"y":2026,"u":"건국대학교","c1":"KU자기추천","c2":"학업역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"건국대학교","c1":"KU자기추천","c2":"진로역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"건국대학교","c1":"KU자기추천","c2":"공동체역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"학업역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"성장역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"공동체역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"경기대학교","c1":"사회영역\n(인성, 공동체의식)","c2":"공동체역량","q":"동아리 활동에서 다른 사람들을 이끌며 코딩을 주도한 경험이 나타나는데 동아리원들과 협력할 때 가장 중요하게 생각한 점과 활동 과정을 구체적으로 말씀해주세요.\n딥페이크 캠페인 포스터 제작 활동에서 팀원과 협력하며 경각심을 높인 경험이 있다면, 본인이 맡은 역할과 활동 과정, 느낀 점을 설명해주세요.\n디지털 망각 문제나 청소년 정신 건강 문제를 분석하고 다른 사람들에게 설명할 때, 가장 중점을 둔 부분과 그 이유, 활동 과정에서 배운 점을 말씀해주세요.\n카드뉴스 제작에서 협력과 의사소통을 잘 발휘한 경험이 있다면, 협력적인 작업에서 중요하게 생각한 점과 활동 과정, 성과를 구체적으로 설명해주세요.\n공공문제를 해결할 때 여러 사람의 의견이 충돌하면, 의견을 조정하고 균형을 맞추기 위해 어떤 접근을 했는지, 그 과정에서 배운 점을 말씀해주세요.\n전교학생회 부서별 봉사활동에 참여한 경험이 있다면, 어떤 활동이었고 본인이 학교를 위해 맡은 역할과 활동 과정, 느낀 점을 구체적으로 설명해주세요.\n친구들ㅇ게 도움을 주기 위해 기울인 노력과, 이 봉사활동을 하게 된 계기, 활동 과정과 느낀 점을 구체적으로 설명해주세요.\n학급 내 교실지키미 역할을 수행한 경험이 있다면, 이 역할을 맡게 된 이유와 학급 친구들을 위해 수행한 활동, 활동 후 느낀 점을 말씀해주세요.\n멘토멘티 학습도우미 활동에 반복 참여한 경험이 있다면, 공동체 기여 경험을 통해 느낀 점을 구체적으로 설명해주세요."},{"y":2026,"u":"경기대학교","c1":"잠재역량\n(전공 관련 활동 및 경험, 발전가능성)","c2":"공동체역량","q":"리튬이온 배터리의 특성과 ‘왜 다른 알칼리 금속이 아닌 리튬을 사용하는지’ 조사하고 발표한 과정과 내용을 구체적으로 설명해주세요.\n청년 실업 문제를 주제로 프로젝트 활동을 수행하면서, 본인이 맡은 역할과 프로젝트 과정을 구체적으로 설명해주세요.\n‘메타버스로 열어가는 일본 시장 디지털 마케팅 프로젝트’에서 고령층 대상 맞춤형 제품을 제안하며, 가장 중요하게 고려한 점과 그 과정을 구체적으로 설명해주세요.\n‘미국 관세 정책에 따른 한국 기업의 영향’을 주제로 질적 연구를 수행하며, 조사 과정과 연구 내용을 구체적으로 설명해주세요.\n‘외국어가 우리 일상에 침투하는 정도’를 주제로 탐구 보고서를 작성하였는데, 탐구 내용과 과정을 구체적으로 설명해주세요.\n‘실험의 정밀성과 정확성을 판단하기 위한 신뢰도와 타당도 분석’을 주제로 보고서를 작성하며 배운 점을 구체적으로 설명해주세요.\n‘청소년 클럽, 일탈 조장인가 놀 권리인가’를 행정학과 연계해 발표하며, 조사 내용과 발표 과정을 설명해주세요.\n‘자가치유 고분자의 작동 원리와 한계 요인’을 조사하며, 조사 결과와 이를 통해 알게 된 과학적 지식을 구체적으로 설명해주세요.\n‘급속 동결과 식품의 부패’를 주제로 발표하며, 자료 조사 방법과 발표 내용을 구체적으로 설명해주세요.\n세균 배양 실험을 응용해 숯의 수질 정화 능력을 실험하며, 실험 설계에서 중요하게 생각한 점과 개선 과정을 구체적으로 설멸해주세요.\n‘한반도 평화와 외교의 역할’을 탐구하며, 탐구 과정과 내용을 구체적으로 설명해주세요.\n우키요에가 고흐 작품에 미친 영향을 일본어 대본으로 작성하였는데, 활동 과정과 문화 교류의 의미를 구체적으로 설명해주세요.\n모의유엔 방글라데시 대사로 기후위기 의견 제시와 폐자원 캠페인을 수행하며 개발도상국 입장을 대변한 논리와 활동 과정을 구체적으로 설명해주세요.\nSNS와 예능 사례 100여건을 수집 후 분석하며, 탐구 주제를 선정하였는데, 이유와 비언어적 요소 분류 기준은 어떻게 하였는지 말씀해주세요."},{"y":2026,"u":"경희대학교","c1":"전공적합성","c2":"공동체역량","q":"고등학교 재학 중 가장 흥미를 가졌던 과목은? 관심 분야와 관련해 주도적으로 이수한 과목이 있는가?\n관심을 갖고 깊게 탐구했던 활동을 하나만 소개해보자.\n○과목의 세부능력 및 특기사항에 독서활동이 기록되어 있는데, 어떤 부분이 가장 인상적이었는가?\n이 개념이 쓰이는 실제 사례나 상황을 말해 볼 수 있을까?\n자신의 생각을 뒷받침할 수 있는 근거는 뭐고, 반대되는 사례나 예시는 없을까?\n이 문제를 해결하기 위해 어떤 방법을 떠올렸나요? 팀의 아이디어가 실패했다면 그 원인은 무엇이라고 생각하나요?"},{"y":2026,"u":"경희대학교","c1":"인성","c2":"공동체역량","q":"조별 과제나 팀별 활동에서 협업해서 달상황을 살펴보면 물리학Ⅰ을 이수하고 물리학Ⅱ는 이수하지 않았습니다. 물리학Ⅰ 세부능력 a lc 특기사항에서는 수업에 적극적으로 참여한 노력이 기재되어 있는데, 물리학Ⅱ를 이수하지 않은 이유가 있다면 설명해 주세요.\n게임이론에 대한 주제로 수학적 개념과 원리를 적용하여 탐구를 진행하고 발표했다고 했는데요. 게임이론이 무엇이고 실생활에서는 어떻게 적용되는 지 예를 들어서 설명해보세요.\n1~3학년 진로활동을 보면 1학년 때는 무역 분야에 확고한 관심이 기재되어 있는데 학년이 올라살수록 경제라는 좀 더 큰 범위로 관심이 확장된 느낌입니다. 국제통상학과 입학 후 학생이 목표하는 바는 무엇이고 심화시켜 배워보고 싶은 분야나 내용이 있다면 설명해 주세요. 2학년 1학기 때 우유급식 도우미 봉사에 참여했는데요. 참여하게 된 계기와 진행하는 과정에서 느낀 점이 있었다면 얘기해 주세요.\n경계선 지능을 가진 사람들은 지정 장애로 분류되지 않아서 특수교육 사각지대에 있는 ‘느린 학습자’에 대해서도 맞춤형 교육이 이루어져야 한다고 했는데요, 관련해서 국어 시간에 활용할 수 있는 구체적 대안을 제시했다고 했는데, 그 내용에 대해 소개해 주세요.\n2학년 확률과 통계 수업에서 확률변수 개념이 마케팅 전략 수립에 어떻게 활용되는지 탐구하였는데요. 해당 내용에 대해 구체적으로 설명하고 이를 통해 무엇을 배웠는지 말해 주세요.\n세부능력 및 특기사항에 무역 영어 암기를 열심히 했다고 기재되어 있습니다. 무역영어에 노력을 기울인 이유가 있다면 설명해 주세요.\n몸이 불편한 친구를 도와주며 장애인 인권에 대해 관심을 가졌다고 했습니다. 장애인 인권을 신장하기 위한 방안에 대해 설명해 주세요. 또한 이러한 활동은 법학과를 준비하는데 어떻게 도움이 되었다고 생각하나요?\n2학년 정치와 법 시간에 고위험 성범죄자의 거주지 제한에 대한 법안을 분석하여 발표한 적이 있는데요. 발표한 내용에서 학생이 주장한 내용과 그 근거는 무엇이었는지 설명해 주세요.\n2학년 코딩동아리에서 동아리 회장으로 동아리를 운영하고 주도했다고 되어 있는데요. 동아리 회장으로서 가장 중점을 기울인 부분이 있다면 얘기해 주세요. 또 동아리 활동 중 가장 기억에 남는 코딩활동은 무엇이었는지 설명해 주세요."},{"y":2026,"u":"동국대학교","c1":"전공적합성","c2":"인성","q":"국어 비평문 쓰기 활동에서 ‘1984’를 읽은 후 우리 사회의 언어생활로 관심을 확장하여 무분별한 신조어와 줄임말이 우리 사고에 악영향을 미칠 수 있다고 했는데요. 신조어나 줄임말의 성격에 대해 설명 해보고 그것들이 우리 사고에 어떤 악영향을 미칠 수 있는지 본인이 작성한 내용을 소개해 보세요.\n진로활동을 보면 식품공학, 식품위생학, 바이오 식품공학 등에 대한 관심이 기재되어 있는데요. ‘식품공학과’와 ‘식품산업관리학과’의 차이점에 대해 알고 있는 것을 말해보고, ‘식품산업관리학과’에 지원하게 된 이유에 대해 설명해주세요.\n2학년 2학기 학급 반장으로 활동하면서 학우들의 신뢰를 얻었다고 기재되어 있는데요. 어떤 측면에서 신뢰를 얻었다고 생각하는지 학급을 위해 노력했던 사례를 설명해주세요.\n3학년 언어와 매체 시간에 남방불교와 북방불교에 대한 기사를 비교 분석했는데요. 남방불교와 북방불교의 공통점과 차이점을 한 가지씩 설명해주세요. 또한 해당 활동을 통해 배운점이 있다면 얘기해 주세요.\n3학년 출결상황에 미인정 지각이 3번 있었는데요. 어떤 이유였는지 설명해줄 수 있나요? 이러한 상황이 대학 입학 후 학업 수행에 영향을 줄 가능성이 없는지 말씀해 주세요.\n교과학습발달상황을 살펴보면 물리학Ⅰ을 이수하고 물리학Ⅱ는 이수하지 않았습니다. 물리학Ⅰ 세부능력 a lc 특기사항에서는 수업에 적극적으로 참여한 노력이 기재되어 있는데, 물리학Ⅱ를 이수하지 않은 이유가 있다면 설명해 주세요.\n게임이론에 대한 주제로 수학적 개념과 원리를 적용하여 탐구를 진행하고 발표했다고 했는데요. 게임이론이 무엇이고 실생활에서는 어떻게 적용되는 지 예를 들어서 설명해보세요.\n1~3학년 진로활동을 보면 1학년 ."},{"y":2026,"u":"명지대학교","c1":"교과면접","c2":"전통\n건축학\n전공","q":"공동의 목표를 위해 본인이 솔선수범했던 경험은?\n전공관련 동아리 혹은 진로탐색 활동 경험을 이야기해주세요.\n건축가로서 이성과 감성이 모두 중요한데 본인은 어떠한 부분에 강점이 있으며, 약한 부분을 보완하기 위해 어떠한 노력을 했나?\n좋아하는 건축 작품, 건축가, 관련 서적은?\n건축가로서 본인의 어떠한 부분이 강점으로 작용할 수 있을까요?"},{"y":2026,"u":"명지대학교","c1":"명지인재면접","c2":"전통\n건축학\n전공","q":"수행평가로 ○○에 대해 조사했는데, ○○이 무엇인고 왜 필요하다고 생각하는가?\n수업시간에 ‘○○’에 대해 토론했다고 하는데 본인은 찬성과 반대 중에 어떤 입장이었고, 그 근거가 무엇인가요? 그리고 상대편의 입장은 어땠나요?\n수업시간에 ○○ 실험을 했는데 어떤 원리를 활용하였나요?\n○학년 ○학기 학생회장을 하셨습니다. 학생들의 안건을 학교에 효과적으로 전달하는 방법은 무엇이었나요?\n진로활동시간에 ○○관련 발표를 했군요. 발표 준비를 위해 어떤 노력을 했나요? 그 과정에서 어려움은 없었나요?"},{"y":2026,"u":"삼육대학교","c1":"전공적합성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"삼육대학교","c1":"발전가능성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"삼육대학교","c1":"인성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"상명대학교","c1":"학업역량","c2":"전통\n건축학\n전공","q":"이집트 미술을 조사하는 활동을 진행하였는데, 종교적/지리적 특징과 연결지어 소개해 주세요.\n운동 접근성이 떨어질 수 있다는 현실적 문제에 대해 탐구하였는데 일상 속 실천 가능한 방법은 무엇이며, 대중성과 현실 가능성을 둘 다 잡을 수 있는 방법에 대해 이야기 해주세요.\n인공지능과 협업하여 무대 구성 능력을 갖추어야 한다고 했는데 인공지능과 어떤 방식으로 협업이 가능하다고 생각하나요?\nAI기술이 연극에 도입될 경우 발생할 수 있는 윤리적 문제와 예술성 저하에 대한 우려를 표현했는데 어떤 측면에서 윤리적 문제와 예술성 저하가 발생할지 설명해 줄 수 있나요?"},{"y":2026,"u":"상명대학교","c1":"진로역량","c2":"전통\n건축학\n전공","q":"AI시대에서 예술가의 역할이 어떻게 변화되며, 이를 바탕으로 앞으로의 진로계획에 대하여 이야기 해주세요.\n동아리에서 미술, 캘리그라프 관련 활동을 했는데 서양화가 아닌 만화/애니메이션으로의 진로를 희망하는 이유는 무엇입니까?\n스포츠마케터를 희망한다고 되어 있는데 스포츠마케터가 되기 위해 필요한 역량은 무엇이라고 생각합니까?"},{"y":2026,"u":"상명대학교","c1":"공동체역량","c2":"전통\n건축학\n전공","q":"학교생활에서 선생님 또는 친구들이 본인을 어떤 사람이라고 이야기하나요?\n영화제작 동아리 부기장으로 문제해결력과 통솔력을 발휘했다고 하는데, 구체적으로 설명해줄 수 있을까요?\n봉사활동의 물리적 시간이 높은데 이러한 활동이 본인에게 어떤 부분을 향상시켜줬는지 궁금합니다."},{"y":2026,"u":"서경대학교","c1":"희생정신","c2":"전통\n건축학\n전공","q":"학교의 큰 행사를 위해 시험기간에 임박하여 반장이 동참을 요구했다. 어떻게 할 것이며, 그 이유는?"},{"y":2026,"u":"서경대학교","c1":"리더십","c2":"전통\n건축학\n전공","q":"소대원 중 지시를 불이행하는 인원이 있을 경우 어떻게 할 것인가?"},{"y":2026,"u":"서경대학교","c1":"국가관/안보관","c2":"전통\n건축학\n전공","q":"해외 유학 중 북한이 침략을 하여 전쟁이 발생하였다. 어떻게 할 것인가?"},{"y":2026,"u":"서경대학교","c1":"지원동기","c2":"전통\n건축학\n전공","q":"- 자신의 성격이나 적성 등의 어떤 면이 장교의 길을 택하고자 하였는지 말해 보시오."},{"y":2026,"u":"서경대학교","c1":"성장 환경","c2":"전통\n건축학\n전공","q":"자신이 가장 싫어하는 사람과 좋아하는 사람의 유형은 무엇인가?"},{"y":2026,"u":"서울과학기술대학교","c1":"학업역량","c2":"전통\n건축학\n전공","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"서울과학기술대학교","c1":"진로역량","c2":"전통\n건축학\n전공","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"서울과학기술대학교","c1":"공동체역량","c2":"전통\n건축학\n전공","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"서울대학교","c1":"일반전형","c2":"전통\n건축학\n전공","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"서울대학교","c1":"지역균형","c2":"전통\n건축학\n전공","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"서울시립대학교","c1":"학업역량","c2":"전통\n건축학\n전공","q":"국제평화주의를 탐구하며 UN 상임이사국들의 권력집중 문제로 국제 분쟁이 해결되지 않는다고 주장했는데, 국제평화주의가 무엇인지 정의하고 UN 상임이사국들의 권력이 어떻게 집중되어 있으며 해당 구조는 왜 분쟁 해소에 실패하는 구조인지 설명해보세요.\n생명공학기술 탐구 시간에 효소면역측정법의 개념과 특징을 설명했으며, 특히 효소면역측정법의 다양한 종류를 직접 그림으로 그려 표현했다고 하는데, 실제 그림으로 표현하며 개념과 특징을 설명해보세요. 또한, 효소면역측정법의 장접과 단점에 대해 설명하고 단점을 개선할 방법을 설명해보세요.\n“철학이란 헛소리 향연” 이라는 제목으로 북석철학에 관한 정보를 전달하는 글을 작성했는데, 분석철학에 대해 설명하고 분석철학의 관점에서 철학이 왜 헛소리인지 말해보세요.\n염료 감응형 태양전지에 대해 흥미를 가지고 팀을 구성하여 실험을 해본 것으로 기재되어 있는데, 염료감응형 태양전지가 무엇인지 설명하고 작동 원리와 활용법을 말해보세요. 블루베리와 시금치에서 추출한 천연 염료를 사용해 전지를 제작하고, 염료의 빛 흡수 효율을 비교했다고 하는데, 해당 재료를 선정하고 해당 효율을 비교한 이유와 결과를 말해보세요.\n복지의 지방분권화가 아동복지에 전반적으로 부정적인 영향이 될 수 있다는 연구결과를 접한 뒤 복지의 지방분권화에 대한 한계와 극복 방안을 알아보고자 탐구했다고 하는데, 복지의 지방분권화는 어떠한 현상이고 해당 현상이 아동복지에 어떤 식으로 부정적인 영향을 미치나요? 이를 어떻게 개선할 수 있을까요?\n양자 혼돈 이론에 대해 배우며, 무작위 행렬의 고유값 분포와 리만 제타 함수의 비자명근 사이에서의 통계적 유사성을 통해 다양한 가능성을 확인했다고 하는데, 무작위 행렬의 고유값 분포와 리만 제타 함수의 비자명근 사이에서의 통계적 유사성을 어떻게 확인했나요? 수학적 분석이나 통계적 접근방법은 어떤 식으로 적용해 확인했나요?"},{"y":2026,"u":"서울시립대학교","c1":"잠재역량","c2":"전통\n건축학\n전공","q":"국제평화주의를 탐구하며 UN 상임이사국들의 권력집중 문제로 국제 분쟁이 해결되지 않는다고 주장했는데, 국제평화주의가 무엇인지 정의하고 UN 상임이사국들의 권력이 어떻게 집중되어 있으며 해당 구조는 왜 분쟁 해소에 실패하는 구조인지 설명해보세요.\n생명공학기술 탐구 시간에 효소면역측정법의 개념과 특징을 설명했으며,  활용한 하수 처리에 대해서 공부하였는데, 이에 관하여 설명해 보세요.\n통합사회 시간에 문화상대주의가 경계해야 할 점과 보편 윤리의 중요성에 대해 고민하였는데, 이를 소개해보세요."},{"y":2026,"u":"성신여자대학교","c1":"일반학과","c2":"학업역량","q":"우리 학과는 공과대학기반이므로 물리에 대해 기초기식도 필요합니다. 편제표를 살펴보면 물리학 Ⅰ/Ⅱ를 선택하지 않았는데, 입학 후 어떻게 극복할 계획인가요?\n수학Ⅱ에서 경사하강법에 대해 조사한 경험이 있는데, 경사하강법이란 무엇인가요?\n한국고전문학 관련하여 칼럼을 제작한 것이 인상적인데, 탐독하였던 숙향전의 경우 주인공의 어떤 점이 영웅적 면모로 느껴졌는지 말해보세요.\n진로탐구활동에서 조사했던 RNA와 DNA의 구조적 차이에 대해 설명하시오."},{"y":2026,"u":"세종대학교","c1":"세종창의인재 (면접형)","c2":"창의\n소프트\n학부","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"세종대학교","c1":"세종창의인재 (면접형)","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"숙명여자대학교","c1":"진로역량","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"숙명여자대학교","c1":"탐구역량","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"숙명여자대학교","c1":"공동체의식과 협업능력","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2026,"u":"숭실대학교","c1":"전공적합성","c2":"인문·자연, 국방\n시스템\n공학과","q":"○○활동이 가장 활발해 보이는데, 이 활동은 무엇인가요?\n전반적인 성적보다 ○○교과 성적이 좋은데(혹은 나쁜데) 이유가 있나요?\n지원 전공 분야에 대해 알고 있는 현재 이슈가 있는지 특히 관심있는 분야는 무엇인가요\n분야가 유망하다고 생각하는 이유를 말해보세요 의 활용사례에 대해 말해보세요.\n학업계획에 ○○가 꿈이라고 했는데 관심 갖게 된 동기가 무엇인가요?\n○○라는 진로를 결정하게 된 결정적인 활동을 구체적으로 설명해 보세요\n본인이 이 학과와 잘 맞는다고 생각하는 강점과 그 이유를 설명해 보세요\n숭실대학교 학과에 지원한 동기를 이야기해 보세요."},{"y":2026,"u":"숭실대학교","c1":"인성, 잠재력","c2":"인문·자연, 국방\n시스템\n공학과","q":"○○활동이 가장 활발해 보이는데, 이 활동은 무엇인가요?\n전반적인 성적보다 ○○교과 성적이 좋은데(혹은 나쁜데) 이유가 있나요?\n지원 전공 분야에 대해 알고 있는 현재 이슈가 있는지 특히 관심있는 분야는 무엇인가요\n분야가 유망하다고 생각하는 이유를 말해보세요 의 활용사례에 대해 말해보세요.\n학업계획에 ○○가 꿈이라고 했는데 관심 갖게 된 동기가 무엇인가요?\n○○라는 진로를 결정하게 된 결정적인 활동을 구체적으로 설명해 보세요\n본인이 이 학과와 잘 맞는다고 생각하는 강점과 그 이유를 설명해 보세요\n숭실대학교 학과에 지원한 동기를 이야기해 보세요."},{"y":2026,"u":"연세대학교(서울)","c1":"논리적 사고력 및 의사소통 능력","c2":"인문·자연, 국방\n시스템\n공학과","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"이화여자대학교","c1":"미래인재전형\n(면접형)","c2":"학업역량","q":"학생부에 기재된 ○○과목 세특을 보면 깊이 있는 탐구활동이 있었던 것 같습니다. 이 활동을 통해 무엇을 배우고 느꼈는지 설명해 주세요.\n교과 외 활동(탐구활동, 독서 등) 중 학업과 연계하여 도움이 되 치에 대해 알고 있나요?\n(신학과)본인이 가장 좋아하는 일(관심사, 취미 등)은 무엇인가요? 그것이 자신의 꿈이나 선교적 비전과 어떤 연결점을 갖나요?\n(신학과) 한국이나 외국 역사에서 가장 존경하는 인물은 누구이며, 그 이유는 무엇인가요?\n(신학과) 학교 공부를 진행하는 중에 갑자기 진로를 변경하고 싶은 마음이 생긴다면 어떻게 하시겠어요?\n(G2빅데이터경영학과) 자신의 장점이나 특기는 무엇인가요? 강서대학교 인재상과 연결해서 설명해 보세요.\n(G2빅데이터경영학과) G2빅데이터경영학과에 지원한 동기는 무엇인가요?\n(G2빅데이터경영학과) 교수님께서 내주신 과제를 수행하는 과정에서, 동료가 생성형 AI(챗 GPT)의 결과물을 그대로 복사하여 제출한 사실을 알게 되었다면 어떻게 할 것인가요?\n(G2빅데이터경영학과) 살면서 힘들었지만 성공적으로 해결했던 일에 대해 설명해 보세요.\n(사회복지학과) 10년 후 나는 어떤 능력과 역량을 갖춘 인재가 되어 있을까요?\n(사회복지학과) 자신이 관심을 가지고 있는 우리나라 사회문제는 무엇인가요? 이 문제를 해결할 수 있는 방법이 무엇이 있을까요?\n(사회복지학과) 자신이 누군가의 도움이 되었던 경험을 이야기하고, 왜 도와주어야 한다고 생각했는지 말해 보세요.\n(사회복지학과) 고등학교 재학 기간 중 경험한 일 중에서 도전적인 목표를 정하고 노력해서 성취한 일이 있다면 말해 보세요.\n(상담심리학과) 강서대학교를 선택한 이유는 무엇인가요?\n(상담심리학과) 상담심리학 전공 관련 독서 경험이 있나요? 그 책의 내용에 대해 간단히 설명해주세요.\n(상담심리학과) 자신이 가장 중요하게 여기는 삶의 가치는 무엇인가요?\n(상담심리학과) 상담심리학과에서 공부하고 싶은 분야는 무엇인가요?\n(간호학과) 글로벌 소양을 갖추기 위해 재학 중 외국어 공부나 다문화 경험을 쌓아본 적이 있나요? 그러한 경험을 통해 무엇을 얻었나요?\n(간호학과) 생명 존중의 중요성을 실감했던 경험이 있다면 소개해 주세요. 그 경험이 간호학과를 지원하는 데 어떤 영향을 주었나요?\n(간호학과) 환자와의 공감 능력은 간호사에게 필수적입니다. 본인의 공감 능력을 보여준 경험이 있다면 이야기해 주세요.\n(간호학과) 간호학 공부가 쉽지 않다는 말을 들었을 때, 어떻게 대처할 계획인가요?\n(식품영양학과) 자기소개를 해보세요.\n(식품영양학과) 인공지능에 의한 식단작성이 가능한 시대가 온다면, 이 시기 영양사의 역할이 무엇이라고 생각하나요?\n(식품영양학과) 자신의 장/단점에 대해 말해 보세요.\n(식품영양학과) 자신이 가장 취약한 교과목은 무엇이며 성적향상을 위해 어떤 노력을 하였나요?"},{"y":2026,"u":"강서대(케이씨대)","c1":"지원한 전공 관심도","c2":"인성","q":"(신학과) 우리 대학이 추구하는 기독교적 가치에 대해 알고 있나요?\n(신학과)본인이 가장 좋아하는 일(관심사, 취미 등)은 무엇인가요? 그것이 자신의 꿈이나 선교적 비전과 어떤 연결점을 갖나요?\n(신학과) 한국이나 외국 역사에서 가장 존경하는 인물은 누구이며, 그 이유는 무엇인가요?\n(신학과) 학교 공부를 진행하는 중에 갑자기 진로를 변경하고 싶은 마음이 생긴다면 어떻게 하시겠어요?\n(G2빅데이터경영학과) 자신의 장점이나 특기는 무엇인가요? 강서대학교 인재상과 연결해서 설명해 보세요.\n(G2빅데이터경영학과) G2빅데이터경영학과에 지원한 동기는 무엇인가요?\n(G2빅데이터경영학과) 교수님께서 내주신 과제를 수행하는 과정에서, 동료가 생성형 AI(챗 GPT)의 결과물을 그대로 복사하여 제출한 사실을 알게 되었다면 어떻게 할 것인가요?\n(G2빅데이터경영학과) 살면서 힘들었지만 성공적으로 해결했던 일에 대해 설명해 보세요.\n(사회복지학과) 10년 후 나는 어떤 능력과 역량을 갖춘 인재가 되어 있을까요?\n(사회복지학과) 자신이 관심을 가지고 있는 우리나라 사회문제는 무엇인가요? 이 문제를 해결할 수 있는 방법이 무엇이 있을까요?\n(사회복지학과) 자신이 누군가의 도움이 되었던 경험을 이야기하고, 왜 도와주어야 한다고 고서 참고"},{"y":2026,"u":"한양대학교(서울)","c1":"학생부\n종합\n(면접형)\n-공과대학, 한양\n인터\n칼리지\n학부\n(자연)","c2":"논리적\n사고력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"한양대학교(서울)","c1":"학생부\n종합\n(면접형)\n-공과대학, 한양\n인터\n칼리지\n학부\n(자연)","c2":"의사소통\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"홍익대학교(서울)","c1":"제출서류의 진실성","c2":"의사소통\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"홍익대학교(서울)","c1":"미술관련 소양","c2":"의사소통\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"홍익대학교(서울)","c1":"창의성","c2":"의사소통\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"홍익대학교(서울)","c1":"표현능력","c2":"의사소통\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2026,"u":"인천대학교","c1":"진로역량","c2":"의사소통\n능력","q":"학교생활기록부 출결사항 내 질병 결석/지각/조퇴가 다수 확인됩니다. 이에 대해 설명해 주세요.\n재학생 대상으로 진행한 금융 관련 설문조사에 대해 자세히 이야기해 주세요.\n지수함수를 활용하여 상권마케팅을 분석하였다고 하는데 어떠한 내용이었고 어떤 결과가 나왔는지 말해주세요.\n봉사활동 중 학급진로활동 안내 및 프로그램 운영지원은 어떤 내용이었나요?\n학습자 친화적인 쉽고 재미있는 수업을 구상하였다고 했는데 구체적으로 어떤 것이었나요?\n2학년 윤리와사상 교과에서 학습한 내용 중 학교가 제 기능을 다시 발휘하기 위해서 필요한 것은 무엇이라고 생각하나요?\n3학년 학급회장으로 학급을 운영하며 기억에 남는 일이나 어려웠던 점이 있나요?\n‘봉준호 영화의 장르연구(김경욱)'를 읽고 학급특색사업 <3분 스피치>에서 발표한 경험이 있습니다. 발표 내용에 대해 구체적으로 말해보세요. 전교생을 대상으로 실시한 한국경제에 대한 설문조사 활동을 한 이유는 무엇인가요? 설문결과는?\n1학년 밴드부 활동을 진행하며 어려웠던 점은 없었나요? 연습을 하며 가장 기억에 남는 일이 있나요?\n(세계사) 미국의 보호무역정책이 한국 경제에 어떤 영향을 주고 있다고 생각하나요?\n영어교과에 성취도가 미흡한 편인데, 영어교과 성취도 향상을 위해 어떤 노력을 했나요?\n미디어와 관련된 활동과 관심이 다수 확인되는데 미디어커뮤니케이션학과가 아닌 불어불문학과를 지원한 이유는 무엇인가요?\n(1학년 진로) 요즘 청년들이 능력주의 사고를 하면서도, 비능력주의 요소가 더 중요하게 영향을 준다고 생각하는 것이 모순이라고 하였는데, 구체적으로 무슨 내용인가요?\n프로젝트형 봉사활동은 무엇인가요? 어떤 활동인지 설명해 주세요. 3학년 과목에서 '허위 회계 처리의 고의성과 위법성을 분석' 하였는데, 구체적으로 어떤 방식의 고의성을 통하여 위반하였었는지 기억이 나는 대로 설명해 주세요. 세무회계분야로의 진로를 희망하는 구체적 이유는 무엇인가요?\n금융, 경제 분야에 구체적으로 어느 방면으로의 진로를 계획하고 있나요?\n미국의 이민정책이 미국 국내와 국제사회에 미치는 영향력은 무엇이라고 생각하나요?\n청소년들의 정치의식을 조사하는 활동을 하였는데, 이에 대한 결과를 설명해 주세요. 희망 직업인 교육기획자와 관련지어 자기 능력을 탐색한 부분을 여기서 간단히 소개해 주세요\n학급 친구들에게 ESG 경영의 의미와 중요성, 기업의 사회적 책무에 대한 알찬 정보를 제공했다고 하는데 그 내용에 대해 간단히 설명해 보세요\n행정에 대한 관심이 높은 것으로 나오는데 창의인재개발학과 진학을 통해 어떤 부분이 자신의 진로 개발에 도움이 될 것이라고 생각하나요?\n재활 또는 물리치료 진로에 대한 관심이 많았으나, 2학년부터 군인 또는 체육교사로 진로가 변경된 것 같습니다. 계기는 무엇인가요? 그러한 진로를 희망하면서 운동건강학부에 지원하게 된 이유는 무엇인지 궁금합니다.\n가장 효과적인 미디어 마케팅 방법'을 주제로 직접 본 학교 학생들을 대상으로 했던 설문조사 활동에 대해 구체적으로 설명하고, 설문 결과에 대해 이야기해 주세요.\n기계공학 전공에 지원하게 된 계기와 본인의 강점은 무엇인가요?\n2학년 때 지각이 미인정된 이유에 대해 말씀해 주세요.\n과학영재 동아리 활동을 통해 '전산유체역학'을 주제로 전산 해석 프로그램을 활용하여 혼합 티 구조의 유동을 분석한 내용에 대해 구체적으로 설명해 주세요.\n(2학년 수학2) 적분을 활용하여 구조물에 작용하는 풍하중을 계산한 방법을 자세히 설명해 보세요.\n(생명과학II) 줄기세포의 자가복제와 분화능력에 대해 간단히 소개하고, 유도만능줄기세포에 대해 아는 대로 설명해 주세요.\n평소에 좋아하는 운동이 있나요? 있다면 팀 운동을 좋아하는지 개인 운동을 좋아하는지 이유를 들어 말해보세요.\n다른 과목에 비해 과학 과목 성적이 아쉬운 편인데 본인은 어떻게 분석하고 있나요?\n바이오, 로봇 중에서 관심있는 분야와 왜 그 분야에 대해 관심을 가지게 되었는지 설명해 주세요.\n(진로활동 3학년) \"Vpython으로 탐구하는 학문 융합 시뮬레이터 창작 프로젝트에 대해 설명해 주세요\n기계공학과에 관심이 많다고 기록되어 있는데 바이오-로봇시스템공학과에 지원한 이유는 무엇인가요?\n모듈러 건축이 학교, 군사시설, 회사까지 확장되고 있음을 실제 사례를 통해 파악하였는데, 여기에서 모듈러 건축의 장점은 무엇인가요?\n진로와 관련하여 ‘건설용 3D프린팅 기술’에 대한 기사를 읽고 발표하였는데, 미래에 이 기술이 활성화된다면, 어떠한 변화가 예상될까요?\n활동 내용에서 공학이나 응용에 관심이 많아 보이는데, 특히 어떤 분야에 관심이 있나요?\n프로그래밍에 관심이 많은데, 이를 어떻게 본인 관심 분야인 천문학에 이용할 수 있을지 말해보세요.\n슈뢰딩거 방정식을 친구들에게 소개했다고 했는데, 간단하게 설명해 줄 수 있나요?\n(3학년 동아리활동) 직접 미세플라스틱을 제조하여 끓인물, 간이정수기, 누에고치, 커피찌꺼기, 계란 흰자에 각각 통과시켜 결과를 확인했다고 하였는데, 어떻게 미세플라스틱을 제조하였나요?\n3학년 진로활동에서 수질정화를 위해 중금속 흡착에 대한 등 온흡착모델 선형회귀분석을 했는데 이때 단일+다층 흡착제로서의 가능성을 확인했을 때 단일 층과 다층이 어떤 차이점이 있었는지 간략하게 설명해 보세요.\n3학년 동아리 활동에서 양파 껍질과 커피 찌꺼기를 활용해 친환경 바이오흡착제를 제작하였는데 제작과정에 대해서 간략하게 설명해 주세요. 한계와 개선점은 어떻게 되었나요?\n미생물을 활용한 토양정화에 관한 탐구를 진행하였는데 이때 사용한 미생물은 어떤 종류인가요? 그 미생물을 선택한 이유가 있나요?\n미래에 바이오 조직 공학자가 되고 싶다고 하였는데, 미적분 교과목에서 수행한 3D 프린팅으로 설계한 인공장기 관련 탐구내용을 간단히 기술해 주세요.\n3학년 때 진로활동으로 GAN을 학습시켜 생태계 시뮬레이션을 생성하였다고 하였는데, 더 자세히 설명해 주세요.\n3학년 자율활동으로 \"10대 바이오 미래 유망 기술\"을 자료 조사하였는데, 그 중 바이오 센서 기술에 대해 조사한 내용을 설명해 주세요.\n2학년 생명과학 교과목에서 파킨슨 병의 원인과 증상을 탐구하였는데, 파킨슨 병의 원인과 치료 방안에 대해서 설명해 주세요.\n(3-1 물리2) 트랜지스터의 구조와 작동 원리를 설명해 보세요.\n'반도체 내의 전하와 전류의 관계에 대한 분석'을 주제로 작성한 보고서에 대해 간단히 소개해 보세요.\n반도체에는 원자가 전자가 3개 또는 5개인 원자만 공유결합 될 수 있는지에 대한 의문을 갖고 탐구한 내용을 소개해 보세요.\n(3학년 자율활동) ‘죽은 경제학자들의 만찬’이라는 도서를 읽고 가장 인상 깊었던 것은 무엇인가요?\n학급 부회장으로서 가장 기억에 남는 학급 활동은 무엇이었나요?\n(2학년 진로활동) 친환경 도시의 장·단점에 대해 설명해 보세요\n(3학년 진로활동) 도시의 구조적 특징과 열섬현상과의 상관관계를 설명해 보세요\n3년간 미디어와 디지털콘텐츠 제작에 대해 깊은 관심이 확인됩니다. 지원자는 어떤 콘텐츠 기획자가 되고 싶나요? 구체적으로 말씀해 주세요."},{"y":2026,"u":"인천대학교","c1":"발전역량","c2":"의사소통\n능력","q":"학교생활기록부 출결사항 내 질병 결석/지각/조퇴가 다수 확인됩니다. 이에 대해 설명해 주세요.\n재학생 대상으로 진행한 금융 관련 설문조사에 대해 자세히 이야기해 주세요.\n지수함수를 활용하여 상권마케팅을 분석하였다고 하는데 어떠한 내용이었고 어떤 결과가 나왔는지 말해주세요.\n봉사활동 중 학급진로활동 안내 및 프로그램 운영지원은 어떤 내용이었나요?\n학습자 친화적인 쉽고 재미있는 수업을 구상하였다고 했는데 구체적으로 어떤 것이었나요?\n2학년 윤리와사상 교과에서 학습한 내용 중 학교가 제 기능을 다시 발휘하기 위해서 필요한 것은 무엇이라고 생각하나요?\n3학년 학급회장으로 학급을 운영하며 기억에 남는 일이나 어려웠던 점이 있나요?\n‘봉준호 영화의 장르연구(김경욱)'를 읽고 학급특색사업 <3분 스피치>에서 발표한 경험이 있습니다. 발표 내용에 대해 구체적으로 말해보세요. 전교생을 대상으로 실시한 한국경제에 대한 설문조사 활동을 한 이유는 무엇인가요? 설문결과는?\n1학년 밴드부 활동을 진행하며 어려웠던 점은 없었나요? 연습을 하며 가장 기억에 남는 일이 있나요?\n(세계사) 미국의 보호무역정책이 한국 경제에 어떤 영향을 주고 있다고 생각하나요?\n영어교과에 성취도가 미흡한 편인데, 영어교과 성취도 향상을 위해 어떤 노력을 했나요?\n미디어와 관련된 활동과 관심이 다수 확인되는데 미디어커뮤니케이션학과가 아닌 불어불문학과를 지원한 이유는 무엇인가요?\n(1학년 진로) 요즘 청년들이 능력주의 사고를 하면서도, 비능력주의 요소가 더 중요하게 영향을 준다고 생각하는 것이 모순이라고 하였는데, 구체적으로 무슨 내용인가요?\n프로젝트형 봉사활동은 무엇인가요? 어떤 활동인지 설명해 주세요. 3학년 과목에서 '허위 회계 처리의 고의성과 위법성을 분석' 하였는데, 구체적으로 어떤 방식의 고의성을 통하여 위반하였었는지 기억이 나는 대로 설명해 주세요. 세무회계분야로의 진로를 희망하는 구체적 이유는 무엇인가요?\n금융, 경제 분야에 구체적으로 어느 방면으로의 진로를 계획하고 있나요?\n미국의 이민정책이 미국 국내와 국제사회에 미치는 영향력은 무엇이라고 생각하나요?\n청소년들의 정치의식을 조사하는 활동을 하였는데, 이에 대한 결과를 설명해 주세요. 희망 직업인 교육기획자와 관련지어 자기 능력을 탐색한 부분을 여기서 간단히 소개해 주세요\n학급 친구들에게 ESG 경영의 의미와 중요성, 기업의 사회적 책무에 대한 알찬 정보를 제공했다고 하는데 그 내용에 대해 간단히 설명해 보세요\n행정에 대한 관심이 높은 것으로 나오는데 창의인재개발학과 진학을 통해 어떤 부분이 자신의 진로 개발에 도움이 될 것이라고 생각하나요?\n재활 또는 물리치료 진로에 대한 관심이 많았으나, 2학년부터 군인 또는 체육교사로 진로가 변경된 것 같습니다. 계기는 무엇인가요? 그러한 진로를 희망하면서 운동건강학부에 지원하게 된 이유는 무엇인지 궁금합니다.\n가장 효과적인 미디어 마케팅 방법'을 주제로 직접 본 학교 학생들을 대상으로 했던 설문조사 활동에 대해 구체적으로 설명하고, 설문 결과에 대해 이야기해 주세요.\n기계공학 전공에 지원하게 된 계기와 본인의 강점은 무엇인가요?\n2학년 때 지각이 미인정된 이유에 대해 말씀해 주세요.\n과학영재 동아리 활동을 통해 '전산유체역학'을 주제로 전산 해석 프로그램을 활용하여 혼합 티 구조의 유동을 분석한 내용에 대해 구체적으로 설명해 주세요.\n(2학년 수학2) 적분을 활용하여 구조물에 작용하는 풍하중을 계산한 방법을 자세히 설명해 보세요.\n(생명과학II) 줄기세포의 자가복제와 분화능력에 대해 간단히 소개하고, 유도만능줄기세포에 대해 아는 대로 설명해 주세요.\n평소에 좋아하는 운동이 있나요? 있다면 팀 운동을 좋아하는지 개인 운동을 좋아하는지 이유를 들어 말해보세요.\n다른 과목에 비해 과학 과목 성적이 아쉬운 편인데 본인은 어떻게 분석하고 있나요?\n바이오, 로봇 중에서 관심있는 분야와 왜 그 분야에 대해 관심을 가지게 되었는지 설명해 주세요.\n(진로활동 3학년) \"Vpython으로 탐구하는 학문 융합 시뮬레이터 창작 프로젝트에 대해 설명해 주세요\n기계공학과에 관심이 많다고 기록되어 있는데 바이오-로봇시스템공학과에 지원한 이유는 무엇인가요?\n모듈러 건축이 학교, 군사시설, 회사까지 확장되고 있음을 실제 사례를 통해 파악하였는데, 여기에서 모듈러 건축의 장점은 무엇인가요?\n진로와 관련하여 ‘건설용 3D프린팅 기술’에 대한 기사를 읽고 발표하였는데, 미래에 이 기술이 활성화된다면, 어떠한 변화가 예상될까요?\n활동 내용에서 공학이나 응용에 관심이 많아 보이는데, 특히 어떤 분야에 관심이 있나요?\n프로그래밍에 관심이 많은데, 이를 어떻게 본인 관심 분야인 천문학에 이용할 수 있을지 말해보세요.\n슈뢰딩거 방정식을 친구들에게 소개했다고 했는데, 간단하게 설명해 줄 수 있나요?\n(3학년 동아리활동) 직접 미세플라스틱을 제조하여 끓인물, 간이정수기, 누에고치, 커피찌꺼기, 계란 흰자에 각각 통과시켜 결과를 확인했다고 하였는데, 어떻게 미세플라스틱을 제조하였나요?\n3학년 진로활동에서 수질정화를 위해 중금속 흡착에 대한 등 온흡착모델 선형회귀분석을 했는데 이때 단일+다층 흡착제로서의 가능성을 확인했을 때 단일 층과 다층이 어떤 차이점이 있었는지 간략하게 설명해 보세요.\n3학년 동아리 활동에서 양파 껍질과 커피 찌꺼기를 활용해 친환경 바이오흡착제를 제작하였는데 제작과정에 대해서 간략하게 설명해 주세요. 한계와 개선점은 어떻게 되었나요?\n미생물을 활용한 토양정화에 관한 탐구를 진행하였는데 이때 사용한 미생물은 어떤 종류인가요? 그 미생물을 선택한 이유가 있나요?\n미래에 바이오 조직 공학자가 되고 싶다고 하였는데, 미적분 교과목에서 수행한 3D 프린팅으로 설계한 인공장기 관련 탐구내용을 간단히 기술해 주세요.\n3학년 때 진로활동으로 GAN을 학습시켜 생태계 시뮬레이션을 생성하였다고 하였는데, 더 자세히 설명해 주세요.\n3학년 자율활동으로 \"10대 바이오 미래 유망 기술\"을 자료 조사하였는데, 그 중 바이오 센서 기술에 대해 조사한 내용을 설명해 주세요.\n2학년 생명과학 교과목에서 파킨슨 병의 원인과 증상을 탐구하였는데, 파킨슨 병의 원인과 치료 방안에 대해서 설명해 주세요.\n(3-1 물리2) 트랜지스터의 구조와 작동 원리를 설명해 보세요.\n'반도체 내의 전하와 전류의 관계에 대한 분석'을 주제로 작성한 보고서에 대해 간단히 소개해 보세요.\n반도체에는 원자가 전자가 3개 또는 5개인 원자만 공유결합 될 수 있는지에 대한 의문을 갖고 탐구한 내용을 소개해 보세요.\n(3학년 자율활동) ‘죽은 경제학자들의 만찬’이라는 도서를 읽고 가장 인상 깊었던 것은 무엇인가요?\n학급 부회장으로서 가장 기억에 남는 학급 활동은 무엇이었나요?\n(2학년 진로활동) 친환경 도시의 장·단점에 대해 설명해 보세요\n(3학년 진로활동) 도시의 구조적 특징과 열섬현상과의 상관관계를 설명해 보세요\n3년간 미디어와 디지털콘텐츠 제작에 대해 깊은 관심이 확인됩니다. 지원자는 어떤 콘텐츠 기획자가 되고 싶나요? 구체적으로 말씀해 주세요."},{"y":2026,"u":"인천대학교","c1":"공동체역량","c2":"의사소통\n능력","q":"학교생활기록부 출결사항 내 질병 결석/지각/조퇴가 다수 확인됩니다. 이에 대해 설명해 주세요.\n재학생 대상으로 진행한 금융 관련 설문조사에 대해 자세히 이야기해 주세요.\n지수함수를 활용하여 상권마케팅을 분석하였다고 하는데 어떠한 내용이었고 어떤 결과가 나왔는지 말해주세요.\n봉사활동 중 학급진로활동 안내 및 프로그램 운영지원은 어떤 내용이었나요?\n학습자 친화적인 쉽고 재미있는 수업을 구상하였다고 했는데 구체적으로 어 이유는 무엇인가요?\n(1학년 진로) 요즘 청년들이 능력주의 사고를 하면서도, 비능력주의 요소가 더 중요하게 영향을 준다고 생각하는 것이 모순이라고 하였는데, 구체적으로 무슨 내용인가요?\n프로젝트형 봉사활동은 무엇인가요? 어떤 활동인지 설명해 주세요. 3학년 과목에서 '허위 회계 처리의 고의성과 위법성을 분석' 하였는데, 구체적으로 어떤 방식의 고의성을 통하여 위반하였었는지 기억이 나는 대로 설명해 주세요. 세무회계분야로의 진로를 희망하는 구체적 이유는 무엇인가요?\n금융, 경제 분야에 구체적으로 어느 방면으로의 진로를 계획하고 있나요?\n미국의 이민정책이 미국 국내와 국제사회에 미치는 영향력은 무엇이라고 생각하나요?\n청소년들의 정치의식을 조사하는 활동을 하였는데, 이에 대한 결과를 설명해 주세요. 희망 직업인 교육기획자와 관련지어 자기 능력을 탐색한 부분을 여기서 간단히 소개해 주세요\n학급 친구들에게 ESG 경영의 의미와 중요성, 기업의 사회적 책무에 대한 알찬 정보를 제공했다고 하는데 그 내용에 대해 간단히 설명해 보세요\n행정에 대한 관심이 높은 것으로 나오는데 창의인재개발학과 진학을 통해 어떤 부분이 자신의 진로 개발에 도움이 될 것이라고 생각하나요?\n재활 또는 물리치료 진로에 대한 관심이 많았으나, 2학년부터 군인 또는 체육교사로 진로가 변경된 것 같습니다. 계기는 무엇인가요? 그러한 진로를 희망하면서 운동건강학부에 지원하게 된 이유는 무엇인지 궁금합니다.\n가장 효과적인 미디어 마케팅 방법'을 주제로 직접 본 학교 학생들을 대상으로 했던 설문조사 활동에 대해 구체적으로 설명하고, 설문 결과에 대해 이야기해 주세요.\n기계공학 전공에 지원하게 된 계기와 본인의 강점은 무엇인가요?\n2학년 때 지각이 미인정된 이유에 대해 말씀해 주세요.\n과학영재 동아리 활동을 통해 '전산유체역학'을 주제로 전산 해석 프로그램을 활용하여 혼합 티 구조의 유동을 분석한 내용에 대해 구체적으로 설명해 주세요.\n(2학년 수학2) 적분을 활용하여 구조물에 작용하는 풍하중을 계산한 방법을 자세히 설명해 보세요.\n(생명과학II) 줄기세포의 자가복제와 분화능력에 대해 간단히 소개하고, 유도만능줄기세포에 대해 아는 대로 설명해 주세요.\n평소에 좋아하는 운동이 있나요? 있다면 팀 운동을 좋아하는지 개인 운동을 좋아하는지 이유를 들어 말해보세요.\n다른 과목에 비해 과학 과목 성적이 아쉬운 편인데 본인은 어떻게 분석하고 있나요?\n바이오, 로봇 중에서 관심있는 분야와 왜 그 분야에 대해 관심을 가지게 되었는지 설명해 주세요.\n(진로활동 3학년) \"Vpython으로 탐구하는 학문 융합 시뮬레이터 창작 프로젝트에 대해 설명해 주세요\n기계공학과에 관심이 많다고 기록되어 있는데 바이오-로봇시스템공학과에 지원한 이유는 무엇인가요?\n모듈러 건축이 학교, 군사시설, 회사까지 확장되고 있음을 실제 사례를 통해 파악하였는데, 여기에서 모듈러 건축의 장점은 무엇인가요?\n진로와 관련하여 ‘건설용 3D프린팅 기술’에 대한 기사를 읽고 발표하였는데, 미래에 이 기술이 활성화된다면, 어떠한 변화가 예상될까요?\n활동 내용에서 공학이나 응용에 관심이 많아 보이는데, 특히 어떤 분야에 관심이 있나요?\n프로그래밍에 관심이 많은데, 이를 어떻게 본인 관심 분야인 천문학에 이용할 수 있을지 말해보세요.\n슈뢰딩거 방정식을 친구들에게 소개했다고 했는데, 간단하게 설명해 줄 수 있나요?\n(3학년 동아리활동) 직접 미세플라스틱을 제조하여 끓인물, 간이정수기, 누에고치, 커피찌꺼기, 계란 흰자에 각각 통과시켜 결과를 확인했다고 하였는데, 어떻게 미세플라스틱을 제조하였나요?\n3학년 진로활동에서 수질정화를 위해 중금속 흡착에 대한 등 온흡착모델 선형회귀분석을 했는데 이때 단일+다층 흡착제로서의 가능성을 확인했을 때 단일 층과 다층이 어떤 차이점이 있었는지 간략하게 설명해 보세요.\n3학년 동아리 활동에서 양파 껍질과 커피 찌꺼기를 활용해 친환경 바이오흡착제를 제작하였는데 제작과정에 대해서 간략하게 설명해 주세요. 한계와 개선점은 어떻게 되었나요?\n미생물을 활용한 토양정화에 관한 탐구를 진행하였는데 이때 사용한 미생물은 어떤 종류인가요? 그 미생물을 선택한 이유가 있나요?\n미래에 바이오 조직 공학자가 되고 싶다고 하였는데, 미적분 교과목에서 수행한 3D 프린팅으로 설계한 인공장기 관련 탐구내용을 간단히 기술해 주세요.\n3학년 때 진로활동으로 GAN을 학습시켜 생태계 시뮬레이션을 생성하였다고 하였는데, 더 자세히 설명해 주세요.\n3학년 자율활동으로 \"10대 바이오 미래 유망 기술\"을 자료 조사하였는데, 그 중 바이오 센서 기술에 대해 조사한 내용을 설명해 주세요.\n2학년 생명과학 교과목에서 파킨슨 병의 원인과 증상을 탐구하였는데, 파킨슨 병의 원인과 치료 방안에 대해서 설명해 주세요.\n(3-1 물리2) 트랜지스터의 구조와 작동 원리를 설명해 보세요.\n'반도체 내의 전하와 전류의 관계에 대한 분석'을 주제로 작성한 보고서에 대해 간단히 소개해 보세요.\n반도체에는 원자가 전자가 3개 또는 5개인 원자만 공유결합 될 수 있는지에 대한 의문을 갖고 탐구한 내용을 소개해 보세요.\n(3학년 자율활동) ‘죽은 경제학자들의 만찬’이라는 도서를 읽고 가장 인상 깊었던 것은 무엇인가요?\n학급 부회장으로서 가장 기억에 남는 학급 활동은 무엇이었나요?\n(2학년 진로활동) 친환경 도시의 장·단점에 대해 설명해 보세요\n(3학년 진로활동) 도시의 구조적 특징과 열섬현상과의 상관관계를 설명해 보세요\n3년간 미디어와 디지털콘텐츠 제작에 대해 깊은 관심이 확인됩니다. 지원자는 어떤 콘텐츠 기획자가 되고 싶나요? 구체적으로 말씀해 주세요."},{"y":2026,"u":"인하대학교","c1":"기초학업역량","c2":"의사소통\n능력","q":"물리학Ⅰ 세부능력 및 특기사항을 보니 수업시간에 배운 열역학 제2법칙에 관심이 많았던 것 같은데, 열역학 제2법칙이 무엇인지 설명해주세요.\n경제 수업시간에 미국과 중국의 무역 분쟁으로 인한 경상수지에 대해 알아본 것 같은데, 경상수지란 무엇인지 설명해주세요.\n(의예과) 생명과학Ⅱ 시간에 발표한 ○○○에 대해 설명하세요."},{"y":2026,"u":"인하대학교","c1":"진로탐구역량","c2":"의사소통\n능력","q":"1학년 때부터 꾸준히 광합성이라는 주제에 관심을 갖고 있는 것 같은데, 이 주제에 관심을 갖게 된 동기는 무엇인가요?\n2학년 자율활동과 3학년 영어 독해와 작문 내용을 보니 미디어 속 혐오에 대해 고민해 본 것 같은데, 이에 대한 해결 방안을 생각해 본 적 있다면 설명해주세요.\n(의예과) 동아리 시간에 수행한 ○○○활동의 동기는 무엇인가요?\n(의예과) 고전과 윤리 시간에 조사한 ○○○에 대한 본인의 생각은?"},{"y":2026,"u":"인하대학교","c1":"의사소통역량","c2":"의사소통\n능력","q":"2학년 영어Ⅰ 과목 세특을 보니 의사소통이 원활히 이루어지도록 협력적인 모습을 자주 보였다는 내용이 기재되어 있는데, 어떤 노력을 했는지 설명해주세요.\n1, 2학년 행특을 보니 공통적으로 친구들을 도와주는 모습을 칭찬해 주신 것 같은데, 힘들어하는 친구를 도와주었던 사례가 있다면 소개해주세요.\n(의예과) 행동특성 및 종합의견 내용 중 친구들에게 조언을 해준 사례는?"},{"y":2026,"u":"가천대학교","c1":"인성","c2":"의사소통\n능력","q":"(인성관련) 학생회 활동에서 기존 방식을 그대로 따르지 않고 새로운 프로그램을 기획하여 공동체가 함께 즐길 수 있는 행사로 개선했다고 기록되어 있습니다. 이러한 기획을 추진하면서 공동체를 위해 어떤 점을 가장 중요하게 생각했고, 이를 위해 어떤 노력을 했는지 설명해 주세요.\n(인성관련) 강점이 있는 과목에서 멘토로서 친구들의 학습을 돕는 역할을 꾸준히 수행했다고 기록되어 있습니다. 이를 위해 어떤 방식으로 준비하고 설명했으며, 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인성관련) 멘토로 활동하며 학습 지원을 꾸준히 이어갔다고 기록되어 있습니다. 해당 역할을 수행하는 과정에서 가장 중요하게 생각했던 점은 무엇이었는지 설명해 주세요.\n(인성관련) 학급 분위기 형성에 긍정적으로 기여하여 칭찬하고 싶은 친구로 가장 많은 추천을 받았다고 기록되어 있습니다. 이러한 평가를 받게 된 이유가 무엇이라고 생각하는지 설명해 주세요.\n(인성관련) 자신의 담당이 아닌 일에도 자발적으로 참여하며 공동체를 위한 노력을 꾸준히 실천해 여러 교사로부터 긍정적인 평가를 받았다고 기록되어 있습니다. 이러한 행동을 계속 실천하게 된 이유와 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(사회과학계열) 사회문화 시간에 문화 변동과 문화 접촉에 따른 사회 변화 내용을 중심으로 지역 간 발전 격차를 비교해 발표했다고 기록되어 있습니다. 문화 변동이 사회와 경제에 어떤 영향을 줄 수 있는지 배운 내용이나 발표 내용을 바탕으로 설명해 주세요.\n(사회과학계열) 경제 시간에 무역의 분업과 특화, 절대우위와 비교우위 개념을 학습했다고 기록되어 있습니다. 절대우위와 비교우위 중 하나를 선택해 더 중요하다고 생각하는 이유를 설명해 주세요.\n(사회과학계열) 문학 시간에 시 작품을 읽고 주제와 정서를 해석한 뒤 이를 소설 형태로 재구성하는 활동을 했다고 기록되어 있습니다. 자신의 의도를 잘 전달하기 위해 어떤 점을 고려했고, 이를 소설 구성에 어떻게 반영했는지 설명해 주세요.\n(사회과학계열) 확률과 통계 시간에 조사 과정의 한계를 인식했다고 기록되어 있습니다. 표본의 규모와 추출 방법이 모집단을 대표하는 데 왜 중요하다고 생각하는지 설명해 주세요.\n(사회과학계열) 정치와 법 수업에서 헌법의 기본 원리를 일상생활 사례에 적용해 분석했다고 기록되어 있습니다. 헌법의 기본 원리 중 하나를 선택하고, 그것이 왜 필요하다고 생각하는지 생활 속 예를 들어 설명해 주세요.\n(인문계열) 영어I 수업에서 작품을 읽고 인물과 상징, 시대적 배경을 중심으로 주제를 탐구했다고 기록되어 있습니다. 작품에서 ‘OOO’이라는 표현이 어떤 의미로 사용되었다고 이해했는지, 그 이유를 설명해 주세요.\n(인문계열) 독서 수업에서 비문학 글을 읽고 핵심 내용을 요약한 뒤 자신의 관점으로 설명문을 작성했다고 기록되어 있습니다. 핵심 내용을 설명문으로 작성할 때 가장 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인문계열) 사회 이슈 발표 활동에서 인공지능 창작물과 저작권 문제를 주제로 탐구했다고 기록되어 있습니다. 이 문제를 조사하면서 중요하다고 보았던 쟁점은 무엇이었고, 왜 그렇게 생각했는지 설명해 주세요.\n(인문계열) 확률과 통계 수업에서 문학 작품을 통계 개념과 연결해 해석하는 탐구를 했다고 기록되어 있습니다. 조건부 확률이나 이항 분포 개념을 어떤 관점에서 활용했는지 설명해 주세요.\n(인문계열) 윤리 시간에 덕을 중심으로 삶을 이해하는 윤리 관점에 깊이 공감했다고 기록되어 있습니다. 어떤 점에서 공감하게 되었는지 자신의 생각을 중심으로 설명해 주세요.\n(자연계열) 수학Ⅱ 시간에 미분과 적분의 개념을 이용해 등가속도 운동 공식을 이해하려는 탐구를 했다고 기록되어 있습니다. 미분과 적분이 운동을 설명하는 데 어떻게 연결된다고 이해했는지 설명해 주세요.\n(자연계열) 물리 수업에서 충격량과 운동량의 관계를 학습하고, 충돌의 유형을 비교해 설명했다고 기록되어 있습니다. 충격량과 운동량이 어떤 관계에 있는지 설명해 주세요.\n(자연계열) 화학 시간에 산과 염기의 중화 적정 실험을 통해 용액의 농도를 분석했다고 기록되어 있습니다. 중화 적정의 목적과 농도를 구할 수 있는 원리가 무엇인지 설명해 주세요.\n(자연계열) 생명과학 시간에 효모의 무산소 호흡 실험을 수행하고 유산소 호흡과의 차이를 탐구했다고 기록되어 있습니다. 두 호흡 과정의 생성물과 에너지 생성량 측면에서 차이를 설명해 주세요.\n(자연계열) 동아리 시간에 다양한 생명과학 관련 실험에 참여했다고 기록되어 있습니다. 가장 의미 있었던 실험은 무엇이었으며, 실험 과정에서 어려웠던 점을 어떻게 해결했는지 설명해 주세요.\n(공학계열) 물리 시간에 중력장 내 포물선 운동 실험을 설계하고 속력을 구했다고 기록되어 있습니다. 포물선 운동에서 수평 방향과 연직 방향의 운동을 어떤 기준으로 나누어 해석했는지 설명해 주세요.\n(공학계열) 물리 시간에 전자기 유도 현상을 이해하고 간이 발전기를 제작했다고 기록되어 있습니다. 코일에 전류가 유도되는 원리를 자기장 변화와 관련지어 설명해 주세요.\n(공학계열) 화학 시간에 볼타 전지와 다니엘 전지의 구조와 작동 원리를 비교해 설명하고 전해질의 성질이 전지 성능에 영향을 준다고 탐구했다고 기록되어 있습니다. 전해질이 전지 작동에 왜 중요한지 기본 원리를 중심으로 설명해 주세요.\n(공학계열) 진로활동에서 서스펜션 탐구 과정에서 충격량 개념을 이해했다고 기록되어 있습니다. 힘이 일정하지 않고 시간에 따라 변할 때, 충격량을 어떻게 구할 수 있는지 그래프 해석 관점에서 설명해 주세요.\n(공학계열) 기하 시간에 로봇팔의 움직임을 좌표와 벡터로 표현하는 탐구를 했다고 기록되어 있습니다. 로봇팔 끝점의 위치를 좌표평면에서 어떤 방식으로 나타낼 수 있는지 설명해 주세요.\n(간호·의과학계열) 물리 시간에 파동 단원에서 배운 내용을 바탕으로 초음파의 의료 활용을 탐구했다고 기록되어 있습니다. 파동 단원에서 배운 파동의 성질을 바탕으로, 초음파로 인체 내부를 확인할 수 있는 이유를 설명해 주세요.\n(간호·의과학계열) 동아리활동에서 책을 읽고, 희망 진로가 평생 학습이 필요한 전문 직업이라는 점을 인식했다고 기록되어 있습니다. 그렇게 생각하게 된 이유와, 본인의 학습 습관을 어떻게 돌아보게 되었는지 설명해 주세요.\n(간호·의과학계열) 수학시간에 인슐린 농도 변화를 지수함수와 로그함수를 이용해 설명했다고 기록되어 있습니다. 어떤 함수를 선택해 설명했으며, 그 함수를 선택한 이유를 함수의 성질과 연결해 설명해 주세요\n(간호·의과학계열) 생명과학 시간에 우리 몸의 방저 작용에 대해 배우면서 특이적 방어 작용의 면역 반응을 구분해 설명했다고 기록되어 있습니다. 그중 하나를 예로 들어 작용 과정과 특징을 설명해 주세요.\n(간호·의과학계열) 생명과학 시간 유전 단원에서 어려운 개념에 대해 적극적으로 질문하고 해결하려는 태도를 보였다고 기록되어 있습니다. 기억에 남는 질문과 그것을 이해하게 된 과정을 사례로 설명해 주세요.\n(의약계열) 진로시간에 생성형 인공지능 시대의 기술 변화와 관련된 내용을 탐구했다고 기록되어 있습니다. 기술 발전이 사회에 미치는 영향을 생각할 때, 윤리적으로 고려해야 할 점은 무엇이라고 보는지 설명해 주세요.\n(의약계열) 화학 주제 독서 활동으로 해당 도서를 읽고 보고서를 작성했다고 기록되어 있습니다. 책에서 다룬 내용 중 가장 흥미로웠던 화학적 원리 하나를 선택하여, 학교 화학 수업에서 배운 개념과 연결해 설명해 주세요.\n(의약계열) 확률과 통계 시간에 확률과 통계 시간에 이항분포와 정규분포를 활용해 자료를 분석했다고 기록되어 있습니다. 이항분포와 정규분포가 어떤 관계에 있다고 이해했는지 설명해 주세요.\n(의약계열) 화학 시간에 산화·환원 반응을 심화 탐구했다고 기록되어 있습니다. 우리 몸에서 일어나는 산화환원 반응의 예를 하나 들어 원리 중심으로 설명해 주세요.\n(의약계열) 생명과학 시간에 노화에 관심을 두고 DNA 복제 과정을 탐구했다고 기록되어 있습니다. DNA 복제에 관여하는 대표적인 효소를 중심으로 복제 원리를 설명해 주세요."},{"y":2026,"u":"가천대학교","c1":"진학의지 및 계열적합성","c2":"의사소통\n능력","q":"(인성관련) 학생회 활동에서 기존 방식을 그대로 따르지 않고 새로운 프로그램을 기획하여 공동체가 함께 즐길 수 있는 행사로 개선했다고 기록되어 있습니다. 이러한 기획을 추진하면서 공동체를 위해 어떤 점을 가장 중요하게 생각했고, 이를 위해 어떤 노력을 했는지 설명해 주세요.\n(인성관련) 강점이 있는 과목에서 멘토로서 친구들의 학습을 돕는 역할을 꾸준히 수행했다고 기록되어 있습니다. 이를 위해 어떤 방식으로 준비하고 설명했으며, 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인성관련) 멘토로 활동하며 학습 지원을 꾸준히 이어갔다고 기록되어 있습니다. 해당 역할을 수행하는 과정에서 가장 중요하게 생각했던 점은 무엇이었는지 설명해 주세요.\n(인성관련) 학급 분위기 형성에 긍정적으로 기여하여 칭찬하고 싶은 친구로 가장 많은 추천을 받았다고 기록되어 있습니다. 이러한 평가를 받게 된 이유가 무엇이라고 생각하는지 설명해 주세요.\n(인성관련) 자신의 담당이 아닌 일에도 자발적으로 참여하며 공동체를 위한 노력을 꾸준히 실천해 여러 교사로부터 긍정적인 평가를 받았다고 기록되어 있습니다. 이러한 행동을 계속 실천하게 된 이유와 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(사회과학계열) 사회문화 시간에 문화 변동과 문화 접촉에 따른 사회 변화 내용을 중심으로 지역 간 발전 격차를 비교해 발표했다고 기록되어 있습니다. 문화 변동이 사회와 경제에 어떤 영향을 줄 수 있는지 배운 내용이나 발표 내용을 바탕으로 설명해 주세요.\n(사회과학계열) 경제 시간에 무역의 분업과 특화, 절대우위와 비교우위 개념을 학습했다고 기록되어 있습니다. 절대우위와 비교우위 중 하나를 선택해 더 중요하다고 생각하는 이유를 설명해 주세요.\n(사회과학계열) 문학 시간에 시 작품을 읽고 주제와 정서를 해석한 뒤 이를 소설 형태로 재구성하는 활동을 했다고 기록되어 있습니다. 자신의 의도를 잘 전달하기 위해 어떤 점을 고려했고, 이를 소설 구성에 어떻게 반영했는지 설명해 주세요.\n(사회과학계열) 확률과 통계 시간에 조사 과정의 한계를 인식했다고 기록되어 있습니다. 표본의 규모와 추출 방법이 모집단을 대표하는 데 왜 중요하다고 생각하는지 설명해 주세요.\n(사회과학계열) 정치와 법 수업에서 헌법의 기본 원리를 일상생활 사례에 적용해 분석했다고 기록되어 있습니다. 헌법의 기본 원리 중 하나를 선택하고, 그것이 왜 필요하다고 생각하는지 생활 속 예를 들어 설명해 주세요.\n(인문계열) 영어I 수업에서 작품을 읽고 인물과 상징, 시대적 배경을 중심으로 주제를 탐구했다고 기록되어 있습니다. 작품에서 ‘OOO’이라는 표현이 어떤 의미로 사용되었다고 이해했는지, 그 이유를 설명해 주세요.\n(인문계열) 독서 수업에서 비문학 글을 읽고 핵심 내용을 요약한 뒤 자신의 관점으로 설명문을 작성했다고 기록되어 있습니다. 핵심 내용을 설명문으로 작성할 때 가장 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인문계열) 사회 이슈 발표 활동에서 인공지능 창작물과 저작권 문제를 주제로 탐구했다고 기록되어 있습니다. 이 문제를 조사하면서 중요하다고 보았던 쟁점은 무엇이었고, 왜 그렇게 생각했는지 설명해 주세요.\n(인문계열) 확률과 통계 수업에서 문학 작품을 통계 개념과 연결해 해석하는 탐구를 했다고 기록되어 있습니다. 조건부 확률이나 이항 분포 개념을 어떤 관점에서 활용했는지 설명해 주세요.\n(인문계열) 윤리 시간에 덕을 중심으로 삶을 이해하는 윤리 관점에 깊이 공감했다고 기록되어 있습니다. 어떤 점에서 공감하게 되었는지 자신의 생각을 중심으로 설명해 주세요.\n(자연계열) 수학Ⅱ 시간에 미분과 적분의 개념을 이용해 등가속도 운동 공식을 이해하려는 탐구를 했다고 기록되어 있습니다. 미분과 적분이 운동을 설명하는 데 어떻게 연결된다고 이해했는지 설명해 주세요.\n(자연계열) 물리 수업에서 충격량과 운동량의 관계를 학습하고, 충돌의 유형을 비교해 설명했다고 기록되어 있습니다. 충격량과 운동량이 어떤 관계에 있는지 설명해 주세요.\n(자연계열) 화학 시간에 산과 염기의 중화 적정 실험을 통해 용액의 농도를 분석했다고 기록되어 있습니다. 중화 적정의 목적과 농도를 구할 수 있는 원리가 무엇인지 설명해 주세요.\n(자연계열) 생명과학 시간에 효모의 무산소 호흡 실험을 수행하고 유산소 호흡과의 차이를 탐구했다고 기록되어 있습니다. 두 호흡 과정의 생성물과 에너지 생성량 측면에서 차이를 설명해 주세요.\n(자연계열) 동아리 시간에 다양한 생명과학 관련 실험에 참여했다고 기록되어 있습니다. 가장 의미 있었던 실험은 무엇이었으며, 실험 과정에서 어려웠던 점을 어떻게 해결했는지 설명해 주세요.\n(공학계열) 물리 시간에 중력장 내 포물선 운동 실험을 설계하고 속력을 구했다고 기록되어 있습니다. 포물선 운동에서 수평 방향과 연직 방향의 운동을 어떤 기준으로 나누어 해석했는지 설명해 주세요.\n(공학계열) 물리 시간에 전자기 유도 현상을 이해하고 간이 발전기를 제작했다고 기록되어 있습니다. 코일에 전류가 유도되는 원리를 자기장 변화와 관련지어 설명해 주세요.\n(공학계열) 화학 시간에 볼타 전지와 다니엘 전지의 구조와 작동 원리를 비교해 설명하고 전해질의 성질이 전지 성능에 영향을 준다고 탐구했다고 기록되어 있습니다. 전해질이 전지 작동에 왜 중요한지 기본 원리를 중심으로 설명해 주세요.\n(공학계열) 진로활동에서 서스펜션 탐구 과정에서 충격량 개념을 이해했다고 기록되어 있습니다. 힘이 일정하지 않고 시간에 따라 변할 때, 충격량을 어떻게 구할 수 있는지 그래프 해석 관점에서 설명해 주세요.\n(공학계열) 기하 시간에 로봇팔의 움직임을 좌표와 벡터로 표현하는 탐구를 했다고 기록되어 있습니다. 로봇팔 끝점의 위치를 좌표평면에서 어떤 방식으로 나타낼 수 있는지 설명해 주세요.\n(간호·의과학계열) 물리 시간에 파동 단원에서 배운 내용을 바탕으로 초음파의 의료 활용을 탐구했다고 기록되어 있습니다. 파동 단원에서 배운 파동의 성질을 바탕으로, 초음파로 인체 내부를 확인할 수 있는 이유를 설명해 주세요.\n(간호·의과학계열) 동아리활동에서 책을 읽고, 희망 진로가 평생 학습이 필요한 전문 직업이라는 점을 인식했다고 기록되어 있습니다. 그렇게 생각하게 된 이유와, 본인의 학습 습관을 어떻게 돌아보게 되었는지 설명해 주세요.\n(간호·의과학계열) 수학시간에 인슐린 농도 변화를 지수함수와 로그함수를 이용해 설명했다고 기록되어 있습니다. 어떤 함수를 선택해 설명했으며, 그 함수를 선택한 이유를 함수의 성질과 연결해 설명해 주세요\n(간호·의과학계열) 생명과학 시간에 우리 몸의 방저 작용에 대해 배우면서 특이적 방어 작용의 면역 반응을 구분해 설명했다고 기록되어 있습니다. 그중 하나를 예로 들어 작용 과정과 특징을 설명해 주세요.\n(간호·의과학계열) 생명과학 시간 유전 단원에서 어려운 개념에 대해 적극적으로 질문하고 해결하려는 태도를 보였다고 기록되어 있습니다. 기억에 남는 질문과 그것을 이해하게 된 과정을 사례로 설명해 주세요.\n(의약계열) 진로시간에 생성형 인공지능 시대의 기술 변화와 관련된 내용을 탐구했다고 기록되어 있습니다. 기술 발전이 사회에 미치는 영향을 생각할 때, 윤리적으로 고려해야 할 점은 무엇이라고 보는지 설명해 주세요.\n(의약계열) 화학 주제 독서 활동으로 해당 도서를 읽고 보고서를 작성했다고 기록되어 있습니다. 책에서 다룬 내용 중 가장 흥미로웠던 화학적 원리 하나를 선택하여, 학교 화학 수업에서 배운 개념과 연결해 설명해 주세요.\n(의약계열) 확률과 통계 시간에 확률과 통계 시간에 이항분포와 정규분포를 활용해 자료를 분석했다고 기록되어 있습니다. 이항분포와 정규분포가 어떤 관계에 있다고 이해했는지 설명해 주세요.\n(의약계열) 화학 시간에 산화·환원 반응을 심화 탐구했다고 기록되어 있습니다. 우리 몸에서 일어나는 산화환원 반응의 예를 하나 들어 원리 중심으로 설명해 주세요.\n(의약계열) 생명과학 시간에 노화에 관심을 두고 DNA 복제 과정을 탐구했다고 기록되어 있습니다. DNA 복제에 관여하는 대표적인 효소를 중심으로 복제 원리를 설명해 주세요."},{"y":2026,"u":"가천대학교","c1":"의사소통역량","c2":"의사소통\n능력","q":"(인성관련) 학생회 활동에서 기존 방식을 그대로 따르지 않고 새로운 프로그램을 기획하여 공동체가 함께 즐길 수 있는 행사로 개선했다고 기록되어 있습니다. 이러한 기획을 추진하면서 공동체를 위해 어떤 점을 가장 중요하게 생각했고, 이를 위해 어떤 노력을 했는지 설명해 주세요.\n(인성관련) 강점이 있는 과목에서 멘토로서 친구들의 학습을 돕는 역할을 꾸준히 수행했다고 기록되어 있습니다. 이를 위해 어떤 방식으로 준비하고 설명했으며, 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인성관련) 멘토로 활동하며 학습 지원을 꾸준히 이어갔다고 기록되어 있습니다. 해당 역할을 수행하는 과정에서 가장 중요하게 생각했던 점은 무엇이었는지 설명해 주세요.\n(인성관련) 학급 분위기 형성에 긍정적으로 기여하여 칭찬하고 싶은 친구로 가장 많은 추천을 받았다고 기록되어 있습니다. 이러한 평가를 받게 된 이유가 무엇이라고 생각하는지 설명해 주세요.\n(인성관련) 자신의 담당이 아닌 일에도 자발적으로 참여하며 공동체를 위한 노력을 꾸준히 실천해 여러 교사로부터 긍정적인 평가를 받았다고 기록되어 있습니다. 이러한 행동을 계속 실천하게 된 이유와 그 과정에서 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(사회과학계열) 사회문화 시간에 문화 변동과 문화 접촉에 따른 사회 변화 내용을 중심으로 지역 간 발전 격차를 비교해 발표했다고 기록되어 있습니다. 문화 변동이 사회와 경제에 어떤 영향을 줄 수 있는지 배운 내용이나 발표 내용을 바탕으로 설명해 주세요.\n(사회과학계열) 경제 시간에 무역의 분업과 특화, 절대우위와 비교우위 개념을 학습했다고 기록되어 있습니다. 절대우위와 비교우위 중 하나를 선택해 더 중요하다고 생각하는 이유를 설명해 주세요.\n(사회과학계열) 문학 시간에 시 작품을 읽고 주제와 정서를 해석한 뒤 이를 소설 형태로 재구성하는 활동을 했다고 기록되어 있습니다. 자신의 의도를 잘 전달하기 위해 어떤 점을 고려했고, 이를 소설 구성에 어떻게 반영했는지 설명해 주세요.\n(사회과학계열) 확률과 통계 시간에 조사 과정의 한계를 인식했다고 기록되어 있습니다. 표본의 규모와 추출 방법이 모집단을 대표하는 데 왜 중요하다고 생각하는지 설명해 주세요.\n(사회과학계열) 정치와 법 수업에서 헌법의 기본 원리를 일상생활 사례에 적용해 분석했다고 기록되어 있습니다. 헌법의 기본 원리 중 하나를 선택하고, 그것이 왜 필요하다고 생각하는지 생활 속 예를 들어 설명해 주세요.\n(인문계열) 영어I 수업에서 작품을 읽고 인물과 상징, 시대적 배경을 중심으로 주제를 탐구했다고 기록되어 있습니다. 작품에서 ‘OOO’이라는 표현이 어떤 의미로 사용되었다고 이해했는지, 그 이유를 설명해 주세요.\n(인문계열) 독서 수업에서 비문학 글을 읽고 핵심 내용을 요약한 뒤 자신의 관점으로 설명문을 작성했다고 기록되어 있습니다. 핵심 내용을 설명문으로 작성할 때 가장 중요하게 생각한 점은 무엇이었는지 설명해 주세요.\n(인문계열) 사회 이슈 발표 활동에서 인공지능 창작물과 저작권 문제를 주제로 탐구했다고 기록되어 있습니다. 이 문제를 조사하면서 중요하다고 보았던 쟁점은 무엇이었고, 왜 그렇게 생각했는지 설명해 주세요.\n(인문계열) 확률과 통계 수업에서 문학 작품을 통계 개념과 연결해 해석하는 탐구를 했다고 기록되어 있습니다. 조건부 확률이나 이항 분포 개념을 어떤 관점에서 활용했는지 설명해 주세요.\n(인문계열) 윤리 시간에 덕을 중심으로 삶을 이해하는 윤리 관점에 깊이 공감했다고 기록되어 있습니다. 어떤 점에서 공감하게 되었는지 자신의 생각을 중심으로 설명해 주세요.\n(자연계열) 수학Ⅱ 시간에 미분과 적분의 개념을 이용해 등가속도 운동 공식을 이해하려는 탐구를 했다고 기록되어 있습니다. 미분과 적분이 운동을 설명하는 데 어떻게 연결된다고 이해했는지 설명해 주세요.\n(자연계열) 물리 수업에서 충격량과 운동량의 관계를 학습하고, 충돌의 유형을 비교해 설명했다고 기록되어 있습니다. 충격량과 운동량이 어떤 관계에 있는지 설명해 주세요.\n(자연계열) 화학 시간에 산과 염기의 중화 적정 실험을 통해 용액의 농도를 분석했다고 기록되어 있습니다. 중화 적정의 목적과 농도를 구할 수 있는 원리가 무엇인지 설명해 주세요.\n(자연계열) 생명과학 시간에 효모의 무산소 호흡 실험을 수행하고 유산소 호흡과의 차이를 탐구했다고 기록되어 있습니다. 두 호흡 과정의 생성물과 에너지 생성량 측면에서 차이를 설명해 주세요.\n(자연계열) 동아리 시간에 다양한 생명과학 관련 실험에 참여했다고 기록되어 있습니다. 가장 의미 있었던 실험은 무엇이었으며, 실험 과정에서 어려웠던 점을 어떻게 해결했는지 설명해 주세요.\n(공학계열) 물리 시간에 중력장 내 포물선 운동 실험을 설계하고 속력을 구했다고 기록되어 있습니다. 포물선 운동에서 수평 방향과 연직 방향의 운동을 어떤 기준으로 나누어 해석했는지 설명해 주세요.\n(공학계열) 물리 시간에 전자기 유도 현상을 이해하고 간이 발전기를 제작했다고 기록되어 있습니다. 코일에 전류가 유도되는 원리를 자기장 변화와 관련지어 설명해 주세요.\n(공학계열) 화학 시간에 볼타 전지와 다니엘 전지의 구조와 작동 원리를 비교해 설명하고 전해질의 성질이 전지 성능에 영향을 준다고 탐구했다고 기록되어 있습니다. 전해질이 전지 작동에 왜 중요한지 기본 원리를 중심으로 설명해 주세요.\n(공학계열) 진로활동에서 서스펜션 탐구 과정에서 충격량 개념을 이해했다고 기록되어 있습니다. 힘이 일정하지 않고 시간에 따라 변할 때, 충격량을 어떻게 구할 수 있는지 그래프 해석 관점에서 설명해 주세요.\n(공학계열) 기하 시간에 로봇팔의 움직임을 좌표와 벡터로 표현하는 탐구를 했다고 기록되어 있습니다. 로봇팔 끝점의 위치를 좌표평면에서 어떤 방식으로 나타낼 수 있는지 설명해 주세요.\n(간호·의과학계열) 물리 시간에 파동 단원에서 배운 내용을 바탕으로 초음파의 의료 활용을 탐구했다고 기록되어 있습니다. 파동 단원에서 배운 파동의 성질을 바탕으로, 초음파로 인체 내부를 확인할 수 있는 이유를 설명해 주세요.\n(간호·의과학계열) 동아리활동에서 책을 읽고, 희망 진로가 평생 학습이 필요한 전문 직업이라는 점을 인식했다고 기록되어 있습니다. 그렇게 생각하게 된 이유와, 본인의 학습 습관을 어떻게 돌아보게 되었는지 설명해 주세요.\n(간호·의과학계열) 수학시간에 인슐린 농도 변화를 지수함수와 로그함수를 이용해 설명했다고 기록되어 있습니다. 어떤 함수를 선택해 설명했으며, 그 함수를 선택한 이유를 함수의 성질과 연결해 설명해 주세요\n(간호·의과학계열) 생명과학 시간에 우리 몸의 방저 작용에 대해 배우면서 특이적 방어 작용의 면역 반응을 구분해 설명했다고 기록되어 있습니다. 그중 하나를 예로 들어 작용 과정과 특징을 설명해 주세요.\n(간호·의과학계열) 생명과학 시간 유전 단원에서 어려운 개념에 대해 적극적으로 질문하고 해결하려는 태도를 보였다고 기록되어 있습니다. 기억에 남는 질문과 그것을 이해하게 된 과정을 사례로 설명해 주세요.\n(의약계열) 진로시간에 생성형 인공지능 시대의 기술 변화와 관련된 내용을 탐구했다고 기록되어 있습니다. 기술 발전이 사회에 미치는 영향을 생각할 때, 윤리적으로 고려해야 할 점은 무엇이라고 보는지 설명해 주세요.\n(의약계열) 화학 주제 독서 활동으로 해당 도서를 읽고 보고서를 작성했다고 기록되어 있습니다. 책에서 다룬 내용 중 가장 흥미로웠던 화학적 원리 하나를 선택하여, 학교 화학 수업에서 배운 개념과 연결해 설명해 주세요.\n(의약계열) 확률과 통계 시간에 확률과 통계 시간에 이항분포와 정규분포를 활용해 자료를 분석했다고 기록되어 있습니다. 이항분포와 정규분포가 어떤 관계에 있다고 이해했는지 설명해 주세요.\n(의약계열) 화학 시간에 산화·환원 반응을 심화 탐구했다고 기록되어 있습니다. 우리 몸에서 일어나는 산화환원 반응의 예를 하나 들어 원리 중심으로 설명해 주세요.\n(의약계열) 생명과학 시간에 노화에 관심을 두고 DNA 복제 과정을 탐구했다고 기록되어 있습니다. DNA 복제에 관여하는 대표적인 효소를 중심으로 복제 원리를 설명해 주세요."},{"y":2026,"u":"강남대학교","c1":"전공적합성","c2":"의사소통\n능력","q":"○○학과에 지원하였네요. ○○학과에 지원하게 된 동기가 된 고교 재학기간 중 활동이 있다면 무엇인가요?\n사회 교과 시간에 ‘저출산 지원정책의 문제점과 해결방안’을 주제로 조사해서 발표한 경험이 있네요. 발표 내용 중 기억에 남는 내용이 있으면 소개해 볼까요?\n진로 선택 과목 선택할 때 고려했던 것과 과목 이수 후 도움이 되었던 점은?"},{"y":2026,"u":"강남대학교","c1":"인성적 자질","c2":"의사소통\n능력","q":"학생회에서 축제를 기획한 경험이 있는데, 어떤 역할을 맡아서 수행하였나요?\n역할 수행을 하다가 어려운 점은 어떻게 해결하였나요?\n분리수거 도우미로 봉사를 해왔는데, 이 활동에 참여한 계기는 무엇인가요? 힘들었던 점을 어떻게 극복했나요?"},{"y":2026,"u":"강남대학교","c1":"종합적 사고력 및 의사소통능력","c2":"의사소통\n능력","q":"각 평가요소에 따른 답변을 바탕으로 지원자의 종합적 사고력 및 의사소통능력을 평가"},{"y":2026,"u":"강남대학교","c1":"전형의 적합성","c2":"의사소통\n능력","q":"경제수학 과목을 선택하여 이수했네요. 다른 과목보다 이수자 수가 적은데 이 과목을 선택한 이유가 있을까요? 학습을 위해 노력한 게 있다면 무엇인가요?\n고등학교 생활을 하면서 본인이 가장 노력했던 경험이 있다면 어떤 것인가요? 그 활동을 통해 배우고 느낀 점을 이야기 해보세요."},{"y":2026,"u":"단국대학교","c1":"진로역량\n(진로의지)","c2":"의사소통\n능력","q":"지원전공에 대하여 관심을 가지게 된 계기는 무엇입니까?\n○○수업에서 ○○에 관한 토론활동을 했는데 본인의 관점은 무엇입니까?\n○○동아리 활동에서 ○○에 대해 조사, 발표했는데 어떤 내용인지 말해 보세요.\n희망 진로탐색과정 중 가장 의미있는 활동은 무엇이며 입학 후 진로 계획은 무엇입니까?"},{"y":2026,"u":"단국대학교","c1":"발전가능성\n(목표의식)","c2":"의사소통\n능력","q":"무엇인가를 열심히 해서 목표를 이룬 경험이 있습니까?\n앞으로 자신이 성장하기 위하여 개발해야 할 영역(능력, 자질 등)이 있다면 무엇입니까?"},{"y":2026,"u":"단국대학교","c1":"공동체역량\n(공동체의식\n소통능력)","c2":"의사소통\n능력","q":"친구들과 원활하게 과제를 수행하기 위해 기울였던 노력과 본인의 역할에 대해 말해 보세요.\n○○수업 모둠장으로 의견조율의 과정에서의 충돌을 어떻게 해결했는지 말해 보세요.\n리더십 또는 팔로워십을 발휘한 경험이 있다면 말해 보세요.\n친구 또는 주변 사람들을 위해 배려하거나 도움을 준 경험에 대해 말해 보세요.\n자신의 성실성을 증명할 수 있는 대표적인 사례가 있다면 말해 보세요.\n공동의 목표를 달성하기 위한 경험에 대해 말해 보세요. 또한 본인의 역할이 무엇이었는지 말해 보세요."},{"y":2026,"u":"대진대학교","c1":"논리적 사고력\n및 창의능력","c2":"의사소통\n능력","q":"(공통) AI와 로봇 같은 기술이 급속히 발달함에 따라 향후 일자리가 더욱 줄어들 것으로 예상되고 있습니다. 이런 변화에 따라 앞으로 학생이 준비해야 할 역량은 무엇이라고 생각하나요?\n(인문·사회) 기후위기와 환경파괴가 심각해지면서 환경 보호를 경제 성장보다 우선시해야 한다는 주장과, 개발도상국에서는 경제 발전이 더 중요하다는 입장이 맞서고 있습니다. 환경 보호와 경제 성장 중 어떤 것이 우선되어야 하는지에 대해 본인의 견해를 설명하시오.\n(인문·사회) 가짜 뉴스와 딥페이크 확산으로 정보의 진위 판단이 어려워지며, 선거나 정책에 미치는 영향도 커지고 있습니다. 이에 허위정보에 대한 강력한 규제가 필요하다는 주장과, 검열과 정치적 악용을 우려하는 반론이 존재합니다. 이러한 상황에서 허위정보 규제가 표현의 자유보다 우선될 수 있는지에 대한 본인의 견해를 설명하시오.\n(자연·공학) 기후 변화 대응을 위한 탄소중립 실현은 전 세계가 함께 해결해야 할 중요한 과제입니다. 우리 주변의 작은 실천도 큰 변화를 만들 수 있는 만큼, 탄소중립을 위해 일상생활 속에서 실천할 수 있는 방법을 제안해 보세요.\n(자연·공학) 자율주행차의 보급이 점점 확대되고 있습니다. 자율주행차 기술이 사회 전반에 가져올 변화를 긍정적인 영향과 부정적인 영향을 설명해주시고, 이에 대한 본인의 의견을 제시해주세요."},{"y":2026,"u":"대진대학교","c1":"전공적성능력","c2":"의사소통\n능력","q":"(공통) 우리학과에 지원한 동기는 무엇인가요?"},{"y":2026,"u":"성결대학교","c1":"의사소통 능력\n(주제의 이해력, 언어구사능력, 성실성)","c2":"의사소통\n능력","q":"고령운전자의 운전면허를 취소하자는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n1인 미디어에 대한 규제를 강화해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n디지털 교과서를 전면적으로 도입해 종이 교과서를 대체해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다."},{"y":2026,"u":"성결대학교","c1":"논리적 사고력\n(주장의 논리력)","c2":"의사소통\n능력","q":"고령운전자의 운전면허를 취소하자는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n1인 미디어에 대한 규제를 강화해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n디지털 교과서를 전면적으로 도입해 종이 교과서를 대체해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다."},{"y":2026,"u":"수원대학교","c1":"인성","c2":"의사소통\n능력","q":"1분간 자유롭게 자기소개"},{"y":2026,"u":"수원대학교","c1":"학업계획 및 포부","c2":"의사소통\n능력","q":"본인이 생각하는 ‘성공적인 대학 생활’이란 무엇이며, 이를 위해 스스로 설정하고 싶은 목표를 말해 보세요.\n대학생활이 이전의 고교생활과는 어떤 차이점이 있을 것으로 예상되나요? 이러한 차이점의 극복을 통해 성공적인 대학생활을 하기 위한 준비사항들을 설명해 보세요."},{"y":2026,"u":"수원대학교","c1":"창의력 및 사고력","c2":"의사소통\n능력","q":"현재 우리 사회가 직면한 문제 중 하나를 선택하고, 이를 해결하기 위해 필요한 창의적인 아이디어를 제시해 보세요.\n기존의 틀을 벗어난 사고를 통해 문제를 해결했던 경험을 구체적으로 설명하고, 그 과정에서 배운 점은 무엇입니까?"},{"y":2026,"u":"수원대학교","c1":"전공적합성","c2":"의사소통\n능력","q":"전공선택 및 적응을 위해 본인이 대학 생활 동안 할 수 있는 것들은 무엇이 있을까요?\n지원한 전공의 미래 사회에서의 기여와 향후 전망에 대하여 설명해 보세요."},{"y":2026,"u":"신한대학교","c1":"지원동기","c2":"의사소통\n능력","q":"우리학과에 지원한 동기와 포부를 말해보세요."},{"y":2026,"u":"신한대학교","c1":"논리적 사고력\n및 인성\n(가치관, 성품, 협동성)","c2":"의사소통\n능력","q":"(공학) 기후 변화의 대응으로 탄소 포집과 신재생에너지 확대에 대한 본인의 생각을 말해 보세요.\n(공학) 보안 및 인증에 활용되고 있는 안면인식 기술의 장점과 단점을 말해 보세요.\n(공학) 도시 생태를 개선하기 위한 드론 활용의 구체적 사례를 말해 보세요.\n(공학) 인공지능(AI) 기술과 인간과의 협업이 중요한 이유를 말해 보세요.\n(자연과학) 개인 유전체 정보 분석이 인간의 건강관리에 미치는 영향을 말해 보세요.\n(자연과학) 대규모로 발생되는 감염병 예방을 위한 개인과 사회의 역할을 말해 보세요.\n(자연과학) 일상생활에서 개인의 정보로 수집·형성된 빅데이터가 인간에게 어떤 영향을 주는지 말해 보세요.\n(자연과학) 인공지능(AI) 기술이 의료 및 보건 분야에 미치는 영향을 말해 보세요.\n(인문사회·예체능) 디지털 기기를 활용한 수업 확대에 대한 본인의 생각을 말해 보세요.\n(인문사회·예체능) 생성형 인공지능(AI) 기반 창작물의 저작권에 대하여 본인의 생각을 말해 보세요.\n(인문사회·예체능) 기업의 사회적 책임(ESG) 확대에 대한 본인의 생각을 말해 보세요.\n윤리적 소비를 실천하기 위한 방안에 대해 본인의 생각을 말해 보세요."},{"y":2026,"u":"아주대학교","c1":"서류 신뢰도","c2":"의사소통\n능력","q":"(학업역량) ○○교과에서 ○○실험을 진행했는데, 이 실험의 원리와 과정에 대해 설명해 주세요.\n(진로역량) ○○동아리에서 신문을 제작한 경험이 있는데, 본인의 구체적 역할에 대해 설명해 주세요.\n(공동체역량) 다양한 체험활동에서 리더 역할을 수행했는데, 본인의 리더십을 가장 잘 발휘했던 사례에 대해 말해 주세요.\n(의학과) 제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"아주대학교","c1":"의사소통능력, 태도","c2":"의사소통\n능력","q":"(학업역량) ○○교과에서 ○○실험을 진행했는데, 이 실험의 원리와 과정에 대해 설명해 주세요.\n(진로역량) ○○동아리에서 신문을 제작한 경험이 있는데, 본인의 구체적 역할에 대해 설명해 주세요.\n(공동체역량) 다양한 체험활동에서 리더 역할을 수행했는데, 본인의 리더십을 가장 잘 발휘했던 사례에 대해 말해 주세요.\n(의학과) 제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2026,"u":"안양대학교","c1":"아리학생부면접전형","c2":"전공소양","q":"(지원 동기) 내가 이 학과(전공)에 지원하게 된 이유를 설명해 보세요.\n(지원 동기) 내가 선택한 전공을 주변 사람들이 이해하지 못했을 때, 어떻게 설득할 수 있을지 설명해 보세요.\n(전공과 진로) 이 학과를 졸업한 후 본인이 선택할 진로 분야가 무엇이고, 그 분야에서 요구되는 역량이 무엇인지 설명해 보세요.\n(전공 이해) 최근 사회 문제나 이슈 중에서 본 학과(전공) 지식이 어떻게 기여할 수 있는지 사례를 들어 이야기해 보세요.\n(전공 이해) 해당 전공의 지식을 활용하여 일상생활 속 문제를 해결할 수 있는 사례를 들어 말해 보세요.\n(전공 이해) 전공 학습 과정에서 예상되는 어려움은 무엇이라고 생각하며, 그것을 극복하기 위해 어떤 노력을 할 수 있을지 말해 보세요.\n(학업 관련) 전공 외에 본인이 생각하는 비교과 활동 계획이 있는지, 있다면 왜 그러한 비교과활동이 전공과 관련될 수 있는지에 대해 설명해 보세요.\n(융합 사고) 본인의 전공과 전혀 다른 분야(예술, 스포츠, 철학 등)를 융합한다면 어떤 효과가 있을까요?\n(전공 소양) 전공 학습 과정에서 협업이 중요한 이유를 설명해 보세요.\n(전공 발전) 앞으로 지원 학과(전공) 분야가 발전함에 따라 생길 수 있는 새로운 직업이나 역할을 제시해 보세요."},{"y":2026,"u":"안양대학교","c1":"아리학생부면접전형","c2":"일반소양","q":"(자기이해) 본인의 삶에서 가장 중요하게 생각하는 신념이나 철학은 무엇인가요? 그 신념이 일상 속에서 어떻게 나타나는지 예를 들어 설명해 주세요.\n(미래 인식) 인공지능(AI)의 역기능은 무엇이라 생각하는지 그리고 이를 해결하기 위해서는 어떠한 노력이 필요한지 설명해 주세요.\n(성격의 강점, 단점) 본인의 성격 중에서 팀 활동에 긍정적인 영향을 주는 점과, 개선이 필요한 점을 각각 이야기해 주세요.\n(시간관리) 여러 과제와 활동이 겹쳤을 때 본인이 사용했던 시간 관리 전략을 구체적으로 말해 보세요.\n(사회성) 팀 프로젝트나 그룹 활동 중, 자신의 의견이 논리적으로 가장 옳다고 확신하지만 다른 팀원들이 강하게 반대할 경우, 팀의 화합을 유지하면서 올바른 결정을 내리기 위해 어떤 노력을 기울이시겠습니까?\n(미래 인식) 앞으로 10년 뒤 사회가 어떻게 변할 것으로 생각하며, 그 변화 속에서 본인의 역할은 무엇인지 말해 보세요.\n(대인관계와 공동체) 당신이 진심으로 사과했음에도 불구하고, 친구가 당신의 실수를 쉽게 용서하지 못하고 거리를 두기 시작했습니다. 이 상황에서 당신은 친구와의 관계를 회복하기로 선택했다면, 어떤 노력을 기울일 것인지 말해 주십시오.\n(자기성찰과 책임감) 만약 당신이 시간을 되돌릴 수 있는 기회를 단 한 번 얻게 된다면, 과거의 어떤 순간으로 돌아가 어떤 행동을 되돌리고 싶습니까? 이 선택이 현재의 당신에게 미치는 영향은 무엇일지 말해보십시오.\n(가치관) 개인의 신념과는 정면으로 배치되지만, 대다수의 구성원이나 팀의 이익을 위해 따라야하는 결정에 직면한다면 어떻게 행동하시겠습니까? 이 상황에서 자신의 가치와 다수의 의견 사이의 균형을 어떻게 맞추시겠습니까?\n(자기성찰) 만약에 본인의 삶을 한 편의 영화로 만든다면, 어떤 장르가 어울릴까요? 그리고 그 이유는 무엇인가요?\n(자기성찰) 본인을 세 가지 단어로 표현한다면, 어떻게 표현할 수 있는지 그리고 그 이유는 무엇인가요?\n(성격) 나의 성격이 대학 생활에 어떤 도움을 줄 수 있는지, 왜 그렇게 생각하는지 설명해 보세요.\n(스트레스 관리) 목표 달성 과정에서 본인이 사용하는 동기부여 방법은 무엇인지 그리고 그 이유는 무엇인지 설명해 보세요.\n(대인관계) 새로운 친구나 선배와 관계를 맺을 때 본인이 가장 중요하게 생각하는 점은 무엇인지 그리고 그 이유는 무엇인지 설명해 보세요.\n(미래 사회) 인공지능(AI) 사회에서 인간 고유의 역할은 무엇일지 이야기해 보세요.\n(대인관계와 공동체) 본인과 생활 방식이 다른 사람들과 함께 기숙사 생활을 해야 할 때, 상대방과의 건강한 관계를 형성하기 위해 어떤 자세와 노력을 취하겠습니까?\n(자기성찰과 책임감) 당신의 삶에서 ‘실패’라고 생각했던 경험을 단 하나만 꼽는다면 무엇이며, 그 실패를 통해 얻은 가장 중요한 깨달음은 무엇입니까?"},{"y":2026,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"인성\n(공동체의식 및 협력)","q":"(지원동기·우리 대학에 대한 이해) 우리 대학 교육 과정이나 프로그램 중 가장 기대되는 점은 무엇이며, 그것이 본인의 성장과 어떤 관련이 있다고 생각하나요?\n(가치관 탐색) ‘실패’라는 단어를 사전에서 없앨 수 있다면, 당신은 그것을 없앨 건가요, 남겨둘 건가요? 그 선택의 이유를 설명해 주세요.\n(문제 해결) 본인이 예상치 못한 문제 상황에 직면했을 때, 창의적으로 해결했던 경험이 있다면 구체적으로 말해 보세요.\n(성장 경험) 내가 꼭 지키고 싶은 원칙이 있다면 한가지 이야기하고, 그 원칙 때문에 어려움을 겪었던 사례가 있는지 말해 보세요.\n(리더십·팔로워십) 본인은 집단 활동에서 리더 역할과 구성원 역할 중 어느 역할이 더 익숙한지, 그 이유를 설명해 보세요.\n(진로 탐색) 앞으로 공부하고 싶은 주제나 관심 분야가 있다면 무엇이고, 그 이유는 무엇인가요?\n(비판적 사고) 주변에서 당연하게 여겨지는 것 중에, 본인이 비판적으로 생각해 본 경험이 있는지, 있다면 무엇인지 말해 주세요.\n(공동체의식-선택) 자신이 속한 학과에서 (법적인 문제는 아니지만) 학생들 간의 부당한 행위를 직접 목격했습니다. 이 사실을 외부에 알릴 경우, 친구 및 선후배 관계 단절, 주변의 압력 등 개인에게 불이익이 예상되는 상황이라면, 당신은 윤리적 판단에 따라 어떻게 대처할 것인지 그 이유와 함께 설명해 주십시오.\n(협력 및 배려) 당신이 속한 팀의 중요한 과제를 수행 중인데, 한 팀원이 반복적인 실수로 인해 전체 진행에 지속적인 차질이 생겼습니다. 이 상황에서 당신은 팀의 목표 달성과 팀원에 대한 배려를 동시에 고려하며, 팀원에게 어떤 말과 행동으로 대처할 것인지 협력의 가치를 중심으로 설명해 주십시오.\n(공동체의식-윤리적 선택) 팀 활동을 결정하는 투표에서 다수결의 원칙에 의해 명백하게 비효율적인 결정이 채택되었습니다. 팀 리더인 당신은 이 결정에 동의할 수 없지만, 팀원들은 다수결의 결과를 따르라고 압박합니다. 이 상황에서 당신은 어떤 선택/조치들을 취하시겠습니까?\n(공동체의식-책임감) 당신의 실수로 인해 친구가 오랫동안 준비해 온 공모전 기회를 놓치게 되는 일이 발생했습니다. 해당 친구는 이 사실을 모르고 있습니다. 당신은 친구에게 어떤 방식으로 대처할 것인지 설명해 주십시오.\n(협력 및 배려) 팀 프로젝트 마감이 임박한 상황에서 두 명의 팀원이 서로의 작업 방식과 태도를 비난하며 갈등을 겪고 있습니다. 이 상황에서 갈등을 해결하고 협력하게 만들기 위해 어떤 노력을 하시겠습니까?\n(대학 이해) 우리 대학의 인재상이나 교육 과정 중, 본인과 가장 잘 맞는 부분은 무엇인가요?\n(상상력) 하루 동안 과거로 돌아갈 수 있다면, 어느 시점으로 가서 어떤 일을 해보고 싶나요?\n(도전 경험) 스스로 한계를 넘어섰다고 느낀 경험이 있다면 구체적으로 설명해 보세요.\n(사회적 시각) 최근 사회·환경적 문제 중 관심 있는 주제를 선택하고, 본인의 생각을 말해 보세요.\n(자기주도성) 학업 외에 스스로 계획하고 실천했던 활동이 있다면 무엇이었는지 이야기해 보세요.\n(책임감) 공동 과제나 프로젝트에서 맡은 일을 끝까지 책임지고 수행했던 사례가 있나요?\n(창의성) 새로운 아이디어나 방법으로 문제를 해결해 본 경험이 있다면 구체적으로 설명해 보세요."},{"y":2026,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"발전가능성 (적성 및 고교 기간 동안의 노력)","q":"(지원동기·우리 대학에 대한 이해) 우리 대학 교육 과정이나 프로그램 중 가장 기대되는 점은 무엇이며, 그것이 본인의 성장과 어떤 관련이 있다고 생각하나요?\n(가치관 탐색) ‘실패’라는 단어를 사전에서 없앨 수 있다면, 당신은 그것을 없앨 건가요, 남겨둘 건가요? 그 선택의 이유를 설명해 주세요.\n(문제 해결) 본인이 예상치 못한 문제 상황에 직면했을 때, 창의적으로 해결했던 경험이 있다면 구체적으로 말해 보세요.\n(성장 경험) 내가 꼭 지키고 싶은 원칙이 있다면 한가지 이야기하고, 그 원칙 때문에 어려움을 겪었던 사례가 있는지 말해 보세요.\n(리더십·팔로워십) 본인은 집단 활동에서 리더 역할과 구성원 역할 중 어느 역할이 더 익숙한지, 그 이유를 설명해 보세요.\n(진로 탐색) 앞으로 공부하고 싶은 주제나 관심 분야가 있다면 무엇이고, 그 이유는 무엇인가요?\n(비판적 사고) 주변에서 당연하게 여겨지는 것 중에, 본인이 비판적으로 생각해 본 경험이 있는지, 있다면 무엇인지 말해 주세요.\n(공동체의식-선택) 자신이 속한 학과에서 (법적인 문제는 아니지만) 학생들 간의 부당한 행위를 직접 목격했습니다. 이 사실을 외부에 알릴 경우, 친구 및 선후배 관계 단절, 주변의 압력 등 개인에게 불이익이 예상되는 상황이라면, 당신은 윤리적 판단에 따라 어떻게 대처할 것인지 그 이유와 함께 설명해 주십시오.\n(협력 및 배려) 당신이 속한 팀의 중요한 과제를 수행 중인데, 한 팀원이 반복적인 실수로 인해 전체 진행에 지속적인 차질이 생겼습니다. 이 상황에서 당신은 팀의 목표 달성과 팀원에 대한 배려를 동시에 고려하며, 팀원에게 어떤 말과 행동으로 대처할 것인지 협력의 가치를 중심으로 설명해 주십시오.\n(공동체의식-윤리적 선택) 팀 활동을 결정하는 투표에서 다수결의 원칙에 의해 명백하게 비효율적인 결정이 채택되었습니다. 팀 리더인 당신은 이 결정에 동의할 수 없지만, 팀원들은 다수결의 결과를 따르라고 압박합니다. 이 상황에서 당신은 어떤 선택/조치들을 취하시겠습니까?\n(공동체의식-책임감) 당신의 실수로 인해 친구가 오랫동안 준비해 온 공모전 기회를 놓치게 되는 일이 발생했습니다. 해당 친구는 이 사실을 모르고 있습니다. 당신은 친구에게 어떤 방식으로 대처할 것인지 설명해 주십시오.\n(협력 및 배려) 팀 프로젝트 마감이 임박한 상황에서 두 명의 팀원이 서로의 작업 방식과 태도를 비난하며 갈등을 겪고 있습니다. 이 상황에서 갈등을 해결하고 협력하게 만들기 위해 어떤 노력을 하시겠습니까?\n(대학 이해) 우리 대학의 인재상이나 교육 과정 중, 본인과 가장 잘 맞는 부분은 무엇인가요?\n(상상력) 하루 동안 과거로 돌아갈 수 있다면, 어느 시점으로 가서 어떤 일을 해보고 싶나요?\n(도전 경험) 스스로 한계를 넘어섰다고 느낀 경험이 있다면 구체적으로 설명해 보세요.\n(사회적 시각) 최근 사회·환경적 문제 중 관심 있는 주제를 선택하고, 본인의 생각을 말해 보세요.\n(자기주도성) 학업 외에 스스로 계획하고 실천했던 활동이 있다면 무엇이었는지 이야기해 보세요.\n(책임감) 공동 과제나 프로젝트에서 맡은 일을 끝까지 책임지고 수행했던 사례가 있나요?\n(창의성) 새로운 아이디어나 방법으로 문제를 해결해 본 경험이 있다면 구체적으로 설명해 보세요."},{"y":2026,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"의사소통능력","q":"(지원동기·우리 대학에 대한 이해) 우리 대학 교육 과정이나 프로그램 중 가장 기대되는 점은 무엇이며, 그것이 본인의 성장과 어떤 관련이 있다고 생각하나요?\n(가치관 탐색) ‘실패’라는 단어를 사전에서 없앨 수 있다면, 당신은 그것을 없앨 건가요, 남겨둘 건가요? 그 선택의 이유를 설명해 주세요.\n(문제 해결) 본인이 예상치 못한 문제 상황에 직면했을 때, 창의적으로 해결했던 경험이 있다면 구체적으로 말해 보세요.\n(성장 경험) 내가 꼭 지키고 싶은 원칙이 있다면 한가지 이야기하고, 그 원칙 때문에 어려움을 겪었던 사례가 있는지 말해 보세요.\n(리더십·팔로워십) 본인은 집단 활동에서 리더 역할과 구성원 역할 중 어느 역할이 더 익숙한지, 그 이유를 설명해 보세요.\n(진로 탐색) 앞으로 공부하고 싶은 주제나 관심 분야가 있다면 무엇이고, 그 이유는 무엇인가요?\n(비판적 사고) 주변에서 당연하게 여겨지는 것 중에, 본인이 비판적으로 생각해 본 경험이 있는지, 있다면 무엇인지 말해 주세요.\n(공동체의식-선택) 자신이 속한 학과에서 (법적인 문제는 아니지만) 학생들 간의 부당한 행위를 직접 목격했습니다. 이 사실을 외부에 알릴 경우, 친구 및 선후배 관계 단절, 주변의 압력 등 개인에게 불이익이 예상되는 상황이라면, 당신은 윤리적 판단에 따라 어떻게 대처할 것인지 그 이유와 함께 설명해 주십시오.\n(협력 및 배려) 당신이 속한 팀의 중요한 과제를 수행 중인데, 한 팀원이 반복적인 실수로 인해 전체 진행에 지속적인 차질이 생겼습니다. 이 상황에서 당신은 팀의 목표 달성과 팀원에 대한 배려를 동시에 고려하며, 팀원에게 어떤 말과 행동으로 대처할 것인지 협력의 가치를 중심으로 설명해 주십시오.\n(공동체의식-윤리적 선택) 팀 활동을 결정하는 투표에서 다수결의 원칙에 의해 명백하게 비효율적인 결정이 채택되었습니다. 팀 리더인 당신은 이 결정에 동의할 수 없지만, 팀원들은 다수결의 결과를 따르라고 압박합니다. 이 상황에서 당신은 어떤 선택/조치들을 취하시겠습니까?\n(공동체의식-책임감) 당신의 실수로 인해 친구가 오랫동안 준비해 온 공모전 기회를 놓치게 되는 일이 발생했습니다. 해당 친구는 이 사실을 모르고 있습니다. 당신은 친구에게 어떤 방식으로 대처할 것인지 설명해 주십시오.\n(협력 및 배려) 팀 프로젝트 마감이 임박한 상황에서 두 명의 팀원이 서로의 작업 방식과 태도를 비난하며 갈등을 겪고 있습니다. 이 상황에서 갈등을 해결하고 협력하게 만들기 위해 어떤 노력을 하시겠습니까?\n(대학 이해) 우리 대학의 인재상이나 교육 과정 중, 본인과 가장 잘 맞는 부분은 무엇인가요?\n(상상력) 하루 동안 과거로 돌아갈 수 있다면, 어느 시점으로 가서 어떤 일을 해보고 싶나요?\n(도전 경험) 스스로 한계를 넘어섰다고 느낀 경험이 있다면 구체적으로 설명해 보세요.\n(사회적 시각) 최근 사회·환경적 문제 중 관심 있는 주제를 선택하고, 본인의 생각을 말해 보세요.\n(자기주도성) 학업 외에 스스로 계획하고 실천했던 활동이 있다면 무엇이었는지 이야기해 보세요.\n(책임감) 공동 과제나 프로젝트에서 맡은 일을 끝까지 책임지고 수행했던 사례가 있나요?\n(창의성) 새로운 아이디어나 방법으로 문제를 해결해 본 경험이 있다면 구체적으로 설명해 보세요."},{"y":2026,"u":"을지대학교","c1":"계열적합성\n(계열에 대한 관심과 이해, 계열 관련 활동과 진로계획)","c2":"의사소통능력","q":"미인정 결석과 지각 횟수가 다소 많은 편인데, 특별한 사유가 있나요?\n봉사 시간이 적은 편입니다. 봉사활동을 수행하는 데 있어 어려움이 있었을까요?\n세특에 리더의 자질과 역량이 보인다는 내용이 있는데, 학교생활 중 리더십을 발휘했던 경험을 이야기해 주세요.\n성적을 꾸준히 올리며 가장 힘들었던 과목은 무엇이었고, 어떤 노력을 통해 극복했나요?\n행특에 '갈등이 발생했을 때 원만하게 결론을 도출'했다는 내용이 있는데, 당시 상황과 본인만의 해결 방법을 이야기해 주세요.\n수업 시간에 학습한 약물의 '남용'과 '오용'의 개념 차이를 설명해 주세요.\n2학년 진로 탐구 시간, 소아 응급 분야 환경을 조사하면서 알게 된 사실과 본인이 느낀 점은 무엇인가요?\n3학년 교과 활동 중 '음료 종류와 섭취 시간이 치아 부식에 미치는 영향‘을 탐구한 과정과 본인의 역할에 대해 설명해 주세요.\n동아리 활동에서 세운 '평발이 무릎이나 허리에 미치는 영향을 물리치료로 완화할 수 있다'는 가설의 검증 방식과 결과는 무엇인가요?\n2학년 동아리 시간에 ‘다양한 프로그래밍 언어들을 비교’하는 활동을 진행한 것으로 보이는데, 어떤 프로그래밍 언어들을 비교하였나요?\n1학년 수업 시간에 식품첨가물을 주제로 탐구했다고 기재되어 있는데, 탐구를 통해 알게 된 내용을 설명해 주세요.\n‘세계 보편가치를 지향하는 진로 계획’과 관련하여 창체 시간에 발표한 글로벌 화장품 시장의 트렌드에 대해 설명해 주세요.\n1학년 창체 활동 중 ‘대학 전공 사전 만들기’ 시간을 통해 조사한 사회복지학에 대한 내용을 말씀해 주세요.\n3학년 진로 시간에 진행한 ‘글로벌 전공이슈 토론’에서 다룬 미성년자의 소셜미디어 사용 규제에 대한 본인의 생각은 무엇인가요?"},{"y":2026,"u":"을지대학교","c1":"발전가능성\n(창의적 문제해결력, 자기주도성)","c2":"의사소통능력","q":"미인정 결석과 지각 횟수가 다소 많은 편인데, 특별한 사유가 있나요?\n봉사 시간이 적은 편입니다. 봉사활동을 수행하는 데 있어 어려움이 있었을까요?\n세특에 리더의 자질과 역량이 보인다는 내용이 있는데, 학교생활 중 리더십을 발휘했던 경험을 이야기해 주세요.\n성적을 꾸준히 올리며 가장 힘들었던 과목은 무엇이었고, 어떤 노력을 통해 극복했나요?\n행특에 '갈등이 발생했을 때 원만하게 결론을 도출'했다는 내용이 있는데, 당시 상황과 본인만의 해결 방법을 이야기해 주세요.\n수업 시간에 학습한 약물의 '남용'과 '오용'의 개념 차이를 설명해 주세요.\n2학년 진로 탐구 시간, 소아 응급 분야 환경을 조사하면서 알게 된 사실과 본인이 느낀 점은 무엇인가요?\n3학년 교과 활동 중 '음료 종류와 섭취 시간이 치아 부식에 미치는 영향‘을 탐구한 과정과 본인의 역할에 대해 설명해 주세요.\n동아리 활동에서 세운 '평발이 무릎이나 허리에 미치는 영향을 물리치료로 완화할 수 있다'는 가설의 검증 방식과 결과는 무엇인가요?\n2학년 동아리 시간에 ‘다양한 프로그래밍 언어들을 비교’하는 활동을 진행한 것으로 보이는데, 어떤 프로그래밍 언어들을 비교하였나요?\n1학년 수업 시간에 식품첨가물을 주제로 탐구했다고 기재되어 있는데, 탐구를 통해 알게 된 내용을 설명해 주세요.\n‘세계 보편가치를 지향하는 진로 계획’과 관련하여 창체 시간에 발표한 글로벌 화장품 시장의 트렌드에 대해 설명해 주세요.\n1학년 창체 활동 중 ‘대학 전공 사전 만들기’ 시간을 통해 조사한 사회복지학에 대한 내용을 말씀해 주세요.\n3학년 진로 시간에 진행한 ‘글로벌 전공이슈 토론’에서 다룬 미성년자의 소셜미디어 사용 규제에 대한 본인의 생각은 무엇인가요?"},{"y":2026,"u":"을지대학교","c1":"자세 및 태도\n(면접태도 및 자세, 제출서류 진위여부)","c2":"의사소통능력","q":"미인정 결석과 지각 횟수가 다소 많은 편인데, 특별한 사유가 있나요?\n봉사 시간이 적은 편입니다. 봉사활동을 수행하는 데 있어 어려움이 있었을까요?\n세특에 리더의 자질과 역량이 보인다는 내용이 있는데, 학교생활 중 리더십을 발휘했던 경험을 이야기해 주세요.\n성적을 꾸준히 올리며 가장 힘들었던 과목은 무엇이었고, 어떤 노력을 통해 극복했나요?\n행특에 '갈등이 발생했을 때 원만하게 결론을 도출'했다는 내용이 있는데, 당시 상황과 본인만의 해결 방법을 이야기해 주세요.\n수업 시간에 학습한 약물의 '남용'과 '오용'의 개념 차이를 설명해 주세요.\n2학년 진로 탐구 시간, 소아 응 했습니까?\n평상시, 시간을 효율적으로 사용하기 위해 했던 노력(경험)에 대해 이야기해 주세요.\n대학에 입학한 후 어려운 이론이나 문제를 접했을 때 해결하기 위해 어떤 노력과 활동을 수행할 수 있을까요?"},{"y":2026,"u":"한국공학대학교","c1":"인성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 ○○관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오.\n○○학과에 진학하여 가장 듣고 싶은 수업이 있다면? 그 이유는 무엇인지?\n고교생활 중 문제해결을 위해 남들과는 다른 자신만의 아이디어를 도출해서 일을 잘 해냈던 경험에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},{"y":2026,"u":"한국공학대학교","c1":"전공적합성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 ○○관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오.\n○○학과에 진학하여 가장 듣고 싶은 수업이 있다면? 그 이유는 무엇인지?\n고교생활 중 문제해결을 위해 남들과는 다른 자신만의 아이디어를 도출해서 일을 잘 해냈던 경험에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},{"y":2026,"u":"한국공학대학교","c1":"발전가능성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 ○○관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오.\n○○학과에 진학하여 가장 듣고 싶은 수업이 있다면? 그 이유는 무엇인지?\n고교생활 중 문제해결을 위해 남들과는 다른 자신만의 아이디어를 도출해서 일을 잘 해냈던 경험에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},{"y":2026,"u":"한국항공대학교","c1":"학업역량","c2":"의사소통능력","q":"로켓 추력 실험에서 겪었던 실패와 이를 극복하기 위한 노력에 관해 설명해 주세요.\n미인정 결석, 지각, 조퇴가 다수인 이유를 설명해 주세요.\n스텔스 은신 기술을 탐구하면서 적외선 센서 실험 중 가장 흥미롭거나 어려웠던 점은 무엇인가요.\n파이선으로 프로그래밍이나 수학 문제를 풀었던 경험이 있다면 말씀해 주세요.\n리더 경험이 많은데 힘들거나 어려웠던 점이 있다면 말씀해 주세요.\n동아리 및 토론 활동에서 다뤘던 이슈 중 의견이 첨예하게 갈렸던 한 사례를 골라 그때 사용한 갈등 해소 기법과 토론 결과에 대해 말해보세요.\n컴퓨터 공학에 관심이 많았으나, 그와는 다른 모집단위에 지원했습니다. 우리 모집단위에 지원하게 된 계기와 졸업 후 계획에 대해 설명해 주세요."},{"y":2026,"u":"한국항공대학교","c1":"진로역량","c2":"의사소통능력","q":"로켓 추력 실험에서 겪었던 실패와 이를 극복하기 위한 노력에 관해 설명해 주세요.\n미인정 결석, 지각, 조퇴가 다수인 이유를 설명해 주세요.\n스텔스 은신 기술을 탐구하면서 적외선 센서 실험  후 자신이 배우고 싶은 것을 구체적으로 언급하고 대학생활 계획에 대해 말해주세요.\n(영미문화학) 영미문화학에서 무엇을 배우고 싶으며, 배운 내용이 자신의 꿈 실현에 어떤 도움을 줄 것이라고 생각하는지 조리 있게 말해 보세요.\n(문예창작학) 가장 감명 깊게 읽은 책을 한 권 고르고 그 이유를 말해 보시오.\n(한국어문학) 한국 문학 작품을 통해 외국인에게 한국어를 가르치고자 할 때 어떤 점을 염두에 두어야 할지 자신의 생각을 이야기하시오.\n(한국사학) 한국사학과를 지원하게 된 동기는 무엇이며, 한국사학이 어떤 학문이며 자기 자신과 우리 사회에 어떤 기여를 할 수 있는지를 말해보시오.\n(중국어문화콘텐츠학) 중국어를 배우려는 이유와 우리 전공 졸업 후 이룰 자신의 모습에 대해 이야기해 보시오.\n(디지털영상문화콘텐츠학) 디지털영상문화콘텐츠학전공에서 무엇을 배우기를 기대하는지 이야기해 보세요. 그리고 그런 배움으로 쌓은 전문성을 졸업 후에 어떻게 발휘하고 싶은지 미래 비전을 이야기해 보시오.\n(일본학) 최근 일본의 정치, 사회, 문화, 역사 분야 중에서 자신이 가장 관심을 갖고 있는 쟁점(이슈)이나 현상 한 가지를 골라 그 내용을 소개하고, 그에 대한 자신의 생각(맥락이나 의미, 긍정적 측면과 비판적 측면, 그렇게 판단하는 이유 등)을 말해보세요\n(동아시아통상학) 동아시아통상학 전공에 지원하게 된 동기는 무엇이며, 이 전공을 통해 쌓게 될 지식과 경험이 본인의 진로 목표에 어떤 도움이 될지 말해보시오.\n(경제금융학) 디지털 플랫폼 경제의 확산(예컨대 카카오택시)은 일부 개인과 기업에게는 기회와 혁신을 가져오지만, 개인정보유출, 시장독점, 불평등 문제를 야기하고 있습니다.디지털 경제의 발전을 시장의 자율에 맡길 것인지, 아니면 정부의 규제에 맡길 것인지에 대해 학생의 의견을 말해보세요.\n(국제관계학) 북-중-러 결속이 강화되는 조짐이 있는데 그 이유를 설명하고 한국이 어떻게 대응해야 하는지 제안해 보시오.\n(공공인재 빅데이터 융합학) AI와 빅데이터가 행정과 공공정책에서 활용되는 실제 사례를 제시하고 그 중요성과 의미에 대해  명하시오.\n(경영학) 현재 AI 기술은 기업의 주요 의사결정을 결정하는데 매우 중요한 역할을 담당하고 있습니다. 이러한 상황에서 앞으로의 경영자에게 가장 중요한 역량은 무엇이라고 생각하나요? 또한 이러한 상황에서 인간만이 할 수 있는 일은 무엇이라고 생각하나요?\n(IT경영학) 디지털 트랜스포메이션 시대에 생성형 AI, Big Data, Cloud computing 등의 핵심기술이 주요 화두로 등장하고 있습니다. 이러한 기술들 중 하나를 선택하여 기업경영에 어떻게 활용되고 있는지 활용된 사레를 제시하고, 기업 경쟁력을 어떻게 높일 수 있었는지에 대해 설명하세요. 또한 학생 본인은 IT 경영학을 전공하면서 사회 진출을 위한 개인역량을 어떻게 강화할 것인지 설명하시오.\n(글로벌비즈니스학) 글로벌비즈니스학부에 지원하게 된 동기는 무엇이며, ESG 경영에 대하여 설명해보시오.\n(미디어영상광고홍보학) 최근 주목받고 있는 다양한 미디어 트렌드(숏폼, AI·디지털 콘텐츠, 소셜미디어 등) 중 본인이 주목하는 한 가지를 선택하고, 본인의 생각(선택한 이유, 장점과 단점, 앞으로의 전망 등)을 자유롭게 이야기해 보세요.\n(사회학) 지난 21대 대선 출구조사에 따르면 모든 연령층 가운데 남녀간 투표 성향의 차이가 가장 컸던것은 20대 이하(18세~29세)였습니다(예컨대 여성은 이재명 후보에게 약 58% 투표했던데 반해, 남성은 약 24% 투표했다). 20대 이하 남녀의 정치적 지향이 이렇게 크게 벌어진 원인이 무엇인지 설명해보시오.\n(사회복지학) 우리나라는 국민의 사회보장을 위해 다양한 복지제도와 서비스가 있습니다. 그러나 안타깝게도 복지사각지대는 발생하고 있습니다. 본인이 생각하기에 복지사각지대와 관련 있는 사건 중에서 가장 안타까운 사건이 무엇인지 설명하고, 그 원인과 해결방안에 대한 본인의 의견을 제시해 보시오.\n(재활상담학) 최근 우리 사회에서 장애(신체적/심리적 장애 모두 포함), 재활상담(사회적응, 직업, 정신건강)과 관련해 제기된 이슈는 무엇이고 그에 대한 본인의 견해를 피력하시오.\n(심리·아동학) 현대사회에 가장 큰 문제점이 무엇이라 생각하며, 그것에 대해 심리학자 또는 아동학자로서의 해답은 무엇이라 생각하는지 말해보시오.\n(금융공학) 가상화폐에 대하여 기존 금융시장에 미치는 영향을 중심으로 설명하세요.\n(빅데이터융합학) 현대의 경영환경과 정부정책 결정 과정에서 빅데이터가 필수적으로 활용되고 있습니다. 지원자가 관심있는 빅데이터 활용 사례를 하나 제시하고, 그 사례에서 빅데이터 활용 가치와 의의는 무엇인지 설명하시오.\n(AI·SW학) 인공지능(AI), 데이터사이언스, 지능형 사물인터넷(AIoT), XR콘텐츠, 디지털라이프케어(인지감성 컴퓨팅, 앰비언트컴퓨팅 등) 중에서 한 가지를 선택한 후\n(1) 선택한 분야에 대해 기본 개념을 간략히 설명하고,\n(2) 선택한 분야가 앞으로 우리 현실세계에 어떻게 적용될 것으로 예상하는지,\n(3) 그리고 AI·SW 분야에서 추가적으로 연구/개발되어야 하는 기술은 무엇이라 생각하는지 답해보시오.\n(AI시스템반도체학) 본인이 직접 실험하거나 연구해보고 싶은 AI와 반도체 융합 주제는 무엇인가요?"},{"y":2026,"u":"한양대학교(에리카)","c1":"통합적 사고역량\n(교과 활동 확인, 자기주도적 탐구 역량)","c2":"의사소통능력","q":"○○ 과목에서 ○○을 주제로 토론에 참가한 경험이 있는데 본인과 반대 입장의 근거는 무엇이었는지 설명하시오.\n○○ 과목의 세부능력 및 특기사항을 보면 ○○에 대해 관심이 많다고 했는데 ○○의 원리에 대해 설명하시오.\n○○ 과정에서 이견 또는 갈등을 겪었을 때 이를 효과적으로 극복한 경험이 있다면 구체적으로 설명하시오."},{"y":2026,"u":"한양대학교(에리카)","c1":"의사소통 역량\n(협업활동 확인, 면접 태도)","c2":"의사소통능력","q":"○○ 과목에서 ○○을 주제로 토론에 참가한 경험이 있는데 본인과 반대 입장의 근거는 무엇이었는지 설명하시오.\n○○ 과목의 세부능력 및 특기사항을 보면 ○○에 대해 관심이 많다고 했는데 ○○의 원리에 대해 설명하시오.\n○○ 과정에서 이견 또는 갈등을 겪었을 때 이를 효과적으로 극복한 경험이 있다면 구체적으로 설명하시오."},{"y":2026,"u":"협성대학교","c1":"미래역량우수자","c2":"인성","q":"평소 타인의 어려움을 해결하기 위해 노력한 경험을 말해보고, 그 경험이 자신에게 어떠한 영향을 주었는지 말해보세요.\n공동체의 규칙이나 약속을 지키기 위해 자신의 불편을 감수한 경험이 있나요? 그 경험과 이유를 말해보세요."},{"y":2026,"u":"협성대학교","c1":"미래역량우수자","c2":"시사상식","q":"AI 기술이 자신의 관심 분야에서 어떻게 활용될 수 있으며, 그에 따른 긍정적 및 부정적 영향은 무엇일지 말해보세요.\n자신의 진로와 관련된 관심 분야에서 최근 나타나고 있는 변화 하나를 소개하고, 그 변화가 어떤 의미를 가지는지 말해보세요.\n기후 변화 대응을 위한 국제사회의 노력이 이어지고 있습니다. 우리가 현실적으로 추진할 수 있는 기후 변화 대응 전략에는 어떤 것이 있을지 말해보세요."},{"y":2026,"u":"협성대학교","c1":"협성창의인재","c2":"전공\n적합성 및 발전\n가능성","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\n지원자의 장점은 무엇이라고 생각하는가?\n학생부 기재사항에 대한 구체적인 질문 등"},{"y":2026,"u":"협성대학교","c1":"협성창의인재","c2":"인성적 자질","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\n지원자의 장점은 무엇이라고 생각하는가?\n학생부 기재사항에 대한 구체적인 질문 등"},{"y":2026,"u":"협성대학교","c1":"협성창의인재","c2":"종합적\n사고력 및 의사소통","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\  5가지 방법을 설명 후 교사로서 학생들 자신감 향상시킬 수 있는 방안을 얘기해보세요.\n- (2-영어2) ‘교사와 학생 간 상호작용의 중요성’을 주제로 한 에세이 작성했다고 나오는데, 교사와 학생 간의 상호작용이 학업 성장과 개인적 발전에 끼치는 영향에 대해 설명해 보고, 그것이 초등 교사에게 줄 수 있는 시사점은 무엇일까요?\n- (2-문학) ‘소년, 독립을 위한 소리 없는 외침’이라는 시에서 시인이 느끼는 죄의식과 자기 성찰에 대해 해석했던 내용을 말해보시오.\n- (영어1) 평등한 교육을 위한 지원 방안을 연구하고 싶다는 포부를 밝혔다고 하는데, 학생이 생각하는 평등한 교육이 무엇인지, 그것을 위한 교사의 노력은 무엇이 필요한지 말해보세요.\n- (3-영어2) '게임을 교육적 전략으로써 성공적으로 활용하는 방안은 무엇인가'에 대한 발표 과제 수행했다고 나오는데, 그 내용은 무엇인지, 초등교육에 어떤 시사점 줄 수 있는지 설명해보세요.\n- (1학년 1학기 과학탐구실험) 인공지능의 발달과 교육현장의 변화를 연결 지어 기사문을 작성하였던 내용을 바탕으로 자신의 견해를 말씀해주세요.\n- (윤리와 사상2) 다문화 교육에 관심을 가지고 스토아 학파의 자연법 이론을 적용하여 분석을 했다고 하는데, 스토아 학파의 자연법 이론이 무엇인지 설명하고, 분석의 결과는 무엇인지 말해보세요.\n- (3-심화국어) 최근 논란인 문해력 부족 현상에 관심 갖고 '학생 문해력  부족  현상의  해결'을 주제 로 한 자기주도적 탐구 보고서를 작성한 과정을 설명하시오.\n- (3-화법과 작문)존 듀이의 교육 철학을 분석하여 교육의 본질이 인격 형성과 공동체 역량 강화에 있다고 주장한 근거를 제시하시오.\n- (동아리 1-3) 의료, 역사, 경제 등 다양한 분야에 관심을 가지고 진로를 탐색하고 동아리 활동을 해온 것으로 보입니다. 이와 같은 탐색 활동 중 자신의 초등교육 진로선택에 영향을 준 것이 있다면 이야기해보세요.\n- (행특2) 학업의지가 커 부족한 과목을 보완하는 모습이 보인다는 기술과 함께 실제로 성적도 꾸준히 향상한 것으로 보입니다. 이런 경험 바탕으로 할 때 기초 학습 성취가 부족한 학생들이 포함된 학급에서 어떻게 가르칠 수 있다고 생각하는지 말해보세요.\n- (2-창체 동아리) 동아리 회장으로서 외부 활동과 협력을 통해 동아리의 인지도를 높이는 데 기여한 사례를 말씀해주세요.\n- (3-창체 진로) 1학기 공강 프로그램 및 프로젝트형 봉사활동으로 수학 교과에 대한 멘토-멘티 활동을 한 경험에서 자신의 역할을 말해주세요.\n- (3 동아리) 교직과 관련하여 최근 읽었던 책 '미래교육, 교사가 디자인하다(곽덕주 외)'의 주요 내용은 무엇이며, 해당 도서를 통해 교직 윤리와 교직관에 대해 어떠한 고민과 탐색을 할 수 있었는지 설명해 주세요.\n- (3 진로) 진로 활동에서 탐구한 '느린 학습자를 위한 맞춤형 교육'에 대해 본인의 교사로서의 가 치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (행특) 인성 칭찬, 학교현장에서 인성교육을 중시하는데 초등학교 교사가 된다면 본인의 학창시 절을 비추어 어떻게 교육하는 것이 좋을까요?\n- (행특) 인공지능 교과서에 대한 기사를 소개하였다는 이야기가 있는데, 초등 맥락에서 디지털 교과서가 가지는 강점과 한계에 대해 이야기하고, 어떻게 교실 수준에서 한계를 보완할 수 있을지 이야기해보세요.\n- (3 진로) 진로 활동에서 탐구한 '디지털 격차와 교육적 대응 문제'에 대해 본인의 교사로서의 가치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (1-진로) 수학교사/수학교육과 희망했는데, 초등교육과 지원 동기 및 초등교사 부합 자질 보여주는 고교 활동 사례를 이야기해보세요.\n- (진로3) 학급 자율 주제 탐구 활동으로 '디지털 정보 탐구'를 초등 맥락에서 수행했다고 하는데, 초등학생에게 디지털 교육에서 어떤 부분이 가장 중요하다고 생각하는지 이야기해보세요.\n- (동아리1-3) 생명과학 등 탐색을 하다가 특수 교육에 대한 관심으로 진로 탐색이 확장된 것으로 보입니다. 특수 교육 학과가 아닌 초등교육을 선택한 이유가 있을까요?\n- (자율2) 사회 참여 프로젝트 활동에 대한 기록이 있는데, 초등학교 단계에서 사회 참여 프로젝트 활동이 가능하다고 생각하는지, 자신의 교실에서 해보고 싶은 프로젝트가 있다면 이야기해보세요.\n- (3-진로) 특수교사 앤 설리번을 롤모델로 선정하고 장애 학생 교육 방법론과 교사의 역할에 대해 심도있게 분석했다는 기록이 있습니다. 분석한 내용을 이야기해보세요.\n- (3-창체 진로) 독서를 통한 철학적 성찰과 실험을 통한 탐구 역량 향상을 병행하며 교육 분야의 진로에 대한 목표의식을 더욱 확고히 하게 된 과정에 대해 말해보시오.\n- (3-행동) 예의와 존중을 중요시하면서, 학우들이 때때로 교사에게 예의 없는 행동을 보일 때 먼저 나서 이를 중재하고 어른을 공경하는 태도를 보였던 경험을 말해보시오.\n- (2-진로) 미디어 리터러시의 이해 특강에 참여한 후 미디어 리터러시 교육의 중요성을 인식하였는데, 중요성은 무엇이며 초등학생들에게 미디어 리터러시를 함양시키기 위해서는 교사는 어떤 노력을 해야 할까요?\n- (3학년 출결) 3학년 출결 미인정 결석 5회, 미인정 조퇴 3회가 있고, 질병 결석 6회, 질병 조퇴도 1회가 있는데, 이에 대해 보충 설명해주기 바랍니다. (1학년 행특기록: 뛰어난 자기관리역량이 돋보임과 배치)\n- (1-동아리) 초등학생 멘토링 중 레포(라포)형성하는 모습이 인상적이라는 교사의 평이 있습니다. 라포형성의 중요성과 본인만의 라포형성 방법에 대해 이야기해보세요.\n- (1-3동아리) 3년간 사서부, 도서부를 꾸준히 하였습니다. 초등학생에게 독서의 중요성을 알려주기 위한 효과적인 방법이 있다면 무엇이 있을까요?"},{"y":2026,"u":"광주교육대학교","c1":"교직적합성","c2":"태도","q":"- (1-수학) '나만의 스팀 수업' 활동에서 수학과 영어를 융합한 수업을 계획한 과정과 결과를 설명하시오.\n- (3-심화영어독해) 인공지능이 교사의 역할을 대체할 수 있다'라는 주장에 대해 반론을 펼쳤다고 되어있는데 초등교사의 역할과 관련해 구체적 근거와 예시를 들어 설명해보세요.\n- (1-통합사회) 다양한 문화권의 특징과 삶의 방식 탐구하셨는데 초등교실에서 다문화가정 학생들과 일반 학생들이 어울리도록 지도할 수 있는 방안이 있다면 이야기해 보세요.\n- (3-사회문제탐구) '생산 가능 인구 감소와 노동 시장 변화'에 대해 탐구한 과정을 설명하고 교육분 야에서 미칠 수 있는 영향이나 예상되는 현상은 무엇이 있겠는지 설명해 주세요.\n- (3-사회문화) 교사 집단을 준거 집단으로 설정하여 자신의 역할과 삶을 연결지어 설명했다고 하는데, 교사로서 역할과 자신의 삶이 어떻게 연결되는지 구체적으로 사례를 들어 말해보세요.\n- (2-영어1) 스티브 잡스의 스탠퍼드 대학 졸업 연설문 선정해 활동했다고 나오는데, 연설의 주요 내용 설명해보고 느낀 점, 본인 삶에의 적용 등에 대해 설명해 보세요.\n- (3-논술) 고교학점제가 가진 순기능과 정책으로 인해 나타날 수 있는 역기능은 무엇이 있겠는지 탐구한 과정과 결과를 중심으로 설명해 주세요.\n- (1-통합사회) 교육과 불평등의 문제, 특히 지역 간 격차에 관심을 가지고 조사 활동을 했다고 하는데, 초등 맥락에서도 교육 불평등이 지역에 따라 나타난다고 생각하는지, 어떤 해결책이 필요하다고 생각하는지 말해주세요.\n- (3-진로선택) ‘초등학교 체험학습 중단’ 이슈를 탐색했다고 나오는데, 그 내용은 무엇인가? 지원자가 생각하는 바람직한 해결책은?\n- (3-교육학) '구성주의와 본질주의'라는 두 교육을 학습하고, 자신에게 더 적합한 교육관을 선택하여 그 이유를 명확히 설명했던 내용을 말해보시오.\n- (2-영어1) 아동 놀이와 교육의 관계에 대한 영어 지문 분석을 통해 아동 발달의 핵심 개념을 탐구했다고 나오는데, 이 내용 설명해 보고 초등교사에게 어떤 시사점 주는지?\n- (3-영어독해와작문) '자신감키우는법'에 대한 영어강의 시청하셨는데, 자신감 있는 발표하는 5가지 방법을 설명 후 교사로서 학생들 자신감 향상시킬 수 있는 방안을 얘기해보세요.\n- (2-영어2) ‘교사와 학생 간 상호작용의 중요성’을 주제로 한 에세이 작성했다고 나오는데, 교사와 학생 간의 상호작용이 학업 성장과 개인적 발전에 끼치는 영향에 대해 설명해 보고, 그것이 초등 교사에게 줄 수 있는 시사점은 무엇일까요?\n- (2-문학) ‘소년, 독립을 위한 소리 없는 외침’이라는 시에서 시인이 느끼는 죄의식과 자기 성찰에 대해 해석했던 내용을 말해보시오.\n- (영어1) 평등한 교육을 위한 지원 방안을 연구하고 싶다는 포부를 밝혔다고 하는데, 학생이 생각하는 평등한 교육이 무엇인지, 그것을 위한 교사의 노력은 무엇이 필요한지 말해보세요.\n- (3-영어2) '게임을 교육적 전략으로써 성공적으로 활용하는 방안은 무엇인가'에 대한 발표 과제 수행했다고 나오는데, 그 내용은 무엇인지, 초등교육에 어떤 시사점 줄 수 있는지 설명해보세요.\n- (1학년 1학기 과학탐구실험) 인공지능의 발달과 교육현장의 변화를 연결 지어 기사문을 작성하였던 내용을 바탕으로 자신의 견해를 말씀해주세요.\n- (윤리와 사상2) 다문화 교육에 관심을 가지고 스토아 학파의 자연법 이론을 적용하여 분석을 했다고 하는데, 스토아 학파의 자연법 이론이 무엇인지 설명하고, 분석의 결과는 무엇인지 말해보세요.\n- (3-심화국어) 최근 논란인 문해력 부족 현상에 관심 갖고 '학생 문해력  부족  현상의  해결'을 주제 로 한 자기주도적 탐구 보고서를 작성한 과정을 설명하시오.\n- (3-화법과 작문)존 듀이의 교육 철학을 분석하여 교육의 본질이 인격 형성과 공동체 역량 강화에 있다고 주장한 근거를 제시하시오.\n- (동아리 1-3) 의료, 역사, 경제 등 다양한 분야에 관심을 가지고 진로를 탐색하고 동아리 활동을 해온 것으로 보입니다. 이와 같은 탐색 활동 중 자신의 초등교육 진로선택에 영향을 준 것이 있다면 이야기해보세요.\n- (행특2) 학업의지가 커 부족한 과목을 보완하는 모습이 보인다는 기술과 함께 실제로 성적도 꾸준히 향상한 것으로 보입니다. 이런 경험 바탕으로 할 때 기초 학습 성취가 부족한 학생들이 포함된 학급에서 어떻게 가르칠 수 있다고 생각하는지 말해보세요.\n- (2-창체 동아리) 동아리 회장으로서 외부 활동과 협력을 통해 동아리의 인지도를 높이는 데 기여한 사례를 말씀해주세요.\n- (3-창체 진로) 1학기 공강 프로그램 및 프로젝트형 봉사활동으로 수학 교과에 대한 멘토-멘티 활동을 한 경험에서 자신의 역할을 말해주세요.\n- (3 동아리) 교직과 관련하여 최근 읽었던 책 '미래교육, 교사가 디자인하다(곽덕주 외)'의 주요 내용은 무엇이며, 해당 도서를 통해 교직 윤리와 교직관에 대해 어떠한 고민과 탐색을 할 수 있었는지 설명해 주세요.\n- (3 진로) 진로 활동에서 탐구한 '느린 학습자를 위한 맞춤형 교육'에 대해 본인의 교사로서의 가 치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (행특) 인성 칭찬, 학교현장에서 인성교육을 중시하는데 초등학교 교사가 된다면 본인의 학창시 절을 비추어 어떻게 교육하는 것이 좋을까요?\n- (행특) 인공지능 교과서에 대한 기사를 소개하였다는 이야기가 있는데, 초등 맥락에서 디지털 교과서가 가지는 강점과 한계에 대해 이야기하고, 어떻게 교실 수준에서 한계를 보완할 수 있을지 이야기해보세요.\n- (3 진로) 진로 활동에서 탐구한 '디지털 격차와 교육적 대응 문제'에 대해 본인의 교사로서의 가치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (1-진로) 수학교사/수학교육과 희망했는데, 초등교육과 지원 동기 및 초등교사 부합 자질 보여주는 고교 활동 사례를 이야기해보세요.\n- (진로3) 학급 자율 주제 탐구 활동으로 '디지털 정보 탐구'를 초등 맥락에서 수행했다고 하는데, 초등학생에게 디지털 교육에서 어떤 부분이 가장 중요하다고 생각하는지 이야기해보세요.\n- (동아리1-3) 생명과학 등 탐색을 하다가 특수 교육에 대한 관심으로 진로 탐색이 확장된 것으로 보입니다. 특수 교육 학과가 아닌 초등교육을 선택한 이유가 있을까요?\n- (자율2) 사회 참여 프로젝트 활동에 대한 기록이 있는데, 초등학교 단계에서 사회 참여 프로젝트 활동이 가능하다고 생각하는지, 자신의 교실에서 해보고 싶은 프로젝트가 있다면 이야기해보세요.\n- (3-진로) 특수교사 앤 설리번을 롤모델로 선정하고 장애 학생 교육 방법론과 교사의 역할에 대해 심도있게 분석했다는 기록이 있습니다. 분석한 내용을 이야기해보세요.\n- (3-창체 진로) 독서를 통한 철학적 성찰과 실험을 통한 탐구 역량 향상을 병행하며 교육 분야의 진로에 대한 목표의식을 더욱 확고히 하게 된 과정에 대해 말해보시오.\n- (3-행동) 예의와 존중을 중요시하면서, 학우들이 때때로 교사에게 예의 없는 행동을 보일 때 먼저 나서 이를 중재하고 어른을 공경하는 태도를 보였던 경험을 말해보시오.\n- (2-진로) 미디어 리터러시의 이해 특강에 참여한 후 미디어 리터러시 교육의 중요성을 인식하였는데, 중요성은 무엇이며 초등학생들에게 미디어 리터러시를 함양시키기 위해서는 교사는 어떤 노력을 해야 할까요?\n- (3학년 출결) 3학년 출결 미인정 결석 5회, 미인정 조퇴 3회가 있고, 질병 결석 6회, 질병 조퇴도 1회가 있는데, 이에 대해 보충 설명해주기 바랍니다. (1학년 행특기록: 뛰어난 자기관리역량이 돋보임과 배치)\n- (1-동아리) 초등학생 멘토링 중 레포(라포)형성하는 모습이 인상적이라는 교사의 평이 있습니다. 라포형성의 중요성과 본인만의 라포형성 방법에 대해 이야기해보세요.\n- (1-3동아리) 3년간 사서부, 도서부를 꾸준히 하였습니다. 초등학생에게 독서의 중요성을 알려주기 위한 효과적인 방법이 있다면 무엇이 있을까요?"},{"y":2026,"u":"광주교육대학교","c1":"교직인성","c2":"태도","q":"- (1-수학) '나만의 스팀 수업' 활동에서 수학과 영어를 융합한 수업을 계획한 과정과 결과를 설명하시오.\n- (3-심화영어독해) 인공지능이 교사의 역할을 대체할 수 있다'라는 주장에 대해 반론을 펼쳤다고 되어있는데 초등교사의 역할과 관련해 구체적 근거와 예시를 들어 설명해보세요.\n- (1-통합사회) 다양한 문화권의 특징과 삶의 방식 탐구하셨는데 초등교실에서 다문화가정 학생들과 일반 학생들이 어울리도록 지도할 수 있는 방안이 있다면 이야기해 보세요.\n- (3-사회문제탐구) '생산 가능 인구 감소와 노동 시장 변화'에 대해 탐구한 과정을 설명하고 교육분 야에서 미칠 수 있는 영향이나 예상되는 현상은 무엇이 있겠는지 설명해 주세요.\n- (3-사회문화) 교사 집단을 준거 집단으로 설정하여 자신의 역할과 삶을 연결지어 설명했다고 하는데, 교사로서 역할과 자신의 삶이 어떻게 연결되는지 구체적으로 사례를 들어 말해보세요.\n- (2-영어1) 스티브 잡스의 스탠퍼드 대학 졸업 연설문 선정해 활동했다고 나오는데, 연설의 주요 내용 설명해보고 느낀 점, 본인 삶에의 적용 등에 대해 설명해 보세요.\n- (3-논술) 고교학점제가 가진 순기능과 정책으로 인해 나타날 수 있는 역기능은 무엇이 있겠는지 탐구한 과정과 결과를 중심으로 설명해 주세요.\n- (1-통합사회) 교육과 불평등의 문제, 특히 지역 간 격차에 관심을 가지고 조사 활동을 했다고 하는데, 초등 맥락에서도 교육 불평등이 지역에 따라 나타난다고 생각하는지, 어떤 해결책이 필요하다고 생각하는지 말해주세요.\n- (3-진로선택) ‘초등학교 체험학습 중단’ 이슈를 탐색했다고 나오는데, 그 내용은 무엇인가? 지원자가 생각하는 바람직한 해결책은?\n- (3-교육학) '구성주의와 본질주의'라는 두 교육을 학습하고, 자신에게 더 적합한 교육관을 선택하여 그 이유를 명확히 설명했던 내용을 말해보시오.\n- (2-영어1) 아동 놀이와 교육의 관계에 대한 영어 지문 분석을 통해 아동 발달의 핵심 개념을 탐구했다고 나오는데, 이 내용 설명해 보고 초등교사에게 어떤 시사점 주는지?\n- (3-영어독해와작문) '자신감키우는법'에 대한 영어강의 시청하셨는데, 자신감 있는 발표하는 5가지 방법을 설명 후 교사로서 학생들 자신감 향상시킬 수 있는 방안을 얘기해보세요.\n- (2-영어2) ‘교사와 학생 간 상호작용의 중요성’을 주제로 한 에세이 작성했다고 나오는데, 교사와 학생 간의 상호작용이 학업 성장과 개인적 발전에 끼치는 영향에 대해 설명해 보고, 그것이 초등 교사에게 줄 수 있는 시사점은 무엇일까요?\n- (2-문학) ‘소년, 독립을 위한 소리 없는 외침’이라는 시에서 시인이 느끼는 죄의식과 자기 성찰에 대해 해석했던 내용을 말해보시오.\n- (영어1) 평등한 교육을 위한 지원 방안을 연구하고 싶다는 포부를 밝혔다고 하는데, 학생이 생각하는 평등한 교육이 무엇인지, 그것을 위한 교사의 노력은 무엇이 필요한지 말해보세요.\n- (3-영어2) '게임을 교육적 전략으로써 성공적으로 활용하는 방안은 무엇인가'에 대한 발표 과제 수행했다고 나오는데, 그 내용은 무엇인지, 초등교육에 어떤 시사점 줄 수 있는지 설명해보세요.\n- (1학년 1학기 과학탐구실험) 인공지능의 발달과 교육현장의 변화를 연결 지어 기사문을 작성하였던 내용을 바탕으로 자신의 견해를 말씀해주세요.\n- (윤리와 사상2) 다문화 교육에 관심을 가지고 스토아 학파의 자연법 이론을 적용하여 분석을 했다고 하는데, 스토아 학파의 자연법 이론이 무엇인지 설명하고, 분석의 결과는 무엇인지 말해보세요.\n- (3-심화국어) 최근 논란인 문해력 부족 현상에 관심 갖고 '학생 문해력  부족  현상의  해결'을 주제 로 한 자기주도적 탐구 보고서를 작성한 과정을 설명하시오.\n- (3-화법과 작문)존 듀이의 교육 철학을 분석하여 교육의 본질이 인격 형성과 공동체 역량 강화에 있다고 주장한 근거를 제시하시오.\n- (동아리 1-3) 의료, 역사, 경제 등 다양한 분야에 관심을 가지고 진로를 탐색하고 동아리 활동을 해온 것으로 보입니다. 이와 같은 탐색 활동 중 자신의 초등교육 진로선택에 영향을 준 것이 있다면 이야기해보세요.\n- (행특2) 학업의지가 커 부족한 과목을 보완하는 모습이 보인다는 기술과 함께 실제로 성적도 꾸준히 향상한 것으로 보입니다. 이런 경험 바탕으로 할 때 기초 학습 성취가 부족한 학생들이 포함된 학급에서 어떻게 가르칠 수 있다고 생각하는지 말해보세요.\n- (2-창체 동아리) 동아리 회장으로서 외부 활동과 협력을 통해 동아리의 인지도를 높이는 데 기여한 사례를 말씀해주세요.\n- (3-창체 진로) 1학기 공강 프로그램 및 프로젝트형 봉사활동으로 수학 교과에 대한 멘토-멘티 활동을 한 경험에서 자신의 역할을 말해주세요.\n- (3 동아리) 교직과 관련하여 최근 읽었던 책 '미래교육, 교사가 디자인하다(곽덕주 외)'의 주요 내용은 무엇이며, 해당 도서를 통해 교직 윤리와 교직관에 대해 어떠한 고민과 탐색을 할 수 있었는지 설명해 주세요.\n- (3 진로) 진로 활동에서 탐구한 '느린 학습자를 위한 맞춤형 교육'에 대해 본인의 교사로서의 가 치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (행특) 인성 칭찬, 학교현장에서 인성교육을 중시하는데 초등학교 교사가 된다면 본인의 학창시 절을 비추어 어떻게 교육하는 것이 좋을까요?\n- (행특) 인공지능 교과서에 대한 기사를 소개하였다는 이야기가 있는데, 초등 맥락에서 디지털 교과서가 가지는 강점과 한계에 대해 이야기하고, 어떻게 교실 수준에서 한계를 보완할 수 있을지 이야기해보세요.\n- (3 진로) 진로 활동에서 탐구한 '디지털 격차와 교육적 대응 문제'에 대해 본인의 교사로서의 가치관과 연결지어 설명하고, 이외에 최근 교육 문제나 현안과 관련하여 탐색해 본 경험이 있는지 설명해 주세요.\n- (1-진로) 수학교사/수학교육과 희망했는데, 초등교육과 지원 동기 및 초등교사 부합 자질 보여주는 고교 활동 사례를 이야기해보세요.\n- (진로3) 학급 자율 주제 탐구 활동으로 '디지털 정보 탐구'를 초등 맥락에서 수행했다고 하는데, 초등학생에게 디지털 교육에서 어떤 부분이 가장 중요하다고 생각하는지 이야기해보세요.\n- (동아리1-3) 생명과학 등 탐색을 하다가 특수 교육에 대한 관심으로 진로 탐색이 확장된 것으로 보입니다. 특수 교육 학과가 아닌 초등교육을 선택한 이유가 있을까요?\n- (자율2) 사회 참여 프로젝트 활동에 대한 기록이 있는데, 초등학교 단계에서 사회 참여 프로젝트 활동이 가능하다고 생각하는지, 자신의 교실에서 해보고 싶은 프로젝트가 있다면 이야기해보세요.\n- (3-진로) 특수교사 앤 설리번을 롤모델로 선정하고 장애 학생 교육 방법론과 교사의 역할에 대해 심도있게 분석했다는 기록이 있습니다. 분석한 내용을 이야기해보세요.\n- (3-창체 진로) 독서를 통한 철학적 성찰과 실험을 통한 탐구 역량 향상을 병행하며 교육 분야의 진로에 대한 목표의식을 더욱 확고히 하게 된 과정에 대해 말해보시오.\n- (3-행동) 예의와 존중을 중요시하면서, 학우들이 때때로 교사에게 예의 없는 행동을 보일 때 먼저 나서 이를 중재하고 어른을 공경하는 태도를 보였던 경험을 말해보시오.\n- (2-진로) 미디어 리터러시의 이해 특강에 참여한 후 미디어 리터러시 교육의 중요성을 인식하였는데, 중요성은 무엇이며 초등학생들에게 미디어 리터러시를 함양시키기 위해서는 교사는 어떤 노력을 해야 할까요?\n- (3학년 출결) 3학년 출결 미인정 결석 5회, 미인정 조퇴 3회가 있고, 질병 결석 6회, 질병 조퇴도 1회가 있는데, 이에 대해 보충 설명해주기 바랍니다. (1학년 행특기록: 뛰어난 자기관리역량이 돋보임과 배치)\n- (1-동아리) 초등학생 멘토링 중 레포(라포)형성하는 모습이 인상적이라는 교사의 평이 있습니다. 라포형성의 중요성과 본인만의 라포형성 방법에 대해 이야기해보세요.\n- (1-3동아리) 3년간 사서부, 도서부를 꾸준히 하였습니다. 초등학생에게 독서의 중요성을 알려주기 위한 효과적인 방법이 있다면 무엇이 있을까요?"},{"y":2026,"u":"대구교육대학교","c1":"의사소통능력","c2":"태도","q":"*학교생활기록부\n- 2학년 1학기 수학성적 향상된 이유는 무엇인가? 어떤 방법으로 공부하였는가?\n- A 독서활동을 통해 교사로서 어떤 자질이 필요하다고 생각했는가?\n- B 동아리 활동 중 갈등관리의 경험이 교직에서 어떻게 활용할 수 있다고 생각하는가?\n*기타질문\n- 본인은 어떤 강점을 가진 교사가 될 수 있다고 생각하는가?\n- 자신의 공부법 중 초등학생에게 도움이 될 수 있다고 생각하는 방법과 그 이유는 무엇인가?\n- 지원자는 지금까지의 초․중․고 학교생활을 지내오면서 “정말 좋은 수업이었다고 느낀 선생님의 수업”과 “그렇지 않은(지원자가 전혀 만족하지 못한) 선생님의 수업”을 모두 경험해 보았을 것입니다. 그중 하나의 수업 경험을 선택하여, 1) 그 수업에서 교사는 어떤 방식으로 학생들을 지도했는지, 2) 그 방식이 여러분의 학습 태도, 이해, 또는 성장에 어떤 영향을 주었는지를 설명해 주세요. 또한 그 경험을 바탕으로, 지원자가 생각하는 ‘잘 가르친다는 것’은 무엇인지 이야기해 주세요."},{"y":2026,"u":"대구교육대학교","c1":"문제해결능력","c2":"태도","q":"*학교생활기록부\n- 2학년 1학기 수학성적 향상된 이유는 무엇인가? 어떤 방법으로 공부하였는가?\n- A 독서활동을 통해 교사로서 어떤 자질이 필요하다고 생각했는가?\n- B 동아리 활동 중 갈등관리의 경험이 교직에서 어떻게 활용할 수 있다고 생각하는가?\n*기타질문\n- 본인은 어떤 강점을 가진 교사가 될 수 있다고 생각하는가?\n- 자신의 공부법 중 초등학생에게 도움이 될 수 있다고 생각하는 방법과 그 이유는 무엇인가?\n- 지원자는 지금까지의 초․중․고 학교생활을 지내오면서 “정말 좋은 수업이었다고 느낀 선생님의 수업”과 “그렇지 않은(지원자가 전혀 만족하지 못한) 선생님의 수업”을 모두 경험해 보았을 것입니다. 그중 하나의 수업 경험을 선택하여, 1) 그 수업에서 교사는 어

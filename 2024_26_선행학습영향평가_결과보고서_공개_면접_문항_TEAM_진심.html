무엇인가요.\nUNIST에 진학 후 본인의 진로계획에 대해 말해보세요."},{"y":2025,"u":"울산과학기술원","c1":"탐구우수\n전형","c2":"품행\n및\n인성","q":"- UNIST에 지원한 동기는 무엇인가요.\n- 본인의 취약점과 이를 극복하기 위한 방안이 무엇인가요.\n- 학업에서 어려움을 극복한 경험이 있다면 말해보세요.\n- 본인이 제출한 탐구활동 분야에서 앞으로의 학업 및 연구 계획을 말해보세요.\n- 탐구활동에서 본인의 역할과 얻을 수 있었던 경험은 무엇인가요.\nUNIST에 진학 후 본인의 진로계획에 대해 말해보세요."},{"y":2025,"u":"한국에너지공과대학","c1":"일반전형, 고른기회 전형\n(창의성 면접)","c2":"발산적 사고력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"한국에너지공과대학","c1":"일반전형, 고른기회 전형\n(창의성 면접)","c2":"문제해결\n능력","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"한국에너지공과대학","c1":"일반전형, 고른기회 전형\n(창의성 면접)","c2":"인문적 통찰 역량","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"가톨릭대학교","c1":"전공(계열)적합성","c2":"","q":"1학년 수학 수업에서 발표를 하여 학우들의 좋은 호응을 받았다고 했는데, 어떤 점을 인정받은 것이며 그 활동을 통해 얻은 점을 말해보세요.\n지원자는 시각장애인을 도와주는 의료용 로봇을 만들고 싶다고 하였고, 공학을 전공하는 것이 더 꿈에 가까이 가는 것 같은데, 본인이 반드시 지금의 전공을 선택해야 하는 이유는 무엇인가요?"},{"y":2024,"u":"가톨릭대학교","c1":"인성","c2":"","q":"인성: 무단결석이 3회 있는데, 어떤 특별한 이유가 있었나요? 무단결석한 것이 본인의 학교생활에 어떤 지장을 주었나요?\n인성: 봉사 동아리에 참여하게 된 계기는 무엇이며, 가장 의미 있었던 활동과 그 활동에서 본인의 역할이 무엇이었는지 말해보세요."},{"y":2024,"u":"가톨릭대학교","c1":"발전가능성","c2":"","q":"발전가능성: 반장에 입후보한 이유는 무엇인가요? 반장 활동을 하면서 가장 어려웠던 점 혹은 본인의 한계라고 느낀 점이 있다면 무엇이고 어떻게 극복했나요?\n발전가능성: 지원자의 꿈은 교사인데, 어떤 교사가 좋은 교사라고 생각하나요? 그런 자질을 어떻게 기를 수 있으며 어떤 노력을 해왔나요?"},{"y":2024,"u":"건국대학교","c1":"학업역량","c2":"","q":"<나목> 작품을 분석하였는데, 작품 속 ‘고목’과 ‘나목’의 의미는 각각 무엇인가요?\n신탁통치 오보 사건이 한국 현대사에 미친 영향을 긍정적 측면과 부정적 측면으로 나누어 설명해주세요.\n한국지리 시간에 한반도의 형성과정에 대해서 학습하였는데, 이에 대해서 설명해주세요.\n진로 시간에 한국 콘텐츠만의 차별화 전략에 대해 탐구하였는데, 본인이 생각하는 차별화 전략은 무엇인가요?\n빌딩풍을 막기 위한 실험을 수행하였는데, 어떤 내용인지 설명해주세요.\n물리학Ⅰ시간에 구조물 안정성의 역학적 평형 내용을 배웠다고 하였는데, 역학적 평형이란 무엇인가요? 이를 구조물에 어떻게 적용할 수 있을까요?\n천연 항생 물질에 대해 탐구하여 보고서를 제출하였는데, 천연 항생 물질로는 무엇이 있나요?"},{"y":2024,"u":"건국대학교","c1":"진로역량","c2":"","q":"<나목> 작품을 분석하였는데, 작품 속 ‘고목’과 ‘나목’의 의미는 각각 무엇인가요?\n신탁통치 오보 사건이 한국 현대사에 미친 영향을 긍정적 측면과 부정적 측면으로 나누어 설명해주세요.\n한국지리 시간에 한반도의 형성과정에 대해서 학습하였는데, 이에 대해서 설명해주세요.\n진로 시간에 한국 콘텐츠만의 차별화 전략에 대해 탐구하였는데, 본인이 생각하는 차별화 전략은 무엇인가요?\n빌딩풍을 막기 위한 실험을 수행하였는데, 어떤 내용인지 설명해주세요.\n물리학Ⅰ시간에 구조물 안정성의 역학적 평형 내용을 배웠다고 하였는데, 역학적 평형이란 무엇인가요? 이를 구조물에 어떻게 적용할 수 있을까요?\n천연 항생 물질에 대해 탐구하여 보고서를 제출하였는데, 천연 항생 물질로는 무엇이 있나요?"},{"y":2024,"u":"건국대학교","c1":"공동체역량","c2":"","q":"<나목> 작품을 분석하였는데, 작품 속 ‘고목’과 ‘나목’의 의미는 각각 무엇인가요?\n신탁통치 오보 사건이 한국 현대사에 미친 영향을 긍정적 측면과 부정적 측면으로 나누어 설명해주세요.\n한국지리 시간에 한반도의 형성과정에 대해서 학습하였는데, 이에 대해서 설명해주세요.\n진로 시간에 한국 콘텐츠만의 차별화 전략에 대해 탐구하였는데, 본인이 생각하는 차별화 전략은 무엇인가요?\n빌딩풍을 막기 위한 실험을 수행하였는데, 어떤 내용인지 설명해주세요.\n물리학Ⅰ시간에 구조물 안정성의 역학적 평형 내용을 배웠다고 하였는데, 역학적 평형이란 무엇인가요? 이를 구조물에 어떻게 적용할 수 있을까요?\n천연 항생 물질에 대해 탐구하여 보고서를 제출하였는데, 천연 항생 물질로는 무엇이 있나요?"},{"y":2024,"u":"경기대학교","c1":"사회영역\n(인성, 공동체의식)","c2":"","q":"청소년의 공연장 내 장애인석 개선 인식 관련하여 조사한 내용이 있는데, 이 주제를 선정하게 된 계기와 조사 내용에 대해 말씀해주세요.\n도서반 동아리에 3년간 꾸준히 참여했다는 기록이 있는데, 동아리 구성원들을 위해 주도적으로 역할 수행한 것이 있다면 무엇인지 말씀해주세요.\n매년 학급 회장의 역할로 학급을 주도적으로 이끌었다는 기록이 있는데 자신에게 가장 의미 있었던 활동 하나와 어떤 노력을 하였는지 말씀해주세요."},{"y":2024,"u":"경기대학교","c1":"잠재역량\n(전공 관련 활동 및 경험, 발전가능성)","c2":"","q":"(3학년 생활과 과학) 미술, 과학 단원과 관련된 인터렉티브 디자인을 주제로 탐구한 내용이 있는데 인터렉티브 디자인의 활용 사례를 소개 해주세요.\n‘○○찾기 프로젝트’ 멘토-멘티 프로그램에 멘토로 참여한 기록이 있는데, 본인이 멘토로서 멘티에게 도움이 되기 위해 어떤 노력과적을 거쳤는지 이야기 해주세요."},{"y":2024,"u":"경희대학교","c1":"전공적합성","c2":"","q":"고등학교 재학 중 가장 흥미를 가졌던 과목은? 그 과목 수업에서 가장 의미 있거나 기억에 남는 활동은?\n진로를 탐색하기 위해 이수한 과목이 있는가?"},{"y":2024,"u":"경희대학교","c1":"인성","c2":"","q":"조별 과제나 팀별 활동에서 협엽해서 이룬 성과, 본인의 역할은?\n미인정 지각이 수회 있는데, 특별한 이유가 있는가?\n학교에서 나눔과 배려를 실천한 활동은?\n학교에서 리더십을 발휘한 경험과 배운점은?"},{"y":2024,"u":"고려대학교","c1":"문제해결력, 분석력, 이해력","c2":"","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"광운대학교","c1":"발전가능성","c2":"","q":"졸업후 ○○ 분야의 진로를 희망하고 있는데, 이 분야의 전문가가 되기 위해서 가장 중요하다고 생각하는 조건은?\n○○ 분야의 희망 세부전공은 무엇인가? 그 이유는?"},{"y":2024,"u":"광운대학교","c1":"논리적사고력","c2":"","q":"○○활동 중 가장 의미 있었던 활동과 그 이유는?\n○○ 활동에 친구들과 공동으로 참여했는데, 본인의 구체적인 역할은?\n세부능력 및 특기사항에서 ○○교과의 활동(발표 등) 과정을 구체적으로 설명하세요."},{"y":2024,"u":"광운대학교","c1":"인성","c2":"","q":"○○부 부장으로 활동하면서 특별히 어려웠던 점은?"},{"y":2024,"u":"국민대학교","c1":"자기주도성 및 도전정신","c2":"","q":"○○활동을 통해 배우고, 느낀 점에 대해 말해보세요.\n○○활동이 특별히 본인에게 의미가 있었던 이유는 무엇인지 말해보세요."},{"y":2024,"u":"국민대학교","c1":"전공적합성","c2":"","q":"○○전공과 관련하여, 자신의 가장 우수한(뛰어난) 역량은 무엇이라고 생각하는지, 어떠한 활동들을 통해서 그 역량을 키워왔는지 말해보세요."},{"y":2024,"u":"국민대학교","c1":"인성","c2":"","q":"○○ 주위 사람들과 협력하여 좋은 결과를 얻어낸 적이 있다면 본인이 한 역할에 대해 말해보세요."},{"y":2024,"u":"덕성여자대학교","c1":"서류 신뢰성","c2":"","q":"○○분야 도서를 꾸준히 읽었는데, 책을 통해 배운 점이 있다면?\n2학년 과학 과제 연구 수업 시간에 해당 주제를 선정한 이유는 무엇인가요?\n보고서 작성을 위한 이론적 배경과 결론을 요약하여 설명해주세요.\n동아리 활동에서 유의미한 이론적 배경을 확인하고 실험을 설계했다고 했는데, 해당 실험의 변인 통제는 무엇이었나요?\n학급 반장으로 다양한 공약을 세우고 모두 실행하는 책임감을 보였다고 기록되어 있는데, 어떤 공약이었나요?"},{"y":2024,"u":"덕성여자대학교","c1":"종합적 사고력","c2":"","q":"○○분야 도서를 꾸준히 읽었는데, 책을 통해 배운 점이 있다면?\n2학년 과학 과제 연구 수업 시간에 해당 주제를 선정한 이유는 무엇인가요?\n보고서 작성을 위한 이론적 배경과 결론을 요약하여 설명해주세요.\n동아리 활동에서 유의미한 이론적 배경을 확인하고 실험을 설계했다고 했는데, 해당 실험의 변인 통제는 무엇이었나요?\n학급 반장으로 다양한 공약을 세우고 모두 실행하는 책임감을 보였다고 기록되어 있는데, 어떤 공약이었나요?"},{"y":2024,"u":"덕성여자대학교","c1":"인성","c2":"","q":"○○분야 도서를 꾸준히 읽었는데, 책을 통해 배운 점이 있다면?\n2학년 과학 과제 연구 수업 시간에 해당 주제를 선정한 이유는 무엇인가요?\n보고서 작성을 위한 이론적 배경과 결론을 요약하여 설명해주세요.\n동아리 활동에서 유의미한 이론적 배경을 확인하고 실험을 설계했다고 했는데, 해당 실험의 변인 통제는 무엇이었나요?\n학급 반장으로 다양한 공약을 세우고 모두 실행하는 책임감을 보였다고 기록되어 있는데, 어떤 공약이었나요?"},{"y":2024,"u":"동국대학교","c1":"전형취지적합성","c2":"","q":"2학년 동아시아사 세특에서 ‘세계는 역사를 어떻게 교육하는가’라는 책을 읽고 선진국과 한국의 역사 교육과정의 차이점을 비교했다고 되어 있는데, 본인이 파악한 선진국과 한국의 교육과정의 차이점을 설명해보고, 이 책의 내용을 바탕으로 우리나라의 역사 교육에 대한 본인의 생각을 얘기해 보세요.\n2학년 자율 활동에 물리, 화학 멘토로 활동했다고 되어 있습니다. 이러한 경험은 본인에게 어떤 긍정적인 영향을 주었나요? 학습 멘토링 활동을 하며 느낀 점을 얘기해 주세요."},{"y":2024,"u":"동국대학교","c1":"전공적합성","c2":"","q":"교과학습 발달상황을 보면 물리학 과목을 이수하지 않은 것으로 되어 있는데, 전자전기공학부는 물리 지식을 바탕으로 공학을 배우게 됩니다. 진학하게 된다면 이를 보완하기 위해 본인은 어떤 계획을 가지고 있는지 얘기해 주세요.\n2학년 1학기 학교 자율 교육과정에서 수소 에너지의 원리와 전망에 대해 활동지를 작성했다고 되어 있는데요. 어떤 자료를 참고해서 내용을 작성했나요? 본인이 작성한 수소 에너지의 화학적 원리에 대해 설명해주세요."},{"y":2024,"u":"동국대학교","c1":"발전가능성","c2":"","q":"- 3학년 자율활동을 보면 수준 높은 경제 배경지식과 우수한 탐구력을 지녔다고 기재되어 있는데요. 본인이 탐구한 내용 중 대학에서 발전시켜 배워보고 싶은 이론이나 내용이 있다면 얘기해 주세요. 또 그 이유는 무엇입니까?\n창의적 체험활동을 보면 어르신 대상 복지제도와 사회복지사의 업무에 대해 관심을 갖고 조사하는 활동을 했다고 되어 있는데요. 본인이 탐색한 내용을 토대로 어르신을 대상으로 일하는 사회복지사의 경우 가장 바람직한 관점, 태도는 무엇이라고 생각하나요?"},{"y":2024,"u":"동국대학교","c1":"인성 및 사회성","c2":"","q":"과학주제탐구반 동아리 활동 중에서 참여자들과 소통하면서 협력한 사례가 있다면 얘기해 주세요. 제시한 사례에서 본인의 역할은 무엇이었으며 활동의 결과는 어땠나요?\n2학년 행동특성 및 종합의견을 보면 1년간 학급 칠판 청소를 담당했다고 하는데요, 칠판 청소에 참여하게 된 계기를 말해보고 역할을 수행하면서 느꼈던 점이 있었다면 얘기해 주세요.\n1학년에 미인정 지각이 4회가 있었는데요. 이 부분에 대해 본인은 어떤 상황이었는지 설명해주세요. 또 이를 개선하기 위해 기울인 노력이 있다면 얘기해 주세요."},{"y":2024,"u":"동덕여자대학교","c1":"학업역량","c2":"","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},{"y":2024,"u":"동덕여자대학교","c1":"진로역량","c2":"","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},{"y":2024,"u":"동덕여자대학교","c1":"공동체역량","c2":"","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},{"y":2024,"u":"명지대학교","c1":"교과면접","c2":"","q":"(면접 기초자료 문항) 고교생활 중 가장 아쉬웠던 활동은 무엇이며, 이를 다시 수행한다면 어떻게 개선할 것인가를 서술하시오.\n(면접 기초자료 문항) 지원한 학문분야(학부/학과/전공)와 관련하여 가장 관심있는 분야는 무엇이며, 관심분야에서 이루고자 하는 본인의 모습과 예상되는 노력을 서술하시오.\n(면접 기초자료 문항) 지원한 학문분야(학부/학과/전공)에서 성공하기 위하여 가장 필요한 능력은 무엇이며, 이를 향상시키기 위해 고교생활 중 기울인 노력을 기술하시오.\n(면접 기초자료 문항) 지원자가 지원한 학과(학부/전공)에 입학한 후의 구체적인 대학생활 계획을 서술하시오.\n○○에 지원한 동기가 무엇인가?\n학교에서 배운 교과목 또는 비교과 활동 중 ○○학과와 관련된 사항을 말해주세요.\n고등학교 때 흥미가 있었던 교과목은 무엇인가?"},{"y":2024,"u":"명지대학교","c1":"명지인재면접","c2":"","q":"수행평가로 ○○에 대해 조사했는데, ○○이 무엇인고 왜 필요하다고 생각하는가?\n수업시간에 ‘○○’에 대해 토론했다고 하는데 본인은 찬성과 반대 중에 어떤 입장이었고, 그 근거가 무엇인가요? 그리고 상대편의 입장은 어땠나요?\n수업시간에 ○○ 실험을 했는데 어떤 원리를 활용하였나요?\n○학년 ○학기 학생회장을 하셨습니다. 학생들의 안건을 학교에 효과적으로 전달하는 방법은 무엇이었나요?"},{"y":2024,"u":"삼육대학교","c1":"전공적합성","c2":"","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"삼육대학교","c1":"발전가능성","c2":"","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"삼육대학교","c1":"인성","c2":"","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"상명대학교","c1":"인성","c2":"","q":"1년동안 학년 전체의 사진 앨범 제작 총괄 및 학급의 사진사 역할을 통해 학교 생활 중 친구들의 즐겁고 행복한 모습을 앨범으로 제작했다고 하는데, 이 활동을 하게 된 동기와 활동을 통해 느낀 점은 무엇인가요?\n통합사회 시간에 학생 멘토로 활동하며 힘들었던경험과 보람을 느꼈던 점은 무엇인가요?"},{"y":2024,"u":"상명대학교","c1":"전공적합성","c2":"","q":"도시재생 전문가와 예술가의 협업에 주목하여 동네 공간 재생을 위한 예술의 역할에 대해 탐색했다고 기록되어 있는데, 탐색한 내용을 이야기해 주세요.\n- 올드보이 속 미장센을 통해 복선을 나타내는 장면을 찾아 소개했다고 하는데 구체적으로 어떤 장면인지 이야기 해주세요."},{"y":2024,"u":"상명대학교","c1":"발전가능성","c2":"","q":"4차 산업 시대에서 스포츠분야 종사자로서 가져야할 바람직한 가치관은 무엇이라고 생각하나요?\n본인의 운동역량 증진을 위해 계획적ㅇ로 체력단련을 하였다고 기록되어 있는데, 어떤 운동을 진행하였으며, 결과는 어떻게 되었는지 이야기 해주세요."},{"y":2024,"u":"서경대학교","c1":"희생정신","c2":"","q":"학교의 큰 행사를 위해 시험기간에 임박하여 반장이 동참을 요구했다. 어떻게 할 것이며, 그 이유는?"},{"y":2024,"u":"서경대학교","c1":"리더쉽","c2":"","q":"소대원 중 지시를 불이행하는 인원이 있을 경우 어떻게 할 것인가?"},{"y":2024,"u":"서경대학교","c1":"국가관/안보관","c2":"","q":"해외 유학 중 북한이 침략을 하여 전쟁이 발생하였다. 어떻게 할 것인가?"},{"y":2024,"u":"서경대학교","c1":"지원동기","c2":"","q":"- 자신의 성격이나 적성 등의 어떤 면이 장교의 길을 택하고자 하였는지 말해 보시오."},{"y":2024,"u":"서경대학교","c1":"성장 환경","c2":"","q":"자신이 가장 싫어하는 사람과 좋아하는 사람의 유형은 무엇인가?"},{"y":2024,"u":"서울과학기술대학교","c1":"미제시","c2":"","q":"자신이 가장 싫어하는 사람과 좋아하는 사람의 유형은 무엇인가?"},{"y":2024,"u":"서울대학교","c1":"일반전형","c2":"","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"서울대학교","c1":"지역균형","c2":"","q":"미제시 경기도교육청 면접사례자료집 참고"},{"y":2024,"u":"서울시립대학교","c1":"학업역량","c2":"","q":"3학년 동아리 활동에서 공급망 인플레이션에 대해 탐구했는데, 개념을 정의해보세요. 공급망 인플레이션이 발생하는 과정을 설명해보세요. 공급망 인플레이션이 :"CAU융합형인재","c2":"학업준비도","q":"1학년 학년장을 할 당시가 코로나19가 가장 심하게 전파되고 있었을 시기인데 어떻게 리더십을 발휘할 수 있었나요?\n특정 교과에 관심을 가지고 평소 탐구를 많이 해왔던 것 같은데, 관련 교과 성적은 다른 교과 성적 대비 상대적으로 미흡합니다. 학습 성과를 높이기 위한 본인의 노력이 있었다면 어떤 것이 있었는지 말씀해 주세요.\n각각의 친구들에게 맞는 책을 추천해 주는 활동을 했는데, 어려웠던 적은 없나요? 책을 추천해 줄 때 본인이 가장 고려했던 점은 어떤 것이 있나요?\n미분탐구보고서에서 미술교과의 애니메이션을 제작하는 과정에서 수학이 사용된 부분에 대해 탐구했다고 했는데 애니메이션에 사용된 수학적 원리를 설명해 주세요."},{"y":2024,"u":"중앙대학교","c1":"CAU융합형인재","c2":"학교생활충실도","q":"1학년 학년장을 할 당시가 코로나19가 가장 심하게 전파되고 있었을 시기인데 어떻게 리더십을 발휘할 수 있었나요?\n특정 교과에 관심을 가지고 평소 탐구를 많이 해왔던 것 같은데, 관련 교과 성적은 다른 교과 성적 대비 상대적으로 미흡합니다. 학습 성과를 높이기 위한 본인의 노력이 있었다면 어떤 것이 있었는지 말씀해 주세요.\n각각의 친구들에게 맞는 책을 추천해 주는 활동을 했는데, 어려웠던 적은 없나요? 책을 추천해 줄 때 본인이 가장 고려했던 점은 어떤 것이 있나요?\n미분탐구보고서에서 미술교과의 애니메이션을 제작하는 과정에서 수학이 사용된 부분에 대해 탐구했다고 했는데 애니메이션에 사용된 수학적 원리를 설명해 주세요."},{"y":2024,"u":"중앙대학교","c1":"CAU융합형인재","c2":"인성 및 의사소통능력","q":"1학년 학년장을 할 당시가 코로나19가 가장 심하게 전파되고 있었을 시기인데 어떻게 리더십을 발휘할 수 있었나요?\n특정 교과에 관심을 가지고 평소 탐구를 많이 해왔던 것 같은데, 관련 교과 성적은 다른 교과 성적 대비 상대적으로 미흡합니다. 학습 성과를 높이기 위한 본인의 노력이 있었다면 어떤 것이 있었는지 말씀해 주세요.\n각각의 친구들에게 맞는 책을 추천해 주는 활동을 했는데, 어려웠던 적은 없나요? 책을 추천해 줄 때 본인이 가장 고려했던 점은 어떤 것이 있나요?\n미분탐구보고서에서 미술교과의 애니메이션을 제작하는 과정에서 수학이 사용된 부분에 대해 탐구했다고 했는데 애니메이션에 사용된 수학적 원리를 설명해 주세요."},{"y":2024,"u":"총신대학교","c1":"학생부교과","c2":"신앙","q":"기독교인으로서 세상에서 빛과 소금의 역할을 감당한다는 것이 무엇인지 말해보시오.\n성경 인물 가운데 가장 닮고 싶은 인물이 있다면 누구인지 말하고 그 이유를 설명해보시오."},{"y":2024,"u":"총신대학교","c1":"학생부교과","c2":"인성","q":"아직도 장애인들의 지하철 탑승에 어려운 역사가 존재하고 있다. 이에 일부 장애인 단체에서는 자신들의 지하철 탑승의 어려움을 널리 알리기 위해 출근 시간대에 지하철 탑승장에서 시위를 하고 있다. 이로 인해 일반 시민들의 출근 시간 이동에 어려움을 주고 있다. 이러한 장애인 단체의 시위에 대해 어떻게 생각하는지 자신의 의견을 말해 보시오.\n최근 청소년 중범죄가 심각해짐에 따라, 촉법소년의 연령 기준을 만 14세 미만에서 만 12-13세 미만으로 낮추자는 법안들이 정부와 국회에서 발의되어 논의 중이다. 그러나 대법원은 촉법소년 연령을 낮춰서는 안 된다는 의견을 국회에 전달한 바 있다. 촉법소년 연령기준을 낮추자는 주장에 대해 자신의 의견을 말해 보시오."},{"y":2024,"u":"총신대학교","c1":"학생부종합","c2":"신앙","q":"코로나19 시대 때 교회 소그룹이나 공동체 활동이 많이 위축되었다. 이 문제를 어떻게 회복해야 할 지에 대해 말해보시오.\n코로나19가 끝나고 대면 사회로 바뀌었다. 그럼에도 불구하고 여전히 예배를 비대면으로 드리는 성도들이 많다. 예배에 관한 바른 태도가 무엇인지 말해보시오."},{"y":2024,"u":"총신대학교","c1":"학생부종합","c2":"인성","q":"많은 사람이 환경 보호를 위해 ‘제로 웨이스트’(쓰레기 배출량 줄이기)나 ‘용기 내 챌린지’(음식 포장으로 불필요한 쓰레기 줄이기) 등 다양한 환경 보호 활동을 실시하고 있다. 왜 환경을 보호하고 관리해야 하는지 이유를 설명하고, 자신이 최근 3년 동안 환경을 보호하기 위해 실천한 챌린지, 캠페인 혹은 생활 습관이 있다면 그 경험을 말해 보시오.\nSNS 활용은 장단점이 있다. 자신의 경험을 바탕으로 SNS의 긍정적, 부정적 측면을 각각 설명하고, SNS를 긍정적으로 활용하기 위한 실천방안을 말해 보시오."},{"y":2024,"u":"한국외국어대학교","c1":"학업역량","c2":"인성","q":"동아리 활동에서 어떤 역할을 하였나요? 본인의 역할에 만족하나요?\n고교 3년간 가장 의미 있었던 활동은 무엇인가요? 그 이유는 무엇인가요?"},{"y":2024,"u":"한국외국어대학교","c1":"진로역량","c2":"인성","q":"동아리 활동에서 어떤 역할을 하였나요? 본인의 역할에 만족하나요?\n고교 3년간 가장 의미 있었던 활동은 무엇인가요? 그 이유는 무엇인가요?"},{"y":2024,"u":"한국외국어대학교","c1":"공동체역량","c2":"인성","q":"동아리 활동에서 어떤 역할을 하였나요? 본인의 역할에 만족하나요?\n고교 3년간 가장 의미 있었던 활동은 무엇인가요? 그 이유는 무엇인가요?"},{"y":2024,"u":"홍익대학교(서울)","c1":"제출서류의 진실성","c2":"인성","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"홍익대학교(서울)","c1":"미술관련 소양","c2":"인성","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"홍익대학교(서울)","c1":"창의성","c2":"인성","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"홍익대학교(서울)","c1":"표현능력","c2":"인성","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2024,"u":"인천대학교","c1":"진로역량","c2":"인성","q":"3학년 영어독해와작문 시간에 한글과 영어의 구조적 차이를 설명한 경험이 있는데 어떤 차이점이 기억이 나나요?\n관광통역사가 꿈이라고 하는데, 그 동안 들었던 과목들 중에서 이러한 자신의 꿈을 키우는데 도움이 되었던 활동이 있으면 말해주세요.\n3학년 동아리 활동에서 프라스 문학 작품들에 대해 학습하면서 프랑스 문학에 관심을 갖게 되었는데 어떤 작품이 특히 마음에 들었나요?"},{"y":2024,"u":"인천대학교","c1":"발전역량","c2":"인성","q":"3학년 영어독해와작문 시간에 한글과 영어의 구조적 차이를 설명한 경험이 있는데 어떤 차이점이 기억이 나나요?\n관광통역사가 꿈이라고 하는데, 그 동안 들었던 과목들 중에서 이러한 자신의 꿈을 키우는데 도움이 되었던 활동이 있으면 말해주세요.\n3학년 동아리 활동에서 프라스 문학 작품들에 대해 학습하면서 프랑스 문학에 관심을 갖게 되었는데 어떤 작품이 특히 마음에 들었나요?"},{"y":2024,"u":"인천대학교","c1":"공동체역량","c2":"인성","q":"3학년 영어독해와작문 시간에 한글과 영어의 구조적 차이를 설명한 경험이 있는데 어떤 차이점이 기억이 나나요?\n관광통역사가 꿈이라고 하는데, 그 동안 들었던 과목들 중에서 이러한 자신의 꿈을 키우는데 도움이 되었던 활동이 있으면 말해주세요.\n3학년 동아리 활동에서 프라스 문학 작품들에 대해 학습하면서 프랑스 문학에 관심을 갖게 되었는데 어떤 작품이 특히 마음에 들었나요?"},{"y":2024,"u":"인천대학교","c1":"의사소통능력","c2":"인성","q":"3학년 영어독해와작문 시간에 한글과 영어의 구조적 차이를 설명한 경험이 있는데 어떤 차이점이 기억이 나나요?\n관광통역사가 꿈이라고 하는데, 그 동안 들었던 과목들 중에서 이 를 지원하기 위한 어떠한 도움이 되었는지 이야기해 주세요.\n3년간 학급자치회장을 맡아왔는데 어려운 점은 없었는지요? 갈등구조가 있었다면 그 상황을 어떻게 극복하였는지요?"},{"y":2024,"u":"차의과학대학교","c1":"진로역량","c2":"의사소통능력","q":"지원한 희망전공 분야에서 필요한 지식과 능력은 무엇이라고 생각하는지 이야기해주세요.\n본인의 어떠한 면이 희망전공 및 진로영역에서 강점이 될 수 있다고 생각하는지 이야기해주세요.\n본인의 희망전공과 관련해서 가장 관심(흥미)을 가지고 학습했던 교과목에 대해 이야기해주세요."},{"y":2024,"u":"차의과학대학교","c1":"인성","c2":"의사소통능력","q":"본인 성격의 장단점은 무엇이며, 그렇게 생각하는 이유는 무엇인가요.\n노력을 했음에도 성과가 기대했던 만큼 나오지 않은 경험이 있나요? 있다면 당시 어떤 감정이나 생각을 느꼈나요?\n친구들과 고교생활 중 협동하여 목표를 달성한 경험이 있다면 어떤 것이며, 그 안에서 본인의 역할은 무엇이었는지 이야기해주세요."},{"y":2024,"u":"차의과학대학교","c1":"발전가능성","c2":"의사소통능력","q":"고교생활 중 끈기나 열정을 가지고 임한 활동이 있다면 하나만 이야기해주세요.\n대학 입학 후 학업 이외에 꼭 하고 싶은 일이 있다면 무엇인가요? 하고 싶은 이유도 이야기해주세요.\n본인이 희망하는 전공과 융합하여 학습하면 좋은 결과가 나올 수 있다고 생각하는 타 전공은 무엇이 있을지 이유와 함께 말하여주세요."},{"y":2024,"u":"한국공학대학교","c1":"인성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\nOO학과에 지원했는데, OO학과에서는 OO관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 OO관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오."},{"y":2024,"u":"한국공학대학교","c1":"전공적합성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\nOO학과에 지원했는데, OO학과에서는 OO관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 OO관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오."},{"y":2024,"u":"한국공학대학교","c1":"발전가능성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\nOO학과에 지원했는데, OO학과에서는 OO관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 OO관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오."},{"y":2024,"u":"한국항공대학교","c1":"학업역량","c2":"의사소통능력","q":"동아리 활동 중 가장 인상 깊었던 활동과 그 이유에 대해 설명해 주세요\n모둠활동에서 발표했던 자동제어 관련 실생활 적용 아이디어에 대해 소개해 주세요.\n학생부에 코딩 경험이 다수 기재되어 있는데 코딩에 대한 공부 방법을 말씀해 주세요.\n리더 경험이 많은데 힘들거나 어려웠던 점이 있다면 말씀해 주세요.\n항공전문가로서 갖추어야 할 기본 소양은 무엇이고, 소양과 자질을 갖추기 위해 노력하는 부분이 있는지 설명해 주세요.\n본교 지원 학과 졸업 후 계획에 대해 설명해 주세요."},{"y":2024,"u":"한국항공대학교","c1":"진로역량","c2":"의사소통능력","q":"동아리 활동 중 가장 인상 깊었던 활동과 그 이유에 대해 설명해 주세요\n모둠활동에서 발표했던 자동제어 관련 실생활 적용 아이디어에 대해 소개해 주세요.\n학생부에 코딩 경험이 다수 기재되어 있는데 코딩 // 초기화
const UNIVS = [...new Set(DATA.map(d=>d.u))].sort();
const sel = document.getElementById('univSelect');
UNIVS.forEach(u=>{ const o=document.createElement('option'); o.value=o.textContent=u; sel.appendChild(o); });

let yearFilter='all', mode='list', openIdx=null, compareOpen={};

function setYear(y){
  yearFilter=y;
  document.querySelectorAll('.pill').forEach(p=>{
    const py=p.dataset.year;
    p.className='pill'+(py===y?' active-'+y:'');
  });
  openIdx=null; render();
}

function setMode(m){
  mode=m;
  document.getElementById('modeList').classList.toggle('active',m==='list');
  document.getElementById('modeCompare').classList.toggle('active',m==='compare');
  openIdx=null; compareOpen={};
  render();
}

function getFiltered(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const univ=document.getElementById('univSelect').value;
  return DATA.filter(d=>{
    if(yearFilter!=='all' && d.y!==parseInt(yearFilter)) return false;
    if(univ && d.u!==univ) return false;
    if(kw){
      const h=(d.u+d.c1+d.c2+d.q).toLowerCase();
      if(!h.includes(kw)) return false;
    }
    return true;
  });
}

function parseQs(raw){
  return raw.split('\n').map(s=>s.trim()).filter(s=>s.length>5);
}

function yearClass(y){
  return {2026:'y2026',2025:'y2025',2024:'y2024'}[y]||'';
}
function yearLabel(y){
  return y+'년';
}

function render(){
  const filtered=getFiltered();
  const list=document.getElementById('cardList');
  const empty=document.getElementById('emptyMsg');
  document.getElementById('statUniv').textContent=new Set(filtered.map(d=>d.u)).size;
  document.getElementById('statItems').textContent=filtered.length;
  document.getElementById('resultInfo').textContent=
    filtered.length===DATA.length?`전체 ${DATA.length}개 항목`:`${filtered.length}개 항목`;

  if(filtered.length===0){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  if(mode==='list') renderList(filtered);
  else renderCompare(filtered);
}

function renderList(filtered){
  const list=document.getElementById('cardList');
  list.innerHTML=filtered.map((d,i)=>{
    const qs=parseQs(d.q);
    const preview=qs[0]?(qs[0].slice(0,80)+(qs[0].length>80?'…':'')):'';
    const isOpen=openIdx===i;
    const yc=yearClass(d.y);
    return `<div class="card${isOpen?' open':''}" onclick="toggle(${i})">
      <div class="card-head">
        <div class="card-badges">
          <span class="badge badge-year-${d.y}">${d.y}년</span>
          <span class="badge badge-univ">${d.u}</span>
          <span class="badge badge-cat">${d.c1}</span>
          ${d.c2?`<span class="badge badge-cat">${d.c2}</span>`:''}
        </div>
        <div class="card-arrow">▶</div>
      </div>
      <div class="card-preview">${preview}</div>
      <div class="card-body">
        <ul class="q-list">${qs.map(q=>`<li class="q-item">${q}</li>`).join('')}</ul>
      </div>
    </div>`;
  }).join('');
}

function renderCompare(filtered){
  const list=document.getElementById('cardList');
  // 대학별로 묶기
  const byUniv={};
  filtered.forEach(d=>{
    if(!byUniv[d.u]) byUniv[d.u]={};
    if(!byUniv[d.u][d.y]) byUniv[d.u][d.y]=[];
    byUniv[d.u][d.y].push(d);
  });
  const univList=Object.keys(byUniv).sort();

  list.innerHTML=univList.map(u=>{
    const isOpen=compareOpen[u];
    const years=[2026,2025,2024];
    const sections=years.map(y=>{
      const items=byUniv[u][y]||[];
      if(items.length===0) return `<div class="compare-section ${yearClass(y)}">
        <div class="compare-header">📅 ${y}년</div>
        <div class="compare-body"><div class="no-data">해당 연도 자료 없음</div></div>
      </div>`;
      const qs=items.flatMap(d=>parseQs(d.q));
      const cats=items.map(d=>d.c1+(d.c2?' · '+d.c2:'')).join(', ');
      return `<div class="compare-section ${yearClass(y)}">
        <div class="compare-header">📅 ${y}년 · ${cats}</div>
        <div class="compare-body">${qs.map(q=>`<div class="compare-q">${q}</div>`).join('')}</div>
      </div>`;
    }).join('');

    const yearCount=[2026,2025,2024].filter(y=>byUniv[u][y]).length;
    return `<div class="univ-compare-card${isOpen?' open':''}" id="uc-${u.replace(/[^가-힣a-z0-9]/gi,'')}" onclick="toggleCompare('${u.replace(/'/g,"\'")}')">
      <div class="univ-compare-head">
        <h2>${u}</h2>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--text3)">${yearCount}개 연도</span>
          <div class="card-arrow" style="font-size:11px;color:var(--text3)">▶</div>
        </div>
      </div>
      <div class="univ-compare-body">${sections}</div>
    </div>`;
  }).join('');
}

function toggle(i){
  openIdx=openIdx===i?null:i;
  render();
  if(openIdx!==null){
    setTimeout(()=>{
      const cards=document.querySelectorAll('.card');
      if(cards[openIdx]) cards[openIdx].scrollIntoView({behavior:'smooth',block:'nearest'});
    },50);
  }
}

function toggleCompare(u){
  compareOpen[u]=!compareOpen[u];
  render();
}

function reset(){
  document.getElementById('searchInput').value='';
  document.getElementById('univSelect').value='';
  yearFilter='all';
  document.querySelectorAll('.pill').forEach(p=>{
    p.className='pill'+(p.dataset.year==='all'?' active-all':'');
  });
  openIdx=null; compareOpen={};
  render();
}

document.getElementById('searchInput').addEventListener('input',render);
document.getElementById('univSelect').addEventListener('change',render);

render();
</script>
</body>
</html>

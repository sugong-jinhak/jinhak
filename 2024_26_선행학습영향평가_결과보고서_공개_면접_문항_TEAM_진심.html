:"","q":"1학년 수학 수업에서 발표를 하여 학우들의 좋은 호응을 받았다고 했는데, 어떤 점을 인정받은 것이며 그 활동을 통해서 얻은 점을 말해 보세요.\n2학년 담임 선생님께서 지원자를 학교에서 가장 귀감이 되는 학생으로 언급해 주었는데, 본인의 어떠한 점을 평가받았다고 생각하며, 본인의 활동으로 인해 학우들이나 학교에 어떤 플러스가 되었다고 생각하나요?\n선생님이 지원자를 자기주도성이 강하다고 평가하였는데, 본인의 어떤 점에 대해 그렇게 평가 했다고 생각하나요?\n수업 시간에 질문이 많은 학생으로 작성되어 있는데, 질문을 많이 하게 된 이유는 무엇이며 특히 기억에 남는 질문이 있나요?"},{"y":2025,"u":"가톨릭대학교","c1":"공동체역량","c2":"","q":"기숙사 생활에서 갈등상황을 해결했다고 했는데, 그 상황 이전에 본인이 어떻게 행동했다면 그 갈등상황이 발생하지 않았을 것이라 생각하나요?\n봉사동아리에 참여하게 된 계기는 무엇이며, 가장 의미있었던 활동과 그 활동에서 본인의 역할이 무엇이었는지 말해보세요.\n특수반 학생 도우미 활동을 통해서 본인이 가장 얻었다고 생각하는 점은 무엇이며, 그 특수반 학생과 나눈 대화 중 가장 기억에 남는 말과 그 이유는 무엇인가요?\n3년간 같은 동아리 활동을 한 이유는 무엇이며, 그것이 본인의 어떤 점을 성장시켰다고 생각하나요?"},{"y":2025,"u":"건국대학교","c1":"KU자기추천","c2":"학업역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"건국대학교","c1":"KU자기추천","c2":"진로역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"건국대학교","c1":"KU자기추천","c2":"공동체역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"학업역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"성장역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"건국대학교","c1":"KU\n자유전공학부","c2":"공동체역량","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"경기대학교","c1":"사회영역\n(인성, 공동체의식)","c2":"공동체역량","q":"동아리에서 홍보부 차장의 역할을 수행하였다는 기록이 있는데, 동아리 구성원을 위해 주도적으로 하던 활동이 무엇인지, 그 활동 계기와 함께 설명해 주세요.\n프로젝트 활동에서 모둠원들과 협력하였다는 기록이 있는데, 협력을 위해 학생이 한 행동이 무엇인지와 활동 후 느낀 점에 대해 말씀해주세요.\n우리 고장의 구도심 살리기 프로젝트를 진행한 것으로 나오는데, 담당자로서 어떤 역할을 하였으며, 어려웠던 점을 어떻게 해결하였는지 말씀해주세요.\n또래 협력학습 활동에서 멘토의 역할을 맡은 것으로 나와 있는데, 멘토로서 멘티 학생에게 기여하기 위해 하던 활동이 무엇이었는지 말씀해주세요.\n3년간 지속적으로 학생회 임원으로 활동한 기록이 있는데, 활동 중 다른 팀원과의 의견 차이가 발생한 경우 문제를 어떻게 해결하였는지 사례 중심으로 말씀해주세요.\n학급의 환경도우미로서의 역할을 한 것으로 나와 있는데, 본인이 학급을 위해 실행한 가장 의미 있었던 활동이 무엇인지 소개해주세요.\n생명공학동아리와 협업하여 유아와 노인의 뇌의 차이, 시기별 언어습득력 극대화 방안에 대해 조사했다고 하는데 본인이 맡은 역할과 동아리 협력 과정에 대해 말씀해주세요.\n멘토링 활동에 꾸준히 참여한 기록이 있는데, 그 이유가 무엇인지와 가장 기억에 남는 활동 한가지를 소개해주세요.\n뷰테인 기체 분자량 구하는 실험을 모둠원과 협력하여 진행하였는데, 진행하면서 어려웠던 점은 무엇이고 어떻게 해결하였는지 말씀해주세요.\n동아리 활동을 진행하면서 본인이 동아리 구성원들을 위해 주도적으로 역할을 수행하여 긍정적인 결과를 도출했던 사례가 있다면 한 가지만 구체적으로 설명해주세요."},{"y":2025,"u":"경기대학교","c1":"잠재역량\n(전공 관련 활동 및 경험, 발전가능성)","c2":"공동체역량","q":"언론의 언어적 편견에 관심을 가졌다는 내용이 나오는데, 관심을 가지게 된 계기와 어떤 활동을 하였는지 설명해주세요.\n중복순열을 난민들이 이동 국가를 정하는 상황에 대입해보는 활동을 진행하였다는데, 활동 내용에 대해 구체적으로 소개해주세요.\n‘문해력 저하에 미치는 부정적 영향’에 대해 조사하고 이를 해결하는 다양한 방안을 모색하였다는 기록이 있는데, 문제점과 본인이 생각한 해결방안이 무엇인지 설명해주세요.\n미중 무역전쟁 관련 내용을 조사한 것으로 나오는데 두 나라 중 무역 전쟁에서 더 큰 피해를 입는 국가와 그 이유에 대해 근거를 들어 설명해주세요.\n확률과 통계를 이용해 수입침투율, 기업 퇴출 확률 등을 산출할 수 있다고 하였는데, 어떤 방식으로 할 수 있는지 사례를 들어 소개해주세요.\n일탈행위의 이론을 생물학적, 심리학적, 사회학적 원인을 중심으로 조사한 내용이 있는데 해당 조사내용에 대해 간략하게 설명해주세요.\n진로자기효능감 증진 심리치료 프로그램을 직접 설계하였다는 기록이 있는데, 설계하게 된 계기와 ㅍ로그램 구성에 대해서 구체적으로 말씀해주세요.\n현재 기업들이 시행하고 있는 마케팅에 대해 분석한 내용이 있는데 기업을 선정한 기준과 어떤 방법을 통해 분석하였는지 설명해주세요.\n2학년 학교자율과정 활동에서 ‘기업의 확장성 및 수익구조 다각화 사례’에 대해 탐구했다는 기록이 있는데, 탐구한 결론에 대해 간략하게 설명해주세요.\n데이터 분석에서 통계의 역할에 대해 탐구한 내용이 있는데, 본인이 생각하는 통계의 역할은 무엇인지 사례를 들어 설명해주세요.\n금융AI의 현황과 해결책에 대해 공동으로 연구하였다는 기록이 있는데, 연구에서 본인이 맡은 역할과 연구 자료를 어떻게 확보해서 분석하였는지 설명해주세요.\n‘탄소중립과 물가안정 중 무엇을 우선해야 하는가’라는 주제로 토론을 하였는데, 자료 수집과정과 주제에 대한 본인의 생각을 말씀해주세요.\n액형 판정실험을 진행했다고 나와 있는데, 어떠한 원리로 이루어지는 것인지 말씀해주세요."},{"y":2025,"u":"경희대학교","c1":"전공적합성","c2":"공동체역량","q":"고등학교 재학 중 가장 흥미를 가졌던 과목은? 그 과목 수업에서 가장 의미 있거나 기억에 남는 활동은?\n관심 분야와 관련해 주도적으로 이수한 과목이 있는가?\n관심을 갖고 깊게 탐구한 활동이 있는가?\n과목의 세부능력 미 특기사항에 도서활동이 기록되어 있는데, 어떤 부분이 가장 인상적이었는가?"},{"y":2025,"u":"경희대학교","c1":"인성","c2":"공동체역량","q":"조별 과제나 팀별 활동에서 협업해서 이룬 성과, 본인의 역할은?\n미인정 지각이 수회 있는데, 특별한 이유가 있는가?\n학교에서 나눔과 배려를 실천한 활동은?\n학교에서 리더십을 발휘한 경험과 배운점은?"},{"y":2025,"u":"고려대학교","c1":"문제해결력","c2":"공동체역량","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"고려대학교","c1":"분석력","c2":"공동체역량","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"고려대학교","c1":"이해력","c2":"공동체역량","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"광운대학교","c1":"광운\n참빛인재\n전형","c2":"발전\n가능성","q":"○학년 ○학기 ○○교과 세부능력 및 특기사항을 살펴보면 ○○에 관한 내용에 대하여 조사분석하여 발표한 적이 있습니다. 이 때 ○○주제 선정이유와 준비과정을 구체적으로 설명해주세요.\n○학년 이후 세부능력 및 특기사항을 살펴보면, 전반적으로 ○○관련 분야의 독서 내용이 많은데 책을 선정한 기준에 대하여 말씀해주세요.\n관련 내용 중 기억에 남는 이론은 무엇이 있는지 구체적으로 설명해주세요.\n○학년 동아리활동에서 ○○결과가 우리 사회에 미칠 영향에 따른 대처 방안을 발표하였다고 하였는데 그 내용과 관련 근거를 구체적으로 말씀해주세요."},{"y":2025,"u":"광운대학교","c1":"광운\n참빛인재\n전형","c2":"종합적\n사고력","q":"창체 활동을 살펴보면 ○○분야의 진로를 지속적으로 희망하고 있는데, 이 분야를 전공하기 위해서 필요한 역량은 무엇이라고 생각하는지와 그 이유를 말씀해주세요."},{"y":2025,"u":"광운대학교","c1":"광운\n참빛인재\n전형","c2":"인성","q":"2, 3학년 ○○부 부장으로 활동하게 된 계기는 무엇인가요? 동아리를 운영하면서 특별히 어려웠던 점과 어떻게 해결하려고 노력하였는지 답변해주세요.\n매학년 학기마다 학급 주변 정화활동을 꾸준히 해서 총 ○○시간 봉사활동을 해왔는데 지속적으로 수행해온 이유를 말씀해주세요.\n출결상황 중 미인정 결석이 ○회 확인되는데 사유를 말씀해주세요."},{"y":2025,"u":"광운대학교","c1":"소프트웨어\n우수인재\n전형","c2":"발전\n가능성","q":"○학년 ○학기 ○○교과에서 수행한 ○○ 프로그래밍 활동 중 설계하는 과정과 내용에 대해 설명해보세요.\n○○ 프로그래밍 활동 중 실제 구현하는 과정에서 사용한 방법과 어려웠던 점을 구체적으로 설명해주세요."},{"y":2025,"u":"광운대학교","c1":"소프트웨어\n우수인재\n전형","c2":"종합적\n사고력","q":"광운참빛인재전형과 동일"},{"y":2025,"u":"광운대학교","c1":"소프트웨어\n우수인재\n전형","c2":"인성","q":"광운참빛인재전형과 동일"},{"y":2025,"u":"국민대학교","c1":"자기주도성 및 도전정신","c2":"인성","q":"○○활동을 통해 배우고, 느낀 점에 대해 말해보세요.\n○○활동이 특별히 본인에게 의미가 있었던 이유는 무엇인지 말해보세요."},{"y":2025,"u":"국민대학교","c1":"전공적합성","c2":"인성","q":"○○전공과 관련하여, 자신의 가장 우수한(뛰어난) 역량은 무엇이라고 생각하는지, 어떠한 활동들을 통해서 그 역량을 키워왔는지 말해보세요."},{"y":2025,"u":"국민대학교","c1":"인성","c2":"인성","q":"주위 친구들과 협력하여 좋은 결과를 얻어낸 적이 있다면 본인이 한 역할에 대해 말해보세요."},{"y":2025,"u":"덕성여자대학교","c1":"서류 신뢰성","c2":"인성","q":"보도제작부 활동에서 가장 의밍 있었던 주제는 무엇이었나요?\n[사회과제연구] 장기 프로젝트를 수행했는데, 수행기간은? 해당 과제에서 설문조사 진행과 분석 방법은 어떤 방식을 활용했나요?\n3년간 동아리활동을 보면 아동/교육 분야에 관심이 보이는데, 3학년 자율교육과정에서 다룬 주제와 어떻게 연결했나요?\n2학년과 3학년 과학탐구로 항균에 관한 실험을 다르게 진행했는데, 두 실험의 차이는 무엇이라 생각하나요?\n학급 영어부장은 어떤 활동을 하며, 그 과정 속에서 배운 점은 무엇인가요?\n지원자의 장점을 발휘했던 교내활동이 있다면? 지원자의 장점이 대학 생활을 하는데 어떤 도움이 된다고 생각하나요?"},{"y":2025,"u":"덕성여자대학교","c1":"종합적 사고력","c2":"인성","q":"보도제작부 활동에서 가장 의밍 있었던 주제는 무엇이었나요?\n[사회과제연구] 장기 프로젝트를 수행했는데, 수행기간은? 해당 과제에서 설문조사 진행과 분석 방법은 어떤 방식을 활용했나요?\n3년간 동아리활동을 보면 아동/교육 분야에 관심이 보이는데, 3학년 자율교육과정에서 다룬 주제와 어떻게 연결했나요?\n2학년과 3학년 과학탐구로 항균에 관한 실험을 다르게 진행했는데, 두 실험의 차이는 무엇이라 생각하나요?\n학급 영어부장은 어떤 활동을 하며, 그 과정 속에서 배운 점은 무엇인가요?\n지원자의 장점을 발휘했던 교내활동이 있다면? 지원자의 장점이 대학 생활을 하는데 어떤 도움이 된다고 생각하나요?"},{"y":2025,"u":"덕성여자대학교","c1":"인성","c2":"인성","q":"보도제작부 활동에서 가장 의밍 있었던 주제는 무엇이었나요?\n[사회과제연구] 장기 프로젝트를 수행했는데, 수행기간은? 해당 과제에서 설문조사 진행과 분석 방법은 어떤 방식을 활용했나요?\n3년간 동아리활동을 보면 아동/교육 분야에 관심이 보이는데, 3학년 자율교육과정에서 다룬 주제와 어떻게 연결했나요?\n2학년과 3학년 과학탐구로 항균에 관한 실험을 다르게 진행했는데, 두 실험의 차이는 무엇이라 생각하나요?\n학급 영어부장은 어떤 활동을 하며, 그 과정 속에서 배운 점은 무엇인가요?\n지원자의 장점을 발휘했던 교내활동이 있다면? 지원자의 장점이 대학 생활을 하는데 어떤 도움이 된다고 생각하나요?"},{"y":2025,"u":"동국대학교","c1":"전형취지적합성","c2":"인성","q":"1~3학년 진로활동을 보면, 원래 수의학과를 희망했다가 생명과학과로 진로를 변경했는데요. 생명과학 분야 중 특히, 합성생물학에 관심을 갖고 진로주제탐구를 하게 된 계기와 이유가 있다면 얘기해 주세요.\n2학년 진로활동을 보면 사회적 약자를 주제로 진로 탐구활동을 했다고 되어 있는데요. 탐구과정에서 알게 된 사회적 약자의 어려움은 무엇이었고 본인은 이에 대해 어떤 해결방안을 제시하였나요? 이와 관련해 법학과 입학 후 본인이 목표하는 바가 있다면 얘기해보세요.\n3학년 진로와 직업에서 IoT 개발자가 되고 싶다고 기재되어 있는데요. 해당 진로를 생각하게 된 계기와 대학 입학 후 배우고 싶은 전공 분야가 있다면 얘기해보세요.\n1학년 행동특성 및 종합의견에서 평소 사회적 약자에 관심이 많고 특수교사와 행정가로서의 자질과 성품이 배어있다고 기재되어 있는데요. 그럼에도 불구하고 경영학과에 지원한 이유와 입학 후 본인이 목표하는 바는 무엇인지 얘기해주세요."},{"y":2025,"u":"동국대학교","c1":"전공적합성","c2":"인성","q":"1학년 동아리활동에서 동아리 차장으로서 학교 공간 조성을 위한 사용자 참여 설계 프로젝트에 참여하고 아이디어를 제안했다고 되어 있는데요. 학교 공간에 어떤 문제가 있었고 본인이 제시한 아이디어는 무엇이었는지 설명해주세요. 또 동아리원들과 협업시 어려웠던 점이 있었다면 이야기해 주세요.\n3학년 수업량 유연화에 따른 교육과정에서 코딩과 알고리즘에 대해 학습했다고 했는데요. 알고리즘이 무엇인지 예를 들어 설명해주세요. 또 코딩과정에서 협업의 중요성을 느끼게 되었다고 했는데요. 그 이유를 설명해 주세요.\n2학년 윤리와사상 시간에 ‘현대 사회 윤리 문제 탐구하기’활동을 하며 불교와 도가 사상을 바탕으로 환경오염 문제를 해결하는 방안을 조사하고 발표했다고 했는데요. 본인이 탐구한 내용을 소개해 주세요.\n물리학Ⅰ시간에 전자기유도에 대해 학습하고 전자기유도실험도 했는데요. 전자기유도가 무엇인지 설명해보고, 실험 결과 어떤 경우에 강한 전류가 흘렀는지 얘기해 주세요.\n고전 읽기 수업에서 ‘짐노래’와 ‘빈녀음’ 속 여성 화자들의 고단한 삶을 이해한 뒤 어머니의 고됨을 이해하는 편지를 썼다고 되어 있는데요. 어머니에게 편지를 쓴 까닭과 고전이 우리 삶에 어떤 영향을 끼칠 수 있는지 설명해 주세요.\n3학년 화법과 작문, 2학년 문학 과목 세특을 살펴보면 ‘언어 능력이 탁월하다’, ‘발표 능력이 우수하다’ 등 언어 및 소통 역량에 대해 기재되어 있는데요. 본인의 의사소통 능력을 어떻게 생각하는지 얘기해 주세요. 또 그러한 역량이 약사가 되는데 어떤 긍정적인 영향을 줄 거라고 생각하나요?\n2학년 진로활동에서 ‘역사교사의 사회적 역할’을 주제로 발표했는데, 어떤 내용이었는지 설명해주세요. 해당 활동을 통해 느낀 점과 본인이 바라는 역사교사의 모습에 대해 설명해 주세요.\n3학년 때 인공지능 기초 과목을 이수하게 된 계기가 있다면 말해주세요. 수업 시간에 AI가 건축가를 대체할 수 있을지에 대한 고민을 바탕으로 인공지능의 건축적 쓰임에 관한 실태를 주제로 발표했다고 하는데요. 발표한 내용을 소개해주세요."},{"y":2025,"u":"동국대학교","c1":"발전가능성","c2":"인성","q":"- 창의적 체험활동을 보면 어르신 대상 복지제도와 사회복지사의 업무에 대해 관심을 갖고 조사하는 활동을 했다고 되어 있는데요. 본인이 탐색한 내용을 토대로 어르신을 대상으로 일하는 사회복지사의 경우 가장 바람직한 관점, 태도는 무엇이라고 생각하나요?"},{"y":2025,"u":"동국대학교","c1":"인성 및 사회성","c2":"인성","q":"2학년 출결상황에 미인정 지각이 3번 있었는데요. 어떤 이유였는지 설명해 줄 수 있나요? 또 이를 개선하기 위한 노력이 있었다면 얘기해주세요.\n2~3학년 때 전교 학생자치회 홍보마케팅부 차장으로 학교를 알리는 행사를 구성하고 리더십을 발휘했다고 했는데요. 어떤 행사를 기획했는지 얘기해 주세요. 또 해당 활동 과정에서 친구들과 협력한 내용이 있다면 얘기해 주세요.\n3학년 때 미적분 과목 멘토로 활동했다고 되어 있는데요. 멘티가 가장 어려워했던 부분은 무엇이고 이를 해결하기 위해 본인은 어떤 노력을 기울였나요? 또 멘토-멘티 활동을 하며 배운 점이 있다면 말해 주세요."},{"y":2025,"u":"동덕여자대학교","c1":"학업역량","c2":"인성","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n○학년 ○학기에 실시했던 교내 ○○활동의 과정을 구체적으로 말하고 그 활동이 지원 전공과 관련하여 어떤 의미를 가지는지 설명해 보세요.\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},{"y":2025,"u":"동덕여자대학교","c1":"진로역량","c2":"인성","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n○학년 ○학기에 실시했던 교내 ○○활동의 과정을 구체적으로 말하고 그 활동이 지원 전공과 관련하여 어떤 의미를 가지는지 설명해 보세요.\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},{"y":2025,"u":"동덕여자대학교","c1":"공동체역량","c2":"인성","q":"○○활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n○학년 ○학기 ○○시간에 ○○발표를 했다고 되어 있는데 발표한 내용에 대해서 간략하게 말씀해주세요.\n○○전공을 위해 고등학교에서 어떤 과목을 학습(선택) 했습니까? 그 과목 중 기억에 남는 학습 내용이 있다면 말씀해 주세요.\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n○학년 ○학기에 실시했던 교내 ○○활동의 과정을 구체적으로 말하고 그 활동이 지원 전공과 관련하여 어떤 의미를 가지는지 설명해 보세요.\n고교생활 중 타인을 위해 자  수 있는 경험은?"},{"y":2025,"u":"명지대학교","c1":"교과면접","c2":"건축학\n전공","q":"본인의 리더십 경험을 말해주세요.\n본인이 방문한 건축물?\n건축에 관련되어 읽어본 책은?\n건축은 다양한 요인들이 영향을 끼칩니다. 우리나라에서는 어떤 요인이 가장 중요하다고 생각하는지 두가지 요인을 꼽아주세요.\n그 요인을 적용한 건축가나 건축물을 알고 있으면 얘기해 주세요."},{"y":2025,"u":"명지대학교","c1":"교과면접","c2":"전통\n건축학\n전공","q":"공동의 목표를 위해 본인이 솔선수범했던 경험은?\n전공관련 동아리 혹은 진로탐색 활동 경험을 이야기해주세요.\n건축가로서 이성과 감성이 모두 중요한데 본인은 어떠한 부분에 강점이 있으며, 약한 부분을 보완하기 위해 어떠한 노력을 했나?\n좋아하는 건축 작품, 건축가, 관련 서적은?\n건축가로서 본인의 어떠한 부분이 강점으로 작용할 수 있을까요?"},{"y":2025,"u":"명지대학교","c1":"명지인재면접","c2":"전통\n건축학\n전공","q":"수행평가로 ○○에 대해 조사했는데, ○○이 무엇인고 왜 필요하다고 생각하는가?\n수업시간에 ‘○○’에 대해 토론했다고 하는데 본인은 찬성과 반대 중에 어떤 입장이었고, 그 근거가 무엇인가요? 그리고 상대편의 입장은 어땠나요?\n수업시간에 ○○ 실험을 했는데 어떤 원리를 활용하였나요?\n○학년 ○학기 학생회장을 하셨습니다. 학생들의 안건을 학교에 효과적으로 전달하는 방법은 무엇이었나요?\n진로활동시간에 ○○관련 발표를 했군요. 발표 준비를 위해 어떤 노력을 했나요? 그 과정에서 어려움은 없었나요?"},{"y":2025,"u":"삼육대학교","c1":"전공적합성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"삼육대학교","c1":"발전가능성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"삼육대학교","c1":"인성","c2":"전통\n건축학\n전공","q":"일반 면접은 면접 예시를 제시하지 않음\n제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"상명대학교","c1":"학업역량","c2":"전통\n건축학\n전공","q":"수학교과의 성취도가 다른 교과에 비해 낮은 편으로 보이는데 수학교과 역량 증진을 위해 어떤 노력을 하였나요?\n스스로 해결하지 못하는 과제에 직면했을 때 해결해본 경험이 있나요? 어떤 방법으로 해결하였나요?\n만화스토리 구성이란 수업을 이수했는데, 본인이 파악하고 있는 만화스토리 구성의 핵심은 어떤 것인지 간략하게 설명해주세요.\n만화콘텐츠 제작 수업에서 ‘작품 속 캐릭터들의 의상과 소품 디자인에 신경을 쓰며, 각 캐릭터의 개성을 잘 살리는 능력’이 있다고 되어 있는데 캐릭터 디자인에 있어서 소품들은 어떤 역할을 하는지 설명해 줄 수 있나요?"},{"y":2025,"u":"상명대학교","c1":"진로역량","c2":"전통\n건축학\n전공","q":"우리 전공에 지원한 이유가 무엇인가요? 합격하게 된다면 앞으로의 학업 계획을 어떻게 세울지 생각해 본 적 있나요?\n사진작가인 자신의 꿈을 소개하고 자신이 사진을 찍는 이유와 사진을 통해 만나는 세상의 여러 가지 이야기를 소탈하게 이끌어 낸다고 되어 있는데, 사진 및 영상에서 어떤 분야를 공부하고 싶은지, 진로 계획에 대해 설명해 주세요.\n○○작가처럼 자신의 철학을 잘 나타내는 사진작가가 되고 싶다고 되어 있는데 사진 관련 어떤 분야를 공부하고 싶나요?"},{"y":2025,"u":"상명대학교","c1":"공동체역량","c2":"전통\n건축학\n전공","q":"모둠활동의 조장으로서 적극적으로 팀을 위하여 노력하였다고 하는데 어떤 노력을 하였는지 이야기 해주세요.\n동아리활동 중 갈등상황을 중재하는 역할을 하였다고 하는데 본인의 해결방법은 무 게 좁힐 수 있을까요?\n동아리 활동을 통해 유용미생물 EM을 활용한 하수 처리에 대해서 공부하였는데, 이에 관하여 설명해 보세요.\n통합사회 시간에 문화상대주의가 경계해야 할 점과 보편 윤리의 중요성에 대해 고민하였는데, 이를 소개해보세요."},{"y":2025,"u":"성신여자대학교","c1":"일반학과","c2":"학업역량","q":"우리 학과는 공과대학기반이므로 물리에 대해 기초기식도 필요합니다. 편제표를 살펴보면 물리학 Ⅰ/Ⅱ를 선택하지 않았는데, 입학 후 어떻게 극복할 계획인가요?\n수학Ⅱ에서 경사하강법에 대해 조사한 경험이 있는데, 경사하강법이란 무엇인가요?\n한국고전문학 관련하여 칼럼을 제작한 것이 인상적인데, 탐독하였던 숙향전의 경우 주인공의 어떤 점이 영웅적 면모로 느껴졌는지 말해보세요.\n진로탐구활동에서 조사했던 RNA와 DNA의 구조적 차이에 대해 설명하시오."},{"y":2025,"u":"세종대학교","c1":"세종창의인재 (면접형)","c2":"창의\n소프트\n학부","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"세종대학교","c1":"세종창의인재 (면접형)","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"숙명여자대학교","c1":"진로역량","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"숙명여자대학교","c1":"탐구역량","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"숙명여자대학교","c1":"공동체의식과 협업능력","c2":"인문·자연, 국방\n시스템\n공학과","q":"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},{"y":2025,"u":"숭실대학교","c1":"전공적합성","c2":"인문·자연, 국방\n시스템\n공학과","q":"○○활동이 가장 활발해 보이는데, 이 활동은 무엇인가요?\n전반적인 성적보다 ○○교과 성적이 좋은데(혹은 나쁜데) 이유가 있나요?\n지원 전공 분야에 대해 알고 있는 현재 이슈가 있는지 특히 관심있는 분야는 무엇인가요\n분야가 유망하다고 생각하는 이유를 말해보세요 의 활용사례에 대해 말해보세요.\n학업계획에 ○○가 꿈이라고 했는데 관심 갖게 된 동기가 무엇인가요?\n○○라는 진로를 결정하게 된 결정적인 활동을 구체적으로 설명해 보세요\n본인이 이 학과와 잘 맞는다고 생각하는 강점과 그 이유를 설명해 보세요\n숭실대학교 학과에 지원한 동기를 이야기해 보세요."},{"y":2025,"u":"숭실대학교","c1":"인성, 잠재력","c2":"인문·자연, 국방\n시스템\n공학과","q":"○○활동이 가장 활발해 보이는데, 이 활동은 무엇인가요?\n전반적인 성적보다 ○○교과 성적이 좋은데(혹은 나쁜데) 이유가 있나요?\n지원 전공 분야에 대해 알고 있는 현재 이슈가 있는지 특히 관심있는 분야는 무엇인가요\n분야가 유망하다고 생각하는 이유를 말해보세요 의 활용사례에 대해 말해보세요.\n학업계획에 ○○가 꿈이라고 했는데 관심 갖게 된 동기가 무엇인가요?\n○○라는 진로를 결정하게 된 결정적인 활동을 구체적으로 설명해 보세요\n본인이 이 학과와 잘 맞는다고 생각하는 강점과 그 이유를 설명해 보세요\n숭실대학교 학과에 지원한 동기를 이야기해 보세요."},{"y":2025,"u":"연세대학교(서울)","c1":"논리적 사고력 및 의사소통 능력","c2":"인문·자연, 국방\n시스템\n공학과","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"연세대학교(미래)","c1":"학교생활우수자","c2":"인성 및 가치관\n(의예과: 의학적 인성)","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"연세대학교(미래)","c1":"동  있는지와 있다면 그 이유는 무엇인가요?\n(공공인재학부) 확률과 통계 수업에 여론조사에서의 표본 오차와 신뢰수준에 대해 분석한 후 여론조사와 여론에 의해 잠식되는 행정 문제 해결방안을 명확히, 제시하는 과정이 매우 인상적이라고 기재되어 있는데 표본오차와 신뢰수준이 무엇이며 이것을 분석하여 어떻게 해결방안을 제시하였는가?\n(공공인재학부) 2학년 경찰에 대한 청소년의 인식과 인식 개선의 필요성을 주제로 한 자율주제 연구활동에서 설문조사의 문항을 개발했다고 했는데 어떤 자료를 근거로 개발했으며, 어떤 과정을 통해 만들었는지 말씀해 주세요.\n(경제학부) 2학년 경제 수업에서 시장실패의 유형 중 외부효과를 학습한 후 교내 면학분위기 개선을 위한 방안 마련을 위한 탐구활동을 수행하였습니다. 외부효과의 개념에 대해 설명하고 외부효과의 개념을 적용해서 어떤 개선 방안을 도출했는지 말씀해 주세요.\n(경제학부) 2학년 경제수학 시간에 일상에서 인플레이션 측정하기 활동을 수행하였습니다. 구체적으로 어떤 활동을 수행하였으며 어떤 결론에 도달하였는지 설명해 주세요.\n(광고홍보학과) 3학년 영어 독해와 작문 시간에 현세대의 간식 섭취에 대한 부정적 인식 부족과 인스턴트 선호가 간식 소비량 증가로 이어졌다는 관계성을 분석하였다고 되어 있는데 어떤 방법으로 분석한 것인지 말씀해 주세요.\n(광고홍보학과) 2학년 독서 시간에 미디어의 이해라는 책을 읽고 소셜 미디어는 도구가 아닌 사용자 그 자체라고 표현했다고 되어 있는데 어떤 의미로 이렇게 작성한 것인지 구체적으로 설명해 주세요.\n(물리학과) 물리학Ⅰ에서 스넬의 법칙의 다양한 증명 방법이라는 주제로 탐구 활동을 진행했다고 했는데 스넬의 법칙이 무엇이고 그것이 성립하는 물리적인 이유가 무엇인지 설명해 주세요.\n(물리학과) 2학년 때 ‘레이저를 이용한 음파 탐구’를 주제로 프로젝트에 참여해서 보조 스피커의 배치에 따라 음향의 차이가 발생하는 이유를 분석했다고 했습니다. 레이저로 음파를 탐구하는 원리와 스피커 배치에 따른 음향 차이의 이유를 설명해 주세요.\n(생명과학과) 2학년 생명과학I 시간을 통해 식물에 물을 주는 주기나 양과 뿌리 호흡량과의 관계를 측정하였다고 하였는데 어떤 방법으로 뿌리 호흡량을 측정하였는지 설명해 주세요.\n(생명과학과) 3학년 동아리 활동 과정에서 페트병에서의 세균 증식 관련 실험을 수행하면서 실패 요인 분석과 결론 도출에 기여한 것으로 보이는데 본인이 제시했던 실패 요인과 그 이유를 설명해 주세요."},{"y":2025,"u":"중앙대학교","c1":"CAU\n탐구형\n인재","c2":"전공\n(계열) 적합성","q":"(국어국문학과) 2학년 문학 수업에서 염상섭을 집중적으로 탐구하였는데 염상섭의 특징적 면모를 표현과 내용의 측면에서 말씀해 주세요.\n(국어국문학과) 3학년 문학개론 수업에서 구운몽(김만중)을 읽고 고전소설에 나타난 꿈의 역할에 대해 발표하고 이것이 현대 문학에 어떻게 전승되어 왔는지를 조리있게 설명했다고 했는데 현대문학에 전승된 양상을 설명해 주세요.\n(정치국제학과) 2학년 동아시아사에서 임진왜란과 6.25전쟁을 비교하여 탐구 보고서를 작성하고 발표하였는데, 이 둘은 국제 전쟁이라는 공통점이 있지만 차이점도 가지고 있다. 보고서를 작성하면서 참고했던 자료에 기반할 때 두 전쟁의 큰 차이점은 무엇이라고 생각하나요?\n(정치국제학과) 3학년 진로 활동에서 ‘왜 세계의 가난은 사라지지 않는가(장 지글러)’를 읽고 독후 활동을 하였는데 이 책의 주장 중에서 본인의 생각과 다르거나 다시 생각해봐야 한다고 생각하는 주장이 있는지와 있다면 그 이유는 무엇인가요?\n(공공인재학부) 확률과 통계 수업에 여론조사에서의 표본 오차와 신뢰수준에 대해 분석한 후 여론조사와 여론에 의해 잠식되는 행정 문제 해결방안을 명확히, 제시하는 과정이 매우 인상적이라고 기재되어 있는데 표본오차와 신뢰수준이 무엇이며 이것을 분석하여 어떻게 해결방안을 제시하였는가?\n(공공인재학부) 2학년 경찰에 대한 청소년의 인식과 인식 개선의 필요성을 주제로 한 자율주제 연구활동에서 설문 수행하였습니다. 구체적으로 어떤 활동을 수행하였으며 어떤 결론에 도달하였는지 설명해 주세요.\n(광고홍보학과) 3학년 영어 독해와 작문 시간에 현세대의 간식 섭취에 대한 부정적 인식 부족과 인스턴트 선호가 간식 소비량 증가로 이어졌다는 관계성을 분석하였다고 되어 있는데 어떤 방법으로 분석한 것인지 말씀해 주세요.\n(광고홍보학과) 2학년 독서 시간에 미디어의 이해라는 책을 읽고 소셜 미디어는 도구가 아닌 사용자 그 자체라고 표현했다고 되어 있는데 어떤 의미로 이렇게 작성한 것인지 구체적으로 설명해 주세요.\n(물리학과) 물리학Ⅰ에서 스넬의 법칙의 다양한 증명 방법이라는 주제로 탐구 활동을 진행했다고 했는데 스넬의 법칙이 무엇이고 그것이 성립하는 물리적인 이유가 무엇인지 설명해 주세요.\n(물리학과) 2학년 때 ‘레이저를 이용한 음파 탐구’를 주제로 프로젝트에 참여해서 보조 스피커의 배치에 따라 음향의 차이가 발생하는 이유를 분석했다고 했습니다. 레이저로 음파를 탐구하는 원리와 스피커 배치에 따른 음향 차이의 이유를 설명해 주세요.\n(생명과학과) 2학년 생명과학I 시간을 통해 식물에 물을 주는 주기나 양과 뿌리 호흡량과의 관계를 측정하였다고 하였는데 어떤 방법으로 뿌리 호흡량을 측정하였는지 설명해 주세요.\n(생명과학과) 3학년 동아리 활동 과정에서 페트병에서의 세균 증식 관련 실험을 수행하면서 실패 요인 분석과 결론 도출에 기여한 것으로 보이는데 본인이 제시했던 실패 요인과 그 이유를 설명해 주세요."},{"y":2025,"u":"총신대학교","c1":"학생부교과","c2":"신앙","q":"안락사와 관련해서 ‘죽을 권리’(right to die)에 대한 논의가 있다. 이와 관련하여 신앙적으로 설명하시오.\n‘창조론’과 ‘진화론’ 중에 어떤 관점이 더 성경적인 관점이고 왜 그렇게 생각하는지에 대해 설명하시오."},{"y":2025,"u":"총신대학교","c1":"학생부교과","c2":"인성","q":"만약 당신이 며칠 전이나 수십, 수백 년 전이든 과거 언제라도 돌아갈 수 있다면, 어느 시점으로 돌아가서 어떠한 사회문제를 해결하고 싶은지 이유와 함께 말하시오.\n본인이 불공정한 상황을 목격했거나 경험했던 사례를 들어보시오. 그 상황을 해결하기 위해 어떤 노력을 하였는지, 또는 어떻게 대처할 수 있을지 말하시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(목회자 추천자)","c2":"신앙","q":"성경을 묵상하면서 얻게 되는 유익은 무엇인지 말하시오.\n‘십계명’이 구약 시대 이스라엘 백성들이 받은 과거의 법임에도 불구하고, 현재 우리도 지켜야 하는 이유에 대해 설명하시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(목회자 추천자)","c2":"인성","q":"친하게 잘 지내는 친구가 ‘내가 싫어하는 동급생의 얼굴을 사용하여 그를 비웃거나 조롱하는 내용을 담은 AI 딥페이크 영상’을 보여주었다면, 그 친한 친구에게 어떻게 말할 것인지를 설명하시오.\n친한 친구들이 단체 채팅방에서 성적 농담을 하며 부적절한 콘텐츠를 공유할 때, 어떻게 대처할 것인지 구체적으로 설명하시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(코람데오인재)","c2":"신앙","q":"기독교와 타종교 사이에서 구원받는 방식의 차이점에 대해 말하시오.\n‘굳이 예수님을 믿지 않아도 아주 착하게 살기만 하면 구원받을 수 있다’라는 생각에 대해 어떻게 생각하는지 말하시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(코람데오인재)","c2":"인성","q":"환경을 위해 일상생활에서 재활용을 잘하고 있었다. 하지만 재활용된 플라스틱의 상당 부분이 매립되거나 소각되어 재활용되지 않는다는 사실을 알게 되었다. 이를 어떻게 대처해 나갈 것인지 설명하시오.\n킥보드는 이동에 용이한 장점이 있으나 최근 안전사고가 많이 발생하고 있다. 전동 킥보드를 안전하게 이용할 수 있는 구체적인 대안과 방법이 무엇이 있는지 설명해 보시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(코람데오인재\n외 전형)","c2":"신앙","q":"기독교 문화와 세상 문화 사이에서 ‘술’에 대한 기독교적 관점을 이해하고 있는지를 확인합니다.\n동성애 축제인 ‘퀴어문화축제’가 기독교적으로 큰 문제가 되고 있다. 기독교적 관점에서 ‘퀴어문화축제’의 문제점에 대해 말하시오."},{"y":2025,"u":"총신대학교","c1":"학생부종합\n(코람데오인재\n외 전형)","c2":"인성","q":"돈이 충분히 있다면 사고 싶은 것 한 가지와, 돈으로는 절대 살 수 없다고 생각하는 것 한 가지를 이유와 함께 설명하시오.\n본인의 교회 또는 학교생활 중 경험했던 가장 큰 도전은 무엇이었나요? 그 상황을 어떻게 대처했고, 어떤 교훈을 얻었는지 설명하시오."},{"y":2025,"u":"강서대(케이씨대)","c1":"본교 인재상 부합정도","c2":"인성","q":"(신학과) 강서대학교 인재상과 부합하는 자신의 장점이나 특기는 무엇인가요?\n(신학과) 교회를 다니나요? 교회를 다니지 않는다면 신학과에 지원한 동기가 무엇인가요?\n(신학과) 한국이나 외국 역사에서 가장 존경하는 인물은 누구이며, 그 이유는 무엇인가요?\n(신학과) 학교 공부를 진행하는 중에 갑자기 진로를 변경하고 싶은 마음이 생긴다면 어떻게 하시겠어요?\n(G2빅데이터경영학과) 자신의 장점이나 특기는 무엇인가요? 강서대학교 인재상과 연결해서 설명해 보세요.\n(G2빅데이터경영학과) G2빅데이터경영학과를 졸업 후에 어떤 일을 하고 싶으세요?\n(G2빅데이터경영학과) 시험 때 부정행위를 하는 친구를 발견하게 됐다면 어떻게 할 것인가요?\n(G2빅데이터경영학과) 고등학교 재학 기간 중 경험한 일 중 도전적인 목표를 정하고 노력해서 성취해낸 일이 있다면 말해 보세요.\n(사회복지학과) 10년 후 나는 어떤 능력과 역량을 갖춘 인재가 되어 있을까요?\n(사회복지학과) 사회복지학과 지원동기를 자신의 꿈과 관련지어 말해주세요.\n(사회복지학과) 자신이 누군가의 도움이 되었던 경험을 이야기하고, 왜 도와주어야 한다고 생각했는지 말해보세요.\n(사회복지학과) 사회복지와 관련된 활동을 한 것이 있다면 말해  보세요\n(상담심리학과) 강서대학교는 어떤 대학이라고 알고 있나요? 강서대학교를 선택한 이유를 얘기해 보세요.\n(상담심리학과) 상담이란 무엇이라고 생각하나요?\n(상담심리학과) 자신이 가장 중요하게 여기는 인생의 가치는 무엇인가요? 그 이유는 무엇인가요?. 고교 생활을 하면서 힘들었지만, 성공적으로 해결했던 일에 대해 말해 보세요.\n(간호학과) 살면서 중요하다고 생각하는 가치 또는 삶의 모토가 무엇이며 그것을 중요하게 생각하는 이유를 얘기해 보세요.\n(간호학과) 좋은 간호사가 되려면 어떤 준비가 필요하며, 본인의 준비 정도에 대해 말해보세요.\n(간호학과) 1억 복권에 당첨된다면 어떻게 사용할지와 그 이유에 대해 말해보세요.\n(간호학과) 본인의 학업 능력은 어느 수준이라고 스스로 판단하며, 그 근거는 무엇인가요?\n(식품영양학과) 강서대학교 인재상에 걸맞은 자기소개를 해주세요.\n(식품영양학과) 인공지능에 의한 식단작성이 가능한 시대가 온다면, 이 시기 영양사의 역할이 무엇이라고 생각하나요?\n(식품영양학과) 지금까지 살아오면서 가장 감사했던 일은 무엇이었나요?\n(식품영양학과) 자신이 가장 취약한 교과목은 무엇이며 성적향상을 위해 어떤 노력을 하였나요?\n(실용음악학과) 강서대학교는 어떤 대학이라고 알고 있는지 말씀해 주세요.\n(실용음악학과) 강서대학교 실용음악학과에 입학하게 된다면 어떤 주제나 내용을 공부하고 싶은지 구체적으로 설명해 주세요.\n(실용음악학과) 어떤 음악을 추구하고 좋아하는지, 그리고 음악을 통해 이루고 싶은 목표가 있다면 무엇인지 소개해주세요.\n(실용음악학과) 강서대학교 실용음악학과에 입학하게 되면 학업 및 학과생활과 관련하여 어떤 활동들을 하고 싶은지 말씀해 주세요."},{"y":2025,"u":"강서대(케이씨대)","c1":"지원한 전공 관심도","c2":"인성","q":"(신학과) 강서대학교 인재상과 소비자에게 어떠한 영향을 미치는지에 대해서 설명해 주세요\n과목에서 황동규의 '즐거운 편지'를 제재로 역설과 반어를 설명하는 수업을 구상했다고 되어 있는데 두 개념의 차이점을 예를 들어 설명해 주세요\n'ESG경영의 필요성'이라는 제목으로 영상 제작 활동을 진행하였다고 기재되어 있습니다. ESG 경영의 개념과 한계점에 대해 설명해 주세요\n과목에서 '훌륭한 교사는 무엇이 다른가'라는 책을 읽고 감상문을 작성한 것으로 되어 있는데 이 책의 내용에 비추어 훌륭한 국어 교사의 자질을 설명해 주세요.\n체육교사가 되고 싶었었는데 경영학을 전공하고 싶은 이유는 무엇이며, 경영학과 졸업 후 어떠한 진로로 나아가고 싶은지에 대해 말해주세요.\n일하고 싶은 국제기구가 무엇이며 어떠한 활동에 기여하고 싶은지 설명해 주세요.\n미국 달러가 주요 기축통화가 된 이유는 무엇이며 중국 위안화의 영향력은 어떻게 변화하고 있는지 설명해 보세요.\n3학년 비교과 활동으로 수행했던 가상현실 기술과 관련하여 이 기술이 물류의 스마트화에 어떤 기여를 할 수 있는지에 대한 의견을 말해주세요.\n최근 청소년범죄가 강력해지고 있는데 어떤 처벌을 해야 한다고 생각하는지 말해주세요.\n진로 심화 탐구 활동에서 마케터에 대해 조사했는데 인공지능 시대 마케터에게 필요한 자질은 무엇이라고 생각하는지 말해주세요.\n동아리 활동에서 데이터 센터가 기업의 회계 정보를 어떻게 보호하고 있는지를 탐구한 경험이 있다고 하는데, 이에 관하여 이야기해 주세요.\n세무회계학과를 진학하기 위해 동아리 활동을 제외한 다른 활동에 참여한 경험이 있나요?\n교사로서 자신의 장단점은 무엇이라고 생각하는지 말해주세요.\n3학년 동아리 활동에서 빠른 근육 피로도 개선을 통한 운동수행능력 향상에 관심을 두고 다양한 문헌을 조사했다고 기재되어 있습니다. 이 부분에 대한 자세히 설명해 보세요.\n유명 기업의 성공 또는 실패 사례를 분석하여 경영 전략의 실질적인 적용 방식을 이해하였다고 기재되어 있습니다. 활동에서 분석한 기업 경영전략 사례와 분석 내용을 말해보세요.\n교과세특에 뉴런의 종류와 구조를 설명할 수 있다고 기재되어 있습니다. 뉴런의 구조를 설명한 후, 어떤 구조적 특성에 따라 흥분 전달 속도에 차이가 나타날 수 있는지 설명해 주세요.\n아동이 사회적 의사소통을 체험할 수 있는 기회를 연습할 수 있는 수업을 설계하였다고 기재되어 있습니다. 해당 수업 계획에 대해 자세히 설명해 보세요.\n공학계열에 관심있는 학생들과 함께 '스마트 미러'를 제작했다고 하는데 해당 활동 내용에 대해 이야기해 주세요.\n이수했던 수학교과 중, 가장 즐겁게 공부했던 단원과 가장 어려웠던 단원과 그 이유를 알려주세요.\n건전지의 내부 저항에 대해서 설명해보시오.\n동아리활동에서 'A crash course in organic chemistry' 시청했다고 하는데, '에피네프린'의 뜻과 기능, 쓰임에 대해 설명해 주세요.\n1학년 때는 건축 분야 및 인테리어 관련된 꿈을 가지고 있었는데, 에너지화학공학과에 진학하게 된 이유는 무엇인가요?\n공동체 구성원으로서 공동체에 기여한 경험에 대하여 이야기 해보고 관련하여 무엇을 배울 수 있었는지 이야기해 보세요.\n지속적으로 화학공학에 관심이 있었던 것 같은데, 관심을 가지게 된 동기가 있나요?\n동아리원 사이의 의견충돌을 조율한 내용이 기재되어 있습니다. 이에 대해 어떻게 방법으로 의견을 조율하였는지 말해보세요.\n파이썬에서 randint 함수로 어떤 것을 만들어 봤나요? 이 함수는 무엇을 하는 함수인가요?\n'창의 미래 프로젝트'에 참여하여 '웹사이트를 통한 사회문제 해결'에 대해 탐구하였다고 기재되어 있습니다. 이에 대해 구체적으로 설명해 보세요.\n프로그래밍을 활용한 팀 프로젝트 경험에 대해 이야기해 보세요.\n통신기술에 관한 관심으로 변조기술의 원리에 대해 알아본 바 있다고 기재되어 있습니다. 이에 대해 구체적으로 설명해보세요.\n'경사하강법'이 다양한 분야에 활용됨을 설명하였다고 적혀있습니다. '경사하강법'에 대한 개념과 활용에 대해 구체적인 예시를 들어 설명해 주세요.\n유니티를 이용하여 만든 게임에서 본인의 역할은 무엇인지와 결과를 얻기 위한 과정을 설명해 보세요.\n기하 주제발표 수업에서 '벡터그래픽의 수학적원리-베지에 곡선'으로 정하고 벡터 그래픽과 비트맵 그래픽의 차이점을 알고 '베지에 곡선'을 사용하여 벡터 그래픽을 작성하는 원리와 그 중요성을 설명했다고 하는데 그 내용을 소개해 주세요.\n3학년 진로 활동시간에 재밌는 수학이라는 주제로 발표하였는데 수학에 흥미를 잃은 친구에게 어떻게 하면 수학에 흥미가 생기게 할 수 있을지 말해보세요.\n생명과학과 관련된 동아리 및 진로활동을 다수 수행하였는데 건설환경공학 전공으로 지원한 이유는 무엇인지 말해주세요.\n건설환경공학의 관점에서 환경오염을 해결하기 위한 대처방안은 어떠한 것이 있는지 말해보세요.\n2학년 진로활동 중 층간소음의 원인 중의 하나가 건설사들의 부실시공 문제가 있고, 이에 구조적인 부분을 포함하여 대책을 조사하여 개선 방법을 제안하였다고 되어 있는데, 어떤 내용을 제안하였는지 말해주세요.\n3학년 진로활동에서 4대강사업과 지구온난화로 인한 녹조 문제에 대하여 탐구활동을 하였는데, 녹조가 발생하는 이유와 이를 관리하기 위한 방법에 대해서 설명할 수 있는지 말해주세요.\n2학년 학급 특색활동인 드림스피치에서 '도시공학'을 주제로 자신의 진로에 대해 발표하였고 도시공학은 건축과 토목공학의 교집합임을 설명하고 자신이 존경하는 사람의 건축 사상과 도시설계철학을 소개하였다고 되어있는데, 그 사람이 누구인지와 그 사람의 건축 사상과 도시설계철학에 대해서 설명해 줄 수 있나요?\n‘건축의 세계로’라는 주제의 프로젝트로 참여하였다고 되어 있습니다. 먼저, 가장 관심을 가지고 있는 5개의 건축물을 선정하고, 직접 답사하며 자신의 생각을 정리하였다고 되어 있는데요, 어떤 건축물들을 선정하였나요?\n3학년 때 학급 신문 만들기 활동에서 스마트 건축을 주제로 친구들과 신문을 만들었는데, 스마트 건축이란 무엇이며, 어떠한 방식으로 이루어지는지 설명해주세요.\n건축 설계 프로그램에 대한 심화활동으로, CAD와 BIM 기술의 원리와 적용 방법에 관심을 갖고 있다고 적혀있습니다. CAD와 BIM의 공통점과 차이점은 무엇인가요?\n학급 구성원으로서 학생들의 신뢰를 얻었거나 또는 리더십으로 학생들에게 귀감이 되었던 경험담이 있다면 말씀해 주세요.\n영어Ⅱ 교과에서 생물발광과 생체모방기술에 대한 관심이 확인됩니다. 생체모방기술은 무엇이고 활용될 수 있는 분야는 무엇이 있을지 말해보세요.\n체육교사 또는 체육교육전문가가 되기 위한 학업 계획을 제시하고, 체육교육 이외의 다른 직업 분야로 진로가 바뀔 경우 어떻게 대처할 것인지 말해보세요.\n자신이 속한 팀이 심판이나 관중들로부터 차별적인 말이나 행위로 비난받고 있다. 팀의 일원으로서 어떤 역할을 할지 이야기해 보세요."},{"y":2025,"u":"인천대학교","c1":"발전역량","c2":"인성","q":"'좋은 글을 판단하는 기준'이란 글을 읽고 독서와 좋은 글의 관계를 설명하는 글을 썼다고 하는데, 그 내용을 소개해 주세요.\n보고서를 통해 생성형 인공지능의 개념과 여러 분야에서의 적용 방법을 조사하였다고 기재되어 있습니다. 자신이 제시한 적용 방법을 구체적으로 설명해 주세요.\n스포츠 캐스터 또는 해설위원이라는 분야에 관심을 가지게 된 이유는 무엇인가요? 해당 진로에 진출하는데 있어 미디어커뮤니케이션 전공이 어떤 장점이 있다고 생각하나요? 이에 대한 생각을 말해주세요.\n문헌정보학과 관련된 교과활동이나 진로탐색 활동이 있다면 말해 주세요.\n영어 에세이 쓰기 수행 평가에서 '도서관에서 사서의 구체적인 역할'을 주제로 글을 작성하였는데, 자신이 작성한 도서관에서 사서의 구체적 역할에 대해서 설명해 주세요.\n동아리 활동이 주로 경영 경제 관련 활동, 마케팅 등에 초점이 맞추어져 있는데 창의인재개발학과에 지원하게 된 동기나 계기는 무엇인가요?\n교사를 희망하다 사회복지로 지원한 이유는 무엇인가요?\n경영학과 경제학의 차이점에 대해 학생들에게 알렸다고 하는데 그 차이점은 무엇인가요?\n2학년 때 《중국 MZ세대와 미래》를 읽고 한국문화와 비교했다고 하는데, 그 내용에 대해서 자세히 설명해 주세요.\n'기업윤리와 사회적 책임'을 읽었는데 기업윤리에 어긋난 사례가 소비자에게 어떠한 영향을 미치는지에 대해서 설명해 주세요\n과목에서 황동규의 '즐거운 편지'를 제재로 역설과 반어를 설명하는 수업을 구상했다고 되어 있는데 두 개념의 차이점을 예를 들어 설명해 주세요\n'ESG경영의 필요성'이라는 제목으로 영상 제작 활동을 진행하였다고 기재되어 있습니다. ESG 경영의 개념과 한계점에 대해 설명해 주세요\n과목에서 '훌륭한 교사는 무엇이 다른가'라는 책을 읽고 감상문을 작성한 것으로 되어 있는데 이 책의 내용에 비추어 훌륭한 국어 교사의 자질을 설명해 주세요.\n체육교사가 되고 싶었었는데 경영학을 전공하고 싶은 이유는 무엇이며, 경영학과 졸업 후 어떠한 진로로 나아가고 싶은지에 대해 말해주세요.\n일하고 싶은 국제기구가 무엇이며 어떠한 활동에 기여하고 싶은지 설명해 주세요.\n미국 달러가 주요 기축통화가 된 이유는 무엇이며 중국 위안화의 영향력은 어떻게 변화하고 있는지 설명해 보세요.\n3학년 비교과 활동으로 수행했던 가상현실 기술과 관련하여 이 기술이 물류의 스마트화에 어떤 기여를 할 수 있는지에 대한 의견을 말해주세요.\n최근 청소년범죄가 강력해지고 있는데 어떤 처벌을 해야 한다고 생각하는지 말해주세요.\n진로 심화 탐구 활동에서 마케터에 대해 조사했는데 인공지능 시대 마케터에게 필요한 자질은 무엇이라고 생각하는지 말해주세요.\n동아리 활동에서 데이터 센터가 기업의 회계 정보를 어떻게 보호하고 있는지를 탐구한 경험이 있다고 하는데, 이에 관하여 이야기해 주세요.\n세무회계학과를 진학하기 위해 동아리 활동을 제외한 다른 활동에 참여한 경험이 있나요?\n교사로서 자신의 장단점은 무엇이라고 생각하는지 말해주세요.\n3학년 동아리 활동에서 빠른 근육 피로도 개선을 통한 운동수행능력 향상에 관심을 두고 다양한 문헌을 조사했다고 기재되어 있습니다. 이 부분에 대한 자세히 설명해 보세요.\n유명 기업의 성공 또는 실패 사례를 분석하여 경영 전략의 실질적인 적용 방식을 이해하였다고 기재되어 있습니다. 활동에서 분석한 기업 경영전략 사례와 분석 내용을 말해보세요.\n교과세특에 뉴런의 종류와 구조를 설명할 수 있다고 기재되어 있습니다. 뉴런의 구조를 설명한 후, 어떤 구조적 특성에 따라 흥분 전달 속도에 차이가 나타날 수 있는지 설명해 주세요.\n아동이 사회적 의사소통을 체험할 수 있는 기회를 연습할 수 있는 수업을 설계하였다고 기재되어 있습니다. 해당 수업 계획에 대해 자세히 설명해 보세요.\n공학계열에 관심있는 학생들과 함께 '스마트 미러'를 제작했다고 하는데 해당 활동 내용에 대해 이야기해 주세요.\n이수했던 수학교과 중, 가장 즐겁게 공부했던 단원과 가장 어려웠던 단원과 그 이유를 알려주세요.\n건전지의 내부 저항에 대해서 설명해보시오.\n동아리활동에서 'A crash course in organic chemistry' 시청했다고 하는데, '에피네프린'의 뜻과 기능, 쓰임에 대해 설명해 주세요.\n1학년 때는 건축 분야 및 인테리어 관련된 꿈을 가지고 있었는데, 에너지화학공학과에 진학하게 된 이유는 무엇인가요?\n공동체 구성원으로서 공동체에 기여한 경험에 대하여 이야기 해보고 관련하여 무엇을 배울 수 있었는지 이야기해 보세요.\n지속적으로 화학공학에 관심이 있었던 것 같은데, 관심을 가지게 된 동기가 있나요?\n동아리원 사이의 의견충돌을 조율한 내용이 기재되어 있습니다. 이에 대해 어떻게 방법으로 의견을 조율하였는지 말해보세요.\n파이썬에서 randint 함수로 어떤 것을 만들어 봤나요? 이 함수는 무엇을 하는 함수인가요?\n'창의 미래 프로젝트'에 참여하여 '웹사이트를 통한 사회문제 해결'에 대해 탐구하였다고 기재되어 있습니다. 이에 대해 구체적으로 설명해 보세요.\n프로그래밍을 활용한 팀 프로젝트 경험에 대해 이야기해 보세요.\n통신기술에 관한 관심으로 변조기술의 원리에 대해 알아본 바 있다고 기재되어 있습니다. 이에 대해 구체적으로 설명해보세요.\n'경사하강법'이 다양한 분야에 활용됨을 설명하였다고 적혀있습니다. '경사하강법'에 대한 개념과 활용에 대해 구체적인 예시를 들어 설명해 주세요.\n유니티를 이용하여 만든 게임에서 본인의 역할은 무엇인지와 결과를 얻기 위한 과정을 설명해 보세요.\n기하 주제발표 수업에서 '벡터그래픽의 수학적원리-베지에 곡선'으로 정하고 벡터 그래픽과 비트맵 그래픽의 차이점을 알고 '베지에 곡선'을 사용하여 벡터 그래픽을 작성하는 원리와 그 중요성을 설명했다고 하는데 그 내용을 소개해 주세요.\n3학년 진로 활동시간에 재밌는 수학이라는 주제로 발표하였는데 수학에 흥미를 잃은 친구에게 어떻게 하면 수학에 흥미가 생기게 할 수 있을지 말해보세요.\n생명과학과 관련된 동아리 및 진로활동을 다수 수행하였는데 건설환경공학 전공으로 지원한 이유는 무엇인지 말해주세요.\n건설환경공학의 관점에서 환경오염을 해결하기 위한 대처방안은 어떠한 것이 있는지 말해보세요.\n2학년 진로활동 중 층간소음의 원인 중의 하나가 건설사들의 부실시공 문제가 있고, 이에 구조적인 부분을 포함하여 대책을 조사하여 개선 방법을 제안하였다고 되어 있는데, 어떤 내용을 제안하였는지 말해주세요.\n3학년 진로활동에서 4대강사업과 지구온난화로 인한 녹조 문제에 대하여 탐구활동을 하였는데, 녹조가 발생하는 이유와 이를 관리하기 위한 방법에 대해서 설명할 수 있는지 말해주세요.\n2학년 학급 특색활동인 드림스피치에서 '도시공학'을 주제로 자신의 진로에 대해 발표하였고 도시공학은 건축과 토목공학의 교집합임을 설명하고 자신이 존경하는 사람의 건축 사상과 도시설계철학을 소개하였다고 되어있는데, 그 사람이 누구인지와 그 사람의 건축 사상과 도시설계철학에 대해서 설명해 줄 수 있나요?\n‘건축의 세계로’라는 주제의 프로젝트로 참여하였다고 되어 있습니다. 먼저, 가장 관심을 가지고 있는 5개의 건축물을 선정하고, 직접 답사하며 자신의 생각을 정리하였다고 되어 있는데요, 어떤 건축물들을 선정하였나요?\n3학년 때 학급 신문 만들기 활동에서 스마트 건축을 주제로 친구들과 신문을 만들었는데, 스마트 건축이란 무엇이며, 어떠한 방식으로 이루어지는지 설명해주세요.\n건축 설계 프로그램에 대한 심화활동으로, CAD와 BIM 기술의 원리와 적용 방법에 관심을 갖고 있다고 적혀있습니다. CAD와 BIM의 공통점과 차이점은 무엇인가요?\n학급 구성원으로서 학생들의 신뢰를 얻었거나 또는 리더십으로 학생들에게 귀감이 되었던 경험담이 있다면 말씀해 주세요.\n영어Ⅱ 교과에서 생물발광과 생체모방기술에 대한 관심이 확인됩니다. 생체모방기술은 무엇이고 활용될 수 있는 분야는 무엇이 있을지 말해보세요.\n체육교사 또는 체육교육전문가가 되기 위한 학업 계획을 제시하고, 체육교육 이외의 다른 직업 분야로 진로가 바뀔 경우 어떻게 대처할 것인지 말해보세요.\n자신이 속한 팀이 심판이나 관중들로부터 차별적인 말이나 행위로 비난받고 있다. 팀의 일원으로서 어떤 역할을 할지 이야기해 보세요."},{"y":2025,"u":"인천대학교","c1":"공동체역량","c2":"인성","q":"'좋은 글을 판단하는 기준'이란 글을 읽고 독서와 좋은 글의 관계를 설명하는 글을 썼다고 하는데, 그 내용을 소개해 주세요.\n보고서를 통해 생성형 인공지능의 개념과 여러 분야에서의 적용 방법을 조사하였다고 기재되어 있습니다. 자신이 제시한 적용 방법을 구체적으로 설명해 주세요.\n스포츠 캐스터 또는 해설위원이라는 분야에 관심을 가지게 된 이유는 무엇인가요? 해당 진로에 진출하는데 있어 미디어커뮤니케이션 전공이 어떤 장점이 있다고 생각하나요? 이에 대한 생각을 말해주세요.\n문헌정보학과 관련된 교과활동이나 진로탐색 활동이 있다면 말해 주세요.\n영어 에세이 쓰기 수행 평가에서 '도서관에서 사서의 구체적인 역할'을 주제로 글을 작성하였는데, 자신이 작성한 도서관에서 사서의 구체적 역할에 대해서 설명해 주세요.\n동아리 활동이 주로 경영 경제 관련 활동, 마케팅 등에 초점이 맞추어져 있는데 창의인재개발학과에 지원하게 된 동기나 계기는 무엇인가요?\n교사를 희망하다 사회복지로 지원한 이유는 무엇인가요?\n경영학과 경제학의 차이점에 대해 학생들에게 알렸다고 하는데 그 차이점은 무엇인가요?\n2학년 때 《중국 MZ세대와 미래》를 읽고 한국문화와 비교했다고 하는데, 그 내용에 대해서 자세히 설명해 주세요.\n'기업윤리와 사회적 책임'을 읽었는데 기업윤리에 어긋난 사례가 소비자에게 어떠한 영향을 미치는지에 대해서 설명해 주세요\n과목에서 황동규의 '즐거운 편지'를 제재로 역설과 반어를 설명하는 수업을 구상했다고 되어 있는데 두 개념의 차이점을 예를 들어 설명해 주세요\n'ESG경영의 필요성'이라는 제목으로 영상 제작 활동을 진행하였다고 기재되어 있습니다. ESG 경영의 개념과 한계점에 대해 설명해 주세요\n과목에서 '훌륭한 교사는 무엇이 다른가'라는 책을 읽고 감상문을 작성한 것으로 되어 있는데 이 책의 내용에 비추어 훌륭한 국어 교사의 자질을 설명해 주세요.\n체육교사가 되고 싶었었는데 경영학을 전공하고 싶은 이유는 무엇이며, 경영학과 졸업 후 어떠한 진로로 나아가고 싶은지에 대해 말해주세요.\n일하고 싶은 국제기구가 무엇이며 어떠한 활동에 기여하고 싶은지 설명해 주세요.\n미국 달러가 주요 기축통화가 된 이유는 무엇이며 중국 위안화의 영향력은 어떻게 변화하고 있는지 설명해 보세요.\n3학년 비교과 활동으로 수행했던 가상현실 기술과 관련하여 이 기술이 물류의 스마트화에 어떤 기여를 할 수 있는지에 대한 의견을 말해주세요.\n최근 청소년범죄가 강력해지고 있는데 어떤 처벌을 해야 한다고 생각하는지 말해주세요.\n진로 심화 탐구 활동에서 마케터에 대해 조사했는데 인공지능 시대 마케터에게 필요한 자질은 무엇이라고 생각하는지 말해주세요.\n동아리 활동에서 데이터 센터가 기업의 회계 정보를 어떻게 보호하고 있는지를 탐구한 경험이 있다고 하는데, 이에 관하여 이야기해 주세요.\n세무회계학과를 진학하기 위해 동아리 활동을 제외한 다른 활동에 참여한 경험이 있나요?\n교사로서 자신의 장단점은 무엇이라고 생각하는지 말해주세요.\n3학년 동아리 활동에서 빠른 근육 피로도 개선을 통한 운동수행능력 향상에 관심을 두고 다양한 문헌을 조사했다고 기재되어 있습니다. 이 부분에 대한 자세히 설명해 보세요.\n유명 기업의 성공 또는 실패 사례를 분석하여 경영 전략의 실질적인 적용 방식을 이해하였다고 기재되어 있습니다. 활동에서 분석한 기업 경영전략 사례와 분석 내용을 말해보세요.\n교과세특에 뉴런의 종류와 구조를 설명할 수 있다고 기재되어 있습니다. 뉴런의 구조를 설명한 후, 어떤 구조적 특성에 따라 흥분 전달 속도에 차이가 나타날 수 있는지 설명해 주세요.\n아동이 사회적 의사소통을 체험할 수 있는 기회를 연습할 수 있는 수업을 설계하였다고 기재되어 있습니다. 해당 수업 계획에 대해 자세히 설명해 보세요.\n공학계열에 관심있는 학생들과 함께 '스마트 미러'를 제작했다고 하는데 해당 활동 내용에 대해 이야기해 주세요.\n이수했던 수학교과 중, 가장 즐겁게 공부했던 단원과 가장 어려웠던 단원과 그 이유를 알려주세요.\n건전지의 내부 저항에 대해서 설명해보시오.\n동아리활동에서 'A crash course in organic chemistry' 시청했다고 하는데, '에피네프린'의 뜻과 기능, 쓰임에 대해 설명해 주세요.\n1학년 때는 건축 분야 및 인테리어 관련된 꿈을 가지고 있었는데, 에너지화학공학과에 진학하게 된 이유는 무엇인가요?\n공동체 구성원으로서 공동체에 기여한 경험에 대하여 이야기 해보고 관련하여 무엇을 배울 수 있었는지 이야기해 보세요.\n지속적으로 화학공학에 관심이 있었던 것 같은데, 관심을 가지게 된 동기가 있나요?\n동아리원 사이의 의견충돌을 조율한 내용이 기재되어 있습니다. 이에 대해 어떻게 방법으로 의견을 조율하였는지 말해보세요.\n파이썬에서 randint 함수로 어떤 것을 만들어 봤나요? 이 함수는 무엇을 하는 함수인가요?\n'창의 미래 프로젝트'에 참여하여 '웹사이트를 통한 사회문제 해결'에 대해 탐구하였다고 기재되어 있습니다. 이에 대해 구체적으로 설명해 보세요.\n프로그래밍을 활용한 팀 프로젝트 경험에 대해 이야기해 보세요.\n통신기술에 관한 관심으로 변조기술의 원리에 대해 알아본 바 있다고 기재되어 있습니다. 이에 대해 구체적으로 설명해보세요.\n'경사하강법'이 다양한 분야에 활용됨을 설명하였다고 적혀있습니다. '경사하강법'에 대한 개념과 활용에 대해 구체적인 예시를 들어 설명해 주세요.\n유니티를 이용하여 만든 게임에서 본인의 역할은 무엇인지와 결과를 얻기 위한 과정을 설명해 보세요.\n기하 주제발표 수업에서 '벡터그래픽의 수학적원리-베지에 곡선'으로 정하고 벡터 그래픽과 비트맵 그래픽의 차이점을 알고 '베지에 곡선'을 사용하여 벡터 그래픽을 작성하는 원리와 그 중요성을 설명했다고 하는데 그 내용을 소개해 주세요.\n3학년 진로 활동시간에 재밌는 수학이라는 주제로 발표하였는데 수학에 흥미를 잃은 친구에게 어떻게 하면 수학에 흥미가 생기게 할 수 있을지 말해보세요.\n생명과학과 관련된 동아리 및 진로활동을 다수 수행하였는데 건설환경공학 전공으로 지원한 이유는 무엇인지 말해주세요.\n건설환경공학의 관점에서 환경오염을 해결하기 위한 대처방안은 어떠한 것이 있는지 말해보세요.\n2학년 진로활동 중 층간소음의 원인 중의 하나가 건설사들의 부실시공 문제가 있고, 이에 구조적인 부분을 포함하여 대책을 조사하여 개선 방법을 제안하였다고 되어 있는데, 어떤 내용을 제안하였는지 말해주세요.\n3학년 진로활동에서 4대강사업과 지구온난화로 인한 녹조 문제에 대하여 탐구활동을 하였는데, 녹조가 발생하는 이유와 이를 관리하기 위한 방법에 대해서 설명할 수 있는지 말해주세요.\n2학년 학급 특색활동인 드림스피치에서 '도시공학'을 주제로 자신의 진로에 대해 발표하였고 도시공학은 건축과 토목공학의 교집합임을 설명하고 자신이 존경하는 사람의 건축 사상과 도시설계철학을 소개하였다고 되어있는데, 그 사람이 누구인지와 그 사람의 건축 사상과 도시설계철학에 대해서 설명해 줄 수 있나요?\n‘건축의 세계로’라는 주제의 프로젝트로 참여하였다고 되어 있습니다. 먼저, 가장 관심을 가지고 있는 5개의 건축물을 선정하고, 직접 답사하며 자신의 생각을 정리하였다고 되어 있는데요, 어떤 건축물들을 선정하였나요?\n3학년 때 학급 신문 만들기 활동에서 스마트 건축을 주제로 친구들과 신문을 만들었는데, 스마트 건축이란 무엇이며, 어떠한 방식으로 이루어지는지 설명해주세요.\n건축 설계 프로그램에 대한 심화활동으로, CAD와 BIM 기술의 원리와 적용 방법에 관심을 갖고 있다고 적혀있습니다. CAD와 BIM의 공통점과 차이점은 무엇인가요?\n학급 구성원으로서 학생들의 신뢰를 얻었거나 또는 리더십으로 학생들에게 귀감이 되었던 경험담이 있다면 말씀해 주세요.\n영어Ⅱ 교과에서 생물발광과 생체모방기술에 대한 관심이 확인됩니다. 생체모방기술은 무엇이고 활용될 수 있는 분야는 무엇이 있을지 말해보세요.\n체육교사 또는 체육교육전문가가 되기 위한 학업 계획을 제시하고, 체육교육 이외의 다른 직업 분야로 진로가 바뀔 경우 어떻게 대처할 것인지 말해보세요.\n자신이 속한 팀이 심판이나 관중들로부터 차별적인 말이나 행위로 비난받고 있다. 팀의 일원으로서 어떤 역할을 할지 이야기해 보세요."},{"y":2025,"u":"인천대학교","c1":"의사소통능력","c2":"인성","q":"'좋은 글을 판단하는 기준'이란 글을 읽고 독서와 좋은 글의 관계를 설명하는 글을 썼다고 하는데, 그 내용을 소개해 주세요.\n보고서를 통해 생성형 인공지능의 개념과 여러 분야에서의 적용 방법을 조사하였다고 기재되어 있습니다. 자신이 제시한 적용 방법을 구체적으로 설명해 주세요.\n스포츠 캐스터 또는 해설위원이라는 분야에 관심을 가지게 된 이유는 무엇인가요? 해당 진로에 진출하는데 있어 미디어커뮤니케이션 전공이 어떤 장점이 있다고 생각하나요? 이에 대한 생각을 말해주세요.\n문헌정보학과 관련된 교과활동이나 진로탐색 활동이 있다면 말해 주세요.\n영어 에세이 쓰기 수행 평가에서 '도서관에서 사서의 구체적인 역할'을 주제로 글을 작성하였는데, 자신이 작성한 도서관에서 사서의 구체적 역할에 대해서 설명해 주세요.\n동아리 활동이 주로 경영 경제 관련 활동, 마케팅 등에 초점이 맞추어져 있는데 창의인재개발학과에 지원하게 된 동기나 계기는 무엇인가요?\n교사를 희망하다 사회복지로 지원한 이유는 무엇인가요?\n경영학과 경제학의 차이점에 대해 학생들에게 알렸다고 하는데 그 차이점은 무엇인가요?\n2학년 때 《중국 MZ세대와 미래》를 읽고 한국문화와 비교했다고 하는데, 그 내용에 대해서 자세히 설명해 주세요.\n'기업윤리와 사회적 책임'을 읽었는데 기업윤리에 어긋난 사례가 소비자에게 어떠한 영향을 미치는지에 대해서 설명해 주세요\n과목에서 황동규의 '즐거운 편지'를 제재로 역설과 반어를 설명하는 수업을 구상했다고 되어 있는데 두 개념의 차이점을 예를 들어 설명해 주세요\n'ESG경영의 필요성'이라는 제목으로 영상 제작 활동을 진행하였다고 기재되어 있습니다. ESG 경영의 개념과 한계점에 대해 설명해 주세요\n과목에서 '훌륭한 교사는 무엇이 다른가'라는 책을 읽고 감상문을 작성한 것으로 되어 있는데 이 책의 내용에 비추어 훌륭한 국어 교사의 자질을 설명해 주세요.\n체육교사가 되고 싶었었는데 경영학을 전공하고 싶은 이유는 무엇이며, 경영학과 졸업 후 어떠한 진로로 나아가고 싶은지에 대해 말해주세요.\n일하고 싶은 국제기구가 무엇이며 어떠한 활동에 기여하고 싶은지 설명해 주세요.\n미국 달러가 주요 기축통화가 된 이유는 무엇이며 중국 위안화의 영향력은 어떻게 변화하고 있는지 설명해 보세요.\n3학년 비교과 활동으로 수행했던 가상현실 기술과 관련하여 이 기술이 물류의 스마트화에 어떤 기여를 할 수 있는지에 대한 의견을 말해주세요.\n최근 청소년범죄가 강력해지고 있는데 어떤 처벌을 해야 한다고 생각하는지 말해주세요.\n진로 심화 탐구 활동에서 마케터에 대해 조사했는데 인공지능 시대 마케터에게 필요한 자질은 무엇이라고 생각하는지 말해주세요.\n동아리 활동에서 데이터 센터가 기업의 회계 정보를 어떻게 보호하고 있는지를 탐구한 경험이 있다고 하는데, 이에 관하여 이야기해 주세요.\n세무회계학과를 진학하기 위해 동아리 활동을 제외한 다른 활동에 참여한 경험이 있나요?\n교사로서 자신의 장단점은 무엇이라고 생각하는지 말해주세요.\n3학년 동아리 활동에서 빠른 근육 피로도 개선을 통한 운동수행능력 향상에 관심을 두고 다양한 문헌을 조사했다고 기재되어 있습니다. 이 부분에 대한 자세히 설명해 보세요.\n유명 기업의 성공 또는 실패 사례를 분석하여 경영 전략의 실질적인 적용 방식을 이해하였다고 기재되어 있습니다. 활동에서 분석한 기업 경영전략 사례와 분석 내용을 말해보세요.\n교과세특에 뉴런의 종류와 구조를 설명할 수 있다고 기재되어 있습니다. 뉴런의 구조를 설명한 후, 어떤 구조적 특성에 따라 흥분 전달 속도에 차이가 나타날 수 있는지 설명해 주세요.\n아동이 사회적 의사소통을 체험할 수 있는 기회를 연습할 수 있는 수업을 설계하였다고 기재되어 있습니다. 해당 수업 계획에 대해 자세히 설명해 보세요.\n공학계열에 관심있는 학생들과 함께 '스마트 미러'를 제작했다고 하는데 해당 활동 내용에 대해 이야기해 주세요.\n이수했던 수학교과 중, 가장 즐겁게 공부했던 단원과 가장 어려웠던 단원과 그 이유를 알려주세요.\n건전지의 내부 저항에 대해서 설명해보시오.\n동아리활동에서 'A crash course in organic chemistry' 시청했다고 하는데, '에피네프린'의 뜻과 기능, 쓰임에 대해 설명해 주세요.\n1학년 때는 건축 분야 및 인테리어 관련된 꿈을 가지고 있었는데, 에너지화학공학과에 진학하게 된 이유는 무엇인가요?\n공동체 구성원으로서 공동체에 기여한 경험에 대하여 이야기 해보고 관련하여 무엇을 배울 수 있었는지 이야기해 보세요.\n지속적으로 화학공학에 관심이 있었던 것 같은데, 관심을 가지게 된 동기가 있나요?\n동아리원 사이의 의견충돌을 조율한 내용이 기재되어 있습니다. 이에 대해 어떻게 방법으로 의견을 조율하였는지 말해보세요.\n파이썬에서 randint 함수로 어떤 것을 만들어 봤나요? 이 함수는 무엇을 하는 함수인가요?\n'창의 미래 프로젝트'에 참여하여 '웹사이트를 통한 사회문제 해결'에 대해 탐구하였다고 기재되어 있습니다. 이에 대해 구체적으로 설명해 보세요.\n프로그래밍을 활용한 팀 프로젝트 경험에 대해 이야기해 보세요.\n통신기술에 관한 관심으로 변조기술의 원리에 대해 알아본 바 있다고 기재되어 있습니다. 이에 대해 구체적으로 설명해보세요.\n'경사하강법'이 다양한 분야에 활용됨을 설명하였다고 적혀있습니다. '경사하강법'에 대한 개념과 활용에 대해 구체적인 예시를 들어 설명해 주세요.\n유니티를 이용하여 만든 게임에서 본인의 역할은 무엇인지와 결과를 얻기 위한 과정을 설명해 보세요.\n기하 주제발표 수업에서 '벡터그래픽의 수학적원리-베지에 곡선'으로 정하고 벡터 그래픽과 비트맵 그래픽의 차이점을 알고 '베지에 곡선'을 사용하여 벡터 그래픽을 작성하는 원리와 그 중요성을 설명했다고 하는데 그 내용을 소개해 주세요.\n3학년 진로 활동시간에 재밌는 수학이라는 주제로 발표하였는데 수학에 흥미를 잃은 친구에게 어떻게 하면 수학에 흥미가 생기게 할 수 있을지 말해보세요.\n생명과학과 관련된 동아리 및 진로활동을 다수 수행하였는데 건설환경공학 전공으로 지원한 이유는 무엇인지 말해주세요.\n건설환경공학의 관점에서 환경오염을 해결하기 위한 대처방안은 어떠한 것이 있는지 말해보세요.\n2학년 진로활동 중 층간소음의 원인 중의 하나가 건설사들의 부실시공 문제가 있고, 이에 구조적인 부분을 포함하여 대책을 조사하여 개선 방법을 제안하였다고 되어 있는데, 어떤 내용을 제안하였는지 말해주세요.\n3학년 진로활동에서 4대강사업과 지구온난화로 인한 녹조 문제에 대하여 탐구활동을 하였는데, 녹조가 발생하는 이유와 이를 관리하기 위한 방법에 대해서 설명할 수 있는지 말해주세요.\n2학년 학급 특색활동인 드림스피치에서 '도시공학'을 주제로 자신의 진로에 대해 발표하였고 도시공학은 건축과 토목공학의 교집합임을 설명하고 자신이 존경하는 사람의 건축 사상과 도시설계철학을 소개하였다고 되어있는데, 그 사람이 누구인지와 그 사람의 건축 사상과 도시설계철학에 대해서 설명해 줄 수 있나요?\n‘건축의 세계로’라는 주제의 프로젝트로 참여하였다고 되어 있습니다. 먼저, 가장 관심을 가지고 있는 5개의 건축물을 선정하고, 직접 답사하며 자신의 생각을 정리하였다고 되어 있는데요, 어떤 건축물들을 선정하였나요?\n3학년 때 학급 신문 만들기 활동에서 스마트 건축을 주제로 친구들과 신문을 만들었는데, 스마트 건축이란 무엇이며, 어떠한 방식으로 이루어지는지 설명해주세요.\n건축 설계 프로그램에 대한 심화활동으로, CAD와 BIM 기술의 원리와 적용 방법에 관심을 갖고 있다고 적혀있습니다. CAD와 BIM의 공통점과 차이점은 무엇인가요?\n학급 구성원으로서 학생들의 신뢰를 얻었거나 또는 리더십으로 학생들에게 귀감이 되었던 경험담이 있다면 말씀해 주세요.\n영어Ⅱ 교과에서 생물발광과 생체모방기술에 대한 관심이 확인됩니다. 생체모방기술은 무엇이고 활용될 수 있는 분야는 무엇이 있을지 말해보세요.\n체육교사 또는 체육교육전문가가 되기 위한 학업 계획을 제시하고, 체육교육 이외의 다른 직업 분야로 진로가 바뀔 경우 어떻게 대처할 것인지 말해보세요.\n자신이 속한 팀이 심판이나 관중들로부터 차별적인 말이나 행위로 비난받고 있다. 팀의 일원으로서 어떤 역할을 할지 이야기해 보세요."},{"y":2025,"u":"인하대학교","c1":"기초학업역량","c2":"인성","q":"A과목 세부능력 및 특기사항을 보면 ‘OOO’현상에 대해 조사한 내용이 기술되어 있다. 본인이 생각하는 ‘OOO’현상의 원인이 무엇인가?\nB보고서 작성 시 OO원리를 활용했다고 했는데, 이 원리에 대해 설명해 보시오."},{"y":2025,"u":"인하대학교","c1":"진로탐구역량","c2":"인성","q":"A활동을 하면서 목표한 바를 이루기 위해 노력하였으나 수많은 실패를 겪었다고 기재되어 있다. 구체적으로 어떤 어려움이 있었는가?\nB활동의 주제로 ‘OOOO’를 선정했는데, 해당 주제를 선정한 계기가 무엇인가? 주제 선정에 있어 본인은 어떤 역할을 했는가?"},{"y":2025,"u":"인하대학교","c1":"의사소통역량","c2":"인성","q":"1, 2학년 행동특성 및 종합의견을 보면 공통적으로 타인에 대한 배려심이 깊다고 기재되어 있다. 관련된 사례가 있는가?\n임원활동 전과 후를 비교해보았을 때 자신에게 변화된 점이 있다면 무엇인가? 그 이유는 무엇이라고 생각하는가?"},{"y":2025,"u":"가천대학교","c1":"인성","c2":"인성","q":"(인성관련) 자율활동에 부반장으로 활동하며 특별한 역할의 필요성을 어필하고 직접 수행했다고 기록되어 있는데, 그 역할이 왜 필요하다고 생각했으며, 이를 어떻게 수행했는지 설명해 주세요.\n(인성관련) 교과부장으로 활동하며 학습 분위기를 조성하고, 스터디 그룹을 조직하여 중요한 역할을 수행했다고 기록되어 있습니다. 이 과정에서 친구들과 협력하며 공동체 속에서 어떤 역할을 했다고 생각하나요? 또한, 학습 과정에서 다른 친구들을 어떻게 도왔는지 설명해 주세요.\n(인성관련) 수업 시간에 주변 친구들에게 자신이 아는 바를 친절하게 알려주었다고 기록되어 있습니다. 친구들을 도울 때 어떤 점을 가장 중요하게 생각했으며, 이러한 경험이 본인에게 어떤 의미가 있었는지 설명해 주세요.\n(인성관련) 행동특성 및 종합의견에 친구들이 가장 본받고 싶은 학생으로 선정될 만큼 수업이나 생활 태도에서 귀감이 되었다고 기록되어 있습니다. 어떤 노력을 했기에 이런 평가를 받았다고 생각하나요? 또한, 본인이 보여준 태도가 학급 분위기에 어떤 영향을 주었다고 생각하는지 설명해 주세요.\n(인성관련) 행동 특성 및 종합의견에 결석한 친구의 역할을 자발적으로 대신하는 등 배려심을 보였다고 하는데, 이러한 행동을 실천하게 된 계기는 무엇이었으며, 이를 통해 공동체 속에서 본인이 맡은 역할을 어떻게 수행했다고 생각하나요.\n(사회과학계열) 학우들과 경제 관련 지식을 공유하며 다양한 예시와 이론을 설명하는 모습을 보였다고 기록되어 있습니다. 기억나는 사례를 설명해 주세요.\n(사회과학계열) 경제 시간에 '외부 효과와 시장 실패' 개념에 관심을 가지고 공부했다고 기록되어 있습니다. 외부 효과의 개념을 설명하고, 외부 효과가 존재할 때 시장이 효율적으로 작동하지 않는 이유를 알려주세요.\n(사회과학계열) 국어 시간에 언론 매체와 관련된 법을 주제로 카드뉴스를 제작하여 발표했다고 기록되어 있습니다. 해당 카드뉴스의 주요 내용을 설명하고, 제작 과정에서 매체의 특성을 어떻게 활용했는지 구체적으로 이야기해 주세요.\n(사회과학계열) 수학 시간에 모집단이 정규분포를 따른다는 가정을 이해하고 이를 탐구했다고 기록되어 있습니다. 정규분포가 무엇인지 쉽게 설명하고, 왜 통계에서 정규분포를 따른다고 가정하는지 이야기해 주세요.\n(사회과학계열) 사회 시간이 형벌 분야에 관심이 많아 스스로 관련 분야에 대한 심화 탐구를 진행했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 형사 절차에서 인권 보장을 위한 제도 중 가장 중요하다고 생각하는 제도를 하나 꼽고, 그 이유를 설명해 주세요.\n(인문계열) 영어에 대한 관심과 능력이 뛰어나고, 학습 모둠에서도 적극적으로 활동하며 친구들이 글을 더 잘 이해할 수 있도록 도왔다고 기록되어 있습니다. 영어 학습 모둠에서 맡았던 역할을 설명해 주세요. 또한, 영어로 된 글을 이해할 때 가장 중요한 점은 무엇이라고 생각하는지 이유와 함께 이야기해 주세요.\n(인문계열) 국어 시간에 어느 나라의 문화적 특성을 분석한 책을 읽고, 그 나라의 문화를 이해하는 활동을 했다고 기록되어 있습니다. 이 책에서 가장 인상 깊었던 문화적 특성은 무엇이며, 그 이유를 설명해 주세요.\n(인문계열) 사회 시간에 ‘인공지능 발전과 통역사’를 주제로 양적 연구를 수행했다고 기록되어 있습니다. 본인의 연구에서 어떤 방식으로 자료를 모으고 분석했는지 설명해 주세요. 또한, 양적 연구 방법을 사용하면서 어떤 점이 도움이 되었는지 이야기 해 주세요.\n(인문계열) 국어 교과 기록에 따르면, 문단별로 내용을 잘 요약하고 재구성하는 능력이 뛰어나며, 인문·철학에 관심이 많다고 되어 있습니다. 이러한 평가를 받게 된 이유를 본인의 경험이나 사례를 들어 설명해 주세요.\n(인문계열) 윤리 시간에 저작권 보호와 관련된 철학적 입장을 탐구했다고 기록되어 있습니다. 탐구한 핵심 내용을 간단히 설명해 주세요. 또한, 벤담의 공리주의적 관점과 칸트의 의무론적 관점은 어떻게 다른지 비교하고, 본인은 어떤 입장에 더 공감하는지 이유와 함께 이야기해 주세요.\n(자연계열) 수학 시간에 미적분과 관련된 책을 읽고, 미분과 적분에 대한 개념을 정리했다고 기록되어 있습니다. 책에서 인상 깊었던 핵심 내용을 설명하고, 미분의 정의를 설명해 주세요.\n(자연계열) 물리 시간에 운동량 보존 실험, 전자가 유도 실험, 광전 효과 실험 등을 진행했다고 기록되어 있습니다. 이 중 가장 의미 있었던 실험은 무엇이며, 그 이유를 설명해 주세요. 또한, 전자기 유도 법칙이 무엇인지 설명해 주세요.\n(자연계열) 화학 시간에 화학 결합을 학습한 후, 공유 결합에 관심을 가지고 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 공유 결합, 이온 결합, 금속 결합의 차이를 설명해 주세요.\n(자연계열) 생명과학 시간에 호르몬과 항상성을 학습한 후, 당뇨병 치료제에 대해 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 혈당량 조절 과정의 핵심을 설명해 주세요.\n(자연계열) 동아리 시간에 책을 읽고 실험을 제안하고 진행했다고 기록되어 있습니다. 실험을 제안한 이유가 무엇인지 설명해 주세요. 또한, 이 실험에서 본인은 어떤 역할을 맡았으며, 실험을 준비하는 과정에서 어떤 점을 고려했는지 이야기해 주세요.\n(공학계열) 과학 교과에 대한 지적 호기심이 강하고, 과학 지식을 적용하여 합리적으로 추론하는 능력이 뛰어나며, 자료를 분석하고 아이디어를 산출하는 능력이 우수하다고 기록되어 있습니다. 이러한 평가를 받게 된 이유를 본인의 경험이나 사례를 들어 설명해 주세요.\n(공학계열) 물리 시간에 반도체의 정의와 원리에 대해 발표했다고 기록되어 있습니다. 반도체가 도체나 절연체와 구분되는 특징은 무엇인지 설명해 주세요. 또한, 에너지띠 구조를 기준으로 반도체, 도체, 절연체의 차이를 설명해 주세요.\n(공학계열) 화학 시간에 화학 전지를 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 화학 전지가 전기를 생성하는 원리는 무엇인가요? 산화환원 반응을 다른 사례를 들어 설명해 주세요.\n(공학계열) 수학 시간에 함수의 극한과 연속을 배우고, 관련 문제를 해결했다고 기록되어 있습니다. 연속의 정의를 설명하고, 함수가 연속이면 항상 미분 가능하다고 할 수 있는지 그 이유와 함께 이야기해 주세요.\n(공학계열) 수학 시간에 자연상수 e에 대해 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 자연상수 e의 정의를 설명하고, 미적분에서 자연상수가 중요한 이유를 설명해 주세요.\n(간호보건계열) 화학 시간에 동위원소에 대해 관심을 가지고 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 간단히 설명해 주세요. 또한, 동위원소의 정의와 동위원소가 화학적 성질은 같지만 물리적 성질은 다른 이유를 설명해 주세요.\n(간호보건계열) 자율활동에 학급의 건강 지킴이 역할을 맡아 체조 활동을 하고, 학생들의 참여를 유도했다고 기록되어 있습니다. 체조 활동에 친구들이 적극적으로 참여할 수 있도록 하기 위해 어떤 방식으로 설득하거나 독려했는지 설명해 주세요. 또한, 이 활동을 통해 건강과 운동의 중요성에 대해 새롭게 깨달은 점이 있는지요.\n(간호보건계열) 생명과학 시간에 신경계 단원에 대해 학습한 뒤 가장 큰 흥미를 보였고, 순환계 관련 질병을 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 간단히 설명해 주세요. 또한, 신경계가 순환계를 어떻게 조절하는지 교감 신경과 부교감 신경의 작용을 중심으로 설명해 주세요.\n(간호보건계열) 화학 시간에 삼투현상과 삼투압을 정리하여 발표했다고 기록되어 있습니다. 발표 준비는 어떻게 했는지 설명해 주세요. 또한, 삼투현상과 삼투압의 정의를 설명해 주세요.\n(간호보건계열) 과학 시간 기록에 따르면, 의문이 있으면 질문을 하면서 보다 심화된 내용을 찾아보는 등 과학적 탐구력과 문제해결력이 우수하다고 평가되었습니다. 이러한 능력을 발휘했던 사례를 들어 설명해 주세요.\n(의약계열) 수업 시간에 의료 불평등을 해소하기 위한 노력의 필요성에 대해 이야기했다고 기록되어 있습니다. 핵심 내용을 설명해 주세요. 또한, 본인의 주장을 뒷받침하기 위해 어떤 근거를 제시했는지 이야기해 주세요.\n(의약계열) 화학 시간에 화학 평형에 대해 학습했다고 기록되어 있습니다. 가역 반응에서 정반응이 발열반응일 때, 온도를 조절하여 정반응을 유도하는 방법을 설명해 주세요.\n(의약계열) 화학 시간에 화학 반응 속도와 온도의 관계에 대해 학습했다고 기록되어 있습니다. 화학 반응 속도는 온도와 어떤 관계가 있나요?\n(의약계열) 생명과학 시간에 항상성과 질병의 관계에 대해 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 간단히 설명해 주세요. 또한, 물질대사의 조절에 관여하는 호르몬과 역할을 설명하고, 대사성 질환이 발생하는 원인을 물질대사 이상과 관련지어 설명해 주세요.\n(의약계열) 생명과학 시간에 방어 작용 수업을 듣고 항원-항체 반응과 호르몬-수용체 결합의 특이성에 대해 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 간단히 설명해 주세요. 항원-항체 반응의 특이성에 대해 설명하고, 인체의 특이적 방어 작용 중 중요하다고 생각하는 것을 설명해 주세요."},{"y":2025,"u":"가천대학교","c1":"진학의지 및 계열적합성","c2":"인성","q":"(인성관련) 자율활동에 부반장으로 활동하며 특별한 역할의 필요성을 어필하고 직접 수행했다고 기록되어 있는데, 그 역할이 왜 필요하다고 생각했으며, 이를 어떻게 수행했는지 설명해 주세요.\n(인성관련) 교과부장으로 활동하며 학습 분위기를 조성하고, 스터디 그룹을 조직하여 중요한 역할을 수행했다고 기록되어 있습니다. 이 과정에서 친구들과 협력하며 공동체 속에서 어떤 역할을 했다고 생각하나요? 또한, 학습 과정에서 다른 친구들을 어떻게 도왔는지 설명해 주세요.\n(인성관련) 수업 시간에 주변 친구들에게 자신이 아는 바를 친절하게 알려주었다고 기록되어 있습니다. 친구들을 도울 때 어떤 점을 가장 중요하게 생각했으며, 이러한 경험이 본인에게 어떤 의미가 있었는지 설명해 주세요.\n(인성관련) 행동특성 및 종합의견에 친구들이 가장 본받고 싶은 학생으로 선정될 만큼 수업이나 생활 태도에서 귀감이 되었다고 기록되어 있습니다. 어떤 노력을 했기에 이런 평가를 받았다고 생각하나요? 또한, 본인이 보여준 태도가 학급 분위기에 어떤 영향을 주었다고 생각하는지 설명해 주세요.\n(인성관련) 행동 특성 및 종합의견에 결석한 친구의 역할을 자발적으로 대신하는 등 배려심을 보였다고 하는데, 이러한 행동을 실천하게 된 계기는 무엇이었으며, 이를 통해 공동체 속에서 본인이 맡은 역할을 어떻게 수행했다고 생각하나요.\n(사회과학계열) 학우들과 경제 관련 지식을 공유하며 다양한 예시와 이론을 설명하는 모습을 보였다고 기록되어 있습니다. 기억나는 사례를 설명해 주세요.\n(사회과학계열) 경제 시간에 '외부 효과와 시장 실패' 개념에 관심을 가지고 공부했다고 기록되어 있습니다. 외부 효과의 개념을 설명하고, 외부 효과가 존재할 때 시장이 효율적으로 작동하지 않는 이유를 알려주세요.\n(사회과학계열) 국어 시간에 언론 매체와 관련된 법을 주제로 카드뉴스를 제작하여 발표했다고 기록되어 있습니다. 해당 카드뉴스의 주요 내용을 설명하고, 제작 과정에서 매체의 특성을 어떻게 활용했는지 구체적으로 이야기해 주세요.\n(사회과학계열) 수학 시간에 모집단이 정규분포를 따른다는 가정을 이해하고 이를 탐구했다고 기록되어 있습니다. 정규분포가 무엇인지 쉽게 설명하고, 왜 통계에서 정규분포를 따른다고 가정하는지 이야기해 주세요.\n(사회과학계열) 사회 시간이 형벌 분야에 관심이 많아 스스로 관련 분야에 대한 심화 탐구를 진행했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 형사 절차에서 인권 보장을 위한 제도 중 가장 중요하다고 생각하는 제도를 하나 꼽고, 그 이유를 설명해 주세요.\n(인문계열) 영어에 대한 관심과 능력이 뛰어나고, 학습 모둠에서도 적극적으로 활동하며 친구들이 글을 더 잘 이해할 수 있도록 도왔다고 기록되어 있습니다. 영어 학습 모둠에서 맡았던 역할을 설명해 주세요. 또한, 영어로 된 글을 이해할 때 가장 중요한 점은 무엇이라고 생각하는지 이유와 함께 이야기해 주세요.\n(인문계열) 국어 시간에 어느 나라의 문화적 특성을 분석한 책을 읽고, 그 나라의 문화를 이해하는 활동을 했다고 기록되어 있습니다. 이 책에서 가장 인상 깊었던 문화적 특성은 무엇이며, 그 이유를 설명해 주세요.\n(인문계열) 사회 시간에 ‘인공지능 발전과 통역사’를 주제로 양적 연구를 수행했다고 기록되어 있습니다. 본인의 연구에서 어떤 방식으로 자료를 모으고 분석했는지 설명해 주세요. 또한, 양적 연구 방법을 사용하면서 어떤 점이 도움이 되었는지 이야기 해 주세요.\n(인문계열) 국어 교과 기록에 따르면, 문단별로 내용을 잘 요약하고 재구성하는 능력이 뛰어나며, 인문·철학에 관심이 많다고 되어 있습니다. 이러한 평가를 받게 된 이유를 본인의 경험이나 사례를 들어 설명해 주세요.\n(인문계열) 윤리 시간에 저작권 보호와 관련된 철학적 입장을 탐구했다고 기록되어 있습니다. 탐구한 핵심 내용을 간단히 설명해 주세요. 또한, 벤담의 공리주의적 관점과 칸트의 의무론적 관점은 어떻게 다른지 비교하고, 본인은 어떤 입장에 더 공감하는지 이유와 함께 이야기해 주세요.\n(자연계열) 수학 시간에 미적분과 관련된 책을 읽고, 미분과 적분에 대한 개념을 정리했다고 기록되어 있습니다. 책에서 인상 깊었던 핵심 내용을 설명하고, 미분의 정의를 설명해 주세요.\n(자연계열) 물리 시간에 운동량 보존 실험, 전자가 유도 실험, 광전 효과 실험 등을 진행했다고 기록되어 있습니다. 이 중 가장 의미 있었던 실험은 무엇이며, 그 이유를 설명해 주세요. 또한, 전자기 유도 법칙이 무엇인지 설명해 주세요.\n(자연계열) 화학 시간에 화학 결합을 학습한 후, 공유 결합에 관심을 가지고 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 공유 결합, 이온 결합, 금속 결합의 차이를 설명해 주세요.\n(자연계열) 생명과학 시간에 호르몬과 항상성을 학습한 후, 당뇨병 치료제에 대해 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 혈당량 조절 과정의 핵심을 설명해 주세요.\n(자연계열) 동아리 시간에 책을 읽고 실험을 제안하고 진행했다고 기록되어 있습니다. 실험을 제안한 이유가 무엇인지 설명해 주세요. 또한, 이 실험에서 본인은 어떤 역할을 맡았으며, 실험을 준비하는 과정에서 어떤 점을 고려했는지 이야기해 주세요.\n(공학계열) 과학 교과에 대한 지적 호기심이 강하고, 과학 지식을 적용하여 합리적으로 추론하는 능력이 뛰어나며, 자료를 분석하고 아이디어를 산출하는 능력이 우수하다고 기록되어 있습니다. 이러한 평가를 받게 된 이유를 본인의 경험이나 사례를 들어 설명해 주세요.\n(공학계열) 물리 시간에 반도체의 정의와 원리에 대해 발표했다고 기록되어 있습니다. 반도체가 도체나 절연체와 구분되는 특징은 무엇인지 설명해 주세요. 또한, 에너지띠 구조를 기준으로 반도체, 도체, 절연체의 차이를 설명해 주세요.\n(공학계열) 화학 시간에 화학 전지를 탐구했다고 기록되어 있습니다. 탐구한 주요 내용을 설명해 주세요. 또한, 화학 전지가 전기를 생성하는 원리는 무엇인가요? 산화환원 반응을 다른 사례를 들어 설명해 주세요.\n(공학계열) 수학 시간에 함수의 극한과 연속을 배우고, 관련 문제를 해결했다고 기록되어 있습니다. 연속의 정의를 설명하고, 함수가 연속이면 항상 미분 가능하다고 할 수 있는지 그 이유와 함께 이야기해 주세요.\n(공학계열) 수학 시간에 자 1":"전공적합성","c2":"인성","q":"○○학과에 지원하였네요. ○○학과에 지원하게 된 동기가 된 고교 재학기간 중 활동이 있다면 무엇인가요?\n사회 교과 시간에 ‘저출산 지원정책의 문제점과 해결방안’을 주제로 조사해서 발표한 경험이 있네요. 발표 내용 중 기억에 남는 내용이 있으면 소개해 볼까요?\n진로 선택 과목 선택할 때 고려했던 것과 과목 이수 후 도움이 되었던 점은?"},{"y":2025,"u":"강남대학교","c1":"인성적 자질","c2":"인성","q":"학생회에서 축제를 기획한 경험이 있는데, 어떤 역할을 맡아서 수행하였나요?\n역할 수행을 하다가 어려운 점은 어떻게 해결하였나요?\n분리수거 도우미로 봉사를 해왔는데, 이 활동에 참여한 계기는 무엇인가요? 힘들었던 점을 어떻게 극복했나요?"},{"y":2025,"u":"강남대학교","c1":"종합적 사고력 및 의사소통능력","c2":"인성","q":"각 평가요소에 따른 답변을 바탕으로 지원자의 종합적 사고력 및 의사소통능력을 평가"},{"y":2025,"u":"강남대학교","c1":"전형의 적합성","c2":"인성","q":"경제수학 과목을 선택하여 이수했네요. 다른 과목보다 이수자 수가 적은데 이 과목을 선택한 이유가 있을까요? 학습을 위해 노력한 게 있다면 무엇인가요?\n고등학교 생활을 하면서 본인이 가장 노력했던 경험이 있다면 어떤 것인가요? 그 활동을 통해 배우고 느낀 점을 이야기 해보세요."},{"y":2025,"u":"단국대학교","c1":"진로역량\n(진로의지)","c2":"인성","q":"지원전공에 대하여 관심을 가지게 된 계기는 무엇입니까?\n○○수업에서 ○○에 관한 토론활동을 했는데 본인의 관점은 무엇입니까?\n○○동아리 활동에서 ○○에 대해 조사, 발표했는데 어떤 내용인지 말해 보세요.\n희망 진로탐색과정 중 가장 의미있는 활동은 무엇이며 입학 후 진로 계획은 무엇입니까?"},{"y":2025,"u":"단국대학교","c1":"발전가능성\n(목표의식)","c2":"인성","q":"무엇인가를 열심히 해서 목표를 이룬 경험이 있습니까?\n앞으로 자신이 성장하기 위하여 개발해야 할 영역(능력, 자질 등)이 있다면 무엇입니까?"},{"y":2025,"u":"단국대학교","c1":"공동체역량\n(공동체의식\n소통능력)","c2":"인성","q":"친구들과 원활하게 과제를 수행하기 위해 기울였던 노력과 본인의 역할에 대해 말해 보세요.\n○○수업 모둠장으로 의견조율의 과정에서의 충돌을 어떻게 해결했는지 말해 보세요.\n리더십 또는 팔로워십을 발휘한 경험이 있다면 말해 보세요.\n친구 또는 주변 사람들을 위해 배려하거나 도움을 준 경험에 대해 말해 보세요.\n자신의 성실성을 증명할 수 있는 대표적인 사례가 있다면 말해 보세요.\n공동의 목표를 달성하기 위한 경험에 대해 말해 보세요. 또한 본인의 역할이 무엇이었는지 말해 보세요."},{"y":2025,"u":"대진대학교","c1":"논리적 사고력\n및 창의능력","c2":"인성","q":"(공통) 최근 동물복제, 인공지능 기반 챗GPT 등 다양한 첨단기술들이 발전하고 있습니다. 이러한 기술의 급속한 발전과 더불어 이와 관련된 윤리적 문제가 발생하기도 합니다. 이때 발생하는 윤리 문제와 이를 해결할 수 있는 방안에 대해서 답변해 주세요.\n(인문·사회) 카·페·인(카카오톡·페이스북·인스타그램)으로 대표되는 SNS의 일상화로 인해 소통과 관계 맺음이 그 어느 때보다 수월해졌습니다. 다양한 SNS의 발달이 사람들 간 소통의 질을 개선하고 있는지 아니면 악화시키고 있는지 사례를 들어 설명하고, 보완할 점이 있다면 어떤 것이 있을지에 대해서 말씀해 주세요.\n(인문·사회) 최근 유튜브를 통해 배포되는 영상 중에는 딥페이크(Deepfake)를 활용한 영상들이 자주 보입니다. 단순히 재미와 유머를 목적으로 하는 경우도 있지만, 정치·사회 영역에서 가짜뉴스를 퍼뜨려 혼란을 유발하거나 특정인을 음해하는 등 심각한 부작용을 초래하기도 합니다. 딥페이크 기술의 긍정적인 사용과 순기능에 대해 예를 들어 설명하고, 부작용을 줄일 수 있는 방안에 대해서도 말씀해 주세요.\n(자연·공학) 최근 가상세계 구현에 관한 기술개발이 활발히 이루어지고 있습니다. 자연·공학계열을 지원하는 학생으로서 지원하는 전공에서 가상세계 기술을 활용할 수 있는 방안과 그 효과에 대해 말씀해 주세요.\n(자연·공학) 4차 산업혁명이 도래하면서 IoT(사물인터넷) 기술들이 급속도로 발전하고 있습니다. 이러한 기술의 발전이 일상생활에 미치는 긍정적 영향과 부정적 영향에 대해 예를 들어 답변해 주세요."},{"y":2025,"u":"대진대학교","c1":"전공적성능력","c2":"인성","q":"우리학과에 지원한 동기는 무엇인가요?"},{"y":2025,"u":"성결대학교","c1":"의사소통 능력\n(주제의 이해력, 언어구사능력, 성실성)","c2":"인성","q":"고령운전자의 운전면허를 취소하자는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n1인 미디어에 대한 규제를 강화해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n디지털 교과서를 전면적으로 도입해 종이 교과서를 대체해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다."},{"y":2025,"u":"성결대학교","c1":"논리적 사고력\n(주장의 논리력)","c2":"인성","q":"고령운전자의 운전면허를 취소하자는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n1인 미디어에 대한 규제를 강화해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n디지털 교과서를 전면적으로 도입해 종이 교과서를 대체해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다."},{"y":2025,"u":"수원대학교","c1":"인성","c2":"인성","q":"1분간 자유롭게 자기소개"},{"y":2025,"u":"수원대학교","c1":"학업계획 및 포부","c2":"인성","q":"대학에서 새로운 학문적 도전이나 어려움이 있을 때 이를 어떻게 극복할 것인가요?\n본인의 학문적 성취를 통해 사회에 기여할 수 있는 부분은 무엇이라고 생각하나요?"},{"y":2025,"u":"수원대학교","c1":"창의력 및 사고력","c2":"인성","q":"어떤 문제나 주제에 대해 전혀 경험이 없을 때 그 문제에 어떻게 접근할 것인지 말해보세요.\n자율주행 자동차가 사회에 미치는 긍정적 영향과 부정적 영향을 말해보세요."},{"y":2025,"u":"수원대학교","c1":"전공적합성","c2":"인성","q":"본인이 경험한 과거 프로젝트나 활동 중에서 이 전공과 관련이 있는 활동이 있다면 말해보세요.\n본인의 적성과 전공이 어떤 부분에서 부합하는지 말해보세요."},{"y":2025,"u":"신한대학교","c1":"지원동기","c2":"인성","q":"우리학과에 지원한 동기와 포부를 말해보세요."},{"y":2025,"u":"신한대학교","c1":"논리적 사고력\n및 인성\n(가치관, 성품, 협동성)","c2":"인성","q":"(공학) 초고령화 시대를 대비한 인공지능 적용에 대한 본인의 생각을 말해보세요.\n(공학) 최근 도입되고 있는 서비스 로봇의 적용에 대한 본인의 생각을 말해보세요.\n(공학) 차세대 자동차에 적용되는 자율주행 기능의 장점과 단점을 말해보세요.\n(공학) ChatGPT를 활용한 과제물 제출에 대한 본인의 생각을 말해보세요.\n(자연과학) 인공지능 기술의 진보가 일상생활에 어떤 영향을 줄 수 있는지 본인의 생각을 말해보세요.\n(자연과학) 기후변화가 인간의 생활 및 생태계에 어떤 영향을 줄 수 있는지 본인의 생각을 말해보세요.\n(자연과학) 빅데이터를 활용한 과학기술 분야의 발전 방향에 대하여 본인의 생각을 말해보세요.\n(자연과학) 최근 가속화되고 있는 지구 온난화 예방 방안에 대해 본인의 생각을 말해보세요.\n(인문사회·예체능) 디지털격차 심화에 따른 디지털 약자 보호 방안에 대해 본인의 생각을 말해보세요.\n(인문사회·예체능) SNS 인플루언서의 마케팅 활동에 대한 장점과 단점에 대해 말해보세요.\n인공지능 발전에 따라 발생할 수 있는 사회적 변화에 대해 본인의 생각을 말해보세요.\n우리나라에서 발생하고 있는 다문화 갈등의 해소 방안에 대한 본인의 생각을 말해보세요."},{"y":2025,"u":"아주대학교","c1":"서류 신뢰도","c2":"인성","q":"(학업역량) ○○교과에서 ○○실험을 진행했는데, 이 실험의 원리와 과정에 대해 설명해 주세요.\n(진로역량) ○○동아리에서 신문을 제작한 경험이 있는데, 본인의 구체적 역할에 대해 설명해 주세요.\n(공동체역량) 다양한 체험활동에서 리더 역할을 수행했는데, 본인의 리더십을 가장 잘 발휘했던 사례에 대해 말해 주세요.\n(의학과) 제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"아주대학교","c1":"의사소통능력, 태도","c2":"인성","q":"(학업역량) ○○교과에서 ○○실험을 진행했는데, 이 실험의 원리와 과정에 대해 설명해 주세요.\n(진로역량) ○○동아리에서 신문을 제작한 경험이 있는데, 본인의 구체적 역할에 대해 설명해 주세요.\n(공동체역량) 다양한 체험활동에서 리더 역할을 수행했는데, 본인의 리더십을 가장 잘 발휘했던 사례에 대해 말해 주세요.\n(의학과) 제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"안양대학교","c1":"아리학생부면접전형","c2":"전공소양","q":"(지원 동기) 학창 시절 본 학과 선택에 영향을 준 과목이나 활동이 있었나요? 있었다면 구체적으로 설명해 주세요.\n(지원 동기) 본 학과 선택에 영향을 준 사건이나 사람이 있었나요? 내가 전공을 선택하는데 그 사건(사람)의 어떤 점이 영향을 미쳤다고 생각하는지 이야기해 보세요.\n(전공과 진로) 본 학과를 졸업하면 어떤 분야에서 활동하게 되는지 설명하고, 졸업 후 내가 진출하고 싶은 분야에 관해서 구체적으로 이야기해 보세요.\n(전공 이해) 지원한 전공과 관련하여 최근에 접한 뉴스, 영화, 책 중에서 기억에 남는 것이 있다면 구체적으로 이야기해 보세요.\n(전공 이해) 본 학과 전공자에게 필요한 자질은 무엇이라고 생각하는지 구체적으로 이야기해 보세요.\n(전공 이해) 본 학과 관련 최신 동향이나 이슈에 관하여 알고 있는 것을 이야기해 보세요.\n(전공 이해) 본 학과와 관련하여 어떠한 활동(교과 또는 비교과 활동)을 해보는 것이 전공 이해 및 진로 개발에 도움이 될 수 있다고 생각하는지 이야기해 보세요.\n(전공 소양) 학창 시절 본 학과와 관련된 자료를 찾아보거나 독서를 한 경험이 있나요? 경험이 있다면 어떤 내용을 접했는지 이야기해 보세요."},{"y":2025,"u":"안양대학교","c1":"아리학생부면접전형","c2":"일반소양","q":"(인생목표, 장래희망) 나에게 긍정적인 영향을 미친 인물은 누구이며, 그들의 어떤 특징이나 행동이 나에게 영감을 주었는지 이야기해 보세요.\n(인생목표, 장래희망) 내 삶에서 가장 중요하게 생각하는 가치는 무엇인가요? 그 가치를 실현하기 위해 어떠한 노력을 하고 있는지 이야기해 보세요.\n(성격의 강점, 단점) 일상생활 속에서 중요한 결정을 내릴 때 나의 성격이 어떤 영향을 미친다고 생각하는지 이야기해 보세요.\n(성격의 강점, 단점) 나의 성격에서 가장 큰 강점과 약점은 무엇인지 설명하고 약점을 개선해 나갈 방법에 관해 이야기해 보세요.\n(스트레스 관리) 신체적, 정신적 스트레스를 해소하기 위하여 어떤 방법을 사용하고 있는지 이야기해 보세요.\n(문제해결능력) 학창 시절 어려운 상황을 긍정적으로 변화시키기 위해 노력했던 경험이 있나요? 어려운 상황을 긍정적으로 변화시키기 위해 어떤 노력을 기울였는지 이야기해 보세요.\n(문제해결능력) 일상생활 속 직면했던 문제를 창의적인 방법으로 해결해 본 경험이 있나요? 그 과정에서 경험한 어려움과 그 어려움을 어떻게 극복했는지 이야기해 보세요.\n(시간관리 능력) 일상적인 과제나 해야 할 일을 정리할 때, 어떤 기준으로 우선순위를 정하는지 이야기해 보세요.\n(의사소통 능력) 친구와의 대화에서 갈등이 생겼던 경험이 있다면, 그 상황을 어떻게 해결했는지 이야기해 보세요. 경험이 없다면, 친구와의 대화 중 갈등이 생긴다면 그 상황을 어떻게 해결해 나갈 수 있을지 이야기해 보세요.\n(의사소통 능력) 친구와 갈등이 생겼을 때, 어떤 방법으로 대화를 시도하고 해결했는지 이야기해 보세요.\n(대인관계) 친구나 선생님과의 관계에서 신뢰를 구축하기 위해 어떤 노력을 할 수 있을지 이야기해 보세요.\n(책임감) 팀 프로젝트 진행 때 본인이 맡은 역할을 책임감 있게 수행하려고 어떠한 노력을 했는지 이야기해 보세요.\n(열정) 어떤 목표를 세우고 그 목표를 향해 열심히 노력했던 경험이 있다면 그 과정과 결과에 관해 이야기해 보세요.\n(열정) 어려운 상황에서도 포기하지 않고 열정을 가지고 도전했던 경험이 있다면 이야기해 보세요.\n인공지능을 이용해 과제를 수행하는 것에 관해 어떻게 생각하나요? 구체적인 이유를 설명해 주세요."},{"y":2025,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"인성\n(공동체의식 및 협력)","q":"(지원동기, 우리 대학에 대한 이해) 여러 대학 중 우리 대학을 선택한 동기가 있나요? 특별한 이유가 있다면 이야기해 보세요.\n(지원동기, 우리 대학에 대한 이해) 나의 꿈을 이루는 데 안양대학교가 어떤 도움을 줄 수 있을 것이라고 생각하나요? 그 이유는 무엇인가요?\n(인생 목표) 10년 후 나의 모습은 어떤 모습일거라고 생각하나요? 그 목표를 이루기 위해서 어떤 노력을 해야 한다고 생각하나요?\n(인생 목표) 대학 졸업 후 어떤 분야에서 일하고 싶은가요? 그 이유는 무엇인가요?\n(강점) 나의 강점은 무엇이라고 생각하나요? 나의 강점이 가장 잘 발휘되었던 사례가 있었다면 이야기해 보세요.\n(강점) 내가 다른 사람보다 특별히 잘하는 분야가 있다면 무엇인지 사례를 들어 이야기해 보세요.\n(실패 극복) 본인이 무언가에 도전했다가 실패한 경험이 있습니까? 실패에서 교훈을 얻어 이후에 도움이 되었던 경험이 있다면 이야기해 보세요.\n(실패 극복) 팀 프로젝트에서 갈등이 발생했을 때 이를 해결하고 협력적인 관계를 유지하기 위해 노력한 경험이 있나요? 그 과정에서 무엇을 느꼈는지 이야기해 보세요.\n(협력) 학창 시절 팀 프로젝트에서 주로 맡았던 역할과 그에 따른 기여는 무엇이었는지 이야기해 보세요.\n(열정, 도전정신) 학창 시절 도전적인 프로젝트에 참여해 본 경험이 있나요? 도전적인 프로젝트 수행 과정에서 무엇을 느꼈는지 이야기해 보세요."},{"y":2025,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"발전가능성 (적성 및 고교 기간 동안의 노력)","q":"(지원동기, 우리 대학에 대한 이해) 여러 대학 중 우리 대학을 선택한 동기가 있나요? 특별한 이유가 있다면 이야기해 보세요.\n(지원동기, 우리 대학에 대한 이해) 나의 꿈을 이루는 데 안양대학교가 어떤 도움을 줄 수 있을 것이라고 생각하나요? 그 이유는 무엇인가요?\n(인생 목표) 10년 후 나의 모습은 어떤 모습일거라고 생각하나요? 그 목표를 이루기 위해서 어떤 노력을 해야 한다고 생각하나요?\n(인생 목표) 대학 졸업 후 어떤 분야에서 일하고 싶은가요? 그 이유는 무엇인가요?\n(강점) 나의 강점은 무엇이라고 생각하나요? 나의 강점이 가장 잘 발휘되었던 사례가 있었다면 이야기해 보세요.\n(강점) 내가 다른 사람보다 특별히 잘하는 분야가 있다면 무엇인지 사례를 들어 이야기해 보세요.\n(실패 극복) 본인이 무언가에 도전했다가 실패한 경험이 있습니까? 실패에서 교훈을 얻어 이후에 도움이 되었던 경험이 있다면 이야기해 보세요.\n(실패 극복) 팀 프로젝트에서 갈등이 발생했을 때 이를 해결하고 협력적인 관계를 유지하기 위해 노력한 경험이 있나요? 그 과정에서 무엇을 느꼈는지 이야기해 보세요.\n(협력) 학창 시절 팀 프로젝트에서 주로 맡았던 역할과 그에 따른 기여는 무엇이었는지 이야기해 보세요.\n(열정, 도전정신) 학창 시절 도전적인 프로젝트에 참여해 본 경험이 있나요? 도전적인 프로젝트 수행 과정에서 무엇을 느꼈는지 이야기해 보세요."},{"y":2025,"u":"안양대학교","c1":"아리학생부종합Ⅰ전형","c2":"의사소통능력","q":"(지원동기, 우리 대학에 대한 이해) 여러 대학 중 우리 대학을 선택한 동기가 있나요? 특별한 이유가 있다면 이야기해 보세요.\n(지원동기, 우리 대학에 대한 이해) 나의 꿈을 이루는 데 안양대학교가 어떤 도움을 줄 수 있을 것이라고 생각하나요? 그 이유는 무엇인가요?\n(인생 목표) 10년 후 나의 모습은 어떤 모습일거라고 생각하나요? 그 목표를 이루기 위해서 어떤 노력을 해야 한다고 생각하나요?\n(인생 목표) 대학 졸업 후 어떤 분야에서 일하고 싶은가요? 그 이유는 무엇인가요?\n(강점) 나의 강점은 무엇이라고 생각하나요? 나의 강점이 가장 잘 발휘되었던 사례가 있었다면 이야기해 보세요.\n(강점) 내가 다른 사람보다 특별히 잘하는 분야가 있다면 무엇인지 사례를 들어 이야기해 보세요.\n(실패 극복) 본인이 무언가에 도전했다가 실패한 경험이 있습니까? 실패에서 교훈을 얻어 이후에 도움이 되었던 경험이 있다면 이야기해 보세요.\n(실패 극복) 팀 프로젝트에서 갈등이 발생했을 때 이를 해결하고 협력적인 관계를 유지하기 위해 노력한 경험이 있나요? 그 과정에서 무엇을 느꼈는지 이야기해 보세요.\n(협력) 학창 시절 팀 프로젝트에서 주로 맡았던 역할과 그에 따른 기여는 무엇이었는지 이야기해 보세요.\n(열정, 도전정신) 학창 시절 도전적인 프로젝트에 참여해 본 경험이 있나요? 도전적인 프로젝트 수행 과정에서 무엇을 느꼈는지 이야기해 보세요."},{"y":2025,"u":"을지대학교","c1":"계열적합성\n(계열에 대한 관심과 이해, 계열 관련 활동과 진로계획)","c2":"의사소통능력","q":"지원자 꿈의 변천사에 대해 설명해 주세요.\n자신은 리더십 또는 팔로우십 중에 무엇이 더 주를 이루나요? 발휘되었던 경험이 있나요?\n지원한 학과와 관련하여 진로체험 활동은 무엇을 했나요?\n의료분야의 사회적 이슈에 대해 진로활동을 하였는데, 간호와 관련해 구체적으로 설명해주세요.\n보건의료 관련 동아리 활동에서 보건지식, 감염, 의학 이슈, 심폐소생술 등 다양한 활동을 하였는데 간호와 가장 관련 있는 주제는 무엇이라고 생각하나요?\n펨토 과학을 통해 급성심근경색, 치매의 조기진단이 가능함을 알게 되었는데 어떤 내용인가요?\n사람이 하는 일과 기계가 하는 일을 분석하여 'VR 눈 검안사'라는 미래직업을 상상했는데, 향후 안경사의 직업에 어떠한 변화가 올 것으로 생각하나요?\n응급구조학과의 교육과정, 전공 설명을 듣고 기본소생술 이론교육과 일상생활에 활용할 수 있는 응급처치법 교육을 직접 체험하는 활동을 했다고 했는데 설명해 보세요.\n의료, 보건 동아리 활동을 하였는데 이러한 활동이 방사선학과를 지원하기 위해 어떠한 도움이 되었는지 이야기해 주세요.\n'디지털 치과학'을 공부한 경험이 있는데, 치과에서 이용되고 있는 디지털장비에 대해 설명해주세요.\n영어 시간에 관련 활동이 있는데, 스포츠 물리치료와 일반 물리치료의 차이점은 무엇이라 생각하나요?\n식용 곤충을 주제로 발표했는데, 어떻게 곤충이 대체 식량이 될 수 있는지 이유와 전망을 설명해 보세요.\n동아리 주제탐구 활동으로 '영유아 화장품의 안전성'에 대해 탐구한 내용을 설명해 주세요.\n3학년 진로심화 주제 탐구사례 분석으로 보건의료정보관리사에 대한 보고서를 작성했는데, 그 활동을 통해 알게된 점은 무엇인가요?\n진로 융합 탐색활동에서, 신소재 의료기기에 대한 정의와 활용 범위, 그리고 소재에 대해 조사했는데, 어떤 내용인지 설명해주세요.\n'의료 AI의 데이터 분석 방법'을 주제로 조사하였는데, 구체적인 설명과 느낀점, 배운점 등을 설명해보세요.\n인공지능을 이용한 디자인 산업 현황에 대해 공부했는데 설명해보세요.\n장애인스포츠에 관심이 많은데, 우리나라에서 우선적으로 집중·개선할 분야는 무엇일까요?\n생명 존중 및 자살 예방 교육을 참여하고 느낀 점을 말해보세요.\n친환경장례법에 대해 발표했는데 내용을 설명해주세요.\n아동과 복지에 관심이 많은데, 학대받는 아동을 찾아내어 도움을 주기 위해 정부가 해야할 역할은 무엇일까요?\nk-뷰티에 대해 조사했는데, 우리나라 뷰티산업이 세계시장을 선도하기 위해 집중 육성할 분야는 무엇이 있을까요?\n사회문제로 스마트폰 중독을 제시했는데, 스마트폰과 의존은 어떤 문제를 발생시킬까요?"},{"y":2025,"u":"을지대학교","c1":"발전가능성\n(창의적 문제해결력, 자기주도성)","c2":"의사소통능력","q":"지원자 꿈의 변천사에 대해 설명해 주세요.\n자신은 리더십 또는 팔로우십 중에 무엇이 더 주를 이루나요? 발휘되었던 경험이 있나요?\n지원한 학과와 관련하여 진로체험 활동은 무엇을 했나요?\n의료분야의 사회적 이슈에 대해 진로활동을 하였는데, 간호와 관련해 구체적으로 설명해주세요.\n보건의료 관련 동아리 활동에서 보건지식, 감염, 의학 이슈, 심폐소생술 등 다양한 활동을 하였는데 간호와 가장 관련 있는 주제는 무엇이라고 생각하나요?\n펨토 과학을 통해 급성심근경색, 치매의 조기진단이 가능함을 알게 되었는데 어떤 내용인가요?\n사람이 하는 일과 기계가 하는 일을 분석하여 'VR 눈 검안사'라는 미래직업을 상상했는데, 향후 안경사의 직업에 어떠한 변화가 올 것으로 생각하나요?\n응급구조학과의 교육과정, 전공 설명을 듣고 기본소생술 이론교육과 일상생활에 활용할 수 있는 응급처치법 교육을 직접 체험하는 활동을 했다고 했는데 설명해 보세요.\n의료, 보건 동아리 활동을 하였는데 이러한 활동이 방사선학과를 지원하기 위해 어떠한 도움이 되었는지 이야기해 주세요.\n'디지털 치과학'을 공부한 경험이 있는데, 치과에서 이용되고 있는 디지털장비에 대해 설명해주세요.\n영어 시간에 관련 활동이 있는데, 스포츠 물리치료와 일반 물리치료의 차이점은 무엇이라 생각하나요?\n식용 곤충을 주제로 발표했는데, 어떻게 곤충이 대체 식량이 될 수 있는지 이유와 전망을 설명해 보세요.\n동아리 주제탐구 활동으로 '영유아 화장품의 안전성'에 대해 탐구한 내용을 설명해 주세요.\n3학년 진로심화 주제 탐구사례 분석으로 보건의료정보관리사에 대한 보고서를 작성했는데, 그 활동을 통해 알게된 점은 무엇인가요?\n진로 융합 탐색활동에서, 신소재 의료기기에 대한 정의와 활용 범위, 그리고 소재에 대해 조사했는데, 어떤 내용인지 설명해주세요.\n'의료 AI의 데이터 분석 방법'을 주제로 조사하였는데, 구체적인 설명과 느낀점, 배운점 등을 설명해보세요.\n인공지능을 이용한 디자인 산업 현황에 대해 공부했는데 설명해보세요.\n장애인스포츠에 관심이 많은데, 우리나라에서 우선적으로 집중·개선할 분야는 무엇일까요?\n생명 존중 및 자살 예방 교육을 참여하고 느낀 점을 말해보세요.\n친환경장례법에 대해 발표했는데 내용을 설명해주세요.\n아동과 복지에 관심이 많은데, 학대받는 아동을 찾아내어 도움을 주기 위해 정부가 해야할 역할은 무엇일까요?\nk-뷰티에 대해 조사했는데, 우리나라 뷰티산업이 세계시장을 선도하기 위해 집중 육성할 분야는 무엇이 있을까요?\n사회문제로 스마트폰 중독을 제시했는데, 스마트폰과 의존은 어떤 문제를 발생시킬까요?"},{"y":2025,"u":"을지대학교","c1":"자세 및 태도\n(면접태도 및 자세, 제출서류 진위여부)","c2":"의사소통능력","q":"지원자 꿈의 변천사에 대해 설명해 주세요.\n자신은 리더십 또는 팔로우십 중에 무엇이 더 주를 이루나요? 발휘되었던 경험이 있나요?\n지원한 학과와 관련하여 진로체험 활동은 무엇을 했나요?\n의료분야의 사회적 이슈에 대해 진로활동을 하였는데, 간호와 관련해 구체적으로 설명해주세요.\n보건의료 관련 동아리 활동에서 보건지식, 감염, 의학 이슈, 심폐소생술 등 다양한 활동을 하였는데 간호와 가장 관련 있는 주제는 무엇이라고 생각하나요?\n펨토 과학을 통해 급성심근경색, 치매의 조기진단이 가능함을 알게 되었는데 어떤 내용인가요?\n사람이 하는 일과 기계가 하는 일을 분석하여 'VR 눈 검안사'라는 미래직업을 상상했는데, 향후 안경사의 직업에 어떠한 변화가 올 것으로 생각하나요?\n응급구조학과의  많은데, 우리나라에서 우선적으로 집중·개선할 분야는 무엇일까요?\n생명 존중 및 자살 예방 교육을 참여하고 느낀 점을 말해보세요.\n친환경장례법에 대해 발표했는데 내용을 설명해주세요.\n아동과 복지에 관심이 많은데, 학대받는 아동을 찾아내어 도움을 주기 위해 정부가 해야할 역할은 무엇일까요?\nk-뷰티에 대해 조사했는데, 우리나라 뷰티산업이 세계시장을 선도하기 위해 집중 육성할 분야는 무엇이 있을까요?\n사회문제로 스마트폰 중독을 제시했는데, 스마트폰과 의존은 어떤 문제를 발생시킬까요?"},{"y":2025,"u":"차의과학대학교","c1":"진로역량","c2":"의사소통능력","q":"본인의 희망전공 분야에 필요한 능력은 무엇이라고 생각하는지 이야기해 주세요.\n본인의 희망전공을 선택하는데 계기가 된 활동이 있다면 이야기해 주세요.\n본인의 희망전공을 결정한 이후 가장 중점적으로 준비한 사항은 무엇인가요?"},{"y":2025,"u":"차의과학대학교","c1":"인성","c2":"의사소통능력","q":"주변에 도움을 준 경험이 있다면 어떤 것이며, 그 안에서 지원자의 역할은 무엇이었는지 이야기해 주세요.\n본인에게 가장 중요한 가치관은 무엇인가요?\n고교 생활 중 리더십을 발휘한 경험이 있으면 이야기해 주세요.\n다른 사람과 마찰이나 어려움이 발생했을 때, 어떻게 해결했는지 이야기해 주세요.\n고교 생활 중 나눔을 실천했던 사례가 있다면 구체적으로 이야기해 주세요."},{"y":2025,"u":"차의과학대학교","c1":"발전가능성","c2":"의사소통능력","q":"우리 대학에 입학 후, 1학년을 어떻게 보낼 계획인지 이야기해 주세요.\n고교 생활 중 본인의 역량 개발을 위해 노력한 활동이 있다면 이야기해 주세요.\n문제가 발생되었을 때 해결 방안을 제시하여 해결한 경험이 있다면 이야기해 주세요.\n지원자의 꿈은 무엇이며 어떻게 실현할 것인지 이야기해 주세요."},{"y":2025,"u":"한국공학대학교","c1":"인성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 ○○관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오.\n○○학과에 진학하여 가장 듣고 싶은 수업이 있다면? 그 이유는 무엇인지?\n고교생활 중 문제해결을 위해 남들과는 다른 자신만의 아이디어를 도출해서 일을 잘 해냈던 경험에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},{"y":2025,"u":"한국공학대학교","c1":"전공적합성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과목을 많이 공부하게 된다. 과학(사회) 과목 중 ○○관련 과목 이수내역이 없는(적은)이유에 대해 설명해보시오.\n○○학과에 진학하여 가장 듣고 싶은 수업이 있다면? 그 이유는 무엇인지?\n고교생활 중 문제해결을 위해 남들과는 다른 자신만의 아이디어를 도출해서 일을 잘 해냈던 경험에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},{"y":2025,"u":"한국공학대학교","c1":"발전가능성","c2":"의사소통능력","q":"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n선행상(효행상, 모범상)을 수상한 기록이 있다. 본인이 수상한 원인이 무엇이라고 생각하는가?\n○○학과에 지원했는데, ○○학과에서는 ○○관련 과 n(전공관심도)","c2":"의사소통능력","q":"○○학의 세부 전공들을 2~3가지 정도 간략히 설명하고 본인이 특별히 관심 있는 세부전공은 무엇인가요? 그 이유를 설명해 주세요.\n○○학을 전공하면서 본인의 진로를 위해 같이 공부하면 좋을 것 같은 학문은 무엇인가요?"},{"y":2025,"u":"한세대학교","c1":"사회문제에 대한 이해","c2":"의사소통능력","q":"제 4차 산업혁명이 현재의 본인에게 그리고 미래의 본인에게 주는 영향을 말해주세요.\n공정한 사회를 위해 기업과 경영자가 할 수 있는 역할은 각각 무엇인가요?"},{"y":2025,"u":"한신대학교","c1":"인성","c2":"의사소통능력","q":"면접에 임하는 기본자세와 최선을 다하려는 적극성을 살펴봄."},{"y":2025,"u":"한신대학교","c1":"기초소양","c2":"의사소통능력","q":"고등학교 재학기간 중 자신의 진로와 관련하여 어떤 노력을 해왔는지 본인에게 의미있는 학습 경험과 교내활동을 통해 배우고 느낀 점을 말해보시오."},{"y":2025,"u":"한신대학교","c1":"전공적합성","c2":"의사소통능력","q":"(자유전공학부) 자유전공학부에 지원하게 된 동기는 무엇이며, 자유전공학부의 특성이 자신의 진로와 미래 사회에 어떻게 기여할 수 있다고 생각하는지 말해보시오.\n(신학) 한신대학교 신학대학에 지원하게 된 동기와 인류사회에 신학이 왜 필요한지를 설명하고, 그것이 자신의 비전과 어떤 관계가 있는지를 밝혀주세요.\n(철학) 인터넷의 발달과 함께 비대면으로 소통하는 문화가 확대되고 있습니다. 코로나19와 같은 범지구적 감염병의 영향으로 학교와 직장도 비대면 수업과 업무수행이 늘어났습니다. 이와 같은 비대면사회의 장단점에 대해 설명해 보시오. 장점을 발전시키고 단점을 줄일 수 있는 방법도 제시해 보시오.\n(독일어문화학) 우리 독일어문화학과 입학 후 자신이 배우고 싶은 것을 구체적으로 언급하고 대학생활 계획에 대해 말해주세요.\n(영미문화학) 영미문화학에서 무엇을 배우고 싶으며, 배운 내용이 자신의 꿈 실현에 어떤 도움을 줄 것이라고 생각하는지 조리 있게 말해 보세요.\n(문예창작학) 가장 감명 깊게 읽은 책을 한 권 고르고 그 이유를 말해 보시오.\n(한국어문학) 한국 문학 작품을 통해 외국인에게 한국어를 가르치고자 할 때 어떤 점을 염두에 두어야 할지 자신의 생각을 이야기하시오.\n(한국사학) 한국사학과를 지원하게 된 동기는 무엇이며, 한국사학이 어떤 학문이며 자기 자신과 우리 사회에 어떤 기여를 할 수 있는지를 말해보시오.\n(중국어문화콘텐츠학) 중국어를 배우려는 이유와 우리 전공 졸업 후 이룰 자신의 모습에 대해 이야기해 보시오.\n(디지털영상문화콘텐츠학) 디지털영상문화콘텐츠학전공에서 무엇을 배우기를 기대하는지 이야기해 보세요. 그리고 그런 배움으로 쌓은 전문성을 졸업 후에 어떻게 발휘하고 싶은지 미래 비전을 이야기해 보시오.\n(일본학) 2024년 7월 유네스코는 일본 사도광산의 세계유산 등재를 결정했는데, 강제동원의 인정 여부를 놓고 한국의 정치권은 양분되었습니다. 외교부는 '한일관계 개선의 흐름을 계속 이어나가겠다'고 긍정적으로 평가했지만, 야당은 '역사를 망각한 정부'라고 비판했습니다. 사도광산 전시실의 전시 내용을 둘러싸고, 한국 내의 갈등은 계속되고 있습니다. 사도광산의 세계유산 등재로 빚어진 제반 논란에 대해 어떻게 생각하는지 말해보시오.\n(동아시아통상학) 동아시아 통상 전공을 지원하게 된 이유와 동아시아 통상 전공에서 배우고 싶은 내용은 무엇인지 말해보시오.\n(경제금융학) 기업의 사회적 책임에 대한 논란이 분분합니다. 이에 대한 본인의 생각을 기술해보시오.\n(국제관계학) 이른바 '건국절', '뉴라이트' 인사의 독립기념관장 임명 그리고 일제하 조선인 국적문제 등 우리 사회에서 친일파 문제가 다시 논란이 되는데 이의 해결방안은?\n(공공인재 빅데이터 융합학) 공공정책에서 AI와 빅데이터의 중요성과 활용사례에 대해 말해보시오.\n(경영학) 좋은 기업이란 어떤 기업인가? 왜 그렇게 생각하는가?\n(IT경영학) 디지털 트랜스포메이션 시대에 생성형 AI, Big Data, Cloud computing 등의 핵심기술이 주요 화두로 등장하고 있습니다. 이러한 기술들 중 하나를 선택하여 기업경영에 어떻게 활용되고 있는지 활용된 사레를 제시하고, 기업 경쟁력을 어떻게 높일 수 있었는지에 대해 설명하세요. 또한 학생 본인은 IT 경영학을 전공하면서 사회 진출을 위한 개인역량을 어떻게 강화할 것인지 설명하시오.\n(글로벌비즈니스학) 글로벌비즈니스학부에 지원하게 된 동기는 무엇이며, ESG 경영에 대하여 설명해보시오.\n(미디어영상광고홍보학) 지원하는 전공 분야에 적합한 본인의 자질과 강점에 대해 말해보시오.\n(사회학) 우리 사회에는 남녀 갈등, 빈부갈등, 세대갈등, 지역갈등 등 다양한 갈등이 존재합니다. 어느 갈등이 가장 먼저 해소되어야 하는지, 그 이유와 방법 등을 제시하시오.\n(사회복지학) 우리나라는 국민의 사회보장을 위해 다양한 복지제도와 서비스가 있습니다. 그러나 안타깝게도 복지사각지대는 발생하고 있습니다. 본인이 생각하기에 복지사각지대와 관련 있는 사건 중에서 가장 안타까운 사건이 무엇인지 설명하고, 그 원인과 해결방안에 대한 본인의 의견을 제시해 보시오.\n(재활상담학) '재활상담학 전공을 지원하게 된 동기'는 무엇이며 '재활상담학 전공 졸업 후 이루고 싶은 진로와 그 꿈을 실현하기 위한 본인의 준비나 계획'을 말해보시오.\n(심리·아동학) 현대사회에 가장 큰 문제점이 무엇이라 생각하며, 그것에 대해 심리학자 또는 아동학자로서의 해답은 무엇이라 생각하는지 말해보시오.\n(금융공학) 금융공학과에 지원하게 된 동기를 말하고, 다음으로 본인이 생각하는 금융에 관하여 설명하시오.\n(빅데이터융합학) 빅데이터 시대를 맞아 다양한 분야의 데이터가 서로 융합되고 있고 실제 여러 기업과 정부에서 이렇게 융합된 데이터를 활용하여 마케팅 또는 정부 정책에 활용하고 있습니다. 본인이 알고 있는 빅데이터융합 활용 사례를 한 가지 말해보시오.\n(AI·SW학) 소프트웨어, 지능형 사물인터넷, 데이터사이언스, 인공지능, XR콘텐츠, 디지털 라이프케어 중에서 한 가지 선택한 후, (1) 선택한 분야에 대해 기본 개념을 간략히 설명하고, (2) 선택한 분야가 앞으로 우리 현실세계에 어떻게 적용될 것으로 예상하는지, (3) 그리고 AI·SW 분야에서 추가적으로 연구·개발되어야 하는 기술은 무엇이라 생각하는지 답해보시오.\n(AI시스템반도체학) AI반도체가 가져올 산업 혁신에 대해 다양한 분야의 예를 들어 설명하시오."},{"y":2025,"u":"한양대학교(에리카)","c1":"통합적 사고역량\n(교과 활동 확인, 자기주도적 탐구 역량)","c2":"의사소통능력","q":"○○ 과목에서 ○○을 주제로 토론에 참가한 경험이 있는데 본인과 반대 입장의 근거는 무엇이었는지 설명하시오.\n○○ 과목의 세부능력 및 특기사항을 보면 ○○에 대해 관심이 많다고 했는데 ○○의 원리에 대해 설명하시오.\n○○ 과정에서 이견 또는 갈등을 겪었을 때 이를 효과적으로 극복한 경험이 있다면 구체적으로 설명하시오."},{"y":2025,"u":"한양대학교(에리카)","c1":"의사소통 역량\n(협업활동 확인, 면접 태도)","c2":"의사소통능력","q":"○○ 과목에서 ○○을 주제로 토론에 참가한 경험이 있는데 본인과 반대 입장의 근거는 무엇이었는지 설명하시오.\n○○ 과목의 세부능력 및 특기사항을 보면 ○○에 대해 관심이 많다고 했는데 ○○의 원리에 대해 설명하시오.\n○○ 과정에서 이견 또는 갈등을 겪었을 때 이를 효과적으로 극복한 경험이 있다면 구체적으로 설명하시오."},{"y":2025,"u":"협성대학교","c1":"미래역량우수자","c2":"인성","q":"가장 큰 실패 또는 좌절의 경험을 한 가지만 말해보세요. 그리고 이를 어떻게 극복했는지, 극복하지 못했다면 그 이유는 무엇인지 말해 보세요.\n사회적 약자에 대한 배려가 어떻게 사회 구성원 모두에게 이익을 줄 수 있는지 구체적인 예와 함께 말해 보세요."},{"y":2025,"u":"협성대학교","c1":"미래역량우수자","c2":"시사상식","q":"혁신적 기술 발전의 방향인 AI가 교육 환경에 미칠 영향에 대하여 말해 보세요.\n매년 가속화되고 있는 저출생의 원인은 무엇이며, 이 문제해결을 위해 우리 사회는 어떠한 노력을 해야 할지 자신의 생각을 말해보세요.\n청년 고용과 관련된 사회적 문제를 한 가지만 제시하고, 이를 해결하기 위한 방안을 말해 보세요."},{"y":2025,"u":"협성대학교","c1":"협성창의인재","c2":"전공\n적합성 및 발전\n가능성","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\n지원자의 장점은 무엇이라고 생각하는가?\n학생부 기재사항에 대한 구체적인 질문 등"},{"y":2025,"u":"협성대학교","c1":"협성창의인재","c2":"인성적 자질","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\n지원자의 장점은 무엇이라고 생각하는가?\n학생부 기재사항에 대한 구체적인 질문 등"},{"y":2025,"u":"협성대학교","c1":"협성창의인재","c2":"종합적\n사고력 및 의사소통","q":"○○학과에 지원하기 위해 어떤 준비를 하였으며, 합격 이후 학업계획은?\n지원자의 장점은 무엇이라고 생각하는가?\n학생부 기재사항에 대한 구체적인 질문 등"},{"y":2025,"u":"서울교육대학교","c1":"교직 인성\n(공동체 및 자기주도적역량)","c2":"종합적\n사고력 및 의사소통","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"서울교육대학교","c1":"교직 적성\n(탐구혁신 및 의사소통역량)","c2":"종합적\n사고력 및 의사소통","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"서울교육대학교","c1":"교직 교양\n(창의 및 융합역량)","c2":"종합적\n사고력 및 의사소통","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"경인교육대학교","c1":"교직 인성\n(공감 및 소통능력, 나눔과 배려)","c2":"종합적\n사고력 및 의사소통","q":"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},{"y":2025,"u":"공주교육대학교","c1":"정시 수능위주","c2":"교직관\n및 교양","q":"수시모집은 면접 고사 없음.\n정시모집 수능위주 전형에서 제시문 면접을 진행. 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"공주교육대학교","c1":"정시 수능위주","c2":"표현력","q":"수시모집은 면접 고사 없음.\n정시모집 수능위주 전형에서 제시문 면접을 진행. 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"공주교육대학교","c1":"정시 수능위주","c2":"태도","q":"수시모집은 면접 고사 없음.\n정시모집 수능위주 전형에서 제시문 면접을 진행. 선행학습 영향평가 결과보고서 참고."},{"y":2025,"u":"광주교육대학교","c1":"문제해결역량","c2":"태도","q":"- (1-기술가정) 유니버설 디자인의 의미에 대해 설명하고, 초등학교 발명 교육에 이를 어떻게 적용할 수 있을지 설명해 보세요.\n- (3-화법과 작문) '3분 스피치' 활동에서 'V2X' 기술에 대해 발표해 보았는데, V2X기술이란? 어디에 활용할 수 있나요?\n- (3-논술) 3학년 논술 과목에서 '핀란드 교육혁명'을 읽고 비평 활동을 했습니다. 지원자가 진행했던 주요 활동과 그를 통해 느낀 교육적 시사점을 이야기해주세요.\n- (3-영어독해와 작문) 의사소통적 특성을 보인 직업 분야에서는 인공지능이 일자리를 대체할 수 없다는 주장을 했는데, 최근의 빠른 인공지능 기술의 발전 상황에서 지원자의 생각은 어떠한지 설명해 보세요.\n- (1-수학) 명제를 방정식으로 표현하는 방법에 대해 알아보고자 하는 노력을 했다고 기술되어있습니다. 자신의 목표에 대해 수립한 명제가 무엇이며, 그 명제를 어떻게 방정식으로 표현할 수 있나요?\n- (3-영어독해와 작문) 에세이 주제로 '우리나라 교육의 문제점'을 선택하고, 탑다운 방식의 교육이 학생들의창의성 발달에 미치는 부정적인 영향을 논리적으로 설명하였다는데, 이에 대해 구체적 예시를 들어 설명해 보세요.\n- (1-통합사회) 지구적 차원의 환경문제에 관심을 갖고 ‘지구온난화’를 주제로 문제의 원인과 대안을 고민하는 사회문제 탐구 보고서를 작성하였는데, 지원자가 분석한 문제 원인과 제시한 대안을 차례대로 얘기해보세요.\n- (2-생활과 윤리) 환경문제에 대한 윤리적 쟁점 탐구에서 플로깅과 같은 환경보호 운동에 적극적으로 동참하겠다는 의지를 표현하였다고 기술되어있는데, 그 의지를 실천한 경험이 있는지에 대해 이야기해보세요.\n- (3-독서와 문법) 3학년 독서와 문법 시간에 '물의 자연사'를 읽고 발표한 경험이 있습니다. 그 책을 고른 이유와 발표의 주요 내용을 이야기해주세요.\n- (2-세계사) 신문 제작 활동에서 '산업혁명의 이면'이라는 사설을 작성하여 아동노동 문제의 현실과 해결방안을 논리적으로 서술하였다고 기술되어있는데, 지원자가 분석한 아동노동 문제 및 해결방안은 무엇이었는지 얘기해보세요. [참고: 2학년 정치와 법. 아동 인권에 관심을 가지고 국제기의 활동을 조사함. 비정부기구를 통한 정기적 후원 등의 방안을 제시함]\n- (1-통합사회) 사회적 약자에 대한 차별과 인권 침해 문제의 양상 및 해결방안에 대한 논리적인 글을 씀으로써 인권 감수성을 키웠다고 기술되어있는데, 지원자가 제시한 인권 침해의 양상과 해결방안은 무엇이었는지 얘기해보세요.\n- (3-확률과 통계) 통계자료를 활용하여 '대한민국 사교육비 지출에 따른 교육 불평등 해석'을 주제로 보고서를 작성하였는데, 주요 내용을 설명하고 교육 불평등 해소 방안에 대한 본인의 생각을 설명해 보세요.\n- (3-문학) 김종익의 '잡초', 김남조의 '생명', 한정숙의 '잡초' 세 편에 대한 분석과 감상을 담은 보고서를 제출하였다고 기술되어있는데, 이 세 편의 시가 보여주는 공통점은 무엇인가요?\n- (3-생활과 윤리) 다문화 이해교육과 관련한 정책의 보완점을 분석해보며 실질적인 해결방안을 모색하였다고 기술되어있는데, 지원자가 파악한 한국 다문화 이해 교육의 문제점과 해결방안을 차례로 얘기해보세요.\n- (3-생명과학) 우리나라는 안락사가 허용되지 않고 있지만, 네덜란드는 안락사가 허용되고 있는데 사회적인 측면에서 긍정적 또는 부정적 특징을 말해보세요.\n- (3-화법과 작문) 루소의 생애 및 교육관에 대해 발표했습니다. 루소의 '에밀'에서 기억에 남는 내용과 교육적 시사점에 대해 이야기해주세요.\n- (3-사회문화) ‘클라우스 슈밥의 4차 산업혁명’을 읽었다고 했는데 핵심적인 내용을 소개하고, 미래 교육에 어떠한 시사점을 가지는지 설명해 보세요.\n- (3-사회문제 탐구) 학년제를 폐지하고 인공지능으로 개인의 학업능력 분석 후 맞춤 교육을 실시하면 교사의 업무 부담을 줄이고 교육이라는 본연의 역할 수행에 충실할 수 있다고 주장한 것으로 기술되어 있는데, 이를 초등교육의 관점에서 설명해 보세요.\n- (2-생활과 윤리) 사교육비 증가와 교육 불평등 문제를 에듀테크로 해결할 수 있다고 하였는데, 그 방안을 구체적으로 설명해 보세요.\n- (3-영어독해와 작문) '교사의 격려 언어가 학생들의 학교생활에 미치는 영향'에 대한 글을 찾아 탐독해 보았는데, 인상깊은 부분은 무엇이었나요? 그 이유는 무엇인가요?\n- (3-동아리) ‘교실속딜레마상황100문101답’을 읽고 보고서를 작성한 바 있네요. 교실 속 딜레마 상황 중에서 가장 기억에 남는 딜레마 상황은 무엇이었는지 설명해 보세요. 또 어떻게 그 딜레마 상황을 극복했는지도 설명해 주시기 바랍니다.\n- (2-세특) 2학년 때 <교사제> 참가의 경험이 있는데, 어떠한 행사였고, 구성원과의 소통하고 협의한 경험을 소개해 보세요.\n- (2-행특) \"학급 내 의사소통 과정에서 이견이 있을 때 친구들의 의견을 잘 조율\"했다고 나오는데, 비결은? 향후 교사가 되어 학생들 간의 불협화음이 생겨 이를 조정해야 할 때 어떻게 하면 좋을지 자신의 경험을 바탕으로 이야기해보세요.\n- (3-동아리) '멘토스' 동아리 활동에서 교실 안 다문화 학생 따돌림 문제를 해결하기 위한 교육 프로그램들을 연구하였는데 그 내용은 무엇인가?\n- (1-영어) 롤모델 프리젠테이션 활동에서 스폰지밥을 자신의 롤모델로 정한 이유는 무엇이며, 그것이 초등교사에게 어떤 시사점을 줄 수 있다고 생각합니까?\n- (3-진로) 지원자가 작성한 대한민국아동청소년 삶의 만족도에 대한 보고서에서, 아동청소년 삶의 만족도를 높이기 위해 교사 역할의 중요성을 언급했습니다. 이에 대해 구체적으로 설명해 주세요.\n- (3-진로) \"AI가 바꾸는 학교 수업 챗GPT 교육 활용\"을 읽은 것으로 확인됩니다. 미래교실에서 AI는 어떻게 사용되고 자리매김할 수 있는지 생각해 본적이 있나요? 있다면 자신이 그리는 미래 교실의 AI의 활용방안에 대해서 설명해주세요.\n- (2-진로) '다문화학생을 위한 교육방법'을 주제로 탐구계획서를 작성하였다고 기술되어있는데, 다문화학생을 지도하기 위해 초등교사가 갖추어야 할 역량을 교직 인성의 관점에서 설명해보세요.\n- (3-교육학) 교사로서 가져야 할 교육 리더십에 관해 알아보았는데, 지원자는 교사는 어떤 리더십을 가져야 된다고 생각하나요? 그 이유는 무엇인가요?\n- (2-자율) ‘생태환경교육 프로젝트' 팀장을 담당했는데, 주 역할은? 리더십을 보여 줄 수 있었던 사례가 있다면 얘기해보세요.\n- 1학년 때 의학에 관심이 있었던 것 같은데, 교사로서의 꿈을 갖게 된 계기는 무엇이고 본인이 생각하는 훌륭한 교사란 어떤 교사인가요?\n- (3-생활과 윤리) 'AI로 변화된 사회 모습과 그 안에서 우리가 해야 하는 일'을 주제로 신문스크랩 활동을 해보았는데, 미래 초등교육은 어떻게 변화할까요?\n- (2-독서) '선생님도 아프다(양곤성)'를 읽고 독후감을 작성해 보았는데, 가장 인상깊은 부분이 있나요?\n- (3-동아리) 학생인권조례 폐지 찬반론을 조사하고 절충안을 모색했는데, 그 내용을 간단히 설명해 보시오.\n- (2-출결) 미인정 지각이 2회 있네요. 원격수업 중에 발생한 것인가요? 지원자의 성실성을 보여주는 사례를 소개해 주세요.\n- (3-봉사) 학생주도 프로젝트형 봉사활동에서 지원자가 했던 구체적인 활동 내용을 이야기해주세요. 활동을 통해 지원자가 배우고 느낀 점은 무엇인가요?\n- (2-문학) '방과 후(히가시노 게이고)'를 읽고 교사로서 지녀야 할 올바른 행동 양식에 대해 고민을 해봤는데, 교사의 올바른 행동 양식이 무엇일까요?\n- (자율, 동아리) 윤리적 문제에 관련한 탐구활동이 많습니다. 교사의 직업윤리는 무엇이라고 생각합니까?\n- (2-자율) '지혜롭게 갈등 해결하기'에서 갈등 해결을 위한 7단계 프로세스에 대해 알아보았는데, 본인만의 갈등을 해소하기 위한 가장 좋은 방법이 있다면 말씀해주세요.\n- (2-행특) '민주적 학급 살이'를 읽고 학급자치회를 직접 구성했는데, 자치회를 구성하는데 어떤 부분을 고려 하였나요? 책의 내용을 근거로 말씀해주세요."},{"y":2025,"u":"광주교육대학교","c1":"교직적합성","c2":"태도","q":"- (1-기술가정) 유니버설 디자인의 의미에 대해 설명하고, 초등학교 발명 교육에 이를 어떻게 적용할 수 있을지 설명해 보세요.\n- (3-화법과 작문) '3분 스피치' 활동에서 'V2X' 기술에 대해 발표해 보았는데, V2X기술이란? 어디에 활용할 수 있나요?\n- (3-논술) 3학년 논술 과목에서 '핀란드 교육혁명'을 읽고 비평 활동을 했습니다. 지원자가 진행했던 주요 활동과 그를 통해 느낀 교육적 시사점을 이야기해주세요.\n- (3-영어독해와 작문) 의사소통적 특성을 보인 직업 분야에서는 인공지능이 일자리를 대체할 수 없다는 주장을 했는데, 최근의 빠른 인공지능 기술의 발전 상황에서 지원자의 생각은 어떠한지 설명해 보세요.\n- (1-수학) 명제를 방정식으로 표현하는 방법에 대해 알아보고자 하는 노력을 했다고 기술되어있습니다. 자신의 목표에 대해 수립한 명제가 무엇이며, 그 명제를 어떻게 방정식으로 표현할 수 있나요?\n- (3-영어독해와 작문) 에세이 주제로 '우리나라 교육의 문제점'을 선택하고, 탑다운 방식의 교육이 학생들의창의성 발달에 미치는 부정적인 영향을 논리적으로 설명하였다는데, 이에 대해 구체적 예시를 들어 설명해 보세요.\n- (1-통합사회) 지구적 차원의 환경문제에 관심을 갖고 ‘지구온난화’를 주제로 문제의 원인과 대안을 고민하는 사회문제 탐구 보고서를 작성하였는데, 지원자가 분석한 문제 원인과 제시한 대안을 차례대로 얘기해보세요.\n- (2-생활과 윤리) 환경문제에 대한 윤리적 쟁점 탐구에서 플로깅과 같은 환경보호 운동에 적극적으로 동참하겠다는 의지를 표현하였다고 기술되어있는데, 그 의지를 실천한 경험이 있는지에 대해 이야기해보세요.\n- (3-독서와 문법) 3학년 독서와 문법 시간에 '물의 자연사'를 읽고 발표한 경험이 있습니다. 그 책을 고른 이유와 발표의 주요 내용을 이야기해주세요.\n- (2-세계사) 신문 제작 활동에서 '산업혁명의 이면'이라는 사설을 작성하여 아동노동 문제의 현실과 해결방안을 논리적으로 서술하였다고 기술되어있는데, 지원자가 분석한 아동노동 문제 및 해결방안은 무엇이었는지 얘기해보세요. [참고: 2학년 정치와 법. 아동 인권에 관심을 가지고 국제기의 활동을 조사함. 비정부기구를 통한 정기적 후원 등의 방안을 제시함]\n- (1-통합사회) 사회적 약자에 대한 차별과 인권 침해 문제의 양상 및 해결방안에 대한 논리적인 글을 씀으로써 인권 감수성을 키웠다고 기술되어있는데, 지원자가 제시한 인권 침해의 양상과 해결방안은 무엇이었는지 얘기해보세요.\n- (3-확률과 통계) 통계자료를 활용하여 '대한민국 사교육비 지출에 따른 교육 불평등 해석'을 주제로 보고서를 작성하였는데, 주요 내용을 설명하고 교육 불평등 해소 방안에 대한 본인의 생각을 설명해 보세요.\n- (3-문학) 김종익의 '잡초', 김남조의 '생명', 한정숙의 '잡초' 세 편에 대한 분석과 감상을 담은 보고서를 제출하였다고 기술되어있는데, 이 세 편의 시가 보여주는 공통점은 무엇인가요?\n- (3-생활과 윤리) 다문화 이해교육과 관련한 정책의 보완점을 분석해보며 실질적인 해결방안을 모색하였다고 기술되어있는데, 지원자가 파악한 한국 다문화 이해 교육의 문제점과 해결방안을 차례로 얘기해보세요.\n- (3-생명과학) 우리나라는 안락사가 허용되지 않고 있지만, 네덜란드는 안락사가 허용되고 있는데 사회적인 측면에서 긍정적 또는 부정적 특징을 말해보세요.\n- (3-화법과 작문) 루소의 생애 및 교육관에 대해 발표했습니다. 루소의 '에밀'에서 기억에 남는 내용과 교육적 시사점에 대해 이야기해주세요.\n- (3-사회문화) ‘클라우스 슈밥의 4차 산업혁명’을 읽었다고 했는데 핵심적인 내용을 소개하고, 미래 교육에 어떠한 시사점을 가지는지 설명해 보세요.\n- (3-사회문제 탐구) 학년제를 폐지하고 인공지능으로 개인의 학업능력 분석 후 맞춤 교육을 실시하면 교사의 업무 부담을 줄이고 교육이라는 본연의 역할 수행에 충실할 수 있다고 주장한 것으로 기술되어 있는데, 이를 초등교육의 관점에서 설명해 보세요.\n- (2-생활과 윤리) 사교육비 증가와 교육 불평등 문제를 에듀테크로 해결할 수 있다고 하였는데, 그 방안을 구체적으로 설명해 보세요.\n- (3-영어독해와 작문) '교사의 격려 언어가 학생들의 학교생활에 미치는 영향'에 대한 글을 찾아 탐독해 보았는데, 인상깊은 부분은 무엇이었나요? 그 이유는 무엇인가요?\n- (3-동아리) ‘교실속딜레마상황100문101답’을 읽고 보고서를 작성한 바 있네요. 교실 속 딜레마 상황 중에서 가장 기억에 남는 딜레마 상황은 무엇이었는지 설명해 보세요. 또 어떻게 그 딜레마 상황을 극복했는지도 설명해 주시기 바랍니다.\n- (2-세특) 2학년 때 <교사제> 참가의 경험이 있는데, 어떠한 행사였고, 구성원과의 소통하고 협의한 경험을 소개해 보세요.\n- (2-행특) \"학급 내 의사소통 과정에서 이견이 있을 때 친구들의 의견을 잘 조율\"했다고 나오는데, 비결은? 향후 교사가 되어 학생들 간의 불협화음이 생겨 이를 조정해야 할 때 어떻게 하면 좋을지 자신의 경험을 바탕으로 이야기해보세요.\n- (3-동아리) '멘토스' 동아리 활동에서 교실 안 다문화 학생 따돌림 문제를 해결하기 위한 교육 프로그램들을 연구하였는데 그 내용은 무엇인가?\n- (1-영어) 롤모델 프리젠테이션 활동에서 스폰지밥을 자신의 롤모델로 정한 이유는 무엇이며, 그것이 초등교사에게 어떤 시사점을 줄 수 있다고 생각합니까?\n- (3-진로) 지원자가 작성한 대한민국아동청소년 삶의 만족도에 대한 보고서에서, 아동청소년 삶의 만족도를 높이기 위해 교사 역할의 중요성을 언급했습니다. 이에 대해 구체적으로 설명해 주세요.\n- (3-진로) \"AI가 바꾸는 학교 수업 챗GPT 교육 활용\"을 읽은 것으로 확인됩니다. 미래교실에서 AI는 어떻게 사용되고 자리매김할 수 있는지 생각해 본적이 있나요? 있다면 자신이 그리는 미래 교실의 AI의 활용방안에 대해서 설명해주세요.\n- (2-진로) '다문화학생을 위한 교육방법'을 주제로 탐구계획서를 작성하였다고 기술되어있는데, 다문화학생을 지도하기 위해 초등교사가 갖추어야 할 역량을 교직 인성의 관점에서 설명해보세요.\n- (3-교육학) 교사로서 가져야 할 교육 리더십에 관해 알아보았는데, 지원자는 교사는 어떤 리더십을 가져야 된다고 생각하나요? 그 이유는 무엇인가요?\n- (2-자율) ‘생태환경교육 프로젝트' 팀장을 담당했는데, 주 역할은? 리더십을 보여 줄 수 있었던 사례가 있다면 얘기해보세요.\n- 1학년 때 의학에 관심이 있었던 것 같은데, 교사로서의 꿈을 갖게 된 계기는 무엇이고 본인이 생각하는 훌륭한 교사란 어떤 교사인가요?\n- (3-생활과 윤리) 'AI로 변화된 사회 모습과 그 안에서 우리가 해야 하는 일'을 주제로 신문스크랩 활동을 해보았는데, 미래 초등교육은 어떻게 변화할까요?\n- (2-독서) '선생님도 아프다(양곤성)'를 읽고 독후감을 작성해 보았는데, 가장 인상깊은 부분이 있나요?\n- (3-동아리) 학생인권조례 폐지 찬반론을 조사하고 절충안을 모색했는데, 그 내용을 간단히 설명해 보시오.\n- (2-출결) 미인정 지각이 2회 있네요. 원격수업 중에 발생한 것인가요? 지원자의 성실성을 보여주는 사례를 소개해 주세요.\n- (3-봉사) 학생주도 프로젝트형 봉사활동에서 지원자가 했던 구체적인 활동 내용을 이야기해주세요. 활동을 통해 지원자가 배우고 느낀 점은 무엇인가요?\n- (2-문학) '방과 후(히가시노 게이고)'를 읽고 교사로서 지녀야 할 올바른 행동 양식에 대해 고민을 해봤는데, 교사의 올바른 행동 양식이 무엇일까요?\n- (자율, 동아리) 윤리적 문제에 관련한 탐구활동이 많습니다. 교사의 직업윤리는 무엇이라고 생각합니까?\n- (2-자율) '지혜롭게 갈등 해결하기'에서 갈등 해결을 위한 7단계 프로세스에 대해 알아보았는데, 본인만의 갈등을 해소하기 위한 가장 좋은 방법이 있다면 말씀해주세요.\n- (2-행특) '민주적 학급 살이'를 읽고 학급자치회를 직접 구성했는데, 자치회를 구성하는데 어떤 부분을 고려 하였나요? 책의 내용을 근거로 말씀해주세요."},{"y":2025,"u":"광주교육대학교","c1":"교직인성","c2":"태도","q":"- (1-기술가정) 유니버설 디자인의 의미에 대해 설명하고, 초등학교 발명 교육에 이를 어떻게 적용할 수 있을지 설명해 보세요.\n- (3-화법과 작문) '3분 스피치' 활동에서 'V2X' 기술에 대해 발표해 보았는데, V2X기술이란? 어디에 활용할 수 있나요?\n- (3-논술) 3학년 논술 과목에서 '핀란드 교육혁명'을 읽고 비평 활동을 했습니다. 지원자가 진행했던 주요 활동과 그를 통해 느낀 교육적 시사점을 이야기해주세요.\n- (3-영어독해와 작문) 의사소통적 특성을 보인 직업 분야에서는 인공지능이 일자리를 대체할 수 없다는 주장을 했는데, 최근의 빠른 인공지능 기술의 발전 상황에서 지원자의 생각은 어떠한지 설명해 보세요.\n- (1-수학) 명제를 방정식으로 표현하는 방법에 대해 알아보고자 하는 노력을 했다고 기술되어있습니다. 자신의 목표에 대해 수립한 명제가 무엇이며, 그 명제를 어떻게 방정식으로 표현할 수 있나요?\n- (3-영어독해와 작문) 에세이 주제로 '우리나라 교육의 문제점'을 선택하고, 탑다운 방식의 교육이 학생들의창의성 발달에 미치는 부정적인 영향을 논리적으로 설명하였다는데, 이에 대해 구체적 예시를 들어 설명해 보세요.\n- (1-통합사회) 지구적 차원의 환경문제에 관심을 갖고 ‘지구온난화’를 주제로 문제의 원인과 대안을 고민하는 사회문제 탐구 보고서를 작성하였는데, 지원자가 분석한 문제 원인과 제시한 대안을 차례대로 얘기해보세요.\n- (2-생활과 윤리) 환경문제에 대한 윤리적 쟁점 탐구에서 플로깅과 같은 환경보호 운동에 적극적으로 동참하겠다는 의지를 표현하였다고 기술되어있는데, 그 의지를 실천한 경험이 있는지에 대해 이야기해보세요.\n- (3-독서와 문법) 3학년 독서와 문법 시간에 '물의 자연사'를 읽고 발표한 경험이 있습니다. 그 책을 고른 이유와 발표의 주요 내용을 이야기해주세요.\n- (2-세계사) 신문 제작 활동에서 '산업혁명의 이면'이라는 사설을 작성하여 아동노동 문제의 현실과 해결방안을 논리적으로 서술하였다고 기술되어있는데, 지원자가 분석한 아동노동 문제 및 해결방안은 무엇이었는지 얘기해보세요. [참고: 2학년 정치와 법. 아동 인권에 관심을 가지고 국제기의 활동을 조사함. 비정부기구를 통한 정기적 후원 등의 방안을 제시함]\n- (1-통합사회) 사회적 약자에 대한 차별과 인권 침해 문제의 양상 및 해결방안에 대한 논리적인 글을 씀으로써 인권 감수성을 키웠다고 기술되어있는데, 지원자가 제시한 인권 침해의 양상과 해결방안은 무엇이었는지 얘기해보세요.\n- (3-확률과 통계) 통계자료를 활용하여 '대한민국 사교육비 지출에 따른 교육 불평등 해석'을 주제로 보고서를 작성하였는데, 주요 내용을 설명하고 교육 불평등 해소 방안에 대한 본인의 생각을 설명해 보세요.\n- (3-문학) 김종익의 '잡초', 김남조의 '생명', 한정숙의 '잡초' 세 편에 대한 분석과 감상을 담은 보고서를 제출하였다고 기술되어있는데, 이 세 편의 시가 보여주는 공통점은 무엇인가요?\n- (3-생활과 윤리) 다문화 이해교육과 관련한 정책의 보완점을 분석해보며 실질적인 해결방안을 모색하였다고 기술되어있는데, 지원자가 파악한 한국 다문화 이해 교육의 문제점과 해결방안을 차례로 얘기해보세요.\n- (3-생명과학) 우리나라는 안락사가 허용되지 않고 있지만, 네덜란드는 안락사가 허용되고 있는데 사회적인 측면에서 긍정적 또는 부정적 특징을 말해보세요.\n- (3-화법과 작문) 루소의 생애 및 교육관에 대해 발표했습니다. 루소의 '에밀'에서 기억에 남는 내용과 교육적 시사점에 대해 이야기해주세요.\n- (3-사회문화) ‘클라우스 슈밥의 4차 산업혁명’을 읽었다고 했는데 핵심적인 내용을 소개하고, 미래 교육에 어떠한 시사점을 가지는지 설명해 보세요.\n- (3-사회문제 탐구) 학년제를 폐지하고 인공지능으로 개인의 학업능력 분석 후 맞춤 교육을 실시하면 교사의 업무 부담을 줄이고 교육이라는 본연의 역할 수행에 충실할 수 있다고 주장한 것으로 기술되어 있는데, 이를 초등교육의 관점에서 설명해 보세요.\n- (2-생활과 윤리) 사교육비 증가와 교육 불평등 문제를 에듀테크로 해결할 수 있다고 하였는데, 그 방안을 구체적으로 설명해 보세요.\n- (3-영어독해와 작문) '교사의 격려 언어가 학생들의 학교생활에 미치는 영향'에 대한 글을 찾아 탐독해 보았는데, 인상깊은 부분은 무엇이었나요? 그 이유는 무엇인가요?\n- (3-동아리) ‘교실속딜레마상황100문101답’을 읽고 보고서를 작성한 바 있네요. 교실 속 딜레마 상황 중에서 가장 기억에 남는 딜레마 상황은 무엇이었는지 설명해 보세요. 또 어떻게 그 딜레마 상황을 극복했는지도 설명해 주시기 바랍니다.\n- (2-세특) 2학년 때 <교사제> 참가의 경험이 있는데, 어떠한 행사였고, 구성원과의 소통하고 협의한 경험을 소개해 보세요.\n- (2-행특) \"학급 내 의사소통 과정에서 이견이 있을 때 친구들의 의견을 잘 조율\"했다고 나오는데, 비결은? 향후 교사가 되어 학생들 간의 불협화음이 생겨 이를 조정해야 할 때 어떻게 하면 좋을지 자신의 경험을 바탕으로 이야기해보세요.\n- (3-동아리) '멘토스' 동아리 활동에서 교실 안 다문화 학생 따돌림 문제를 해결하기 위한 교육 프로그램들을 연구하였는데 그 내용은 무엇인가?\n- (1-영어) 롤모델 프리젠테이션 활동에서 스폰지밥을 자신의 롤모델로 정한 이유는 무엇이며, 그것이 초등교사에게 어떤 시사점을 줄 수 있다고 생각합니까?\n- (3-진로) 지원자가 작성한 대한민국아동청소년 삶의 만족도에 대한 보고서에서, 아동청소년 삶의 만족도를 높이기 위해 교사 역할의 중요성을 언급했습니다. 이에 대해 구체적으로 설명해 주세요.\n- (3-진로) \"AI가 바꾸는 학교 수업 챗GPT 교육 활용\"을 읽은 것으로 확인됩니다. 미래교실에서 AI는 어떻게 사용되고 자리매김할 수 있는지 생각해 본적이 있나요? 있다면 자신이 그리는 미래 교실의 AI의 활용방안에 대해서 설명해주세요.\n- (2-진로) '다문화학생을 위한 교육방법'을 주제로 탐구계획서를 작성하였다고 기술되어있는데, 다문화학생을 지도하기 위해 초등교사가 갖추어야 할 역량을 교직 인성의 관점에서 설명해보세요.\n- (3-교육학) 교사로서 가져야 할 교육 리더십에 관해 알아보았는데, 지원자는 교사는 어떤 리더십을 가져야 된다고 생각하나요? 그 이유는 무엇인가요?\n- (2-자율) ‘생태환경교육 프로젝트' 팀장을 담당했는데, 주 역할은? 리더십을 보여 줄 수 있었던 사례가 있다면 얘기해보세요.\n- 1학년 때 의학에 관심이 있었던 것 같은데, 교사로서의 꿈을 갖게 된 계기는 무엇이고 본인이 생각하는 훌륭한 교사란 어떤 교사인가요?\n- (3-생활과 윤리) 'AI로 변화된 사회 모습과 그 안에서 우리가 해야 하는 일'을 주제로 신문스크랩 활동을 해보았는데, 미래 초등교육은 어떻게 변화할까요?\n- (2-독서) '선생님도 아프다(양곤성)'를 읽고 독후감을 작성해 보았는데, 가장 인상깊은 부분이 있나요?\n- (3-동아리) 학생인권조례 폐지 찬반론을 조사하고 절충안을 모색했는데, 그 내용을 간단히 설명해 보시오.\n- (2-출결) 미인정 지각이 2회 있네요. 원격수업 중에 발생한 것인가요? 지원자의 성실성을 보여주는 사례를 소개해 주세요.\n- (3-봉사) 학생주도 프로젝트형 봉사활동에서 지원자가 했던 구체적인 활동 내용을 이야기해주세요. 활동을 통해 지원자가 배우고 느낀 점은 무엇인가요?\n- (2-문학) '방과 후(히가시노 게이고)'를 읽고 교사로서 지녀야 할 올바른 행동 양식에 대해 고민을 해봤는데, 교사의 올바른 행동 양식이 무엇일까요?\n- (자율, 동아리) 윤리적 문제에 관련한 탐구활동이 많습니다. 교사의 직업윤리는 무엇이라고 생각합니까?\n- (2-자율) '지혜롭게 갈등 해결하기'에서 갈등 해결을 위한 7단계 프로세스에 대해 알아보았는데, 본인만의 갈등을 해소하기 위한 가장 좋은 방법이 있다면 말씀해주세요.\n- (2-행특) '민주적 학급 살이'를 읽고 학급자치회를 직접 구성했는데, 자치회를 구성하는데 어떤 부분을 고려 하였나요? 책의 내용을 근거로 말씀해주세요."},{"y":2025,"u":"대구교육대학교","c1":"의사소통능력","c2":"태도","q":"*학교생활기록부\n- 2학년 1학기 수학성적 향상된 이유는 무엇인가? 어떤 방법으로 공부하였는가?\n- A 독서활동을 통해 교사로서 어떤 자질이 필요하다고 생각했는가?\n- B 동아리 활동 중 갈등관리의 경험이 교직에서 어떻게 활용할 수 있다고 생각하는가?\n*기타질문\n- 본인은 어떤 강점을 가진 교사가 될 수 있다고 생각하는가?\n- 자신의 공부법 중 초등학생에게 도움이 될 수 있다고 생각하는 방법과 그 이유는 무엇인가?"},{"y":2025,"u":"대구교육대학교","c1":"문제해결능력","c2":"태도","q":"*학교생활기록부\n- 2학년 1학기 수학성적 향상된 이유는 무엇인가? 어떤 방법으로 공부하였는가?\n- A 독서활동을 통해 교사로서 어떤 자질

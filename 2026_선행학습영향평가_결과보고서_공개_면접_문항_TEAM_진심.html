<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 선행학습영향평가 면접 예시 문항</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --bg2: #f6f5f2;
  --bg3: #eeedea;
  --text: #1a1a18;
  --text2: #5e5e5a;
  --text3: #9e9e99;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.20);
  --accent: #1a1a18;
  --tag-bg: #f0eeea;
  --tag-text: #5e5e5a;
  --univ-bg: #e8f0fb;
  --univ-text: #1a4fa0;
  --radius: 8px;
  --radius-lg: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --bg2: #252523;
    --bg3: #2e2e2b;
    --text: #f0f0ec;
    --text2: #a0a09a;
    --text3: #606060;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.20);
    --tag-bg: #2e2e2b;
    --tag-text: #a0a09a;
    --univ-bg: #0e2340;
    --univ-text: #85b7eb;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg3);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
.site-header {
  background: var(--bg);
  border-bottom: 0.5px solid var(--border2);
  padding: 1.25rem 1.5rem 1rem;
  position: sticky; top: 0; z-index: 100;
}
.header-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 1rem; margin-bottom: .75rem;
}
.header-title h1 { font-size: 17px; font-weight: 600; color: var(--text); }
.header-title p { font-size: 12px; color: var(--text3); margin-top: 2px; }
.header-stats {
  display: flex; gap: 12px; flex-shrink: 0;
}
.stat { text-align: center; }
.stat-num { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── SEARCH ── */
.search-bar {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  align-items: center;
}
.search-bar input, .search-bar select {
  padding: 8px 11px; font-size: 13px;
  border: 0.5px solid var(--border2); border-radius: var(--radius);
  background: var(--bg2); color: var(--text);
  font-family: inherit; outline: none;
  transition: border-color .15s;
}
.search-bar input:focus, .search-bar select:focus {
  border-color: var(--accent);
}
.search-bar input { grid-column: 1 / -2; }
.btn-reset {
  padding: 8px 12px; font-size: 12px;
  border: 0.5px solid var(--border2); border-radius: var(--radius);
  background: transparent; color: var(--text2); cursor: pointer;
  white-space: nowrap;
}
.btn-reset:hover { background: var(--bg2); }

/* ── MAIN ── */
.main { max-width: 800px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }

.result-info {
  font-size: 12px; color: var(--text3);
  margin-bottom: .875rem; padding-left: 2px;
}

/* ── CARDS ── */
.card-list { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.card:hover { border-color: var(--border2); }
.card.open { border-color: var(--border2); }

.card-head {
  padding: .875rem 1.125rem;
  display: flex; align-items: flex-start; gap: 10px;
}
.card-badges { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
.badge {
  font-size: 11px; padding: 3px 9px; border-radius: 12px;
  font-weight: 500; line-height: 1.4;
}
.badge-univ { background: var(--univ-bg); color: var(--univ-text); }
.badge-cat  { background: var(--tag-bg);  color: var(--tag-text); }
.card-arrow {
  font-size: 11px; color: var(--text3); flex-shrink: 0;
  margin-top: 3px; transition: transform .2s;
}
.card.open .card-arrow { transform: rotate(90deg); }

.card-preview {
  padding: 0 1.125rem .875rem;
  font-size: 13px; color: var(--text2); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-body {
  display: none;
  border-top: 0.5px solid var(--border);
  padding: 1rem 1.125rem;
}
.card.open .card-body { display: block; }

.q-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.q-item {
  padding: 9px 12px;
  background: var(--bg2); border-radius: var(--radius);
  font-size: 13px; color: var(--text); line-height: 1.65;
}

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 4rem 1rem;
  color: var(--text3); font-size: 14px;
}

/* ── FOOTER ── */
.footer {
  text-align: center; padding: 1.5rem;
  font-size: 11px; color: var(--text3);
}

/* ── MOBILE ── */
@media (max-width: 520px) {
  .search-bar { grid-template-columns: 1fr 1fr; }
  .search-bar input { grid-column: 1 / -1; }
  .header-stats { gap: 8px; }
  .stat-num { font-size: 15px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="header-title">
      <h1>2026 선행학습영향평가 면접 예시 문항</h1>
      <p>TEAM 진심 (와우고 서기남, 와우고 송현제, 오남고 이지희, 향일고 김기정, 새솔고 김태진)</p>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="totalUniv">70</div><div class="stat-label">개 대학</div></div>
      <div class="stat"><div class="stat-num" id="totalItems">247</div><div class="stat-label">개 항목</div></div>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍  키워드 검색  (예: 리더십, AI, 봉사활동)">
    <select id="univSelect"><option value="">전체 대학</option></select>
    <button class="btn-reset" onclick="reset()">초기화</button>
  </div>
</header>

<main class="main">
  <div class="result-info" id="resultInfo"></div>
  <div class="card-list" id="cardList"></div>
  <div class="empty" id="emptyMsg" style="display:none">검색 결과가 없습니다.</div>
</main>

<footer class="footer">
  2026 선행학습영향평가 결과보고서 공개 면접 문항 · TEAM 진심 (와우고 서기남, 와우고 송현제, 오남고 이지희, 향일고 김기정, 새솔고 김태진)
</footer>

  {u:"가톨릭대학교",c1:"진로역량",c2:"",q:"사회탐구보고서 발표에서 인상적인 활동이 보이는데, 본인이 다른 경쟁자들보다 좋은 평가를 받았던 가장 큰 이유는 무엇인가요? 지금 다시 그 활동을 한다면 어떤 점을 보완하고 싶은지 이야기해 보세요.\n지원자는 시각장애인을 도와주는 의료용 로봇을 만들고 싶다고 하였고 공학을 전공하는 것이 더 꿈에 가까이 가는 것 같은데 본인이 반드시 지금의 전공을 선택해야 하는 이유는 무엇인가요?\n자연과학을 전공하기 위해서는 인문학적 소양의 중요성을 알고 있는 것 같아요. 그렇게 생각하게 된 계기는 무엇이며, 인문학적 소양을 쌓기 위해 구체적으로 어떤 노력을 하였는지 이야기해 보세요.\n지원자의 꿈은 교사인데, 어떤 교사가 좋은 교사라고 생각하나요? 그런 자질을 어떻게 기를 수 있으며 어떤 노력을 해 왔나요?"},
  {u:"가톨릭대학교",c1:"학업역량",c2:"",q:"1학년 수학 수업에서 발표를 하여 학우들의 좋은 호응을 받았다고 했는데, 어떤 점을 인정받은 것이며 그 활동을 통해서 얻은 점을 말해 보세요.\n2학년 담임 선생님께서 지원자를 학교에서 가장 귀감이 되는 학생으로 언급해 주었는데, 본인의 어떠한 점을 평가받았다고 생각하며, 본인의 활동으로 인해 학우들이나 학교에 어떤 플러스가 되었다고 생각하나요?\n선생님이 지원자를 자기주도성이 강하다고 평가하였는데, 본인의 어떤 점에 대해 그렇게 평가했다고 생각하나요?\n수업 시간에 질문이 많은 학생으로 작성되어 있는데, 질문을 많이 하게 된 이유는 무엇이며 특히 기억에 남는 질문이 있나요?"},
  {u:"가톨릭대학교",c1:"공동체역량",c2:"",q:"기숙사 생활에서 갈등상황을 해결했다고 했는데, 그 상황 이전에 본인이 어떻게 행동했다면 그 갈등상황이 발생하지 않았을 것이라 생각하나요?\n봉사동아리에 참여하게 된 계기는 무엇이며, 가장 의미있었던 활동과 그 활동에서 본인의 역할이 무엇이었는지 말해보세요.\n특수반 학생 도우미 활동을 통해서 본인이 가장 얻었다고 생각하는 점은 무엇이며, 그 특수반 학생과 나눈 대화 중 가장 기억에 남는 말과 그 이유는 무엇인가요?\n3년간 같은 동아리 활동을 한 이유는 무엇이며, 그것이 본인의 어떤 점을 성장시켰다고 생각하나요?"},
  {u:"건국대학교",c1:"KU자기추천",c2:"학업역량",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"건국대학교",c1:"KU자기추천",c2:"진로역량",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"건국대학교",c1:"KU자기추천",c2:"공동체역량",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"경기대학교",c1:"사회영역(인성·공동체의식)",c2:"",q:"동아리 활동에서 다른 사람들을 이끌며 코딩을 주도한 경험이 나타나는데 동아리원들과 협력할 때 가장 중요하게 생각한 점과 활동 과정을 구체적으로 말씀해주세요.\n딥페이크 캠페인 포스터 제작 활동에서 팀원과 협력하며 경각심을 높인 경험이 있다면, 본인이 맡은 역할과 활동 과정, 느낀 점을 설명해주세요.\n멘토멘티 학습도우미 활동에 반복 참여한 경험이 있다면, 공동체 기여 경험을 통해 느낀 점을 구체적으로 설명해주세요."},
  {u:"경기대학교",c1:"잠재역량(전공관련·발전가능성)",c2:"",q:"리튬이온 배터리의 특성과 '왜 다른 알칼리 금속이 아닌 리튬을 사용하는지' 조사하고 발표한 과정과 내용을 구체적으로 설명해 주세요.\n'미국 관세 정책에 따른 한국 기업의 영향'을 주제로 질적 연구를 수행하며, 조사 과정과 연구 내용을 구체적으로 설명해주세요.\nSNS와 예능 사례 100여건을 수집 후 분석하며, 탐구 주제를 선정하였는데, 이유와 비언어적 요소 분류 기준은 어떻게 하였는지 말씀해주세요."},
  {u:"경희대학교",c1:"전공적합성",c2:"",q:"고등학교 재학 중 가장 흥미를 가졌던 과목은? 관심 분야와 관련해 주도적으로 이수한 과목이 있는가?\n관심을 갖고 깊게 탐구했던 활동을 하나만 소개해보자.\n이 개념이 쓰이는 실제 사례나 상황을 말해 볼 수 있을까?\n이 문제를 해결하기 위해 어떤 방법을 떠올렸나요? 팀의 아이디어가 실패했다면 그 원인은 무엇이라고 생각하나요?"},
  {u:"경희대학교",c1:"인성",c2:"",q:"조별 과제나 팀별 활동에서 협업해서 이룬 성과, 본인의 역할은?\n미인정 지각이 수회 있는데, 특별한 이유가 있는가?\n팀 내 의견 충돌(갈등)이 있었을 때 어떻게 해결했나요?\n리더십을 발휘하면서 느낀 가장 큰 보람과 어려움은?"},

  {u:"광운대학교",c1:"광운참빛인재전형",c2:"발전가능성",q:"○학년 ○학기 ○○교과 세부능력 및 특기사항을 살펴보면 ○○에 관한 내용에 대하여 조사분석하여 발표한 적이 있습니다. 이때 ○○ 주제 선정이유와 준비과정을 구체적으로 설명해주세요.\n관련 내용 중 기억에 남는 이론은 무엇이 있는지 구체적으로 설명해주세요.\n○학년 동아리활동에서 ○○ 결과가 우리 사회에 미칠 영향에 따른 대처 방안을 발표하였다고 하였는데 그 내용과 관련 근거를 구체적으로 말씀해주세요."},
  {u:"광운대학교",c1:"광운참빛인재전형",c2:"인성",q:"2, 3학년 ○○부 부장으로 활동하게 된 계기는 무엇인가요? 동아리를 운영하면서 특별히 어려웠던 점과 어떻게 해결하려고 노력하였는지 답변해주세요.\n매학년 학기마다 학급 주변 정화활동을 꾸준히 해서 총 ○○시간 봉사활동을 해왔는데 지속적으로 수행해온 이유를 말씀해주세요.\n출결상황 중 미인정 결석이 ○회 확인되는데 사유를 말씀해주세요."},
  {u:"광운대학교",c1:"소프트웨어우수인재전형",c2:"발전가능성",q:"○학년 ○학기 ○○교과에서 수행한 ○○ 프로그래밍 활동 중 설계하는 과정과 내용에 대해 설명해보세요.\n○○ 프로그래밍 활동 중 실제 구현하는 과정에서 사용한 방법과 어려웠던 점을 구체적으로 설명해주세요."},
  {u:"국민대학교",c1:"자기주도성·도전정신",c2:"",q:"○○ 활동을 통해 배우고, 느낀 점에 대해 말해보세요.\n○○ 활동이 특별히 본인에게 의미가 있었던 이유는 무엇인지 말해보세요."},
  {u:"국민대학교",c1:"전공적합성",c2:"",q:"○○ 전공과 관련하여, 자신의 가장 우수한(뛰어난) 역량은 무엇이라고 생각하는지, 어떠한 활동들을 통해서 그 역량을 키워왔는지 말해보세요."},
  {u:"국민대학교",c1:"인성",c2:"",q:"주위 친구들과 협력하여 좋은 결과를 얻어낸 적이 있다면 본인이 한 역할에 대해 말해보세요."},
  {u:"덕성여자대학교",c1:"서류신뢰성·종합적사고력·인성",c2:"",q:"사회문제탐구(3학년) 수업에서 '우리나라의 외교정책 현안분석'에 대한 탐구를 했는데, 해당 주제를 선정한 이유와 주요내용을 설명해주세요.\n수업활동, 세부능력 및 특기사항 내용을 통해 다양한 독서활동 상황을 확인할 수 있는데, 지원자에게 독서의 의미는 무엇인가요?\n교내 학급회장 및 학생회 활동 등 다수의 임원 활동을 했음이 확인되고 있습니다. 본인이 뛰어난 리더십을 발휘했다고 생각하는 사례를 구체적으로 말해보세요."},
  {u:"동국대학교",c1:"전형취지적합성·전공적합성·발전가능성·인성",c2:"",q:"국어 비평문 쓰기 활동에서 '1984'를 읽은 후 우리 사회의 언어생활로 관심을 확장하여 무분별한 신조어와 줄임말이 우리 사고에 악영향을 미칠 수 있다고 했는데요. 신조어나 줄임말의 성격에 대해 설명해보고 그것들이 우리 사고에 어떤 악영향을 미칠 수 있는지 본인이 작성한 내용을 소개해 보세요.\n게임이론에 대한 주제로 수학적 개념과 원리를 적용하여 탐구를 진행하고 발표했다고 했는데요. 게임이론이 무엇이고 실생활에서는 어떻게 적용되는지 예를 들어서 설명해보세요.\n2학년 코딩동아리에서 동아리 회장으로 동아리를 운영하고 주도했다고 되어 있는데요. 동아리 회장으로서 가장 중점을 기울인 부분이 있다면 얘기해 주세요."},
  {u:"동덕여자대학교",c1:"학업역량·진로역량·공동체역량",c2:"",q:"○○ 활동을 계획하면서 가장 중점을 두고 준비한 부분은 무엇인가요? 예상된 어려움은 무엇이었으며, 그것을 해결하기 위해 어떤 준비를 했나요?\n학교생활을 하면서 친구들과 불화를 겪은 적이 있습니까? 불화를 해결하기 위해 어떠한 노력을 했습니까? 친구가 지원자와 반대 의견을 계속 내세운다면 어떻게 하겠습니까?\n고교생활 중 타인을 위해 자신의 것을 나누고자 한 경험이 있나요?"},
  {u:"명지대학교",c1:"교과면접",c2:"국어국문학전공",q:"국어국문학전공 지원동기와 졸업 후 진로는?\n학교생활에서의 리더십 발휘 경험은?\n최근 청소년들의 문해력 논란에 대한 본인의 생각은?\n최근에 읽어본 문학 작품과 그 감상은?\n한국어의 가장 큰 매력은 무엇이며 그렇게 생각하는 이유는?"},
  {u:"명지대학교",c1:"교과면접",c2:"미술사역사학전공",q:"학교, 학급에서의 역할은 무엇이었으며, 어떤 활동을 하였는가?\n공동체 생활의 중요 요소나 자질은 무엇이라 생각하는가?\n전공과 관련된 동아리, 비교과 활동은 무엇이 있는가?\n미술사학자, 역사학자는 사회에 어떻게 기여한다고 생각하는가?"},
  {u:"명지대학교",c1:"교과면접",c2:"디지털미디어학부",q:"팀 과제 수행 시 겪었던 어려움은? 어떻게 해결했는가?\n자신이 생각하는 유튜브 추천 알고리즘의 단점/문제점은? 어떻게 해결할 수 있는지에 대한 자신만의 팁은?"},
  {u:"명지대학교",c1:"교과면접",c2:"경영학전공",q:"리더십을 발휘했던 경험? 리더가 갖추어야 할 덕목은?\n기업의 사회적 책임이란 무엇인가?\nCEO가 되기 위해 필요한 자질은 무엇일까?"},
  {u:"명지대학교",c1:"교과면접",c2:"화학공학전공",q:"화학공학과에 지원한 동기는?\n리더십을 발휘한 경험 및 느낀점?\n화학, 물리 관련 실험 중 기억에 남는 것과 배운점?\n팀 활동에서 협업의 중요성?"},
  {u:"명지대학교",c1:"교과면접",c2:"인공지능전공",q:"우리 학과에 지원한 동기는 무엇인지?\n생성형 AI를 제외한 실생활에 사용되는 AI 서비스는 무엇인지?\nGPT가 발전하는데 본인의 희망진로의 전문가에게 필요한 것은?"},
  {u:"명지대학교",c1:"교과면접",c2:"건축학전공",q:"본인의 리더십 경험을 말해주세요.\n건축에 관련되어 읽어본 책은?\n건축은 다양한 요인들이 영향을 끼칩니다. 우리나라에서는 어떤 요인이 가장 중요하다고 생각하는지 두가지 요인을 꼽아주세요."},
  {u:"명지대학교",c1:"명지인재면접",c2:"",q:"수행평가로 ○○에 대해 조사했는데, ○○이 무엇이고 왜 필요하다고 생각하는가?\n수업시간에 '○○'에 대해 토론했다고 하는데 본인은 찬성과 반대 중에 어떤 입장이었고, 그 근거가 무엇인가요?"},
  {u:"삼육대학교",c1:"전공적합성·발전가능성·인성",c2:"",q:"일반 면접은 면접 예시를 제시하지 않음.\n제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"상명대학교",c1:"학업역량",c2:"",q:"이집트 미술을 조사하는 활동을 진행하였는데, 종교적/지리적 특징과 연결지어 소개해 주세요.\n인공지능과 협업하여 무대 구성 능력을 갖추어야 한다고 했는데 인공지능과 어떤 방식으로 협업이 가능하다고 생각하나요?\nAI 기술이 연극에 도입될 경우 발생할 수 있는 윤리적 문제와 예술성 저하에 대한 우려를 표현했는데 어떤 측면에서 윤리적 문제와 예술성 저하가 발생할지 설명해 줄 수 있나요?"},
  {u:"상명대학교",c1:"진로역량",c2:"",q:"AI 시대에서 예술가의 역할이 어떻게 변화되며, 이를 바탕으로 앞으로의 진로계획에 대하여 이야기 해주세요.\n스포츠마케터를 희망한다고 되어 있는데 스포츠마케터가 되기 위해 필요한 역량은 무엇이라고 생각합니까?"},
  {u:"서경대학교",c1:"희생정신·리더십·국가관",c2:"",q:"학교의 큰 행사를 위해 시험기간에 임박하여 반장이 동참을 요구했다. 어떻게 할 것이며, 그 이유는?\n소대원 중 지시를 불이행하는 인원이 있을 경우 어떻게 할 것인가?\n해외 유학 중 북한이 침략을 하여 전쟁이 발생하였다. 어떻게 할 것인가?"},
  {u:"서울과학기술대학교",c1:"학업역량·진로역량·공동체역량",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"서울대학교",c1:"일반전형·지역균형",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"서울시립대학교",c1:"학업역량·잠재역량·사회역량",c2:"",q:"국제평화주의를 탐구하며 UN 상임이사국들의 권력집중 문제로 국제 분쟁이 해결되지 않는다고 주장했는데, 국제평화주의가 무엇인지 정의하고 설명해보세요.\n염료 감응형 태양전지에 대해 흥미를 가지고 팀을 구성하여 실험을 해본 것으로 기재되어 있는데, 염료감응형 태양전지가 무엇인지 설명하고 작동 원리와 활용법을 말해보세요.\n복지의 지방분권화가 아동복지에 전반적으로 부정적인 영향이 될 수 있다는 연구결과를 접한 뒤 복지의 지방분권화에 대한 한계와 극복 방안을 알아보고자 탐구했다고 하는데, 복지의 지방분권화는 어떠한 현상이고 해당 현상이 아동복지에 어떤 식으로 부정적인 영향을 미치나요?"},
  {u:"서울여자대학교",c1:"진로역량·발전가능성·인성",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"성공회대학교",c1:"전공연계성·인성·발전가능성",c2:"",q:"(공통) 성공회대학교에 입학한다면 어떤 전공들을 공부하고 싶은지, 그리고 이와 관련하여 고교 시절 어떤 준비를 했는지 학교생활기록부 기반으로 설명해 주세요."},
  {u:"성균관대학교",c1:"사범대학",c2:"교직적성",q:"최근 공교육에서 학생의 흥미와 필요에 부응하는 맞춤형 교육을 제공해야 한다는 요구가 많다. 그러나 한편으로는 이러한 맞춤형 교육이 학생 간 교육격차를 심화할 수 있다는 우려도 큰 상황이다. 모든 학생에게 의미 있는 좋은 교육을 제공하기 위해 공교육에서 학생 맞춤형 교육은 어떻게 이루어져야 하는가? 이에 대한 답을 구체적인 예시와 함께 설명하시오."},
  {u:"성균관대학교",c1:"사범대학",c2:"교직인성",q:"현재 해외 여러 나라에서 청소년의 스마트폰 사용 규제를 도입함에 따라 우리나라에서도 학교 내에서 학생의 스마트폰 사용 금지에 대한 법제화 움직임이 나타나고 있다. 교내에서 학생의 스마트폰 사용을 전면 금지해야 하는가 아니면 얼마나 허용해야 하는가? 이에 대한 의견을 하나 이상의 구체적인 이유나 근거를 들어 설명하시오."},
  {u:"성신여자대학교",c1:"사범대",c2:"교직적성·인성",q:"교육 관련 동아리 활동 중 기억에 남는 것이 무엇이고, 어떤 이유로 시작하게 되었고, 그를 통해 배운 점이나 느낀 점을 말해 보세요.\n교사와 갈등이 있었던 경험이 있다면? 만약, 본인이 교사의 입장이었다면 동일한 상황에서 어떠한 결정을 할 것인지 말해보세요?\n교육에 대한 관심이 많다고 서술되어 있는데, 진로 선택에 도움이 되었던 경험이 있다면 무엇인가요?"},
  {u:"성신여자대학교",c1:"일반학과",c2:"학업역량·진로역량",q:"수학Ⅱ에서 경사하강법에 대해 조사한 경험이 있는데, 경사하강법이란 무엇인가요?\n진로활동에서 조사했던 RNA와 DNA의 구조적 차이에 대해 설명하시오.\n통합사회 시간에 문화상대주의가 경계해야 할 점과 보편 윤리의 중요성에 대해 고민하였는데, 이를 소개해보세요."},
  {u:"세종대학교",c1:"세종창의인재(면접형)",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"숙명여자대학교",c1:"진로역량·탐구역량·공동체의식",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"숭실대학교",c1:"전공적합성·인성·잠재력",c2:"",q:"○○ 활동이 가장 활발해 보이는데, 이 활동은 무엇인가요?\n지원 전공 분야에 대해 알고 있는 현재 이슈가 있는지 특히 관심있는 분야는 무엇인가요?\n숭실대학교 학과에 지원한 동기를 이야기해 보세요."},
  {u:"연세대학교(서울)",c1:"논리적사고력·의사소통능력",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"이화여자대학교",c1:"미래인재전형(면접형)",c2:"학업역량·진로역량·발전가능성",q:"학생부에 기재된 ○○ 과목 세특을 보면 깊이 있는 탐구활동이 있었던 것 같습니다. 이 활동을 통해 무엇을 배우고 느꼈는지 설명해 주세요.\n지원한 전공(계열)에 대한 관심을 어떻게 구체화해 왔는지, 본인의 준비 과정을 설명해 주세요.\n학생부에 기재된 ○○ 활동에서 팀원들과 협업했던 경험이 인상 깊습니다. 그 과정에서 맡은 역할과 느낀 점을 설명해 주세요.\n대학에 입학한 후, 어떤 점을 가장 먼저 발전시키고 싶나요?"},
  {u:"중앙대학교",c1:"CAU탐구형인재",c2:"학업준비도·전공적합성·의사소통",q:"(영어영문학과) 영어와 프랑스어의 역사적 관계를 이해할 수 있는 어떤 사건이나 현상을 하나 예로 들어 설명해 주시기 바랍니다.\n(사회복지학부) '난장이가 쏘아올린 작은 공'과 '진보와 빈곤'을 읽고 소득 불평등 문제를 탐구했는데, 두 책의 핵심 내용을 불평등과 연계하여 설명해 주시기 바랍니다.\n(경영학부) 한국의 탄소세 도입 전후 기업들의 변화를 회귀분석을 통해 분석했는데, 분석 과정과 결과에 대해 설명해 주시기 바랍니다.\n(기계공학부) 날개에 작용하는 양력과 항력의 발생 원리를 설명하고, 날개 표면의 압력을 적분하여 양력과 항력을 구하는 방법을 제시했는데, 양력과 항력의 정의와 이를 구한 과정에 대해 설명해 주시기 바랍니다."},
  {u:"중앙대학교",c1:"CAU융합형인재(의학부)",c2:"학업준비도·학교생활충실도·의사소통",q:"(의학부) 학년장 같이 상대적으로 대규모의 리더 활동과 동아리장과 같이 상대적으로 소규모의 리더 활동을 수행했는데, 집단의 규모에 따른 리더십의 차이나 어려움 등에 대해 설명해 주시기 바랍니다.\n(의학부) 생명과학Ⅰ 수업에서 식균 작용과 항원 제시에 대해 공부하였는데, 면역 반응의 기본적인 원리와 보조 T 림프구 및 특이적 방어 작용에 대해 전반적으로 설명해 주시기 바랍니다.\n(의학부) 3학년 생명과학Ⅱ 시간에 항생제 저항성의 역사와 기작에 대해 탐구했는데, 항생제의 작용 원리 및 저항성을 갖게 되는 기작에 대해서 설명해 주시기 바랍니다."},
  {u:"총신대학교",c1:"학생부교과·학생부종합",c2:"신앙·인성",q:"성경에서 말하는 구원은 무엇인지 말해 보시오.\n기독교인의 삶의 목적에 대해 말해 보시오.\n학교 내 휴대폰 사용 금지 법안 도입에 대한 자신의 생각과 근거 말해 보시오.\n인공지능 기술의 급속한 확산으로 데이터센터의 전력 소비가 급증하고 있는데, 이러한 현상이 환경과 사회에 미치는 영향에 대해 말해 보시오."},
  {u:"강서대(케이씨대)",c1:"본교인재상·전공관심도·인성·학업의지",c2:"",q:"(신학과) 우리 대학이 추구하는 기독교적 가치에 대해 알고 있나요?\n(G2빅데이터경영학과) 동료가 생성형 AI(챗GPT)의 결과물을 그대로 복사하여 제출한 사실을 알게 되었다면 어떻게 할 것인가요?\n(간호학과) 환자와의 공감 능력은 간호사에게 필수적입니다. 본인의 공감 능력을 보여준 경험이 있다면 이야기해 주세요.\n(식품영양학과) 인공지능에 의한 식단작성이 가능한 시대가 온다면, 이 시기 영양사의 역할이 무엇이라고 생각하나요?"},
  {u:"한국외국어대학교(서울·경기)",c1:"학업역량·진로역량·공동체역량",c2:"",q:"동아리 활동에서 어떤 역할을 하였나요? 본인의 역할에 만족하나요?\n고교 3년간 가장 의미 있었던 활동은 무엇인가요? 그 이유는 무엇인가요?"},
  {u:"한양대학교(서울)",c1:"학생부종합(면접형)",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},
  {u:"홍익대학교(서울)",c1:"제출서류진실성·미술관련소양·창의성·표현능력",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"인천대학교",c1:"진로역량·발전역량·공동체역량·의사소통",c2:"",q:"학교생활기록부 출결사항 내 질병 결석/지각/조퇴가 다수 확인됩니다. 이에 대해 설명해 주세요.\n지수함수를 활용하여 상권마케팅을 분석하였다고 하는데 어떠한 내용이었고 어떤 결과가 나왔는지 말해주세요.\n(3학년 진로활동) 도시의 구조적 특징과 열섬현상과의 상관관계를 설명해 보세요.\n3년간 미디어와 디지털콘텐츠 제작에 대해 깊은 관심이 확인됩니다. 지원자는 어떤 콘텐츠 기획자가 되고 싶나요?"},
  {u:"인하대학교",c1:"기초학업역량·진로탐구역량·의사소통역량",c2:"",q:"물리학Ⅰ 세부능력 및 특기사항을 보니 수업시간에 배운 열역학 제2법칙에 관심이 많았던 것 같은데, 열역학 제2법칙이 무엇인지 설명해주세요.\n경제 수업시간에 미국과 중국의 무역 분쟁으로 인한 경상수지에 대해 알아본 것 같은데, 경상수지란 무엇인지 설명해주세요.\n2학년 자율활동과 3학년 영어 독해와 작문 내용을 보니 미디어 속 혐오에 대해 고민해 본 것 같은데, 이에 대한 해결 방안을 생각해 본 적 있다면 설명해주세요."},
  {u:"가천대학교",c1:"인성·진학의지·의사소통역량",c2:"",q:"(인성관련) 학생회 활동에서 기존 방식을 그대로 따르지 않고 새로운 프로그램을 기획하여 공동체가 함께 즐길 수 있는 행사로 개선했다고 기록되어 있습니다. 이러한 기획을 추진하면서 공동체를 위해 어떤 점을 가장 중요하게 생각했고, 이를 위해 어떤 노력을 했는지 설명해 주세요.\n(사회과학계열) 경제 시간에 무역의 분업과 특화, 절대우위와 비교우위 개념을 학습했다고 기록되어 있습니다. 절대우위와 비교우위 중 하나를 선택해 더 중요하다고 생각하는 이유를 설명해 주세요.\n(자연계열) 화학 시간에 산과 염기의 중화 적정 실험을 통해 용액의 농도를 분석했다고 기록되어 있습니다. 중화 적정의 목적과 농도를 구할 수 있는 원리가 무엇인지 설명해 주세요."},
  {u:"강남대학교",c1:"전공적합성·인성·의사소통",c2:"",q:"○○학과에 지원하게 된 동기가 된 고교 재학기간 중 활동이 있다면 무엇인가요?\n사회 교과 시간에 '저출산 지원정책의 문제점과 해결방안'을 주제로 조사해서 발표한 경험이 있네요. 발표 내용 중 기억에 남는 내용이 있으면 소개해 볼까요?\n고등학교 생활을 하면서 본인이 가장 노력했던 경험이 있다면 어떤 것인가요?"},
  {u:"단국대학교",c1:"진로역량·발전가능성·공동체역량",c2:"",q:"지원전공에 대하여 관심을 가지게 된 계기는 무엇입니까?\n희망 진로탐색과정 중 가장 의미있는 활동은 무엇이며 입학 후 진로 계획은 무엇입니까?\n리더십 또는 팔로워십을 발휘한 경험이 있다면 말해 보세요.\n공동의 목표를 달성하기 위한 경험에 대해 말해 보세요."},
  {u:"대진대학교",c1:"논리적사고력·창의능력·전공적성",c2:"",q:"(공통) AI와 로봇 같은 기술이 급속히 발달함에 따라 향후 일자리가 더욱 줄어들 것으로 예상되고 있습니다. 이런 변화에 따라 앞으로 학생이 준비해야 할 역량은 무엇이라고 생각하나요?\n(인문·사회) 가짜 뉴스와 딥페이크 확산으로 정보의 진위 판단이 어려워지며, 선거나 정책에 미치는 영향도 커지고 있습니다. 이에 허위정보 규제가 표현의 자유보다 우선될 수 있는지에 대한 본인의 견해를 설명하시오.\n(자연·공학) 자율주행차 기술이 사회 전반에 가져올 변화를 긍정적인 영향과 부정적인 영향을 설명해주시고, 이에 대한 본인의 의견을 제시해주세요."},
  {u:"성결대학교",c1:"의사소통능력·논리적사고력",c2:"",q:"고령운전자의 운전면허를 취소하자는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n1인 미디어에 대한 규제를 강화해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다.\n디지털 교과서를 전면적으로 도입해 종이 교과서를 대체해야 한다는 주장에 대해 찬성과 반대 의견으로 토론해 주시기 바랍니다."},
  {u:"수원대학교",c1:"인성·학업계획·창의력·전공적합성",c2:"",q:"본인이 생각하는 '성공적인 대학 생활'이란 무엇이며, 이를 위해 스스로 설정하고 싶은 목표를 말해 보세요.\n현재 우리 사회가 직면한 문제 중 하나를 선택하고, 이를 해결하기 위해 필요한 창의적인 아이디어를 제시해 보세요.\n지원한 전공의 미래 사회에서의 기여와 향후 전망에 대하여 설명해 보세요."},
  {u:"신한대학교",c1:"논리적사고력·인성",c2:"",q:"(공학) 기후 변화의 대응으로 탄소 포집과 신재생에너지 확대에 대한 본인의 생각을 말해 보세요.\n(자연과학) 개인 유전체 정보 분석이 인간의 건강관리에 미치는 영향을 말해 보세요.\n(인문사회·예체능) 생성형 인공지능(AI) 기반 창작물의 저작권에 대하여 본인의 생각을 말해 보세요.\n윤리적 소비를 실천하기 위한 방안에 대해 본인의 생각을 말해 보세요."},
  {u:"아주대학교",c1:"서류신뢰도·의사소통능력",c2:"",q:"(학업역량) ○○교과에서 ○○실험을 진행했는데, 이 실험의 원리와 과정에 대해 설명해 주세요.\n(진로역량) ○○동아리에서 신문을 제작한 경험이 있는데, 본인의 구체적 역할에 대해 설명해 주세요.\n(공동체역량) 다양한 체험활동에서 리더 역할을 수행했는데, 본인의 리더십을 가장 잘 발휘했던 사례에 대해 말해 주세요."},
  {u:"안양대학교",c1:"아리학생부면접·종합전형",c2:"전공소양·일반소양·의사소통",q:"(지원 동기) 내가 이 학과(전공)에 지원하게 된 이유를 설명해 보세요.\n(전공과 진로) 이 학과를 졸업한 후 본인이 선택할 진로 분야가 무엇이고, 그 분야에서 요구되는 역량이 무엇인지 설명해 보세요.\n(자기성찰) 만약에 본인의 삶을 한 편의 영화로 만든다면, 어떤 장르가 어울릴까요?\n(공동체의식) 자신이 속한 학과에서 학생들 간의 부당한 행위를 직접 목격했습니다. 당신은 윤리적 판단에 따라 어떻게 대처할 것인지 설명해 주십시오."},
  {u:"을지대학교",c1:"계열적합성·발전가능성·인성",c2:"",q:"미인정 결석과 지각 횟수가 다소 많은 편인데, 특별한 사유가 있나요?\n성적을 꾸준히 올리며 가장 힘들었던 과목은 무엇이었고, 어떤 노력을 통해 극복했나요?\n수업 시간에 학습한 약물의 '남용'과 '오용'의 개념 차이를 설명해 주세요.\n3학년 진로 시간에 진행한 '글로벌 전공이슈 토론'에서 다룬 미성년자의 소셜미디어 사용 규제에 대한 본인의 생각은 무엇인가요?"},
  {u:"차의과학대학교",c1:"진로역량·인성·발전가능성",c2:"",q:"본인의 자질 중 희망 전공 학업을 수행하는 데 장점이 되는 점과 그 이유는 무엇인가요?\n고등학교 재학 중 가장 흥미를 가졌던 과목은? 그 과목 수업에서 가장 의미 있거나 기억에 남는 활동은 무엇인가요?\n본인이 추구하는 리더십 유형과 그 이유를 말씀해 주세요."},
  {u:"한국공학대학교",c1:"인성·전공적합성·발전가능성",c2:"",q:"봉사활동 내역 중 가장 의미 있었던 활동은 무엇이며, 본인이 생각하는 봉사의 의미에 대해 말해보시오.\n자신의 장단점을 간략히 말하고, 특히 단점을 극복하기 위해 고교 생활 중 가장 힘들여서 노력했던 사례를 말해보시오."},
  {u:"한국항공대학교",c1:"학업역량·진로역량·공동체역량",c2:"",q:"로켓 추력 실험에서 겪었던 실패와 이를 극복하기 위한 노력에 관해 설명해 주세요.\n스텔스 은신 기술을 탐구하면서 적외선 센서 실험 중 가장 흥미롭거나 어려웠던 점은 무엇인가요.\n동아리 및 토론 활동에서 다뤘던 이슈 중 의견이 첨예하게 갈렸던 한 사례를 골라 그때 사용한 갈등 해소 기법과 토론 결과에 대해 말해보세요."},
  {u:"한세대학교",c1:"인성·지원동기·진로계획·전공적성",c2:"",q:"내가 지금까지 이룬 가장 소중한 성취는 무엇이며 그 이유는 무엇인가요?\n해당 전공을 졸업하고 10년 이내에 가장 하고 싶은 일은 무엇인가요?\n우리나라 청년들만의 독특한 장점은 무엇인가요?\n우리나라가 직면한 가장 엄중한 도전 과제는 무엇인가요?"},
  {u:"한신대학교",c1:"전공적합성",c2:"",q:"(자유전공학부) 본인의 관심 분야를 소개하고, 자유전공학부 입학 후 본인의 관심 분야에 대한 공부를 어떻게 지속하고자 하는지 자신만의 계획을 말해보시오.\n(철학) 인공지능 기술의 발전이 인류에게 미칠 영향에 대해 자신의 생각을 말해 보시오.\n(경제금융학) 디지털 플랫폼 경제의 확산은 일부 개인과 기업에게는 기회와 혁신을 가져오지만, 개인정보유출, 시장독점, 불평등 문제를 야기하고 있습니다. 디지털 경제의 발전을 시장의 자율에 맡길 것인지, 아니면 정부의 규제에 맡길 것인지에 대해 학생의 의견을 말해보세요."},
  {u:"한양대학교(에리카)",c1:"통합적사고역량·의사소통역량",c2:"",q:"○○ 과목에서 ○○을 주제로 토론에 참가한 경험이 있는데 본인과 반대 입장의 근거는 무엇이었는지 설명하시오.\n○○ 과목의 세부능력 및 특기사항을 보면 ○○에 대해 관심이 많다고 했는데 ○○의 원리에 대해 설명하시오.\n○○ 과정에서 이견 또는 갈등을 겪었을 때 이를 효과적으로 극복한 경험이 있다면 구체적으로 설명하시오."},
  {u:"협성대학교",c1:"미래역량우수자·협성창의인재",c2:"인성·시사상식·전공적합성",q:"평소 타인의 어려움을 해결하기 위해 노력한 경험을 말해보고, 그 경험이 자신에게 어떠한 영향을 주었는지 말해보세요.\nAI 기술이 자신의 관심 분야에서 어떻게 활용될 수 있으며, 그에 따른 긍정적 및 부정적 영향은 무엇일지 말해보세요.\n기후 변화 대응을 위한 국제사회의 노력이 이어지고 있습니다. 우리가 현실적으로 추진할 수 있는 기후 변화 대응 전략에는 어떤 것이 있을지 말해보세요."},
  {u:"서울교육대학교",c1:"교직인성·교직적성·교직교양",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},
  {u:"경인교육대학교",c1:"교직인성(공감·소통능력·나눔·배려)",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},
  {u:"공주교육대학교",c1:"정시 수능위주",c2:"",q:"수시모집은 면접 고사 없음. 정시모집 수능위주 전형에서 제시문 면접을 진행. 선행학습 영향평가 결과보고서 참고."},
  {u:"광주교육대학교",c1:"문제해결역량·교직적합성·교직인성",c2:"",q:"(1-수학) '나만의 스팀 수업' 활동에서 수학과 영어를 융합한 수업을 계획한 과정과 결과를 설명하시오.\n(3-심화영어독해) 인공지능이 교사의 역할을 대체할 수 있다는 주장에 대해 반론을 펼쳤다고 되어있는데 초등교사의 역할과 관련해 구체적 근거와 예시를 들어 설명해보세요.\n(3-교육학) '구성주의와 본질주의'라는 두 교육을 학습하고, 자신에게 더 적합한 교육관을 선택하여 그 이유를 명확히 설명했던 내용을 말해보시오."},
  {u:"대구교육대학교",c1:"의사소통능력·문제해결능력·교직소양",c2:"",q:"2학년 1학기 수학성적 향상된 이유는 무엇인가? 어떤 방법으로 공부하였는가?\n본인은 어떤 강점을 가진 교사가 될 수 있다고 생각하는가?\n지원자가 생각하는 '잘 가르친다는 것'은 무엇인지 이야기해 주세요."},
  {u:"부산교육대학교",c1:"의사소통역량·교직인성·창의융합역량",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고."},
  {u:"전주교육대학교",c1:"지성영역·인성영역·창의영역",c2:"",q:"미래 사회를 대비하여 초등교사가 교육에 임하는 바람직한 자세로 요구되는 것은 무엇일까요?\n초등교사가 되기 위해 어떠한 노력들을 해 왔으며, AI 시대에 교사의 역할이 어떠해야 하는지 말씀해주시오.\n학교생활에서 친구와 의견 차이로 갈등을 겪었던 경험을 소개하고, 친구와의 관계를 회복하기 위해 어떤 노력을 했는지 말해보세요."},
  {u:"청주교육대학교",c1:"교직인·적성·창의탐구·의사소통역량",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"한국교원대학교",c1:"전공적합성·교직적성·교직인성·문제해결",c2:"",q:"고등학교 수업 중 지원 전공과 관련하여 가장 흥미 있었던 주제는 무엇인가요?\n지원 전공과 관련하여 최근에 읽은 책이 있다면, 간단하게 소개해 보시오.\n지원자가 생각하는 좋은 교사란 무엇인지 자유롭게 말씀해 보시오."},
  {u:"공군사관학교",c1:"품성·가치관·지원동기·학교생활",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"국군간호사관학교",c1:"지원의지·진로적합성·인성",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"육군사관학교",c1:"국가관·표현력·주도성·이해력",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고"},
  {u:"해군사관학교",c1:"가치관·군인기본자세·인성·적응력",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"경찰대학교",c1:"개별면접·집단토론",c2:"인성·창의성·표현력",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"한국과학기술원",c1:"특기자전형·일반전형",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고."},
  {u:"광주과학기술원",c1:"특기자전형·일반전형",c2:"특기역량·내적역량",q:"학생부 기록 중 3학년 기하와 벡터 과목에서 '양자 컴퓨터 큐비트, 기하로 설명해 보기'라는 주제로 발표했다고 했는데, 어떤 내용이었고 그 뒤로 최근 동향을 알아본 적이 있는가?\n수학 또는 과학 성적이 타 교과에 비해 낮은 편인데, 그 이유는 무엇이라고 생각하는가? 성적 향상을 위해 어떤 노력을 해보았는가?"},
  {u:"대구경북과학기술원",c1:"과학인재전형·외국인전형",c2:"",q:"면접 예시를 제시하지 않음. 경기도교육청 면접사례자료집 참고"},
  {u:"울산과학기술원",c1:"탐구우수전형",c2:"",q:"UNIST에 지원한 동기는 무엇인가요.\n본인의 취약점과 이를 극복하기 위한 방안이 무엇인가요.\n학업에서 어려움을 극복한 경험이 있다면 말해보세요.\nUNIST에 진학 후 본인의 진로계획에 대해 말해보세요."},
  {u:"한국에너지공과대학",c1:"일반전형(창의성면접)",c2:"",q:"제시문 면접으로 선행학습 영향평가 결과보고서 참고"}
];

// populate univ dropdown
const UNIVS = [...new Set(DATA.map(d=>d.u))].sort();
const sel = document.getElementById('univSelect');
UNIVS.forEach(u => {
  const o = document.createElement('option');
  o.value = u; o.textContent = u; sel.appendChild(o);
});

document.getElementById('totalUniv').textContent = UNIVS.length;
document.getElementById('totalItems').textContent = DATA.length;

let filtered = DATA;
let openIdx = null;

function parseQs(raw) {
  return raw.split('\n').map(s=>s.trim()).filter(s=>s.length>5);
}

function render() {
  const list = document.getElementById('cardList');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('resultInfo').textContent =
    filtered.length === DATA.length
      ? `전체 ${DATA.length}개 항목`
      : `${filtered.length}개 항목`;

  if (filtered.length === 0) {
    list.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  list.innerHTML = filtered.map((d, i) => {
    const qs = parseQs(d.q);
    const preview = qs[0] ? qs[0].slice(0,80) + (qs[0].length>80?'…':'') : '';
    const isOpen = openIdx === i;
    return `
      <div class="card${isOpen?' open':''}" onclick="toggle(${i})">
        <div class="card-head">
          <div class="card-badges">
            <span class="badge badge-univ">${d.u}</span>
            <span class="badge badge-cat">${d.c1}</span>
            ${d.c2 ? `<span class="badge badge-cat">${d.c2}</span>` : ''}
          </div>
          <div class="card-arrow">▶</div>
        </div>
        <div class="card-preview">${preview}</div>
        <div class="card-body">
          <ul class="q-list">
            ${qs.map(q=>`<li class="q-item">${q}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  }).join('');
}

function toggle(i) {
  openIdx = openIdx === i ? null : i;
  render();
  if (openIdx !== null) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.card');
      const card = cards[openIdx];
      if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

function filter() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const univ = document.getElementById('univSelect').value;
  filtered = DATA.filter(d => {
    if (univ && d.u !== univ) return false;
    if (kw) {
      const haystack = (d.u + d.c1 + d.c2 + d.q).toLowerCase();
      if (!haystack.includes(kw)) return false;
    }
    return true;
  });
  openIdx = null;
  render();
}

function reset() {
  document.getElementById('searchInput').value = '';
  document.getElementById('univSelect').value = '';
  filter();
}

document.getElementById('searchInput').addEventListener('input', filter);
document.getElementById('univSelect').addEventListener('change', filter);

render();
</script>
</body>
</html>
